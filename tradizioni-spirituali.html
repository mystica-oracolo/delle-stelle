  artTitle: 'Un viaggio tra le grandi tradizioni spirituali del mondo',
  artH2: 'Perché studiare le tradizioni spirituali del mondo',
  artH3: 'Un patrimonio da rispettare, non da consumare',
  artP1: 'Le grandi tradizioni spirituali del mondo — dallo Sciamanesimo siberiano al Buddismo tantrico tibetano, dal Sufismo islamico al Druidismo celtico, dal Voodoo haitiano al Rosacroce occidentale — condividono un nucleo comune nonostante provengano da continenti e secoli lontanissimi tra loro: il bisogno umano di entrare in relazione con una realtà più ampia di quella visibile, attraverso pratiche, simboli e maestri che custodiscono e tramandano questo sapere di generazione in generazione. Conoscerle non significa soltanto raccogliere curiosità folkloristiche, ma comprendere meglio le radici profonde della spiritualità umana in tutte le sue forme.',
  artP2: 'Ognuna di queste vie ha sviluppato un proprio linguaggio simbolico: il tamburo e il volo dell\'anima nello sciamanesimo, il mantra e il mandala nel Buddismo Vajrayana, il dhikr e la rotazione del derviscio nel Sufismo, la quercia e la Ruota dell\'Anno nel Druidismo, i Loa e i vèvè nel Voodoo, la rosa sulla croce nell\'eredità rosacrociana. Studiarle fianco a fianco permette di cogliere sia ciò che le distingue profondamente sia il filo comune di ricerca interiore che le attraversa tutte.',
  artP3: 'Su MYSTICA affrontiamo questi temi con un approccio storico ed enciclopedico, distinguendo sempre tra ciò che le fonti documentano e ciò che appartiene invece al mito o alla leggenda. È un equilibrio importante: tradizioni come il Voodoo, ad esempio, sono state per decenni distorte dal cinema horror occidentale, mentre meritano di essere comprese nel loro reale contesto religioso, storico e culturale, con il rispetto dovuto a fedi vive ancora oggi praticate da milioni di persone in tutto il mondo, non a curiosità da consumare superficialmente.',
  artP4: 'Un errore comune di chi si avvicina per la prima volta a questi temi è mescolare tradizioni diverse come se fossero intercambiabili, creando un "calderone" sincretico privo di radici reali. Le comunità indigene che custodiscono lo sciamanesimo, così come i praticanti haitiani del Vodou, denunciano spesso proprio questo tipo di appropriazione superficiale, che svuota di significato pratiche nate in contesti culturali precisi. Un approccio rispettoso parte sempre dal riconoscere la specificità storica e culturale di ogni singola via, prima ancora di confrontarla con le altre.',
  artP5: 'Allo stesso tempo, queste tradizioni continuano a evolversi e a dialogare con il mondo contemporaneo: dal "core shamanism" occidentale alla diffusione internazionale di AMORC, dai gruppi neo-druidici che celebrano i solstizi a Stonehenge alla pratica quotidiana del dhikr in tutto il mondo islamico. Esplorarle oggi significa avvicinarsi a un patrimonio vivo, plurale e in continua trasformazione, non a semplici reperti del passato, ma a percorsi che milioni di persone scelgono ancora oggi come bussola concreta per orientare la propria vita interiore.',
  artImgAlt: 'Sciamano in trance accanto al fuoco sotto un cielo stellato, simbolo delle tradizioni spirituali del mondo',
  faq: [
    { q: 'Cos\'è lo Sciamanesimo e come si pratica oggi?', a: 'Lo sciamanesimo è una tecnologia spirituale universale, non una religione con dogmi: attraverso il "viaggio", uno stato di trance indotto dal suono ripetitivo del tamburo, dal canto o dal digiuno, lo sciamano accede a mondi invisibili per guarire, consigliare e custodire la memoria della comunità. Oggi sopravvive in forme tradizionali indigene in Siberia, Amazzonia e Nord America, e nel "core shamanism" codificato in Occidente dall\'antropologo Michael Harner a partire dagli anni \'70.' },
    { q: 'Qual è la differenza tra il Buddismo Vajrayana e gli altri rami del Buddismo?', a: 'Il Buddismo Vajrayana, diffuso soprattutto in Tibet, si distingue per la pretesa di offrire una "via rapida" al risveglio attraverso tecniche dirette — mantra, mandala, mudra, lavoro sui chakra — che trasformano emozioni e desideri in strumenti di realizzazione invece di limitarsi a contenerli, come avviene nel Buddismo più tradizionale.' },
    { q: 'Chi erano i dervisci rotanti e cosa rappresenta la loro danza?', a: 'I dervisci rotanti appartengono all\'ordine sufi Mevlevi, fondato sull\'eredità del poeta mistico persiano Rumi. La rotazione cerimoniale, chiamata sema, è una meditazione in movimento: simboleggia l\'unione con il divino, con il braccio destro alzato che riceve la grazia e quello sinistro abbassato che la trasmette al mondo.' },
    { q: 'Quali erano le funzioni sociali dei Druidi nell\'antica società celtica?', a: 'I Druidi non erano solo figure religiose: agivano anche come giudici nelle controversie tra clan, consiglieri dei capi, insegnanti della nobiltà e custodi orali della memoria storica e genealogica del popolo celtico, in una formazione che poteva durare fino a vent\'anni.' },
    { q: 'Qual è la differenza tra Vodou haitiano e Hoodoo nordamericano?', a: 'Il Vodou è una religione strutturata con clero, templi e cosmologia propria, nata ad Haiti dall\'incontro tra tradizioni dell\'Africa occidentale e cattolicesimo. L\'Hoodoo è invece un insieme di pratiche di magia popolare nato nel Sud degli Stati Uniti, spesso conservato anche da persone di fede cristiana senza contraddizione percepita.' },
    { q: 'Cosa simboleggia la rosa sulla croce nella tradizione Rosacroce?', a: 'La croce rappresenta il corpo e la condizione terrena, mentre la rosa che sboccia al suo centro simboleggia lo sviluppo dell\'anima e la rivelazione interiore, che fiorisce proprio a partire dalla disciplina e dalla sofferenza accettata e trasformata, non evitata.' },
    { q: 'Esistono ancora oggi ordini rosacrociani attivi?', a: 'Sì: il più diffuso a livello internazionale è l\'AMORC, fondato negli Stati Uniti nel 1915 da Harvey Spencer Lewis e attivo anche in Italia, con un percorso iniziatico per gradi basato su lezioni a domicilio incentrate su misticismo pratico e filosofia.' }
  ]

  artTitle: 'A journey through the world\'s great spiritual traditions',
  artH2: 'Why study the world\'s spiritual traditions',
  artH3: 'A heritage to respect, not to consume',
  artP1: 'The world\'s great spiritual traditions — from Siberian Shamanism to Tibetan tantric Buddhism, from Islamic Sufism to Celtic Druidry, from Haitian Voodoo to Western Rosicrucianism — share a common core despite coming from very different continents and centuries: the human need to relate to a reality wider than the visible one, through practices, symbols and teachers who preserve and pass on this knowledge.',
  artP2: 'Each of these paths developed its own symbolic language: the drum and the soul-flight of shamanism, the mantra and mandala of Vajrayana Buddhism, the dhikr and the dervish\'s turning in Sufism, the oak and the Wheel of the Year in Druidry, the Loa and vèvè of Voodoo, the rose upon the cross in the Rosicrucian legacy. Studying them side by side reveals both what sets them deeply apart and the common thread of inner search running through all of them.',
  artP3: 'On MYSTICA we approach these subjects with a historical, encyclopedic method, always distinguishing between what sources document and what belongs to myth or legend. This balance matters: traditions like Voodoo, for instance, were distorted for decades by Western horror cinema, while deserving to be understood in their real religious, historical and cultural context, with the respect owed to living faiths still practiced by millions today.',
  artP4: 'A common mistake among newcomers is blending different traditions as if interchangeable, creating a syncretic "melting pot" with no real roots. Indigenous communities who preserve shamanism, as well as Haitian Vodou practitioners, often denounce exactly this kind of superficial appropriation, which empties practices born in precise cultural contexts of their meaning. A respectful approach always starts by recognizing the historical and cultural specificity of each path before comparing it to others.',
  artP5: 'At the same time, these traditions keep evolving and engaging with the contemporary world: from Western "core shamanism" to AMORC\'s international spread, from neo-druidic groups celebrating the solstices at Stonehenge to the daily practice of dhikr across the Islamic world. Exploring them today means engaging with a living, plural and ever-changing heritage, not mere relics of the past, but paths millions of people still choose as a compass for their inner life.',
  artImgAlt: 'A shaman in trance beside a fire under a starry sky, symbol of the world\'s spiritual traditions',
  faq: [
    { q: 'What is Shamanism and how is it practiced today?', a: 'Shamanism is a universal spiritual technology, not a religion with dogmas: through the "journey", a trance state induced by repetitive drumming, chanting or fasting, the shaman accesses invisible worlds to heal, advise and preserve community memory. It survives today in indigenous forms across Siberia, the Amazon and North America, and in the Western "core shamanism" codified by anthropologist Michael Harner from the 1970s onward.' },
    { q: 'What sets Vajrayana Buddhism apart from other Buddhist schools?', a: 'Vajrayana Buddhism, dominant in Tibet, claims to offer a "fast path" to awakening through direct techniques — mantra, mandala, mudra, chakra work — that transform emotions and desires into tools of realization instead of merely containing them, as in more traditional Buddhism.' },
    { q: 'Who were the whirling dervishes and what does their dance represent?', a: 'The whirling dervishes belong to the Sufi Mevlevi order, founded on the legacy of Persian mystic poet Rumi. Their ceremonial turning, the sema, is a moving meditation symbolizing union with the divine, the raised right arm receiving grace and the lowered left transmitting it to the world.' },
    { q: 'What social roles did the Druids hold in ancient Celtic society?', a: 'The Druids were not only religious figures: they also acted as judges in clan disputes, advisors to chieftains, teachers of the nobility, and oral keepers of the Celtic people\'s historical and genealogical memory, in training that could last up to twenty years.' },
    { q: 'What is the difference between Haitian Vodou and North American Hoodoo?', a: 'Vodou is a structured religion with its own clergy, temples and cosmology, born in Haiti from the encounter between West African traditions and Catholicism. Hoodoo, by contrast, is a body of folk-magic practices born in the southern United States, often kept by people of Christian faith without perceived contradiction.' },
    { q: 'What does the rose upon the cross symbolize in Rosicrucian tradition?', a: 'The cross represents the body and earthly condition, while the rose blooming at its center symbolizes the soul\'s development and inner revelation, flowering precisely from accepted and transformed, rather than avoided, discipline and suffering.' },
    { q: 'Are there still active Rosicrucian orders today?', a: 'Yes: the most internationally widespread is AMORC, founded in the United States in 1915 by Harvey Spencer Lewis and active in Italy too, offering a graded initiatory path through home-study lessons centered on practical mysticism and philosophy.' }
  ]

  artTitle: 'Un viaje por las grandes tradiciones espirituales del mundo',

  artP1: 'Las grandes tradiciones espirituales del mundo —desde el chamanismo siberiano hasta el budismo tántrico tibetano, desde el sufismo islámico hasta el druidismo celta, desde el vudú haitiano hasta los rosacruces occidentales— comparten un núcleo común a pesar de provenir de continentes y siglos muy distantes entre sí: la necesidad humana de relacionarse con una realidad más amplia que la visible, a través de prácticas, símbolos y maestros que custodian y transmiten este saber.',
  artP2: 'Cada uno de estos caminos desarrolló su propio lenguaje simbólico: el tambor y el vuelo del alma en el chamanismo, el mantra y el mandala en el budismo Vajrayana, el dhikr y el giro del derviche en el sufismo, el roble y la Rueda del Año en el druidismo, los Loa y los vèvè en el vudú, la rosa sobre la cruz en el legado rosacruz. Estudiarlas en conjunto permite captar tanto lo que las distingue profundamente como el hilo común de búsqueda interior que las atraviesa a todas.',

  artP4: 'Un error común de quien se acerca por primera vez a estos temas es mezclar tradiciones distintas como si fueran intercambiables, creando un "caldero" sincrético sin raíces reales. Las comunidades indígenas que custodian el chamanismo, así como los practicantes haitianos del vudú, denuncian a menudo precisamente este tipo de apropiación superficial. Un enfoque respetuoso parte siempre de reconocer la especificidad histórica y cultural de cada camino.',
  artP5: 'Al mismo tiempo, estas tradiciones siguen evolucionando y dialogando con el mundo contemporáneo: desde el chamanismo nuclear occidental hasta la difusión internacional de AMORC, desde los grupos neodruídicos que celebran los solsticios en Stonehenge hasta la práctica cotidiana del dhikr en todo el mundo islámico. Explorarlas hoy significa acercarse a un patrimonio vivo, plural y en constante transformación, no a simples reliquias del pasado.',
  artImgAlt: 'Chamán en trance junto al fuego bajo un cielo estrellado, símbolo de las tradiciones espirituales del mundo',

    { q: '¿Qué es el Chamanismo y cómo se practica hoy?', a: 'El chamanismo es una tecnología espiritual universal, no una religión con dogmas: a través del "viaje", un estado de trance inducido por el sonido repetitivo del tambor, el canto o el ayuno, el chamán accede a mundos invisibles para sanar, aconsejar y custodiar la memoria de la comunidad. Hoy sobrevive en formas tradicionales indígenas en Siberia, la Amazonia y Norteamérica, y en el "chamanismo nuclear" codificado en Occidente por el antropólogo Michael Harner desde los años 70.' },
    { q: '¿Qué diferencia al budismo Vajrayana de otras ramas del budismo?', a: 'El budismo Vajrayana, dominante en el Tíbet, se distingue por ofrecer una "vía rápida" hacia el despertar mediante técnicas directas —mantra, mandala, mudra, trabajo con los chakras— que transforman emociones y deseos en herramientas de realización en lugar de simplemente contenerlos, como ocurre en el budismo más tradicional.' },
    { q: '¿Quiénes eran los derviches giróvagos y qué representa su danza?', a: 'Los derviches giróvagos pertenecen a la orden sufí Mevlevi, fundada sobre el legado del poeta místico persa Rumi. Su giro ceremonial, el sema, es una meditación en movimiento que simboliza la unión con lo divino: el brazo derecho elevado recibe la gracia y el izquierdo, bajado, la transmite al mundo.' },
    { q: '¿Qué funciones sociales tenían los druidas en la antigua sociedad celta?', a: 'Los druidas no eran solo figuras religiosas: también actuaban como jueces en disputas entre clanes, consejeros de jefes, maestros de la nobleza y guardianes orales de la memoria histórica y genealógica del pueblo celta, en una formación que podía durar hasta veinte años.' },
    { q: '¿Cuál es la diferencia entre el Vudú haitiano y el Hoodoo norteamericano?', a: 'El Vudú es una religión estructurada con clero, templos y cosmología propios, nacida en Haití del encuentro entre tradiciones del África occidental y el catolicismo. El Hoodoo es en cambio un conjunto de prácticas de magia popular nacido en el sur de Estados Unidos, a menudo conservado también por personas de fe cristiana sin contradicción percibida.' },
    { q: '¿Qué simboliza la rosa sobre la cruz en la tradición rosacruz?', a: 'La cruz representa el cuerpo y la condición terrenal, mientras que la rosa que florece en su centro simboliza el desarrollo del alma y la revelación interior, que florece precisamente a partir de la disciplina y el sufrimiento aceptados y transformados, no evitados.' },
    { q: '¿Existen hoy órdenes rosacruces activas?', a: 'Sí: la más extendida internacionalmente es AMORC, fundada en Estados Unidos en 1915 por Harvey Spencer Lewis y activa también en Italia, con un camino iniciático por grados basado en lecciones a domicilio centradas en misticismo práctico y filosofía.' }
  ]
}
};

let currentLang = localStorage.getItem('myst_lang') || 'it';

/* ── SEO Multilingua ── */
function updateSEO() {
  const S = LANG[currentLang].seo;
  document.documentElement.lang = S.htmlLang;
  document.title = S.title;
  document.querySelector('meta[name="description"]').content = S.description;
  document.querySelector('meta[name="keywords"]').content = S.keywords;
  document.querySelector('meta[property="og:title"]').content = S.ogTitle;
  document.querySelector('meta[property="og:description"]').content = S.ogDesc;
  document.querySelector('meta[property="og:locale"]').content = S.ogLocale;
  document.querySelector('meta[name="twitter:title"]').content = S.ogTitle;
  document.querySelector('meta[name="twitter:description"]').content = S.ogDesc;
  const ld = document.querySelector('script[type="application/ld+json"]');
  if (ld && S.faqLD) {
    ld.textContent = JSON.stringify({
      '@context': 'https://schema.org',
      '@graph': [
        {
          '@type': 'FAQPage',
          mainEntity: S.faqLD.map(f => ({ '@type': 'Question', name: f.q, acceptedAnswer: { '@type': 'Answer', text: f.a } }))
        },
        {
          '@type': 'BreadcrumbList',
          itemListElement: [
            { '@type': 'ListItem', position: 1, name: 'MYSTICA', item: 'https://mysticaoracoli.it/index.html' },
            { '@type': 'ListItem', position: 2, name: S.ogTitle, item: 'https://mysticaoracoli.it/tradizioni-spirituali.html' }
          ]
        },
        {
          '@type': 'Article',
          headline: LANG[currentLang].artTitle,
          image: 'https://raw.githubusercontent.com/mystica-oracolo/delle-stelle/main/images/mystica-orizzontale.webp',
          author: { '@type': 'Person', name: 'Dott. Petrolese Giovanni' },
          publisher: { '@type': 'Organization', name: 'MYSTICA Oracoli' },
          inLanguage: S.htmlLang
        },
        {
          '@type': 'WebPage',
          name: S.title,
          url: 'https://mysticaoracoli.it/tradizioni-spirituali.html',
          inLanguage: S.htmlLang,
          isPartOf: { '@type': 'WebSite', name: 'MYSTICA Oracoli', url: 'https://mysticaoracoli.it/' }
        }
      ]
    });
  }
}

/* ── Render tradizioni (sezione interattiva) ── */
function renderTraditions() {
  const L = LANG[currentLang];
  const data = TRAD_DATA[currentLang];
  const toc = document.getElementById('tocList');
  toc.innerHTML = data.map(t => `<a class="toc-pill" href="#${t.id}">${t.title}</a>`).join('');

  const list = document.getElementById('tradList');
  list.innerHTML = data.map(t => `
    <div class="trad-card" id="${t.id}" style="--th:${t.th}">
      <button class="trad-head" onclick="toggleTrad(this)" aria-expanded="false">
        <div class="trad-ico" aria-hidden="true">${t.icon}</div>
        <div class="trad-info">
          <div class="trad-eyebrow">${t.eyebrow}</div>
          <h2 class="trad-title">${t.title}</h2>
          <div class="trad-sub">${t.sub}</div>
        </div>
        <div class="trad-toggle" aria-hidden="true">▾</div>
      </button>
      <div class="trad-body">
        ${t.blocks.map(b => `
          <div class="trad-block">
            <div class="block-img"><img src="${b.img}" alt="${b.alt}" width="380" height="214" loading="lazy" decoding="async"></div>
            <h3>${b.h3}</h3>
            ${b.p.map(par => `<p>${par}</p>`).join('')}
          </div>
        `).join('')}
        ${t.diffBox ? `<div class="diff-box"><strong>${t.diffBox.t}</strong>${t.diffBox.x}</div>` : ''}
        ${t.note ? `<div class="trad-note">${t.note}</div>` : ''}
        <div class="trad-tags">${t.tags.map(tag => `<span class="trad-tag">${tag}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');

  // riapre la card già aperta in precedenza, se presente
  const hash = window.location.hash.replace('#', '');
  if (hash) {
    const card = document.getElementById(hash);
    if (card && card.classList.contains('trad-card')) card.classList.add('open');
  }

  // testi statici hero / esplora
  document.getElementById('hero-title').textContent = L.heroTitle;
  document.getElementById('hero-text').textContent = L.heroText;
  L.esplora.forEach((txt, i) => { const el = document.getElementById('esp-' + (i+1)); if (el) el.textContent = txt; });
}

function toggleTrad(headEl) {
  const card = headEl.closest('.trad-card');
  const wasOpen = card.classList.contains('open');
  document.querySelectorAll('.trad-card.open').forEach(c => { if (c !== card) { c.classList.remove('open'); c.querySelector('.trad-head').setAttribute('aria-expanded','false'); } });
  card.classList.toggle('open', !wasOpen);
  headEl.setAttribute('aria-expanded', String(!wasOpen));
  if (!wasOpen) setTimeout(() => { card.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 80);
}

/* ── Audio Manager ── */
const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';
class AudioManager {
  constructor() { this.audio = null; this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true'; this.initAudio(); }
  initAudio() { this.audio = new Audio(AUDIO_URL);
    this.audio.preload = 'none'; this.audio.loop = true; this.audio.volume = 0.3; if (this.isPlaying) this.play(); this.updateUI(); }
  play() { this.audio?.play().catch(() => {}); this.isPlaying = true; sessionStorage.setItem(AUDIO_KEY, 'true'); this.updateUI(); }
  pause() { this.audio?.pause(); this.isPlaying = false; sessionStorage.setItem(AUDIO_KEY, 'false'); this.updateUI(); }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() { const btn = document.getElementById('musicToggle'); const L = LANG[currentLang]; if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off; }
}
window.audioManager = new AudioManager();
document.getElementById('musicToggle')?.addEventListener('click', () => window.audioManager.toggle());

/* ── Tema Giorno/Notte ── */
let isDayMode = localStorage.getItem('myst_theme') === 'day';
function applyTheme(isDay) {
  document.documentElement.classList.toggle('theme-day', isDay);
  const btn = document.getElementById('themeToggle');
  const L = LANG[currentLang];
  if (btn) btn.textContent = isDay ? L.theme.night : L.theme.day;
  localStorage.setItem('myst_theme', isDay ? 'day' : 'night');
}
document.getElementById('themeToggle')?.addEventListener('click', () => { isDayMode = !isDayMode; applyTheme(isDayMode); });

/* ── Premium Gate ── */
function isPremium() { return localStorage.getItem('myst_premium') === '1'; }
function requirePremium(actionType) {
  if (isPremium()) return true;
  document.getElementById('premiumModal')?.classList.add('show');
  document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'false');
  return false;
}
function closePremiumModal() {
  document.getElementById('premiumModal')?.classList.remove('show');
  document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'true');
}

/* ── Share ── */
const PAGE_URL = 'https://mysticaoracoli.it/tradizioni-spirituali.html';
function shareContent(customText) {
  const L = LANG[currentLang];
  const text = customText || L.shareText;
  if (navigator.share) { navigator.share({ title: L.shareTitle, text, url: PAGE_URL }).catch(() => {}); return; }
  const enc = encodeURIComponent(text + ' ' + PAGE_URL);
  const ue = encodeURIComponent(PAGE_URL);
  document.getElementById('share-wa').href = `https://wa.me/?text=${enc}`;
  document.getElementById('share-tg').href = `https://t.me/share/url?url=${ue}&text=${encodeURIComponent(text)}`;
  document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${ue}`;
  document.getElementById('share-x').href = `https://twitter.com/intent/tweet?text=${enc}`;
  document.getElementById('sharePopup').hidden = false;
}
function copyLink() {
  const L = LANG[currentLang];
  navigator.clipboard.writeText(PAGE_URL).then(() => {
    const b = document.getElementById('share-copy');
    if (b) { b.textContent = L.shareCopied; setTimeout(() => { b.textContent = L.shareCopy; }, 2000); }
  });
}

/* ── FAQ Accordion ── */
function renderFAQ(faqs) {
  const container = document.getElementById('faqList');
  if (!container) return;
  container.innerHTML = faqs.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false">
        <span>${f.q}</span><span class="faq-icon">+</span>
      </button>
      <div class="faq-answer" id="faq-ans-${i}" hidden><p>${f.a}</p></div>
    </div>
  `).join('');
}
function toggleFAQ(i) {
  const ans = document.getElementById(`faq-ans-${i}`);
  const btn = document.querySelector(`#faq-${i} .faq-question`);
  const icon = btn?.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  if (icon) icon.textContent = isOpen ? '+' : '−';
  btn?.setAttribute('aria-expanded', String(!isOpen));
}

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  applyTheme(isDayMode);
  applyLang();
  document.querySelectorAll('[data-lang]').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
});
