<style>
:root{--bg:#0a0514;--card:#140c24;--purple:#2a1748;--gold:#d4af37;--gold-dim:#b8860b;--gold-glow:rgba(212,175,55,0.4);--text:#f4f1fa;--muted:#b8b2d1;--radius:18px;--border:rgba(212,175,55,0.2)}
html.theme-day{--bg:#f5f2ed;--card:#ede8df;--text:#2a1748;--muted:#6b5b7f;--purple:#6b5b7f;--gold:#c89742;--gold-dim:#a67c52;--gold-glow:rgba(200,151,66,0.2);--border:#c89742}
html.theme-day .trad-card,html.theme-day .trad-block,html.theme-day .article-section,html.theme-day .faq-item{background-color:var(--card);border-color:var(--border)}
html.theme-day h1,html.theme-day h2,html.theme-day h3{color:var(--text);text-shadow:none}
html.theme-day .btn-share,html.theme-day .cta-explore,html.theme-day .fn-btn{background:var(--gold);color:#fff;border-color:var(--border)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;overflow-x:hidden;line-height:1.6;-webkit-font-smoothing:antialiased}
button{touch-action:manipulation;-webkit-appearance:none;font-family:inherit;cursor:pointer}
a{color:inherit}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.skip-link{position:absolute;left:-9999px;top:0;background:var(--gold);color:#000;padding:10px 16px;z-index:999;border-radius:0 0 8px 0}
.skip-link:focus{left:0}

/* ── Sfondo Cosmico ── */
.cosmos{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,#2a174830 0%,transparent 70%),radial-gradient(ellipse 40% 60% at 80% 80%,#1a073820 0%,transparent 60%),radial-gradient(2px 2px at 15% 25%,#fff9 0%,transparent 100%),radial-gradient(1.5px 1.5px at 75% 15%,#fff7 0%,transparent 100%),radial-gradient(2px 2px at 45% 70%,#d4af3780 0%,transparent 100%),radial-gradient(1px 1px at 88% 45%,#fff6 0%,transparent 100%),radial-gradient(1.5px 1.5px at 30% 85%,#fff5 0%,transparent 100%),radial-gradient(2px 2px at 60% 35%,#d4af3760 0%,transparent 100%),radial-gradient(1px 1px at 8% 60%,#d4af3750 0%,transparent 100%),radial-gradient(1.5px 1.5px at 92% 75%,#fff6 0%,transparent 100%);animation:twinkle 14s infinite alternate}
@keyframes twinkle{0%{opacity:.35}33%{opacity:.65}66%{opacity:.45}100%{opacity:.55}}

#app{max-width:480px;margin:0 auto;position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column}

/* ── Header ── */
.page-header{background:rgba(10,5,20,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:16px 20px 13px;padding-top:max(16px,calc(16px + env(safe-area-inset-top,0px)));text-align:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.btn-back{display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.5px;text-decoration:none;background:none;border:none}
.btn-back::before{content:'‹ ';font-size:15px}
.btn-back:hover{color:var(--gold)}
.header-controls{display:flex;gap:8px}
.btn-icon{background:rgba(212,175,55,0.08);border:1px solid var(--border);color:var(--gold);border-radius:20px;padding:6px 10px;font-size:11px;font-family:'Cinzel',serif}
.page-title{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);letter-spacing:1px;text-shadow:0 0 20px var(--gold-glow);margin:4px 0 8px}
.lang-switch{display:flex;gap:6px;justify-content:center}
.btn-lang{background:rgba(42,23,72,0.4);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:4px 10px;font-family:'Cinzel',serif;font-size:10.5px;letter-spacing:.5px}
.btn-lang.active{background:var(--gold);color:#1a0f2e;border-color:var(--gold)}

main{flex:1;padding:16px 14px calc(40px + env(safe-area-inset-bottom,0px));position:relative;z-index:2}

.hero{text-align:center;padding:26px 16px 22px;background:linear-gradient(145deg,#180d30,#08040f);border-radius:18px;border:1px solid var(--gold-dim);margin-bottom:18px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(212,175,55,.1),transparent 70%);pointer-events:none}
.hero-icon{font-size:42px;margin-bottom:10px;filter:drop-shadow(0 0 16px #d4af3770)}
.hero h2{font-family:'Cinzel',serif;font-size:21px;color:var(--gold);letter-spacing:1px;line-height:1.4;margin-bottom:8px;text-shadow:0 2px 4px rgba(0,0,0,0.5)}
.hero p{font-size:13.5px;color:var(--muted);line-height:1.7;font-style:italic;max-width:340px;margin:0 auto}

.toc{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:22px}
.toc-pill{padding:6px 13px;background:rgba(42,23,72,0.4);border:1px solid rgba(212,175,55,0.25);border-radius:20px;font-family:'Cinzel',serif;font-size:10.5px;color:var(--muted);text-decoration:none;letter-spacing:.3px;transition:all .2s}
.toc-pill:hover{border-color:var(--gold);color:var(--gold);background:rgba(42,23,72,0.7)}

.trad-card{background:var(--card);border:1.5px solid rgba(42,23,72,0.9);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.6);transition:border-color .3s ease}
.trad-card::before{content:'';display:block;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}
.trad-head{display:flex;align-items:center;gap:14px;padding:18px;width:100%;text-align:left;background:none;border:none;transition:background .2s}
.trad-head:hover{background:rgba(212,175,55,0.04)}
.trad-ico{width:52px;height:52px;flex-shrink:0;border-radius:50%;background:radial-gradient(circle at 40% 35%,var(--th,#2a1748),#07020e);border:2px solid rgba(212,175,55,.6);display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 16px rgba(212,175,55,.25),inset 0 0 8px rgba(0,0,0,.5)}
.trad-info{flex:1;min-width:0}
.trad-eyebrow{font-family:'Cinzel',serif;font-size:8.5px;color:var(--gold-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.trad-title{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);letter-spacing:.5px;margin-bottom:2px}
.trad-sub{font-size:11.5px;color:var(--muted);font-style:italic}
.trad-toggle{font-size:13px;color:var(--gold-dim);flex-shrink:0;transition:transform .3s ease}
.trad-card.open .trad-toggle{transform:rotate(180deg)}
.trad-body{display:none;padding:0 18px 20px}
.trad-card.open .trad-body{display:block;animation:fadeUp .35s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.trad-block{background:#0b0520;border-left:3px solid var(--gold);border-radius:0 10px 10px 0;padding:13px 14px;margin-bottom:10px;content-visibility:auto}
.block-img{display:flex;justify-content:center;margin:0 0 10px;width:100%}
.block-img img{display:block;width:100%;max-width:380px;aspect-ratio:16/9;height:auto;object-fit:cover;object-position:center;border-radius:10px;border:1px solid rgba(212,175,55,0.25)}
.trad-block h3{font-family:'Cinzel',serif;color:var(--gold);font-size:9.5px;letter-spacing:1.5px;margin-bottom:7px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.trad-block p{font-size:13.5px;line-height:1.75;color:var(--text);margin:0}
.trad-block p+p{margin-top:8px}

.trad-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.trad-tag{background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.25);color:var(--gold);font-size:10.5px;padding:3px 10px;border-radius:9px;font-family:'Cinzel',serif;letter-spacing:.3px}

.trad-note{background:linear-gradient(145deg,#160930,#0a0420);border:1px solid var(--gold-dim);border-radius:12px;padding:13px 14px;margin-top:6px;font-size:12.5px;color:var(--muted);line-height:1.7;font-style:italic}
.trad-note strong{color:var(--gold);font-style:normal}

.diff-box{background:#100820;border:1px dashed rgba(212,175,55,0.3);border-radius:12px;padding:12px 14px;margin-top:10px;font-size:12px;color:var(--muted);line-height:1.6}
.diff-box strong{color:var(--gold);font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:5px}

/* ── Share ── */
.share-section{margin:18px 0}
.btn-share{width:100%;padding:13px;background:linear-gradient(135deg,#2a1748,#160d30);border:1.5px solid var(--gold);color:var(--gold);border-radius:12px;font-size:13px;font-weight:700;font-family:'Cinzel',serif;letter-spacing:.5px}
.share-popup{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.share-btn{flex:1;min-width:90px;text-align:center;padding:9px;border-radius:10px;font-size:11.5px;text-decoration:none;border:1px solid var(--border);color:var(--text);background:rgba(212,175,55,0.06)}

/* ── Articolo editoriale ── */
.article-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 18px;margin:20px 0}
.article-section h2{font-family:'Cinzel',serif;color:var(--gold);font-size:18px;letter-spacing:.5px;margin-bottom:14px;line-height:1.4}
.article-section h3{font-family:'Cinzel',serif;color:var(--gold);font-size:14px;letter-spacing:.3px;margin:16px 0 8px}
.article-section p{font-size:13.5px;line-height:1.8;color:var(--text);margin-bottom:10px}
.article-section img{width:100%;border-radius:14px;margin:16px 0;border:1px solid var(--border)}
.article-links{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
.article-links a{font-size:11.5px;color:var(--gold-dim);text-decoration:underline;padding:4px 0}
.cta-explore{display:block;text-align:center;padding:13px;background:linear-gradient(135deg,#2a1748,#160d30);border:1.5px solid var(--gold);color:var(--gold);border-radius:12px;font-family:'Cinzel',serif;font-size:12.5px;letter-spacing:.5px;text-decoration:none;margin-top:6px}

/* ── FAQ ── */
.faq-section{margin:20px 0}
.faq-title{font-family:'Cinzel',serif;color:var(--gold);font-size:16px;letter-spacing:1px;margin-bottom:12px;text-align:center}
.faq-item{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.faq-question{width:100%;display:flex;justify-content:space-between;align-items:center;gap:10px;background:none;border:none;color:var(--text);padding:13px 14px;font-size:13px;text-align:left;font-family:'Crimson Pro',serif}
.faq-icon{color:var(--gold);font-size:16px;flex-shrink:0}
.faq-answer p{font-size:12.5px;color:var(--muted);line-height:1.7;padding:0 14px 14px}

.disclaimer{text-align:center;font-size:10.5px;color:#4a4262;line-height:1.7;margin:24px 0 8px;padding:0 6px}

.footer-nav{display:flex;gap:9px;margin-top:6px}
.fn-btn{flex:1;padding:14px;background:linear-gradient(135deg,#2a1748,#160d30);border:1.5px solid var(--gold);color:var(--gold);border-radius:12px;font-size:13px;font-weight:700;text-align:center;font-family:'Cinzel',serif;letter-spacing:.5px;text-decoration:none;display:block}

.page-footer{text-align:center;padding:18px 14px;font-size:10px;color:var(--muted);border-top:1px solid #2a174840;margin-top:14px;position:relative;z-index:2}
.footer-links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.footer-links a{color:var(--gold-dim);text-decoration:none;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.5px}
.footer-disclaimer{margin-top:6px;color:#4a4262;font-size:9.5px}

.esplora-section{background:linear-gradient(135deg,#130b26,#1a0c32);border-top:1px solid rgba(212,175,55,0.25);padding:32px 20px;text-align:center;position:relative;z-index:2}
.esplora-section h2{font-family:"Cinzel",serif;color:var(--gold);font-size:1.05rem;letter-spacing:2px;margin-bottom:18px}
.esplora-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:800px;margin:0 auto}
.esplora-card{display:inline-block;background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.25);border-radius:8px;padding:10px 16px;color:var(--gold);text-decoration:none;font-family:"Cinzel",serif;font-size:0.78rem;letter-spacing:1px}
.esplora-card:hover{background:rgba(212,175,55,0.18);border-color:rgba(212,175,55,0.6)}

/* ── Premium Modal ── */
.premium-modal{position:fixed;inset:0;z-index:999;display:none;align-items:center;justify-content:center;padding:20px}
.premium-modal.show{display:flex}
.modal-overlay{position:absolute;inset:0;background:rgba(5,2,12,0.85);backdrop-filter:blur(4px)}
.modal-content{position:relative;background:var(--card);border:1.5px solid var(--gold);border-radius:18px;padding:24px 20px;max-width:340px;text-align:center;z-index:1}
.modal-content h2{font-family:'Cinzel',serif;color:var(--gold);font-size:17px;margin-bottom:10px}
.modal-content p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.premium-price{color:var(--gold);font-weight:700}
.btn-premium-buy{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#1a0f2e;border:none;border-radius:12px;font-family:'Cinzel',serif;font-weight:700;font-size:13px;margin-top:8px}
.btn-premium-skip{width:100%;padding:11px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:12px;font-size:12.5px;margin-top:8px}
</style>

{id:'sciamanesimo',icon:'🪶',th:'#3a2810',eyebrow:'Tradizione Universale',title:'Sciamanesimo',sub:'Il viaggio tra i mondi',
blocks:[
{img:'./images/icone/tradizioni/sciamanesimo/origini-e-diffusione.webp',alt:'Origini e diffusione',h3:'🌍 Origini e diffusione',p:["Il termine \"sciamano\" deriva da šaman, parola dei popoli Tungusi della Siberia che indica \"colui che sa\". Ma la pratica sciamanica, ben più antica della parola che la descrive, compare in forme analoghe su ogni continente: Siberia, Mongolia, Prime Nazioni del Nord America, culture amazzoniche, aborigeni australiani, Africa subsahariana e persino l'Europa preistorica, dove pitture rupestri di 30.000 anni fa rappresentano già figure ibride uomo-animale interpretate come sciamani in trance.","Non è una religione con dogmi o testi sacri, ma una tecnologia spirituale: un metodo pratico, trasmesso oralmente da maestro ad apprendista, per accedere a stati di coscienza non ordinari e operare nel mondo invisibile a beneficio della comunità."]},
{img:'./images/icone/tradizioni/sciamanesimo/il-viaggio-sciamanico.webp',alt:'Il viaggio sciamanico',h3:'🥁 Il viaggio sciamanico',p:["Il cuore della pratica è il \"viaggio\": lo sciamano induce in sé una trance controllata attraverso il suono ripetitivo del tamburo (180-220 battiti al minuto, frequenza che favorisce le onde cerebrali theta), il sonaglio, il canto, la danza prolungata, il digiuno o, in alcune culture, piante enteogene come l'ayahuasca o il peyote.","Mircea Eliade, storico delle religioni che ha sistematizzato lo studio dello sciamanesimo nel Novecento, descrive questo stato come un \"volo dell'anima\": lo sciamano si stacca dal corpo fisico e si muove lungo l'Albero del Mondo, l'axis mundi che collega i tre livelli della realtà."]},
{img:'./images/icone/tradizioni/sciamanesimo/i-tre-mondi.webp',alt:'I tre mondi',h3:'🌳 I tre mondi',p:["La cosmologia sciamanica distingue tipicamente tre regni collegati da un asse centrale: il Mondo Superiore, dimora di spiriti elevati e divinità celesti, raggiunto risalendo; il Mondo di Mezzo, la realtà ordinaria vista con percezione ampliata; il Mondo Inferiore, regno di spiriti animali ancestrali, raggiunto scendendo attraverso una fenditura nella terra, una tana o l'acqua."]},
{img:'./images/icone/tradizioni/sciamanesimo/spiriti-guida-e-poteri-animali.webp',alt:'Spiriti guida e poteri animali',h3:'✨ Spiriti guida e poteri animali',p:["Durante il viaggio lo sciamano incontra alleati spirituali: spiriti animali di potere, antenati, maestri non incarnati. Questi alleati offrono protezione, insegnamenti, capacità di guarigione e, in molte tradizioni, il \"recupero dell'anima\" — ritrovare frammenti dell'essenza vitale perduti per traumi o shock.","Lo sciamano non è solo un mistico isolato: nella società tradizionale svolge funzioni concrete di guaritore, consigliere, mediatore nei conflitti e custode della memoria collettiva."]},
{img:'./images/icone/tradizioni/sciamanesimo/lo-sciamanesimo-contemporaneo.webp',alt:'Lo sciamanesimo contemporaneo',h3:'🔮 Lo sciamanesimo contemporaneo',p:["A partire dagli anni '60-'70 lo sciamanesimo ha conosciuto nuova diffusione in Occidente grazie all'antropologo Michael Harner, che codificò il \"core shamanism\": un metodo che isola le tecniche universali del viaggio separandole dalla cosmologia di una singola cultura, diffuso tramite la Foundation for Shamanic Studies da lui fondata nel 1979.","Questa diffusione ha portato anche tensioni reali: molte comunità indigene denunciano un uso superficiale o commerciale delle loro pratiche sacre, in particolare attorno a piante come l'ayahuasca, da parte di chi non ne condivide il contesto culturale."]},
{img:'./images/icone/tradizioni/sciamanesimo/strumenti-e-oggetti-di-potere.webp',alt:'Strumenti e oggetti di potere',h3:'🪘 Strumenti e oggetti di potere',p:["Il tamburo è lo strumento sciamanico per eccellenza, spesso costruito con pelle animale e dipinto con simboli cosmologici: tra i Sami il noaidi usava il runebomme, tamburo runico usato anche per la divinazione. Sonagli, piume, maschere e abiti rituali completano un corredo mai puramente decorativo: ogni oggetto viene consacrato e considerato vivo.","Nell'Amazzonia il chakapa, fascio di foglie usato come sonaglio, accompagna gli icaros, i canti rituali che guidano il viaggio dei partecipanti."]},
{img:'./images/icone/tradizioni/sciamanesimo/piante-sacre-e-geografie-sciamaniche.webp',alt:'Piante sacre e geografie sciamaniche',h3:'🌿 Piante sacre e geografie sciamaniche',p:["Ogni area geografica ha sviluppato un proprio rapporto con piante sacre: l'ayahuasca guida i rituali amazzonici sotto la direzione di un curandero; il peyote è al centro dei riti della Native American Church; l'iboga è chiave nei riti Bwiti del Gabon; in Siberia lo sciamanesimo è stato a lungo associato al fungo Amanita muscaria."]},
{img:'./images/icone/tradizioni/sciamanesimo/la-malattia-iniziatica-essere-scelti-dagli-spiriti.webp',alt:"La malattia iniziatica: essere scelti dagli spiriti",h3:'🩺 La "malattia iniziatica"',p:["In molte culture non si diventa sciamani per scelta, ma per \"chiamata\": una malattia grave, sogni intensi o un'esperienza di pre-morte sono interpretati come segno che gli spiriti hanno scelto quella persona. Eliade ha descritto questo schema come quasi universale: il futuro sciamano attraversa una \"morte\" simbolica per poi essere \"ricomposto\" con nuovi poteri.","Rifiutare questa chiamata può aggravare la malattia; accettarla e completare l'iniziazione è ciò che porta alla guarigione e all'assunzione del ruolo."]}
],
diffBox:{t:'Non confondere con: Animali Totem',x:"Il totem è un'identità simbolica stabile legata al carattere e al destino di una persona per tutta la vita. Lo spirito guida sciamanico è invece un alleato incontrato attivamente durante la trance, che può cambiare da un viaggio all'altro."},
tags:['Trance','Tamburo sciamanico','Spiriti Guida','Recupero dell\'Anima','Axis Mundi','Michael Harner','Ayahuasca','Mircea Eliade']},

{id:'buddismo-esoterico',icon:'☸️',th:'#3d1a30',eyebrow:'Via Tantrica',title:'Buddismo Esoterico & Tantra',sub:'Mantra, mandala, mudra',
blocks:[
{img:'./images/icone/tradizioni/buddismo-esoterico/origini-e-via-rapida.webp',alt:'Origini e via rapida',h3:'🪷 Origini e via rapida',p:["Il Buddismo Vajrayana — \"il veicolo di diamante\" — nasce in India attorno al VI-VII secolo come sviluppo tantrico del Buddismo Mahayana, per radicarsi profondamente in Tibet grazie a maestri come Padmasambhava, e diffondersi in Nepal, Bhutan, Mongolia e Giappone (variante Shingon).","Ciò che lo distingue è la pretesa di offrire una \"via rapida\" al risveglio: il praticante tantrico utilizza tecniche dirette per trasformare energie, emozioni e desideri in carburante per la realizzazione spirituale, anziché reprimerli."]},
{img:'./images/icone/tradizioni/buddismo-esoterico/mantra-il-suono-come-strumento.webp',alt:'Mantra: il suono come strumento',h3:'🕉️ Mantra: il suono come strumento',p:["I mantra sono formule sonore sacre — sillabe, parole o invocazioni in sanscrito — recitate per concentrare e trasformare la mente. Nella visione tantrica il suono stesso porta una vibrazione capace di sintonizzare chi lo recita con una qualità illuminata.","Il mantra più diffuso anche in Occidente è \"Om Mani Padme Hum\", legato ad Avalokiteshvara, bodhisattva della compassione: ciascuna sillaba è associata alla purificazione di un'emozione disturbante e di uno dei sei regni di rinascita."]},
{img:'./images/icone/tradizioni/buddismo-esoterico/mandala-l-universo-in-un-cerchio.webp',alt:"Mandala: l'universo in un cerchio",h3:"🔯 Mandala: l'universo in un cerchio",p:["Il mandala è un diagramma sacro, quasi sempre circolare, che rappresenta l'intero universo o il \"palazzo celeste\" di una divinità tantrica. Nei monasteri tibetani i monaci li costruiscono con sabbia colorata lavorando per giorni, per poi dissolverli ritualmente — gesto che insegna l'impermanenza di ogni cosa creata.","Oltre alla funzione rituale, il mandala è supporto di meditazione: visualizzandolo, il praticante \"entra\" simbolicamente nel palazzo della divinità."]},
{img:'./images/icone/tradizioni/buddismo-esoterico/mudra-il-linguaggio-delle-mani.webp',alt:'Mudra: il linguaggio delle mani',h3:'🤲 Mudra: il linguaggio delle mani',p:["I mudra sono gesti rituali delle mani eseguiti durante meditazione e cerimonie. Il Bhumisparsha mudra rappresenta il momento dell'illuminazione del Buddha; il Dhyana mudra indica la meditazione profonda; l'Abhaya mudra è gesto di protezione e assenza di paura."]},
{img:'./images/icone/tradizioni/buddismo-esoterico/chakra-e-corpo-sottile.webp',alt:'Chakra e corpo sottile',h3:'🧘 Chakra e corpo sottile',p:["La pratica tantrica lavora anche sul corpo energetico sottile, una rete di canali (nadi) e centri di energia (chakra). Tecniche di respirazione, visualizzazione e movimento mirano a far fluire questa energia liberamente, sciogliendo i blocchi che mantengono la mente nell'illusione."]},
{img:'./images/icone/tradizioni/buddismo-esoterico/le-quattro-classi-di-tantra.webp',alt:'Le quattro classi di Tantra',h3:'🕉️ Le quattro classi di Tantra',p:["La tradizione tibetana classifica gli insegnamenti tantrici in quattro classi crescenti di profondità — Kriya, Charya, Yoga e Anuttarayoga — ciascuna con pratiche, divinità meditative e livelli di iniziazione propri, riservati a chi ha ricevuto trasmissione diretta da un maestro qualificato."]}
],
tags:['Vajrayana','Mantra','Mandala','Mudra','Chakra','Padmasambhava','Tantra','Avalokiteshvara']},

{id:'sufismo',icon:'🌀',th:'#1a3038',eyebrow:'Mistica Islamica',title:'Sufismo',sub:"L'amore come via",
blocks:[
{img:'./images/icone/tradizioni/sufismo/origini-e-significato.webp',alt:'Origini e significato',h3:'📿 Origini e significato',p:["Il Sufismo (tasawwuf) è la dimensione mistica ed esoterica dell'Islam, nata nei primi secoli dell'Egira come reazione alla mondanizzazione del potere islamico, tra ascetismo e ricerca di un'esperienza diretta del divino oltre la sola osservanza formale della legge religiosa.","Il nome deriverebbe da suf, lana, riferito al ruvido mantello indossato dai primi asceti musulmani in segno di rinuncia ai beni materiali."]},
{img:'./images/icone/tradizioni/sufismo/il-dhikr-il-ricordo-di-dio.webp',alt:'Il dhikr: il ricordo di Dio',h3:'🕌 Il dhikr: il ricordo di Dio',p:["Pratica centrale del Sufismo è il dhikr, la ripetizione rituale dei nomi di Dio o di formule sacre, recitata individualmente o in gruppo, spesso accompagnata da respirazione ritmica e movimento, fino a indurre stati di assorbimento contemplativo profondo."]},
{img:'./images/icone/tradizioni/sufismo/i-dervisci-rotanti.webp',alt:'I dervisci rotanti',h3:'🌪️ I dervisci rotanti',p:["L'immagine più nota del Sufismo in Occidente è quella dei dervisci rotanti dell'ordine Mevlevi, fondato in Turchia sull'eredità del poeta e mistico persiano Jalal ad-Din Rumi (1207-1273). La rotazione cerimoniale, il sema, è una meditazione in movimento: il braccio destro alzato verso il cielo riceve la grazia divina, quello sinistro abbassato verso terra la trasmette al mondo."]},
{img:'./images/icone/tradizioni/sufismo/rumi-e-la-poesia-mistica.webp',alt:'Rumi e la poesia mistica',h3:'✍️ Rumi e la poesia mistica',p:["Rumi resta il poeta mistico più letto al mondo, anche oggi: la sua opera maggiore, il Masnavi, sei volumi di poesia spirituale, viene chiamata da molti sufi \"il Corano in lingua persiana\" per la profondità con cui esplora l'amore come via di unione con il divino."]},
{img:'./images/icone/tradizioni/sufismo/le-confraternite-tariqa.webp',alt:'Le confraternite (tariqa)',h3:'🤝 Le confraternite (tariqa)',p:["Il Sufismo si organizza storicamente in tariqa, confraternite guidate da un maestro spirituale (sheikh o pir) che trasmette un percorso iniziatico fatto di pratiche, insegnamenti e una catena di trasmissione (silsila) che risale idealmente fino al Profeta Muhammad."]}
],
tags:['Rumi','Dervisci Rotanti','Dhikr','Tariqa','Mevlevi','Sema','Mistica Islamica','Masnavi']},

{id:'druidismo',icon:'🌳',th:'#1a3018',eyebrow:'Tradizione Celtica',title:'Druidismo',sub:'I custodi della quercia',
blocks:[
{img:'./images/icone/tradizioni/druidismo/chi-erano-i-druidi.webp',alt:'Chi erano i Druidi',h3:'🍃 Chi erano i Druidi',p:["I Druidi costituivano la classe sacerdotale e intellettuale delle società celtiche di Gallia, Britannia, Irlanda ed Europa centrale, tra l'età del ferro e i primi secoli dopo Cristo. Le fonti più antiche sono romane e greche — Giulio Cesare ne parla nel De Bello Gallico.","Non erano solo figure religiose: erano anche giudici, consiglieri, insegnanti e custodi della memoria storica. La formazione poteva durare fino a vent'anni di apprendistato orale: nessun testo scritto in lingua celtica sui loro insegnamenti ci è giunto."]},
{img:'./images/icone/tradizioni/druidismo/la-sacralita-della-natura.webp',alt:'La sacralità della natura',h3:'🌲 La sacralità della natura',p:["Per i Celti la natura era un tessuto vivo di presenze sacre. I boschetti di querce (il nome \"druido\" è collegato da alcuni studiosi alla radice drus, quercia) erano i veri templi. Il vischio, raccolto con un falcetto d'oro secondo Plinio il Vecchio, era pianta sacra di grande potere."]},
{img:'./images/icone/tradizioni/druidismo/il-calendario-e-le-grandi-festivita.webp',alt:'Il calendario e le grandi festività',h3:'🔥 Il calendario e le grandi festività',p:["Il tempo celtico era scandito da un calendario lunisolare con otto festività (la \"Ruota dell'Anno\"): Samhain, capodanno celtico; Imbolc, risveglio della terra; Beltane, celebrazione della fertilità con fuochi rituali; Lughnasadh, festa del primo raccolto dedicata al dio Lugh."]},
{img:'./images/icone/tradizioni/druidismo/il-druidismo-contemporaneo.webp',alt:'Il Druidismo contemporaneo',h3:'🔮 Il Druidismo contemporaneo',p:["Dal XVIII secolo è nato in Inghilterra e Galles un movimento di rinascita druidica (Neo-druidismo) che reinterpreta queste radici come spiritualità della natura. Oggi gruppi druidici organizzano cerimonie pubbliche a Stonehenge nei solstizi, intrecciando ricerca storica, poesia ed ecologia spirituale."]},
{img:'./images/icone/tradizioni/druidismo/gli-ordini-druidici-moderni.webp',alt:'Gli ordini druidici moderni',h3:'📜 Gli ordini druidici moderni',p:["L'OBOD (Order of Bards, Ovates & Druids), rifondato nel 1964 da Ross Nichols, struttura il percorso in tre gradi: Bardo, Ovate e Druido. Il simbolo più diffuso è l'Awen, tre raggi di luce da un'unica fonte."]},
{img:'./images/icone/tradizioni/druidismo/il-vischio-e-i-rituali-sacri.webp',alt:'Il vischio e i rituali sacri',h3:'🌳 Il vischio e i rituali sacri',p:["Il racconto più famoso di un rito druidico viene da Plinio il Vecchio: un sacerdote vestito di bianco saliva sulla quercia e tagliava il vischio con un falcetto d'oro, senza che toccasse mai terra. Resta una delle pochissime descrizioni dettagliate giunte fino a noi, ma filtrata da uno sguardo romano esterno."]},
{img:'./images/icone/tradizioni/druidismo/fonti-e-testimonianze-storiche.webp',alt:'Fonti e testimonianze storiche',h3:'📚 Fonti e testimonianze storiche',p:["I Druidi non lasciarono nulla di scritto: la trasmissione era volutamente orale. Quasi tutto ciò che sappiamo arriva da fonti esterne — Cesare, Strabone, Plinio — e dalla letteratura medievale gallese e irlandese, messa per iscritto secoli dopo da monaci cristiani."]}
],
diffBox:{t:'Druidismo e Wicca: due sentieri vicini, non identici',x:"Entrambi venerano la natura e i suoi cicli, condividendo diverse festività della Ruota dell'Anno. Ma il Druidismo affonda le radici nella cultura celtica storica; la Wicca è una religione stregonesca codificata nel XX secolo, centrata sulla dualità Dio-Dea."},
tags:['Celti','Boschi Sacri','Samhain','Bardi','Ruota dell\'Anno','Awen','Plinio il Vecchio','Giulio Cesare']},

{id:'voodoo',icon:'🕯️',th:'#3d1010',eyebrow:'Tradizione Afrocaraibica',title:'Voodoo & Hoodoo',sub:'Spiriti, antenati, radici',
blocks:[
{img:'./images/icone/tradizioni/voodoo/origini-e-sincretismo.webp',alt:'Origini e sincretismo',h3:'🌍 Origini e sincretismo',p:["Il Vodou nasce dall'incontro forzato tra le tradizioni religiose dei popoli dell'Africa occidentale — Fon ed Ewe del regno di Dahomey, da cui deriva il termine \"vodun\", spirito — e il cattolicesimo imposto durante la tratta atlantica degli schiavi. Ad Haiti questo incontro ha dato vita a una religione strutturata con clero (houngan e mambo), templi (hounfor) e una cosmologia coerente.","Negli Stati Uniti, in Louisiana, una variante distinta si è sviluppata attorno a New Orleans, con figure storiche come Marie Laveau, sacerdotessa vodou leggendaria nel XIX secolo."]},
{img:'./images/icone/tradizioni/voodoo/bondye-e-i-loa.webp',alt:'Bondye e i Loa',h3:'🌀 Bondye e i Loa',p:["Al vertice della cosmologia c'è Bondye, il Dio creatore supremo, distante dai rituali quotidiani. Tra Bondye e gli umani agiscono i Loa, spiriti intermediari con personalità e ambiti propri: Papa Legba, guardiano dei crocevia; Erzulie, legata all'amore; Damballa, spirito-serpente della saggezza primordiale.","I Loa vengono \"chiamati\" con tamburi, canti e danza, e possono manifestarsi possedendo temporaneamente il corpo di un fedele."]},
{img:'./images/icone/tradizioni/voodoo/rada-e-petro-le-due-nazioni-di-spiriti.webp',alt:'Rada e Petro: le due nazioni di spiriti',h3:'🔥 Rada e Petro',p:["I Loa si dividono in due \"nazioni\": il rito Rada raccoglie gli spiriti più antichi di origine africana, onorati con tamburi lenti; il rito Petro, nato in Haiti durante la schiavitù, raccoglie spiriti più intensi legati alla forza di resistenza, con radici nella rivolta che portò all'indipendenza nel 1804."]},
{img:'./images/icone/tradizioni/voodoo/antenati-e-culto-dei-morti.webp',alt:'Antenati e culto dei morti',h3:'🕯️ Antenati e culto dei morti',p:["Gli antenati occupano un ruolo centrale quanto i Loa: si ritiene continuino a vegliare sulla famiglia dopo la morte e vadano onorati con offerte, preghiere e memoria attiva."]},
{img:'./images/icone/tradizioni/voodoo/l-hoodoo-magia-popolare-non-religione.webp',alt:"L'Hoodoo: magia popolare, non religione",h3:"🌿 L'Hoodoo: magia popolare",p:["Distinto dal Vodou come sistema religioso, l'Hoodoo (\"rootwork\") è un insieme di pratiche di magia popolare nato tra le comunità afroamericane del Sud degli Stati Uniti. Include mojo bags, candele colorate, bagni rituali con erbe e radici come quella di Giovanni il Conquistatore."]},
{img:'./images/icone/tradizioni/voodoo/i-veve-disegni-che-aprono-la-porta-agli-spiriti.webp',alt:'I vèvè',h3:'🖋️ I vèvè',p:["All'inizio di ogni cerimonia, l'houngan o la mambo tracciano a terra un vèvè: un disegno geometrico con farina di mais o caffè, unico per ogni Loa. Tracciarlo richiede anni di apprendistato: è un vero \"invito\" rituale."]}
],
note:'Voodoo e Hoodoo sono tradizioni sacre vive, profondamente travisate dalla cultura popolare e dal cinema occidentale. <strong>Vanno comprese nel loro autentico contesto storico, religioso e culturale.</strong>',
tags:['Loa','Papa Legba','Antenati','Haiti & New Orleans','Mojo Bag','Vèvè','Rada & Petro','Kanzo']},

{id:'rosacroce',icon:'🌹',th:'#2a1748',eyebrow:'Ordine Esoterico Occidentale',title:'Rosacroce',sub:'La rosa sulla croce',
blocks:[
{img:'./images/icone/tradizioni/rosacroce/i-manifesti-misteriosi.webp',alt:'I manifesti misteriosi',h3:'📜 I manifesti misteriosi',p:["Il movimento rosacrociano entra nella storia con la pubblicazione, tra il 1614 e il 1616 in Germania, di tre testi anonimi: la Fama Fraternitatis, la Confessio Fraternitatis e Le Nozze Chimiche di Christian Rosenkreutz, che narravano l'esistenza di un'antica fratellanza segreta fondata da Christian Rosenkreutz.","L'effetto fu dirompente: intellettuali e alchimisti cercarono contatto con questa fratellanza, secondo l'interpretazione storica più accreditata probabilmente un'allegoria filosofica più che un'organizzazione reale."]},
{img:'./images/icone/tradizioni/rosacroce/il-simbolo-la-rosa-sulla-croce.webp',alt:'Il simbolo: la rosa sulla croce',h3:'🌹 Il simbolo: la rosa sulla croce',p:["La croce rappresenta il corpo e la condizione terrena; la rosa che sboccia al centro — spesso a cinque o sette petali — simboleggia lo sviluppo dell'anima e la rivelazione interiore che fiorisce dalla disciplina e dalla sofferenza accettata."]},
{img:'./images/icone/tradizioni/rosacroce/una-sintesi-di-saperi-esoterici.webp',alt:'Una sintesi di saperi esoterici',h3:'⚗️ Una sintesi di saperi esoterici',p:["L'insegnamento rosacrociano intreccia consapevolmente alchimia, Cabala ebraica, Ermetismo e misticismo cristiano, dando vita all'idea di un cammino di perfezionamento personale guidato da un sapere \"occulto\" che richiede studio e disciplina morale."]},
{img:'./images/icone/tradizioni/rosacroce/dal-mito-alle-organizzazioni-moderne.webp',alt:'Dal mito alle organizzazioni moderne',h3:'🏛️ Dal mito alle organizzazioni moderne',p:["Nei secoli successivi sono nate numerose organizzazioni che si dichiarano eredi della tradizione rosacrociana, alcune collegate alla Massoneria speculativa, altre indipendenti e diffuse a livello internazionale tra XIX e XX secolo."]},
{img:'./images/icone/tradizioni/rosacroce/amorc-e-le-organizzazioni-rosacrociane-moderne.webp',alt:'AMORC e le organizzazioni rosacrociane moderne',h3:'🏵️ AMORC',p:["L'AMORC, fondato negli USA nel 1915 da Harvey Spencer Lewis, propone un percorso iniziatico tramite lezioni a domicilio, oggi attivo anche in Italia. Accanto ad esso il Lectorium Rosicrucianum, fondato nel 1924 nei Paesi Bassi con impostazione gnostico-cristiana."]},
{img:'./images/icone/tradizioni/rosacroce/christian-rosenkreutz-storia-o-leggenda.webp',alt:'Christian Rosenkreutz: storia o leggenda?',h3:'👤 Christian Rosenkreutz',p:["Secondo la Fama Fraternitatis (1614), l'ordine fa risalire la propria origine a Christian Rosenkreutz, nato nel 1378, che avrebbe viaggiato in Medio Oriente studiando presso sapienti arabi e sufi. Nessun documento storico esterno ai manifesti conferma la sua esistenza."]},
{img:'./images/icone/tradizioni/rosacroce/le-nozze-chimiche-di-christian-rosenkreutz.webp',alt:'Le Nozze Chimiche di Christian Rosenkreutz',h3:'⚗️ Le Nozze Chimiche',p:["Pubblicato nel 1616 e attribuito a Johann Valentin Andreae, questo terzo testo narra un viaggio allegorico di sette giorni tra prove, morti e resurrezioni simboliche, fitto di simbolismo alchemico, astrologico e cristiano."]},
{img:'./images/icone/tradizioni/rosacroce/influenze-su-massoneria-e-movimenti-esoterici-moderni.webp',alt:'Influenze su massoneria e movimenti esoterici moderni',h3:'🌍 Influenze moderne',p:["La Golden Dawn, fondata a Londra nel 1888, incorporò gradi e immagini rosacrociane, influenzando figure come Aleister Crowley e W.B. Yeats. Rudolf Steiner sviluppò la propria Antroposofia definendola \"il sentiero rosacrociano\"."]}
],
tags:['Christian Rosenkreutz','Fama Fraternitatis','Alchimia Interiore','Iniziazione per Gradi','Simbolismo Esoterico','AMORC','Golden Dawn','Rudolf Steiner']}
],

en:[
{id:'sciamanesimo',icon:'🪶',th:'#3a2810',eyebrow:'Universal Tradition',title:'Shamanism',sub:'The journey between worlds',
blocks:[
{img:'./images/icone/tradizioni/sciamanesimo/origini-e-diffusione.webp',alt:'Origins and spread',h3:'🌍 Origins and spread',p:["The word \"shaman\" comes from the Tungusic peoples of Siberia, meaning \"one who knows\". The practice itself is far older and appears in similar forms on every continent, from Siberia and the Americas to Aboriginal Australia, sub-Saharan Africa, and even prehistoric Europe, where 30,000-year-old cave paintings already depict human-animal hybrid figures interpreted as shamans in trance.","It is not a religion with dogmas, but a spiritual technology: a practical method passed orally from master to apprentice to access altered states of consciousness and act in the invisible world for the benefit of the community."]},
{img:'./images/icone/tradizioni/sciamanesimo/il-viaggio-sciamanico.webp',alt:'The shamanic journey',h3:'🥁 The shamanic journey',p:["At the heart of the practice is the \"journey\": the shaman induces a controlled trance through the repetitive sound of the drum (180-220 beats per minute), rattles, chanting, prolonged dance, fasting, or in some cultures entheogenic plants such as ayahuasca or peyote. Religious historian Mircea Eliade described this state as a \"flight of the soul\" along the World Tree, the axis mundi connecting the three levels of reality."]},
{img:'./images/icone/tradizioni/sciamanesimo/i-tre-mondi.webp',alt:'The three worlds',h3:'🌳 The three worlds',p:["Shamanic cosmology typically distinguishes three realms linked by a central axis: the Upper World of elevated spirits and celestial deities, reached by ascending; the Middle World, ordinary reality seen with expanded perception; and the Lower World of ancestral animal spirits, reached by descending through an opening in the earth, a burrow or water."]},
{img:'./images/icone/tradizioni/sciamanesimo/spiriti-guida-e-poteri-animali.webp',alt:'Spirit guides and animal powers',h3:'✨ Spirit guides and power animals',p:["During the journey the shaman meets spiritual allies — power animals, ancestors, non-incarnate teachers — who offer protection, teachings and healing abilities, including \"soul retrieval\", recovering fragments of vital essence lost to trauma. In traditional society the shaman also acts as healer, counsellor and keeper of collective memory."]},
{img:'./images/icone/tradizioni/sciamanesimo/lo-sciamanesimo-contemporaneo.webp',alt:'Contemporary shamanism',h3:'🔮 Contemporary shamanism',p:["From the 1960s-70s shamanism gained new popularity in the West through anthropologist Michael Harner, who codified \"core shamanism\" by isolating universal journeying techniques from any single culture's cosmology. This spread also created real tensions, as many indigenous communities denounce superficial or commercial use of their sacred practices, particularly around plants like ayahuasca."]},
{img:'./images/icone/tradizioni/sciamanesimo/strumenti-e-oggetti-di-potere.webp',alt:'Tools and power objects',h3:'🪘 Tools and power objects',p:["The drum is the quintessential shamanic instrument, often built from animal hide and painted with cosmological symbols; among the Sami, the noaidi used the runebomme, a runic divination drum. Rattles, feathers, masks and ritual garments are never mere decoration — every object is consecrated and considered alive."]},
{img:'./images/icone/tradizioni/sciamanesimo/piante-sacre-e-geografie-sciamaniche.webp',alt:'Sacred plants and shamanic geographies',h3:'🌿 Sacred plants and shamanic geographies',p:["Each region developed its own relationship with sacred plants: ayahuasca guides Amazonian rituals under an experienced curandero; peyote is central to the Native American Church; iboga is key to Bwiti initiation rites in Gabon; in Siberia shamanism has long been associated with the Amanita muscaria mushroom."]},
{img:'./images/icone/tradizioni/sciamanesimo/la-malattia-iniziatica-essere-scelti-dagli-spiriti.webp',alt:'The initiatory illness: chosen by the spirits',h3:'🩺 The "initiatory illness"',p:["In many cultures one does not choose to become a shaman but is \"called\": a serious illness, intense dreams or a near-death experience are read as a sign the spirits have chosen that person. Eliade described an almost universal pattern in which the future shaman undergoes a symbolic \"death\" before being reborn with new powers."]}
],
diffBox:{t:'Not to be confused with: Totem Animals',x:'A totem is a stable symbolic identity tied to a person\'s character for life. A shamanic spirit guide is instead an ally actively met during trance, which can change from one journey to another.'},
tags:['Trance','Shamanic Drum','Spirit Guides','Soul Retrieval','Axis Mundi','Michael Harner','Ayahuasca','Mircea Eliade']},

{id:'buddismo-esoterico',icon:'☸️',th:'#3d1a30',eyebrow:'Tantric Path',title:'Esoteric Buddhism & Tantra',sub:'Mantra, mandala, mudra',
blocks:[
{img:'./images/icone/tradizioni/buddismo-esoterico/origini-e-via-rapida.webp',alt:'Origins and the fast path',h3:'🪷 Origins and the fast path',p:["Vajrayana Buddhism — \"the diamond vehicle\" — emerged in India around the 6th-7th century as a tantric development of Mahayana Buddhism, before taking deep root in Tibet through masters like Padmasambhava and spreading to Nepal, Bhutan, Mongolia and Japan (as Shingon). Its distinguishing claim is a \"fast path\" to awakening, transforming ordinary emotions and desires into fuel for realization rather than suppressing them."]},
{img:'./images/icone/tradizioni/buddismo-esoterico/mantra-il-suono-come-strumento.webp',alt:'Mantra: sound as a tool',h3:'🕉️ Mantra: sound as a tool',p:["Mantras are sacred sound formulas — syllables or invocations in Sanskrit — recited to focus and transform the mind, carrying a vibration meant to attune the practitioner to an enlightened quality. The best-known mantra in the West, \"Om Mani Padme Hum\", is linked to Avalokiteshvara, the bodhisattva of compassion."]},
{img:'./images/icone/tradizioni/buddismo-esoterico/mandala-l-universo-in-un-cerchio.webp',alt:'Mandala: the universe in a circle',h3:'🔯 Mandala: the universe in a circle',p:["A mandala is a sacred, usually circular diagram representing the whole universe or the celestial palace of a tantric deity. Tibetan monks build them from coloured sand over days of precise work, then ritually dissolve them as a teaching on the impermanence of all created things."]},
{img:'./images/icone/tradizioni/buddismo-esoterico/mudra-il-linguaggio-delle-mani.webp',alt:'Mudra: the language of hands',h3:'🤲 Mudra: the language of hands',p:["Mudras are ritual hand gestures performed during meditation and ceremonies. The Bhumisparsha mudra recalls the Buddha's enlightenment; the Dhyana mudra signals deep meditation; the Abhaya mudra is a gesture of protection and fearlessness."]},
{img:'./images/icone/tradizioni/buddismo-esoterico/chakra-e-corpo-sottile.webp',alt:'Chakras and the subtle body',h3:'🧘 Chakras and the subtle body',p:["Tantric practice also works on the subtle energy body, a network of channels (nadi) and energy centres (chakras). Breathing, visualization and movement techniques aim to free this energy, dissolving the blocks said to keep the mind in illusion and suffering."]},
{img:'./images/icone/tradizioni/buddismo-esoterico/le-quattro-classi-di-tantra.webp',alt:'The four classes of Tantra',h3:'🕉️ The four classes of Tantra',p:["The Tibetan tradition classifies tantric teachings into four increasingly profound classes — Kriya, Charya, Yoga and Anuttarayoga — each with its own practices and deities, reserved for those who have received direct transmission from a qualified master."]}
],
tags:['Vajrayana','Mantra','Mandala','Mudra','Chakra','Padmasambhava','Tantra','Avalokiteshvara']},

{id:'sufismo',icon:'🌀',th:'#1a3038',eyebrow:'Islamic Mysticism',title:'Sufism',sub:'Love as the way',
blocks:[
{img:'./images/icone/tradizioni/sufismo/origini-e-significato.webp',alt:'Origins and meaning',h3:'📿 Origins and meaning',p:["Sufism (tasawwuf) is the mystical and esoteric dimension of Islam, born in the early centuries of the Hijra as a reaction to the worldliness of Islamic power, seeking a direct experience of the divine beyond formal observance. The name likely derives from suf, wool, referring to the coarse cloak worn by early Muslim ascetics."]},
{img:'./images/icone/tradizioni/sufismo/il-dhikr-il-ricordo-di-dio.webp',alt:'Dhikr: the remembrance of God',h3:'🕌 Dhikr: the remembrance of God',p:["A central Sufi practice is dhikr, the ritual repetition of God's names or sacred formulas, recited alone or in groups, often with rhythmic breathing, inducing deep contemplative absorption."]},
{img:'./images/icone/tradizioni/sufismo/i-dervisci-rotanti.webp',alt:'The whirling dervishes',h3:'🌪️ The whirling dervishes',p:["The best-known image of Sufism in the West is the whirling dervishes of the Mevlevi order, founded on the legacy of Persian poet and mystic Rumi (1207-1273). The ceremonial turning, the sema, is a moving meditation: the right arm raised receives divine grace, the left lowered transmits it to the world."]},
{img:'./images/icone/tradizioni/sufismo/rumi-e-la-poesia-mistica.webp',alt:'Rumi and mystical poetry',h3:'✍️ Rumi and mystical poetry',p:["Rumi remains the most-read mystical poet in the world today. His major work, the Masnavi, six volumes of spiritual poetry, is called by many Sufis \"the Quran in Persian\" for its depth in exploring love as union with the divine."]},
{img:'./images/icone/tradizioni/sufismo/le-confraternite-tariqa.webp',alt:'The brotherhoods (tariqa)',h3:'🤝 The brotherhoods (tariqa)',p:["Sufism is historically organized into tariqa, brotherhoods led by a spiritual master (sheikh or pir) who transmits an initiatory path through a chain of transmission (silsila) ideally tracing back to the Prophet Muhammad."]}
],
tags:['Rumi','Whirling Dervishes','Dhikr','Tariqa','Mevlevi','Sema','Islamic Mysticism','Masnavi']},

{id:'druidismo',icon:'🌳',th:'#1a3018',eyebrow:'Celtic Tradition',title:'Druidism',sub:'Keepers of the oak',
blocks:[
{img:'./images/icone/tradizioni/druidismo/chi-erano-i-druidi.webp',alt:'Who the Druids were',h3:'🍃 Who the Druids were',p:["The Druids were the priestly and intellectual class of the Celtic societies of Gaul, Britain, Ireland and central Europe. The oldest sources are Roman and Greek — Julius Caesar describes them in De Bello Gallico. They were also judges, advisors, teachers and keepers of historical memory; training could last up to twenty years of oral apprenticeship, since no written Celtic texts on their teachings survive."]},
{img:'./images/icone/tradizioni/druidismo/la-sacralita-della-natura.webp',alt:'The sacredness of nature',h3:'🌲 The sacredness of nature',p:["For the Celts, nature was a living fabric of sacred presences. Oak groves — the word \"druid\" has been linked by some scholars to the root drus, oak — were the true temples. Mistletoe, gathered with a golden sickle according to Pliny the Elder, was considered a plant of great power."]},
{img:'./images/icone/tradizioni/druidismo/il-calendario-e-le-grandi-festivita.webp',alt:'The calendar and great festivals',h3:'🔥 The calendar and great festivals',p:["Celtic time followed a lunisolar calendar with eight festivals (the \"Wheel of the Year\"): Samhain, the Celtic new year; Imbolc, the awakening of the earth; Beltane, a fertility celebration with ritual fires; and Lughnasadh, the first-harvest feast dedicated to the god Lugh."]},
{img:'./images/icone/tradizioni/druidismo/il-druidismo-contemporaneo.webp',alt:'Contemporary Druidry',h3:'🔮 Contemporary Druidry',p:["From the 18th century onward, a druidic revival (Neo-Druidry) emerged in England and Wales, reinterpreting these roots as a nature-centred spirituality. Modern druidic groups hold public ceremonies at Stonehenge during the solstices, blending historical research, poetry and spiritual ecology."]},
{img:'./images/icone/tradizioni/druidismo/gli-ordini-druidici-moderni.webp',alt:'Modern druidic orders',h3:'📜 Modern druidic orders',p:["The OBOD (Order of Bards, Ovates & Druids), refounded in 1964 by Ross Nichols, structures training into three grades: Bard, Ovate and Druid. The Awen, three rays of light from a single source, is the movement's most common symbol."]},
{img:'./images/icone/tradizioni/druidismo/il-vischio-e-i-rituali-sacri.webp',alt:'Mistletoe and sacred rituals',h3:'🌳 Mistletoe and sacred rituals',p:["The most famous account of a druidic rite comes from Pliny the Elder: a white-robed priest climbed an oak and cut mistletoe with a golden sickle, taking care it never touched the ground. It remains one of the very few detailed descriptions to survive, though filtered through a Roman outsider's gaze."]},
{img:'./images/icone/tradizioni/druidismo/fonti-e-testimonianze-storiche.webp',alt:'Sources and historical testimony',h3:'📚 Sources and historical testimony',p:["The Druids left nothing in writing, as transmission was deliberately oral. Nearly everything we know comes from external sources — Caesar, Strabo, Pliny — and from medieval Welsh and Irish literature, set down centuries later by Christian monks."]}
],
diffBox:{t:'Druidry and Wicca: close but not identical paths',x:'Both honour nature and its seasonal cycles, sharing several Wheel of the Year festivals. But Druidry is rooted in historical Celtic culture, while Wicca is a witchcraft religion codified in the 20th century, centred on God-Goddess duality.'},
tags:['Celts','Sacred Groves','Samhain','Bards','Wheel of the Year','Awen','Pliny the Elder','Julius Caesar']},

{id:'voodoo',icon:'🕯️',th:'#3d1010',eyebrow:'Afro-Caribbean Tradition',title:'Voodoo & Hoodoo',sub:'Spirits, ancestors, roots',
blocks:[
{img:'./images/icone/tradizioni/voodoo/origini-e-sincretismo.webp',alt:'Origins and syncretism',h3:'🌍 Origins and syncretism',p:["Vodou arose from the forced encounter between West African religious traditions — the Fon and Ewe of the Dahomey kingdom, source of the word \"vodun\", spirit — and the Catholicism imposed during the Atlantic slave trade. In Haiti this gave rise to a structured religion with its own clergy (houngan and mambo), temples (hounfor) and coherent cosmology. In Louisiana, a distinct variant developed around New Orleans, with historical figures like 19th-century priestess Marie Laveau."]},
{img:'./images/icone/tradizioni/voodoo/bondye-e-i-loa.webp',alt:'Bondye and the Loa',h3:'🌀 Bondye and the Loa',p:["At the top of the cosmology is Bondye, the supreme creator God, distant from daily ritual. Between Bondye and humans act the Loa, intermediary spirits each with their own personality: Papa Legba, guardian of the crossroads; Erzulie, linked to love; Damballa, the serpent spirit of primordial wisdom. The Loa are \"called\" with drums, song and dance, and may temporarily possess a devotee's body."]},
{img:'./images/icone/tradizioni/voodoo/rada-e-petro-le-due-nazioni-di-spiriti.webp',alt:'Rada and Petro: the two nations of spirits',h3:'🔥 Rada and Petro',p:["The Loa are traditionally divided into two \"nations\": Rada gathers the older, African-rooted spirits, honoured with slow drums; Petro, born in Haiti during slavery, gathers more intense spirits linked to the strength of resistance, rooted in the revolt that led to independence in 1804."]},
{img:'./images/icone/tradizioni/voodoo/antenati-e-culto-dei-morti.webp',alt:'Ancestors and the cult of the dead',h3:'🕯️ Ancestors and the cult of the dead',p:["Ancestors hold a role as central as the Loa: they are believed to watch over family and community after death, and are honoured with offerings, prayers and active remembrance."]},
{img:'./images/icone/tradizioni/voodoo/l-hoodoo-magia-popolare-non-religione.webp',alt:'Hoodoo: folk magic, not a religion',h3:'🌿 Hoodoo: folk magic',p:["Distinct from Vodou as an organized religion, Hoodoo (\"rootwork\") is a body of folk-magic practices born among African American communities of the southern United States, using mojo bags, coloured candles, herbal baths, and roots like High John the Conqueror."]},
{img:'./images/icone/tradizioni/voodoo/i-veve-disegni-che-aprono-la-porta-agli-spiriti.webp',alt:'Vèvè drawings',h3:'🖋️ The vèvè',p:["At the start of every major ceremony, the houngan or mambo traces a vèvè on the ground — a geometric design in cornmeal or coffee powder, unique to each Loa. Drawing one correctly takes years of apprenticeship: it is a true ritual \"invitation\"."]}
],
note:'Voodoo and Hoodoo are living sacred traditions, deeply misrepresented by popular culture and Western cinema. <strong>They deserve to be understood within their authentic historical, religious and cultural context.</strong>',
tags:['Loa','Papa Legba','Ancestors','Haiti & New Orleans','Mojo Bag','Vèvè','Rada & Petro','Kanzo']},

{id:'rosacroce',icon:'🌹',th:'#2a1748',eyebrow:'Western Esoteric Order',title:'Rosicrucianism',sub:'The rose upon the cross',
blocks:[
{img:'./images/icone/tradizioni/rosacroce/i-manifesti-misteriosi.webp',alt:'The mysterious manifestos',h3:'📜 The mysterious manifestos',p:["The Rosicrucian movement entered history through three anonymous texts published in Germany between 1614 and 1616 — the Fama Fraternitatis, the Confessio Fraternitatis and The Chemical Wedding of Christian Rosenkreutz — describing an ancient secret brotherhood founded by Christian Rosenkreutz. The effect was immediate: scholars across Europe sought contact with this brotherhood, which most historians consider a philosophical allegory rather than a real organization."]},
{img:'./images/icone/tradizioni/rosacroce/il-simbolo-la-rosa-sulla-croce.webp',alt:'The symbol: the rose upon the cross',h3:'🌹 The symbol: the rose upon the cross',p:["The cross represents the body and earthly condition; the rose blooming at its centre — often five- or seven-petalled — symbolizes the soul's development and inner revelation flowering from accepted discipline and suffering."]},
{img:'./images/icone/tradizioni/rosacroce/una-sintesi-di-saperi-esoterici.webp',alt:'A synthesis of esoteric knowledge',h3:'⚗️ A synthesis of esoteric knowledge',p:["Rosicrucian teaching consciously weaves together alchemy, Jewish Kabbalah, Hermeticism and Christian mysticism, giving rise to a path of personal perfection guided by \"occult\" — hidden — knowledge requiring study and moral discipline."]},
{img:'./images/icone/tradizioni/rosacroce/dal-mito-alle-organizzazioni-moderne.webp',alt:'From myth to modern organizations',h3:'🏛️ From myth to modern organizations',p:["In the following centuries numerous organizations claimed Rosicrucian heritage, some linked to speculative Freemasonry, others independent and spread internationally through the 19th and 20th centuries."]},
{img:'./images/icone/tradizioni/rosacroce/amorc-e-le-organizzazioni-rosacrociane-moderne.webp',alt:'AMORC and modern Rosicrucian organizations',h3:'🏵️ AMORC',p:["AMORC, founded in the US in 1915 by Harvey Spencer Lewis, offers a graded initiatory path via home study, active today in Italy too. Alongside it, the Lectorium Rosicrucianum, founded in the Netherlands in 1924, follows a more Gnostic-Christian approach."]},
{img:'./images/icone/tradizioni/rosacroce/christian-rosenkreutz-storia-o-leggenda.webp',alt:'Christian Rosenkreutz: history or legend?',h3:'👤 Christian Rosenkreutz',p:["According to the Fama Fraternitatis (1614), the order traces its origin to Christian Rosenkreutz, born in 1378, said to have travelled the Middle East studying with Arab and Sufi sages. No historical document outside the manifestos confirms his existence."]},
{img:'./images/icone/tradizioni/rosacroce/le-nozze-chimiche-di-christian-rosenkreutz.webp',alt:'The Chemical Wedding of Christian Rosenkreutz',h3:'⚗️ The Chemical Wedding',p:["Published in 1616 and attributed to Johann Valentin Andreae, this allegorical text narrates a seven-day journey through trials, symbolic deaths and resurrections, dense with alchemical, astrological and Christian symbolism."]},
{img:'./images/icone/tradizioni/rosacroce/influenze-su-massoneria-e-movimenti-esoterici-moderni.webp',alt:'Influences on Freemasonry and modern esoteric movements',h3:'🌍 Modern influences',p:["The Golden Dawn, founded in London in 1888, incorporated Rosicrucian grades and imagery, influencing figures like Aleister Crowley and W.B. Yeats. Rudolf Steiner developed his own Anthroposophy, calling it explicitly \"the Rosicrucian path\"."]}
],
tags:['Christian Rosenkreutz','Fama Fraternitatis','Inner Alchemy','Graded Initiation','Esoteric Symbolism','AMORC','Golden Dawn','Rudolf Steiner']}
],

es:[
{id:'sciamanesimo',icon:'🪶',th:'#3a2810',eyebrow:'Tradición Universal',title:'Chamanismo',sub:'El viaje entre los mundos',
blocks:[
{img:'./images/icone/tradizioni/sciamanesimo/origini-e-diffusione.webp',alt:'Orígenes y difusión',h3:'🌍 Orígenes y difusión',p:["La palabra \"chamán\" proviene de los pueblos tungús de Siberia y significa \"el que sabe\". La práctica, mucho más antigua que el término, aparece en formas similares en todos los continentes: Siberia, las Américas, Australia aborigen, África subsahariana e incluso la Europa prehistórica, donde pinturas rupestres de 30.000 años ya muestran figuras híbridas hombre-animal interpretadas como chamanes en trance.","No es una religión con dogmas, sino una tecnología espiritual: un método práctico transmitido oralmente de maestro a aprendiz para acceder a estados de conciencia no ordinarios y actuar en el mundo invisible en beneficio de la comunidad."]},
{img:'./images/icone/tradizioni/sciamanesimo/il-viaggio-sciamanico.webp',alt:'El viaje chamánico',h3:'🥁 El viaje chamánico',p:["El corazón de la práctica es el \"viaje\": el chamán induce un trance controlado mediante el sonido repetitivo del tambor (180-220 golpes por minuto), sonajeros, cantos, danza prolongada, ayuno o, en algunas culturas, plantas enteógenas como la ayahuasca o el peyote. El historiador Mircea Eliade describió este estado como un \"vuelo del alma\" a lo largo del Árbol del Mundo, el axis mundi que conecta los tres niveles de la realidad."]},
{img:'./images/icone/tradizioni/sciamanesimo/i-tre-mondi.webp',alt:'Los tres mundos',h3:'🌳 Los tres mundos',p:["La cosmología chamánica distingue típicamente tres reinos unidos por un eje central: el Mundo Superior, morada de espíritus elevados; el Mundo Medio, la realidad ordinaria vista con percepción ampliada; y el Mundo Inferior, reino de espíritus animales ancestrales, alcanzado descendiendo por una grieta en la tierra, una madriguera o el agua."]},
{img:'./images/icone/tradizioni/sciamanesimo/spiriti-guida-e-poteri-animali.webp',alt:'Espíritus guía y poderes animales',h3:'✨ Espíritus guía y animales de poder',p:["Durante el viaje el chamán encuentra aliados espirituales —animales de poder, antepasados, maestros no encarnados— que ofrecen protección, enseñanzas y capacidades de curación, incluyendo la \"recuperación del alma\". En la sociedad tradicional, el chamán también actúa como sanador, consejero y guardián de la memoria colectiva."]},
{img:'./images/icone/tradizioni/sciamanesimo/lo-sciamanesimo-contemporaneo.webp',alt:'El chamanismo contemporáneo',h3:'🔮 El chamanismo contemporáneo',p:["Desde los años 60-70 el chamanismo ganó nueva difusión en Occidente gracias al antropólogo Michael Harner, quien codificó el \"chamanismo nuclear\" aislando las técnicas universales del viaje de la cosmología de una sola cultura. Esta difusión también generó tensiones reales, ya que muchas comunidades indígenas denuncian un uso superficial o comercial de sus prácticas sagradas, especialmente en torno a la ayahuasca."]},
{img:'./images/icone/tradizioni/sciamanesimo/strumenti-e-oggetti-di-potere.webp',alt:'Herramientas y objetos de poder',h3:'🪘 Herramientas y objetos de poder',p:["El tambor es el instrumento chamánico por excelencia, a menudo hecho con piel animal y pintado con símbolos cosmológicos; entre los sami, el noaidi usaba el runebomme, un tambor rúnico también usado para la adivinación. Sonajeros, plumas, máscaras y vestimentas rituales nunca son meramente decorativos: cada objeto se consagra y se considera vivo."]},
{img:'./images/icone/tradizioni/sciamanesimo/piante-sacre-e-geografie-sciamaniche.webp',alt:'Plantas sagradas y geografías chamánicas',h3:'🌿 Plantas sagradas y geografías chamánicas',p:["Cada región desarrolló su propia relación con plantas sagradas: la ayahuasca guía los rituales amazónicos bajo la dirección de un curandero; el peyote es central en la Native American Church; el iboga es clave en los ritos Bwiti de Gabón; en Siberia el chamanismo se ha asociado durante mucho tiempo con el hongo Amanita muscaria."]},
{img:'./images/icone/tradizioni/sciamanesimo/la-malattia-iniziatica-essere-scelti-dagli-spiriti.webp',alt:'La enfermedad iniciática: elegidos por los espíritus',h3:'🩺 La "enfermedad iniciática"',p:["En muchas culturas no se elige ser chamán, sino que se es \"llamado\": una enfermedad grave o sueños intensos se interpretan como señal de que los espíritus eligieron a esa persona. Eliade describió un patrón casi universal en el que el futuro chamán atraviesa una \"muerte\" simbólica antes de renacer con nuevos poderes."]}
],

tags:['Trance','Tambor Chamánico','Espíritus Guía','Recuperación del Alma','Axis Mundi','Michael Harner','Ayahuasca','Mircea Eliade']},

{id:'buddismo-esoterico',icon:'☸️',th:'#3d1a30',eyebrow:'Vía Tántrica',title:'Budismo Esotérico y Tantra',sub:'Mantra, mandala, mudra',
blocks:[
{img:'./images/icone/tradizioni/buddismo-esoterico/origini-e-via-rapida.webp',alt:'Orígenes y vía rápida',h3:'🪷 Orígenes y vía rápida',p:["El budismo Vajrayana —\"el vehículo de diamante\"— nació en India hacia los siglos VI-VII como desarrollo tántrico del budismo Mahayana, arraigando profundamente en el Tíbet a través de maestros como Padmasambhava y extendiéndose a Nepal, Bután, Mongolia y Japón (como Shingon). Su rasgo distintivo es ofrecer una \"vía rápida\" hacia el despertar, transformando emociones y deseos en combustible para la realización en lugar de reprimirlos."]},
{img:'./images/icone/tradizioni/buddismo-esoterico/mantra-il-suono-come-strumento.webp',alt:'Mantra: el sonido como herramienta',h3:'🕉️ Mantra: el sonido como herramienta',p:["Los mantras son fórmulas sonoras sagradas —sílabas o invocaciones en sánscrito— recitadas para concentrar y transformar la mente, portando una vibración que sintoniza a quien lo recita con una cualidad iluminada. El mantra más conocido en Occidente, \"Om Mani Padme Hum\", está ligado a Avalokiteshvara, el bodhisattva de la compasión."]},
{img:'./images/icone/tradizioni/buddismo-esoterico/mandala-l-universo-in-un-cerchio.webp',alt:'Mandala: el universo en un círculo',h3:'🔯 Mandala: el universo en un círculo',p:["El mandala es un diagrama sagrado, casi siempre circular, que representa el universo entero o el palacio celestial de una deidad tántrica. Los monjes tibetanos los construyen con arena de colores durante días, para luego disolverlos ritualmente como enseñanza de la impermanencia."]},
{img:'./images/icone/tradizioni/buddismo-esoterico/mudra-il-linguaggio-delle-mani.webp',alt:'Mudra: el lenguaje de las manos',h3:'🤲 Mudra: el lenguaje de las manos',p:["Los mudras son gestos rituales de las manos realizados durante la meditación y las ceremonias. El Bhumisparsha mudra recuerda la iluminación de Buda; el Dhyana mudra indica meditación profunda; el Abhaya mudra es un gesto de protección."]},
{img:'./images/icone/tradizioni/buddismo-esoterico/chakra-e-corpo-sottile.webp',alt:'Chakras y cuerpo sutil',h3:'🧘 Chakras y cuerpo sutil',p:["La práctica tántrica también trabaja sobre el cuerpo energético sutil, una red de canales (nadi) y centros de energía (chakras). Técnicas de respiración, visualización y movimiento buscan liberar esta energía, disolviendo los bloqueos que mantienen la mente en la ilusión."]},
{img:'./images/icone/tradizioni/buddismo-esoterico/le-quattro-classi-di-tantra.webp',alt:'Las cuatro clases de Tantra',h3:'🕉️ Las cuatro clases de Tantra',p:["La tradición tibetana clasifica las enseñanzas tántricas en cuatro clases de profundidad creciente —Kriya, Charya, Yoga y Anuttarayoga— cada una con prácticas y deidades propias, reservadas a quienes reciben transmisión directa de un maestro cualificado."]}
],
tags:['Vajrayana','Mantra','Mandala','Mudra','Chakra','Padmasambhava','Tantra','Avalokiteshvara']},

{id:'sufismo',icon:'🌀',th:'#1a3038',eyebrow:'Mística Islámica',title:'Sufismo',sub:'El amor como camino',
blocks:[
{img:'./images/icone/tradizioni/sufismo/origini-e-significato.webp',alt:'Orígenes y significado',h3:'📿 Orígenes y significado',p:["El sufismo (tasawwuf) es la dimensión mística y esotérica del Islam, surgida en los primeros siglos de la Hégira como reacción a la mundanización del poder islámico, buscando una experiencia directa de lo divino más allá de la observancia formal. El nombre derivaría de suf, lana, por el tosco manto de los primeros ascetas musulmanes."]},
{img:'./images/icone/tradizioni/sufismo/il-dhikr-il-ricordo-di-dio.webp',alt:'El dhikr: el recuerdo de Dios',h3:'🕌 El dhikr: el recuerdo de Dios',p:["Una práctica central del sufismo es el dhikr, la repetición ritual de los nombres de Dios o fórmulas sagradas, recitada individualmente o en grupo, a menudo con respiración rítmica, hasta inducir estados de profunda absorción contemplativa."]},
{img:'./images/icone/tradizioni/sufismo/i-dervisci-rotanti.webp',alt:'Los derviches giróvagos',h3:'🌪️ Los derviches giróvagos',p:["La imagen más conocida del sufismo en Occidente es la de los derviches giróvagos de la orden Mevlevi, fundada sobre el legado del poeta y místico persa Rumi (1207-1273). El giro ceremonial, el sema, es una meditación en movimiento: el brazo derecho elevado recibe la gracia divina, el izquierdo la transmite al mundo."]},
{img:'./images/icone/tradizioni/sufismo/rumi-e-la-poesia-mistica.webp',alt:'Rumi y la poesía mística',h3:'✍️ Rumi y la poesía mística',p:["Rumi sigue siendo el poeta místico más leído del mundo. Su obra mayor, el Masnavi, seis volúmenes de poesía espiritual, es llamada por muchos sufíes \"el Corán en persa\" por su profundidad al explorar el amor como vía de unión con lo divino."]},
{img:'./images/icone/tradizioni/sufismo/le-confraternite-tariqa.webp',alt:'Las cofradías (tariqa)',h3:'🤝 Las cofradías (tariqa)',p:["El sufismo se organiza históricamente en tariqa, cofradías guiadas por un maestro espiritual (sheikh o pir) que transmite un camino iniciático a través de una cadena de transmisión (silsila) que se remonta idealmente al Profeta Muhammad."]}
],
tags:['Rumi','Derviches Giróvagos','Dhikr','Tariqa','Mevlevi','Sema','Mística Islámica','Masnavi']},

{id:'druidismo',icon:'🌳',th:'#1a3018',eyebrow:'Tradición Celta',title:'Druidismo',sub:'Los guardianes del roble',
blocks:[
{img:'./images/icone/tradizioni/druidismo/chi-erano-i-druidi.webp',alt:'Quiénes eran los druidas',h3:'🍃 Quiénes eran los druidas',p:["Los druidas constituían la clase sacerdotal e intelectual de las sociedades celtas de la Galia, Britania, Irlanda y Europa central. Las fuentes más antiguas son romanas y griegas —Julio César los describe en De Bello Gallico. También eran jueces, consejeros, maestros y guardianes de la memoria histórica; la formación podía durar hasta veinte años de aprendizaje oral, ya que ningún texto escrito celta sobre sus enseñanzas ha sobrevivido."]},
{img:'./images/icone/tradizioni/druidismo/la-sacralita-della-natura.webp',alt:'La sacralidad de la naturaleza',h3:'🌲 La sacralidad de la naturaleza',p:["Para los celtas la naturaleza era un tejido vivo de presencias sagradas. Los robledales —el nombre \"druida\" se ha vinculado a la raíz drus, roble— eran los verdaderos templos. El muérdago, recogido con una hoz de oro según Plinio el Viejo, era considerado una planta sagrada de gran poder."]},
{img:'./images/icone/tradizioni/druidismo/il-calendario-e-le-grandi-festivita.webp',alt:'El calendario y las grandes festividades',h3:'🔥 El calendario y las grandes festividades',p:["El tiempo celta seguía un calendario lunisolar con ocho festividades (la \"Rueda del Año\"): Samhain, el año nuevo celta; Imbolc, el despertar de la tierra; Beltane, celebración de la fertilidad con fuegos rituales; y Lughnasadh, fiesta de la primera cosecha dedicada al dios Lugh."]},
{img:'./images/icone/tradizioni/druidismo/il-druidismo-contemporaneo.webp',alt:'El druidismo contemporáneo',h3:'🔮 El druidismo contemporáneo',p:["Desde el siglo XVIII surgió en Inglaterra y Gales un movimiento de renacimiento druídico (neodruidismo) que reinterpreta estas raíces como espiritualidad de la naturaleza. Hoy los grupos druídicos organizan ceremonias públicas en Stonehenge durante los solsticios, combinando investigación histórica, poesía y ecología espiritual."]},
{img:'./images/icone/tradizioni/druidismo/gli-ordini-druidici-moderni.webp',alt:'Las órdenes druídicas modernas',h3:'📜 Las órdenes druídicas modernas',p:["La OBOD (Order of Bards, Ovates & Druids), refundada en 1964 por Ross Nichols, estructura la formación en tres grados: Bardo, Ovate y Druida. El símbolo más difundido es el Awen, tres rayos de luz de una única fuente."]},
{img:'./images/icone/tradizioni/druidismo/il-vischio-e-i-rituali-sacri.webp',alt:'El muérdago y los rituales sagrados',h3:'🌳 El muérdago y los rituales sagrados',p:["El relato más famoso de un rito druídico proviene de Plinio el Viejo: un sacerdote vestido de blanco subía al roble y cortaba el muérdago con una hoz de oro, cuidando que nunca tocara el suelo. Sigue siendo una de las pocas descripciones detalladas que han llegado hasta nosotros, aunque filtrada por una mirada romana externa."]},
{img:'./images/icone/tradizioni/druidismo/fonti-e-testimonianze-storiche.webp',alt:'Fuentes y testimonios históricos',h3:'📚 Fuentes y testimonios históricos',p:["Los druidas no dejaron nada escrito, ya que la transmisión era deliberadamente oral. Casi todo lo que sabemos proviene de fuentes externas —César, Estrabón, Plinio— y de la literatura medieval galesa e irlandesa, puesta por escrito siglos después por monjes cristianos."]}
],
diffBox:{t:'Druidismo y Wicca: caminos cercanos, no idénticos',x:'Ambos veneran la naturaleza y sus ciclos, compartiendo varias festividades de la Rueda del Año. Pero el druidismo tiene raíces en la cultura celta histórica, mientras que la Wicca es una religión de brujería codificada en el siglo XX, centrada en la dualidad Dios-Diosa.'},
tags:['Celtas','Bosques Sagrados','Samhain','Bardos','Rueda del Año','Awen','Plinio el Viejo','Julio César']},

{id:'voodoo',icon:'🕯️',th:'#3d1010',eyebrow:'Tradición Afrocaribeña',title:'Vudú y Hoodoo',sub:'Espíritus, antepasados, raíces',
blocks:[
{img:'./images/icone/tradizioni/voodoo/origini-e-sincretismo.webp',alt:'Orígenes y sincretismo',h3:'🌍 Orígenes y sincretismo',p:["El Vodou nació del encuentro forzado entre las tradiciones religiosas de los pueblos del África occidental —los fon y ewe del reino de Dahomey, origen del término \"vodun\", espíritu— y el catolicismo impuesto durante la trata atlántica de esclavos. En Haití dio lugar a una religión estructurada con su propio clero (houngan y mambo), templos (hounfor) y una cosmología coherente. En Luisiana surgió una variante propia en torno a Nueva Orleans, con figuras históricas como la sacerdotisa Marie Laveau, legendaria en el siglo XIX."]},
{img:'./images/icone/tradizioni/voodoo/bondye-e-i-loa.webp',alt:'Bondye y los Loa',h3:'🌀 Bondye y los Loa',p:["En la cúspide de la cosmología está Bondye, el Dios creador supremo, distante de los rituales cotidianos. Entre Bondye y los humanos actúan los Loa, espíritus intermediarios con personalidad propia: Papa Legba, guardián de las encrucijadas; Erzulie, ligada al amor; Damballa, el espíritu serpiente de la sabiduría primordial. Los Loa son \"llamados\" con tambores, cantos y danza, y pueden poseer temporalmente el cuerpo de un fiel."]},
{img:'./images/icone/tradizioni/voodoo/rada-e-petro-le-due-nazioni-di-spiriti.webp',alt:'Rada y Petro: las dos naciones de espíritus',h3:'🔥 Rada y Petro',p:["Los Loa se dividen tradicionalmente en dos \"naciones\": Rada agrupa a los espíritus más antiguos de origen africano, honrados con tambores lentos; Petro, nacido en Haití durante la esclavitud, agrupa espíritus más intensos ligados a la fuerza de resistencia, con raíces en la revuelta que llevó a la independencia en 1804."]},
{img:'./images/icone/tradizioni/voodoo/antenati-e-culto-dei-morti.webp',alt:'Antepasados y culto a los muertos',h3:'🕯️ Antepasados y culto a los muertos',p:["Los antepasados ocupan un papel tan central como los Loa: se cree que velan por la familia y la comunidad después de la muerte, y deben ser honrados con ofrendas, oraciones y memoria activa."]},
{img:'./images/icone/tradizioni/voodoo/l-hoodoo-magia-popolare-non-religione.webp',alt:'El Hoodoo: magia popular, no religión',h3:'🌿 El Hoodoo: magia popular',p:["Distinto del Vodou como sistema religioso, el Hoodoo (\"rootwork\") es un conjunto de prácticas de magia popular nacido entre las comunidades afroamericanas del sur de Estados Unidos, que usa mojo bags, velas de colores, baños rituales con hierbas y raíces como la de Juan el Conquistador."]},
{img:'./images/icone/tradizioni/voodoo/i-veve-disegni-che-aprono-la-porta-agli-spiriti.webp',alt:'Los vèvè',h3:'🖋️ Los vèvè',p:["Al inicio de cada ceremonia importante, el houngan o la mambo trazan en el suelo un vèvè: un dibujo geométrico con harina de maíz o café, único para cada Loa. Trazarlo correctamente requiere años de aprendizaje: es una verdadera \"invitación\" ritual."]}
],
note:'El Vudú y el Hoodoo son tradiciones sagradas vivas, profundamente tergiversadas por la cultura popular y el cine occidental. <strong>Merecen comprenderse dentro de su auténtico contexto histórico, religioso y cultural.</strong>',
tags:['Loa','Papa Legba','Antepasados','Haití y Nueva Orleans','Mojo Bag','Vèvè','Rada y Petro','Kanzo']},

{id:'rosacroce',icon:'🌹',th:'#2a1748',eyebrow:'Orden Esotérica Occidental',title:'Rosacruces',sub:'La rosa sobre la cruz',
blocks:[
{img:'./images/icone/tradizioni/rosacroce/i-manifesti-misteriosi.webp',alt:'Los manifiestos misteriosos',h3:'📜 Los manifiestos misteriosos',p:["El movimiento rosacruz entra en la historia con la publicación, entre 1614 y 1616 en Alemania, de tres textos anónimos —la Fama Fraternitatis, la Confessio Fraternitatis y Las Bodas Químicas de Christian Rosenkreutz— que narraban la existencia de una antigua hermandad secreta fundada por Christian Rosenkreutz. El efecto fue inmediato: intelectuales y alquimistas buscaron contacto con esta hermandad, que la mayoría de historiadores considera más una alegoría filosófica que una organización real."]},
{img:'./images/icone/tradizioni/rosacroce/il-simbolo-la-rosa-sulla-croce.webp',alt:'El símbolo: la rosa sobre la cruz',h3:'🌹 El símbolo: la rosa sobre la cruz',p:["La cruz representa el cuerpo y la condición terrenal; la rosa que florece en su centro —a menudo de cinco o siete pétalos— simboliza el desarrollo del alma y la revelación interior que florece desde la disciplina y el sufrimiento aceptado."]},
{img:'./images/icone/tradizioni/rosacroce/una-sintesi-di-saperi-esoterici.webp',alt:'Una síntesis de saberes esotéricos',h3:'⚗️ Una síntesis de saberes esotéricos',p:["La enseñanza rosacruz entrelaza conscientemente alquimia, Cábala judía, hermetismo y misticismo cristiano, dando lugar a un camino de perfeccionamiento personal guiado por un saber \"oculto\" que exige estudio y disciplina moral."]},
{img:'./images/icone/tradizioni/rosacroce/dal-mito-alle-organizzazioni-moderne.webp',alt:'Del mito a las organizaciones modernas',h3:'🏛️ Del mito a las organizaciones modernas',p:["En los siglos siguientes surgieron numerosas organizaciones que se declararon herederas de la tradición rosacruz, algunas vinculadas a la masonería especulativa, otras independientes y difundidas internacionalmente entre los siglos XIX y XX."]},
{img:'./images/icone/tradizioni/rosacroce/amorc-e-le-organizzazioni-rosacrociane-moderne.webp',alt:'AMORC y las organizaciones rosacruces modernas',h3:'🏵️ AMORC',p:["AMORC, fundada en Estados Unidos en 1915 por Harvey Spencer Lewis, propone un camino iniciático mediante lecciones a domicilio, activo hoy también en Italia. Junto a ella, el Lectorium Rosicrucianum, fundado en 1924 en los Países Bajos con un enfoque más gnóstico-cristiano."]},
{img:'./images/icone/tradizioni/rosacroce/christian-rosenkreutz-storia-o-leggenda.webp',alt:'Christian Rosenkreutz: ¿historia o leyenda?',h3:'👤 Christian Rosenkreutz',p:["Según la Fama Fraternitatis (1614), la orden remonta su origen a Christian Rosenkreutz, nacido en 1378, quien habría viajado por Oriente Medio estudiando con sabios árabes y sufíes. Ningún documento histórico externo a los manifiestos confirma su existencia."]},
{img:'./images/icone/tradizioni/rosacroce/le-nozze-chimiche-di-christian-rosenkreutz.webp',alt:'Las Bodas Químicas de Christian Rosenkreutz',h3:'⚗️ Las Bodas Químicas',p:["Publicado en 1616 y atribuido a Johann Valentin Andreae, este texto alegórico narra un viaje de siete días entre pruebas, muertes y resurrecciones simbólicas, cargado de simbolismo alquímico, astrológico y cristiano."]},
{img:'./images/icone/tradizioni/rosacroce/influenze-su-massoneria-e-movimenti-esoterici-moderni.webp',alt:'Influencias en la masonería y movimientos esotéricos modernos',h3:'🌍 Influencias modernas',p:["La Golden Dawn, fundada en Londres en 1888, incorporó grados e imágenes rosacruces, influyendo en figuras como Aleister Crowley y W.B. Yeats. Rudolf Steiner desarrolló su propia Antroposofía, llamándola explícitamente \"el camino rosacruz\"."]}
],
tags:['Christian Rosenkreutz','Fama Fraternitatis','Alquimia Interior','Iniciación por Grados','Simbolismo Esotérico','AMORC','Golden Dawn','Rudolf Steiner']}
]
