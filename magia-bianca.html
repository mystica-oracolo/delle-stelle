  <style>
    /* ── Reset & Variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0514;
      --card: #140c24;
      --purple: #2a1748;
      --gold: #d4af37;
      --gold-dim: #b8860b;
      --gold-glow: rgba(212,175,55,0.4);
      --text: #f4f1fa;
      --muted: #b8b2d1;
      --radius: 18px;
      --border: rgba(212,175,55,0.2);
    }

    /* ── Tema Giorno ── */
    html.theme-day {
      --bg: #f5f2ed;
      --card: #ede8df;
      --text: #2a1748;
      --muted: #6b5b7f;
      --purple: #6b5b7f;
      --gold: #c89742;
      --gold-dim: #a67c52;
      --gold-glow: rgba(200,151,66,0.2);
      --border: #c89742;
    }
    html.theme-day .card,
    html.theme-day .ritual-card { background-color: var(--card); border: 1px solid var(--border); color: var(--text); }
    html.theme-day h1, html.theme-day h2, html.theme-day h3 { color: var(--text); text-shadow: none; }
    html.theme-day button { background-color: var(--gold); color: var(--text); border: 1px solid var(--border); }
    html.theme-day .ritual-title { color: var(--text); }
    html.theme-day .field-text { color: var(--muted); }
    html.theme-day .page-header { background: rgba(245,242,237,0.97); border-bottom: 1px solid var(--border); }

    /* ── Layout ── */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Skip Link ── */
    .skip-link {
      position: absolute; top: -40px; left: 0;
      background: var(--gold); color: #000;
      padding: 8px 16px; z-index: 100;
      border-radius: 0 0 8px 0;
      font-family: 'Cinzel', serif;
      text-decoration: none;
      transition: top 0.2s;
    }
    .skip-link:focus { top: 0; }

    /* ── Sfondo Cosmico ── */
    .cosmos {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, #2a174830 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 80%, #1a073820 0%, transparent 60%),
        radial-gradient(2px 2px at 15% 25%, #fff9 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 75% 15%, #fff7 0%, transparent 100%),
        radial-gradient(2px 2px at 45% 70%, #d4af3780 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 45%, #fff6 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 30% 85%, #fff5 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 35%, #d4af3760 0%, transparent 100%);
      animation: twinkle 14s infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: .35; }
      50%  { opacity: .55; }
      100% { opacity: .45; }
    }

    /* ── Header ── */
    .page-header {
      position: sticky; top: 0;
      background: rgba(10,5,20,0.97);
      padding: max(12px, calc(12px + env(safe-area-inset-top, 0px))) 16px 14px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 10;
      text-align: center;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .btn-back {
      background: rgba(212,175,55,0.1);
      border: 1px solid var(--border);
      color: var(--gold);
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Cinzel', serif;
      text-decoration: none;
      display: inline-block;
      transition: all 0.25s ease;
    }
    .btn-back:hover, .btn-back:focus-visible { background: rgba(212,175,55,0.2); outline: 2px solid var(--gold); outline-offset: 2px; }
    .header-controls { display: flex; gap: 8px; }
    .btn-icon {
      background: rgba(212,175,55,0.1);
      border: 1px solid var(--border);
      color: var(--gold);
      padding: 7px 10px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Cinzel', serif;
      transition: all 0.25s ease;
      white-space: nowrap;
    }
    .btn-icon:hover, .btn-icon:focus-visible { background: rgba(212,175,55,0.2); outline: 2px solid var(--gold); outline-offset: 2px; }
    .page-title {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(90deg, #ffffff, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .lang-switch { display: flex; justify-content: center; gap: 6px; }
    .btn-lang {
      background: transparent;
      border: 1px solid rgba(212,175,55,0.3);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 11px;
      font-family: 'Cinzel', serif;
      font-weight: 600;
      transition: all 0.25s ease;
    }
    .btn-lang.active, .btn-lang:hover { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.1); }
    .btn-lang:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    /* ── Main Content ── */
    main {
      position: relative; z-index: 1;
      padding: 16px 16px 100px;
      max-width: 650px;
      margin: 0 auto;
    }

    /* ── Contatore ── */
    .counter {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 8px 0 12px;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.5px;
    }

    /* ── Ritual Cards ── */
    .ritual-card {
      background: var(--card);
      border: 1px solid rgba(212,175,55,0.15);
      border-radius: 14px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .ritual-card:hover { border-color: rgba(212,175,55,0.35); }
    .ritual-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .ritual-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--gold-dim);
      min-width: 24px;
      font-family: 'Cinzel', serif;
    }
    .ritual-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      line-height: 1.3;
      font-family: 'Cinzel', serif;
    }
    .ritual-arrow {
      color: var(--gold-dim);
      font-size: 14px;
      transition: transform 0.3s;
      flex-shrink: 0;
    }
    .ritual-card.open .ritual-arrow { transform: rotate(180deg); }
    .ritual-body { max-height: 0; overflow: hidden; transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1); }
    .ritual-card.open .ritual-body { max-height: 1200px; }
    .ritual-body-inner {
      padding: 12px 16px 16px;
      border-top: 1px solid rgba(212,175,55,0.1);
    }
    .field { margin-bottom: 12px; }
    .field-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      font-family: 'Cinzel', serif;
    }
    .field-text {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }
    .field-text em { color: var(--text); font-style: italic; }
    .field-text strong { color: var(--text); }

    /* ── Share Section ── */
    .share-section { text-align: center; margin: 20px 0; }
    .btn-share {
      background: rgba(212,175,55,0.15);
      border: 1px solid var(--border);
      color: var(--gold);
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Cinzel', serif;
      transition: all 0.25s ease;
    }
    .btn-share:hover, .btn-share:focus-visible { background: rgba(212,175,55,0.25); outline: 2px solid var(--gold); outline-offset: 2px; }
    .share-popup {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .share-btn {
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      transition: all 0.25s ease;
    }
    .share-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
    .share-btn.whatsapp { background: #25d366; color: #fff; }
    .share-btn.telegram { background: #0088cc; color: #fff; }
    .share-btn.facebook { background: #1877f2; color: #fff; }
    .share-btn.twitter  { background: #1da1f2; color: #fff; }
    .share-btn.copy     { background: rgba(212,175,55,0.2); color: var(--gold); border: 1px solid var(--border); }

    /* ── Article Section ── */
    .article-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px;
      margin: 24px 0;
      content-visibility: auto;
      contain-intrinsic-size: 1px 1400px;
    }
    .article-section h2 {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      color: var(--gold);
      margin-bottom: 16px;
      line-height: 1.3;
    }
    .article-section h3 {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold);
      margin: 20px 0 10px;
    }
    .article-section p {
      font-size: 15px;
      line-height: 1.85;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .article-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .article-links a {
      color: var(--gold);
      font-size: 13px;
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 20px;
      font-family: 'Cinzel', serif;
      transition: all 0.25s ease;
    }
    .article-links a:hover, .article-links a:focus-visible {
      background: rgba(212,175,55,0.15);
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }
    .cta-explore {
      display: block;
      text-align: center;
      margin-top: 20px;
      background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(157,78,221,0.2));
      border: 1px solid var(--border);
      color: var(--gold);
      padding: 12px 20px;
      border-radius: 20px;
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      transition: all 0.25s ease;
    }
    .cta-explore:hover, .cta-explore:focus-visible {
      background: linear-gradient(135deg, rgba(212,175,55,0.3), rgba(157,78,221,0.3));
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    /* ── FAQ ── */
    .faq-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin: 24px 0;
      content-visibility: auto;
      contain-intrinsic-size: 1px 800px;
    }
    .faq-title {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      color: var(--gold);
      margin-bottom: 16px;
      text-align: center;
    }
    .faq-item { border-bottom: 1px solid rgba(212,175,55,0.1); }
    .faq-item:last-child { border-bottom: none; }
    .faq-question {
      width: 100%;
      background: none;
      border: none;
      color: var(--text);
      font-size: 14px;
      font-family: 'Cinzel', serif;
      padding: 14px 0;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      text-align: left;
      transition: color 0.2s;
    }
    .faq-question:hover, .faq-question:focus-visible { color: var(--gold); outline: none; }
    .faq-question:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; border-radius: 4px; }
    .faq-icon { font-size: 18px; color: var(--gold); flex-shrink: 0; }
    .faq-answer { padding: 0 0 14px; }
    .faq-answer p { font-size: 14px; color: var(--muted); line-height: 1.75; }

    /* ── Premium Modal ── */
    .premium-modal {
      position: fixed; inset: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .premium-modal.show { opacity: 1; pointer-events: all; }
    .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); }
    .modal-content {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      max-width: 340px; width: 90%;
      text-align: center;
    }
    .modal-content h2 {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 18px;
      margin-bottom: 12px;
    }
    .modal-content p { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 10px; }
    .premium-price { color: var(--gold) !important; font-family: 'Cinzel', serif; font-size: 16px !important; font-weight: 700; }
    .btn-premium-buy {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      color: #0a0514;
      border: none;
      padding: 13px;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.25s ease;
    }
    .btn-premium-buy:hover, .btn-premium-buy:focus-visible { opacity: 0.9; outline: 2px solid var(--gold); outline-offset: 2px; }
    .btn-premium-skip {
      width: 100%;
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px;
      border-radius: 12px;
      font-size: 13px;
      font-family: 'Cinzel', serif;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.25s ease;
    }
    .btn-premium-skip:hover, .btn-premium-skip:focus-visible { border-color: var(--border); color: var(--text); outline: 2px solid var(--gold); outline-offset: 2px; }

    /* ── Footer ── */
    .page-footer {
      background: rgba(10,5,20,0.8);
      border-top: 1px solid var(--border);
      padding: 20px 16px;
      text-align: center;
      position: relative; z-index: 1;
    }
    .footer-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 12px; }
    .footer-links a { color: var(--muted); font-size: 12px; text-decoration: none; font-family: 'Cinzel', serif; transition: color 0.2s; }
    .footer-links a:hover, .footer-links a:focus-visible { color: var(--gold); outline: 2px solid var(--gold); outline-offset: 2px; border-radius: 2px; }
    #footer-copy { color: var(--muted); font-size: 11px; margin-bottom: 6px; }
    .footer-disclaimer { color: rgba(184,178,209,0.5); font-size: 10px; line-height: 1.5; max-width: 480px; margin: 0 auto; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .page-title { font-size: 19px; }
      .article-section h2 { font-size: 17px; }
    }
  </style>
</head>

</header>

<!-- Contenuto principale -->
<main id="main-content">

  <div class="counter" id="counter" aria-live="polite"></div>
  <div id="ritual-list" role="list" aria-label="Lista rituali di Magia Bianca"></div>

  <!-- ── Share ── -->

    <div class="share-popup" id="sharePopup" hidden>
      <a class="share-btn whatsapp" id="share-wa" target="_blank" rel="noopener noreferrer" aria-label="Condividi su WhatsApp">💬 WhatsApp</a>
      <a class="share-btn telegram" id="share-tg" target="_blank" rel="noopener noreferrer" aria-label="Condividi su Telegram">✈️ Telegram</a>

    <p id="art-p1"></p>
    <p id="art-p2"></p>
    <p id="art-p3"></p>
    <h3 id="art-h3"></h3>
    <p id="art-p4"></p>
    <p id="art-p5"></p>

      <a href="./magia-rossa.html" id="link-1"></a>

    artP1: 'La Magia Blanca, en su esencia más pura, es el arte de trabajar intencionalmente con las fuerzas de la naturaleza, la mente y el espíritu con fines éticos y constructivos. No se trata de un fenómeno medieval encerrado en polvorientos grimorios, sino de una tradición viva que hunde sus raíces en las prácticas chamánicas prehistóricas, los cultos a las diosas de la fertilidad del Neolítico, los misterios eleusinos griegos y las tradiciones herbolarias y curativas de todas las culturas conocidas. Cada sociedad humana ha desarrollado formas de magia benévola: los curanderos nativos americanos con su medicina de plantas sagradas, los curanderos sudamericanos, las sanadoras italianas con sus preparados de salvia y romero, y los druidas celtas que trabajaban con los ciclos de las estaciones. Incluso las civilizaciones mesopotámica y egipcia, a través de sus sacerdotes-médicos, practicaban formas de magia protectora entrelazada con conocimientos herbolarios y astronómicos, señal de cuán universal es este impulso humano hacia el cuidado intencional.',

    artP5: 'En la práctica cotidiana, la Magia Blanca se manifiesta en gestos simples pero profundos: bendecir una comida antes de comerla, purificar el hogar con humo de salvia tras un período de tensión, llevar un cristal en el bolsillo para sentirse arraigado, encender una vela con una intención precisa cada mañana. La diferencia entre una práctica mágica y un ritual ordinario no reside en los instrumentos empleados, sino en la calidad de la atención y la conciencia que se les aporta. Es esta presencia intencional la que transforma un acto ordinario en uno mágico. Los 40 rituales recogidos en esta página provienen de esta larga tradición y han sido seleccionados por su practicidad, seguridad y coherencia ética.',

let currentLang = localStorage.getItem('myst_lang') || 'it';
const PAGE_URL = 'https://mysticaoracoli.it/magia-bianca.html';

/* ── Render Rituali (ora multilingua — chiamato da applyLang) ── */
const list = document.getElementById('ritual-list');

function renderRituali() {
  const data = RITUALI_LANG[currentLang];
  const labels = FIELD_LABELS[currentLang];
  list.innerHTML = '';
  data.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'ritual-card';
    card.setAttribute('role', 'listitem');
    card.innerHTML = `
      <div class="ritual-head" onclick="this.parentElement.classList.toggle('open')"
           role="button" tabindex="0" aria-expanded="false"
           onkeydown="if(event.key==='Enter'||event.key===' '){this.click();event.preventDefault()}"
           aria-controls="ritual-body-${i}">
        <span class="ritual-num">${String(i+1).padStart(2,'0')}</span>
        <span class="ritual-title">${r.t}</span>
        <span class="ritual-arrow" aria-hidden="true">▾</span>
      </div>
      <div class="ritual-body" id="ritual-body-${i}">
        <div class="ritual-body-inner">
          <div class="field">
            <div class="field-label">${labels.scopo}</div>
            <div class="field-text">${r.scopo}</div>
          </div>
          <div class="field">
            <div class="field-label">${labels.mat}</div>
            <div class="field-text">${r.mat}</div>
          </div>
          <div class="field">
            <div class="field-label">${labels.proc}</div>
            <div class="field-text">${r.proc}</div>
          </div>
          ${r.nota ? `<div class="field"><div class="field-label">${labels.nota}</div><div class="field-text">${r.nota}</div></div>` : ''}
        </div>
      </div>
    `;
    list.appendChild(card);
  });

  // Storico letture (myst_v3_history) — ri-applicato ad ogni render
  list.querySelectorAll('.ritual-head').forEach((head, i) => {
    head.addEventListener('click', () => {
      if (head.parentElement.classList.contains('open')) {
        logRitualToHistory(data[i].t);
      }
    });
  });
}

/* ── Storico Letture (myst_v3_history) — coerente con schema localStorage globale ── */
function logRitualToHistory(titolo) {
  try {
    const HISTORY_KEY = 'myst_v3_history';
    const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    history.unshift({ pagina: 'magia-bianca', titolo, lingua: currentLang, data: new Date().toISOString() });
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, 50)));
  } catch (e) { /* storage non disponibile — nessuna interruzione del flusso */ }
}

  const mt = document.getElementById('musicToggle'); if (mt) mt.textContent = window.audioManager?.isPlaying ? L.music.on : L.music.off;
  const tt = document.getElementById('themeToggle'); if (tt) tt.textContent = isDayMode ? L.theme.night : L.theme.day;

  // Contatore
  const cnt = document.getElementById('counter'); if (cnt) cnt.textContent = L.counter(RITUALI_LANG[currentLang].length);

  // Articolo
  const at  = document.getElementById('art-title'); if (at) at.textContent = L.artTitle;
  const ah2 = document.getElementById('art-h2');    if (ah2) ah2.textContent = L.artH2;
  const ah3 = document.getElementById('art-h3');    if (ah3) ah3.textContent = L.artH3;
  const ap1 = document.getElementById('art-p1');    if (ap1) ap1.textContent = L.artP1;
  const ap2 = document.getElementById('art-p2');    if (ap2) ap2.textContent = L.artP2;
  const ap3 = document.getElementById('art-p3');    if (ap3) ap3.textContent = L.artP3;
  const ap4 = document.getElementById('art-p4');    if (ap4) ap4.textContent = L.artP4;
  const ap5 = document.getElementById('art-p5');    if (ap5) ap5.textContent = L.artP5;
  const hi  = document.getElementById('art-hero');  if (hi)  hi.alt = L.artImgAlt || '';
  const cap = document.getElementById('art-img-caption'); if (cap) cap.textContent = L.artImgCaption;
  const ce  = document.getElementById('cta-explore'); if (ce) ce.textContent = L.ctaExplore;

  // Link interni articolo
  const l1 = document.getElementById('link-1'); if (l1) l1.textContent = L.link1;
  const l2 = document.getElementById('link-2'); if (l2) l2.textContent = L.link2;
  const l3 = document.getElementById('link-3'); if (l3) l3.textContent = L.link3;
  const l4 = document.getElementById('link-4'); if (l4) l4.textContent = L.link4;

  // Premium modal
  const pmt = document.getElementById('premium-title'); if (pmt) pmt.textContent = L.premiumTitle;
  const pmx = document.getElementById('premium-text');  if (pmx) pmx.textContent = L.premiumText;
  const pmp = document.getElementById('premium-price'); if (pmp) pmp.textContent = L.premiumPrice;
  const pmb = document.getElementById('premium-btn');   if (pmb) pmb.textContent = L.premiumBtn;
  const pms = document.getElementById('premium-skip');  if (pms) pms.textContent = L.premiumSkip;

  // Share
  const sc = document.getElementById('share-copy'); if (sc) sc.textContent = L.shareCopy;

  // Footer
  const fc = document.getElementById('footer-copy');       if (fc) fc.textContent = L.footerCopy;
  const fd = document.getElementById('footer-disclaimer'); if (fd) fd.textContent = L.footerDisclaimer;

  // FAQ
  renderFAQ(L.faq);

  // Rituali (multilingua — ricostruisce le card nella lingua corrente)
  renderRituali();

  // Bottoni lingua: aggiorna aria-pressed
  document.querySelectorAll('[data-lang]').forEach(b => {
    b.setAttribute('aria-pressed', String(b.dataset.lang === currentLang));
  });
}

// Switch lingua
document.querySelectorAll('[data-lang]').forEach(btn => {
  btn.addEventListener('click', e => {
    currentLang = e.target.dataset.lang;
    localStorage.setItem('myst_lang', currentLang);
    applyLang();
    document.querySelectorAll('[data-lang]').forEach(b =>
      b.classList.toggle('active', b.dataset.lang === currentLang));
  });
});

/* ── Audio Manager ── */
const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';

class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play() {
    this.audio?.play().catch(() => {});
    this.isPlaying = true;
    sessionStorage.setItem(AUDIO_KEY, 'true');
    this.updateUI();
  }
  pause() {
    this.audio?.pause();
    this.isPlaying = false;
    sessionStorage.setItem(AUDIO_KEY, 'false');
    this.updateUI();
  }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}
window.audioManager = new AudioManager();
document.getElementById('musicToggle')?.addEventListener('click', () => window.audioManager.toggle());

/* ── Tema Giorno/Notte ── */
let isDayMode = localStorage.getItem('myst_theme') === 'day';

function applyTheme(isDay) {
  document.documentElement.classList.toggle('theme-day', isDay);
  const btn = document.getElementById('themeToggle');
  const L = LANG[currentLang];
  if (btn) btn.textContent = isDay ? L.theme.night : L.theme.day;
  localStorage.setItem('myst_theme', isDay ? 'day' : 'night');
}

document.getElementById('themeToggle')?.addEventListener('click', () => {
  isDayMode = !isDayMode;
  applyTheme(isDayMode);
});

/* ── Premium Gate ── */
function isPremium() {
  return localStorage.getItem('myst_premium') === '1';
}

function requirePremium() {
  if (isPremium()) return true;
  document.getElementById('premiumModal')?.classList.add('show');
  document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'false');
  return false;
}

function closePremiumModal() {
  document.getElementById('premiumModal')?.classList.remove('show');
  document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'true');
}

/* ── Share ── */

function shareContent(customText) {
  const L = LANG[currentLang];
  const text = customText || L.shareText;
  if (navigator.share) {
    navigator.share({ title: L.shareTitle, text, url: PAGE_URL }).catch(() => {});
    return;
  }
  const enc = encodeURIComponent(text + ' ' + PAGE_URL);
  const ue  = encodeURIComponent(PAGE_URL);
  const wa = document.getElementById('share-wa'); if (wa) wa.href = `https://wa.me/?text=${enc}`;
  const tg = document.getElementById('share-tg'); if (tg) tg.href = `https://t.me/share/url?url=${ue}&text=${encodeURIComponent(text)}`;
  const fb = document.getElementById('share-fb'); if (fb) fb.href = `https://www.facebook.com/sharer/sharer.php?u=${ue}`;
  const xb = document.getElementById('share-x');  if (xb) xb.href = `https://twitter.com/intent/tweet?text=${enc}`;
  const sp = document.getElementById('sharePopup'); if (sp) sp.hidden = false;
}

function copyLink() {
  const L = LANG[currentLang];
  navigator.clipboard.writeText(PAGE_URL).then(() => {
    const b = document.getElementById('share-copy');
    if (b) {
      b.textContent = L.shareCopied;
      setTimeout(() => { b.textContent = L.shareCopy; }, 2000);
    }
  });
}

/* ── FAQ Accordion ── */
function renderFAQ(faqs) {
  const container = document.getElementById('faqList');
  if (!container) return;
  container.innerHTML = faqs.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false" aria-controls="faq-ans-${i}">
        <span>${f.q}</span>
        <span class="faq-icon" aria-hidden="true">+</span>
      </button>
      <div class="faq-answer" id="faq-ans-${i}" hidden>
        <p>${f.a}</p>
      </div>
    </div>
  `).join('');
}

function toggleFAQ(i) {
  const ans = document.getElementById(`faq-ans-${i}`);
  const btn = document.querySelector(`#faq-${i} .faq-question`);
  const icon = btn?.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  if (icon) icon.textContent = isOpen ? '+' : '−';
  btn?.setAttribute('aria-expanded', String(!isOpen));
}

/* ── Init Sequence ── */
document.addEventListener('DOMContentLoaded', () => {
  applyTheme(isDayMode);  // 1. Tema
  // audioManager già init
  applyLang();            // 2. Lingua (chiama updateSEO come prima cosa)
});
</script>
