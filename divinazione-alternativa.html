  p8: 'Ya se interpreten como sincronicidad junguiana o como señal simbólica, los números angélicos representan hoy una de las puertas de acceso más populares a la práctica oracular, a menudo complementaria a la lectura de cartas.',
  rit1strong: 'Un consejo práctico:',
  rit1: 'lleva un pequeño diario de los mensajes recibidos — tanto de las cartas como de los números notados casualmente. Con el tiempo, reconocerás patrones personales que una lectura aislada no podría revelar.',
  sd5: 'Artículo',
  h5: '🕊️ ¿Ángel Custodio o Espíritu Guía? Las Diferencias',
  img5Alt: 'Ángel custodio y espíritu guía - las diferencias entre las dos figuras en la tradición espiritual',
  p9: 'Quien se acerca por primera vez a la práctica oracular a menudo confunde dos figuras que, aunque similares, tienen orígenes y funciones distintas: el ángel custodio y el espíritu guía. La diferencia no es solo terminológica, sino que atañe al tipo de relación que se establece.',
  p10: 'El ángel custodio pertenece a la tradición religiosa occidental: es una presencia asignada desde el nacimiento, no ligada a experiencias terrenales, cuya tarea es proteger y orientar sin interferir nunca con el libre albedrío. El espíritu guía, concepto más difundido en el chamanismo y las corrientes New Age, puede ser en cambio un antepasado, un animal totémico o una entidad que se manifiesta en diferentes momentos de la vida, a menudo en respuesta a una fase de crecimiento específica.',
  cust: [
    { ico:'🕊️', name:'Ángel Custodio', desc:'Presencia constante y universal, no ligada a una experiencia terrenal, de matriz religiosa.' },
    { ico:'🐺', name:'Espíritu Guía', desc:'Presencia que puede cambiar con el tiempo, a menudo identificada con antepasados, animales o maestros espirituales.' }
  ],
  p11: 'En el Oráculo de los Ángeles moderno los límites entre las dos figuras se difuminan a propósito: el objetivo no es la precisión doctrinal sino ofrecer un punto de referencia simbólico al que recurrir. Muchos practicantes simplemente eligen llamar a esta presencia "mi guía", sin necesidad de etiquetarla de forma rígida.',
  sd6: 'Artículo',
  h6: '🪶 Las Señales Angélicas en la Vida Cotidiana',
  img6Alt: 'Señales angélicas en la vida cotidiana - plumas blancas, mariposas y otros signos simbólicos',
  p12: 'Además de las cartas y los números repetidos, la tradición oracular contemporánea atribuye significado a una serie de pequeños eventos cotidianos, interpretados como "señales" de una presencia protectora. No se trata de pruebas en sentido científico, sino de símbolos sobre los que la práctica reflexiva invita a detenerse.',
  seg: [
    { ico:'🪶', name:'Plumas Blancas', desc:'La señal más citada en la tradición popular anglosajona: encontrar una en el lugar y momento "adecuados" se lee como una confirmación o un saludo.' },
    { ico:'🦋', name:'Mariposas y Libélulas', desc:'Asociadas a la transformación y, en muchas culturas, a visitas simbólicas de seres queridos que ya no están.' },
    { ico:'🌟', name:'Luces y Destellos Repentinos', desc:'Brillos percibidos con el rabillo del ojo, a menudo reportados durante meditaciones o momentos de fuerte emoción.' },
    { ico:'🎵', name:'Canciones "en el Momento Justo"', desc:'Una canción significativa que reaparece en un momento de duda, vivida como un pequeño recordatorio.' }
  ],
  p13: 'El escepticismo hacia estas señales es tan legítimo como la propia práctica: la psicología las relacionaría con el fenómeno de la apofenia, la tendencia natural de la mente a encontrar patrones significativos en eventos casuales. Esto no resta valor a la experiencia subjetiva: incluso solo como ejercicio de atención y presencia, notar estas señales puede tener un efecto calmante y arraigante.',
  sd7: 'Artículo',
  h7: '🃏 Cómo Elegir tu Propio Mazo Angélico',
  img7Alt: 'Cómo elegir tu propio mazo de cartas oraculares angélicas',
  p14: 'Hoy existen cientos de mazos oraculares de temática angélica, cada uno con un estilo ilustrativo y un enfoque temático diferente: algunos se centran en la sanación, otros en la manifestación, otros en una tradición cultural específica. Una pregunta frecuente entre quienes empiezan es: ¿cómo se elige?',
  p15: 'La práctica más extendida es confiar en la respuesta instintiva frente a las imágenes de portada, más que en una comparación racional de características. Este enfoque, tomado de la cartomancia tradicional, parte del supuesto de que la atracción visual inmediata ya señala una sintonía personal con ese conjunto particular de símbolos.',
  msteps: [
    { t:'Observa varias portadas', d:'sin leer las descripciones: nota cuál te atrae más a nivel visual e instintivo.' },
    { t:'Verifica el tema declarado', d:'por la autora (sanación, amor, carrera, espiritualidad general) y compáralo con tus necesidades actuales.' },
    { t:'Considera el formato de los mensajes', d:'algunos mazos ofrecen solo una palabra clave, otros un pequeño texto guía — elige lo que realmente te ayude a reflexionar.' }
  ],
  p16: 'No existe un mazo "equivocado": cada juego de cartas es simplemente una herramienta diferente para activar la misma capacidad, ya presente en ti, de escuchar tu propia intuición.'
},
celti: {
  h1: '🌳 Oráculo Celta — Alfabeto Ogham',
  img1Alt: 'Alfabeto Ogham celta - antiguo sistema de escritura sagrada asociado a los árboles',
  p1: 'El Ogham (se pronuncia "óh-am") es el antiguo alfabeto sagrado de los pueblos celtas de Irlanda y Escocia, documentado desde el siglo IV d.C. en monolitos de piedra, donde las inscripciones marcaban límites territoriales y tumbas. Cada signo se compone de líneas grabadas a lo largo de un borde vertical — el druim — y cada letra se asocia al nombre de un árbol o planta sagrada.',
  p2: 'La leyenda atribuye la invención del Ogham al dios Ogma, divinidad de la palabra y la elocuencia en la mitología irlandesa, de quien el alfabeto toma su nombre. Era usado por druidas y bardos no solo para escribir, sino como sistema mnemotécnico para memorizar leyes, genealogías y conocimientos botánicos y astronómicos, en una cultura oral que confiaba poco en la escritura.',
  q1t: 'El Book of Ballymote, manuscrito irlandés del siglo XIV, recoge más de cien variantes del Ogham y explica también su uso como código cifrado entre druidas, señal de su dimensión esotérica además de práctica.',
  q1s: '— Tradición manuscrita irlandesa medieval',
  hint1: 'Como oráculo, el Ogham fue redescubierto y sistematizado solo en el siglo XX, en particular gracias a los estudios del poeta Robert Graves en "La Diosa Blanca" (1948), que vinculó cada árbol a un período del calendario lunar celta.',
  sd2: 'La Estructura del Sistema',

  img2Alt: 'Estructura del alfabeto Ogham - las cuatro familias de letras o Aicme',
  p3: 'El alfabeto Ogham clásico se compone de 20 letras principales, divididas en cuatro familias de cinco signos llamadas Aicme ("familia" en gaélico antiguo). Una quinta serie de letras adicionales, llamada Forfeda, se introdujo más tarde para representar sonidos griegos y latinos.',
  aicme: [

  p4: 'Esta organización no era casual: reflejaba la clasificación botánica celta de los árboles en "nobles" (robles, manzanos) y "comunes", y su papel práctico en la vida cotidiana — construcción, medicina, combustible, magia.',
  sd3: 'El Método',
  h3: '📖 Cómo Se Consulta el Oráculo',
  img3Alt: 'Cómo consultar el oráculo Ogham - varillas de madera grabadas con símbolos celtas',
  p5: 'Tradicionalmente los druidas tallaban los símbolos en pequeñas varillas de madera (feda), extraídas al azar de una bolsa como se haría hoy con las runas. Cada árbol lleva consigo no solo un significado divinatorio sino también propiedades curativas y energéticas atribuidas por la tradición herbolaria celta.',

  p6: 'Una de las interpretaciones más fascinantes del Ogham, propuesta por Robert Graves en "La Diosa Blanca", es la de un calendario arbóreo: trece meses lunares, cada uno de 28 días, gobernados por un árbol diferente, a los que se añaden los días intercalares del solsticio. Esta lectura no está documentada en las fuentes celtas antiguas, pero hoy forma parte integral de la práctica neopagana y oracular contemporánea.',
  p7: 'En el sistema propuesto por Graves, el mes comienza simbólicamente con el Abedul — el árbol de los nuevos inicios, asociado al período posterior al solsticio de invierno — y concluye con el Saúco, ligado al fin de un ciclo y a la transformación. Conocer "tu" árbol según la fecha de nacimiento se ha convertido, para muchos practicantes, en una forma de leer su propio tema simbólico personal, en paralelo a la astrología solar.',

let currentLang = localStorage.getItem('myst_lang') || 'it';

/* ── SEO Multilingua ── */
function updateSEO() {
  const S = LANG[currentLang].seo;
  document.documentElement.lang = S.htmlLang;
  document.title = S.title;
  document.querySelector('meta[name="description"]').content = S.description;
  document.querySelector('meta[name="keywords"]').content = S.keywords;
  document.querySelector('meta[property="og:title"]').content = S.ogTitle;
  document.querySelector('meta[property="og:description"]').content = S.ogDesc;
  document.querySelector('meta[property="og:locale"]').content = S.ogLocale;
  document.querySelector('meta[name="twitter:title"]').content = S.ogTitle;
  document.querySelector('meta[name="twitter:description"]').content = S.ogDesc;
  const ld = document.getElementById('ldjson');
  if (ld && S.faqLD) {
    ld.textContent = JSON.stringify({
      '@context': 'https://schema.org',
      '@type': 'FAQPage',
      mainEntity: S.faqLD.map(f => ({
        '@type': 'Question',
        name: f.q,
        acceptedAnswer: { '@type': 'Answer', text: f.a }
      })),
      about: {
        '@type': 'WebPage',
        name: S.title,
        url: 'https://mysticaoracoli.it/divinazione-alternativa.html',
        breadcrumb: {
          '@type': 'BreadcrumbList',
          itemListElement: [
            { '@type': 'ListItem', position: 1, name: 'Home', item: 'https://mysticaoracoli.it/' },
            { '@type': 'ListItem', position: 2, name: S.title, item: 'https://mysticaoracoli.it/divinazione-alternativa.html' }
          ]
        }
      },
      publisher: { '@type': 'Organization', name: 'MYSTICA Oracoli' }
    });
  }
}

/* ── Helper: figure-list / steps / rows renderers ── */
function renderFigureList(containerId, items) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = items.map(it => `
    <div class="figura-row">
      <span class="figura-ico" ${it.c ? `style="color:${it.c}"` : ''}>${it.c ? '●' : it.ico}</span>
      <div><div class="figura-name">${it.name}</div><div class="figura-desc">${it.desc}</div></div>
    </div>
  `).join('');
}
function renderSteps(containerId, steps) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = steps.map((s, i) => `
    <div class="metodo-step">
      <div class="metodo-num">${i + 1}</div>
      <div class="metodo-text"><strong>${s.t}</strong> ${s.d}</div>
    </div>
  `).join('');
}
function renderComboRows(containerId, rows) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = rows.map(r => `
    <div class="len-combo-row">
      <div class="len-combo-title">${r.t}</div>
      <div class="len-combo-desc">${r.d}</div>
    </div>
  `).join('');
}
function renderSemiGrid(containerId, semi) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = semi.map(s => `
    <div class="seme-card ${s.cls}">
      <span class="seme-ico">${s.ico}</span>
      <div class="seme-name">${s.name}</div>
      <div class="seme-area">${s.area}</div>
      <div class="seme-desc">${s.desc}</div>
    </div>
  `).join('');
}
function renderLenCardsGrid(containerId, cards) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = cards.map(c => `
    <div class="len-card-item"><span class="len-card-ico">${c.ico}</span><span class="len-card-name">${c.n}</span><span class="len-card-key">${c.k}</span></div>
  `).join('');
}

// Switch lingua
document.querySelectorAll('[data-lang]').forEach(btn => {
  btn.addEventListener('click', e => {
    currentLang = e.target.closest('[data-lang]').dataset.lang;
    localStorage.setItem('myst_lang', currentLang);
    applyLang();
    document.querySelectorAll('[data-lang]').forEach(b =>
      b.classList.toggle('active', b.dataset.lang === currentLang));
  });
});

/* ── Audio Manager (musica continua cross-page) ── */
const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';

class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.preload = 'none';
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play() {
    this.audio?.play().catch(() => {});
    this.isPlaying = true;
    sessionStorage.setItem(AUDIO_KEY, 'true');
    this.updateUI();
  }
  pause() {
    this.audio?.pause();
    this.isPlaying = false;
    sessionStorage.setItem(AUDIO_KEY, 'false');
    this.updateUI();
  }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}
window.audioManager = new AudioManager();
document.getElementById('musicToggle')?.addEventListener('click', () => window.audioManager.toggle());

/* ── Tema Giorno/Notte ── */
let isDayMode = localStorage.getItem('myst_theme') === 'day';

function applyTheme(isDay) {
  document.documentElement.classList.toggle('theme-day', isDay);
  const btn = document.getElementById('themeToggle');
  const L = LANG[currentLang];
  if (btn) btn.textContent = isDay ? L.theme.night : L.theme.day;
  localStorage.setItem('myst_theme', isDay ? 'day' : 'night');
}
document.getElementById('themeToggle')?.addEventListener('click', () => { isDayMode = !isDayMode; applyTheme(isDayMode); });

/* ── Premium Gate ── */
function isPremium() {
  return localStorage.getItem('myst_premium') === '1';
}
function requirePremium(actionType) {
  if (isPremium()) return true;
  document.getElementById('premiumModal')?.classList.add('show');
  document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'false');
  return false;
}
function closePremiumModal() {
  document.getElementById('premiumModal')?.classList.remove('show');
  document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'true');
}

/* ── Share ── */
const PAGE_URL = 'https://mysticaoracoli.it/divinazione-alternativa.html';

function shareContent(customText) {
  const L = LANG[currentLang];
  const text = customText || L.shareText;
  if (navigator.share) {
    navigator.share({ title: L.shareTitle, text, url: PAGE_URL }).catch(() => {});
    return;
  }
  const enc = encodeURIComponent(text + ' ' + PAGE_URL);
  const ue = encodeURIComponent(PAGE_URL);
  const wa = document.getElementById('share-wa'); if (wa) wa.href = `https://wa.me/?text=${enc}`;
  const tg = document.getElementById('share-tg'); if (tg) tg.href = `https://t.me/share/url?url=${ue}&text=${encodeURIComponent(text)}`;
  const fb = document.getElementById('share-fb'); if (fb) fb.href = `https://www.facebook.com/sharer/sharer.php?u=${ue}`;
  const xb = document.getElementById('share-x'); if (xb) xb.href = `https://twitter.com/intent/tweet?text=${enc}`;
  const sp = document.getElementById('sharePopup'); if (sp) sp.hidden = false;
}
function copyLink() {
  const L = LANG[currentLang];
  navigator.clipboard.writeText(PAGE_URL).then(() => {
    const b = document.getElementById('share-copy');
    if (b) {
      b.textContent = L.shareCopied;
      setTimeout(() => { b.textContent = L.shareCopy; }, 2000);
    }
  });
}

/* ── FAQ Accordion ── */
function renderFAQ(faqs) {
  const container = document.getElementById('faqList');
  if (!container) return;
  container.innerHTML = faqs.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false">
        <span>${f.q}</span>
        <span class="faq-icon" aria-hidden="true">+</span>
      </button>
      <div class="faq-answer" id="faq-ans-${i}" hidden>
        <p>${f.a}</p>
      </div>
    </div>
  `).join('');
}
function toggleFAQ(i) {
  const ans = document.getElementById(`faq-ans-${i}`);
  const btn = document.querySelector(`#faq-${i} .faq-question`);
  const icon = btn?.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  if (icon) icon.textContent = isOpen ? '+' : '−';
  btn?.setAttribute('aria-expanded', String(!isOpen));
}

// ═══════════ UTILITY ═══════════
function shuffleSample(arr,n){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a.slice(0,n);
}
function pickOne(arr){return arr[Math.floor(Math.random()*arr.length)];}

// ═══════════ CARTOMANZIA ═══════════
function drawCarto(){
  const D = ORACLE_DATA[currentLang];
  const positions = D.POS_CARTO;
  const combos=[];
  const used=new Set();
  while(combos.length<3){
    const s=D.SUITS[Math.floor(Math.random()*D.SUITS.length)];
    const r=D.RANKS[Math.floor(Math.random()*D.RANKS.length)];
    const key=s.key+r.n;
    if(used.has(key))continue;
    used.add(key);
    combos.push({s,r});
  }
  let html='<div class="spread">';
  combos.forEach((c,i)=>{
    html+=`<div class="oracle-block"><div class="ob-tag">${positions[i]}</div><div class="ob-name">${c.r.n} — ${c.s.label} ${c.s.symbol}</div><p>${c.r.meaning.charAt(0).toUpperCase()+c.r.meaning.slice(1)} ${c.s.domain}.</p></div>`;
  });
  html+='</div>';
  const el1=document.getElementById('resCarto');
  const el2=document.getElementById('resCarto2');
  if(el1)el1.innerHTML=html;
  if(el2)el2.innerHTML=html;
}

// ═══════════ LENORMAND ═══════════
function drawLenormand(){
  const D = ORACLE_DATA[currentLang];
  const positions = D.POS_LEN;
  const cards=shuffleSample(D.LENORMAND,3);
  let html='<div class="spread">';
  cards.forEach((c,i)=>{
    html+=`<div class="oracle-block"><div class="ob-tag">${positions[i]}</div><div class="ob-name">${c.n}</div><p>${c.meaning}</p></div>`;
  });
  html+='</div>';
  const el1=document.getElementById('resLenormand');
  const el2=document.getElementById('resLenormand2');
  if(el1)el1.innerHTML=html;
  if(el2)el2.innerHTML=html;
}

// ═══════════ CROMOMANZIA ═══════════
function renderSwatches(){
  const grid=document.getElementById('swatchGrid');
  if(!grid) return;
  const D = ORACLE_DATA[currentLang];
  grid.innerHTML=D.COLORI.map((c,i)=>`<div class="swatch" data-i="${i}" style="background:${c.hex}" onclick="showColore(${i})"><span>${c.n}</span></div>`).join('');
}
function showColore(i){
  document.querySelectorAll('.swatch').forEach(el=>el.classList.remove('active'));
  const el=document.querySelector('.swatch[data-i="'+i+'"]');
  if(el)el.classList.add('active');
  const D = ORACLE_DATA[currentLang];
  const c=D.COLORI[i];
  const tag = currentLang==='it' ? "Energia del Colore" : (currentLang==='es' ? 'Energía del Color' : 'Color Energy');
  document.getElementById('resColore').innerHTML=`<div class="oracle-block"><div class="ob-tag">${tag}</div><div class="ob-name">🎨 ${c.n}</div><p>${c.m}</p></div>`;
}
function drawColore(){
  const D = ORACLE_DATA[currentLang];
  showColore(Math.floor(Math.random()*D.COLORI.length));
}

// ═══════════ TAB NAVIGATION ═══════════
const TAB_KEYS=['cartomanzia','lenormand','angeli-oracolo','celti','specchio','cromomanzia'];
function activateTab(key){
  if(!TAB_KEYS.includes(key))key=TAB_KEYS[0];
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===key));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+key));
  history.replaceState(null,'','#'+key);
}
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>activateTab(btn.dataset.tab));
});

document.addEventListener('DOMContentLoaded', () => {
  applyTheme(isDayMode);     // 1. Tema
  // window.audioManager già init dal costruttore
  applyLang();               // 2. Lingua (chiama updateSEO() come prima cosa)
  document.querySelectorAll('[data-lang]').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === currentLang));
  renderSwatches();          // 3. Logica specifica della pagina
  activateTab((location.hash||'').replace('#',''));
});
