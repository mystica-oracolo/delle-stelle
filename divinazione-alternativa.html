<style>
/* ── Reset & Variabili (Tema Notte default) ── */
:root{--bg:#0a0514;--card:#140c24;--purple:#2a1748;--gold:#d4af37;--gold-dim:#b8860b;--gold-glow:rgba(212,175,55,0.4);--text:#f4f1fa;--muted:#b8b2d1;--radius:18px;--border:rgba(212,175,55,0.2)}
html.theme-day{--bg:#f5f2ed;--card:#ede8df;--text:#2a1748;--muted:#6b5b7f;--purple:#6b5b7f;--gold:#c89742;--gold-dim:#a67c52;--gold-glow:rgba(200,151,66,0.2);--border:#c89742}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .25s ease,color .25s ease}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.skip-link{position:absolute;left:-999px;top:0;background:var(--gold);color:#0a0514;padding:10px 16px;z-index:999;border-radius:0 0 8px 0;font-family:'Cinzel',serif;font-size:12px}
.skip-link:focus{left:0}

/* ── Sfondo Cosmico ── */
.cosmos{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,#2a174830 0%,transparent 70%),radial-gradient(ellipse 40% 60% at 80% 80%,#1a073820 0%,transparent 60%),radial-gradient(2px 2px at 15% 25%,#fff9 0%,transparent 100%),radial-gradient(1.5px 1.5px at 75% 15%,#fff7 0%,transparent 100%),radial-gradient(2px 2px at 45% 70%,#d4af3780 0%,transparent 100%),radial-gradient(1px 1px at 88% 45%,#fff6 0%,transparent 100%),radial-gradient(1.5px 1.5px at 30% 85%,#fff5 0%,transparent 100%),radial-gradient(2px 2px at 60% 35%,#d4af3760 0%,transparent 100%);animation:twinkle 14s infinite alternate}
@keyframes twinkle{0%{opacity:.35}50%{opacity:.55}100%{opacity:.45}}

#app{max-width:480px;margin:0 auto;position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column}

/* ── Header ── */
.page-header{padding:18px 20px 14px;padding-top:max(18px,calc(18px + env(safe-area-inset-top,0px)));text-align:center;border-bottom:1px solid var(--border);background:rgba(10,5,20,.6)}
html.theme-day .page-header{background:rgba(245,242,237,.7)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.btn-back{display:inline-flex;align-items:center;gap:5px;color:var(--gold-dim);font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;text-decoration:none}
.btn-back::before{content:'‹ '}
.btn-back:hover{color:var(--gold)}
.header-controls{display:flex;gap:8px}
.btn-icon{background:rgba(212,175,55,0.08);border:1.5px solid var(--border);color:var(--gold);border-radius:10px;padding:6px 10px;font-size:13px;cursor:pointer;font-family:'Cinzel',serif;transition:all .2s ease}
.btn-icon:hover{background:rgba(212,175,55,0.18)}
.page-title{font-family:'Cinzel',serif;font-size:21px;color:var(--gold);letter-spacing:1px;text-shadow:0 0 20px var(--gold-glow)}
html.theme-day .page-title{text-shadow:none}
.header-sub{font-size:11px;color:var(--gold-dim);letter-spacing:2.5px;text-transform:uppercase;margin-top:5px;font-weight:300}
.lang-switch{display:flex;justify-content:center;gap:6px;margin-top:10px}
.btn-lang{background:transparent;border:1.5px solid var(--border);color:var(--muted);border-radius:8px;padding:4px 10px;font-size:10.5px;font-family:'Cinzel',serif;letter-spacing:.5px;cursor:pointer;transition:all .2s ease}
.btn-lang.active{border-color:var(--gold);color:var(--gold);background:rgba(212,175,55,0.1)}

.content{flex:1;padding:16px 13px 30px}
h2{font-family:'Cinzel',serif;color:var(--gold);font-size:17px;margin-bottom:10px;text-align:center;letter-spacing:.5px}
h3{color:var(--text);font-size:14px;margin-bottom:6px;font-weight:600}
p{color:var(--text);font-size:14.5px;line-height:1.75;margin-bottom:8px}
.t-muted{color:var(--muted);font-size:12px}
.intro-card{background:var(--card);border:1.5px solid rgba(42,23,72,0.9);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
html.theme-day .intro-card{box-shadow:0 6px 18px rgba(0,0,0,.08)}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px}
.tab-btn{background:linear-gradient(145deg,#100820,#08040f);border:1.5px solid #2a174870;border-radius:13px;padding:11px 4px 9px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.3px;transition:all .2s ease}
html.theme-day .tab-btn{background:linear-gradient(145deg,#fff,#f0ebe0)}
.tab-btn .tb-ico{font-size:19px}
.tab-btn.active{border-color:var(--gold);background:linear-gradient(135deg,#2a1748,#160d30);color:var(--gold);box-shadow:0 0 12px var(--gold-glow)}
html.theme-day .tab-btn.active{background:linear-gradient(135deg,#c8974233,#a67c5233)}
.panel{display:none;animation:fadeUp .35s ease-out}
.panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border:1.5px solid rgba(42,23,72,0.9);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:0 10px 30px rgba(0,0,0,0.5);content-visibility:auto;contain-intrinsic-size:1px 500px}
html.theme-day .card{box-shadow:0 6px 18px rgba(0,0,0,.08);border-color:var(--border)}
.btn{width:100%;padding:15px;margin-top:6px;background:linear-gradient(135deg,#2a1748,#160d30);border:1.5px solid var(--gold);color:var(--gold);border-radius:12px;font-size:14.5px;font-weight:700;cursor:pointer;text-align:center;font-family:'Cinzel',serif;letter-spacing:.5px;transition:all .2s ease}
html.theme-day .btn{background:linear-gradient(135deg,#c89742,#a67c52);color:#fff}
.btn:hover{background:linear-gradient(135deg,#381f5a,#1e1040);box-shadow:0 0 20px var(--gold-glow)}
.btn:active{transform:scale(.97)}
.oracle-block{background:#0b0520;border-left:3px solid var(--gold);border-radius:0 12px 12px 0;padding:14px 16px;margin-top:14px;text-align:left;animation:fadeUp .3s ease}
html.theme-day .oracle-block{background:#fffdf8}
.oracle-block .ob-tag{font-family:'Cinzel',serif;font-size:9px;color:var(--gold-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.oracle-block .ob-name{font-family:'Cinzel',serif;font-size:15px;color:var(--gold);margin-bottom:6px;letter-spacing:.5px}
.oracle-block p{font-size:13.5px;line-height:1.7;margin:0}
.spread{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.swatch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}
.swatch{aspect-ratio:1/1;border-radius:12px;cursor:pointer;border:2px solid rgba(255,255,255,.12);display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:transform .2s ease,border-color .2s ease}
.swatch span{font-size:9px;font-family:'Cinzel',serif;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);letter-spacing:.3px}
.swatch:hover{transform:translateY(-3px)}
.swatch.active{border-color:var(--gold);box-shadow:0 0 14px var(--gold-glow)}
.ritual-box{background:#0b0518;border-radius:12px;border-left:3px solid var(--gold-dim);padding:13px 15px;margin-bottom:14px;font-size:13px;color:var(--muted);line-height:1.7}
html.theme-day .ritual-box{background:#f7f2e8}
.ritual-box strong{color:var(--gold)}
.disclaimer-note{font-size:11px;color:var(--muted);text-align:center;margin-top:6px;line-height:1.6;opacity:.85}

/* ── CARTOMANZIA EXTRA ── */
.carto-section-img,.len-section-img{width:100%;margin:14px 0 16px;border-radius:13px;overflow:hidden;border:1px solid var(--border);background:#07031a}
.carto-section-img img,.len-section-img img{width:100%;height:auto;max-height:200px;object-fit:cover;display:block;border-radius:13px}
.semi-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px 0}
.seme-card{background:#0b0520;border:1.5px solid rgba(212,175,55,0.18);border-radius:13px;padding:12px 11px;position:relative;overflow:hidden}
html.theme-day .seme-card{background:#fffdf8}
.seme-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.seme-card.cuori::before{background:linear-gradient(90deg,#7f1d1d,#ef4444,#7f1d1d)}
.seme-card.quadri::before{background:linear-gradient(90deg,#1e3a5f,#3b82f6,#1e3a5f)}
.seme-card.fiori::before{background:linear-gradient(90deg,#14532d,#4ade80,#14532d)}
.seme-card.picche::before{background:linear-gradient(90deg,#1a1a2e,#6366f1,#1a1a2e)}
.seme-ico{font-size:22px;display:block;margin-bottom:5px}
.seme-name{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:.04em;margin-bottom:4px}
.seme-area{font-size:10px;color:var(--muted);font-style:italic;margin-bottom:5px}
.seme-desc{font-size:11.5px;color:var(--text);line-height:1.55}
.figure-list{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.figura-row{display:flex;gap:11px;align-items:flex-start;background:#0b0520;border:1px solid rgba(212,175,55,0.12);border-radius:10px;padding:10px 12px}
html.theme-day .figura-row{background:#fffdf8}
.figura-ico{font-size:20px;flex-shrink:0;margin-top:1px}
.figura-name{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:.03em;margin-bottom:3px}
.figura-desc{font-size:12px;color:var(--text);line-height:1.6}
.storia-box{background:linear-gradient(145deg,rgba(42,23,72,0.5),rgba(11,5,32,0.7));border:1px solid var(--border);border-radius:12px;padding:14px 15px;margin:12px 0;position:relative}
html.theme-day .storia-box{background:linear-gradient(145deg,#f0ebe0,#ede8df)}
.storia-box::before{content:'"';position:absolute;top:6px;left:12px;font-size:44px;color:rgba(212,175,55,0.12);font-family:Georgia,serif;line-height:1}
.storia-text{font-size:13px;color:var(--text);line-height:1.85;font-style:italic;padding-left:10px}
.storia-source{font-size:10px;color:var(--muted);margin-top:6px;text-align:right;font-family:'Cinzel',serif;letter-spacing:.04em}
.metodo-steps{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.metodo-step{display:flex;gap:11px;align-items:flex-start;background:#0b0520;border:1px solid rgba(212,175,55,0.1);border-radius:10px;padding:10px 12px}
html.theme-day .metodo-step{background:#fffdf8}
.metodo-num{font-family:'Cinzel',serif;font-size:17px;color:var(--gold);font-weight:700;flex-shrink:0;min-width:24px;line-height:1}
.metodo-text{font-size:13px;color:var(--text);line-height:1.65}
.metodo-text strong{color:var(--gold)}
.section-divider{font-family:'Cinzel',serif;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid rgba(212,175,55,0.1)}
.len-cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.len-card-item{background:#0b0520;border:1px solid rgba(212,175,55,0.15);border-radius:10px;padding:9px 8px;text-align:center;cursor:default;transition:border-color .2s}
html.theme-day .len-card-item{background:#fffdf8}
.len-card-item:hover{border-color:rgba(212,175,55,0.4)}
.len-card-ico{font-size:18px;display:block;margin-bottom:4px}
.len-card-name{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);letter-spacing:.03em;display:block;margin-bottom:3px}
.len-card-key{font-size:10px;color:var(--muted);line-height:1.4}
.len-combo-list{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.len-combo-row{background:#0b0520;border-left:3px solid rgba(212,175,55,0.35);border-radius:0 10px 10px 0;padding:10px 12px}
html.theme-day .len-combo-row{background:#fffdf8}
.len-combo-title{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:.04em;margin-bottom:4px}
.len-combo-desc{font-size:12px;color:var(--text);line-height:1.6}
.len-info-badge{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(212,175,55,0.08),rgba(212,175,55,0.03));border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--gold)}
.len-info-badge-ico{font-size:17px;flex-shrink:0}

/* ── Articolo, Share, FAQ, Footer, Premium (componenti standard v3) ── */
.share-section{margin:0 0 14px}
.btn-share{width:100%;padding:13px;background:rgba(212,175,55,0.08);border:1.5px solid var(--border);color:var(--gold);border-radius:12px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:.4px}
.share-popup{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.share-btn{flex:1;min-width:90px;text-align:center;padding:9px 6px;border-radius:9px;font-size:11.5px;text-decoration:none;color:#fff;font-family:'Cinzel',serif;border:none;cursor:pointer}
.share-btn.whatsapp{background:#25d366}
.share-btn.telegram{background:#229ed9}
.share-btn.facebook{background:#1877f2}
.share-btn.twitter{background:#000}
.share-btn.copy{background:var(--purple);color:var(--gold);border:1px solid var(--gold)}
.article-section{background:var(--card);border:1.5px solid rgba(42,23,72,0.9);border-radius:var(--radius);padding:18px;margin-bottom:14px}
html.theme-day .article-section{border-color:var(--border)}
.article-section h2{margin-bottom:12px}
.article-section h3{font-family:'Cinzel',serif;color:var(--gold);font-size:14.5px;margin:14px 0 8px;letter-spacing:.3px}
.article-section img{width:100%;border-radius:14px;margin:16px 0;border:1px solid var(--border)}
.article-links{display:flex;flex-direction:column;gap:7px;margin:14px 0}
.article-links a{color:var(--gold-dim);font-size:13px;text-decoration:none;border-left:2px solid var(--gold-dim);padding-left:10px}
.article-links a:hover{color:var(--gold)}
.cta-explore{display:block;text-align:center;margin-top:14px;padding:14px;background:linear-gradient(135deg,#2a1748,#160d30);border:1.5px solid var(--gold);color:var(--gold);border-radius:12px;font-family:'Cinzel',serif;font-size:13.5px;text-decoration:none;letter-spacing:.4px}
html.theme-day .cta-explore{background:linear-gradient(135deg,#c89742,#a67c52);color:#fff}
.faq-section{margin-bottom:14px}
.faq-title{font-family:'Cinzel',serif;color:var(--gold);font-size:17px;text-align:center;margin-bottom:12px;letter-spacing:.5px}
.faq-item{background:var(--card);border:1px solid rgba(42,23,72,0.9);border-radius:12px;margin-bottom:8px;overflow:hidden}
html.theme-day .faq-item{border-color:var(--border)}
.faq-question{width:100%;text-align:left;background:none;border:none;color:var(--text);padding:13px 14px;font-size:13.5px;font-family:'Crimson Pro',Georgia,serif;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px}
.faq-icon{color:var(--gold);font-size:16px;flex-shrink:0}
.faq-answer{padding:0 14px 14px}
.faq-answer p{font-size:13px;color:var(--muted);line-height:1.7;margin:0}
.page-footer{text-align:center;padding:16px 20px calc(20px + env(safe-area-inset-bottom,0px));font-size:10.5px;color:var(--muted);border-top:1px solid #2a174840}
.footer-links{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-bottom:8px}
.footer-links a{color:var(--gold-dim);text-decoration:none}
.footer-links a:hover{color:var(--gold)}
.footer-disclaimer{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.6;opacity:.85}
.premium-modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:20px}
.premium-modal.show{display:flex}
.modal-overlay{position:absolute;inset:0;background:rgba(5,2,12,.85)}
.modal-content{position:relative;background:var(--card);border:1.5px solid var(--gold);border-radius:var(--radius);padding:24px 20px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-content h2{margin-bottom:10px}
.modal-content p{font-size:13.5px}
.premium-price{color:var(--gold);font-family:'Cinzel',serif;font-size:15px;margin:10px 0}
.btn-premium-buy{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));border:none;color:#1a0f2e;border-radius:12px;font-family:'Cinzel',serif;font-weight:700;font-size:14px;cursor:pointer;margin-top:8px}
.btn-premium-skip{width:100%;padding:10px;background:none;border:none;color:var(--muted);font-size:12.5px;cursor:pointer;margin-top:8px;text-decoration:underline}

.img-section{text-align:center;margin:20px 0 10px}
.img-section img{max-width:100%;border-radius:12px;border:1px solid var(--border);display:block;margin:0 auto}

<body>
<a href="#main-content" class="skip-link">Vai al contenuto principale</a>
<div class="cosmos" aria-hidden="true"></div>
<div id="app">

  <header class="page-header">
    <div class="header-top">
      <a href="./index.html" class="btn-back" id="btn-back"></a>
      <div class="header-controls">
        <button id="musicToggle" class="btn-icon" aria-label="Toggle musica"></button>
        <button id="themeToggle" class="btn-icon" aria-label="Toggle tema"></button>
      </div>
    </div>
    <h1 class="page-title" id="page-title">🎴 <span id="page-title-text"></span></h1>
    <div class="header-sub" id="header-sub"></div>
    <div class="lang-switch">
      <button data-lang="it" class="btn-lang active">IT</button>
      <button data-lang="en" class="btn-lang">EN</button>
      <button data-lang="es" class="btn-lang">ES</button>
    </div>
  </header>

  <main class="content" id="main-content">

    <div class="intro-card">
      <p id="intro-text" style="margin-bottom:0"></p>

angeli: {
  h1: '👼 Oracolo degli Angeli',
  img1Alt: 'Oracolo degli Angeli - mazzo di carte con messaggi angelici per guida e conforto spirituale',
  p1: 'L\'Oracolo degli Angeli è un mazzo divinatorio moderno composto da carte che racchiudono un singolo concetto-chiave — fiducia, guarigione, coraggio — accompagnato da un breve messaggio di guida. A differenza dei Tarocchi, non racconta una storia complessa: offre una risposta diretta e confortante a una domanda del cuore.',
  p2: 'Il formato che conosciamo oggi nasce negli Stati Uniti negli anni \'90, quando l\'autrice Doreen Virtue pubblicò i primi mazzi di "Angel Cards", ispirati alla tradizione popolare degli angeli custodi presente in quasi tutte le culture religiose e spirituali. Da allora il genere si è moltiplicato in decine di varianti, restando uno degli oracoli più diffusi al mondo per la sua semplicità d\'uso.',
  q1t: 'La credenza in messaggeri celesti che vegliano sull\'uomo attraversa l\'ebraismo, il cristianesimo, l\'islam e numerose tradizioni popolari europee: dagli angeli custodi medievali ai nove cori angelici descritti da Pseudo-Dionigi l\'Areopagita nel V secolo.',
  q1s: '— Tradizione angelologica occidentale',
  p3: 'È importante distinguere l\'Oracolo degli Angeli, strumento di riflessione personale e crescita interiore, dall\'Angelologia religiosa tradizionale, che cataloga formalmente 72 o più entità in gerarchie precise: il primo si rivolge all\'intuizione, la seconda alla teologia.',
  p4: 'Nella Cabala ebraica, ad esempio, gli angeli sono organizzati in dieci ordini corrispondenti alle Sefirot dell\'Albero della Vita, mentre la tradizione islamica ne riconosce alcuni con compiti specifici, come Jibril (Gabriele) portatore della rivelazione. L\'oracolo moderno non riprende questa complessità dottrinale, ma ne eredita l\'idea di fondo: l\'esistenza di una guida invisibile e benevola a cui rivolgersi nei momenti di incertezza.',
  sd2: 'Le Figure di Riferimento',
  h2: '✨ I Quattro Arcangeli Principali',
  img2Alt: 'I quattro Arcangeli - Michele, Gabriele, Raffaele e Uriel nella tradizione angelica',
  p5: 'Molti mazzi oracolari associano i propri messaggi a quattro figure arcangeliche ricorrenti nella tradizione giudaico-cristiana, ciascuna legata a un\'area simbolica precisa:',
  arc: [
    { ico:'⚔️', name:'Michele — Protezione e Coraggio', desc:'Guida nelle decisioni difficili, allontana le paure e dona la forza per affrontare ostacoli e conflitti.' },
    { ico:'📯', name:'Gabriele — Comunicazione e Nuovi Inizi', desc:'Associato agli annunci e ai messaggi importanti, aiuta a esprimere la verità e ad accogliere un cambiamento.' },
    { ico:'🌿', name:'Raffaele — Guarigione', desc:'Il suo nome significa "Dio guarisce": è invocato per il benessere fisico, emotivo e per i percorsi di recupero.' },
    { ico:'🔥', name:'Uriel — Chiarezza e Saggezza', desc:'Il suo nome significa "luce di Dio": illumina situazioni confuse e aiuta a vedere con lucidità ciò che prima sfuggiva.' }
  ],
  sd3: 'Il Metodo',
  h3: '📖 Come Interpretare il Messaggio',
  img3Alt: 'Come interpretare il messaggio dell\'Oracolo degli Angeli - guida pratica alla lettura',
  p6: 'A differenza della cartomanzia o dei Tarocchi, l\'Oracolo degli Angeli non richiede combinazioni complesse: il valore della pratica sta nella concentrazione e nell\'accoglienza del messaggio.',
  steps: [
    { t:'Formula una domanda aperta', d:'non "sì/no", ma qualcosa come "di cosa ho bisogno ora?".' },
    { t:'Fai un respiro profondo', d:'e lascia la mente libera da aspettative prima di estrarre.' },
    { t:'Estrai un solo messaggio', d:'e leggilo come un consiglio, non come una previsione fissa.' },
    { t:'Rifletti su dove, nella tua vita reale,', d:'quel concetto si applica in questo momento.' }
  ],
  hint1: 'Concentrati sulla tua domanda e lascia che il messaggio emerga.',
  btn1: '👼 Estrai un Messaggio Angelico',
  sd4: 'Approfondimento',
  h4: '🔢 I Numeri Angelici',
  p7: 'Un fenomeno strettamente legato all\'Oracolo degli Angeli è quello dei cosiddetti numeri angelici: sequenze ripetute come 11:11, 222 o 444 che molte persone notano con insistenza su orologi, targhe o ricevute. Nella pratica oracolare contemporanea, popolarizzata insieme alle carte angeliche a partire dagli anni \'90-2000, ogni sequenza viene letta come un messaggio sintetico:',
  num: [
    { ico:'1️⃣', name:'111 / 1111 — Nuovi Inizi', desc:'I tuoi pensieri si stanno manifestando rapidamente: presta attenzione a ciò su cui ti concentri.' },
    { ico:'2️⃣', name:'222 — Equilibrio e Fiducia', desc:'Sei sulla strada giusta, anche se i risultati non sono ancora visibili: continua con costanza.' },
    { ico:'4️⃣', name:'444 — Protezione', desc:'Una presenza di sostegno è vicina; è un segnale di rassicurazione nei momenti di dubbio.' },
    { ico:'7️⃣', name:'777 — Allineamento Spirituale', desc:'Stai vivendo una fase di crescita interiore in sintonia con il tuo percorso più autentico.' }
  ],
  p8: 'Che si scelga di interpretarli come sincronicità junghiana o come segnale simbolico, i numeri angelici rappresentano oggi una delle porte d\'accesso più popolari alla pratica oracolare, spesso complementare alla lettura delle carte.',
  rit1strong: 'Un consiglio pratico:',
  rit1: 'tieni un piccolo diario dei messaggi ricevuti — sia dalle carte sia dai numeri notati casualmente. Con il tempo, riconoscerai pattern personali che la lettura isolata non potrebbe rivelare.',
  sd5: 'Articolo',
  h5: '🕊️ Angelo Custode o Spirito Guida? Le Differenze',
  img5Alt: 'Angelo custode e spirito guida - le differenze tra le due figure nella tradizione spirituale',
  p9: 'Chi si avvicina per la prima volta alla pratica oracolare spesso confonde due figure che, pur simili, hanno origini e funzioni distinte: l\'angelo custode e lo spirito guida. La differenza non è solo terminologica, ma riguarda il tipo di relazione che si instaura.',
  p10: 'L\'angelo custode appartiene alla tradizione religiosa occidentale: è una presenza assegnata fin dalla nascita, non legata a esperienze terrene, il cui compito è proteggere e orientare senza mai interferire con il libero arbitrio. Lo spirito guida, concetto più diffuso nello sciamanesimo e nelle correnti New Age, può invece essere un antenato, un animale totemico o un\'entità che si manifesta in momenti diversi della vita, spesso in risposta a una fase di crescita specifica.',
  cust: [
    { ico:'🕊️', name:'Angelo Custode', desc:'Presenza costante e universale, non legata a un\'esperienza terrena, di matrice religiosa.' },
    { ico:'🐺', name:'Spirito Guida', desc:'Presenza che può cambiare nel tempo, spesso identificata con antenati, animali o maestri spirituali.' }
  ],
  p11: 'Nell\'Oracolo degli Angeli moderno i confini tra le due figure si sfumano volutamente: l\'obiettivo non è la precisione dottrinale ma offrire un punto di riferimento simbolico a cui rivolgersi. Molti praticanti scelgono semplicemente di chiamare questa presenza "la mia guida", senza necessità di etichettarla in modo rigido.',
  sd6: 'Articolo',
  h6: '🪶 I Segnali Angelici nella Vita Quotidiana',
  img6Alt: 'Segnali angelici nella vita quotidiana - piume bianche, farfalle e altri segni simbolici',
  p12: 'Oltre alle carte e ai numeri ripetuti, la tradizione oracolare contemporanea attribuisce significato a una serie di piccoli eventi quotidiani, interpretati come "segnali" di una presenza protettiva. Non si tratta di prove in senso scientifico, ma di simboli su cui la pratica riflessiva invita a soffermarsi.',
  seg: [
    { ico:'🪶', name:'Piume Bianche', desc:'Il segnale più citato nella tradizione popolare anglosassone: trovarne una nel posto e nel momento "giusto" è letto come una conferma o un saluto.' },
    { ico:'🦋', name:'Farfalle e Libellule', desc:'Associate alla trasformazione e, in molte culture, a visite simboliche di persone care che non ci sono più.' },
    { ico:'🌟', name:'Luci e Scintille Improvvise', desc:'Bagliori percepiti con la coda dell\'occhio, spesso riportati durante meditazioni o momenti di forte emozione.' },
    { ico:'🎵', name:'Canzoni "al Momento Giusto"', desc:'Una canzone significativa che riappare in un momento di dubbio, vissuta come un piccolo promemoria.' }
  ],
  p13: 'Lo scetticismo verso questi segnali è legittimo quanto la pratica stessa: la psicologia li ricondurrebbe al fenomeno dell\'apofenia, la tendenza naturale della mente a trovare schemi significativi in eventi casuali. Ciò non toglie valore all\'esperienza soggettiva: anche solo come esercizio di attenzione e presenza, notare questi segnali può avere un effetto calmante e radicante.',
  sd7: 'Articolo',
  h7: '🃏 Come Scegliere il Proprio Mazzo Angelico',
  img7Alt: 'Come scegliere il proprio mazzo di carte oracolari angeliche',
  p14: 'Esistono oggi centinaia di mazzi oracolari a tema angelico, ciascuno con uno stile illustrativo e un taglio tematico diverso: alcuni si concentrano sulla guarigione, altri sulla manifestazione, altri ancora su una specifica tradizione culturale. Una domanda frequente tra chi inizia è: come si fa a scegliere?',
  p15: 'La pratica più diffusa è affidarsi alla risposta istintiva di fronte alle immagini di copertina, piuttosto che a un confronto razionale delle caratteristiche. Questo approccio, mutuato dalla cartomanzia tradizionale, parte dal presupposto che l\'attrazione visiva immediata segnali già una sintonia personale con quel particolare set di simboli.',
  msteps: [
    { t:'Osserva diverse copertine', d:'senza leggere le descrizioni: nota quale ti attira di più a livello visivo e istintivo.' },
    { t:'Verifica il tema dichiarato', d:'dall\'autore (guarigione, amore, carriera, spiritualità generale) e confrontalo con i tuoi bisogni attuali.' },
    { t:'Considera il formato dei messaggi', d:'alcuni mazzi offrono solo una parola-chiave, altri un piccolo testo guida — scegli ciò che ti aiuta davvero a riflettere.' }
  ],
  p16: 'Non esiste un mazzo "sbagliato": ogni set di carte è semplicemente uno strumento diverso per attivare la stessa capacità, già presente in te, di ascoltare la propria intuizione.'
},
celti: {
  h1: '🌳 Oracolo dei Celti — Alfabeto Ogham',
  img1Alt: 'Alfabeto Ogham celtico - antico sistema di scrittura sacra associato agli alberi',
  p1: 'L\'Ogham (si pronuncia "óh-am") è l\'antico alfabeto sacro dei popoli celtici dell\'Irlanda e della Scozia, attestato a partire dal IV secolo d.C. su monoliti di pietra, dove le iscrizioni segnavano confini territoriali e tombe. Ogni segno è composto da linee incise lungo uno spigolo verticale — il druim — e ciascuna lettera è associata al nome di un albero o di una pianta sacra.',
  p2: 'La leggenda attribuisce l\'invenzione dell\'Ogham al dio Ogma, divinità della parola e dell\'eloquenza nella mitologia irlandese, da cui l\'alfabeto prende il nome. Era utilizzato da druidi e bardi non solo per scrivere, ma come sistema mnemonico per memorizzare leggi, genealogie e conoscenze botaniche e astronomiche, in una cultura orale che affidava poco alla scrittura.',
  q1t: 'Il Book of Ballymote, manoscritto irlandese del XIV secolo, raccoglie oltre cento varianti dell\'Ogham e ne spiega l\'uso anche come codice cifrato tra druidi, segno della sua dimensione esoterica oltre che pratica.',
  q1s: '— Tradizione manoscritta irlandese medievale',
  hint1: 'Come oracolo, l\'Ogham fu riscoperto e sistematizzato solo nel XX secolo, in particolare grazie agli studi del poeta Robert Graves ne "La Dea Bianca" (1948), che collegò ogni albero a un periodo del calendario lunare celtico.',
  sd2: 'La Struttura del Sistema',
  h2: '🌲 Le Quattro Aicme',
  img2Alt: 'Struttura dell\'alfabeto Ogham - le quattro famiglie di lettere o Aicme',
  p3: 'L\'alfabeto Ogham classico è composto da 20 lettere principali, suddivise in quattro famiglie da cinque segni chiamate Aicme ("famiglia" in gaelico antico). Una quinta serie di lettere aggiuntive, chiamata Forfeda, fu introdotta più tardi per rappresentare suoni greci e latini.',
  aicme: [
    { ico:'🌳', name:'Aicme Beithe (B-L-F-S-N)', desc:'La famiglia di Betulla: inizi, protezione, fondamenta, flessibilità, connessione.' },
    { ico:'🌳', name:'Aicme hÚatha (H-D-T-C-Q)', desc:'La famiglia del Biancospino: ostacoli, forza, equilibrio, saggezza, scelta.' },
    { ico:'🌳', name:'Aicme Muine (M-G-NG-Z-R)', desc:'La famiglia della Vite: introspezione, determinazione, direzione, sfida, trasformazione.' },
    { ico:'🌳', name:'Aicme Ailme (A-O-U-E-I)', desc:'La famiglia dell\'Abete, vocali legate a visione, raccolta, guarigione, resistenza, rinascita.' }
  ],
  p4: 'Questa organizzazione non era casuale: rifletteva la classificazione botanica celtica degli alberi in "nobili" (querce, meli) e "comuni", e il loro ruolo pratico nella vita quotidiana — costruzione, medicina, combustibile, magia.',
  sd3: 'Il Metodo',
  h3: '📖 Come Si Consulta l\'Oracolo',
  img3Alt: 'Come consultare l\'oracolo Ogham - bastoncini di legno incisi con i simboli celtici',
  p5: 'Tradizionalmente i druidi intagliavano i simboli su piccoli bastoncini di legno (feda), estratti a caso da una sacca come si farebbe oggi con le rune. Ogni albero porta con sé non solo un significato divinatorio ma anche proprietà curative ed energetiche attribuite dalla tradizione erboristica celtica.',
  steps: [
    { t:'Poni una domanda', d:'legata a un percorso di crescita, una sfida o una fase della tua vita.' },
    { t:'Estrai un simbolo', d:'e osserva a quale famiglia (Aicme) appartiene: indica l\'area generale del messaggio.' },
    { t:'Collega l\'albero alla natura', d:'pensa alle sue caratteristiche reali — radici, stagionalità, resistenza — come chiave simbolica.' },
    { t:'Lascia che il messaggio si depositi', d:'nei giorni successivi: la saggezza Ogham agisce spesso in modo lento e radicato, come un albero.' }
  ],
  hint2: 'Consulta gli Ogham per ricevere la guida dell\'albero che ti rappresenta in questo momento.',
  btn1: '🌳 Consulta gli Ogham',
  sd4: 'Articolo',
  h4: '🌙 Il Calendario Lunare degli Alberi',
  img4Alt: 'Calendario lunare degli alberi celtico - i tredici mesi associati agli alberi Ogham',
  p6: 'Una delle interpretazioni più affascinanti dell\'Ogham, proposta da Robert Graves ne "La Dea Bianca", è quella di un calendario arboreo: tredici mesi lunari, ciascuno di 28 giorni, governati da un albero diverso, a cui si aggiungono i giorni intercalari del solstizio. Questa lettura non è attestata nelle fonti celtiche antiche, ma è oggi parte integrante della pratica neopagana e oracolare contemporanea.',
  p7: 'Nel sistema proposto da Graves, il mese inizia simbolicamente con la Betulla — l\'albero dei nuovi inizi, associato al periodo successivo al solstizio d\'inverno — e si conclude con il Sambuco, legato alla fine di un ciclo e alla trasformazione. Conoscere il "tuo" albero in base alla data di nascita è diventato, per molti praticanti, un modo per leggere il proprio tema simbolico personale, in parallelo all\'astrologia solare.',
  cal: [
    { ico:'🌳', name:'Betulla — 24 dic / 20 gen', desc:'Inizio, purificazione, ripartenza dopo il buio invernale.' },
    { ico:'🌳', name:'Quercia — 10 giu / 7 lug', desc:'Forza, resistenza, il culmine dell\'energia solare estiva.' },
    { ico:'🌳', name:'Edera — 28 set / 27 ott', desc:'Tenacia, ricerca di sostegno, capacità di adattamento.' },
    { ico:'🌳', name:'Sambuco — 25 nov / 22 dic', desc:'Chiusura di un ciclo, soglia tra la fine e un nuovo inizio.' }
  ],
  hint3: 'Questa associazione resta un\'elaborazione moderna e poetica più che un dato storico documentato: il suo valore sta nella capacità di offrire una chiave simbolica accessibile, non in una presunta autenticità archeologica.',
  sd5: 'Articolo',
  h5: '📿 Druidi, Bardi e Vati: i Custodi della Sapienza Celtica',
  img5Alt: 'Druidi, bardi e vati - le tre classi sacerdotali della società celtica antica',
  p8: 'Le fonti classiche, in particolare lo storico greco Posidonio e successivamente Giulio Cesare nel "De Bello Gallico", descrivono la società celtica come strutturata attorno a tre classi di sapienti, distinte per ruolo e formazione, tutte legate alla trasmissione orale della conoscenza che l\'Ogham avrebbe poi affiancato.',
  druidi: [
    { ico:'🦌', name:'Druidi', desc:'Sacerdoti, giudici e filosofi: governavano i riti religiosi, l\'istruzione e la legge, con una formazione che secondo Cesare poteva durare fino a vent\'anni.' },
    { ico:'🎶', name:'Bardi', desc:'Poeti e musicisti, custodi della memoria storica e genealogica attraverso il canto e la composizione orale.' },
    { ico:'🔮', name:'Vati (Filid)', desc:'Specialisti della divinazione e della profezia, spesso associati a pratiche oracolari come l\'osservazione del volo degli uccelli.' }
  ],
  p9: 'Con la cristianizzazione dell\'Irlanda a partire dal V secolo, queste figure non scomparvero del tutto: molte conoscenze druidiche confluirono nella figura del monaco-bardo medievale, che ricopiò proprio nei manoscritti come il già citato Book of Ballymote le tradizioni Ogham, permettendone la sopravvivenza fino a oggi.',
  sd6: 'Articolo',
  h6: '🌲 Gli Alberi Sacri nella Mitologia Celtica',
  img6Alt: 'Alberi sacri nella mitologia celtica - querce, noccioli e tassi nei boschi rituali',

specchio: {
  h1: '🪞 Specchio Nero',
  img1Alt: 'Specchio nero per lo scrying - pratica divinatoria di osservazione contemplativa',
  p1: 'Lo scrying con lo specchio nero è una delle pratiche divinatorie più antiche e diffuse al mondo: si osserva una superficie scura e riflettente lasciando che la mente entri in uno stato contemplativo, finché non emergono forme, ombre o impressioni simboliche da interpretare. Il termine deriva dall\'inglese to descry, "scorgere", "distinguere a fatica".',
  p2: 'La pratica ha radici antichissime: gli specchi in ossidiana venivano usati dagli Aztechi già nel XV secolo, mentre in Europa lo scrying con superfici scure — acqua, inchiostro, cristalli affumicati — è documentato fin dall\'antichità classica. Il caso più celebre è quello dell\'astrologo elisabettiano John Dee, che nel XVI secolo utilizzava uno specchio di ossidiana per le sue sedute divinatorie alla corte di Elisabetta I d\'Inghilterra.',
  q1t: 'Lo specchio di John Dee, oggi conservato al British Museum, è ricavato da un singolo blocco di ossidiana levigata di origine messicana, probabilmente portato in Europa al ritorno dei conquistadores.',
  q1s: '— Storia dello scrying occidentale, XVI sec.',
  p3: 'Lo scrying non si limita allo specchio nero: nella storia della divinazione la stessa tecnica contemplativa è stata applicata a sfere di cristallo, pozze d\'acqua scura, inchiostro versato su un piatto (la lecanomanzia babilonese) e persino fiamme di candela. Il principio comune è sempre lo stesso: una superficie priva di dettagli definiti diventa uno "schermo" su cui la mente proietta immagini provenienti dall\'intuizione e dal subconscio, un processo che la psicologia moderna avvicina al fenomeno della pareidolia guidata dallo stato meditativo.',
  sd2: 'Il Rituale',
  h2: '🕯️ Come Si Pratica lo Scrying',
  img2Alt: 'Rituale dello specchio nero - candela e ambiente buio per la pratica dello scrying',
  p4: 'A differenza della cartomanzia, lo scrying non lavora con simboli fissi: ogni immagine percepita va interpretata in base al contesto personale e alla domanda posta, più come un sogno a occhi aperti che come un sistema codificato.',
  steps: [
    { t:'Siediti al buio', d:'con una sola candela accesa dietro le spalle, mai davanti, per evitare riflessi diretti sulla superficie.' },
    { t:'Posiziona lo specchio', d:'davanti a te a distanza di un braccio e respira lentamente per alcuni minuti.' },
    { t:'Non fissare un punto preciso', d:'lascia che lo sguardo si rilassi, quasi sfocato, senza forzare la visione.' },
    { t:'Nota la prima immagine o sensazione', d:'che emerge, senza analizzarla subito: scrivila solo dopo aver concluso.' }
  ],
  rit1strong: 'Attenzione:',
  rit1: '10-15 minuti per seduta sono sufficienti. Una leggera sensazione di "assenza" o lieve capogiro è normale all\'inizio; se compare disagio, interrompi e riprendi un\'altra volta.',
  btn1: '🪞 Guarda nello Specchio',
  sd3: 'Approfondimento',
  h3: '🔮 Superfici, Materiali e Precauzioni',
  p5: 'Non esiste un unico "specchio nero corretto": nel corso della storia sono stati impiegati materiali diversi, ciascuno con una qualità energetica leggermente differente secondo la tradizione esoterica.',
  sup: [
    { ico:'⚫', name:'Ossidiana', desc:'Vetro vulcanico naturale, associato a protezione e verità: il materiale dello specchio di John Dee.' },
    { ico:'🖼️', name:'Vetro Annerito', desc:'Una cornice di vetro dipinta di nero sul retro: la versione più diffusa e accessibile.' },
    { ico:'💧', name:'Acqua Scura', desc:'Una ciotola scura riempita d\'acqua o inchiostro: variante più antica, detta idromanzia.' },
    { ico:'💎', name:'Cristallo Affumicato', desc:'Quarzo o ametista scura, scelta per la lettura energetica più sottile e prolungata.' }

  p6: 'Indipendentemente dal materiale, la pratica costante è più importante della "qualità" dello strumento: le prime sedute spesso non producono visioni nitide, e questo è del tutto normale. Lo scrying è una capacità che si affina nel tempo, come un muscolo percettivo.',
  rit2strong: 'Per chi è sconsigliato:',
  rit2: 'chi soffre di epilessia fotosensibile, disturbi dissociativi o ansia legata a stati alterati di coscienza dovrebbe evitare sedute prolungate o praticarle solo con la supervisione di un professionista.'

cromomanzia: {
  h1: '🎨 Cromomanzia',

  p1: 'La cromomanzia interpreta i colori come messaggeri energetici: il colore che ti attrae istintivamente in un dato momento rivela uno stato interiore o un\'energia di cui hai bisogno. È una delle forme di divinazione più immediate, perché non richiede simboli da memorizzare ma solo l\'ascolto di una reazione spontanea.',
  p2: 'Il legame tra colore e significato simbolico affonda le radici nell\'antico Egitto, dove i sacerdoti usavano camere colorate per scopi terapeutici, e si ritrova nella tradizione indiana dei chakra, i centri energetici del corpo associati ciascuno a un colore specifico. In epoca moderna, la cromoterapia e la psicologia del colore — penso agli studi di Goethe sulla teoria dei colori nel XIX secolo — hanno dato nuova base a queste antiche intuizioni.',
  q1t: 'Ogni colore vibra a una propria frequenza e produce un effetto preciso sullo stato mentale ed emotivo: una corrispondenza che la tradizione esoterica conosceva intuitivamente molto prima della fisica delle onde luminose.',
  q1s: '— Tradizione della cromoterapia simbolica',
  p3: 'Anche le grandi tradizioni spirituali orientali hanno costruito sistemi complessi attorno al colore: nello Yoga e nell\'Ayurveda i sette chakra principali — dal rosso del Muladhara alla base della colonna fino al violetto del Sahasrara sulla sommità del capo — formano una scala cromatica che rispecchia l\'intera mappa energetica del corpo. La cromomanzia che pratichi qui ne è una versione semplificata e accessibile, pensata per un check-in rapido sul proprio stato interiore.',

  p11: 'Accanto alla lettura simbolica e intuitiva, esiste un filone di ricerca scientifica che studia l\'effetto reale dei colori su emozioni, percezione e persino comportamento. Il primo studio sistematico è quello di Johann Wolfgang von Goethe, che nel 1810 pubblicò "La Teoria dei Colori", proponendo una classificazione basata sull\'effetto psicologico più che sulla fisica della luce, in aperta polemica con Newton.',

lenormand: {
  h1: '🍀 Lenormand Oracle',
  img1Alt: 'Lenormand deck - the 36 cards of Marie Anne Lenormand\'s oracle',
  p1: 'Lenormand is a 36-card oracle system born in 18th-century Europe, still hugely popular today in France, Germany, Switzerland and Eastern Europe. The name comes from Marie Anne Lenormand (1772–1843), Europe\'s most famous fortune-teller: consulted by Napoleon Bonaparte, Joséphine de Beauharnais, Alexander I of Russia and Empress Joséphine.',
  p2: 'The deck we now call "Lenormand" — also known as Petit Lenormand or Das Spiel der Hoffnung ("The Game of Hope") — was actually published in Germany in 1799, when Marie Anne was just 27. Her name was attached to it only after her death in 1843, to capitalize on the seer\'s legendary fame.',
  q1t: 'Marie Anne Lenormand was tried and imprisoned more than once for her prophecies, deemed dangerous by Napoleonic regimes. Yet she kept reading cards for decades, becoming the most influential figure in modern European cartomancy.',
  q1s: '— History of European cartomancy, 18th-19th c.',
  hint1: 'Draw three cards for a Situation · Influence · Outcome reading.',
  btn1: '🍀 Draw 3 Cards',
  sd2: 'Lenormand vs Tarot',

  p4: 'Lenormand has no Major or Minor Arcana: all 36 cards carry equal weight. Symbols are real-world objects — a house, a letter, a dog — read concretely. The Coffin doesn\'t mean death but the end of a cycle; the Fox isn\'t evil but necessary cunning.',

angeli: {
  h1: '👼 Angel Oracle',
  img1Alt: 'Angel Oracle - deck of cards with angelic messages for guidance and spiritual comfort',
  p1: 'The Angel Oracle is a modern divinatory deck made of cards holding a single key concept — trust, healing, courage — paired with a short guiding message. Unlike Tarot, it doesn\'t tell a complex story: it offers a direct, comforting answer to a question of the heart.',
  p2: 'The format we know today was born in the United States in the 1990s, when author Doreen Virtue published the first "Angel Cards" decks, inspired by the popular tradition of guardian angels found in nearly every religious and spiritual culture. Since then the genre has multiplied into dozens of variants, remaining one of the world\'s most widespread oracles thanks to its simplicity.',
  q1t: 'Belief in celestial messengers watching over humanity spans Judaism, Christianity, Islam and countless European folk traditions: from medieval guardian angels to the nine angelic choirs described by Pseudo-Dionysius the Areopagite in the 5th century.',
  q1s: '— Western angelological tradition',
  p3: 'It\'s worth distinguishing the Angel Oracle, a tool for personal reflection and inner growth, from traditional religious angelology, which formally catalogs 72 or more entities in precise hierarchies: the former speaks to intuition, the latter to theology.',
  p4: 'In Jewish Kabbalah, for instance, angels are organized into ten orders matching the Sefirot of the Tree of Life, while Islamic tradition recognizes some with specific tasks, such as Jibril (Gabriel), bearer of revelation. The modern oracle doesn\'t adopt this doctrinal complexity, but inherits its core idea: an invisible, benevolent guide to turn to in moments of uncertainty.',
  sd2: 'The Reference Figures',
  h2: '✨ The Four Main Archangels',
  img2Alt: 'The four Archangels - Michael, Gabriel, Raphael and Uriel in angelic tradition',
  p5: 'Many oracle decks link their messages to four recurring archangelic figures from Judeo-Christian tradition, each tied to a precise symbolic area:',
  arc: [
    { ico:'⚔️', name:'Michael — Protection and Courage', desc:'Guides difficult decisions, dispels fears and gives strength to face obstacles and conflicts.' },
    { ico:'📯', name:'Gabriel — Communication and New Beginnings', desc:'Linked to announcements and important messages, helps express truth and welcome change.' },
    { ico:'🌿', name:'Raphael — Healing', desc:'His name means "God heals": invoked for physical and emotional wellbeing and recovery paths.' },
    { ico:'🔥', name:'Uriel — Clarity and Wisdom', desc:'His name means "light of God": illuminates confused situations and helps see clearly what was previously hidden.' }
  ],
  sd3: 'The Method',
  h3: '📖 How to Interpret the Message',
  img3Alt: 'How to interpret the Angel Oracle message - a practical reading guide',
  p6: 'Unlike cartomancy or Tarot, the Angel Oracle doesn\'t require complex combinations: the value of the practice lies in focus and openness to the message.',
  steps: [
    { t:'Ask an open question', d:'not "yes/no", but something like "what do I need right now?".' },
    { t:'Take a deep breath', d:'and clear your mind of expectations before drawing.' },
    { t:'Draw a single message', d:'and read it as advice, not a fixed prediction.' },
    { t:'Reflect on where, in your real life,', d:'that concept applies right now.' }
  ],
  hint1: 'Focus on your question and let the message emerge.',
  btn1: '👼 Draw an Angelic Message',
  sd4: 'Deep Dive',
  h4: '🔢 Angel Numbers',
  p7: 'A phenomenon closely tied to the Angel Oracle is that of so-called angel numbers: repeated sequences like 11:11, 222 or 444 that many people notice persistently on clocks, plates or receipts. In contemporary oracular practice, popularized alongside angel cards from the 1990s-2000s, each sequence is read as a compact message:',
  num: [
    { ico:'1️⃣', name:'111 / 1111 — New Beginnings', desc:'Your thoughts are manifesting quickly: pay attention to what you focus on.' },
    { ico:'2️⃣', name:'222 — Balance and Trust', desc:'You\'re on the right path, even if results aren\'t visible yet: keep going steadily.' },
    { ico:'4️⃣', name:'444 — Protection', desc:'A supportive presence is near; a reassuring sign in moments of doubt.' },
    { ico:'7️⃣', name:'777 — Spiritual Alignment', desc:'You\'re going through a phase of inner growth in tune with your most authentic path.' }
  ],
  p8: 'Whether read as Jungian synchronicity or a symbolic sign, angel numbers are today one of the most popular gateways to oracular practice, often complementing card readings.',
  rit1strong: 'A practical tip:',
  rit1: 'keep a small journal of the messages you receive — from cards and from numbers noticed at random. Over time you\'ll recognize personal patterns that an isolated reading couldn\'t reveal.',
  sd5: 'Article',
  h5: '🕊️ Guardian Angel or Spirit Guide? The Differences',
  img5Alt: 'Guardian angel and spirit guide - the differences between the two figures in spiritual tradition',
  p9: 'Newcomers to oracular practice often confuse two similar but distinct figures: the guardian angel and the spirit guide. The difference isn\'t just terminological, but concerns the kind of relationship formed.',
  p10: 'The guardian angel belongs to Western religious tradition: a presence assigned from birth, unrelated to earthly experience, whose task is to protect and guide without ever interfering with free will. The spirit guide, a concept more common in shamanism and New Age currents, can instead be an ancestor, a totem animal, or an entity that appears at different life stages, often in response to a specific phase of growth.',
  cust: [
    { ico:'🕊️', name:'Guardian Angel', desc:'A constant, universal presence, unrelated to earthly experience, of religious origin.' },
    { ico:'🐺', name:'Spirit Guide', desc:'A presence that can change over time, often identified with ancestors, animals or spiritual teachers.' }
  ],
  p11: 'In the modern Angel Oracle the boundaries between the two figures blur deliberately: the goal isn\'t doctrinal precision but offering a symbolic point of reference. Many practitioners simply call this presence "my guide", with no need for a rigid label.',
  sd6: 'Article',
  h6: '🪶 Angelic Signs in Everyday Life',
  img6Alt: 'Angelic signs in everyday life - white feathers, butterflies and other symbolic signs',
  p12: 'Beyond cards and repeated numbers, contemporary oracular tradition attributes meaning to a series of small everyday events, read as "signs" of a protective presence. These aren\'t proofs in a scientific sense, but symbols that reflective practice invites us to notice.',
  seg: [
    { ico:'🪶', name:'White Feathers', desc:'The most cited sign in Anglo-Saxon folk tradition: finding one in the "right" place and moment is read as a confirmation or greeting.' },
    { ico:'🦋', name:'Butterflies and Dragonflies', desc:'Associated with transformation and, in many cultures, symbolic visits from loved ones who have passed.' },
    { ico:'🌟', name:'Sudden Lights and Sparkles', desc:'Glimmers caught from the corner of the eye, often reported during meditation or moments of strong emotion.' },
    { ico:'🎵', name:'Songs "at the Right Moment"', desc:'A meaningful song that reappears during a moment of doubt, felt as a small reminder.' }
  ],
  p13: 'Skepticism toward these signs is as legitimate as the practice itself: psychology would trace them to apophenia, the mind\'s natural tendency to find meaningful patterns in random events. That doesn\'t diminish the subjective experience: even as an exercise in attention and presence, noticing these signs can have a calming, grounding effect.',
  sd7: 'Article',
  h7: '🃏 How to Choose Your Angel Deck',
  img7Alt: 'How to choose your own angelic oracle card deck',
  p14: 'Hundreds of angel-themed oracle decks exist today, each with its own illustrative style and thematic focus: some center on healing, others on manifestation, others on a specific cultural tradition. A common question for beginners is: how do I choose?',
  p15: 'The most common practice is to trust your instinctive reaction to the cover images rather than a rational comparison of features. This approach, borrowed from traditional cartomancy, assumes that immediate visual attraction already signals a personal resonance with that particular set of symbols.',
  msteps: [
    { t:'Look at several covers', d:'without reading descriptions: notice which one draws you in visually and instinctively.' },
    { t:'Check the stated theme', d:'from the author (healing, love, career, general spirituality) and compare it with your current needs.' },
    { t:'Consider the message format', d:'some decks offer just a keyword, others a short guiding text — choose what genuinely helps you reflect.' }
  ],
  p16: 'There\'s no "wrong" deck: each set of cards is simply a different tool for activating the same ability, already present within you, to listen to your own intuition.'
},
celti: {
  h1: '🌳 Celtic Oracle — Ogham Alphabet',
  img1Alt: 'Celtic Ogham alphabet - ancient sacred writing system linked to trees',
  p1: 'Ogham (pronounced "oh-am") is the ancient sacred alphabet of the Celtic peoples of Ireland and Scotland, attested from the 4th century AD on stone monoliths, where inscriptions marked territorial boundaries and tombs. Each sign consists of lines carved along a vertical edge — the druim — and each letter is tied to the name of a sacred tree or plant.',
  p2: 'Legend attributes the invention of Ogham to the god Ogma, deity of speech and eloquence in Irish mythology, from whom the alphabet takes its name. It was used by druids and bards not only for writing but as a mnemonic system for memorizing laws, genealogies, botanical and astronomical knowledge, within an oral culture that relied little on writing.',
  q1t: 'The Book of Ballymote, a 14th-century Irish manuscript, records over a hundred variants of Ogham and explains its use even as a cipher among druids, evidence of its esoteric as well as practical dimension.',
  q1s: '— Medieval Irish manuscript tradition',
  hint1: 'As an oracle, Ogham was only rediscovered and systematized in the 20th century, notably through the studies of poet Robert Graves in "The White Goddess" (1948), who linked each tree to a period of the Celtic lunar calendar.',
  sd2: 'The Structure of the System',
  h2: '🌲 The Four Aicme',
  img2Alt: 'Structure of the Ogham alphabet - the four letter families or Aicme',
  p3: 'The classical Ogham alphabet consists of 20 main letters, divided into four families of five signs called Aicme ("family" in Old Gaelic). A fifth series of additional letters, called Forfeda, was introduced later to represent Greek and Latin sounds.',
  aicme: [
    { ico:'🌳', name:'Aicme Beithe (B-L-F-S-N)', desc:'The Birch family: beginnings, protection, foundations, flexibility, connection.' },
    { ico:'🌳', name:'Aicme hÚatha (H-D-T-C-Q)', desc:'The Hawthorn family: obstacles, strength, balance, wisdom, choice.' },
    { ico:'🌳', name:'Aicme Muine (M-G-NG-Z-R)', desc:'The Vine family: introspection, determination, direction, challenge, transformation.' },
    { ico:'🌳', name:'Aicme Ailme (A-O-U-E-I)', desc:'The Fir family, vowels linked to vision, harvest, healing, resilience, rebirth.' }
  ],
  p4: 'This organization was no accident: it reflected the Celtic botanical classification of trees into "noble" (oaks, apples) and "common," and their practical role in daily life — construction, medicine, fuel, magic.',
  sd3: 'The Method',
  h3: '📖 How to Consult the Oracle',
  img3Alt: 'How to consult the Ogham oracle - carved wooden sticks with Celtic symbols',
  p5: 'Traditionally druids carved symbols onto small wooden sticks (feda), drawn at random from a pouch much as one would use runes today. Each tree carries not only a divinatory meaning but also healing and energetic properties assigned by Celtic herbal tradition.',
  steps: [
    { t:'Pose a question', d:'related to a growth path, a challenge, or a phase of your life.' },
    { t:'Draw a symbol', d:'and note which family (Aicme) it belongs to: it indicates the general area of the message.' },
    { t:'Connect the tree to nature', d:'think about its real traits — roots, seasonality, resilience — as a symbolic key.' },
    { t:'Let the message settle', d:'over the following days: Ogham wisdom often works slowly and deeply, like a tree.' }
  ],
  hint2: 'Consult the Ogham to receive guidance from the tree that represents you at this moment.',
  btn1: '🌳 Consult the Ogham',
  sd4: 'Article',
  h4: '🌙 The Lunar Tree Calendar',
  img4Alt: 'Celtic lunar tree calendar - the thirteen months associated with Ogham trees',
  p6: 'One of the most fascinating interpretations of Ogham, proposed by Robert Graves in "The White Goddess," is that of a tree calendar: thirteen lunar months of 28 days each, each ruled by a different tree, with intercalary solstice days added. This reading isn\'t attested in ancient Celtic sources, but is today part and parcel of neopagan and contemporary oracular practice.',
  p7: 'In Graves\'s system, the month symbolically begins with Birch — the tree of new beginnings, tied to the period after the winter solstice — and ends with Elder, linked to the close of a cycle and transformation. Knowing "your" tree based on your birth date has become, for many practitioners, a way of reading their own personal symbolic chart, paralleling solar astrology.',
  cal: [
    { ico:'🌳', name:'Birch — Dec 24 / Jan 20', desc:'Beginning, purification, a fresh start after winter darkness.' },
    { ico:'🌳', name:'Oak — Jun 10 / Jul 7', desc:'Strength, resilience, the peak of summer solar energy.' },
    { ico:'🌳', name:'Ivy — Sep 28 / Oct 27', desc:'Tenacity, seeking support, adaptability.' },
    { ico:'🌳', name:'Elder — Nov 25 / Dec 22', desc:'The close of a cycle, a threshold between ending and new beginning.' }
  ],
  hint3: 'This association remains a modern, poetic elaboration rather than documented historical fact: its value lies in offering an accessible symbolic key, not a claimed archaeological authenticity.',
  sd5: 'Article',
  h5: '📿 Druids, Bards and Seers: Keepers of Celtic Wisdom',
  img5Alt: 'Druids, bards and seers - the three priestly classes of ancient Celtic society',
  p8: 'Classical sources, notably the Greek historian Posidonius and later Julius Caesar in "De Bello Gallico," describe Celtic society as structured around three classes of learned figures, distinct in role and training, all tied to the oral transmission of knowledge that Ogham would later support.',
  druidi: [
    { ico:'🦌', name:'Druids', desc:'Priests, judges and philosophers: they oversaw religious rites, education and law, with training that according to Caesar could last up to twenty years.' },
    { ico:'🎶', name:'Bards', desc:'Poets and musicians, keepers of historical and genealogical memory through song and oral composition.' },
    { ico:'🔮', name:'Seers (Filid)', desc:'Specialists in divination and prophecy, often associated with oracular practices such as observing the flight of birds.' }
  ],
  p9: 'With the Christianization of Ireland from the 5th century, these figures didn\'t vanish entirely: much druidic knowledge flowed into the figure of the medieval monk-bard, who copied Ogham traditions into manuscripts such as the aforementioned Book of Ballymote, allowing their survival to this day.',
  sd6: 'Article',
  h6: '🌲 Sacred Trees in Celtic Mythology',
  img6Alt: 'Sacred trees in Celtic mythology - oaks, hazels and yews in ritual groves',
  p10: 'For the Celts the forest wasn\'t mere backdrop, but a place inhabited by presences: sacred groves, called nemeton, were the ritual spaces par excellence, often free of structures because the trees themselves were believed to house the sacred. Certain species recur with particular insistence in myth and ritual practice.',
  p11: 'The oak was likely the most revered tree: the very word "druid" has been linked by some philologists to the Indo-European root for "oak" (drus), though the etymology remains debated. Hazel was associated with wisdom: in the Irish legend of the Salmon of Knowledge, the sacred fish fed on hazelnuts that fell into a magic well, absorbing all the world\'s knowledge. The yew, living for thousands of years, was the preeminent symbol of eternity and was often planted at burial sites.',
  q2t: 'Whoever eats even a piece of the Salmon of Knowledge, fed by the nine hazelnuts of the sacred well, gains all the wisdom of the world: so tells one of the founding legends of Irish tradition.',
  q2s: '— Irish mythology, Fenian Cycle',
  hint4: 'This deep bond between tree, wisdom and sacredness is the cultural root from which the whole Ogham system springs: not a simple alphabetic code, but a true symbolic map of the natural world.'
},
specchio: {
  h1: '🪞 Black Mirror',
  img1Alt: 'Black mirror for scrying - a contemplative divinatory practice',
  p1: 'Black mirror scrying is one of the oldest and most widespread divinatory practices in the world: gazing at a dark reflective surface, letting the mind enter a contemplative state, until shapes, shadows or symbolic impressions emerge for interpretation. The term comes from the English "to descry," meaning to glimpse or make out with difficulty.',
  p2: 'The practice has ancient roots: obsidian mirrors were used by the Aztecs as early as the 15th century, while in Europe scrying with dark surfaces — water, ink, smoked crystals — is documented since classical antiquity. The most famous case is Elizabethan astrologer John Dee, who in the 16th century used an obsidian mirror for his divinatory sessions at the court of Elizabeth I of England.',
  q1t: 'John Dee\'s mirror, now held at the British Museum, is carved from a single block of polished obsidian of Mexican origin, likely brought to Europe by returning conquistadors.',
  q1s: '— History of Western scrying, 16th c.',
  p3: 'Scrying isn\'t limited to the black mirror: throughout the history of divination the same contemplative technique has been applied to crystal balls, dark pools of water, ink poured onto a plate (Babylonian lecanomancy), and even candle flames. The common principle is always the same: a surface free of defined detail becomes a "screen" onto which the mind projects images drawn from intuition and the subconscious, a process modern psychology likens to pareidolia guided by a meditative state.',
  sd2: 'The Ritual',
  h2: '🕯️ How to Practice Scrying',
  img2Alt: 'Black mirror ritual - candle and dark room for the scrying practice',
  p4: 'Unlike cartomancy, scrying doesn\'t work with fixed symbols: every perceived image must be interpreted based on personal context and the question asked, more like an open-eyed dream than a coded system.',
  steps: [
    { t:'Sit in darkness', d:'with a single candle lit behind you, never in front, to avoid direct reflections on the surface.' },
    { t:'Place the mirror', d:'in front of you, an arm\'s length away, and breathe slowly for a few minutes.' },
    { t:'Don\'t fix on a single point', d:'let your gaze relax, almost unfocused, without forcing your vision.' },
    { t:'Note the first image or sensation', d:'that emerges, without analyzing it right away: write it down only once you\'ve finished.' }
  ],
  rit1strong: 'Caution:',
  rit1: '10-15 minutes per session is enough. A mild feeling of "absence" or slight dizziness is normal at first; if discomfort appears, stop and try another time.',
  btn1: '🪞 Gaze into the Mirror',
  sd3: 'Deep Dive',
  h3: '🔮 Surfaces, Materials and Precautions',
  p5: 'There\'s no single "correct" black mirror: throughout history different materials have been used, each with a slightly different energetic quality according to esoteric tradition.',
  sup: [

  artTitle: 'Divinación Alternativa: Seis Oráculos Comparados entre Historia y Práctica',
  artH2: 'Por Qué Existen Tantos Sistemas Oraculares Diferentes',
  artH3: 'Cómo Elegir el Oráculo Más Adecuado para Ti',
  artP1: 'Junto al Tarot y las Runas, la historia de la divinación ha producido decenas de sistemas simbólicos distintos, cada uno nacido en un contexto cultural específico y capaz de responder a un tipo particular de pregunta. La cartomancia con cartas comunes hunde sus raíces en la Europa del siglo XIV, cuando los mazos llegados de Asia por las rutas comerciales se convirtieron pronto en herramientas para leer el destino en cortes y plazas. El Lenormand, codificado en Alemania en 1799 y luego asociado a la legendaria cartomante francesa Marie Anne Lenormand, continúa esta tradición con un lenguaje más directo y narrativo, hecho de objetos cotidianos fácilmente reconocibles.',
  artP2: 'El Oráculo de los Ángeles representa en cambio una tradición más reciente, nacida en Estados Unidos en los años noventa pero capaz de recurrir a una sensibilidad religiosa antiquísima, común al judaísmo, al cristianismo y al islam: la de una presencia protectora invisible que acompaña al ser humano en los momentos difíciles. El Ogham celta, por el contrario, mira al pasado remoto: nacido como alfabeto sagrado de los druidas hacia el siglo IV, fue redescubierto como herramienta oracular solo en el siglo XX gracias a los estudios del poeta Robert Graves, que lo convirtió en un verdadero calendario simbólico ligado a los árboles.',
  artP3: 'El Espejo Negro y la Cromomancia completan el cuadro con dos enfoques complementarios: el primero trabaja con imágenes libres, en un estado contemplativo que recuerda a la meditación con los ojos abiertos; la segunda trabaja con colores, aprovechando una reacción instintiva e inmediata que no requiere memorizar ningún símbolo. Ambos demuestran cómo la divinación, en sus formas más diversas, comparte siempre el mismo mecanismo psicológico de fondo: ofrecer a la mente un estímulo ambiguo sobre el que proyectar intuiciones, deseos y temores que a menudo permanecen inexpresados en la vida cotidiana.',
  artP4: 'Elegir entre estos seis sistemas no significa establecer cuál es "el mejor", sino reconocer qué lenguaje simbólico resuena más con tu propia forma de pensar. Quien busca respuestas concretas sobre trabajo, dinero y relaciones encontrará en el Lenormand un aliado directo y práctico. Quien busca consuelo emocional y un punto de referencia interior se sentirá más cómodo con el Oráculo de los Ángeles. Quien ama la profundidad histórica y la conexión con la naturaleza podrá profundizar en el Ogham celta, mientras que quien prefiere un enfoque más libre y meditativo encontrará en el Espejo Negro y la Cromomancia las herramientas más inmediatas.',
  artP5: 'Siempre hay que recordar que ninguno de estos sistemas sustituye una consulta médica, legal o financiera profesional: su función es de entretenimiento, reflexión personal y auto-escucha, no de predicción certera del futuro. Usados con esta consciencia, los oráculos alternativos se convierten en un valioso ejercicio de atención interior, capaz de devolver, lectura tras lectura, un mapa cada vez más preciso de los propios deseos y temores.',
  artImgAlt: 'Seis oráculos alternativos comparados: cartomancia, Lenormand, ángeles, Ogham, espejo negro y cromomancia',
  faq: [
    { q: '¿Cuál es la diferencia entre cartomancia y tarot?', a: 'La cartomancia usa las 52 cartas comunes, nacidas en Asia y difundidas en Europa desde el siglo XIV como herramienta divinatoria popular. El Tarot tiene 78 cartas con Arcanos Mayores y Menores y se convierte en herramienta esotérica solo en el siglo XVIII. La cartomancia es más directa y concreta en las respuestas; el Tarot ofrece una simbología más rica y arquetípica, útil para preguntas introspectivas. Puedes profundizar en ambos sistemas en nuestra guía dedicada al Tarot.' },
    { q: '¿Cómo se interpreta una lectura de tres cartas Pasado-Presente-Futuro?', a: 'Tras barajar el mazo concentrándote en la pregunta, extrae tres cartas y colócalas de izquierda a derecha. La primera representa el origen de la situación, la segunda el estado actual, la tercera la dirección probable si nada cambia. Observa siempre el palo o símbolo dominante: si dos de tres cartas comparten la misma área temática, esa esfera de la vida es central en la lectura.' },
    { q: '¿Quién fue Marie Anne Lenormand y por qué el mazo lleva su nombre?', a: 'Marie Anne Lenormand (1772-1843) fue la cartomante más influyente de la historia europea, consultada por Napoleón Bonaparte, Josefina de Beauharnais y Alejandro I de Rusia. El mazo de 36 cartas que hoy lleva su nombre se publicó en realidad en Alemania en 1799, cuando ella tenía 27 años; la asociación con su nombre se produjo solo tras su muerte, para aprovechar su fama legendaria.' },
    { q: '¿Tiene el Oráculo de los Ángeles bases religiosas oficiales?', a: 'No: el Oráculo de los Ángeles moderno es una herramienta de reflexión personal nacida en los años noventa, inspirada en la creencia popular en los ángeles custodios presente en el judaísmo, el cristianismo y el islam, pero sin pretensión de rigor teológico. Es distinto de la angelología religiosa tradicional, que cataloga formalmente decenas de entidades en jerarquías precisas.' },
    { q: '¿Es peligroso practicar el scrying con espejo negro?', a: 'Para la mayoría de las personas es una práctica contemplativa segura, similar a una meditación con los ojos abiertos, si se realiza durante 10-15 minutos por sesión. Quienes sufren epilepsia fotosensible, trastornos disociativos o ansiedad ligada a estados alterados de consciencia deberían evitar sesiones prolongadas o practicarlas solo con supervisión profesional.' },
    { q: '¿Puedo elegir el color en lugar de extraerlo al azar en la cromomancia?', a: 'Sí, ambos enfoques son válidos en la tradición cromomántica. Elegir conscientemente el color que te atrae en un momento dado se considera tan significativo como una extracción al azar, porque también el instinto visual nace de un estado interior real que merece ser escuchado.' }

  p1: 'El Lenormand es un sistema oracular de 36 cartas nacido en la Europa del siglo XVIII, muy popular aún hoy en Francia, Alemania, Suiza y los países del Este. El nombre viene de Marie Anne Lenormand (1772–1843), la cartomante más famosa de la historia europea: consultada por Napoleón Bonaparte, Josefina de Beauharnais, Alejandro I de Rusia y la emperatriz Josefina.',
  p2: 'En realidad el mazo que hoy llamamos "Lenormand" — conocido también como Petit Lenormand o Das Spiel der Hoffnung ("El Juego de la Esperanza") — se publicó en Alemania en 1799, cuando Marie Anne tenía solo 27 años. Su nombre se asoció al mazo solo póstumamente, tras su muerte en 1843, para aprovechar la fama legendaria de la vidente.',
  q1t: 'Marie Anne Lenormand fue juzgada y encarcelada varias veces por sus profecías, consideradas peligrosas por los regímenes napoleónicos. Sin embargo, siguió leyendo las cartas durante décadas, convirtiéndose en la figura más influyente de la cartomancia europea moderna.',
  q1s: '— Historia de la cartomancia europea, siglos XVIII-XIX',
  hint1: 'Extrae tres cartas para una lectura Situación · Influencia · Resultado.',
  btn1: '🍀 Extraer 3 Cartas',
  sd2: 'Lenormand vs Tarot',
  h2: '⚖️ Cómo Se Diferencia del Tarot',
  img2Alt: 'Mazo Lenormand completo - comparación entre Lenormand y Tarot',
  badge: 'El Lenormand usa 36 cartas con símbolos concretos. El Tarot tiene 78 con arquetipos universales.',
  p3: 'La diferencia fundamental no es solo numérica. El Lenormand es un oráculo directo y narrativo: las cartas se combinan entre sí como palabras en una frase, creando significados que van más allá del símbolo individual. El Tarot en cambio trabaja con arquetipos y simbolismos profundos, dejando espacio a muchas interpretaciones.',
  p4: 'En el Lenormand no existen Arcanos Mayores ni Menores: las 36 cartas tienen el mismo peso. Los símbolos son objetos del mundo real — una casa, una carta, un perro — interpretados de forma concreta. El Ataúd no significa muerte sino el fin de un ciclo; el Zorro no es el mal sino la astucia necesaria.',

angeli: {
  h1: '👼 Oráculo de los Ángeles',
  img1Alt: 'Oráculo de los Ángeles - mazo de cartas con mensajes angélicos para guía y consuelo espiritual',
  p1: 'El Oráculo de los Ángeles es un mazo divinatorio moderno compuesto por cartas que encierran un único concepto clave — confianza, sanación, coraje — acompañado de un breve mensaje de guía. A diferencia del Tarot, no cuenta una historia compleja: ofrece una respuesta directa y reconfortante a una pregunta del corazón.',
  p2: 'El formato que conocemos hoy nació en Estados Unidos en los años 90, cuando la autora Doreen Virtue publicó los primeros mazos de "Angel Cards", inspirados en la tradición popular de los ángeles custodios presente en casi todas las culturas religiosas y espirituales. Desde entonces el género se ha multiplicado en decenas de variantes, siendo hoy uno de los oráculos más difundidos del mundo por su sencillez de uso.',
  q1t: 'La creencia en mensajeros celestiales que velan por el ser humano atraviesa el judaísmo, el cristianismo, el islam y numerosas tradiciones populares europeas: desde los ángeles custodios medievales hasta los nueve coros angélicos descritos por el Pseudo-Dionisio Areopagita en el siglo V.',
  q1s: '— Tradición angelológica occidental',
  p3: 'Es importante distinguir el Oráculo de los Ángeles, herramienta de reflexión personal y crecimiento interior, de la Angelología religiosa tradicional, que cataloga formalmente 72 o más entidades en jerarquías precisas: el primero se dirige a la intuición, la segunda a la teología.',
  p4: 'En la Cábala judía, por ejemplo, los ángeles se organizan en diez órdenes correspondientes a las Sefirot del Árbol de la Vida, mientras que la tradición islámica reconoce a algunos con tareas específicas, como Jibril (Gabriel), portador de la revelación. El oráculo moderno no retoma esta complejidad doctrinal, pero hereda su idea de fondo: la existencia de una guía invisible y benévola a la que recurrir en momentos de incertidumbre.',
  sd2: 'Las Figuras de Referencia',
  h2: '✨ Los Cuatro Arcángeles Principales',
  img2Alt: 'Los cuatro Arcángeles - Miguel, Gabriel, Rafael y Uriel en la tradición angélica',
  p5: 'Muchos mazos oraculares asocian sus mensajes a cuatro figuras arcangélicas recurrentes en la tradición judeocristiana, cada una vinculada a un área simbólica precisa:',
  arc: [
    { ico:'⚔️', name:'Miguel — Protección y Coraje', desc:'Guía en las decisiones difíciles, aleja los miedos y da fuerza para afrontar obstáculos y conflictos.' },
    { ico:'📯', name:'Gabriel — Comunicación y Nuevos Inicios', desc:'Asociado a los anuncios y mensajes importantes, ayuda a expresar la verdad y acoger un cambio.' },
    { ico:'🌿', name:'Rafael — Sanación', desc:'Su nombre significa "Dios sana": se invoca para el bienestar físico, emocional y los procesos de recuperación.' },
    { ico:'🔥', name:'Uriel — Claridad y Sabiduría', desc:'Su nombre significa "luz de Dios": ilumina situaciones confusas y ayuda a ver con lucidez lo que antes se escapaba.' }
  ],
  sd3: 'El Método',
  h3: '📖 Cómo Interpretar el Mensaje',
  img3Alt: 'Cómo interpretar el mensaje del Oráculo de los Ángeles - guía práctica de lectura',
  p6: 'A diferencia de la cartomancia o el Tarot, el Oráculo de los Ángeles no requiere combinaciones complejas: el valor de la práctica está en la concentración y en la acogida del mensaje.',
  steps: [
    { t:'Formula una pregunta abierta', d:'no "sí/no", sino algo como "¿qué necesito ahora?".' },
    { t:'Respira profundamente', d:'y deja la mente libre de expectativas antes de extraer.' },
    { t:'Extrae un solo mensaje', d:'y léelo como un consejo, no como una predicción fija.' },

  hint1: 'Concéntrate en tu pregunta y deja que el mensaje emerja.',
  btn1: '👼 Extraer un Mensaje Angélico',
  sd4: 'Profundización',
  h4: '🔢 Los Números Angélicos',
  p7: 'Un fenómeno estrechamente ligado al Oráculo de los Ángeles es el de los llamados números angélicos: secuencias repetidas como 11:11, 222 o 444 que muchas personas notan con insistencia en relojes, matrículas o recibos. En la práctica oracular contemporánea, popularizada junto con las cartas angélicas desde los años 90-2000, cada secuencia se lee como un mensaje sintético:',
  num: [
    { ico:'1️⃣', name:'111 / 1111 — Nuevos Inicios', desc:'Tus pensamientos se están manifestando rápidamente: presta atención a en qué te concentras.' },
    { ico:'2️⃣', name:'222 — Equilibrio y Confianza', desc:'Estás en el camino correcto, aunque los resultados aún no sean visibles: sigue con constancia.' },
    { ico:'4️⃣', name:'444 — Protección', desc:'Una presencia de apoyo está cerca; es una señal de tranquilidad en momentos de duda.' },
