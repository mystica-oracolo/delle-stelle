/* ══════════════ Sezione 3.6 — Reset & Variabili ══════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #07031a;
  --card: #0b0520;
  --purple: #2a1748;
  --text: #e8dcc8;
  --muted: #8a7a60;
  --gold: #d4af37;
  --gold-dim: rgba(212,175,55,0.4);
  --gold-glow: rgba(212,175,55,0.4);
  --border: rgba(212,175,55,0.2);
  --radius: 18px;
}

/* ── Tema Giorno (Sezione 3.3) ── */
html.theme-day {
  --bg: #f5f2ed;
  --card: #ede8df;
  --text: #2a1748;
  --muted: #6b5b7f;
  --purple: #6b5b7f;
  --gold: #c89742;
  --gold-dim: rgba(200,151,66,0.35);
  --gold-glow: rgba(200,151,66,0.2);
  --border: #c89742;
}
html.theme-day .card,
html.theme-day .wicca-block,
html.theme-day .ad-slot { background-color: var(--card); border-color: var(--border); color: var(--text); }
html.theme-day h1, html.theme-day h2, html.theme-day h3, html.theme-day h4 { color: var(--text); text-shadow: none; }
html.theme-day .btn-icon, html.theme-day .btn-lang, html.theme-day #scrollTop { background-color: rgba(200,151,66,0.15); color: var(--text); border-color: var(--border); }
html.theme-day .cta-app a { color: #fff; }

/* ══════════════ Layout base ══════════════ */
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 15px; line-height: 1.7; min-height: 100vh;
  background-image: radial-gradient(ellipse 80% 50% at 50% 0%, #1a0a3e 0%, #07031a 60%);
  position: relative;
  transition: background-color .3s ease, color .3s ease;
}
html.theme-day body { background-image: none; }

/* ── Skip link (Sezione 13.3) ── */
.skip-link {
  position: absolute; top: -50px; left: 8px; z-index: 200;
  background: var(--gold); color: #1a0a00; padding: 10px 16px;
  border-radius: 10px; font-family: 'Cinzel', serif; font-size: 13px;
  text-decoration: none; transition: top .2s ease;
}
.skip-link:focus { top: 8px; }

/* ── Focus visibile WCAG (Sezione 13.3) ── */
a:focus-visible, button:focus-visible {
  outline: 2px solid var(--gold); outline-offset: 2px;
}

/* ══════════════ Sezione 5 — Sfondo Cosmico ══════════════ */
.cosmos {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, #2a174830 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 80%, #1a073820 0%, transparent 60%),
    radial-gradient(2px 2px at 15% 25%, #fff9 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 75% 15%, #fff7 0%, transparent 100%),
    radial-gradient(2px 2px at 45% 70%, #d4af3780 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 45%, #fff6 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 85%, #fff5 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 35%, #d4af3760 0%, transparent 100%);
  animation: twinkle 14s infinite alternate;
}
html.theme-day .cosmos { opacity: .15; }
@keyframes twinkle { 0% { opacity: .35; } 50% { opacity: .55; } 100% { opacity: .45; } }

/* ══════════════ Sezione 6 — Header Standard ══════════════ */
.page-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(7,3,26,0.97);
  border-bottom: 1px solid var(--gold-dim);
  backdrop-filter: blur(12px);
  padding: max(12px, env(safe-area-inset-top, 0px)) 16px 12px;
}
html.theme-day .page-header { background: rgba(245,242,237,0.97); }
.header-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
.btn-back {
  display: flex; align-items: center; gap: 6px;
  color: var(--gold); text-decoration: none;
  font-family: 'Cinzel', serif; font-size: 13px;
  opacity: .85; transition: opacity .2s; white-space: nowrap;
}
.btn-back:hover { opacity: 1; }
.btn-back svg { width: 18px; height: 18px; flex-shrink: 0; }
.header-controls { display: flex; gap: 8px; }
.btn-icon {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(212,175,55,0.1); border: 1px solid var(--gold-dim);
  color: var(--gold); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .25s ease;
}
.btn-icon:hover { background: rgba(212,175,55,0.2); }
.page-title { text-align: center; font-family: 'Cinzel', serif; font-size: 15px; color: var(--gold); letter-spacing: .06em; margin-bottom: 8px; }
.lang-switch { display: flex; justify-content: center; gap: 6px; }
.btn-lang {
  background: rgba(212,175,55,0.08); border: 1px solid var(--gold-dim);
  color: var(--muted); font-family: 'Cinzel', serif; font-size: 11px;
  padding: 4px 12px; border-radius: 20px; cursor: pointer;
  letter-spacing: .05em; transition: all .25s ease;
}
.btn-lang.active { background: var(--gold); color: #1a0a00; border-color: var(--gold); }

/* ══════════════ Contenuto ══════════════ */
.page-wrap { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 16px 12px 40px; }

.breadcrumb { font-size: 12px; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.breadcrumb a { color: var(--gold); text-decoration: none; opacity: .8; }
.breadcrumb a:hover { opacity: 1; }
.breadcrumb span.sep { opacity: .5; }

.hero { text-align: center; padding: 24px 16px 16px; margin-bottom: 4px; }
.hero-icon { font-size: 44px; margin-bottom: 10px; display: block; }
.hero h1 { font-family: 'Cinzel Decorative', serif; font-size: 22px; color: var(--gold); line-height: 1.3; margin-bottom: 10px; }
.hero p { font-size: 14px; color: var(--muted); max-width: 500px; margin: 0 auto; }

.card { background: var(--card); border: 1px solid rgba(212,175,55,0.15); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; position: relative; overflow: hidden; content-visibility: auto; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent); }
.card.gold-border { border-color: rgba(212,175,55,0.4); }

.card-img { width: 100%; border-radius: 12px; margin: 0 0 14px; object-fit: cover; display: block; aspect-ratio: 16/7; }
.card-img-mid { width: 100%; border-radius: 12px; margin: 14px 0; object-fit: cover; display: block; aspect-ratio: 16/6; }

.wicca-block { background: rgba(212,175,55,0.06); border-left: 3px solid var(--gold-dim); border-radius: 0 12px 12px 0; padding: 14px 16px; margin-bottom: 14px; }
.wicca-block:last-child { margin-bottom: 0; }
.wicca-block h4 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 14px; margin-bottom: 10px; letter-spacing: .04em; }
.wicca-block p { font-size: 13.5px; line-height: 1.85; color: var(--text); margin: 0; }
.wicca-block p strong { color: #c8a860; }
.wicca-block p em { color: #c8a860; font-style: italic; }
.wicca-block ul { margin: 8px 0 0 18px; padding: 0; }
.wicca-block li { font-size: 13.5px; line-height: 1.85; color: var(--text); margin-bottom: 4px; }

.rules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
.rule-do, .rule-dont { border-radius: 12px; padding: 12px 14px; }
.rule-do { background: rgba(76,175,80,0.08); border: 1px solid rgba(76,175,80,0.3); }
.rule-dont { background: rgba(244,67,54,0.08); border: 1px solid rgba(244,67,54,0.3); }
.rule-do h5 { color: #81c784; font-family: 'Cinzel', serif; font-size: 12px; margin-bottom: 8px; }
.rule-dont h5 { color: #e57373; font-family: 'Cinzel', serif; font-size: 12px; margin-bottom: 8px; }
.rule-do ul, .rule-dont ul { margin: 0; padding: 0; }
.rule-do li, .rule-dont li { font-size: 13px; line-height: 1.7; color: var(--text); list-style: none; margin-bottom: 4px; }
.rule-do li::before { content: '✔ '; color: #81c784; }
.rule-dont li::before { content: '✖ '; color: #e57373; }

.wicca-invocazione {
  background: linear-gradient(135deg, rgba(212,175,55,0.08), rgba(140,70,200,0.06));
  border: 1px solid var(--gold-dim); border-radius: 12px;
  padding: 18px 20px;
  font-family: 'Crimson Pro', serif; font-style: italic;
  font-size: 15px; line-height: 2;
  color: #c8a860; text-align: center; margin-top: 14px;
}

.warning-box { background: rgba(244,67,54,0.07); border: 1px solid rgba(244,67,54,0.3); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; }
.warning-box h4 { color: #e57373; font-family: 'Cinzel', serif; font-size: 13px; margin-bottom: 8px; }
.warning-box p { font-size: 13px; color: var(--text); line-height: 1.75; margin: 0; }

.ad-slot { background: rgba(212,175,55,0.04); border: 1px dashed rgba(212,175,55,0.15); border-radius: 12px; min-height: 90px; margin: 6px 0 16px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 11px; }
.ad-slot:empty, .ad-slot.ad-empty { display: none !important; min-height: 0 !important; margin: 0 !important; }

/* ── Sezione 9.2 — Articolo Editoriale ── */
.article-section { position: relative; z-index: 1; }
.article-section h2#art-title { font-family: 'Cinzel Decorative', serif; font-size: 20px; color: var(--gold); margin-bottom: 12px; line-height: 1.35; }
.article-section h3 { font-family: 'Cinzel', serif; font-size: 15px; color: var(--gold); margin: 18px 0 10px; letter-spacing: .03em; }
.article-section p { font-size: 14px; line-height: 1.85; color: var(--text); margin-bottom: 12px; }
.article-links { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0; }
.article-links a { background: rgba(212,175,55,0.08); border: 1px solid var(--gold-dim); color: var(--gold); padding: 6px 12px; border-radius: 20px; font-size: 12px; text-decoration: none; font-family: 'Cinzel', serif; transition: background .2s; }
.article-links a:hover { background: rgba(212,175,55,0.18); }

.cta-explore { display: block; text-align: center; background: linear-gradient(135deg, #d4af37, #a07820); color: #1a0a00; font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700; padding: 13px 20px; border-radius: 14px; text-decoration: none; letter-spacing: .04em; margin-top: 8px; transition: opacity .2s; }
.cta-explore:hover { opacity: .88; }

/* ── Sezione 9.3 — Share ── */
.share-section { text-align: center; margin-bottom: 18px; }
.btn-share { background: rgba(212,175,55,0.1); border: 1px solid var(--gold-dim); color: var(--gold); font-family: 'Cinzel', serif; font-size: 13px; padding: 10px 22px; border-radius: 20px; cursor: pointer; transition: all .25s ease; }
.btn-share:hover { background: rgba(212,175,55,0.2); }
.share-popup { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 12px; }
.share-btn { display: inline-flex; align-items: center; gap: 5px; background: rgba(212,175,55,0.08); border: 1px solid var(--gold-dim); color: var(--gold); padding: 7px 13px; border-radius: 16px; font-size: 12px; text-decoration: none; cursor: pointer; font-family: 'Crimson Pro', serif; }

/* ── Sezione 9.4 — FAQ ── */
.faq-section { margin-bottom: 18px; position: relative; z-index: 1; }
.faq-title { font-family: 'Cinzel', serif; font-size: 16px; color: var(--gold); margin-bottom: 12px; text-align: center; letter-spacing: .05em; }
.faq-item { background: var(--card); border: 1px solid rgba(212,175,55,0.15); border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
.faq-question { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px; background: none; border: none; color: var(--text); font-family: 'Cinzel', serif; font-size: 13px; text-align: left; padding: 14px 16px; cursor: pointer; }
.faq-icon { color: var(--gold); font-size: 16px; flex-shrink: 0; }
.faq-answer { padding: 0 16px 14px; }
.faq-answer p { font-size: 13.5px; line-height: 1.8; color: var(--muted); }

.cta-app { background: linear-gradient(135deg, #1a0a2e, #0b0520); border: 1px solid var(--gold-dim); border-radius: var(--radius); padding: 22px 18px; text-align: center; margin-bottom: 20px; }
html.theme-day .cta-app { background: linear-gradient(135deg, #ede8df, #f5f2ed); }
.cta-app p { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
.cta-app a { display: inline-block; background: linear-gradient(135deg, #d4af37, #a07820); color: #1a0a00; font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700; padding: 12px 28px; border-radius: 14px; text-decoration: none; letter-spacing: .04em; transition: opacity .2s; }
.cta-app a:hover { opacity: .88; }

.topic-pills { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
.topic-pills a { background: rgba(212,175,55,0.08); border: 1px solid var(--gold-dim); color: var(--gold); padding: 5px 11px; border-radius: 20px; font-size: 12px; text-decoration: none; transition: background .2s; font-family: 'Cinzel', serif; }
.topic-pills a:hover { background: rgba(212,175,55,0.18); }

.seo-crosslinks { max-width: 680px; margin: 20px auto; padding: 20px 16px; border: 1px solid rgba(212,175,55,.18); border-radius: 16px; position: relative; z-index: 1; }
.seo-crosslinks h2 { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold); margin-bottom: 12px; }
.seo-crosslinks ul { padding-left: 20px; }
.seo-crosslinks li { margin: 8px 0; font-size: 13px; }
.seo-crosslinks a { color: var(--text); }

/* ── Sezione 9.5 — Footer ── */
.page-footer { position: relative; z-index: 1; text-align: center; font-size: 12px; color: var(--muted); border-top: 1px solid rgba(212,175,55,0.12); padding: 20px 16px 10px; line-height: 1.9; }
.page-footer a { color: var(--gold); text-decoration: none; opacity: .7; }
.page-footer a:hover { opacity: 1; }
.footer-links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 8px; }

#scrollTop { position: fixed; bottom: 22px; right: 16px; width: 40px; height: 40px; background: rgba(212,175,55,0.15); border: 1px solid var(--gold-dim); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: opacity .3s; z-index: 50; }
#scrollTop.show { opacity: 1; }
#scrollTop svg { width: 18px; height: 18px; fill: var(--gold); }

/* ── Sezione 9.1 — Premium Modal ── */
.premium-modal { position: fixed; inset: 0; z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; }
.premium-modal.show { display: flex; }
.modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
.modal-content { position: relative; background: var(--card); border: 1px solid var(--gold-dim); border-radius: var(--radius); padding: 28px 22px; max-width: 340px; width: 100%; text-align: center; }
.modal-content h2 { font-family: 'Cinzel Decorative', serif; font-size: 18px; color: var(--gold); margin-bottom: 12px; }
.modal-content p { font-size: 13.5px; color: var(--text); line-height: 1.7; margin-bottom: 14px; }
.premium-price { font-family: 'Cinzel', serif; color: var(--gold) !important; font-size: 14px !important; }
.btn-premium-buy { width: 100%; background: linear-gradient(135deg, #d4af37, #a07820); color: #1a0a00; font-family: 'Cinzel', serif; font-weight: 700; font-size: 14px; padding: 13px; border: none; border-radius: 14px; cursor: pointer; margin-bottom: 10px; }
.btn-premium-skip { width: 100%; background: none; border: 1px solid var(--gold-dim); color: var(--muted); font-family: 'Cinzel', serif; font-size: 12px; padding: 10px; border-radius: 14px; cursor: pointer; }

.esplora-section { position: relative; z-index: 1; background: linear-gradient(135deg,#130b26,#1a0c32); border-top: 1px solid rgba(212,175,55,0.25); padding: 40px 20px; text-align: center; }

.esplora-section h2 { font-family: "Cinzel",serif; color: var(--gold); font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 24px; }
.esplora-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; max-width: 800px; margin: 0 auto; }
.esplora-card { display: inline-block; background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.25); border-radius: 8px; padding: 10px 18px; color: var(--gold); text-decoration: none; font-family: "Cinzel",serif; font-size: 0.82rem; letter-spacing: 1px; transition: background 0.3s,border-color 0.3s; }

/* ── Sezione 8.1 — updateSEO() ── */
function updateSEO() {
  const S = LANG[currentLang].seo;
  document.documentElement.lang = S.htmlLang;
  document.title = S.title;
  document.querySelector('meta[name="description"]').content = S.description;
  document.querySelector('meta[name="keywords"]').content = S.keywords;
  document.querySelector('meta[property="og:title"]').content = S.ogTitle;
  document.querySelector('meta[property="og:description"]').content = S.ogDesc;
  document.querySelector('meta[property="og:locale"]').content = S.ogLocale;
  document.querySelector('meta[name="twitter:title"]').content = S.ogTitle;
  document.querySelector('meta[name="twitter:description"]').content = S.ogDesc;
  const ld = document.getElementById('ld-schema');
  if (ld) ld.textContent = JSON.stringify(buildSchemaGraph());
}

/* ── Helper: render lista <li> ── */
function renderList(elId, items) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.innerHTML = items.map(i => `<li>${i}</li>`).join('');
}

/* ── Helper: render link nav ── */
function renderLinks(elId, links, cls) {

  if (!el) return;
  el.innerHTML = links.map(l => `<a href="${l.href}"${cls ? ` class="${cls}"` : ''}>${l.label}</a>`).join('');
}

/* ── Sezione 8.3 — AudioManager ── */
const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';

class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play() {
    this.audio?.play().catch(() => {});
    this.isPlaying = true;
    sessionStorage.setItem(AUDIO_KEY, 'true');
    this.updateUI();
  }
  pause() {
    this.audio?.pause();
    this.isPlaying = false;
    sessionStorage.setItem(AUDIO_KEY, 'false');
    this.updateUI();
  }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}
window.audioManager = new AudioManager();
document.getElementById('musicToggle')?.addEventListener('click', () => window.audioManager.toggle());

/* ── Sezione 8.6 — Share ── */
function shareContent(customText) {
  const L = LANG[currentLang];
  const text = customText || L.shareText;
  if (navigator.share) {
    navigator.share({ title: L.shareTitle, text, url: PAGE_URL }).catch(() => {});
    return;
  }
  const enc = encodeURIComponent(text + ' ' + PAGE_URL);
  const ue = encodeURIComponent(PAGE_URL);
  const wa = document.getElementById('share-wa'); if (wa) wa.href = `https://wa.me/?text=${enc}`;
  const tg = document.getElementById('share-tg'); if (tg) tg.href = `https://t.me/share/url?url=${ue}&text=${encodeURIComponent(text)}`;
  const fb = document.getElementById('share-fb'); if (fb) fb.href = `https://www.facebook.com/sharer/sharer.php?u=${ue}`;
  const xb = document.getElementById('share-x'); if (xb) xb.href = `https://twitter.com/intent/tweet?text=${enc}`;
  const sp = document.getElementById('sharePopup'); if (sp) sp.hidden = false;
}

function copyLink() {
  const L = LANG[currentLang];
  navigator.clipboard.writeText(PAGE_URL).then(() => {
    const b = document.getElementById('share-copy');
    if (b) {
      b.textContent = L.shareCopied;
      setTimeout(() => { b.textContent = L.shareCopy; }, 2000);
    }
  });
}

/* ── Sezione 8.7 — FAQ Accordion ── */
function renderFAQ(faqs) {
  const container = document.getElementById('faqList');
  if (!container) return;
  container.innerHTML = faqs.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false">
        <span>${f.q}</span>
        <span class="faq-icon" aria-hidden="true">+</span>
      </button>
      <div class="faq-answer" id="faq-ans-${i}" hidden>
        <p>${f.a}</p>
      </div>
    </div>
  `).join('');
}

function toggleFAQ(i) {
  const ans = document.getElementById(`faq-ans-${i}`);
  const btn = document.querySelector(`#faq-${i} .faq-question`);
  const icon = btn?.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  if (icon) icon.textContent = isOpen ? '+' : '−';
  btn?.setAttribute('aria-expanded', String(!isOpen));
}

/* ── Scroll-to-top ── */
const scrollBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => { scrollBtn.classList.toggle('show', window.scrollY > 400); }, { passive: true });
scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

/* ── Nascondi slot AdSense vuoti dopo 2 secondi ── */
setTimeout(function () {
  document.querySelectorAll('.ad-slot').forEach(function (slot) {
    var ins = slot.querySelector('ins.adsbygoogle');
    if (!ins || ins.getAttribute('data-ad-status') === 'unfilled' || ins.innerHTML.trim() === '') {
      slot.classList.add('ad-empty');
    }
  });
}, 2000);

/* ── Sezione 8.8 — Init Sequence ── */
document.addEventListener('DOMContentLoaded', () => {
  applyTheme(isDayMode);            // 1. Tema
  // window.audioManager già init dal costruttore
  applyLang();                      // 2. Lingua (chiama updateSEO() come prima cosa)
  document.querySelectorAll('[data-lang]').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === currentLang));
  // Nessuna logica interattiva specifica da inizializzare su questa pagina editoriale
});
</script>
