  <!-- ══════════════ CSS ══════════════ -->
  <style>
    /* ── Reset / Variables ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0514;
      --card: #140c24;
      --purple: #2a1748;
      --gold: #d4af37;
      --gold-dim: #b8860b;
      --gold-glow: rgba(212,175,55,0.4);
      --text: #f4f1fa;
      --muted: #b8b2d1;
      --radius: 18px;
      --border: rgba(212,175,55,0.2);
    }

    html.theme-day {
      --bg: #f5f2ed;
      --card: #ede8df;
      --text: #2a1748;
      --muted: #6b5b7f;
      --purple: #6b5b7f;
      --gold: #c89742;
      --gold-dim: #a67c52;
      --gold-glow: rgba(200,151,66,0.2);
      --border: #c89742;
    }

    html.theme-day .card,
    html.theme-day .compat-card,
    html.theme-day .faq-item,
    html.theme-day .related-link,
    html.theme-day .esplora-card,
    html.theme-day .poster-card {
      background-color: var(--card);
      border: 2px solid var(--border);
      color: var(--text);
    }

    html.theme-day h1,
    html.theme-day h2,
    html.theme-day h3 {
      color: var(--text);
      text-shadow: none;
    }

    html.theme-day .btn-icon,
    html.theme-day .btn-lang {
      background-color: transparent;
      color: var(--text);
      border: 2px solid var(--border);
    }

    html.theme-day .btn-lang.active {
      background-color: var(--gold);
      color: #fff;
    }

    /* ── Layout base ── */
    html, body { background: var(--bg); }
    body {
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 16px;
      line-height: 1.8;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .skip-link {
      position: absolute; left: -9999px; top: 0;
      background: var(--gold); color: #000;
      padding: 10px 16px; z-index: 2000; border-radius: 0 0 8px 0;
    }
    .skip-link:focus { left: 0; }

    a { color: inherit; }

    /* ── Sfondo Cosmico ── */
    .cosmos {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, #2a174830 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 80%, #1a073820 0%, transparent 60%),
        radial-gradient(2px 2px at 15% 25%, #fff9 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 75% 15%, #fff7 0%, transparent 100%),
        radial-gradient(2px 2px at 45% 70%, #d4af3780 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 45%, #fff6 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 30% 85%, #fff5 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 35%, #d4af3760 0%, transparent 100%);
      animation: twinkle 14s infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: .35; }
      50%  { opacity: .55; }
      100% { opacity: .45; }
    }

    /* ── Header standard ── */
    .page-header {
      position: relative; z-index: 10;
      background: linear-gradient(135deg, #1a0c32, #0a0520);
      border-bottom: 1px solid var(--border);
      padding: max(16px, calc(16px + env(safe-area-inset-top))) 16px 18px;
      backdrop-filter: blur(10px);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .btn-back {
      color: var(--gold);
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.25s ease;
    }
    .btn-back:hover { opacity: 0.75; }

    .header-controls {
      display: flex; align-items: center; gap: 8px;
    }

    .btn-icon {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--gold);
      font-size: 17px;
      cursor: pointer;
      padding: 7px 10px;
      line-height: 1;
      transition: all 0.25s ease;
    }
    .btn-icon:hover {
      border-color: rgba(212,175,55,0.5);
      transform: scale(1.06);
    }

    .page-title {
      font-family: 'Cinzel', serif;
      font-size: 21px;
      color: var(--gold);
      text-align: center;
      letter-spacing: 1px;
      text-shadow: 0 0 20px rgba(212,175,55,0.35);
      margin-bottom: 14px;
    }

    /* ── Selettore Lingua — visibile, centrato, in alto ── */
    .lang-switch {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn-lang {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 7px 18px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn-lang:hover {
      border-color: rgba(212,175,55,0.5);
      color: var(--gold);
    }

    .btn-lang.active {
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      color: #1a0c32;
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(212,175,55,0.35);
    }

    /* ── Main ── */
    main { position: relative; z-index: 1; }

    /* ══════════════ HERO BANNER STILE NETFLIX ══════════════ */
    .nx-hero {
      position: relative;
      min-height: 46vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 32px 20px 28px;
      overflow: hidden;
      background:
        radial-gradient(ellipse 90% 60% at 50% 20%, rgba(212,175,55,0.16), transparent 65%),
        linear-gradient(180deg, #150a28 0%, #0d0620 55%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
    }

    .nx-hero-zodiac {
      position: absolute;
      top: 14%; left: 0; right: 0;
      text-align: center;
      font-size: 15vw;
      letter-spacing: 6px;
      color: rgba(212,175,55,0.14);
      pointer-events: none;
      white-space: nowrap;
    }

    .nx-hero-content {
      position: relative; z-index: 2;
      max-width: 640px;
      margin: 0 auto;
      text-align: center;
    }

    .nx-hero-badge {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--gold);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
      margin-bottom: 14px;
      background: rgba(212,175,55,0.06);
    }

    .nx-hero h2 {
      font-family: 'Cinzel', serif;
      font-size: 30px;
      color: var(--gold);
      letter-spacing: 1px;
      line-height: 1.25;
      margin-bottom: 12px;
      text-shadow: 0 0 24px rgba(212,175,55,0.3);
    }

    .nx-hero p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 520px;
      margin: 0 auto 20px;
    }

    .nx-hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      color: #1a0c32;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 13px 28px;
      border-radius: 10px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .nx-hero-cta:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 22px rgba(212,175,55,0.3);
    }

    /* ══════════════ RIGHE ORIZZONTALI (ROWS) ══════════════ */
    .nx-rows { padding: 28px 0 8px; }

    .nx-row { margin-bottom: 30px; }

    .nx-row-title {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold);
      letter-spacing: 1px;
      padding: 0 20px;
      margin-bottom: 12px;
    }

    .nx-row-track {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      overflow-y: visible;
      padding: 6px 20px 14px;
      scroll-snap-type: x proximity;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .nx-row-track::-webkit-scrollbar { display: none; }

    .poster-card {
      flex: 0 0 auto;
      width: 132px;
      scroll-snap-align: start;
      background: linear-gradient(145deg, #150c28, #0d0620);
      border: 1px solid rgba(212,175,55,0.18);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      position: relative;
    }

    .poster-card:hover,
    .poster-card:focus-visible {
      transform: translateY(-6px) scale(1.055);
      border-color: rgba(212,175,55,0.55);
      box-shadow: 0 12px 26px rgba(212,175,55,0.22);
      z-index: 3;
    }

    .poster-img-wrap {
      position: relative;
      width: 100%;
      height: 150px;
      background: rgba(212,175,55,0.05);
    }

    .poster-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .poster-scrim {
      position: absolute; left: 0; right: 0; bottom: 0;
      height: 60%;
      background: linear-gradient(to top, rgba(10,5,20,0.95), transparent);
      pointer-events: none;
    }

    .poster-emoji {
      position: absolute; top: 6px; left: 8px;
      font-size: 20px;
      filter: drop-shadow(0 0 6px rgba(0,0,0,0.6));
    }

    .poster-info {
      padding: 8px 10px 10px;
    }

    .poster-name {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .poster-dates {
      font-size: 10.5px;
      color: var(--muted);
    }

    /* ══════════════ MODAL DETTAGLIO SEGNO ══════════════ */
    .sign-modal {
      position: fixed; inset: 0;
      background: rgba(4,2,10,0.85);
      z-index: 1000;
      display: none;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(3px);
    }
    .sign-modal.show { display: flex; }

    .sign-modal-content {
      background: linear-gradient(160deg, #1a0c32, #0d0620);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      max-width: 480px;
      width: 100%;
      max-height: 86vh;
      overflow-y: auto;
      padding: 0 0 28px;
      position: relative;
      animation: slideUp 0.28s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .sign-modal-img {
      width: 100%; height: 200px;
      object-fit: cover;
      display: block;
    }

    .sign-modal-close {
      position: absolute; top: 12px; right: 14px;
      background: rgba(10,5,20,0.7);
      border: 1px solid var(--border);
      color: var(--text);
      width: 34px; height: 34px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      z-index: 2;
    }

    .sign-modal-body { padding: 20px 22px 0; }

    .sign-modal-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 12px;
    }
    .sign-modal-emoji { font-size: 34px; }
    .sign-modal-name {
      font-family: 'Cinzel', serif;
      font-size: 19px;
      color: var(--gold);
      letter-spacing: 1px;
    }
    .sign-modal-dates { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .sign-modal-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .sign-modal-tags span {
      font-size: 11px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px 10px;
      color: var(--muted);
      font-family: 'Cinzel', serif;
      letter-spacing: 0.5px;
    }

    .sign-modal-desc { font-size: 14.5px; opacity: 0.9; margin-bottom: 10px; }
    .sign-modal-traits { font-size: 13px; color: var(--muted); font-style: italic; }

    /* ── Sezioni generiche ── */
    section, article { position: relative; z-index: 1; }

    .section-inner { max-width: 720px; margin: 0 auto; padding: 0 20px; }

    h2 {
      font-family: 'Cinzel', serif;
      font-size: 19px;
      color: var(--gold);
      letter-spacing: 1px;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    h3 {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold);
      letter-spacing: 0.5px;
      margin: 18px 0 10px;
    }

    p { margin-bottom: 14px; opacity: 0.9; font-size: 15px; }

    /* ── Share ── */
    .share-section { margin: 34px 0 6px; text-align: center; }
    .btn-share {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 1px;
      padding: 11px 26px;
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .btn-share:hover { border-color: rgba(212,175,55,0.5); transform: scale(1.03); }

    .share-popup {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 999;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .share-popup.show { display: flex; }
    .share-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 320px; width: 100%;
      display: flex; flex-direction: column; gap: 12px;
    }
    .share-box a, .share-box button {
      background: var(--gold);
      color: #1a0c32;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: transform 0.25s ease;
    }
    .share-box a:hover, .share-box button:hover { transform: scale(1.03); }
    .share-close {
      align-self: flex-end;
      background: transparent !important;
      color: var(--muted) !important;
      font-size: 22px;
      padding: 0 !important;
    }

    /* ── Articolo editoriale ── */
    .article-section { padding: 8px 20px 10px; }
    .article-section img#art-hero {
      width: 100%;
      border-radius: 14px;
      margin: 14px 0 18px;
    }
    .article-links {
      display: flex; flex-wrap: wrap; gap: 10px;
      margin: 18px 0;
    }
    .article-links a {
      font-size: 13px;
      color: var(--gold);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 7px 14px;
      text-decoration: none;
      transition: all 0.25s ease;
    }
    .article-links a:hover { border-color: rgba(212,175,55,0.5); }

    .cta-explore {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 26px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      color: #1a0c32;
      border-radius: 8px;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-decoration: none;
      transition: all 0.25s ease;

        artP1: 'The zodiac we find today in magazines, apps and daily horoscopes has its roots in ancient Mesopotamia. Babylonian astronomers, as early as the second millennium BC, divided the Sun\'s apparent path into twelve sectors, each linked to a constellation. The system reached Greece around the 4th century BC and was systematized by Claudius Ptolemy in his Tetrabiblos, a 2nd-century work that remained the reference text of Western astrology for over a thousand years.',

    /* ══════ updateSEO() ══════ */
    function updateSEO() {
      const S = LANG[currentLang].seo;
      document.documentElement.lang = S.htmlLang;
      document.title = S.title;
      document.querySelector('meta[name="description"]').content = S.description;
      document.querySelector('meta[name="keywords"]').content = S.keywords;
      document.querySelector('meta[property="og:title"]').content = S.ogTitle;
      document.querySelector('meta[property="og:description"]').content = S.ogDesc;
      document.querySelector('meta[property="og:locale"]').content = S.ogLocale;
      document.querySelector('meta[name="twitter:title"]').content = S.ogTitle;
      document.querySelector('meta[name="twitter:description"]').content = S.ogDesc;

      const ld = document.querySelector('script[type="application/ld+json"]');
      if (ld && S.faqLD) {
        ld.textContent = JSON.stringify({
          '@context': 'https://schema.org',
          '@graph': [
            {
              '@type': 'FAQPage',
              mainEntity: S.faqLD.map(f => ({
                '@type': 'Question',
                name: f.q,
                acceptedAnswer: { '@type': 'Answer', text: f.a }
              }))
            },
            {
              '@type': 'BreadcrumbList',
              itemListElement: [
                { '@type': 'ListItem', position: 1, name: 'MYSTICA', item: 'https://mysticaoracoli.it/index.html' },
                { '@type': 'ListItem', position: 2, name: S.title, item: PAGE_URL }
              ]
            }
          ]
        });
      }
    }

    /* ══════ renderRows() — righe orizzontali stile Netflix ══════ */
    function renderRows(L) {
      const groups = [[], [], [], []]; // 0 fuoco · 1 terra · 2 aria · 3 acqua
      L.segni.forEach((s, i) => groups[i % 4].push(s));

      const container = document.getElementById('rowsContainer');
      container.innerHTML = groups.map((group, gi) => `
        <div class="nx-row">
          <div class="nx-row-title">${group[0].element} ${L.rowSuffix}</div>
          <div class="nx-row-track">
            ${group.map((s) => {
              const globalIndex = L.segni.indexOf(s);
              return `
              <div class="poster-card" tabindex="0" role="button"
                   aria-label="${s.name}"
                   onclick="openSignModal(${globalIndex})"
                   onkeydown="if(event.key==='Enter')openSignModal(${globalIndex})">
                <div class="poster-img-wrap">
                  <img src="./images/zodiaco-orizzontale/${s.img}" alt="${s.name}"
                       width="132" height="150"
                       loading="${globalIndex === 0 ? 'eager' : 'lazy'}" decoding="async">
                  <div class="poster-scrim"></div>
                  <span class="poster-emoji">${s.emoji}</span>
                </div>
                <div class="poster-info">
                  <div class="poster-name">${s.name}</div>
                  <div class="poster-dates">${s.dates}</div>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>
      `).join('');
    }

    /* ══════ Modal dettaglio segno ══════ */
    function openSignModal(index) {
      const s = LANG[currentLang].segni[index];
      document.getElementById('signModalImg').src = `./images/zodiaco-orizzontale/${s.img}`;
      document.getElementById('signModalImg').alt = s.name;
      document.getElementById('signModalEmoji').textContent = s.emoji;
      document.getElementById('signModalName').textContent = s.name;
      document.getElementById('signModalDates').textContent = s.dates;
      document.getElementById('signModalTags').innerHTML =
        `<span>${s.element}</span><span>${s.ruler}</span><span>${s.quality}</span>`;
      document.getElementById('signModalDesc').textContent = s.desc;
      document.getElementById('signModalTraits').textContent = s.traits;
      const modal = document.getElementById('signModal');
      modal.classList.add('show');
      modal.setAttribute('aria-hidden', 'false');
    }
    function closeSignModal() {
      const modal = document.getElementById('signModal');
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden', 'true');
    }
    document.getElementById('signModal').addEventListener('click', e => {
      if (e.target.id === 'signModal') closeSignModal();
    });

    // Switch lingua
    document.querySelectorAll('[data-lang]').forEach(btn => {

    /* ══════ AudioManager (musica continua cross-page) ══════ */
    const AUDIO_KEY = 'myst_audio_state';
    const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';

    class AudioManager {
      constructor() {
        this.audio = null;
        this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
        this.initAudio();
      }
      initAudio() {
        this.audio = new Audio(AUDIO_URL);
        this.audio.loop = true;
        this.audio.volume = 0.3;
        if (this.isPlaying) this.play();
        this.updateUI();
      }
      play() {
        this.audio?.play().catch(() => {});
        this.isPlaying = true;
        sessionStorage.setItem(AUDIO_KEY, 'true');
        this.updateUI();
      }
      pause() {
        this.audio?.pause();
        this.isPlaying = false;
        sessionStorage.setItem(AUDIO_KEY, 'false');
        this.updateUI();
      }
      toggle() { this.isPlaying ? this.pause() : this.play(); }
      updateUI() {
        const btn = document.getElementById('musicToggle');
        const L = LANG[currentLang];
        if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
      }
    }
    window.audioManager = new AudioManager();
    document.getElementById('musicToggle')?.addEventListener('click', () => window.audioManager.toggle());

    /* ══════ Tema Giorno/Notte ══════ */
    function applyTheme(isDay) {
      document.documentElement.classList.toggle('theme-day', isDay);
      const btn = document.getElementById('themeToggle');
      const L = LANG[currentLang];
      if (btn) btn.textContent = isDay ? L.theme.night : L.theme.day;
      localStorage.setItem('myst_theme', isDay ? 'day' : 'night');
    }
    document.getElementById('themeToggle')?.addEventListener('click', () => {
      isDayMode = !isDayMode;
      applyTheme(isDayMode);
    });

    /* ══════ Premium Gate ══════ */
    function isPremium() {
      return localStorage.getItem('myst_premium') === '1';
    }
    function requirePremium(actionType) {
      if (isPremium()) return true;
      document.getElementById('premiumModal')?.classList.add('show');
      document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'false');
      return false;
    }
    function closePremiumModal() {
      document.getElementById('premiumModal')?.classList.remove('show');
      document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'true');
    }

    /* ══════ Share ══════ */
    function shareContent(customText) {
      const L = LANG[currentLang];
      const text = customText || L.shareText;
      if (navigator.share) {
        navigator.share({ title: L.shareTitle, text, url: PAGE_URL }).catch(() => {});
        return;
      }
      const enc = encodeURIComponent(text + ' ' + PAGE_URL);
      const ue = encodeURIComponent(PAGE_URL);
      document.getElementById('share-wa').href = `https://wa.me/?text=${enc}`;
      document.getElementById('share-tg').href = `https://t.me/share/url?url=${ue}&text=${encodeURIComponent(text)}`;
      document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${ue}`;
      document.getElementById('share-x').href = `https://twitter.com/intent/tweet?text=${enc}`;
      document.getElementById('sharePopup').hidden = false;
      document.getElementById('sharePopup').classList.add('show');
    }
    function closeSharePopup() {
      document.getElementById('sharePopup').hidden = true;
      document.getElementById('sharePopup').classList.remove('show');
    }
    function copyLink() {
      const L = LANG[currentLang];
      navigator.clipboard.writeText(PAGE_URL).then(() => {
        const b = document.getElementById('share-copy');
        if (b) {
          b.textContent = L.shareCopied;
          setTimeout(() => { b.textContent = L.shareCopy; }, 2000);
        }
      });
    }

    /* ══════ FAQ Accordion ══════ */
    function renderFAQ(faqs) {
      const container = document.getElementById('faqList');
      if (!container) return;
      container.innerHTML = faqs.map((f, i) => `
        <div class="faq-item" id="faq-${i}">
          <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false">
            <span>${f.q}</span>
            <span class="faq-icon">+</span>
          </button>
          <div class="faq-answer" id="faq-ans-${i}" hidden>
            <p>${f.a}</p>
          </div>
        </div>
      `).join('');
    }
    function toggleFAQ(i) {
      const ans = document.getElementById(`faq-ans-${i}`);
      const btn = document.querySelector(`#faq-${i} .faq-question`);
      const icon = btn?.querySelector('.faq-icon');
      const isOpen = !ans.hidden;
      ans.hidden = isOpen;
      if (icon) icon.textContent = isOpen ? '+' : '−';
      btn?.setAttribute('aria-expanded', String(!isOpen));
    }

    /* ══════ Init ══════ */
    document.addEventListener('DOMContentLoaded', () => {
      applyTheme(isDayMode);   // 1. Tema
      applyLang();             // 2. Lingua (chiama updateSEO() come prima cosa)
    });
  </script>
