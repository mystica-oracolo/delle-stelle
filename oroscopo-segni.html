  <!-- ── CSS ── -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0514;
      --card: #140c24;
      --purple: #2a1748;
      --gold: #d4af37;
      --gold-dim: #b8860b;
      --gold-glow: rgba(212,175,55,0.4);
      --text: #f4f1fa;
      --muted: #b8b2d1;
      --radius: 18px;
      --border: rgba(212,175,55,0.2);
    }

    html.theme-day {
      --bg: #f5f2ed;
      --card: #ede8df;
      --text: #2a1748;
      --muted: #6b5b7f;
      --purple: #6b5b7f;
      --gold: #c89742;
      --gold-dim: #a67c52;
      --gold-glow: rgba(200,151,66,0.2);
      --border: #c89742;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 16px;
      line-height: 1.8;
      min-height: 100vh;
    }

    /* ── Cosmos Background ── */
    .cosmos {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, #2a174830 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 80%, #1a073820 0%, transparent 60%),
        radial-gradient(2px 2px at 15% 25%, #fff9 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 75% 15%, #fff7 0%, transparent 100%),
        radial-gradient(2px 2px at 45% 70%, #d4af3780 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 45%, #fff6 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 30% 85%, #fff5 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 35%, #d4af3760 0%, transparent 100%);
      animation: twinkle 14s infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: .35; }
      50%  { opacity: .55; }
      100% { opacity: .45; }
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(135deg, #1a0c32, #0a0520);
      border-bottom: 1px solid var(--border);
      padding: max(16px, calc(16px + env(safe-area-inset-top)));
      display: flex; align-items: center; justify-content: space-between;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      color: var(--gold);
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(212,175,55,0.4);
    }

    .logo a {
      color: inherit;
      text-decoration: none;
    }

    .header-controls {
      display: flex; align-items: center; gap: 10px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: var(--gold);
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      transition: all 0.25s ease;
    }

    .icon-btn:hover {
      transform: scale(1.1);
      text-shadow: 0 0 15px rgba(212,175,55,0.6);
    }

    /* ── Main ── */
    main {
      position: relative; z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 20px 60px;
      padding-top: max(40px, calc(40px + env(safe-area-inset-top)));
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      margin-bottom: 40px;
      padding: 36px 24px;
      background: linear-gradient(145deg, #1a0c32, #0d0620);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(212,175,55,0.07), transparent 70%);
      pointer-events: none;
    }

    .hero-icon {
      font-size: 52px;
      margin-bottom: 14px;
      display: block;
      position: relative; z-index: 1;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      color: var(--gold);
      letter-spacing: 1.5px;
      margin-bottom: 12px;
      line-height: 1.3;
      position: relative; z-index: 1;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 560px;
      margin: 0 auto;
      position: relative; z-index: 1;
    }

    /* ── Sezioni ── */
    section {
      margin-bottom: 36px;
      position: relative; z-index: 1;
    }

    h2 {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      color: var(--gold);
      letter-spacing: 1.5px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    p {
      margin-bottom: 14px;
      color: var(--text);
      opacity: 0.9;
      font-size: 15px;
    }

    /* ── Sign Grid ── */
    .sign-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 16px 0;
    }

    @media (max-width: 540px) {
      .sign-grid { grid-template-columns: 1fr; }
    }

    .sign-card {
      background: linear-gradient(145deg, #130b26, #0d0620);
      border: 1px solid rgba(212,175,55,0.18);
      border-radius: 16px;
      padding: 18px;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .sign-card:hover {
      border-color: rgba(212,175,55,0.4);
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(212,175,55,0.15);
    }

    .sign-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 12px;
      background: rgba(212,175,55,0.05);
    }

    .sign-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .sign-emoji {
      font-size: 28px;
      flex-shrink: 0;
    }

    .sign-name {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      color: var(--gold);
      letter-spacing: 1px;
    }

    .sign-dates {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .sign-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .sign-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid rgba(212,175,55,0.2);
      color: var(--muted);
      font-family: 'Cinzel', serif;
      letter-spacing: 0.5px;
    }

    .sign-desc {
      font-size: 13px;
      color: var(--text);
      opacity: 0.85;
      line-height: 1.65;
      margin-bottom: 8px;
    }

    .sign-traits {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Card ── */
    .card {
      background: linear-gradient(145deg, #130b26, #0d0620);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    ul, ol {
      padding-left: 22px;
      margin-bottom: 16px;
    }

    li {
      margin-bottom: 8px;
      font-size: 15px;
      color: var(--text);
      opacity: 0.9;
      line-height: 1.7;
    }

    strong {
      color: var(--text);
      opacity: 1;
    }

    /* ── Highlight ── */
    .highlight {
      background: linear-gradient(145deg, rgba(212,175,55,0.08), rgba(212,175,55,0.04));
      border-left: 3px solid var(--gold);
      border-radius: 8px;
      padding: 18px;
      margin: 20px 0;
    }

    .highlight p {
      margin: 0;
    }

    /* ── FAQ Accordion ── */
    .faq-section {
      margin: 40px 0;
    }

    #faqList {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .faq-item {
      background: linear-gradient(145deg, #130b26, #0d0620);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .faq-question {
      width: 100%;
      background: transparent;
      border: none;
      padding: 16px 20px;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 0.5px;
      transition: all 0.25s ease;
    }

    .faq-question:hover {
      background: rgba(212,175,55,0.08);
    }

    .faq-icon {
      font-size: 20px;
      flex-shrink: 0;
      transition: transform 0.25s ease;
    }

    .faq-answer {
      padding: 0 20px;
      max-height: 500px;
      overflow: hidden;
      transition: all 0.25s ease;
      border-top: 1px solid var(--border);
    }

    .faq-answer[hidden] {
      display: none;
    }

    .faq-answer p {
      padding: 16px 0;
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
    }

    /* ── Related ── */
    .related {
      margin: 40px 0;
      position: relative; z-index: 1;
    }

    .related-title {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold);
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .related-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 540px) {
      .related-grid { grid-template-columns: 1fr; }
    }

    .related-link {
      background: linear-gradient(145deg, #130b26, #0d0620);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .related-link:hover {
      border-color: rgba(212,175,55,0.4);
      transform: translateY(-4px);
    }

    .related-link-icon {
      font-size: 28px;
    }

    .related-link-text {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 0.5px;
    }

    /* ── CTA ── */
    .cta {
      background: linear-gradient(145deg, rgba(212,175,55,0.08), rgba(212,175,55,0.04));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
      margin: 40px 0;
      position: relative; z-index: 1;
    }

    .cta p {
      font-size: 14px;
    }

    .cta-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 1px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .cta-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(212,175,55,0.3);
    }

    /* ── Esplora Sezione ── */
    .esplora-section {
      background: linear-gradient(145deg, #130b26, #0d0620);
      border-top: 1px solid var(--border);
      padding: 40px 20px;
      position: relative; z-index: 1;
      margin-top: 40px;
    }

    .esplora-section h2 {
      text-align: center;
      margin-bottom: 28px;
    }

    .esplora-grid {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .esplora-card {
      background: linear-gradient(145deg, #0a0514, #140c24);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.5px;
    }

    .esplora-card:hover {
      border-color: rgba(212,175,55,0.4);
      color: var(--gold);
      transform: translateY(-2px);
    }

    /* ── Footer ── */
    footer {
      background: linear-gradient(145deg, #0a0514, #140c24);
      border-top: 1px solid var(--border);
      padding: 32px 20px 60px;
      text-align: center;
      position: relative; z-index: 1;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .footer-links a {
      color: var(--gold);
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .footer-links a:hover {
      opacity: 0.8;
    }

    footer > p {
      font-size: 12px;
      color: var(--muted);
      margin: 0;
    }

    .footer-disclaimer {
      font-size: 11px !important;
      opacity: 0.7 !important;
      margin-top: 8px !important;
    }

    /* ── Premium Modal ── */
    .premium-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .premium-modal[hidden="false"] {
      display: flex;
    }

    .premium-box {
      background: linear-gradient(145deg, #1a0c32, #0d0620);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 24px;
      max-width: 380px;
      text-align: center;
    }

    .premium-box h3 {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .premium-box p {
      font-size: 14px;
      margin-bottom: 16px;
    }

    .premium-close {
      float: right;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
      padding: 0;
    }

    /* ── Share Popup ── */
    .share-popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .share-popup[hidden="false"] {
      display: flex;
    }

    .share-box {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .share-box button {
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.5px;
    }

    .share-box button:hover {
      transform: scale(1.05);
    }

    .share-close {
      align-self: flex-end;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>

    /* ── updateSEO() ── */
    function updateSEO() {
      const S = LANG[currentLang].seo;
      document.documentElement.lang = S.htmlLang;
      document.title = S.title;
      document.querySelector('meta[name="description"]').content = S.description;
      document.querySelector('meta[name="keywords"]').content = S.keywords;
      document.querySelector('meta[property="og:title"]').content = S.ogTitle;
      document.querySelector('meta[property="og:description"]').content = S.ogDesc;
      document.querySelector('meta[property="og:locale"]').content = S.ogLocale;
      document.querySelector('meta[name="twitter:title"]').content = S.ogTitle;
      document.querySelector('meta[name="twitter:description"]').content = S.ogDesc;
      
      const ld = document.querySelector('script[type="application/ld+json"]');
      if (ld && S.faqLD) {
        ld.textContent = JSON.stringify({
          '@context': 'https://schema.org',
          '@type': 'FAQPage',
          mainEntity: S.faqLD.map(f => ({
            '@type': 'Question',
            name: f.q,
            acceptedAnswer: { '@type': 'Answer', text: f.a }
          }))
        });
      }
    }

            <div class="sign-emoji">${s.emoji}</div>
            <div>
              <div class="sign-name">${s.name}</div>
              <div class="sign-dates">${s.dates}</div>

          </div>
          <div class="sign-meta">
            <span class="sign-tag">${s.element}</span>

      document.getElementById('compatHighlight').innerHTML = L.compat.highlight;

      // FAQ
      document.getElementById('faqTitle').textContent = L.faq.title;

          <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false">

          <div class="faq-answer" id="faq-ans-${i}" hidden>

          </div>

      `).join('');

      // Related

      document.getElementById('relatedGrid').innerHTML = L.related.items.map(r => `
        <a href="${r.href}" class="related-link">
          <span class="related-link-icon">${r.icon}</span>
          <div class="related-link-text">${r.name}</div>

    /* ── applyTheme() ── */
    function applyTheme(isDayMode) {
      if (isDayMode) {
        document.documentElement.classList.add('theme-day');
        document.getElementById('themeToggle').textContent = '🌙';
      } else {
        document.documentElement.classList.remove('theme-day');
        document.getElementById('themeToggle').textContent = '☀️';
      }
    }

    /* ── toggleFAQ() ── */
    function toggleFAQ(i) {
      const ans = document.getElementById(`faq-ans-${i}`);
      const btn = document.querySelector(`#faq-${i} .faq-question`);
      const icon = btn.querySelector('.faq-icon');
      const isOpen = !ans.hidden;
      ans.hidden = isOpen;
      icon.textContent = isOpen ? '+' : '−';
      btn.setAttribute('aria-expanded', String(!isOpen));
    }

    /* ── Premium Modal ── */
    function closePremiumModal() {
      document.getElementById('premiumModal').setAttribute('hidden', 'true');
    }

    /* ── Share ── */
    const PAGE_URL = 'https://mysticaoracoli.it/oroscopo-segni.html';

    function shareContent(customText) {
      const L = LANG[currentLang];
      const text = customText || L.share.text;
      if (navigator.share) {
        navigator.share({ title: L.share.title, text, url: PAGE_URL }).catch(() => {});
        return;
      }
      const encoded = encodeURIComponent(text + ' ' + PAGE_URL);
      const urlEnc = encodeURIComponent(PAGE_URL);
      document.getElementById('share-wa').href = `https://wa.me/?text=${encoded}`;
      document.getElementById('share-tg').href = `https://t.me/share/url?url=${urlEnc}&text=${encodeURIComponent(text)}`;
      document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${urlEnc}`;
      document.getElementById('share-x').href = `https://twitter.com/intent/tweet?text=${encoded}`;
      document.getElementById('sharePopup').setAttribute('hidden', 'false');
    }

    function closeSharePopup() {
      document.getElementById('sharePopup').setAttribute('hidden', 'true');
    }

    function copyLink() {
      const L = LANG[currentLang];
      navigator.clipboard.writeText(PAGE_URL).then(() => {
        const btn = document.getElementById('share-copy');
        const originalText = L.footer.home; // Placeholder
        btn.textContent = '✓ Copiato!';
        setTimeout(() => {
          btn.textContent = 'Copia Link';
        }, 2000);
      });
    }

    /* ── Event Listeners ── */
    document.getElementById('themeToggle').addEventListener('click', () => {
      isDayMode = !isDayMode;
      localStorage.setItem('myst_theme', isDayMode ? 'day' : 'night');
      applyTheme(isDayMode);
    });

    document.getElementById('langToggle').addEventListener('click', () => {
      const langs = ['it', 'en', 'es'];
      const idx = langs.indexOf(currentLang);
      currentLang = langs[(idx + 1) % 3];
      localStorage.setItem('myst_lang', currentLang);
      applyLang();
    });

    document.getElementById('shareBtn').addEventListener('click', () => {
      shareContent();
    });

    /* ── Init ── */
    document.addEventListener('DOMContentLoaded', () => {
      applyTheme(isDayMode);
      applyLang();
    });
  </script>
