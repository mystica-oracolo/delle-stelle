  <style>
    /* ── CSS Reset & Variables ── */
    :root {
      --bg: #0a0514;
      --card: #140c24;
      --purple: #2a1748;
      --gold: #d4af37;
      --gold-dim: #b8860b;
      --gold-glow: rgba(212, 175, 55, 0.4);
      --text: #f4f1fa;
      --muted: #b8b2d1;
      --radius: 18px;
      --border: rgba(212, 175, 55, 0.2);
    }

    html.theme-day {
      --bg: #f5f2ed;
      --card: #ede8df;
      --text: #2a1748;
      --muted: #6b5b7f;
      --purple: #6b5b7f;
      --gold: #c89742;
      --gold-dim: #a67c52;
      --gold-glow: rgba(200, 151, 66, 0.2);
      --border: #c89742;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      z-index: 1;
    }

    /* ── Cosmos Background ── */
    .cosmos {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at 30% 50%, rgba(106, 10, 173, 0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(42, 23, 72, 0.1) 0%, transparent 50%);
    }

    .cosmos::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(2px 2px at 20px 30px, #fff, rgba(255, 255, 255, 0)),
        radial-gradient(2px 2px at 60px 70px, #fff, rgba(255, 255, 255, 0)),
        radial-gradient(1px 1px at 50px 50px, #fff, rgba(255, 255, 255, 0)),
        radial-gradient(1px 1px at 130px 80px, #fff, rgba(255, 255, 255, 0)),
        radial-gradient(2px 2px at 90px 10px, #fff, rgba(255, 255, 255, 0));
      background-repeat: repeat;
      background-size: 200px 200px;
      animation: twinkle 5s ease-in-out infinite;
      opacity: 0.15;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.4; }
    }

    /* ── Layout ── */
    main {
      position: relative;
      z-index: 1;
    }

    .page-header {
      position: relative;
      z-index: 10;
      background: rgba(10, 5, 20, 0.8);
      backdrop-filter: blur(8px);
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 60px;
      margin-bottom: 24px;
    }

    .header-back {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .header-back:hover {
      color: var(--gold);
    }

    .header-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .header-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      transition: color 0.2s;
      padding: 6px 8px;
      border-radius: 6px;
    }

    .header-btn:hover {
      color: var(--gold);
    }

    /* ── Language Buttons ── */
    .lang-selector {
      display: flex;
      gap: 4px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px;
    }

    .lang-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s;
      font-family: 'Cinzel', serif;
    }

    .lang-btn.active {
      background: var(--gold);
      color: var(--bg);
    }

    /* ── Container ── */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
      position: relative;
      z-index: 2;
    }

    /* ── Hero Section ── */
    .hero-section {
      text-align: center;
      padding: 24px 0 32px;
    }

    .hero-icon {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 20px var(--gold-glow));
      animation: float 5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .hero-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      text-shadow: 0 0 30px var(--gold-glow);
      margin-bottom: 8px;
    }

    .hero-subtitle {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .hero-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 16px auto;
    }

    .hero-intro {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 420px;
      margin: 0 auto;
    }

    /* ── Interactive Section ── */
    .oracolo-section {
      padding: 32px 0;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 1px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="email"],
    select {
      width: 100%;
      padding: 12px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Crimson Pro', serif;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    select:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 12px var(--gold-glow);
    }

    .sephirot-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .seph-btn {
      padding: 12px 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .seph-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .seph-btn.active {
      background: var(--gold);
      color: var(--bg);
      border-color: var(--gold);
    }

    /* ── Buttons ── */
    .btn {
      padding: 12px 24px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .btn:hover {
      background: var(--gold-dim);
      transform: translateY(-2px);
      box-shadow: 0 8px 16px var(--gold-glow);
    }

    .btn-sec {
      background: var(--card);
      color: var(--gold);
      border: 1px solid var(--border);
    }

    .btn-sec:hover {
      border-color: var(--gold);
      background: rgba(212, 175, 55, 0.1);
    }

    .btn-grp {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn-grp .btn {
      flex: 1;
    }

    /* ── Result Card ── */
    .result-container {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .result-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .result-icon {
      font-size: 64px;
      margin-bottom: 12px;
      animation: float 4s ease-in-out infinite;
    }

    .result-name {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .result-translation {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .result-tag {
      display: inline-block;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .result-card {
      background: rgba(10, 5, 20, 0.5);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .result-card-icon {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .result-card-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .result-card-val {
      font-size: 13px;
      color: var(--text);
      font-weight: 600;
    }

    .result-block {
      background: rgba(10, 5, 20, 0.5);
      border-left: 3px solid var(--gold);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .result-block h4 {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .result-block p {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Share Section ── */
    .share-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: center;
    }

    .share-title {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 1px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .share-btns {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .share-btn {
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid var(--border);
      padding: 10px 8px;
      border-radius: 8px;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .share-btn:hover {
      background: var(--gold);
      color: var(--bg);
    }

    /* ── Article Section ── */
    .article-section {
      margin: 32px 0;
    }

    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 24px;
      color: var(--gold);
      letter-spacing: 1px;
      margin-bottom: 16px;
      text-align: center;
    }

    .section-intro {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      text-align: center;
      margin-bottom: 20px;
    }

    article {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    article p {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
    }

    article a {
      color: var(--gold);
      text-decoration: none;
      transition: color 0.2s;
    }

    article a:hover {
      color: var(--gold-dim);
      text-decoration: underline;
    }

    /* ── FAQ Section ── */
    .faq-section {
      margin: 32px 0;
    }

    .faq-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .faq-question {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: var(--card);
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--text);
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .faq-question:hover {
      background: rgba(212, 175, 55, 0.05);
      color: var(--gold);
    }

    .faq-icon {
      font-size: 16px;
      transition: transform 0.2s;
    }

    .faq-answer {
      display: none;
      padding: 16px;
      background: rgba(10, 5, 20, 0.5);
      border-top: 1px solid var(--border);
      font-size: 14px;
      color: var(--text);
      line-height: 1.7;
    }

    .faq-answer.open {
      display: block;
    }

    .faq-icon.open {
      transform: rotate(180deg);
    }

    /* ── Premium Modal ── */
    .premium-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      padding: 20px;
      align-items: center;
      justify-content: center;
    }

    .premium-modal.active {
      display: flex;
    }

    .premium-modal-content {
      background: var(--card);
      border: 2px solid var(--gold);
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 420px;
      text-align: center;
    }

    .premium-modal-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .premium-modal-title {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      color: var(--gold);
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .premium-modal-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .premium-modal-btns {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .premium-modal-btns .btn {
      width: 100%;
    }

    /* ── Footer ── */
    .page-footer {
      background: rgba(10, 5, 20, 0.8);
      border-top: 1px solid var(--border);
      padding: 20px;
      text-align: center;
      position: relative;
      z-index: 2;
      margin-top: 40px;
    }

    .footer-text {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .footer-links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .footer-link {
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-link:hover {
      color: var(--gold);
    }

    /* ── Theme Day Overrides ── */
    html.theme-day .card,
    html.theme-day .dash-card {
      background-color: var(--card);
      border: 2px solid var(--border);
      color: var(--text);
    }

    html.theme-day h1,
    html.theme-day h2,
    html.theme-day h3,
    html.theme-day .hero-title,
    html.theme-day .section-title,
    html.theme-day .result-name {
      color: var(--text);
      text-shadow: none;
    }

    html.theme-day button {
      background-color: var(--gold);
      color: var(--text);
      border: 2px solid var(--border);
    }

    html.theme-day input,
    html.theme-day select {
      background-color: #ffffff;
      color: var(--text);
      border: 2px solid var(--border);
    }

    html.theme-day .page-header {
      background: rgba(245, 242, 237, 0.8);
    }
  </style>
</head>

  <!-- ── HEADER ── -->

      </div>

    <!-- Article Section -->
    <article class="article-section" id="article-section">
      <h2 class="section-title" id="art-title"></h2>
      <p class="section-intro" id="art-intro"></p>
      <p id="artP1"></p>
      <p id="artP2"></p>
      <p id="artP3"></p>
      <p id="artP4"></p>
      <p id="artP5"></p>

    <!-- FAQ Section -->

      <a href="./contatti.html" class="footer-link" id="footer-contatti"></a>
      <a href="./about.html" class="footer-link" id="footer-about"></a>
    </div>
  </footer>

  <!-- ── PREMIUM MODAL ── -->
  <div class="premium-modal" id="premium-modal" aria-hidden="true">

    /* ── Audio Manager ── */
    const AudioManager = {
      audio: null,
      init() {
        const isPlaying = sessionStorage.getItem('myst_audio_state') === 'true';
        if (isPlaying) {
          this.audio = new Audio('./images/icone/audio/mystica_ambient_432_528.mp3');
          this.audio.loop = true;
          this.audio.play().catch(() => {});
        }
        updateAudioToggle();
      },
      toggle() {
        if (!this.audio) {
          this.audio = new Audio('./images/icone/audio/mystica_ambient_432_528.mp3');
          this.audio.loop = true;
        }
        if (this.audio.paused) {
          this.audio.play().catch(() => {});
          sessionStorage.setItem('myst_audio_state', 'true');
        } else {
          this.audio.pause();
          sessionStorage.setItem('myst_audio_state', 'false');
        }
        updateAudioToggle();
      }
    };

    function updateAudioToggle() {
      const btn = $('audio-toggle');
      if (btn) {
        btn.textContent = (AudioManager.audio && !AudioManager.audio.paused) ? '🔉' : '🔊';
      }
    }

    /* ── Premium Check ── */
    function isPremium() {
      return localStorage.getItem('myst_premium') === '1';
    }

    function requirePremium(callback) {
      if (isPremium()) {
        callback();
      } else {
        openPremiumModal();
      }
    }

    function openPremiumModal() {
      const modal = $('premium-modal');
      if (modal) {
        modal.classList.add('active');
        modal.setAttribute('aria-hidden', 'false');
      }
    }

    function closePremiumModal() {
      const modal = $('premium-modal');
      if (modal) {
        modal.classList.remove('active');
        modal.setAttribute('aria-hidden', 'true');
      }
    }

    /* ── SEO Dynamic Update ── */
    function updateSEO() {
      const seo = LANG[currentLang].seo;
      
      document.documentElement.lang = currentLang;
      document.title = seo.title;
      
      document.querySelector('meta[name="description"]').content = seo.description;
      document.querySelector('meta[name="keywords"]').content = seo.keywords;
      document.querySelector('meta[property="og:title"]').content = seo.ogTitle;
      document.querySelector('meta[property="og:description"]').content = seo.ogDescription;
      document.querySelector('meta[property="og:image"]').content = seo.ogImage;
      document.querySelector('meta[name="twitter:title"]').content = seo.twitterTitle;
      document.querySelector('meta[name="twitter:description"]').content = seo.twitterDescription;
      document.querySelector('meta[name="twitter:image"]').content = seo.twitterImage;
      document.querySelector('meta[property="og:locale"]').content = currentLang === 'it' ? 'it_IT' : currentLang === 'en' ? 'en_US' : 'es_ES';

      const schemaLD = {
        '@context': 'https://schema.org',
        '@type': 'FAQPage',
        mainEntity: seo.faqLD.map(item => ({
          '@type': 'Question',
          name: item.q,
          acceptedAnswer: {
            '@type': 'Answer',
            text: item.a
          }
        }))
      };
      document.getElementById('schema-json').textContent = JSON.stringify(schemaLD);
    }

    /* ── Apply Language ── */
    function applyLang() {
      updateSEO();
      
      const txt = LANG[currentLang];

      $('page-title').textContent = txt.pageTitle;
      $('page-subtitle').textContent = txt.pageSubtitle;
      $('page-intro').textContent = txt.pageIntro;

      $('label-domanda').textContent = txt.labelDomanda;
      $('label-seleziona').textContent = txt.labelSeleziona;
      $('btn-consulta').textContent = txt.btnConsulta;
      $('btn-random').textContent = txt.btnRandom;

      $('share-title').textContent = txt.shareTitle;

      $('art-title').textContent = txt.artTitle;
      $('art-intro').textContent = txt.artIntro;
      $('artP1').textContent = txt.artP1;
      $('artP2').textContent = txt.artP2;
      $('artP3').textContent = txt.artP3;
      $('artP4').textContent = txt.artP4;
      $('artP5').textContent = txt.artP5;

      $('faq-title').textContent = txt.faqTitle;
      renderFAQ(txt.faqItems);

      $('prem-title').textContent = txt.premTitle;
      $('prem-text').textContent = txt.premText;
      $('prem-btn').textContent = txt.premBtn;
      $('prem-close').textContent = txt.premClose;

      $('footer-copyright').textContent = txt.footerCopyright;
      $('footer-home').textContent = txt.footerHome;
      $('footer-contatti').textContent = txt.footerContatti;
      $('footer-about').textContent = txt.footerAbout;

      renderSephirot();
    }

    /* ── Render Sephirot Grid ── */
    function renderSephirot() {
      const grid = $('sephirot-grid');
      if (!grid) return;
      grid.innerHTML = '';
      
      DB_CABALA.forEach((s, i) => {
        const btn = document.createElement('button');
        btn.className = 'seph-btn' + (i === 0 ? ' active' : '');
        btn.id = 'kabTab' + i;
        btn.textContent = s.nome;
        btn.onclick = () => kabSelSeph(i);
        grid.appendChild(btn);
      });
    }

    /* ── Render FAQ ── */
    function renderFAQ(items) {
      const container = $('faq-container');
      if (!container) return;
      container.innerHTML = '';
      
      items.forEach((item, i) => {
        const faqItem = document.createElement('div');
        faqItem.className = 'faq-item';
        
        const question = document.createElement('div');
        question.className = 'faq-question';
        question.onclick = () => {
          const answer = faqItem.querySelector('.faq-answer');
          const icon = question.querySelector('.faq-icon');
          answer.classList.toggle('open');
          icon.classList.toggle('open');
        };
        question.innerHTML = `
          <span>${item.q}</span>
          <span class="faq-icon">▼</span>
        `;
        
        const answer = document.createElement('div');
        answer.className = 'faq-answer';
        answer.textContent = item.a;
        
        faqItem.appendChild(question);
        faqItem.appendChild(answer);
        container.appendChild(faqItem);
      });
    }

    /* ── Sephirot Selection ── */
    let _kabSeph = 0;

    function kabSelSeph(i) {
      _kabSeph = i;
      for (let k = 0; k < 10; k++) {
        const tab = $('kabTab' + k);
        if (tab) {
          tab.classList.toggle('active', k === i);
        }
      }
    }

    function kabRandom() {
      _kabSeph = Math.floor(Math.random() * 10);
      kabSelSeph(_kabSeph);
      calcCabala();
    }

    function calcCabala() {
      const domanda = ($('kabDomanda')?.value || '').trim();
      const d = DB_CABALA[_kabSeph];

      const domHtml = domanda
        ? `<div style="background: rgba(10, 5, 20, 0.5); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-style: italic; font-size: 13px; padding: 10px 14px; margin-bottom: 14px; text-align: center;">❓ "${domanda}"</div>`
        : '';

      $('kabResult').innerHTML = `
        <div class="result-header">
          <div class="result-icon">${d.simbolo}</div>
          <div class="result-name">${d.nome}</div>
          <div class="result-translation">${d.trad.toUpperCase()}</div>
          <span class="result-tag">Sephirah ${d.num} · ${d.pianeta}</span>
        </div>
        <div class="result-grid">
          <div class="result-card"><div class="result-card-icon">👼</div><div class="result-card-label">Arcangelo</div><div class="result-card-val">${d.arcangelo}</div></div>
          <div class="result-card"><div class="result-card-icon">🎨</div><div class="result-card-label">Colore</div><div class="result-card-val">${d.colore}</div></div>
        </div>
        ${domHtml}
        <div class="result-block"><h4>🌌 ${LANG[currentLang].pageTitle === 'Cabala' ? 'Il Messaggio della Sephirah' : 'The Message of the Sephirah'}</h4><p>${d.desc}</p></div>
        <div class="result-block"><h4>✨ ${LANG[currentLang].pageTitle === 'Cabala' ? 'Doni' : 'Gifts'}</h4><p>${d.luci}</p></div>
        <div class="result-block"><h4>⚠️ ${LANG[currentLang].pageTitle === 'Cabala' ? 'Sfide da Integrare' : 'Challenges to Integrate'}</h4><p>${d.ombre}</p></div>
        <div class="result-block" style="border-left-color: #c8b4ff;"><h4 style="color: #c8b4ff;">🧘 ${LANG[currentLang].pageTitle === 'Cabala' ? 'Meditazione Kabbalistica' : 'Kabbalistic Meditation'}</h4><p>${d.meditazione}</p></div>
        <div class="btn-grp">
          <button class="btn btn-sec" onclick="resetCabala()">🔄 ${LANG[currentLang].btnRandom}</button>
        </div>
      `;
      $('kabResult').style.display = 'block';
      $('kabFormBtns').style.display = 'flex';
      $('kabDomanda').style.display = 'none';
      $('kabResult').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function resetCabala() {
      $('kabResult').style.display = 'none';
      $('kabFormBtns').style.display = 'flex';
      $('kabDomanda').style.display = 'block';
      if ($('kabDomanda')) $('kabDomanda').value = '';
      $('oracolo').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Share Functionality ── */
    function shareUrl() {
      return window.location.href;
    }

    function setupShare() {
      const url = shareUrl();
      const title = LANG[currentLang].seo.title;
      const desc = LANG[currentLang].seo.description;

      $('share-wa')?.addEventListener('click', () => {
        const text = `${title}\n${desc}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text + '\n' + url)}`, '_blank');
      });

      $('share-tg')?.addEventListener('click', () => {
        const text = `${title}\n${desc}`;
        window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`, '_blank');
      });

      $('share-fb')?.addEventListener('click', () => {
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
      });

      $('share-x')?.addEventListener('click', () => {
        const text = `${title} ${url}`;
        window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
      });

      $('share-copy')?.addEventListener('click', () => {
        navigator.clipboard.writeText(url).then(() => {
          alert(currentLang === 'it' ? 'Link copiato!' : currentLang === 'en' ? 'Link copied!' : '¡Enlace copiado!');
        });
      });
    }

    /* ── Theme Toggle ── */
    function initTheme() {
      if (currentTheme === 'day') {
        document.documentElement.classList.add('theme-day');
      }
      updateThemeToggle();
    }

    function toggleTheme() {
      currentTheme = currentTheme === 'night' ? 'day' : 'night';
      localStorage.setItem('myst_theme', currentTheme);
      
      if (currentTheme === 'day') {
        document.documentElement.classList.add('theme-day');
      } else {
        document.documentElement.classList.remove('theme-day');
      }
      updateThemeToggle();
    }

    function updateThemeToggle() {
      const btn = $('theme-toggle');
      if (btn) {
        btn.textContent = currentTheme === 'night' ? '🌙' : '☀️';
      }
    }

    /* ── Language Toggle ── */
    function initLanguage() {
      const langBtns = document.querySelectorAll('.lang-btn');
      langBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
        btn.addEventListener('click', () => {
          currentLang = btn.dataset.lang;
          localStorage.setItem('myst_lang', currentLang);
          langBtns.forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
          applyLang();
          setupShare();
        });
      });
    }

    /* ── Init Sequence ── */
    function init() {
      initTheme();
      AudioManager.init();
      initLanguage();
      applyLang();
      setupShare();

      $('audio-toggle')?.addEventListener('click', () => AudioManager.toggle());
      $('theme-toggle')?.addEventListener('click', () => toggleTheme());

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closePremiumModal();
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
