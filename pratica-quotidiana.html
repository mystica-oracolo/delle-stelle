abbondanza:{potente:['Soy un imán para la abundancia en todas sus formas.','El dinero me encuentra con facilidad y a menudo.','Merezco prosperidad, éxito y abundancia real.','El universo me apoya en construir mi riqueza.','Soy rico en oportunidades, energía y recursos.','La abundancia es mi estado natural.','Creo valor en el mundo y recibo valor a cambio.','Cada día me acerco más a la libertad financiera.','La prosperidad fluye hacia mí naturalmente.'],gentile:['Recibo la abundancia con manos abiertas y corazón agradecido.','Me permito tener más sin sentirme culpable.','Merezco una vida cómoda y serena.','La abundancia llega a mí con facilidad y gracia.','Soy digno de recibir todo el bien que deseo.','La riqueza me permite dar más.','Estoy a salvo en la abundancia.','Dejo que la prosperidad me nutra.','Cada día llevo gratitud por lo que tengo.'],mistico:['Soy uno con el flujo infinito de la abundancia universal.','Como las estrellas son infinitas, infinitas son mis posibilidades.','La abundancia es el aliento del cosmos que pasa a través de mí.','Soy un canal para la prosperidad de la creación.','El universo es generoso — y yo soy parte del universo.','Mi campo energético atrae recursos y oportunidades.','Como crece la luna, crece mi prosperidad.','Estoy alineado con la frecuencia de la abundancia.','Recibo porque soy parte del todo que se entrega.'],solenne:['Decreto: merezco prosperidad y abundancia total.','Sello esta intención: la abundancia es mía.','Con intención firme atraigo abundancia ahora.','La escasez ya no me pertenece.','Decreto: la prosperidad es mi derecho de nacimiento.','Que el flujo de la prosperidad no se detenga nunca.','Con cada respiración, respiro abundancia.','Consagro esta certeza: soy próspero.','Que sea testigo de esta verdad: soy abundante.'],sacro:['Agradezco por cada forma de abundancia en mi vida.','Estoy agradecido por el pan, el techo, la salud.','Confío mi camino de prosperidad a lo divino.','La abundancia que recibo también sirve al mundo.','Ruego por recibir lo que realmente necesito.','Soy un instrumento de la generosidad cósmica.','Que pueda recibir y redistribuir con sabiduría.','Cada recurso que recibo es un regalo que custodiar.','La generosidad del universo me inspira cada día.']},
guarigione:{potente:['Mi cuerpo sana con un poder sorprendente.','Cada célula se renueva en salud perfecta.','Soy más fuerte que cualquier herida.','Mi organismo siempre sabe cómo volver al equilibrio.','Sano a nivel físico, emocional, espiritual.','Estoy en perfecta alineación con la salud total.','Mi cuerpo es mi casa sagrada — lo honro.','Sanar es mi derecho natural.','Llevo salud y vitalidad en cada respiración.'],gentile:['Me cuido con ternura cada día.','Mi cuerpo merece atención, respeto y amor.','Me permito sanar a mi propio ritmo.','Cada día me siento un poco mejor que ayer.','Me trato con la dulzura de una madre.','Me doy permiso de descansar y regenerarme.','La sanación ocurre cuando me amo de verdad.','Escucho a mi cuerpo cuando habla.','Acojo cada paso de mi camino de salud.'],mistico:['La luz universal sana cada parte de mí.','Estoy conectado a la fuente inagotable de vida.','Como la tierra se renueva en primavera, me renuevo yo.','Cada herida lleva en sí la semilla de la sanación.','El río de la vida fluye libre a través de mí.','La fuerza vital del cosmos habita en mi respiración.','Cada amanecer trae nueva sanación.','Estoy tejido de luz — y la luz sana.','Soy energía pura que se realinea continuamente.'],solenne:['Decreto: mi cuerpo se sana completamente.','Que la sanación se manifieste en cada nivel de mi ser.','Con toda mi voluntad: sano completamente.','Sello esta verdad: la salud es mi estado natural.','Consagro mi cuerpo a la vida plena y sana.','Que la luz sanadora habite en cada célula mía.','La salud es mi derecho y mi realidad.','Decreto con firmeza: estoy sano, vital, íntegro.','Que la sanación obre en mí ahora y siempre.'],sacro:['Mi cuerpo es un templo sagrado que merezco cuidar.','Agradezco por la vida que fluye en mí cada día.','Confío mi salud a la sabiduría del universo.','Estoy agradecido por cada momento de bienestar.','Mi cuerpo es sagrado — lo trato como tal.','Ruego para que la salud se arraigue en cada parte de mí.','Confío en el proceso natural de regeneración.','Que las manos invisibles de lo divino me sanen.','Estoy agradecido por cada respiración, cada latido.']},
protezione:{potente:['Estoy rodeado de un escudo de luz invencible.','Nada oscuro puede penetrar mi campo energético.','Estoy protegido en todos los planos: físico, emocional, espiritual.','Mi aura es un bastión de luz dorada.','Expulso toda energía que no me pertenece.','Soy inatacable por las energías bajas ajenas.','Mi protección es total y absoluta.','Cada límite que trazo es sagrado y respetado.','Estoy a salvo donde quiera que esté.'],gentile:['Me siento seguro en el mundo y en las relaciones.','Estoy protegido por el amor de toda la creación.','Me permito estar a salvo sin defenderme.','Estoy a salvo. Estoy protegido. Soy amado.','Confío en la bondad fundamental de la vida.','El límite entre yo y los demás es claro y amoroso.','Recibo protección naturalmente donde quiera que vaya.','La vida me abraza y me mantiene a salvo.','Dejo que la protección me envuelva como un manto.'],mistico:['Los ángeles guardianes velan por cada uno de mis pasos.','Mi espíritu está sellado con la luz del primer sol.','Como la luna custodia la noche, soy custodiado.','Mi campo energético repele toda oscuridad.','Seres de luz caminan a mi lado.','El universo es mi guardián fiel.','Cada puerta que cierro sella mi bienestar.','Estoy marcado por la protección cósmica.','Como la roca no se mueve con el viento, así mi protección.'],solenne:['En este rito sello mi protección total.','Decreto: ninguna energía adversa me alcanza.','Construyo un bastión de luz con esta intención.','Que cada límite que trazo sea sagrado y respetado.','Sello cada brecha — solo el bien entra en mí.','Con toda mi voluntad: estoy protegido ahora.','Que la luz divina me rodee por todos lados.','Esta protección es real, total, eterna.','Declaro: estoy a salvo en este cuerpo, en esta vida.'],sacro:['Me confío a la protección de los seres de luz.','Agradezco a mis antepasados que velan por mí.','Lo divino es mi escudo y mi roca.','Estoy agradecido por la protección invisible que me sigue.','Ruego para que ningún mal me alcance a mí ni a los míos.','Bajo el cielo estrellado siempre estoy a salvo.','Que los ángeles guardianes me guíen y protejan.','La sabiduría del cosmos me protege en cada paso.','Confío mi protección a las manos del universo.']},
fiducia:{potente:['Confío plenamente en mí mismo en cada situación.','Soy capaz, digno y estoy listo para afrontar cualquier desafío.','Mi autoestima es inquebrantable como una montaña.','Actúo con confianza incluso en la incertidumbre.','Cada día estoy más seguro de mí mismo.','Sé quién soy y no necesito demostrarlo.','Confío en mi proceso interior.','Soy suficiente exactamente como soy.','Confío en mi inteligencia, intuición y fuerza.'],gentile:['Me doy permiso de estar orgulloso de quien soy.','Soy suficiente, tengo suficiente, hago suficiente.','Me perdono por mis errores y sigo adelante.','Mi voz interior es amable y alentadora.','Reconozco y celebro mis cualidades únicas.','Elijo creer en mí mismo incluso cuando es difícil.','Me trato con respeto y confianza cada día.','Merezco ocupar espacio en este mundo.','Crezco cada día en la confianza en mí mismo.'],mistico:['Soy un ser de luz que lleva una misión única.','Mi presencia tiene un significado cósmico.','Vengo de estrellas antiguas — llevo su sabiduría.','Mi camino está escrito por una mano invisible y sabia.','Estoy alineado con mi destino superior.','Mi alma ya sabe todo lo que necesito saber.','Confío en el diseño más grande del que soy parte.','Soy un hilo precioso en el tapiz cósmico de la existencia.','Mi singularidad es mi regalo al mundo.'],solenne:['Decreto: confío completamente en mí mismo.','Sello esta verdad: mi autoestima está completa.','Declaro con firmeza: conozco mi valor.','Consagro esta certeza: soy suficiente.','Esta es mi declaración: soy plenamente yo.','Con toda mi alma: confío en mi camino.','Decreto: la seguridad interior es mi roca.','Que la duda se disuelva ante mi confianza.','Con esta voz: soy digno, capaz, valioso.'],sacro:['Estoy agradecido por el don de ser exactamente quien soy.','Confío mi camino a la sabiduría superior.','Ruego por la gracia de verme como me ve el universo.','Soy un regalo único en este universo.','Confío en el proceso sagrado de mi crecimiento.','Agradezco por los talentos y cualidades que llevo.','Con humildad y confianza camino mi destino.','Soy hijo de la luz — y la luz cree en mí.','Que lo divino me sostenga cuando dudo de mí mismo.']},
creativita:{potente:['La creatividad fluye a través de mí como un río crecido.','Soy un canal inagotable de ideas y visiones.','Mi expresión creativa es única y poderosa.','Cada día creo algo que no existía antes.','La inspiración me busca y siempre me encuentra.','Soy audaz en mi expresión artística.','Mi talento crece cada vez que lo expreso.','Creo con valentía y sin censura.','Soy un artista, un creador, un visionario.'],gentile:['Me doy permiso de crear libremente.','Mi creatividad no necesita ser perfecta.','Creo por el puro placer de crear.','Me permito jugar, equivocarme, descubrir.','Cada creación tiene valor, incluso imperfecta.','Mi voz creativa merece ser escuchada.','Acojo mis ideas con amabilidad y curiosidad.','Creo con alegría sin apego al resultado.','Mi proceso creativo es válido tal como es.'],mistico:['Soy un instrumento de la creación que crea a través de mí.','Las musas del universo me visitan cada día.','Creo como las estrellas — espontáneamente, magníficamente.','Mi creatividad está conectada a la fuente original.','Cada acto creativo es un acto de cocreación cósmica.','La inspiración es un mensaje del campo invisible.','Soy un puente entre lo inexistente y lo manifiesto.','Creo porque estoy hecho a imagen del Creador.','Las visiones que recibo son regalos de mundos sutiles.'],solenne:['Decreto: mi creatividad es libre y poderosa.','Desbloqueo cada bloqueo creativo con esta intención.','Declaro: creo con facilidad, alegría y abundancia.','Con toda mi fuerza: ofrezco mi don al mundo.','Que cada obstáculo creativo se disuelva ahora.','Sello: la inspiración siempre está disponible para mí.','Esta es mi promesa: creo cada día.','Que la creatividad fluya sin impedimentos.','Consagro mi vida a la expresión creativa.'],sacro:['Agradezco por el don de la creatividad que llevo.','Mi talento es un regalo sagrado para compartir.','Confío mi expresión a las manos de lo divino.','Ruego para que mi talento florezca plenamente.','Estoy agradecido por cada chispa de inspiración.','Que cada creación traiga luz a quien la recibe.','Con humildad ofrezco mi creatividad al mundo.','Que lo creado use mis manos para crear belleza.','Estoy agradecido por cada momento de inspiración.']},
intuizione:{potente:['Mi intuición es aguda, precisa e infalible.','Confío ciegamente en la voz interior.','Recibo con claridad señales, visiones y mensajes.','Mi sensibilidad es un superpoder.','Escucho antes de actuar — mi intuición no falla.','Soy un ser altamente intuitivo y consciente.','Mi tercera vista se abre cada vez más.','Percibo la energía de las situaciones con precisión.','Mi intuición siempre me guía hacia el bien.'],gentile:['Confío en las señales sutiles que recibo cada día.','Me permito confiar en lo que siento sin explicaciones.','Acojo mis percepciones sin juzgarlas.','La voz de mi intuición es gentil y sabia.','Creo espacio en el silencio para mi guía interior.','Confío en mi \u201clo siento\u201d incluso sin pruebas.','La intuición es un don que honro cada día.','Mi intuición habla bajito — yo la escucho.','Me doy permiso de saber sin saber cómo.'],mistico:['Soy un ser sensible conectado a los planos sutiles.','Mi tercera vista percibe lo que los ojos no ven.','Recibo mensajes a través de sueños, símbolos y sincronicidades.','Estoy en comunicación constante con mi alma guía.','El velo entre los mundos es delgado para mí.','Leo la energía del campo invisible.','Mis chakras superiores están abiertos y receptivos.','Soy un sensitivo — cada percepción tiene significado.','El universo me habla continuamente — yo lo escucho.'],solenne:['Decreto: mi intuición es mi brújula infalible.','Sello: mi canal intuitivo está abierto y puro.','Afino mi percepción sutil con esta intención.','Declaro: confío completamente en mi guía interior.','Consagro mi escucha interior como práctica sagrada.','Que cada señal me llegue clara e inequívoca.','Este rito potencia mi conexión intuitiva.','Con toda mi presencia: percibo la verdad.','Que mi intuición me guíe con precisión.'],sacro:['Agradezco por el don de la sensibilidad.','Confío mi guía a la sabiduría del cosmos.','Ruego para que mi intuición me muestre el camino.','Soy un instrumento de la sabiduría universal.','Que los seres de luz guíen mis percepciones.','Con humildad escucho la voz del alma.','Confío en la sabiduría que me habla en silencio.','Estoy agradecido por cada señal recibida.','Que lo divino me hable a través de la intuición.']},
liberazione:{potente:['Me libero completamente de todo lo que no me sirve.','Corto cada cadena que limita mi crecimiento.','Estoy libre de miedos, condicionamientos y viejas creencias.','Nada del pasado tiene poder para detenerme.','Soy dueño de mi mente, mi corazón, mi vida.','Mi libertad interior es total e inviolable.','Me libero con valentía de cada patrón negativo.','Estoy listo para soltar todo y ser quien soy.','Me libero con determinación de lo que ya no me pertenece.'],gentile:['Con dulzura suelto lo que ya no me pertenece.','Me doy permiso de cambiar, crecer, evolucionar.','Me libero de los juicios que llevo sobre mis hombros.','Me permito ser diferente de quien era ayer.','Cada día me libero un poco más.','Dejo que el pasado me enseñe sin tenerme prisionero.','Me libero lentamente, amorosamente, completamente.','Acojo el cambio con dulzura y curiosidad.','Suelto con amor lo que fue y ya no es.'],mistico:['La serpiente muda de piel — yo también me renuevo por completo.','Como la luna suelta la oscuridad, suelto el peso.','Soy como el fuego que quema lo que ya no sirve.','Cada atardecer se lleva algo viejo de mí.','La luna menguante se lleva mis cadenas.','Como el amanecer disuelve la noche, disuelvo todo límite.','Como el agua cambio de forma sin perder mi esencia.','Soy el viento que barre lo que estaba listo para irse.','La liberación es un acto cósmico — participo plenamente en él.'],solenne:['Decreto solemnemente: me libero ahora de todo peso.','Sello esta liberación: el pasado no tiene poder sobre mí.','Con esta intención corto cada lazo que me limita.','Que cada cadena se disuelva en la luz de esta intención.','Declaro: estoy libre, ligero, abierto a lo nuevo.','Consagro este momento como mi rito de liberación.','Con plena voluntad: me libero, me transformo, me renuevo.','Lo que fue termina aquí — y comienza la libertad.','En este rito de liberación, suelto todo.'],sacro:['Agradezco las lecciones del pasado y las suelto con amor.','Confío a lo divino lo que no puedo liberar solo.','Estoy agradecido por cada experiencia, incluso la dolorosa.','Ruego por la gracia de soltar lo que retengo.','Con humildad pido el don de la liberación interior.','Entrego al fuego sagrado mis pesos y mis miedos.','Lo divino me ayuda a hacer espacio para lo nuevo.','Suelto — y me confío al flujo de la vida.','Que el cielo me ayude a llevar el perdón en el corazón.']},
salute:{potente:['Mi cuerpo es fuerte, sano y lleno de vitalidad.','Cada sistema de mi organismo funciona perfectamente.','Mi salud mejora cada día.','Estoy lleno de energía vital y fuerza física.','Mi cuerpo sabe cómo mantenerse en salud.','Cada día elijo lo que nutre mi cuerpo.','Vivo en un cuerpo que honro y respeto.','Mi vitalidad es un patrimonio que custodio.','Me cuido con disciplina y amor.'],gentile:['Me cuido con amor y paciencia.','Merezco sentirme bien — me doy lo que necesito.','Escucho las señales de mi cuerpo con respeto.','Me muevo, respiro y como con conciencia.','Mi cuerpo me lleva por este mundo — se lo agradezco.','Elijo la salud porque me amo.','Me doy permiso de descansar cuando lo necesito.','Cada acto de cuidado hacia mí mismo es un acto de amor.','Honro mi cuerpo en lo bueno y en lo malo.'],mistico:['Mi cuerpo es un templo donde habita la chispa divina.','La fuerza vital cósmica fluye libre a través de mí.','Como la naturaleza se regenera, mi cuerpo se regenera.','El prana universal nutre cada célula mía.','Estoy en armonía con los ritmos naturales de mi ser.','Mi campo bioenergético es luminoso y saludable.','Soy vida que celebra a sí misma.','La luz sanadora fluye en mis meridianos y chakras.','Estoy conectado a la fuente inagotable de energía vital.'],solenne:['Decreto: la salud total es mi estado natural.','Con esta intención sello mi vitalidad.','Que cada célula reciba el mensaje de salud y fuerza.','Decreto: el bienestar es mi realidad permanente.','Consagro mi cuerpo a la vida plena y vital.','Que la vida fluya en mí potente e ininterrumpida.','Con plena voluntad: elijo la salud cada día.','Declaro: cada día mi cuerpo se renueva en salud.','Sello este rito con la intención de sanar y florecer.'],sacro:['Agradezco cada día de salud y bienestar.','Estoy agradecido por el milagro cotidiano de mi cuerpo.','Confío mi salud a la sabiduría de la creación.','Honro el templo de mi cuerpo como regalo sagrado.','Lo divino habita en mi cuerpo — lo cuido en consecuencia.','Ruego para que la sanación obre en cada parte de mí.','Estoy agradecido por cada respiración, cada latido, cada paso.','Con gratitud y fe: estoy sano, vivo, íntegro.','Que las fuerzas naturales me apoyen en la salud.']},
scopo:{potente:['Vivo con un propósito claro y una misión poderosa.','Estoy aquí por una razón precisa — y lo sé.','Cada día actúo en alineación con mi misión.','Mi contribución al mundo es única y necesaria.','Estoy decidido a realizar mi máximo potencial.','Mi vida tiene un significado profundo y real.','Avanzo con valentía hacia mi destino.','Creo un impacto real en el mundo que me rodea.','Estoy listo para responder al llamado de mi alma.'],gentile:['Exploro mi propósito con curiosidad y dulzura.','Mi camino se revela un paso a la vez.','Cada experiencia me enseña algo sobre mi misión.','Estoy en paz con mi proceso de descubrimiento.','Confío en que mi camino tiene sentido aunque no lo vea.','No necesito todas las respuestas — camino con confianza.','Me doy permiso de cambiar de dirección si es necesario.','Mi propósito se manifiesta del modo más adecuado para mí.','Cada pequeño paso cuenta en el diseño más grande.'],mistico:['Estoy encarnado con un propósito cósmico que cumplir.','Mi alma eligió este tiempo, este lugar.','Soy una pieza necesaria del rompecabezas del universo.','Mi dharma me espera — ya lo estoy viviendo.','Vengo de estrellas antiguas con una misión específica.','Mi paso por la tierra deja una huella de luz.','El universo me llamó aquí para una tarea precisa.','Mi misión está escrita en el libro del alma.','Soy un agente de cambio en este mundo.'],solenne:['Decreto: respondo al llamado de mi alma.','Consagro mi vida a la realización de mi propósito.','Sello esta intención: actúo en línea con mi misión.','Con toda mi voluntad: vivo con propósito cada día.','Decreto: mi propósito se manifiesta con claridad.','Declaro con firmeza: sé por qué estoy aquí.','En este rito me comprometo con mi misión de vida.','Que cada elección me acerque a mi versión más elevada.','Que mi vida sea una obra digna de mi alma.'],sacro:['Agradezco por el don de una vida con significado.','Confío mi propósito a la sabiduría divina.','Ruego para que mi misión se revele con claridad.','Estoy agradecido de estar vivo en este momento histórico.','Que lo divino guíe mis pasos hacia mi propósito.','Confío en que la vida me mostrará el camino en el momento justo.','Mi propósito es un regalo — lo acojo con gratitud.','Con humildad me pongo al servicio de mi alma.','Estoy agradecido por cada etapa de mi camino.']},
pace:{potente:['La paz interior es mi roca inquebrantable.','Mantengo la calma en cualquier tormenta.','La serenidad es mi estado por defecto.','Nada raya mi paz profunda.','Elijo la paz por encima de todo lo demás.','Mi mente está quieta, clara, centrada.','Genero paz a mi alrededor irradiándola desde dentro.','Soy inamovible en mi paz interior.','Soy un puerto tranquilo en el caos del mundo.'],gentile:['Me doy permiso de estar en paz.','La paz no se gana — ya está en mí.','Me detengo, respiro y vuelvo al centro.','Cada momento es una oportunidad de elegir la paz.','Me trato con la dulzura que genera serenidad.','Me doy permiso de ir más despacio cuando lo necesito.','La paz me pertenece — elijo habitarla.','Creo ambientes y relaciones que nutren mi paz.','Suelto lo que no puedo controlar.'],mistico:['Soy el ojo del huracán — quieto en medio del caos.','Como el lago refleja el cielo en perfecta quietud, así soy yo.','La paz es el sonido original del cosmos — lo escucho.','Estoy conectado al centro silencioso del universo.','Mi silencio interior es vasto como el espacio.','Soy una isla de paz en un océano de cambio.','La quietud del cosmos habita en lo profundo de mi corazón.','Soy paz — no necesito buscarla afuera.','Como la roca no se mueve con el viento, así mi paz.'],solenne:['Decreto: la paz es mi derecho y mi realidad.','Sello: nada puede perturbar mi paz profunda.','Declaro: estoy en paz conmigo y con la vida.','Que la tormenta se calme — dentro y fuera de mí.','Con toda mi alma: elijo la paz.','En este rito ancoro la paz en lo profundo de mi ser.','Decreto: la serenidad me pertenece ahora y siempre.','Que la paz que hay en mí se irradie a todo el mundo.','Consagro esta serenidad con toda mi intención.'],sacro:['Agradezco los momentos de paz en mi vida.','Confío mis preocupaciones a las manos de lo divino.','Estoy agradecido por cada instante de serenidad.','Confío en que todo sucede como debe suceder.','Lo divino es paz — y yo soy parte de lo divino.','Estoy en paz con el misterio de la vida.','Que el cielo me dé la gracia de la paz interior.','Con humildad me libero del caos y elijo la quietud.','Ruego para que la paz me alcance en momentos difíciles.']},
coraggio:{potente:['Afronto cada desafío con coraje inquebrantable.','El miedo no me detiene — me informa y luego actúo.','Soy más valiente de lo que creo.','Avanzo incluso cuando tiemblo.','Mi coraje crece cada vez que lo pongo a prueba.','No me retiro ante lo que realmente importa.','Soy audaz, decidido, valiente.','Elijo el coraje por encima de la comodidad cada día.','Soy un guerrero de luz — afronto toda oscuridad.'],gentile:['Me doy permiso de ser valiente a mi propio ritmo.','El coraje no es ausencia de miedo — es actuar a pesar de él.','Me animo a dar el siguiente paso, aunque sea pequeño.','Cada acto de coraje, pequeño o grande, cuenta.','Me felicito por el coraje que ya tengo.','Soy más fuerte de lo que pienso.','Me doy la mano cuando tengo miedo y avanzo igual.','Mi coraje no necesita ser perfecto para ser real.','Cada día encuentro un pequeño acto de valentía.'],mistico:['Soy un guerrero del alma que no conoce la rendición.','Como el sol sale cada mañana a pesar de la noche, yo me levanto.','Mi espíritu está hecho de un fuego que no se apaga.','Desciendo de héroes — llevo su coraje en mí.','El universo pone en mi camino solo lo que puedo sostener.','Estoy templado por las tormentas — salgo más fuerte.','Mi coraje viene de un lugar cósmico profundo.','Como el trueno no pide permiso, tampoco lo pido yo.','Soy el fuego que quema sus propios miedos.'],solenne:['Decreto con toda mi voz: soy valiente.','Consagro mi vida al coraje de ser yo mismo.','Sello: el miedo ya no me gobierna.','Declaro con firmeza: avanzo, elijo, actúo.','Con toda mi fuerza: elijo el coraje hoy.','Que cada vacilación arda en el fuego de mi intención.','En este rito abrazo al guerrero que vive en mí.','Decreto: el coraje es mi respuesta natural a la vida.','Que mi vida sea un acto de coraje cotidiano.'],sacro:['Agradezco cada vez que elegí el coraje.','Confío mis miedos a la sabiduría de lo divino.','Estoy agradecido por la fuerza invisible que me sostiene.','Lo divino camina conmigo — no tengo nada que temer.','Confío en que el universo me sostiene en cada acto valiente.','Ruego para que el coraje me acompañe donde la razón se detiene.','Estoy agradecido por cada prueba que me hizo más fuerte.','Con humildad y determinación avanzo en mi camino.','Que el cielo me dé el coraje de vivir plenamente.']}
};

const DECRETI_IT={fuoco:{nuova:'Con il fuoco della volontà semino questa intenzione nel ventre del mondo. La fiamma trasforma ogni ostacolo in cenere fertile. Ciò che desidero cresce adesso, potente e inarrestabile. Così è.',crescente:'Il fuoco crescente alimenta il mio desiderio verso la luce. Come la fiamma si eleva, si eleva la mia intenzione. Nutro questa semenza con la forza del mio spirito. Manifesto con ardore.',piena:'Sotto la luna piena, il fuoco della mia intenzione brucia al massimo splendore. Ogni cosa che ho desiderato si manifesta ora nella pienezza della luce. Il cerchio si chiude. È fatto.',calante:'Lascio andare ciò che bruciava senza scopo. Il fuoco sacro purifica e libera. Con questa luna calante, rilascio il vecchio perché il nuovo possa nascere dalle sue ceneri. Così sia.'},acqua:{nuova:'Come l\'acqua trova sempre la sua via, la mia intenzione trova il suo compimento. Nelle profondità della luna nuova pianto questo seme nell\'oceano del possibile. Il flusso porta ciò che cerco.',crescente:'L\'acqua cresce con la luna — e così la mia intenzione. Nutro questo desiderio con la fluidità della mia fede. Ogni goccia di volontà si unisce all\'oceano del manifesto.',piena:'Le acque dell\'inconscio si illuminano nella pienezza della luna. Tutto ciò che ho coltivato emerge ora in superficie. La marea porta il mio desiderio a riva. Accolgo il manifesto.',calante:'Come le acque si ritirano lasciando la riva più pulita, mi ritiro da ciò che non serve. L\'oceano accoglie il mio rilascio e mi dona libertà.'},terra:{nuova:'Semino questa intenzione nella terra oscura e fertile della luna nuova. Radici invisibili già scendono in profondità. La terra custodisce ogni seme affidato con fede.',crescente:'La terra nutre la mia intenzione che cresce verso la luce. Come il grano emerge dal suolo, emerge la mia manifestazione. Sono radicato nella certezza. Cresco con la luna.',piena:'Il raccolto è pronto. Tutto ciò che ho seminato raggiunge la piena maturità. La terra ha mantenuto la sua promessa. Raccolgo con gratitudine.',calante:'Lascio che la terra si riposi. Compost dal vecchio, nutrimento per il nuovo. Con questa luna calante affido alla terra ciò che devo lasciare andare. Il ciclo si compie.'},aria:{nuova:'Con il primo respiro di questa luna nuova lancio la mia intenzione nel vento del possibile. L\'aria porta i semi ovunque servano. Il mio desiderio vola verso il suo compimento.',crescente:'Il vento porta notizie di crescita. La mia intenzione viaggia sulle correnti invisibili. Con la chiarezza dell\'aria vedo già il mio desiderio avverato.',piena:'L\'aria sotto la luna piena risuona con la vibrazione del mio desiderio manifesto. Ogni parola pronunciata è già realtà. Il vento testimonia: è fatto, è vero, è mio.',calante:'Come il vento porta via le foglie d\'autunno, porta via i miei attaccamenti. Libero, leggero, aperto. La brezza porta via il vecchio e prepara l\'aria per il nuovo.'},etere:{nuova:'Dal vuoto primordiale faccio emergere questa intenzione. L\'etere è la tela su cui dipingo la mia realtà. In questa luna nuova la mia volontà risuona attraverso tutti i piani dell\'essere.',crescente:'L\'etere amplifica ogni intenzione che cresce con la luna. I piani sottili vibrano al suono del mio desiderio. Ciò che chiedo è già risposto nelle dimensioni invisibili.',piena:'Nella pienezza cosmica di questa luna, l\'etere riflette la mia intenzione come uno specchio. Sopra e sotto, dentro e fuori — tutto è allineato. Il manifesto incontra il desiderio.',calante:'L\'etere si libera di ciò che non risuona più. Rilascio nel vasto spazio cosmico ogni limite, ogni paura. Lo spazio vuoto è il terreno della nuova creazione.'}};

piena:'Under the full moon, the fire of my intention burns at its brightest. Everything I have desired manifests now in the fullness of light. The circle closes. It is done.',

piena:'The waters of the unconscious light up in the fullness of the moon. Everything I have cultivated now rises to the surface. The tide brings my desire ashore. I welcome the manifest.',
calante:'As the waters recede leaving the shore cleaner, I withdraw from what no longer serves. The ocean receives my release and grants me freedom.'},
terra:{nuova:'I sow this intention in the dark, fertile earth of the new moon. Invisible roots already reach deep. The earth keeps every seed entrusted in faith.',

calante:'I let the earth rest. Compost from the old, nourishment for the new. With this waning moon I entrust to the earth what I must release. The cycle completes.'},
aria:{nuova:'With the first breath of this new moon I launch my intention into the wind of the possible. The air carries the seeds wherever they are needed. My desire flies toward its fulfillment.',

calante:'As the wind carries away autumn leaves, it carries away my attachments. Free, light, open. The breeze sweeps away the old and prepares the air for the new.'},
etere:{nuova:'From the primordial void I bring forth this intention. Ether is the canvas on which I paint my reality. In this new moon my will resonates across all planes of being.',
crescente:'Ether amplifies every intention that grows with the moon. The subtle planes vibrate to the sound of my desire. What I ask is already answered in the unseen dimensions.',
piena:'In the cosmic fullness of this moon, ether reflects my intention like a mirror. Above and below, within and without — all is aligned. The manifest meets the desire.',
calante:'Ether releases what no longer resonates. I release into the vast cosmic space every limit, every fear. Empty space is the ground of new creation.'}

const DECRETI_ES={

const AUDIO_KEY='myst_audio_state';
const AUDIO_URL='./images/icone/audio/mystica_ambient_432_528.mp3';
class AudioManager{
  constructor(){ this.audio=null; this.isPlaying=sessionStorage.getItem(AUDIO_KEY)==='true'; this.initAudio(); }
  initAudio(){ this.audio=new Audio(AUDIO_URL); this.audio.loop=true; this.audio.volume=0.3; if(this.isPlaying) this.play(); this.updateUI(); }
  play(){ this.audio?.play().catch(()=>{}); this.isPlaying=true; sessionStorage.setItem(AUDIO_KEY,'true'); this.updateUI(); }
  pause(){ this.audio?.pause(); this.isPlaying=false; sessionStorage.setItem(AUDIO_KEY,'false'); this.updateUI(); }
  toggle(){ this.isPlaying?this.pause():this.play(); }
  updateUI(){ const btn=document.getElementById('musicToggle'); const L=LANG[currentLang]; if(btn) btn.textContent=this.isPlaying?L.music.on:L.music.off; }
}
window.audioManager=new AudioManager();
document.getElementById('musicToggle')?.addEventListener('click',()=>window.audioManager.toggle());

function shareContent(customText){
  const L=LANG[currentLang]; const text=customText||L.shareText;
  if(navigator.share){ navigator.share({title:L.shareTitle,text,url:PAGE_URL}).catch(()=>{}); return; }
  const enc=encodeURIComponent(text+' '+PAGE_URL); const ue=encodeURIComponent(PAGE_URL);
  const wa=document.getElementById('share-wa'); if(wa) wa.href=`https://wa.me/?text=${enc}`;
  const tg=document.getElementById('share-tg'); if(tg) tg.href=`https://t.me/share/url?url=${ue}&text=${encodeURIComponent(text)}`;
  const fb=document.getElementById('share-fb'); if(fb) fb.href=`https://www.facebook.com/sharer/sharer.php?u=${ue}`;
  const xb=document.getElementById('share-x'); if(xb) xb.href=`https://twitter.com/intent/tweet?text=${enc}`;
  const sp=document.getElementById('sharePopup'); if(sp) sp.hidden=false;
}

/* ─── DIARIO ───────────────────────────────────────────── */
let domIdx=Math.floor(Math.random()*DOMANDE_IT.length);
let selMoodVal='',selMoodDesc='',selEnergiaVal='';
function nuovaDomanda(){
  const D=LANG[currentLang].diario;
  domIdx=(domIdx+1)%D.domande.length;
  document.getElementById('dTestoDomanda').textContent=D.domande[domIdx];
}
function selMood(btn,e,d){document.querySelectorAll('#moodRow .mood-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');selMoodVal=e;selMoodDesc=d;document.getElementById('moodDesc').textContent='✦ '+d;}
function selEnergia(btn,e,d){document.querySelectorAll('#energiaRow .mood-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');selEnergiaVal=e+' '+d;}
document.getElementById('dReflection').addEventListener('input',function(){
  const D=LANG[currentLang].diario;
  const w=this.value.trim()?this.value.trim().split(/\s+/).length:0;
  document.getElementById('wordCount').textContent=w+' '+(w===1?D.wordCountSingle:D.wordCount);
});

function salvaEntrata(){
  const D=LANG[currentLang].diario;
  const refl=document.getElementById('dReflection').value.trim();
  if(!refl){showToast(D.scriviPrima);return;}
  const entries=lsGet('mystica_diario',[]);
  const today=new Date();
  entries.unshift({id:Date.now(),data:today.toLocaleDateString(D.locale,{day:'numeric',month:'long',year:'numeric'}),dataISO:today.toISOString().slice(0,10),mood:selMoodVal,moodDesc:selMoodDesc,energia:selEnergiaVal,domanda:D.domande[domIdx],testo:refl,sincro:document.getElementById('dSincro').value.trim(),tema:document.getElementById('dTema').value.trim(),intenzione:document.getElementById('dIntention').value.trim(),parole:refl.split(/\s+/).length});
  if(entries.length>200)entries.pop();
  lsSet('mystica_diario',entries);
  ['dReflection','dSincro','dTema','dIntention'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('wordCount').textContent='0 '+D.wordCount;
  document.getElementById('moodDesc').textContent='';
  document.querySelectorAll('#moodRow .mood-btn,#energiaRow .mood-btn').forEach(b=>b.classList.remove('active'));
  selMoodVal='';selMoodDesc='';selEnergiaVal='';
  renderStats();renderStreak();renderEntries();
  showToast(D.salvata);
}

function renderStats(){
  const e=lsGet('mystica_diario',[]);
  document.getElementById('statEntrate').textContent=e.length;
  document.getElementById('statParole').textContent=e.reduce((a,x)=>a+(x.parole||0),0);
  const days=new Set(e.map(x=>x.dataISO||''));let streak=0;const d=new Date();
  while(true){const k=d.toISOString().slice(0,10);if(days.has(k)){streak++;d.setDate(d.getDate()-1);}else break;}
  document.getElementById('statStreak').textContent=streak;
}

function renderStreak(){
  const D=LANG[currentLang].diario;
  const e=lsGet('mystica_diario',[]);const days=new Set(e.map(x=>x.dataISO||''));
  const bar=document.getElementById('streakBar');bar.innerHTML='';
  for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);const el=document.createElement('div');el.className='streak-day'+(days.has(k)?' done':'')+(i===0?' today':'');el.textContent=d.getDate();bar.appendChild(el);}
  const streak=parseInt(document.getElementById('statStreak').textContent)||0;
  const msgs=D.streakMsgs;
  document.getElementById('streakMsg').textContent=streak>0?(msgs[Math.min(streak-1,msgs.length-1)]):msgs[0];
}

function renderEntries(){
  const D=LANG[currentLang].diario;
  const entries=lsGet('mystica_diario',[]);
  const fMood=document.getElementById('filtraMood').value;
  const fTema=document.getElementById('filtraTema').value;
  const temi=[...new Set(entries.map(e=>e.tema).filter(Boolean))];
  const sel=document.getElementById('filtraTema');const cur=sel.value;
  sel.innerHTML=`<option value="">${D.filtroTemaAll}</option>`;
  temi.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);});sel.value=cur;
  let filtered=entries;
  if(fMood)filtered=filtered.filter(e=>e.mood===fMood);
  if(fTema)filtered=filtered.filter(e=>e.tema===fTema);
  const list=document.getElementById('entryList');
  if(!filtered.length){list.innerHTML=`<p style="color:var(--muted);font-size:.88rem;text-align:center;padding:14px 0;font-style:italic">${D.nessunaEntrata}</p>`;return;}
  list.innerHTML=filtered.map(e=>`<div class="entry-item" onclick="leggiEntrata(${e.id})"><div class="entry-header"><span class="entry-date">${e.data}</span><span style="font-size:14px">${e.mood||''} ${e.energia?e.energia.split(' ')[0]:''}</span></div><div class="entry-preview">${e.testo}</div>${(e.tema||e.intenzione)?`<div class="entry-tags">${e.tema?`<span class="entry-tag">◆ ${e.tema}</span>`:''}${e.intenzione?`<span class="entry-tag" style="color:var(--teal);border-color:rgba(94,206,196,0.2)">→ ${e.intenzione}</span>`:''}</div>`:''}</div>`).join('');
}

function leggiEntrata(id){
  const D=LANG[currentLang].diario;
  const e=lsGet('mystica_diario',[]).find(x=>x.id===id);if(!e)return;
  const old=document.getElementById('entryOv');if(old)old.remove();
  const ov=document.createElement('div');ov.id='entryOv';ov.className='overlay';
  ov.innerHTML=`<div class="overlay-inner" style="max-height:85vh"><div class="overlay-title">${e.data} ${e.mood||''}</div>${e.domanda?`<div style="font-style:italic;font-size:.85rem;color:var(--muted);margin-bottom:10px;padding:8px 12px;border:1px solid var(--border);border-radius:8px">✦ ${e.domanda}</div>`:''}<p style="font-size:.97rem;line-height:1.85;color:var(--text);white-space:pre-wrap;margin-bottom:12px">${e.testo}</p>${e.sincro?`<div style="font-size:.85rem;color:var(--purple);margin-bottom:8px;padding:8px 12px;border-left:2px solid var(--purple)">🔮 ${e.sincro}</div>`:''}${e.tema?`<div style="font-family:'Cinzel',serif;font-size:9px;color:var(--gold);margin-bottom:4px">◆ ${e.tema}</div>`:''}${e.intenzione?`<div style="font-family:'Cinzel',serif;font-size:9px;color:var(--teal);margin-bottom:10px">→ ${e.intenzione}</div>`:''}<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:4px"><button class="overlay-cancel" onclick="eliminaEntrata(${id})">${D.btnElimina}</button><button class="overlay-cancel" onclick="document.getElementById('entryOv').remove()">${D.btnChiudi}</button></div></div>`;
  ov.addEventListener('click',ev=>{if(ev.target===ov)ov.remove();});document.body.appendChild(ov);
}

function eliminaEntrata(id){const D=LANG[currentLang].diario;let e=lsGet('mystica_diario',[]).filter(x=>x.id!==id);lsSet('mystica_diario',e);document.getElementById('entryOv')?.remove();renderStats();renderStreak();renderEntries();showToast(D.eliminata);}

function exportDiario(){
  const D=LANG[currentLang].diario;
  const entries=lsGet('mystica_diario',[]);if(!entries.length){showToast(D.nessunaDaEsportare);return;}
  let txt=D.exportHeader+'\n'+D.exportSub+' '+new Date().toLocaleDateString(D.locale)+'\n'+'═'.repeat(50)+'\n\n';
  entries.forEach(e=>{txt+=`📅 ${e.data} ${e.mood||''}\n${e.domanda?'✦ '+e.domanda+'\n\n':''}${e.testo}\n${e.sincro?'\n🔮 '+e.sincro:''}${e.tema?'\n◆ '+e.tema:''}${e.intenzione?'\n→ '+e.intenzione:''}\n\n${'─'.repeat(40)}\n\n`;});
  const a=document.createElement('a');a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(txt);a.download='mystica-diario.txt';a.click();showToast(D.esportata);
}

function disegnaSigillo(elem,testo,numero){
  const canvas=document.getElementById('sigilloCanvas');const ctx=canvas.getContext('2d');const W=280,H=280,cx=140,cy=140;
  ctx.clearRect(0,0,W,H);const p=ELEM_PAL[elem]||ELEM_PAL.etere;
  const bg=ctx.createRadialGradient(cx,cy,8,cx,cy,W*.6);bg.addColorStop(0,'rgba(30,14,60,0.92)');bg.addColorStop(1,'rgba(6,2,18,0.98)');
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(cx,cy,W*.52,0,Math.PI*2);ctx.fill();
  [90,77,62].forEach((r,i)=>{ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle=i===0?p.c1+'88':i===1?p.c2+'44':p.c3+'22';ctx.lineWidth=i===0?1.8:1;ctx.stroke();});
  const pts=Math.max(numero,3);const R1=78,R2=34;
  ctx.beginPath();
  for(let i=0;i<pts*2;i++){const a=Math.PI/pts*i-Math.PI/2;const r=i%2===0?R1:R2;const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  ctx.closePath();
  const sg=ctx.createLinearGradient(cx-R1,cy-R1,cx+R1,cy+R1);sg.addColorStop(0,p.c1);sg.addColorStop(.5,p.c2);sg.addColorStop(1,p.c3);
  ctx.strokeStyle=sg;ctx.lineWidth=1.5;ctx.globalAlpha=.88;ctx.stroke();ctx.fillStyle=sg;ctx.globalAlpha=.1;ctx.fill();ctx.globalAlpha=1;
  const rune=['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ','ᚺ','ᚾ','ᛁ','ᛃ','ᛇ','ᛈ','ᛉ','ᛊ','ᛏ','ᛒ','ᛖ','ᛗ','ᛚ','ᛞ','ᛟ'];
  const chars=[...testo.toUpperCase().replace(/[^A-Z]/g,'')];
  ctx.font='11px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=p.c1;ctx.globalAlpha=.75;
  for(let i=0;i<Math.min(pts,chars.length);i++){const a=Math.PI*2/pts*i-Math.PI/2;const x=cx+(R1+11)*Math.cos(a),y=cy+(R1+11)*Math.sin(a);ctx.fillText(rune[i%rune.length],x,y);}
  ctx.globalAlpha=1;
  const cEmoji={fuoco:'🔥',acqua:'💧',terra:'🌿',aria:'💨'};
  if(cEmoji[elem]){ctx.font='28px serif';ctx.fillText(cEmoji[elem],cx,cy);}
  else{ctx.font='bold 20px serif';ctx.fillStyle=p.c3;ctx.fillText('✦',cx,cy);}
  ctx.font='bold 10px sans-serif';ctx.fillStyle=p.c2;ctx.globalAlpha=.5;ctx.fillText(numero,cx,cy+45);ctx.globalAlpha=1;
  const gl=ctx.createRadialGradient(cx,cy,58,cx,cy,130);gl.addColorStop(0,p.glow);gl.addColorStop(1,'transparent');
  ctx.fillStyle=gl;ctx.beginPath();ctx.arc(cx,cy,130,0,Math.PI*2);ctx.globalAlpha=.35;ctx.fill();ctx.globalAlpha=1;
}

function downloadSigillo(){const SG=LANG[currentLang].sigillo;const c=document.getElementById('sigilloCanvas');const a=document.createElement('a');a.download='sigillo-mystica.png';a.href=c.toDataURL('image/png');a.click();showToast(SG.salvatoPng);}
function copySigillo(){const SG=LANG[currentLang].sigillo;const t=document.getElementById('sigilloDecretoText').innerText;navigator.clipboard?.writeText(t).then(()=>showToast(SG.decretoCopiato));}
function renderSigilliSalvati(){
  const SG=LANG[currentLang].sigillo;
  const s=lsGet('mystica_sigilli',[]);const el=document.getElementById('sigilliSalvati');
  if(!s.length){el.innerHTML=`<p style="font-size:.85rem;color:var(--muted);font-style:italic;text-align:center;padding:10px 0">${SG.nessunSigillo}</p>`;return;}
  const ee={fuoco:'🔥',acqua:'💧',terra:'🌿',aria:'💨',etere:'🌌'};
  el.innerHTML=s.map(x=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(10,4,24,0.5);border:1px solid var(--border);border-radius:10px;margin-bottom:7px"><span style="font-size:20px">${ee[x.elemento]||'🔮'}</span><div style="flex:1;min-width:0"><div style="font-family:'Cinzel',serif;font-size:9px;color:var(--gold);letter-spacing:1px">${x.data} · ${x.numero}</div><div style="font-size:.85rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px">${x.intenzione}</div></div></div>`).join('');
}

// ── Etichetta "INTENZIONE" tradotta (piccola estensione LANG) ──
LANG.it.altare.intentionLabel='INTENZIONE'; LANG.en.altare.intentionLabel='INTENTION'; LANG.es.altare.intentionLabel='INTENCIÓN';

/* ─── ALTARE ───────────────────────────────────────────── */
const ALTARE_POS=[{l:'45%',b:'30%',s:1.4},{l:'20%',b:'26%',s:1.1},{l:'70%',b:'26%',s:1.1},{l:'10%',b:'20%',s:.9},{l:'80%',b:'20%',s:.9},{l:'35%',b:'22%',s:1.0},{l:'58%',b:'22%',s:1.0},{l:'47%',b:'17%',s:.85}];
const altareSel={};

function buildAltare(){
  const cfg=LANG[currentLang].altare.cfg;
  const scene=document.getElementById('altareScene');scene.querySelectorAll('.altare-item').forEach(e=>e.remove());
  cfg.forEach((slot,i)=>{
    const pos=ALTARE_POS[i]||{l:'50%',b:'20%',s:1};
    const item=document.createElement('div');item.className='altare-item'+(altareSel[slot.id]?'':' pulsing');
    item.style.cssText=`left:${pos.l};bottom:${pos.b};transform:scale(${pos.s});transform-origin:bottom center`;
    item.textContent=altareSel[slot.id]?.e||slot.def;item.title=slot.label;
    item.onclick=()=>openAltareMenu(slot.id);scene.appendChild(item);
  });
  const grid=document.getElementById('altareSlotGrid');
  grid.innerHTML=cfg.map(s=>`<div class="altare-slot${altareSel[s.id]?' filled':''}" onclick="openAltareMenu('${s.id}')"><span style="font-size:24px">${altareSel[s.id]?.e||s.def}</span><span class="altare-slot-label">${(altareSel[s.id]?.n||s.label).split('–')[0].trim()}</span></div>`).join('');
}

function openAltareMenu(id){
  const AL=LANG[currentLang].altare;
  const slot=AL.cfg.find(s=>s.id===id);if(!slot)return;
  const old=document.getElementById('altOv');if(old)old.remove();
  const ov=document.createElement('div');ov.id='altOv';ov.className='overlay';
  ov.innerHTML=`<div class="overlay-inner"><div class="overlay-title">${AL.overlayScegli} ${slot.label}</div><div class="overlay-grid">${slot.opzioni.map(o=>`<button class="overlay-opt" onclick="selAltSlot('${id}','${o.e}','${o.n.replace(/'/g,"\\'")}')"><span style="font-size:22px;display:block;margin-bottom:4px">${o.e}</span><span style="font-size:.78rem;color:var(--muted)">${o.n}</span></button>`).join('')}</div><button class="overlay-cancel" onclick="document.getElementById('altOv').remove()">${AL.overlayAnnulla}</button></div>`;
  ov.addEventListener('click',ev=>{if(ev.target===ov)ov.remove();});document.body.appendChild(ov);
}
function selAltSlot(id,emoji,nome){const AL=LANG[currentLang].altare;altareSel[id]={e:emoji,n:nome};document.getElementById('altOv')?.remove();buildAltare();showToast(AL.elementoAggiunto(nome.split('–')[0].trim()));}

function consacraAltare(){
  const AL=LANG[currentLang].altare;
  const int=document.getElementById('altareIntenzione').value.trim();
  const mantra=document.getElementById('altareMantra').value.trim();
  const n=Object.keys(altareSel).length;
  const elems=Object.values(altareSel).map(s=>s.n.split('–')[0].trim()).join(', ');
  let txt=`<p style="font-style:italic;line-height:1.95;margin-bottom:12px">${AL.bened[n]||AL.bened[8]}</p>`;
  if(int)txt+=`<p style="line-height:1.8;margin-bottom:10px"><strong style="font-family:'Cinzel',serif;font-size:10px;color:var(--gold);letter-spacing:1px">${AL.intentionLabel}</strong><br>${int}</p>`;
  const preghiera=mantra||(int?AL.consacraTemplate?.(elems||'',int) || '':'');
  if(preghiera)txt+=`<p style="font-style:italic;line-height:1.85;color:var(--purple)">"${preghiera}"</p>`;
  document.getElementById('altareText').innerHTML=txt;
  document.getElementById('altareResult').style.display='block';
  document.querySelectorAll('.altare-item').forEach(el=>el.classList.add('pulsing'));
  showToast(AL.consacrato);
}
LANG.it.altare.consacraTemplate=(elems,int)=>`Con questi elementi — ${elems||'del cuore'} — consacro questo spazio all'intenzione di ${int}. Che ogni forza presente amplifichi la mia volontà. Così è.`;
LANG.en.altare.consacraTemplate=(elems,int)=>`With these elements — ${elems||'of the heart'} — I consecrate this space to the intention of ${int}. May every force present amplify my will. So it is.`;
LANG.es.altare.consacraTemplate=(elems,int)=>`Con estos elementos — ${elems||'del corazón'} — consagro este espacio a la intención de ${int}. Que cada fuerza presente amplifique mi voluntad. Así es.`;

/* ─── RESPIRO ──────────────────────────────────────────── */
let breathType='478',breathActive=false,breathPhaseIdx=0,breathTimer=null,breathCyclesN=0,breathStartTime=null,breathDurTimer=null;

function selBreath(btn,type){
  const AL=LANG[currentLang].altare;
  document.querySelectorAll('.breath-type-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  breathType=type;if(breathActive)stopBreath();
  document.getElementById('breathDesc').textContent=AL.breathTypes[type].desc;
  document.getElementById('breathActionLabel').textContent=AL.tocca;
  document.getElementById('breathPhaseLabel').textContent=AL.perIniziare;
}

function toggleBreath(){breathActive?stopBreath():startBreath();}
function startBreath(){breathActive=true;breathPhaseIdx=0;breathStartTime=Date.now();document.getElementById('breathCircle').classList.add('breath-active');breathDurTimer=setInterval(()=>{const s=Math.floor((Date.now()-breathStartTime)/1000);document.getElementById('breathMinutes').textContent=Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;},1000);runPhase();}

function runPhase(){
  if(!breathActive)return;
  const phases=LANG[currentLang].altare.breathTypes[breathType].phases;const ph=phases[breathPhaseIdx];
  document.getElementById('breathActionLabel').textContent=ph.label;document.getElementById('breathPhaseLabel').textContent=ph.sub;
  const c=document.getElementById('breathCircle');c.style.transform=`scale(${ph.scale})`;c.style.transition=`transform ${ph.dur}ms ease-in-out`;
  breathTimer=setTimeout(()=>{
    if(!breathActive)return;breathPhaseIdx++;
    const curPhases=LANG[currentLang].altare.breathTypes[breathType].phases;
    if(breathPhaseIdx>=curPhases.length){breathPhaseIdx=0;breathCyclesN++;document.getElementById('breathCycles').textContent=breathCyclesN;}
    runPhase();
  },ph.dur);
}

function stopBreath(){
  const AL=LANG[currentLang].altare;
  breathActive=false;clearTimeout(breathTimer);clearInterval(breathDurTimer);
  const c=document.getElementById('breathCircle');c.classList.remove('breath-active');c.style.transform='scale(1)';c.style.transition='transform .6s ease';
  document.getElementById('breathActionLabel').textContent=AL.tocca;document.getElementById('breathPhaseLabel').textContent=AL.perRiprendere;
  const sess=lsGet('mystica_breath_sessions',0)+1;lsSet('mystica_breath_sessions',sess);document.getElementById('breathTotalSess').textContent=sess;
  if(breathCyclesN>0)showToast(AL.sessioneCompletata(breathCyclesN));
}

function resetBreath(){
  const AL=LANG[currentLang].altare;
  stopBreath();breathCyclesN=0;breathStartTime=null;
  document.getElementById('breathCycles').textContent='0';document.getElementById('breathMinutes').textContent='0:00';
  document.getElementById('breathActionLabel').textContent=AL.tocca;document.getElementById('breathPhaseLabel').textContent=AL.perIniziare;
}

</script>
