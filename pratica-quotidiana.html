#toast.show{transform:translateX(-50%) translateY(0)}
@media(min-width:600px){.hero{padding:46px 24px 28px}.card{padding:26px 22px}.altare-slot-grid{grid-template-columns:repeat(5,1fr)}}

/* ── img-section (preservato) ── */
.img-section{text-align:center;margin:20px 0 10px}
.img-section img{max-width:100%;border-radius:12px;border:1px solid rgba(212,175,55,0.2);display:block;margin:0 auto}
.img-grid{display:grid;gap:12px;margin:20px 0}
.img-grid-2{grid-template-columns:1fr 1fr}
.img-grid-3{grid-template-columns:1fr 1fr 1fr}
.img-grid-4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:520px){.img-grid-2,.img-grid-3,.img-grid-4{grid-template-columns:1fr 1fr}}
@media(max-width:380px){.img-grid-3,.img-grid-4{grid-template-columns:1fr 1fr}}
.img-card{text-align:center}
.img-card img{width:100%;border-radius:10px;border:1px solid rgba(212,175,55,0.15)}
.img-card-label{font-family:'Cinzel',serif;font-size:10px;color:var(--gold,#d4af37);letter-spacing:.8px;margin-top:6px;display:block;opacity:.85}

/* ══════════════════ AGGIUNTE STANDARD MYSTICA v3.0 ══════════════════ */
/* ── Variabili tema (alias compatibili + tema giorno) ── */
:root{
  --card:var(--card-bg, linear-gradient(145deg,#100820,#08040f));
  --radius:18px;
}
html.theme-day{
  --bg:#f5f2ed; --card:#ede8df; --card-bg:#ede8df;
  --text:#2a1748; --muted:#6b5b7f; --purple:#6b5b7f;
  --gold:#c89742; --gold-dim:#a67c52; --gold-glow:rgba(200,151,66,0.2);
  --border:#c89742;
}
html.theme-day body{background:var(--bg)}
html.theme-day .cosmos{opacity:.3}
html.theme-day .card,html.theme-day .result-box,html.theme-day .entry-item,
html.theme-day .stat-box,html.theme-day .overlay-inner,html.theme-day .sigillo-step{
  background-color:var(--card);border-color:var(--border);color:var(--text);
}
html.theme-day h1,html.theme-day h2,html.theme-day h3,html.theme-day .hero-title{color:var(--text);text-shadow:none}
html.theme-day .btn,html.theme-day button{border-color:var(--border)}
html.theme-day textarea,html.theme-day input[type=text],html.theme-day select{background-color:#ffffff;color:var(--text);border-color:var(--border)}
html.theme-day .page-header{background:linear-gradient(180deg,rgba(245,242,237,0.98) 70%,transparent)}

/* ── Skip link & focus ── */
.skip-link{position:absolute;left:-999px;top:0;background:var(--gold);color:#160d30;padding:10px 16px;border-radius:0 0 10px 0;z-index:1000;font-family:'Cinzel',serif;font-size:11px}
.skip-link:focus{left:0}
a:focus-visible,button:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* ── Sfondo cosmico decorativo aggiuntivo (sezione 5) ── */
.cosmos2{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── Header standard (sezione 6) ── */
.page-header{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,rgba(6,2,18,0.98) 70%,transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(212,175,55,0.12);padding:max(14px, calc(14px + env(safe-area-inset-top,0px))) 20px 10px}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.btn-back{background:none;border:1px solid var(--border);border-radius:10px;color:var(--muted);padding:8px 12px;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;transition:all .2s;white-space:nowrap;text-decoration:none;display:inline-block}
.btn-back:hover{border-color:var(--gold-dim);color:var(--gold)}
.header-controls{display:flex;gap:8px}
.btn-icon{background:none;border:1px solid var(--border);border-radius:10px;color:var(--muted);padding:8px 10px;cursor:pointer;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.5px;transition:all .2s}
.btn-icon:hover{border-color:var(--gold-dim);color:var(--gold)}
.page-title{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);letter-spacing:.08em;font-weight:700;text-align:center;margin-top:10px}
.lang-switch{display:flex;justify-content:center;gap:6px;margin-top:10px}
.btn-lang{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:4px 10px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.5px;cursor:pointer;transition:all .2s}
.btn-lang:hover{border-color:var(--gold-dim);color:var(--gold)}
.btn-lang.active{border-color:var(--gold);color:var(--gold);background:rgba(212,175,55,0.1)}

/* ── Premium modal (sezione 9.1) ── */
.premium-modal{position:fixed;inset:0;z-index:300;display:none;align-items:flex-end;justify-content:center}
.premium-modal.show{display:flex}
.premium-modal .modal-overlay{position:absolute;inset:0;background:rgba(6,2,18,0.88)}
.premium-modal .modal-content{position:relative;background:linear-gradient(145deg,#100820,#08040f);border:1px solid rgba(212,175,55,0.3);border-radius:20px 20px 0 0;padding:26px 22px;width:100%;max-width:440px;text-align:center}
.premium-modal h2{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);letter-spacing:.05em;margin-bottom:10px}
.premium-modal p{font-size:.92rem;color:var(--muted);line-height:1.7;margin-bottom:8px}
.premium-price{font-family:'Cinzel',serif;color:var(--gold)!important;font-size:13px!important;letter-spacing:.05em}
.btn-premium-buy{display:block;width:100%;padding:14px;margin-top:14px;background:linear-gradient(135deg,#2a1748,#160d30);border:1.5px solid var(--gold);border-radius:14px;color:var(--gold);font-family:'Cinzel',serif;font-size:12px;letter-spacing:.08em;cursor:pointer}
.btn-premium-skip{display:block;width:100%;padding:11px;margin-top:8px;background:none;border:1px solid var(--border);border-radius:14px;color:var(--muted);font-family:'Cinzel',serif;font-size:10.5px;letter-spacing:.06em;cursor:pointer}

/* ── Articolo editoriale (sezione 9.2) ── */
.article-section{position:relative;z-index:1;max-width:860px;margin:36px auto 0;padding:0 16px;content-visibility:auto}
.article-section h2{font-family:'Cinzel',serif;font-size:clamp(1.2rem,4.5vw,1.6rem);color:var(--gold);letter-spacing:.04em;margin-bottom:14px;line-height:1.4}
.article-section h3{font-family:'Cinzel',serif;font-size:1.02rem;color:var(--gold);letter-spacing:.03em;margin:22px 0 10px}
.article-section p{font-size:.97rem;line-height:1.9;color:var(--text);margin-bottom:14px}
.article-links{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0}
.article-links a{font-size:.82rem;color:var(--gold);border:1px solid var(--border);border-radius:20px;padding:6px 13px;text-decoration:none;transition:all .2s}
.article-links a:hover{border-color:var(--gold-dim);background:rgba(212,175,55,0.08)}
.cta-explore{display:block;text-align:center;width:100%;padding:14px;margin-top:18px;background:linear-gradient(135deg,#2a1748,#160d30);border:1.5px solid var(--gold);border-radius:14px;color:var(--gold);font-family:'Cinzel',serif;font-size:12px;letter-spacing:.08em;text-decoration:none}

/* ── Share (sezione 9.3) ── */
.share-section{position:relative;z-index:1;max-width:860px;margin:24px auto 0;padding:0 16px;text-align:center}
.btn-share{background:linear-gradient(135deg,#2a1748,#160d30);border:1.5px solid var(--gold-dim);border-radius:14px;color:var(--gold);font-family:'Cinzel',serif;font-size:11.5px;letter-spacing:.06em;padding:11px 22px;cursor:pointer}
.share-popup{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px;max-width:340px;margin-left:auto;margin-right:auto}
.share-btn{display:block;padding:10px;border-radius:10px;border:1px solid var(--border);background:rgba(10,4,24,0.5);color:var(--text);font-size:.85rem;text-decoration:none;text-align:center;cursor:pointer;font-family:'Crimson Pro',serif}
.share-btn:hover{border-color:var(--gold-dim)}

/* ── FAQ (sezione 9.4) ── */
.faq-section{position:relative;z-index:1;max-width:860px;margin:30px auto 0;padding:0 16px}
.faq-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);letter-spacing:.05em;margin-bottom:14px;text-align:center}
.faq-item{border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;background:rgba(10,4,24,0.4)}
.faq-question{width:100%;display:flex;justify-content:space-between;align-items:center;gap:10px;background:none;border:none;color:var(--text);padding:14px 16px;font-family:'Crimson Pro',serif;font-size:.95rem;text-align:left;cursor:pointer}
.faq-icon{color:var(--gold);font-family:'Cinzel',serif;font-size:16px;flex-shrink:0}
.faq-answer{padding:0 16px 14px;color:var(--muted);font-size:.9rem;line-height:1.8}

/* ── Footer (sezione 9.5) ── */
.page-footer{position:relative;z-index:1;max-width:860px;margin:34px auto 0;padding:20px 16px 50px;text-align:center;border-top:1px solid var(--border)}
.footer-links{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.footer-links a{color:var(--muted);font-size:.82rem;text-decoration:none;font-family:'Cinzel',serif;letter-spacing:.03em}
.footer-links a:hover{color:var(--gold)}
.page-footer p{font-size:.78rem;color:var(--muted);line-height:1.6}
.footer-disclaimer{margin-top:6px;opacity:.75;font-style:italic}

</style>
</head>
<body>
<a href="#main-content" class="skip-link" id="skip-link"></a>
<div class="cosmos" aria-hidden="true"></div>
<div class="stars" id="stars" aria-hidden="true"></div>
<header class="page-header">
  <div class="header-top">
    <a href="./index.html" class="btn-back" id="btn-back"></a>
    <div class="header-controls">
      <button id="musicToggle" class="btn-icon" aria-label="Toggle musica"></button>
      <button id="themeToggle" class="btn-icon" aria-label="Toggle tema"></button>
    </div>
  </div>
  <h1 class="page-title" id="page-title"></h1>
  <div class="lang-switch">
    <button data-lang="it" class="btn-lang active">IT</button>
    <button data-lang="en" class="btn-lang">EN</button>
    <button data-lang="es" class="btn-lang">ES</button>
  </div>
</header>
<div class="hero">
  <span class="hero-glyph" aria-hidden="true">💎</span>
  <h2 class="hero-title" id="hero-title"></h2>
  <p class="hero-sub" id="hero-sub"></p>
  <div class="hero-divider"></div>
</div>
<main class="main" id="main-content">
  <nav class="tab-nav" role="tablist">
    <button class="tab-btn active" onclick="switchTab('diario')" id="tab-diario" role="tab" aria-selected="true"><span class="tab-ico" aria-hidden="true">📖</span><span class="tab-name" id="tab-name-diario"></span></button>
    <button class="tab-btn" onclick="switchTab('affermazioni')" id="tab-affermazioni" role="tab" aria-selected="false"><span class="tab-ico" aria-hidden="true">✨</span><span class="tab-name" id="tab-name-affermazioni"></span></button>
    <button class="tab-btn" onclick="switchTab('sigillo')" id="tab-sigillo" role="tab" aria-selected="false"><span class="tab-ico" aria-hidden="true">🔮</span><span class="tab-name" id="tab-name-sigillo"></span></button>
    <button class="tab-btn" onclick="switchTab('altare')" id="tab-altare" role="tab" aria-selected="false"><span class="tab-ico" aria-hidden="true">🕯️</span><span class="tab-name" id="tab-name-altare"></span></button>
  </nav>
  <!-- PANEL 1: DIARIO -->
  <div class="panel active" id="panel-diario" role="tabpanel">
    <div style="text-align:center;margin:16px 0 8px"><img src="./images/icone/home/i-sogni.webp" id="imgDiario" alt="" loading="lazy" decoding="async" width="600" height="160" style="max-height:160px;object-fit:cover;width:100%;border-radius:10px;border:1px solid rgba(212,175,55,0.2)"></div>
    <div class="stats-strip">
      <div class="stat-box"><span class="stat-num" id="statEntrate">0</span><span class="stat-lbl" id="statLblEntrate"></span></div>
      <div class="stat-box"><span class="stat-num" id="statStreak">0</span><span class="stat-lbl" id="statLblStreak"></span></div>
      <div class="stat-box"><span class="stat-num" id="statParole">0</span><span class="stat-lbl" id="statLblParole"></span></div>
    </div>
    <div class="card">
      <div class="card-title" id="cardTitleCostanza"></div>
      <div class="streak-bar" id="streakBar"></div>
      <p id="streakMsg" style="text-align:center;font-size:.85rem;color:var(--muted);margin-top:6px"></p>
    </div>
    <div class="card">
      <div class="card-title" id="cardTitleNuova"></div>
      <label id="labelMood"></label>
      <div class="mood-row" id="moodRow"></div>
      <div id="moodDesc" style="font-family:'Cinzel',serif;font-size:9px;color:var(--gold);letter-spacing:1px;margin-top:6px;min-height:14px;text-align:center"></div>
      <label style="margin-top:14px" id="labelDomanda"></label>
      <div class="domanda-box" id="questioneGiorno" onclick="nuovaDomanda()">
        <span id="dTestoDomanda"></span>
        <span class="domanda-hint" id="domandaHint"></span>
      </div>
      <label style="margin-top:14px" id="labelRiflessione"></label>
      <textarea id="dReflection" placeholder="" style="min-height:130px"></textarea>
      <div style="font-family:'Cinzel',serif;font-size:9px;color:var(--muted);text-align:right;margin-top:4px" id="wordCount">0</div>
      <label id="labelTema"></label>
      <input type="text" id="dTema" placeholder="">
      <label id="labelSincro"></label>
      <textarea id="dSincro" placeholder="" style="min-height:70px"></textarea>
      <label id="labelIntenzioneDiario"></label>
      <input type="text" id="dIntention" placeholder="">
      <label id="labelEnergia"></label>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:4px" id="energiaRow"></div>
      <button class="btn" onclick="salvaEntrata()" id="btnSalvaEntrata"></button>
    </div>
    <div class="card">
      <div class="card-title" id="cardTitleArchivio"></div>
      <div class="card-desc" id="archivioDesc"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px">
        <select id="filtraMood" style="font-size:.82rem;padding:8px 10px" onchange="renderEntries()"></select>
        <select id="filtraTema" style="font-size:.82rem;padding:8px 10px" onchange="renderEntries()">
          <option value=""></option>
        </select>
      </div>
      <div id="entryList" class="entry-list"></div>
      <button class="btn btn-sec" style="margin-top:10px;font-size:10px;padding:9px" onclick="exportDiario()" id="btnExportDiario"></button>
    </div>
  </div>
  <!-- PANEL 2: AFFERMAZIONI -->
  <div class="panel" id="panel-affermazioni" role="tabpanel">
    <div style="text-align:center;margin:16px 0 8px"><img src="./images/icone/home/energia.webp" id="imgAfferm" alt="" loading="lazy" decoding="async" width="600" height="160" style="max-height:160px;object-fit:cover;width:100%;border-radius:10px;border:1px solid rgba(212,175,55,0.2)"></div>
    <div class="card">
      <div class="card-title" id="cardTitleScegli"></div>
      <div class="card-desc" id="scegliDesc"></div>
      <label id="labelArea"></label>
      <div id="areaRow"></div>
      <label id="labelTono"></label>
      <select id="toneSelect"></select>
      <label id="labelIntenzioneSpec"></label>
      <input type="text" id="affermIntenzione" placeholder="">
      <button class="btn" onclick="generaAffermazioni()" id="btnGeneraAfferm"></button>
    </div>
    <div class="card" id="affermCard" style="display:none">
      <div class="card-title" id="cardTitleTue"></div>
      <div class="afferm-counter" id="affermCounter">1 / 9</div>
      <div class="afferm-display" id="affermDisplay"></div>
      <div class="afferm-dots" id="affermDots"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:12px">
        <button class="btn btn-sec" style="margin-top:0;padding:9px" onclick="prevAfferm()" id="btnPrecAfferm"></button>
        <button class="btn btn-sec" style="margin-top:0;padding:9px" onclick="copyAfferm()" id="btnCopiaAfferm"></button>
        <button class="btn btn-sec" style="margin-top:0;padding:9px" onclick="nextAfferm()" id="btnSuccAfferm"></button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px">
        <button class="btn btn-sec" style="margin-top:0;padding:9px;font-size:10px" onclick="salvaAfferm()" id="btnSalvaPrefAfferm"></button>
        <button class="btn" style="margin-top:0;padding:9px;font-size:10px" onclick="generaAffermazioni()" id="btnRigeneraAfferm"></button>
      </div>
    </div>
    <div class="card">
      <div class="card-title" id="cardTitlePreferite"></div>
      <div id="affermSalvateList" style="min-height:40px"></div>
    </div>
    <div class="card">
      <div class="card-title" id="cardTitleRito"></div>
      <div class="card-desc" id="ritoDesc"></div>
      <div class="rito-set-btns" id="ritoSetBtns"></div>
      <div class="rito-wrap">
        <div class="rito-number" id="ritoNum">0</div>
        <div class="rito-sub"><span id="ritoDiLabel"></span> <span id="ritoTargetLbl">3</span> <span id="ritoRipetizioniLabel"></span></div>
        <div class="rito-progress"><div class="rito-progress-fill" id="ritoFill" style="width:0%"></div></div>
        <div class="rito-tap" onclick="tapRito()" role="button" tabindex="0" aria-label="Conta ripetizione">✦</div>
        <div id="ritoMsg" style="font-family:'Cinzel',serif;font-size:10px;color:var(--muted);letter-spacing:.05em;margin-top:6px;min-height:16px;text-align:center"></div>
      </div>
      <button class="btn btn-sec" style="margin-top:4px;font-size:10px;padding:9px" onclick="resetRito()" id="btnResetRito"></button>
    </div>
  </div>
  <!-- PANEL 3: SIGILLAZIONE -->
  <div class="panel" id="panel-sigillo" role="tabpanel">
    <div style="text-align:center;margin:16px 0 8px"><img src="./images/icone/home/sigilli.webp" id="imgSigillo" alt="" loading="lazy" decoding="async" width="600" height="160" style="max-height:160px;object-fit:cover;width:100%;border-radius:10px;border:1px solid rgba(212,175,55,0.2)"></div>
    <div class="card">
      <div class="card-title" id="cardTitleSigillazione"></div>
      <div class="card-desc" id="sigillazioneDesc"></div>
      <label id="labelIntenzioneSigillo"></label>
      <textarea id="sigIntenzione" placeholder="" style="min-height:90px"></textarea>
      <label id="labelElemento"></label>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:4px" id="elemRow"></div>
      <label id="labelLuna"></label>
      <select id="sigLuna"></select>
      <label id="labelNumero"></label>
      <select id="sigNumero"></select>
      <button class="btn" onclick="creaSignature()" id="btnGeneraSigillo"></button>
    </div>
    <div class="card" id="sigilloResultCard" style="display:none">
      <div class="card-title" id="cardTitleTuo"></div>
      <div class="sigillo-canvas-wrap">
        <canvas id="sigilloCanvas" width="280" height="280" class="sigillo-pulse" role="img" aria-label="Sigillo generato"></canvas>
      </div>
      <div class="result-box">
        <div class="result-title" id="decretoTitle"></div>
        <div id="sigilloDecretoText"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:12px">
        <button class="btn btn-sec" style="margin-top:0;padding:9px;font-size:10px" onclick="downloadSigillo()" id="btnSalvaPng"></button>
        <button class="btn btn-sec" style="margin-top:0;padding:9px;font-size:10px" onclick="copySigillo()" id="btnCopiaSigillo"></button>
        <button class="btn" style="margin-top:0;padding:9px;font-size:10px" onclick="creaSignature()" id="btnRigeneraSigillo"></button>
      </div>
    </div>
    <div class="card">
      <div class="card-title" id="cardTitleRitoSigillo"></div>
      <div class="sigillo-steps" id="sigilloSteps"></div>
    </div>
    <div class="card">
      <div class="card-title" id="cardTitlePrecedenti"></div>
      <div id="sigilliSalvati"></div>
    </div>
  </div>
  <!-- PANEL 4: ALTARE & RESPIRO -->
  <div class="panel" id="panel-altare" role="tabpanel">
    <div style="text-align:center;margin:16px 0 8px"><img src="./images/icone/home/meditazione.webp" id="imgAltare" alt="" loading="lazy" decoding="async" width="600" height="160" style="max-height:160px;object-fit:cover;width:100%;border-radius:10px;border:1px solid rgba(212,175,55,0.2)"></div>
    <div class="card">
      <div class="card-title" id="cardTitleAltare"></div>
      <div class="card-desc" id="altareDesc"></div>
      <div class="altare-scene" id="altareScene" aria-hidden="true">
        <div class="altare-aura"></div>
        <div class="altare-shelf"></div>
        <div class="altare-cloth"></div>
      </div>
      <div class="altare-slot-grid" id="altareSlotGrid"></div>
      <label id="labelIntenzioneAltare"></label>
      <input type="text" id="altareIntenzione" placeholder="">
      <label id="labelMantra"></label>
      <textarea id="altareMantra" placeholder="" style="min-height:75px"></textarea>
      <button class="btn" onclick="consacraAltare()" id="btnConsacra"></button>
      <div id="altareResult" class="result-box" style="display:none">
        <div class="result-title" id="altareResultTitle"></div>
        <div id="altareText"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title" id="cardTitleGuida"></div>
      <div id="altareGuida" style="font-size:.9rem;color:var(--muted);line-height:1.9"></div>
    </div>
    <div class="card">
      <div class="card-title" id="cardTitleRespiro"></div>
      <div class="card-desc" id="respiroDesc"></div>

<script>
const AFFERMAZIONI_IT={amore:{potente:['Sono degno di amare ed essere amato profondamente.','L\'amore vero mi trova ogni volta che mi apro a riceverlo.','Porto amore autentico in ogni mio incontro.','Il mio cuore è capace di amare senza perdersi.','Attiro relazioni che nutrono la mia anima.','Sono amore. Do amore. Ricevo amore.','La mia capacità di amare cresce ogni giorno.','Sono un magnete per connessioni autentiche e profonde.','L\'amore vive in me prima ancora di essere ricevuto.'],gentile:['Mi merito amore gentile e costante.','Il mio cuore si apre dolcemente a ogni nuova possibilità.','Sono al sicuro nell\'amare e nell\'essere amato.','Lascio che l\'amore mi raggiunga nel modo che mi serve.','Sono abbastanza. Sono amabile. Sono amato.','Con dolcezza accolgo l\'amore nella mia vita.','Mi tratto con la stessa tenerezza che darei a chi amo.','L\'amore mi segue ovunque vada.','Ogni giorno ricevo piccoli doni d\'amore.'],mistico:['Sono un canale dell\'amore cosmico.','Il mio cuore pulsa al ritmo dell\'universo che ama.','L\'amore mi abita come la luna abita la notte.','Sono intessuto di stelle e di amore antico.','Il cosmo mi abbraccia e io sono amato.','La mia anima ricorda l\'amore che è la sua origine.','Ogni respiro porta amore dal centro del creato.','Sono un figlio della luce — e la luce è amore.','Nel silenzio del cuore l\'amore parla sempre.'],solenne:['Con questa intenzione apro il mio cuore all\'amore.','Dichiaro: l\'amore è la mia natura originale.','Consacro il mio cuore all\'amore vero.','Con tutta la mia essenza: sono pronto ad amare.','Che l\'amore mi trovi, mi riconosca, mi riempia.','Sigillo questa verità: sono fatto per amare.','In nome della mia anima: l\'amore mi appartiene.','Che sia scritto: attiro l\'amore autentico.','Con fede e intenzione creo spazio per l\'amore.'],sacro:['Che il cielo benedica il mio cammino d\'amore.','Ogni amore nella mia vita è un dono sacro.','Il divino mi ama attraverso ogni persona che incontro.','Prego perché l\'amore nella mia vita sia puro e autentico.','Sono grato per ogni forma di amore nella mia vita.','Affido il mio cuore alle mani dell\'universo amorevole.','Mi inginocchio di fronte al mistero dell\'amore.','La generosità del cuore è la mia preghiera quotidiana.','Con umiltà ricevo e dono amore ogni giorno.']},abbondanza:{potente:['Sono un magnete per l\'abbondanza in tutte le sue forme.','Il denaro mi trova facilmente e spesso.','Merito prosperità, successo e abbondanza reale.','L\'universo mi supporta nel costruire la mia ricchezza.','Sono ricco di opportunità, energia e risorse.','L\'abbondanza è il mio stato naturale.','Creo valore nel mondo e ricevo valore in cambio.','Ogni giorno mi avvicino alla libertà finanziaria.','La prosperità scorre verso di me naturalmente.'],gentile:['Ricevo l\'abbondanza con mani aperte e cuore grato.','Mi permetto di avere di più senza sentirmi in colpa.','Merito una vita agiata e serena.','L\'abbondanza arriva a me con facilità e grazia.','Sono degno di ricevere tutto il bene che desidero.','La ricchezza mi permette di dare di più.','Sono al sicuro nell\'abbondanza.','Lascio che la prosperità mi nutra.','Ogni giorno porto gratitudine per ciò che ho.'],mistico:['Sono uno con il flusso infinito dell\'abbondanza universale.','Come le stelle sono infinite, infinite sono le mie possibilità.','L\'abbondanza è il respiro del cosmo che passa attraverso me.','Sono un canale per la prosperità del creato.','L\'universo è generoso — e io sono parte dell\'universo.','Il mio campo energetico attrae risorse e occasioni.','Come la luna cresce, cresce la mia prosperità.','Sono allineato con la frequenza dell\'abbondanza.','Ricevo perché sono parte del tutto che si dona.'],solenne:['Decreto: merito prosperità e abbondanza totale.','Sigillo questa intenzione: l\'abbondanza è mia.','Con intenzione ferma attiro abbondanza ora.','La scarsità non mi appartiene più.','Decreto: la prosperità è il mio diritto di nascita.','Che il flusso della prosperità non si arresti mai.','Con ogni respiro, respiro abbondanza.','Consacro questa certezza: sono prospero.','Che sia testimone di questa verità: sono abbondante.'],sacro:['Ringrazio per ogni forma di abbondanza nella mia vita.','Sono grato per il pane, il tetto, la salute.','Affido il mio percorso di prosperità al divino.','L\'abbondanza che ricevo serve anche al mondo.','Prego per ricevere ciò di cui ho davvero bisogno.','Sono uno strumento della generosità cosmica.','Che io possa ricevere e redistribuire con saggezza.','Ogni risorsa che ricevo è un dono da custodire.','La generosità dell\'universo mi ispira ogni giorno.']},guarigione:{potente:['Il mio corpo guarisce con potenza sorprendente.','Ogni cellula si rinnova in salute perfetta.','Sono più forte di qualunque ferita.','Il mio organismo sa sempre come tornare all\'equilibrio.','Guarisco a livello fisico, emotivo, spirituale.','Sono in perfetto allineamento con la salute totale.','Il mio corpo è la mia casa sacra — lo onoro.','Guarire è il mio diritto naturale.','Porto salute e vitalità in ogni mio respiro.'],gentile:['Mi prendo cura di me con tenerezza ogni giorno.','Il mio corpo merita attenzione, rispetto e amore.','Mi permetto di guarire al mio ritmo.','Ogni giorno mi sento un po\' meglio di ieri.','Mi tratto con la dolcezza di una madre.','Mi do il permesso di riposare e rigenerarmi.','La guarigione avviene quando mi amo davvero.','Ascolto il mio corpo quando parla.','Accolgo ogni passo del mio percorso di salute.'],mistico:['La luce universale guarisce ogni parte di me.','Sono connesso alla fonte inesauribile di vita.','Come la terra si rinnova in primavera, mi rinnovo io.','Ogni ferita porta in sé il seme della guarigione.','Il fiume della vita scorre libero attraverso di me.','La forza vitale del cosmo abita nel mio respiro.','Ogni alba porta nuova guarigione.','Sono intessuto di luce — e la luce guarisce.','Sono energia pura che si riallinea continuamente.'],solenne:['Decreto: il mio corpo si guarisce completamente.','Che la guarigione si manifesti in ogni livello del mio essere.','Con tutta la mia volontà: guarisco completamente.','Sigillo questa verità: la salute è il mio stato naturale.','Consacro il mio corpo alla vita piena e sana.','Che la luce guaritrice abiti in ogni mia cellula.','La salute è il mio diritto e la mia realtà.','Decreto con fermezza: sono sano, vitale, integro.','Che la guarigione operi in me ora e sempre.'],sacro:['Il mio corpo è un tempio sacro che merito di curare.','Ringrazio per la vita che scorre in me ogni giorno.','Affido la mia salute alla saggezza dell\'universo.','Sono grato per ogni momento di benessere.','Il mio corpo è sacro — lo tratto come tale.','Prego perché la salute si radichi in ogni parte di me.','Confido nel processo naturale di rigenerazione.','Che le mani invisibili del divino mi guariscano.','Sono grato per ogni respiro, ogni battito.']},protezione:{potente:['Sono circondato da uno scudo di luce invincibile.','Nulla di oscuro può penetrare il mio campo energetico.','Sono protetto su tutti i piani: fisico, emotivo, spirituale.','La mia aura è un bastione di luce dorata.','Espello ogni energia che non mi appartiene.','Sono inattaccabile dalle energie basse altrui.','La mia protezione è totale e assoluta.','Ogni limite che traccio è sacro e rispettato.','Sono al sicuro ovunque mi trovi.'],gentile:['Mi sento al sicuro nel mondo e nelle relazioni.','Sono protetto dall\'amore di tutto il creato.','Mi permetto di stare al sicuro senza difendermi.','Sono al sicuro. Sono protetto. Sono amato.','Mi fido della bontà fondamentale della vita.','Il confine tra me e gli altri è chiaro e amorevole.','Ricevo protezione naturalmente ovunque vada.','La vita mi abbraccia e mi tiene al sicuro.','Lascio che la protezione mi avvolga come un mantello.'],mistico:['Gli angeli custodi vegliano su ogni mio passo.','Il mio spirito è sigillato con la luce del primo sole.','Come la luna custodisce la notte, sono custodito.','Il mio campo energetico respinge ogni oscurità.','Entità di luce camminano al mio fianco.','L\'universo è il mio guardiano fedele.','Ogni porta che chiudo sigilla il mio benessere.','Sono segnato dalla protezione cosmica.','Come la roccia non si muove al vento, così la mia protezione.'],solenne:['In questo rito sigillo la mia protezione totale.','Decreto: nessuna energia avversa mi raggiunge.','Costruisco un bastione di luce con questa intenzione.','Che ogni confine che traccio sia sacro e rispettato.','Sigillo ogni varco — solo il bene entra in me.','Con tutta la mia volontà: sono protetto ora.','Che la luce divina mi circondi su ogni lato.','Questa protezione è reale, totale, eterna.','Dichiaro: sono al sicuro in questo corpo, in questa vita.'],sacro:['Mi affido alla protezione degli esseri di luce.','Ringrazio i miei antenati che vegliano su di me.','Il divino è il mio scudo e la mia roccia.','Sono grato per la protezione invisibile che mi segue.','Prego perché nessun male raggiunga me o i miei cari.','Sotto il cielo stellato sono sempre al sicuro.','Che gli angeli custodi mi guidino e proteggano.','La saggezza del cosmo mi protegge in ogni passo.','Affido la mia protezione alle mani dell\'universo.']},fiducia:{potente:['Mi fido pienamente di me stesso in ogni situazione.','Sono capace, degno e pronto ad affrontare qualunque sfida.','La mia autostima è incrollabile come una montagna.','Agisco con fiducia anche nell\'incertezza.','Ogni giorno sono più sicuro di me.','So chi sono e non ho bisogno di dimostrarlo.','Mi fido del mio processo interiore.','Sono abbastanza esattamente così come sono.','Confido nella mia intelligenza, intuizione e forza.'],gentile:['Mi do il permesso di essere orgoglioso di chi sono.','Sono abbastanza, ho abbastanza, faccio abbastanza.','Mi perdono per i miei errori e vado avanti.','La mia voce interiore è gentile e incoraggiante.','Riconosco e celebro le mie qualità uniche.','Scelgo di credere in me stesso anche quando è difficile.','Mi tratto con rispetto e fiducia ogni giorno.','Merito di occupare spazio in questo mondo.','Cresco ogni giorno nella fiducia in me stesso.'],mistico:['Sono un essere di luce che porta una missione unica.','La mia presenza ha un significato cosmico.','Vengo da stelle antiche — porto la loro saggezza.','Il mio percorso è scritto da una mano invisibile e saggia.','Sono allineato con il mio destino superiore.','La mia anima sa già tutto ciò che mi serve sapere.','Mi fido del disegno più grande di cui sono parte.','Sono un filo prezioso nell\'arazzo cosmico dell\'esistenza.','La mia unicità è il mio dono al mondo.'],solenne:['Decreto: mi fido completamente di me stesso.','Sigillo questa verità: la mia autostima è intera.','Dichiaro con fermezza: conosco il mio valore.','Consacro questa certezza: sono abbastanza.','Questa è la mia dichiarazione: sono pienamente me.','Con tutta la mia anima: mi fido del mio cammino.','Decreto: la sicurezza interiore è la mia roccia.','Che il dubbio si dissolva davanti alla mia fiducia.','Con questa voce: sono degno, capace, prezioso.'],sacro:['Sono grato per il dono di essere esattamente chi sono.','Affido il mio cammino alla saggezza superiore.','Prego per la grazia di vedermi come mi vede l\'universo.','Sono un dono unico in questo universo.','Confido nel processo sacro della mia crescita.','Ringrazio per i talenti e le qualità che porto.','Con umiltà e fiducia cammino nel mio destino.','Sono figlio della luce — e la luce crede in me.','Che il divino mi sostenga quando dubito di me.']},creativita:{potente:['La creatività scorre attraverso di me come un fiume in piena.','Sono un canale inesauribile di idee e visioni.','La mia espressione creativa è unica e potente.','Ogni giorno creo qualcosa che non esisteva prima.','L\'ispirazione mi cerca e mi trova sempre.','Sono audace nella mia espressione artistica.','Il mio talento cresce ogni volta che lo esprimo.','Creo con coraggio e senza censura.','Sono un artista, un creatore, un visionario.'],gentile:['Mi do il permesso di creare liberamente.','La mia creatività non ha bisogno di essere perfetta.','Creo per il puro piacere di creare.','Mi permetto di giocare, sbagliare, scoprire.','Ogni creazione ha valore, anche imperfetta.','La mia voce creativa merita di essere ascoltata.','Accolgo le mie idee con gentilezza e curiosità.','Creo con gioia senza aspettarmi il risultato perfetto.','Il mio processo creativo è valido esattamente com\'è.'],mistico:['Sono uno strumento del creato che crea attraverso me.','Le muse dell\'universo mi visitano ogni giorno.','Creo come le stelle — spontaneamente, magnificamente.','La mia creatività è connessa alla fonte originale.','Ogni atto creativo è un atto di co-creazione cosmica.','L\'ispirazione è un messaggio dal campo invisibile.','Sono un ponte tra l\'inesistente e il manifesto.','Creo perché sono fatto a immagine del Creatore.','Le visioni che ricevo sono doni da mondi sottili.'],solenne:['Decreto: la mia creatività è libera e potente.','Sblocco ogni blocco creativo con questa intenzione.','Dichiaro: creo con facilità, gioia e abbondanza.','Con tutta la mia forza: esprimo il mio dono al mondo.','Che ogni ostacolo creativo si dissolva ora.','Sigillo: l\'ispirazione è sempre disponibile per me.','Questa è la mia promessa: creo ogni giorno.','Che la creatività fluisca senza impedimenti.','Consacro la mia vita all\'espressione creativa.'],sacro:['Ringrazio per il dono della creatività che porto.','Il mio talento è un dono sacro da condividere.','Affido la mia espressione alle mani del divino.','Prego perché il mio talento fiorisca pienamente.','Sono grato per ogni scintilla di ispirazione.','Che ogni creazione porti luce a chi la riceve.','Con umiltà offro la mia creatività al mondo.','Che il creato usi le mie mani per creare bellezza.','Sono grato per ogni momento di ispirazione.']},intuizione:{potente:['La mia intuizione è affilata, precisa e infallibile.','Mi fido ciecamente della voce interiore.','Ricevo chiaramente segnali, visioni e messaggi.','La mia sensibilità è un superpotere.','Ascolto prima di agire — la mia intuizione non sbaglia.','Sono un essere altamente intuitivo e consapevole.','La mia terza vista si apre sempre di più.','Percepisco l\'energia delle situazioni con precisione.','La mia intuizione mi guida sempre verso il bene.'],gentile:['Mi fido dei segnali sottili che ricevo ogni giorno.','Mi permetto di fidarmi di ciò che sento senza spiegazioni.','Accolgo le mie percezioni senza giudicarle.','La voce del mio intuito è gentile e saggia.','Creo spazio nel silenzio per la mia guida interiore.','Mi fido del mio "lo sento" anche senza prove.','L\'intuizione è un dono che onoro ogni giorno.','La mia intuizione parla piano — io la ascolto.','Mi do il permesso di sapere senza sapere come.'],mistico:['Sono un essere senziente connesso ai piani sottili.','La mia terza vista percepisce ciò che gli occhi non vedono.','Ricevo messaggi attraverso sogni, simboli e sincronicità.','Sono in comunicazione costante con la mia anima guida.','Il velo tra i mondi è sottile per me.','Leggo l\'energia del campo invisibile.','I miei chakra superiori sono aperti e ricettivi.','Sono un sensitivo — ogni percezione ha significato.','L\'universo mi parla continuamente — io lo ascolto.'],solenne:['Decreto: la mia intuizione è la mia bussola infallibile.','Sigillo: il mio canale intuitivo è aperto e puro.','Affino la mia percezione sottile con questa intenzione.','Dichiaro: mi fido completamente della mia guida interiore.','Consacro il mio ascolto interiore come pratica sacra.','Che ogni segnale mi raggiunga chiaro e inequivocabile.','Questo rito potenzia la mia connessione intuitiva.','Con tutta la mia presenza: percepisco la verità.','Che la mia intuizione mi guidi con precisione.'],sacro:['Ringrazio per il dono della sensibilità.','Affido la mia guida alla saggezza del cosmo.','Prego perché la mia intuizione mi mostri la via.','Sono uno strumento della saggezza universale.','Che gli esseri di luce guidino le mie percezioni.','Con umiltà ascolto la voce dell\'anima.','Confido nella saggezza che mi parla nel silenzio.','Sono grato per ogni segnale ricevuto.','Che il divino mi parli attraverso l\'intuizione.']},liberazione:{potente:['Mi libero completamente da tutto ciò che non mi serve.','Taglio ogni catena che limita la mia crescita.','Sono libero da paure, condizionamenti e credenze vecchie.','Nulla del passato ha il potere di tenermi fermo.','Sono padrone della mia mente, del mio cuore, della mia vita.','La mia libertà interiore è totale e inviolabile.','Mi libero con coraggio da ogni schema negativo.','Sono pronto a lasciare andare tutto per diventare chi sono.','Mi libero con determinazione da ciò che non mi appartiene.'],gentile:['Con dolcezza lascio andare ciò che non mi appartiene più.','Mi do il permesso di cambiare, crescere, evolvere.','Libero me stesso dai giudizi che porto sulle spalle.','Mi permetto di essere diverso da chi ero ieri.','Ogni giorno mi libero un po\' di più.','Lascio che il passato mi insegni senza tenermi prigioniero.','Mi libero lentamente, amorevolmente, completamente.','Accolgo il cambiamento con gentilezza e curiosità.','Lascio andare con amore ciò che era e non è più.'],mistico:['Il serpente muta pelle — anch\'io mi rinnovo completamente.','Come la luna lascia andare il buio, io lascio andare il peso.','Sono come il fuoco che brucia ciò che non serve.','Ogni tramonto porta via qualcosa di vecchio in me.','La luna calante porta via le mie catene.','Come l\'alba dissolve la notte, mi dissolvo da ogni limite.','Come l\'acqua cambio forma senza perdere la mia essenza.','Sono il vento che spazza via ciò che era pronto ad andare.','La liberazione è un atto cosmico — vi partecipo pienamente.'],solenne:['Decreto solennemente: mi libero ora da ogni peso.','Sigillo questa liberazione: il passato non ha potere su di me.','Con questa intenzione taglio ogni legame che mi limita.','Che ogni catena si dissolva nella luce di questa intenzione.','Dichiaro: sono libero, leggero, aperto al nuovo.','Consacro questo momento come il mio rito di liberazione.','Con piena volontà: mi libero, mi trasformo, mi rinnovo.','Che ciò che era finisce qui — e comincia la libertà.','In questo rito di liberazione, lascio andare tutto.'],sacro:['Ringrazio le lezioni del passato e le lascio andare con amore.','Affido al divino tutto ciò che non riesco a liberare da solo.','Sono grato per ogni esperienza, anche quella che mi ha ferito.','Prego per la grazia di lasciar andare ciò che trattieni.','Con umiltà chiedo il dono della liberazione interiore.','Consegno al fuoco sacro i miei pesi e le mie paure.','Il divino mi aiuta a fare spazio per il nuovo che arriva.','Lascio andare — e mi affido con fede al flusso della vita.','Che il cielo mi aiuti a portare il perdono nel cuore.']},salute:{potente:['Il mio corpo è forte, sano e pieno di vitalità.','Ogni sistema del mio organismo funziona perfettamente.','La mia salute migliora ogni giorno.','Sono pieno di energia vitale e forza fisica.','Il mio corpo sa come mantenersi in salute.','Scelgo ogni giorno ciò che nutre il mio corpo.','Vivo in un corpo che onoro e rispetto.','La mia vitalità è un patrimonio che custodisco.','Mi prendo cura di me con disciplina e amore.'],gentile:['Mi prendo cura del mio corpo con amore e pazienza.','Merito di stare bene — mi do ciò di cui ho bisogno.','Ascolto i segnali del mio corpo con rispetto.','Mi muovo, respiro e mangio con consapevolezza.','Il mio corpo mi porta in questo mondo — lo ringrazio.','Scelgo la salute perché mi amo.','Mi do il permesso di riposare quando ne ho bisogno.','Ogni atto di cura verso me stesso è un atto d\'amore.','Onoro il mio corpo nel bene e nel male.'],mistico:['Il mio corpo è un tempio dove abita la scintilla divina.','La forza vitale cosmica scorre libera attraverso di me.','Come la natura si rigenera, il mio corpo si rigenera.','Il prana universale nutre ogni mia cellula.','Sono in armonia con i ritmi naturali del mio essere.','Il mio campo bioenergetico è luminoso e in salute.','Sono vita che celebra se stessa.','La luce sana scorre nei miei meridiani e chakra.','Sono connesso alla sorgente inesauribile di energia vitale.'],solenne:['Decreto: la salute totale è il mio stato naturale.','Con questa intenzione sigillo la mia vitalità.','Che ogni cellula riceva il messaggio di salute e forza.','Decreto: il benessere è la mia realtà permanente.','Consacro il mio corpo alla vita piena e vitale.','Che la vita scorra in me potente e ininterrotta.','Con piena volontà: scelgo la salute ogni giorno.','Dichiaro: ogni giorno il mio corpo si rinnova in salute.','Sigillo questo rito con l\'intenzione di guarire e fiorire.'],sacro:['Ringrazio per ogni giorno di salute e benessere.','Sono grato per il miracolo quotidiano del mio corpo.','Affido la mia salute alla saggezza del creato.','Onoro il tempio del mio corpo come dono sacro.','Il divino dimora nel mio corpo — lo curo di conseguenza.','Prego perché la guarigione operi in ogni parte di me.','Sono grato per ogni respiro, ogni battito, ogni passo.','Con gratitudine e fede: sono sano, vivo, intero.','Che le forze naturali mi supportino nella salute.']},scopo:{potente:['Vivo con uno scopo chiaro e una missione potente.','Sono qui per un motivo preciso — e lo so.','Ogni giorno agisco in allineamento con la mia missione.','Il mio contributo al mondo è unico e necessario.','Sono determinato a realizzare il mio massimo potenziale.','La mia vita ha un significato profondo e reale.','Avanzo con coraggio verso il mio destino.','Creo un impatto reale nel mondo che mi circonda.','Sono pronto a rispondere al richiamo della mia anima.'],gentile:['Esploro il mio scopo con curiosità e gentilezza.','Il mio cammino si rivela un passo alla volta.','Ogni esperienza mi insegna qualcosa sulla mia missione.','Sono in pace con il mio processo di scoperta.','Mi fido che il mio percorso ha senso anche quando non lo vedo.','Non devo avere tutte le risposte — cammino con fiducia.','Mi do il permesso di cambiare direzione se necessario.','Il mio scopo si manifesta nel modo più adatto a me.','Ogni piccolo passo conta nel disegno più grande.'],mistico:['Sono incarnato con uno scopo cosmico da compiere.','La mia anima ha scelto questo tempo, questo luogo.','Sono un pezzo necessario del puzzle dell\'universo.','Il mio dharma mi aspetta — lo sto già vivendo.','Vengo da stelle antiche con una missione specifica.','Il mio passaggio sulla terra lascia una traccia di luce.','L\'universo mi ha chiamato qui per un compito preciso.','La mia missione è scritta nel libro dell\'anima.','Sono un agente di cambiamento in questo mondo.'],solenne:['Decreto: rispondo al richiamo della mia anima.','Consacro la mia vita alla realizzazione del mio scopo.','Sigillo questa intenzione: agisco in linea con la mia missione.','Con tutta la mia volontà: vivo con scopo ogni giorno.','Decreto: il mio scopo si manifesta con chiarezza.','Dichiaro con fermezza: so perché sono qui.','In questo rito mi impegno alla mia missione di vita.','Che ogni scelta mi avvicini alla mia versione più alta.','Che la mia vita sia un\'opera degna della mia anima.'],sacro:['Ringrazio per il dono di una vita con significato.','Affido il mio scopo alla saggezza divina.','Prego perché la mia missione si riveli con chiarezza.','Sono grato di essere vivo in questo momento storico.','Che il divino guidi i miei passi verso il mio scopo.','Confido che la vita mi mostri la via al momento giusto.','Il mio scopo è un dono — lo accolgo con gratitudine.','Con umiltà mi metto al servizio della mia anima.','Sono grato per ogni tappa del mio cammino.']},pace:{potente:['La pace interiore è la mia roccia incrollabile.','Mantengo la calma in qualunque tempesta.','La serenità è il mio stato default.','Nulla scalfisce la mia pace profonda.','Scelgo la pace sopra ogni altra cosa.','La mia mente è quieta, chiara, centrata.','Genero pace attorno a me irradiando pace da dentro.','Sono immovibile nella mia pace interiore.','Sono un porto tranquillo nel caos del mondo.'],gentile:['Mi do il permesso di stare in pace.','La pace non va guadagnata — è già in me.','Mi fermo, respiro e torno al centro.','Ogni momento è un\'opportunità di scegliere la pace.','Mi tratto con la dolcezza che genera serenità.','Mi do il permesso di rallentare quando ne ho bisogno.','La pace mi appartiene — scelgo di abitarla.','Creo ambienti e relazioni che nutrono la mia pace.','Lascio andare ciò che non posso controllare.'],mistico:['Sono l\'occhio del ciclone — fermo nel caos.','Come il lago riflette il cielo in perfetta quiete, così io.','La pace è il suono originale del cosmo — lo ascolto.','Sono connesso al centro silenzioso dell\'universo.','Il mio silenzio interiore è vasto come lo spazio.','Sono un\'isola di pace in un oceano di cambiamento.','La quiete del cosmo abita nel profondo del mio cuore.','Sono pace — non ho bisogno di cercarla fuori.','Come la roccia non si muove al vento, così la mia pace.'],solenne:['Decreto: la pace è il mio diritto e la mia realtà.','Sigillo: nulla può turbare la mia pace profonda.','Dichiaro: sono in pace con me e con la vita.','Che la tempesta si plachi — dentro e fuori di me.','Con tutta la mia anima: scelgo la pace.','In questo rito ancoro la pace nel profondo del mio essere.','Decreto: la serenità mi appartiene ora e sempre.','Che la pace che è in me si irradi a tutto il mondo.','Consacro questa serenità con tutta la mia intenzione.'],sacro:['Ringrazio per i momenti di pace nella mia vita.','Affido le mie preoccupazioni alle mani del divino.','Sono grato per ogni istante di serenità.','Confido che tutto vada come deve andare.','Il divino è pace — e io sono parte del divino.','Sono in pace con il mistero della vita.','Che il cielo mi doni la grazia della pace interiore.','Con umiltà mi affranco dal caos e scelgo la quiete.','Prego perché la pace mi raggiunga nei momenti difficili.']},coraggio:{potente:['Affronto ogni sfida con coraggio incrollabile.','La paura non mi ferma — mi informa e poi agisco.','Sono più coraggioso di quanto io creda.','Avanzo anche quando tremo.','Il mio coraggio cresce ogni volta che lo metto alla prova.','Non mi tiro indietro di fronte a ciò che conta davvero.','Sono audace, deciso, coraggioso.','Scelgo il coraggio sopra la comodità ogni giorno.','Sono un guerriero di luce — affronto ogni oscurità.'],gentile:['Mi do il permesso di essere coraggioso al mio ritmo.','Il coraggio non è assenza di paura — è agire nonostante.','Mi incoraggio a fare il prossimo passo, anche piccolo.','Ogni atto di coraggio, piccolo o grande, conta.','Mi congratulo con me stesso per il coraggio che già ho.','Sono più forte di quanto penso.','Mi do la mano quando ho paura e avanzo lo stesso.','Il mio coraggio non deve essere perfetto per essere reale.','Ogni giorno trovo un piccolo atto di coraggio.'],mistico:['Sono un guerriero dell\'anima che non conosce resa.','Come il sole sorge ogni mattina nonostante la notte, io sorgo.','Il mio spirito è fatto di fuoco che non si spegne.','Sono discendente di eroi — porto il loro coraggio in me.','L\'universo mette sul mio cammino solo ciò che posso reggere.','Sono temprato dalle tempeste — ne esco più forte.','Il mio coraggio viene da un luogo cosmico profondo.','Come il tuono non chiede permesso, non lo chiedo nemmeno io.','Sono il fuoco che brucia le proprie paure.'],solenne:['Decreto con tutta la mia voce: sono coraggioso.','Consacro la mia vita al coraggio di essere me stesso.','Sigillo: la paura non mi governa più.','Dichiaro con fermezza: avanzo, scelgo, agisco.','Con tutta la mia forza: scelgo il coraggio oggi.','Che ogni esitazione bruci nel fuoco della mia intenzione.','In questo rito abbraccio il guerriero che vive in me.','Decreto: il coraggio è la mia risposta naturale alla vita.','Che la mia vita sia un atto di coraggio quotidiano.'],sacro:['Ringrazio per ogni volta che ho scelto il coraggio.','Affido le mie paure alla saggezza del divino.','Sono grato per la forza invisibile che mi sostiene.','Il divino cammina con me — non ho nulla da temere.','Confido che l\'universo mi sorregga in ogni atto coraggioso.','Prego perché il coraggio mi accompagni dove la ragione si ferma.','Sono grato per ogni prova che mi ha reso più forte.','Con umiltà e determinazione avanzo sul mio cammino.','Che il cielo mi dia il coraggio di vivere pienamente.']}};
const AFFERMAZIONI_EN={
amore:{potente:['I am worthy of loving and being loved deeply.','True love finds me whenever I open myself to receive it.','I bring authentic love into every encounter.','My heart is capable of loving without losing itself.','I attract relationships that nourish my soul.','I am love. I give love. I receive love.','My capacity to love grows every day.','I am a magnet for authentic, deep connections.','Love lives in me even before it is received.'],gentile:['I deserve gentle, steady love.','My heart opens softly to every new possibility.','I am safe loving and being loved.','I let love reach me in the way that serves me.','I am enough. I am lovable. I am loved.','With softness I welcome love into my life.','I treat myself with the same tenderness I give those I love.','Love follows me wherever I go.','Every day I receive small gifts of love.'],mistico:['I am a channel of cosmic love.','My heart beats to the rhythm of a loving universe.','Love dwells in me as the moon dwells in the night.','I am woven from stars and ancient love.','The cosmos embraces me and I am loved.','My soul remembers love as its origin.','Every breath carries love from the center of creation.','I am a child of light — and light is love.','In the silence of the heart, love always speaks.'],solenne:['With this intention I open my heart to love.','I declare: love is my original nature.','I consecrate my heart to true love.','With my whole being: I am ready to love.','May love find me, recognize me, fill me.','I seal this truth: I am made to love.','In my soul\u2019s name: love belongs to me.','Let it be written: I attract authentic love.','With faith and intention I make space for love.'],sacro:['May heaven bless my path of love.','Every love in my life is a sacred gift.','The divine loves me through every person I meet.','I pray that the love in my life be pure and true.','I am grateful for every form of love in my life.','I entrust my heart to the hands of a loving universe.','I bow before the mystery of love.','Generosity of heart is my daily prayer.','With humility I receive and give love each day.']},
abbondanza:{potente:['I am a magnet for abundance in every form.','Money finds me easily and often.','I deserve prosperity, success and real abundance.','The universe supports me in building my wealth.','I am rich in opportunities, energy and resources.','Abundance is my natural state.','I create value in the world and receive value in return.','Every day I move closer to financial freedom.','Prosperity flows toward me naturally.'],gentile:['I receive abundance with open hands and a grateful heart.','I allow myself to have more without guilt.','I deserve a comfortable, peaceful life.','Abundance comes to me with ease and grace.','I am worthy of receiving all the good I desire.','Wealth allows me to give more.','I am safe in abundance.','I let prosperity nourish me.','Every day I carry gratitude for what I have.'],mistico:['I am one with the infinite flow of universal abundance.','As the stars are endless, so are my possibilities.','Abundance is the breath of the cosmos passing through me.','I am a channel for the prosperity of creation.','The universe is generous — and I am part of the universe.','My energy field attracts resources and opportunities.','As the moon grows, my prosperity grows.','I am aligned with the frequency of abundance.','I receive because I am part of the whole that gives.'],solenne:['I decree: I deserve prosperity and total abundance.','I seal this intention: abundance is mine.','With firm intention I attract abundance now.','Scarcity no longer belongs to me.','I decree: prosperity is my birthright.','May the flow of prosperity never stop.','With every breath, I breathe abundance.','I consecrate this certainty: I am prosperous.','Let it be witnessed: I am abundant.'],sacro:['I give thanks for every form of abundance in my life.','I am grateful for bread, shelter, health.','I entrust my path of prosperity to the divine.','The abundance I receive also serves the world.','I pray to receive what I truly need.','I am an instrument of cosmic generosity.','May I receive and redistribute with wisdom.','Every resource I receive is a gift to honor.','The generosity of the universe inspires me every day.']},
guarigione:{potente:['My body heals with astonishing power.','Every cell renews itself in perfect health.','I am stronger than any wound.','My body always knows how to return to balance.','I heal physically, emotionally, spiritually.','I am in perfect alignment with total health.','My body is my sacred home — I honor it.','Healing is my natural right.','I carry health and vitality in every breath.'],gentile:['I take care of myself with tenderness every day.','My body deserves attention, respect and love.','I allow myself to heal at my own pace.','Every day I feel a little better than yesterday.','I treat myself with a mother\u2019s gentleness.','I give myself permission to rest and regenerate.','Healing happens when I truly love myself.','I listen to my body when it speaks.','I welcome every step of my path to health.'],mistico:['Universal light heals every part of me.','I am connected to the inexhaustible source of life.','As the earth renews in spring, I renew myself.','Every wound carries within it the seed of healing.','The river of life flows freely through me.','The cosmos\u2019 vital force lives in my breath.','Every dawn brings new healing.','I am woven of light — and light heals.','I am pure energy that continually realigns.'],solenne:['I decree: my body heals completely.','May healing manifest on every level of my being.','With all my will: I heal completely.','I seal this truth: health is my natural state.','I consecrate my body to a full, healthy life.','May healing light dwell in every cell of me.','Health is my right and my reality.','I decree with firmness: I am healthy, vital, whole.','May healing work within me now and always.'],sacro:['My body is a sacred temple I deserve to care for.','I give thanks for the life flowing through me each day.','I entrust my health to the wisdom of the universe.','I am grateful for every moment of wellbeing.','My body is sacred — I treat it as such.','I pray that health take root in every part of me.','I trust the natural process of regeneration.','May the unseen hands of the divine heal me.','I am grateful for every breath, every heartbeat.']},
protezione:{potente:['I am surrounded by an invincible shield of light.','Nothing dark can penetrate my energy field.','I am protected on every level: physical, emotional, spiritual.','My aura is a bastion of golden light.','I release any energy that does not belong to me.','I am untouchable by others\u2019 low energies.','My protection is total and absolute.','Every boundary I set is sacred and respected.','I am safe wherever I am.'],gentile:['I feel safe in the world and in my relationships.','I am protected by the love of all creation.','I allow myself to be safe without needing to defend myself.','I am safe. I am protected. I am loved.','I trust the fundamental goodness of life.','The boundary between me and others is clear and loving.','I naturally receive protection wherever I go.','Life embraces me and keeps me safe.','I let protection wrap around me like a cloak.'],mistico:['Guardian angels watch over every step I take.','My spirit is sealed with the light of the first sun.','As the moon guards the night, I am guarded.','My energy field repels all darkness.','Beings of light walk beside me.','The universe is my faithful guardian.','Every door I close seals my wellbeing.','I am marked by cosmic protection.','As the rock does not move in the wind, so does my protection stand firm.'],solenne:['In this rite I seal my total protection.','I decree: no adverse energy reaches me.','I build a bastion of light with this intention.','May every boundary I draw be sacred and respected.','I seal every gap — only good enters me.','With all my will: I am protected now.','May divine light surround me on every side.','This protection is real, total, eternal.','I declare: I am safe in this body, in this life.'],sacro:['I entrust myself to the protection of beings of light.','I thank my ancestors who watch over me.','The divine is my shield and my rock.','I am grateful for the unseen protection that follows me.','I pray no harm reaches me or my loved ones.','Under the starry sky I am always safe.','May guardian angels guide and protect me.','The wisdom of the cosmos protects me at every step.','I entrust my protection to the hands of the universe.']},
fiducia:{potente:['I fully trust myself in every situation.','I am capable, worthy and ready to face any challenge.','My self-esteem is as unshakable as a mountain.','I act with confidence even amid uncertainty.','Every day I grow more secure in myself.','I know who I am and don\u2019t need to prove it.','I trust my inner process.','I am enough exactly as I am.','I trust my intelligence, intuition and strength.'],gentile:['I give myself permission to be proud of who I am.','I am enough, I have enough, I do enough.','I forgive myself for my mistakes and move forward.','My inner voice is gentle and encouraging.','I recognize and celebrate my unique qualities.','I choose to believe in myself even when it\u2019s hard.','I treat myself with respect and trust every day.','I deserve to take up space in this world.','I grow in self-trust every day.'],mistico:['I am a being of light carrying a unique mission.','My presence has cosmic meaning.','I come from ancient stars — I carry their wisdom.','My path is written by an unseen, wise hand.','I am aligned with my higher destiny.','My soul already knows everything I need to know.','I trust the greater design I am part of.','I am a precious thread in the cosmic tapestry of existence.','My uniqueness is my gift to the world.'],solenne:['I decree: I fully trust myself.','I seal this truth: my self-esteem is whole.','I declare with firmness: I know my worth.','I consecrate this certainty: I am enough.','This is my declaration: I am fully myself.','With all my soul: I trust my path.','I decree: inner security is my rock.','May doubt dissolve before my confidence.','With this voice: I am worthy, capable, precious.'],sacro:['I am grateful for the gift of being exactly who I am.','I entrust my path to higher wisdom.','I pray for the grace to see myself as the universe sees me.','I am a unique gift in this universe.','I trust the sacred process of my growth.','I give thanks for the talents and qualities I carry.','With humility and trust I walk my destiny.','I am a child of light — and light believes in me.','May the divine sustain me when I doubt myself.']},
creativita:{potente:['Creativity flows through me like a river in flood.','I am an inexhaustible channel of ideas and visions.','My creative expression is unique and powerful.','Every day I create something that didn\u2019t exist before.','Inspiration seeks me out and always finds me.','I am bold in my artistic expression.','My talent grows every time I express it.','I create with courage and without censorship.','I am an artist, a creator, a visionary.'],gentile:['I give myself permission to create freely.','My creativity doesn\u2019t need to be perfect.','I create for the pure joy of creating.','I allow myself to play, fail, discover.','Every creation has value, even imperfect.','My creative voice deserves to be heard.','I welcome my ideas with gentleness and curiosity.','I create with joy without attachment to outcome.','My creative process is valid exactly as it is.'],mistico:['I am an instrument of creation, creating through me.','The muses of the universe visit me every day.','I create like the stars — spontaneously, magnificently.','My creativity is connected to the original source.','Every creative act is an act of cosmic co-creation.','Inspiration is a message from the unseen field.','I am a bridge between the nonexistent and the manifest.','I create because I am made in the Creator\u2019s image.','The visions I receive are gifts from subtler worlds.'],solenne:['I decree: my creativity is free and powerful.','I unlock every creative block with this intention.','I declare: I create with ease, joy and abundance.','With all my strength: I offer my gift to the world.','May every creative obstacle dissolve now.','I seal: inspiration is always available to me.','This is my promise: I create every day.','May creativity flow without obstruction.','I consecrate my life to creative expression.'],sacro:['I give thanks for the gift of creativity I carry.','My talent is a sacred gift to share.','I entrust my expression to divine hands.','I pray that my talent flourishes fully.','I am grateful for every spark of inspiration.','May every creation bring light to those who receive it.','With humility I offer my creativity to the world.','May creation use my hands to make beauty.','I am grateful for every moment of inspiration.']},
intuizione:{potente:['My intuition is sharp, precise and unfailing.','I trust the inner voice without question.','I clearly receive signs, visions and messages.','My sensitivity is a superpower.','I listen before I act — my intuition doesn\u2019t fail.','I am a highly intuitive, aware being.','My third sight opens more and more.','I perceive the energy of situations with precision.','My intuition always guides me toward the good.'],gentile:['I trust the subtle signals I receive every day.','I allow myself to trust what I feel without explanation.','I welcome my perceptions without judging them.','My intuition\u2019s voice is gentle and wise.','I create space in silence for my inner guidance.','I trust my \u201cI feel it\u201d even without proof.','Intuition is a gift I honor every day.','My intuition speaks softly — I listen.','I give myself permission to know without knowing how.'],mistico:['I am a sentient being connected to subtler planes.','My third sight perceives what eyes cannot see.','I receive messages through dreams, symbols and synchronicity.','I am in constant communication with my guiding soul.','The veil between worlds is thin for me.','I read the energy of the unseen field.','My higher chakras are open and receptive.','I am a sensitive — every perception has meaning.','The universe speaks to me continuously — I listen.'],solenne:['I decree: my intuition is my unfailing compass.','I seal: my intuitive channel is open and pure.','I sharpen my subtle perception with this intention.','I declare: I fully trust my inner guidance.','I consecrate my inner listening as a sacred practice.','May every signal reach me clear and unmistakable.','This rite empowers my intuitive connection.','With all my presence: I perceive the truth.','May my intuition guide me with precision.'],sacro:['I give thanks for the gift of sensitivity.','I entrust my guidance to the wisdom of the cosmos.','I pray that my intuition shows me the way.','I am an instrument of universal wisdom.','May beings of light guide my perceptions.','With humility I listen to the voice of the soul.','I trust the wisdom that speaks to me in silence.','I am grateful for every signal received.','May the divine speak to me through intuition.']},
liberazione:{potente:['I free myself completely from all that no longer serves me.','I cut every chain that limits my growth.','I am free from fears, conditioning and old beliefs.','Nothing from the past has power to hold me back.','I am master of my mind, my heart, my life.','My inner freedom is total and inviolable.','I free myself courageously from every negative pattern.','I am ready to let go of everything to become who I am.','I free myself with determination from what no longer belongs to me.'],gentile:['With gentleness I let go of what no longer belongs to me.','I give myself permission to change, grow, evolve.','I free myself from the judgments I carry on my shoulders.','I allow myself to be different from who I was yesterday.','Every day I free myself a little more.','I let the past teach me without holding me prisoner.','I free myself slowly, lovingly, completely.','I welcome change with gentleness and curiosity.','I let go with love of what was and is no more.'],mistico:['The serpent sheds its skin — I too renew myself completely.','As the moon releases the dark, I release the weight.','I am like fire that burns what no longer serves.','Every sunset carries away something old in me.','The waning moon carries away my chains.','As dawn dissolves the night, I dissolve every limit.','Like water I change shape without losing my essence.','I am the wind that sweeps away what was ready to go.','Liberation is a cosmic act — I fully take part in it.'],solenne:['I solemnly decree: I free myself now from every burden.','I seal this liberation: the past has no power over me.','With this intention I cut every bond that limits me.','May every chain dissolve in the light of this intention.','I declare: I am free, light, open to the new.','I consecrate this moment as my rite of liberation.','With full will: I free myself, transform, renew.','What was ends here — and freedom begins.','In this rite of liberation, I let everything go.'],sacro:['I thank the lessons of the past and release them with love.','I entrust to the divine what I cannot release alone.','I am grateful for every experience, even the painful ones.','I pray for the grace to let go of what I hold onto.','With humility I ask for the gift of inner liberation.','I surrender my burdens and fears to the sacred fire.','The divine helps me make space for what\u2019s new.','I let go — and trust the flow of life.','May heaven help me carry forgiveness in my heart.']},
salute:{potente:['My body is strong, healthy and full of vitality.','Every system in my body functions perfectly.','My health improves every day.','I am full of vital energy and physical strength.','My body knows how to maintain its health.','Every day I choose what nourishes my body.','I live in a body I honor and respect.','My vitality is a treasure I protect.','I take care of myself with discipline and love.'],gentile:['I take care of my body with love and patience.','I deserve to feel well — I give myself what I need.','I listen to my body\u2019s signals with respect.','I move, breathe and eat with awareness.','My body carries me through this world — I thank it.','I choose health because I love myself.','I give myself permission to rest when I need to.','Every act of self-care is an act of love.','I honor my body in good times and bad.'],mistico:['My body is a temple where the divine spark dwells.','Cosmic life force flows freely through me.','As nature regenerates, my body regenerates.','Universal prana nourishes every cell of mine.','I am in harmony with the natural rhythms of my being.','My bioenergetic field is luminous and healthy.','I am life celebrating itself.','Healing light flows in my meridians and chakras.','I am connected to the inexhaustible source of vital energy.'],solenne:['I decree: total health is my natural state.','With this intention I seal my vitality.','May every cell receive the message of health and strength.','I decree: wellbeing is my permanent reality.','I consecrate my body to a full, vital life.','May life flow through me, powerful and unbroken.','With full will: I choose health every day.','I declare: every day my body renews itself in health.','I seal this rite with the intention to heal and flourish.'],sacro:['I give thanks for every day of health and wellbeing.','I am grateful for the daily miracle of my body.','I entrust my health to the wisdom of creation.','I honor the temple of my body as a sacred gift.','The divine dwells in my body — I care for it accordingly.','I pray that healing works in every part of me.','I am grateful for every breath, every heartbeat, every step.','With gratitude and faith: I am healthy, alive, whole.','May natural forces support me in health.']},
scopo:{potente:['I live with a clear purpose and a powerful mission.','I am here for a precise reason — and I know it.','Every day I act in alignment with my mission.','My contribution to the world is unique and necessary.','I am determined to fulfill my highest potential.','My life has deep, real meaning.','I move forward with courage toward my destiny.','I create a real impact in the world around me.','I am ready to answer my soul\u2019s call.'],gentile:['I explore my purpose with curiosity and gentleness.','My path reveals itself one step at a time.','Every experience teaches me something about my mission.','I am at peace with my process of discovery.','I trust that my path makes sense even when I can\u2019t see it.','I don\u2019t need all the answers — I walk with trust.','I give myself permission to change direction if needed.','My purpose manifests in the way that best suits me.','Every small step matters in the bigger design.'],mistico:['I am incarnated with a cosmic purpose to fulfill.','My soul chose this time, this place.','I am a necessary piece of the universe\u2019s puzzle.','My dharma awaits me — I am already living it.','I come from ancient stars with a specific mission.','My passage on earth leaves a trace of light.','The universe called me here for a precise task.','My mission is written in the book of the soul.','I am an agent of change in this world.'],solenne:['I decree: I answer the call of my soul.','I consecrate my life to fulfilling my purpose.','I seal this intention: I act in line with my mission.','With all my will: I live with purpose every day.','I decree: my purpose manifests with clarity.','I declare with firmness: I know why I am here.','In this rite I commit to my life mission.','May every choice bring me closer to my highest self.','May my life be a work worthy of my soul.'],sacro:['I give thanks for the gift of a meaningful life.','I entrust my purpose to divine wisdom.','I pray that my mission reveals itself with clarity.','I am grateful to be alive in this historic moment.','May the divine guide my steps toward my purpose.','I trust that life will show me the way at the right time.','My purpose is a gift — I welcome it with gratitude.','With humility I place myself in service of my soul.','I am grateful for every stage of my journey.']},
pace:{potente:['Inner peace is my unshakable rock.','I remain calm in any storm.','Serenity is my default state.','Nothing scratches my deep peace.','I choose peace above all else.','My mind is quiet, clear, centered.','I generate peace around me by radiating it from within.','I am immovable in my inner peace.','I am a calm harbor in the chaos of the world.'],gentile:['I give myself permission to be at peace.','Peace doesn\u2019t need to be earned — it is already in me.','I pause, breathe and return to center.','Every moment is a chance to choose peace.','I treat myself with the gentleness that generates serenity.','I give myself permission to slow down when I need to.','Peace belongs to me — I choose to dwell in it.','I create environments and relationships that nourish my peace.','I let go of what I cannot control.'],mistico:['I am the eye of the storm — still amid chaos.','As the lake reflects the sky in perfect stillness, so do I.','Peace is the original sound of the cosmos — I listen to it.','I am connected to the silent center of the universe.','My inner silence is as vast as space.','I am an island of peace in an ocean of change.','The stillness of the cosmos lives deep in my heart.','I am peace — I don\u2019t need to search for it outside.','As the rock does not move in the wind, so does my peace.'],solenne:['I decree: peace is my right and my reality.','I seal: nothing can disturb my deep peace.','I declare: I am at peace with myself and with life.','May the storm settle — within and around me.','With all my soul: I choose peace.','In this rite I anchor peace deep within my being.','I decree: serenity belongs to me now and always.','May the peace within me radiate to the whole world.','I consecrate this serenity with all my intention.'],sacro:['I give thanks for the moments of peace in my life.','I entrust my worries to the hands of the divine.','I am grateful for every instant of serenity.','I trust that everything unfolds as it should.','The divine is peace — and I am part of the divine.','I am at peace with the mystery of life.','May heaven grant me the grace of inner peace.','With humility I free myself from chaos and choose stillness.','I pray that peace reaches me in difficult moments.']},
coraggio:{potente:['I face every challenge with unshakable courage.','Fear doesn\u2019t stop me — it informs me, and then I act.','I am braver than I believe.','I move forward even when I tremble.','My courage grows every time I test it.','I don\u2019t back down from what truly matters.','I am bold, decisive, courageous.','I choose courage over comfort every day.','I am a warrior of light — I face every darkness.'],gentile:['I give myself permission to be courageous at my own pace.','Courage isn\u2019t the absence of fear — it\u2019s acting despite it.','I encourage myself to take the next step, even a small one.','Every act of courage, big or small, counts.','I congratulate myself for the courage I already have.','I am stronger than I think.','I take my own hand when afraid and move forward anyway.','My courage doesn\u2019t need to be perfect to be real.','Every day I find a small act of courage.'],mistico:['I am a warrior of the soul who knows no surrender.','As the sun rises every morning despite the night, I rise.','My spirit is made of fire that never goes out.','I am descended from heroes — I carry their courage within me.','The universe places on my path only what I can bear.','I am tempered by storms — I come out stronger.','My courage comes from a deep, cosmic place.','As thunder asks no permission, neither do I.','I am the fire that burns its own fears.'],solenne:['I decree with my whole voice: I am courageous.','I consecrate my life to the courage of being myself.','I seal: fear no longer governs me.','I declare with firmness: I move forward, I choose, I act.','With all my strength: I choose courage today.','May every hesitation burn in the fire of my intention.','In this rite I embrace the warrior living within me.','I decree: courage is my natural response to life.','May my life be an act of daily courage.'],sacro:['I give thanks for every time I chose courage.','I entrust my fears to the wisdom of the divine.','I am grateful for the unseen strength that sustains me.','The divine walks with me — I have nothing to fear.','I trust the universe to support me in every courageous act.','I pray that courage accompanies me where reason stops.','I am grateful for every trial that made me stronger.','With humility and determination I move forward on my path.','May heaven give me the courage to live fully.']}
};

const AFFERMAZIONI_ES={
amore:{potente:['Soy digno de amar y ser amado profundamente.','El amor verdadero me encuentra cada vez que me abro a recibirlo.','Llevo amor auténtico a cada encuentro.','Mi corazón es capaz de amar sin perderse.','Atraigo relaciones que nutren mi alma.','Soy amor. Doy amor. Recibo amor.','Mi capacidad de amar crece cada día.','Soy un imán para conexiones auténticas y profundas.','El amor vive en mí incluso antes de ser recibido.'],gentile:['Merezco un amor gentil y constante.','Mi corazón se abre dulcemente a cada nueva posibilidad.','Estoy a salvo amando y siendo amado.','Dejo que el amor me alcance del modo que me conviene.','Soy suficiente. Soy amable. Soy amado.','Con dulzura acojo el amor en mi vida.','Me trato con la misma ternura que daría a quien amo.','El amor me sigue a donde vaya.','Cada día recibo pequeños regalos de amor.'],mistico:['Soy un canal del amor cósmico.','Mi corazón late al ritmo del universo que ama.','El amor habita en mí como la luna habita la noche.','Estoy tejido de estrellas y amor antiguo.','El cosmos me abraza y soy amado.','Mi alma recuerda el amor como su origen.','Cada respiración trae amor desde el centro de la creación.','Soy hijo de la luz — y la luz es amor.','En el silencio del corazón el amor siempre habla.'],solenne:['Con esta intención abro mi corazón al amor.','Declaro: el amor es mi naturaleza original.','Consagro mi corazón al amor verdadero.','Con todo mi ser: estoy listo para amar.','Que el amor me encuentre, me reconozca, me llene.','Sello esta verdad: estoy hecho para amar.','En nombre de mi alma: el amor me pertenece.','Que quede escrito: atraigo el amor auténtico.','Con fe e intención creo espacio para el amor.'],sacro:['Que el cielo bendiga mi camino de amor.','Cada amor en mi vida es un regalo sagrado.','Lo divino me ama a través de cada persona que encuentro.','Ruego para que el amor en mi vida sea puro y auténtico.','Estoy agradecido por cada forma de amor en mi vida.','Confío mi corazón a las manos del universo amoroso.','Me inclino ante el misterio del amor.','La generosidad del corazón es mi oración diaria.','Con humildad recibo y doy amor cada día.']},
