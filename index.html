<style>
/* ── Variables ── */
:root {
  --bg: #0a0514;
  --card: #140c24;
  --purple: #2a1748;
  --gold: #d4af37;
  --gold-dim: #b8860b;
  --gold-glow: rgba(212,175,55,0.4);
  --text: #f4f1fa;
  --muted: #b8b2d1;
  --radius: 18px;
  --border: rgba(212,175,55,0.2);
}

/* ── Tema Giorno ── */
html.theme-day {
  --bg: #f5f2ed;
  --card: #ede8df;
  --text: #2a1748;
  --muted: #6b5b7f;
  --purple: #6b5b7f;
  --gold: #c89742;
  --gold-dim: #a67c52;
  --gold-glow: rgba(200,151,66,0.2);
  --border: #c89742;
}
html.theme-day .card,
html.theme-day .dash-card { background-color: var(--card); border: 2px solid var(--border); color: var(--text); }
html.theme-day h1,
html.theme-day h2,
html.theme-day h3 { color: var(--text); text-shadow: none; }
html.theme-day button { background-color: var(--gold); color: var(--text); border: 2px solid var(--border); }
html.theme-day input,
html.theme-day select { background-color: #fff; color: var(--text); border: 2px solid var(--border); }
html.theme-day .cosmos { opacity: .07; }
html.theme-day .home-header { background: rgba(240,235,220,0.95); }

/* ── Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
.skip-link {
  position: absolute; left: -9999px; top: 0; z-index: 200;
  background: var(--gold); color: #0a0514; padding: 10px 18px;
  border-radius: 0 0 10px 0; font-family: 'Cinzel', serif; font-size: 12px;
  text-decoration: none; letter-spacing: .5px;
}
.skip-link:focus { left: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  min-height: 100vh; overflow-x: hidden; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  transition: background .3s, color .3s;
}

/* ── Sfondo cosmico ── */
.cosmos {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, #2a174830 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 80%, #1a073820 0%, transparent 60%),
    radial-gradient(2px 2px at 15% 25%, #fff9 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 75% 15%, #fff7 0%, transparent 100%),
    radial-gradient(2px 2px at 45% 70%, #d4af3780 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 45%, #fff6 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 85%, #fff5 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 35%, #d4af3760 0%, transparent 100%);
  animation: twinkle 14s infinite alternate;
}
@keyframes twinkle { 0% { opacity: .35; } 50% { opacity: .55; } 100% { opacity: .45; } }

/* ── Layout ── */
#app { max-width: 480px; margin: 0 auto; position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; }

/* ── Header Home ── */
.home-header {
  background: rgba(10,5,20,0.92);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  padding: max(20px, calc(20px + env(safe-area-inset-top,0px))) 20px 20px;
  border-bottom: 1px solid rgba(212,175,55,0.25);
  position: sticky; top: 0; z-index: 20;
  text-align: center;
  transition: transform .35s ease;
  will-change: transform;
}
.home-header.header-hidden { transform: translateY(-100%); }
.header-top-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.header-controls { display: flex; gap: 6px; }
.btn-icon {
  background: rgba(42,23,72,.6); border: 1px solid rgba(212,175,55,.3);
  color: var(--gold); border-radius: 20px; padding: 5px 10px; font-size: 12px;
  cursor: pointer; transition: all .2s; font-family: 'Crimson Pro', serif;
}
.btn-icon:hover, .btn-icon.active { background: rgba(212,175,55,.2); border-color: var(--gold); }
.lang-switch { display: flex; gap: 4px; }
.btn-lang {
  background: transparent; border: 1px solid rgba(212,175,55,.25);
  color: var(--muted); border-radius: 14px; padding: 3px 9px; font-size: 10px;
  cursor: pointer; transition: all .2s; font-family: 'Cinzel', serif; letter-spacing: .5px;
}
.btn-lang.active { background: rgba(212,175,55,.2); border-color: var(--gold); color: var(--gold); }
.logo-section { padding: 8px 0 4px; }
.logo-glow { font-size: 14px; color: var(--gold); margin-bottom: 4px; opacity: .6; }
.logo-title {
  font-family: 'Cinzel', serif; font-size: 34px; color: var(--gold);
  letter-spacing: 10px; line-height: 1;
  text-shadow: 0 0 30px var(--gold-glow);
  animation: logoGlow 5s ease-in-out infinite;
}
@keyframes logoGlow {
  0%, 100% { text-shadow: 0 0 20px var(--gold-glow); }
  50%       { text-shadow: 0 0 50px rgba(212,175,55,.5), 0 0 90px rgba(212,175,55,.2); }
}
.logo-sub  { font-size: 10px; color: var(--gold-dim); letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }
.logo-tagline { font-size: 13px; color: var(--muted); font-style: italic; margin-top: 6px; }
.hero-cta {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 14px;
  background: linear-gradient(135deg, #2a1748, #160d30);
  border: 1.5px solid var(--gold); color: var(--gold); border-radius: 24px;
  padding: 11px 26px; font-family: 'Cinzel', serif; font-size: 11px;
  letter-spacing: 1px; text-decoration: none; transition: all .25s;
  box-shadow: 0 4px 16px rgba(0,0,0,.5), 0 0 14px rgba(212,175,55,.15);
}
.hero-cta:hover { box-shadow: 0 0 26px var(--gold-glow); transform: translateY(-2px); }

/* ── Banner Premium ── */
.premium-banner {
  background: linear-gradient(135deg, rgba(212,175,55,.12), rgba(180,140,20,.08));
  border: 1.5px solid rgba(212,175,55,.4); border-radius: 12px;
  margin: 10px 14px 0; padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.premium-banner[hidden] { display: none !important; }
#banner-text { font-size: 12px; color: var(--gold); font-family: 'Cinzel', serif; letter-spacing: .3px; line-height: 1.4; }
.banner-btn {
  background: linear-gradient(135deg, #d4af37, #b8860b); color: #0a0514;
  border-radius: 18px; padding: 7px 14px; font-family: 'Cinzel', serif;
  font-size: 10px; letter-spacing: .8px; font-weight: 700;
  text-decoration: none; white-space: nowrap; transition: all .2s; flex-shrink: 0;
}
.banner-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(212,175,55,.3); }
.premium-badge-active {
  background: linear-gradient(135deg, rgba(212,175,55,.15), rgba(180,140,20,.08));
  border: 1px solid rgba(212,175,55,.3); border-radius: 20px;
  margin: 10px 14px 0; padding: 8px 16px; text-align: center;
  font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); letter-spacing: 1px;
}

/* ── Content ── */
.content { flex: 1; padding: 16px 14px; padding-bottom: calc(30px + env(safe-area-inset-bottom,0px)); }

/* ── AdSense ── */
.ad-slot {
  background: rgba(20,12,36,.3); border: 1px solid rgba(42,23,72,.3);
  border-radius: 12px; padding: 10px; margin: 14px 0;
  display: flex; align-items: center; justify-content: center; min-height: 0;
}
.ad-slot:empty { display: none !important; }

/* ── Sezione editoriale ── */
.editorial-section {
  background: linear-gradient(145deg, rgba(26,14,50,.8), rgba(13,8,32,.9));
  border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 22px 18px; margin-bottom: 20px;
}
.editorial-section h2 { font-family: 'Cinzel', serif; font-size: 20px; color: var(--gold); letter-spacing: .8px; margin-bottom: 14px; line-height: 1.3; text-align: center; }
.editorial-section h3 { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold-dim); letter-spacing: .5px; margin: 16px 0 8px; }
.editorial-section p  { font-size: 14px; color: var(--muted); line-height: 1.75; margin-bottom: 10px; }
.editorial-section a  { color: var(--gold); text-decoration: none; border-bottom: 1px dotted rgba(212,175,55,.35); }
.editorial-section a:hover { color: var(--gold-dim); }
.art-hero { width: 100%; border-radius: 14px; margin: 16px 0; display: block; object-fit: cover; max-height: 200px; }
.cta-explore {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 12px;
  background: transparent; border: 1.5px solid var(--border);
  color: var(--gold); border-radius: 20px; padding: 9px 20px;
  font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .8px;
  text-decoration: none; transition: all .25s;
}
.cta-explore:hover { border-color: var(--gold); background: rgba(212,175,55,.08); }

/* ── Titoli sezioni ── */
.dash-title {
  font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold);
  letter-spacing: 2px; text-transform: uppercase;
  margin: 22px 0 10px; padding-left: 2px;
  display: flex; align-items: center; gap: 7px;
}
.dash-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold-dim), transparent); }

/* ── Grid card ── */
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 4px; }

/* ── Dash card ── */
.dash-card {
  background: linear-gradient(145deg, #1a0e32, #0d0820);
  border-radius: 16px; padding: 0 0 12px;
  text-align: center; cursor: pointer;
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
  display: flex; flex-direction: column; align-items: center;
  position: relative; overflow: hidden;
  text-decoration: none;
  border: 1.5px solid rgba(42,23,72,.7);
}
.dash-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  opacity: .7; transition: opacity .2s;
}
.dash-card:hover { transform: translateY(-4px) scale(1.03); border-color: rgba(212,175,55,.45); }
.dash-card:hover::before { opacity: 1; }
.dash-card:active { transform: scale(.97); }
.dash-card.span2 { grid-column: span 2; }
.dash-card.span2 .dash-img-wrap { aspect-ratio: 2/1; }

/* Colori bordo superiore */
.c-gold::before   { background: linear-gradient(90deg, transparent, #d4af37, transparent); }
.c-purple::before { background: linear-gradient(90deg, transparent, #9b59b6, transparent); }
.c-blue::before   { background: linear-gradient(90deg, transparent, #3498db, transparent); }
.c-teal::before   { background: linear-gradient(90deg, transparent, #1abc9c, transparent); }
.c-orange::before { background: linear-gradient(90deg, transparent, #e67e22, transparent); }
.c-red::before    { background: linear-gradient(90deg, transparent, #e74c3c, transparent); }
.c-green::before  { background: linear-gradient(90deg, transparent, #27ae60, transparent); }
.c-pink::before   { background: linear-gradient(90deg, transparent, #e91e8c, transparent); }
.c-delfi::before  { background: linear-gradient(90deg, transparent, #f1c40f, transparent); }

.dash-img-wrap { width: 100%; aspect-ratio: 1/1; overflow: hidden; border-radius: 14px 14px 0 0; margin-bottom: 8px; background: rgba(20,12,36,.5); }
.dash-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 14px 14px 0 0; }
.dash-label { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 700; color: var(--text); padding: 0 6px; letter-spacing: .3px; }
.dash-sub   { font-size: 11px; color: var(--muted); padding: 2px 6px 0; font-style: italic; }

/* ── FAQ ── */
.faq-section { margin: 20px 0; }
.faq-title { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold); letter-spacing: 1.5px; text-align: center; margin-bottom: 14px; }
.faq-list { display: flex; flex-direction: column; gap: 8px; }
.faq-item { background: linear-gradient(145deg, #1a0e32, #0d0820); border: 1.5px solid rgba(212,175,55,.15); border-radius: 14px; overflow: hidden; transition: border-color .25s; }
.faq-item:has(.faq-answer:not([hidden])) { border-color: rgba(212,175,55,.4); }
.faq-question {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 13px 15px; cursor: pointer;
  font-family: 'Cinzel', serif; font-size: 11px; color: var(--text);
  letter-spacing: .3px; line-height: 1.4; gap: 10px;
  background: transparent; border: none; text-align: left;
}
.faq-question:hover { color: var(--gold); }
.faq-icon { color: var(--gold); font-size: 16px; flex-shrink: 0; font-family: monospace; }
.faq-answer { padding: 0 15px 14px; }
.faq-answer p { font-size: 13px; color: var(--muted); line-height: 1.7; }
.faq-answer a { color: var(--gold); text-decoration: none; }

/* ── Share ── */
.share-section {
  background: linear-gradient(145deg, rgba(26,14,50,.7), rgba(13,8,32,.8));
  border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 18px; margin: 20px 0; text-align: center;
}
.share-section-title { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }
.btn-share {
  background: transparent; border: 1.5px solid var(--border);
  color: var(--gold); border-radius: 22px; padding: 10px 22px;
  font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: .8px;
  cursor: pointer; transition: all .25s; margin-bottom: 10px;
}
.btn-share:hover { border-color: var(--gold); background: rgba(212,175,55,.08); }
.share-popup { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-top: 6px; }
.share-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 7px 12px; border-radius: 18px; border: 1.5px solid;
  font-size: 11px; cursor: pointer; text-decoration: none;
  transition: all .2s; font-family: 'Crimson Pro', serif; background: transparent;
}
.share-btn:hover { opacity: .8; transform: translateY(-1px); }
.whatsapp { border-color: #25d366; color: #25d366; }
.telegram  { border-color: #2ca5e0; color: #2ca5e0; }
.facebook  { border-color: #1877f2; color: #1877f2; }
.twitter   { border-color: #1da1f2; color: #1da1f2; }
.copy      { border-color: var(--gold); color: var(--gold); }

/* ── Modal Premium ── */
.premium-modal {
  display: none; position: fixed; inset: 0; z-index: 100;
  align-items: center; justify-content: center; padding: 20px;
}
.premium-modal.show { display: flex; }
.modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.8); }
.modal-content {
  position: relative;
  background: linear-gradient(145deg, #1a0e32, #0d0820);
  border: 2px solid var(--gold); border-radius: 22px;
  padding: 30px 24px; max-width: 380px; width: 100%; text-align: center;
  box-shadow: 0 0 60px rgba(212,175,55,.2); animation: mIn .3s ease;
}
@keyframes mIn { from { transform: scale(.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
#premium-title { font-family: 'Cinzel', serif; font-size: 18px; color: var(--gold); letter-spacing: 1px; margin-bottom: 10px; }
#premium-text  { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
.premium-price { font-family: 'Cinzel', serif; font-size: 20px; color: var(--gold); margin-bottom: 18px; }
.btn-premium-buy {
  display: block; width: 100%;
  background: linear-gradient(135deg, #d4af37, #b8860b); color: #0a0514;
  border: none; border-radius: 24px; padding: 14px;
  font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 1px; font-weight: 700;
  cursor: pointer; transition: all .25s; margin-bottom: 10px;
  box-shadow: 0 4px 20px rgba(212,175,55,.3);
}
.btn-premium-buy:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(212,175,55,.45); }
.btn-premium-skip { background: transparent; border: none; color: var(--muted); font-size: 12px; cursor: pointer; font-family: 'Crimson Pro', serif; padding: 6px 12px; }
.btn-premium-skip:hover { color: var(--text); }

/* ── Footer ── */
.page-footer { text-align: center; padding: 24px 14px 14px; border-top: 1px solid rgba(42,23,72,.5); margin-top: 10px; }
.footer-links { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; }
.footer-links a { color: var(--muted); text-decoration: none; font-size: 12px; transition: color .2s; }
.footer-links a:hover { color: var(--gold); }
#footer-copy { font-size: 10px; color: #4a4262; margin-bottom: 5px; }
.footer-disclaimer { font-size: 10px; color: #4a4262; line-height: 1.5; }
</style>
</head>

    artP3: "Il Rinascimento italiano fu il vero crogiuolo dell'esoterismo moderno: Marsilio Ficino tradusse il Corpus Hermeticum per Cosimo de' Medici a Firenze nel 1463, Pico della Mirandola fuse la Cabala ebraica con la filosofia platonica nelle sue novecento tesi, Giordano Bruno portò l'arte della memoria e la magia naturale nei circoli intellettuali di tutta Europa, pagando con la vita le proprie idee. L'Italia possiede quindi una tradizione esoterica millenaria che raramente trova voce adeguata nel panorama digitale contemporaneo — MYSTICA nasce anche per colmare questo vuoto culturale, restituendo dignità e profondità a un patrimonio spesso banalizzato.",
    artP4: "Gli strumenti esoterici digitali offrono qualcosa che i libri stampati e i consulenti fisici non possono garantire con la stessa immediatezza: disponibilità continua ventiquattr'ore su ventiquattro, privacy totale senza dover condividere le proprie domande più intime con estranei, e un accesso democratico che abbatte le barriere economiche e geografiche. Puoi consultare i tarocchi alle tre di notte quando l'ansia non ti fa dormire, calcolare il tuo profilo numerologico completo mentre sei in treno, leggere l'I Ching mentre aspetti in fila. La tecnologia non svuota il sacro del suo significato — semplicemente lo rende portatile e sempre a portata di mano.",
    artP5: "Ogni sezione di MYSTICA è costruita con rispetto scrupoloso per le tradizioni originali: le interpretazioni delle rune attingono direttamente all'Elder Futhark autentico documentato dalle fonti runologiche scandinave, i sessantaquattro esagrammi dell'I Ching seguono la traduzione classica del Libro dei Mutamenti, i rituali di magia bianca, rossa e nera sono documentati nelle fonti storiche e nei grimori tradizionali, non inventati per l'occasione. Non è intrattenimento superficiale confezionato per il clic facile — è un invito sincero all'esplorazione consapevole del proprio mondo interiore, accompagnato da un rigore storico e simbolico che raramente si trova altrove online.",

    artTitle: 'MYSTICA — The Italian Esoteric Portal',
    artH2: 'The Origins of Esotericism: from Mesopotamia to the Digital Age',
    artH3: 'Why Use Esoteric Tools Online',
    artP1: "MYSTICA was born from the desire to make authentic esotericism accessible to everyone, everywhere, without elitist filters or the need for an in-person consultant. It is not a simple daily horoscope, but a complete ecosystem bringing together more than sixty divination tools, magical traditions, advanced Eastern and Western astrology, numerology and encyclopedic esoteric knowledge. From tarot to Norse runes, from I Ching to Pythagorean numerology, from Kabbalah to Renaissance alchemy, all the way to shamanism and Human Design: everything lives in a single app designed for those seeking real answers, daily inspiration and an authentic connection with the sacred.",
    artP2: "Western esotericism has its roots in Mesopotamia, where the Babylonians read the night sky to predict the fate of kings and meticulously recorded planetary movements on clay tablets. Ancient Egypt developed sophisticated divination systems, from geomancy to dream interpretation, carefully guarded by temple priests. Classical Greece synthesized these Eastern traditions into Hermetic philosophy, whose founding principle — «As above, so below» — attributed to Hermes Trismegistus, remains to this day the beating heart of every Western magical and divinatory practice, from tarot to modern astrology.",
    artP3: "The Italian Renaissance was the true crucible of modern esotericism: Marsilio Ficino translated the Corpus Hermeticum for Cosimo de' Medici in Florence in 1463, Pico della Mirandola merged Hebrew Kabbalah with Platonic philosophy in his nine hundred theses, Giordano Bruno carried the art of memory and natural magic into intellectual circles across Europe, ultimately paying with his life for his ideas. Italy therefore holds a millennial esoteric tradition that rarely finds adequate voice in today's digital landscape — MYSTICA was also born to fill this cultural gap, restoring dignity and depth to a heritage too often trivialized.",
    artP4: "Digital esoteric tools offer something that printed books and in-person consultants cannot guarantee with the same immediacy: round-the-clock availability, total privacy without having to share your most intimate questions with strangers, and democratic access that removes economic and geographic barriers. You can consult the tarot at three in the morning when anxiety keeps you awake, calculate your complete numerological profile on the train, read the I Ching while waiting in line. Technology does not empty the sacred of its meaning — it simply makes it portable and always within reach.",
    artP5: "Every section of MYSTICA is built with scrupulous respect for original traditions: rune interpretations draw directly from the authentic Elder Futhark documented by Scandinavian runological sources, the sixty-four I Ching hexagrams follow the classical translation of the Book of Changes, white, red and black magic rituals are documented in historical sources and traditional grimoires, never invented for the occasion. This is not superficial entertainment packaged for easy clicks — it is a sincere invitation to the conscious exploration of your inner world, backed by a historical and symbolic rigor rarely found elsewhere online.",

/* ── AudioManager ── */
const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';
class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play()  { this.audio?.play().catch(()=>{}); this.isPlaying = true;  sessionStorage.setItem(AUDIO_KEY,'true');  this.updateUI(); }
  pause() { this.audio?.pause();              this.isPlaying = false; sessionStorage.setItem(AUDIO_KEY,'false'); this.updateUI(); }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}
window.audioManager = new AudioManager();
document.getElementById('musicToggle').addEventListener('click', () => window.audioManager.toggle());

/* ── FAQ Accordion ── */
function renderFAQ(faqs) {
  const container = document.getElementById('faqList');
  container.innerHTML = faqs.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false">
        <span>${f.q}</span>
        <span class="faq-icon">+</span>
      </button>
      <div class="faq-answer" id="faq-ans-${i}" hidden>
        <p>${f.a}</p>
      </div>
    </div>
  `).join('');
}
function toggleFAQ(i) {
  const ans = document.getElementById('faq-ans-'+i);
  const btn = document.querySelector('#faq-'+i+' .faq-question');
  const icon = btn.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  icon.textContent = isOpen ? '+' : '−';
  btn.setAttribute('aria-expanded', String(!isOpen));
}

const PAGE_URL = 'https://mysticaoracoli.it/';

  if (navigator.share) { navigator.share({ title: L.shareTitle, text, url: PAGE_URL }).catch(()=>{}); return; }

  document.getElementById('share-tg').href = 'https://t.me/share/url?url='+urlEnc+'&text='+encodeURIComponent(text);

  document.getElementById('share-x').href  = 'https://twitter.com/intent/tweet?text='+encoded;
  document.getElementById('share-copy').textContent = L.shareCopy;
  document.getElementById('sharePopup').hidden = false;

  const L = LANG[currentLang];

/* ── Header: nascondi allo scroll verso il basso ── */
(function() {
  const header = document.getElementById('mainHeader');
  if (!header) return;
  let lastY = window.scrollY;
  let ticking = false;
  const THRESHOLD = 12; // px minimi di scroll prima di reagire
  function onScroll() {
    const y = window.scrollY;
    if (Math.abs(y - lastY) > THRESHOLD) {
      if (y > lastY && y > header.offsetHeight) {
        header.classList.add('header-hidden');   // scroll giù → nascondi
      } else {
        header.classList.remove('header-hidden'); // scroll su → mostra
      }
      lastY = y;
    }
    ticking = false;
  }
  window.addEventListener('scroll', () => {
    if (!ticking) {
      window.requestAnimationFrame(onScroll);
      ticking = true;
    }
  }, { passive: true });
})();
