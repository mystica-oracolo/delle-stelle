    /* ── Reset & Variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0514;
      --card: #140c24;
      --purple: #2a1748;
      --gold: #d4af37;
      --gold-dim: #b8860b;
      --gold-glow: rgba(212,175,55,0.4);

      --text: #f4f1fa;
      --muted: #b8b2d1;
      --radius: 18px;
      --border: rgba(212,175,55,0.2);
    }

    html.theme-day {
      --bg: #f5f2ed;
      --card: #ede8df;
      --text: #2a1748;
      --muted: #6b5b7f;
      --purple: #6b5b7f;
      --gold: #c89742;
      --gold-dim: #a67c52;
      --gold-glow: rgba(200,151,66,0.2);
      --border: #c89742;
      --red: #a03030;
      --red-dim: rgba(160,48,48,0.12);
      --red-glow: rgba(160,48,48,0.3);
    }
    html.theme-day .ritual-card,
    html.theme-day .card { background-color: var(--card); border: 2px solid var(--border); color: var(--text); }
    html.theme-day h1, html.theme-day h2, html.theme-day h3 { color: var(--text); text-shadow: none; }
    html.theme-day button { background-color: var(--gold); color: var(--text); border: 2px solid var(--border); }
    html.theme-day .btn-back { background: var(--red-dim); border-color: var(--red-glow); color: var(--red); }
    html.theme-day .page-header { background: rgba(245,242,237,0.97); border-bottom-color: var(--border); }

    /* ── Layout ── */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .skip-link {
      position: absolute; top: -40px; left: 0;
      background: var(--gold); color: #000;
      padding: 8px 16px; z-index: 100;
      font-family: 'Cinzel', serif; font-size: 14px;
      transition: top 0.2s;
    }
    .skip-link:focus { top: 0; }

    /* ── Sfondo Cosmico ── */
    .cosmos {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(192,80,80,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 80%, #1a073820 0%, transparent 60%),
        radial-gradient(2px 2px at 15% 25%, #fff9 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 75% 15%, #fff7 0%, transparent 100%),
        radial-gradient(2px 2px at 45% 70%, rgba(192,80,80,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 45%, #fff6 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 30% 85%, #fff5 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 35%, rgba(212,175,55,0.4) 0%, transparent 100%);
      animation: twinkle 14s infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: .35; }
      50%  { opacity: .55; }
      100% { opacity: .45; }
    }

    /* ── Header ── */
    .page-header {
      position: sticky; top: 0;
      background: rgba(10,5,20,0.97);
      padding: max(12px, calc(12px + env(safe-area-inset-top, 0px))) 16px 14px;
      border-bottom: 1px solid rgba(192,80,80,0.25);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 10; text-align: center;
    }
    .header-top {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 8px;
    }
    .btn-back {
      background: var(--red-dim);
      border: 1px solid var(--red-glow);
      color: #e8a0a0;
      padding: 8px 14px; border-radius: 20px;
      cursor: pointer; font-size: 13px;
      text-decoration: none; display: inline-block;
      transition: all 0.2s; font-family: 'Cinzel', serif;

    .header-controls { display: flex; gap: 6px; }
    .btn-icon {

      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 4px 0 2px;

    .lang-switch { margin-top: 8px; display: flex; justify-content: center; gap: 6px; }

    .ritual-card {

      padding: 14px 16px; cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .ritual-num {
      font-size: 11px; font-weight: 700;
      color: var(--red); min-width: 24px;
      font-family: monospace;

    .ritual-title {
      font-size: 15px; font-weight: 600;

    .ritual-arrow {

      transition: transform 0.3s; flex-shrink: 0;
    }
    .ritual-card.open .ritual-arrow { transform: rotate(180deg); }
    .ritual-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1);

    .ritual-card.open .ritual-body { max-height: 1000px; }
    .ritual-body-inner {
      padding: 12px 16px 16px;

    .field { margin-bottom: 12px; }

      font-size: 11px; font-weight: 700;

      letter-spacing: 0.5px; margin-bottom: 4px;
      font-family: 'Cinzel', serif;

    .field-text {

    .faq-section {

      display: flex; justify-content: space-between;

    .faq-answer {
      background: rgba(20,12,36,0.6);
      border: 1px solid rgba(212,175,55,0.1);
      border-top: none; border-radius: 0 0 12px 12px;
      padding: 14px 16px;
    }
    .faq-answer p { font-size: 14px; color: var(--muted); line-height: 1.7; margin: 0; }

    .page-footer {

    .footer-disclaimer { font-size: 11px; color: rgba(184,178,209,0.6); margin-top: 4px; }

    /* ── Premium Modal ── */
    .premium-modal {
      display: none; position: fixed; inset: 0;

    .premium-modal.show { display: flex; }
    .modal-overlay {

    .modal-content {
      position: relative; z-index: 1;
      background: var(--card);
      border: 1px solid rgba(212,175,55,0.4);
      border-radius: var(--radius);
      padding: 28px 24px; max-width: 340px; width: 90%;

    .modal-content h2 {

    .premium-price { color: var(--gold) !important; font-weight: 700; font-size: 16px !important; }
    .btn-premium-buy {

    .btn-premium-buy:hover { opacity: 0.9; }
    .btn-premium-skip {

    /* ── Focus & Motion ── */
    :focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    }
    @media (max-width: 480px) {
      .page-title { font-size: 19px; }
      .article-section h2 { font-size: 17px; }
    }

  document.querySelector('meta[property="og:locale"]').content = S.ogLocale;
  document.querySelector('meta[name="twitter:title"]').content = S.ogTitle;
  document.querySelector('meta[name="twitter:description"]').content = S.ogDesc;

  if (ld && S.faqLD) {
    ld.textContent = JSON.stringify({
      '@context': 'https://schema.org',
      '@type': 'FAQPage',

        acceptedAnswer: { '@type': 'Answer', text: f.a }

  }
}

/* ── Audio Manager ── */
const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';

class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.preload = 'none';
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play() {
    this.audio?.play().catch(() => {});
    this.isPlaying = true;
    sessionStorage.setItem(AUDIO_KEY, 'true');
    this.updateUI();
  }
  pause() {
    this.audio?.pause();
    this.isPlaying = false;
    sessionStorage.setItem(AUDIO_KEY, 'false');
    this.updateUI();
  }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}
window.audioManager = new AudioManager();
document.getElementById('musicToggle')
  ?.addEventListener('click', () => window.audioManager.toggle());

/* ── Premium Gate ── */
function isPremium() {
  return localStorage.getItem('myst_premium') === '1';
}
function requirePremium() {
  if (isPremium()) return true;
  const m = document.getElementById('premiumModal');
  if (m) { m.classList.add('show'); m.setAttribute('aria-hidden', 'false'); }
  return false;
}
function closePremiumModal() {
  const m = document.getElementById('premiumModal');
  if (m) { m.classList.remove('show'); m.setAttribute('aria-hidden', 'true'); }
}

/* ── Share ── */
const PAGE_URL = 'https://mysticaoracoli.it/magia-rossa.html';

function shareContent() {
  const L = LANG[currentLang];
  if (navigator.share) {
    navigator.share({ title: L.shareTitle, text: L.shareText, url: PAGE_URL }).catch(() => {});
    return;
  }
  const enc = encodeURIComponent(L.shareText + ' ' + PAGE_URL);
  const ue  = encodeURIComponent(PAGE_URL);
  const wa = document.getElementById('share-wa'); if (wa) wa.href = `https://wa.me/?text=${enc}`;
  const tg = document.getElementById('share-tg'); if (tg) tg.href = `https://t.me/share/url?url=${ue}&text=${encodeURIComponent(L.shareText)}`;
  const fb = document.getElementById('share-fb'); if (fb) fb.href = `https://www.facebook.com/sharer/sharer.php?u=${ue}`;
  const xb = document.getElementById('share-x');  if (xb) xb.href = `https://twitter.com/intent/tweet?text=${enc}`;
  const sp = document.getElementById('sharePopup'); if (sp) sp.hidden = false;
}

function copyLink() {
  const L = LANG[currentLang];
  navigator.clipboard.writeText(PAGE_URL).then(() => {
    const b = document.getElementById('share-copy');
    if (b) {
      b.textContent = L.shareCopied;
      setTimeout(() => { b.textContent = L.shareCopy; }, 2000);
    }
  });
}

/* ── FAQ Accordion ── */
function renderFAQ(faqs) {
  const container = document.getElementById('faqList');
  if (!container) return;
  container.innerHTML = faqs.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false" aria-controls="faq-ans-${i}">
        <span>${f.q}</span>
        <span class="faq-icon" aria-hidden="true">+</span>
      </button>
      <div class="faq-answer" id="faq-ans-${i}" hidden>
        <p>${f.a}</p>
      </div>
    </div>
  `).join('');
}

function toggleFAQ(i) {
  const ans = document.getElementById(`faq-ans-${i}`);
  const btn = document.querySelector(`#faq-${i} .faq-question`);
  const icon = btn?.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  if (icon) icon.textContent = isOpen ? '+' : '−';
  btn?.setAttribute('aria-expanded', String(!isOpen));
}

  { t:'Specchio dell\'Accettazione', scopo:'Amare il sé reale con le sue imperfezioni.', mat:'Specchio, luce morbida.', proc:'Guarda il volto. Nomina 3 imperfezioni e trasformale mentalmente in tratti unici. <em>"Sono completo/a così"</em>.' },
  { t:'Cerchio di Chiusura Amorosa', scopo:'Gratitudine per ciò che è stato.', mat:'Fiore secco, ciotola.', proc:'Spezza il fiore con rispetto. <em>"Grazie per ciò che hai insegnato. Vado avanti con rispetto"</em>. Conserva o restituisci alla terra.' }
];

/* ── Render Rituali (logica originale preservata) ── */
function renderRituali() {
  const list = document.getElementById('ritual-list');
  if (!list) return;
  list.innerHTML = '';
  const L = LANG[currentLang];

  rituali.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'ritual-card';
    card.setAttribute('role', 'listitem');
    card.innerHTML = `
      <div class="ritual-head" onclick="this.parentElement.classList.toggle('open')" role="button" tabindex="0" aria-expanded="false" aria-label="Rituale ${i+1}: ${r.t}">
        <span class="ritual-num">${String(i+1).padStart(2,'0')}</span>
        <span class="ritual-title">${r.t}</span>
        <span class="ritual-arrow" aria-hidden="true">▾</span>
      </div>
      <div class="ritual-body">
        <div class="ritual-body-inner">
          <div class="field">
            <div class="field-label" data-key="scopoLabel">${L.scopoLabel}</div>
            <div class="field-text">${r.scopo}</div>
          </div>
          <div class="field">
            <div class="field-label" data-key="matLabel">${L.matLabel}</div>
            <div class="field-text">${r.mat}</div>
          </div>
          <div class="field">
            <div class="field-label" data-key="procLabel">${L.procLabel}</div>
            <div class="field-text">${r.proc}</div>
          </div>
          ${r.nota ? `<div class="field"><div class="field-label" data-key="notaLabel">${L.notaLabel}</div><div class="field-text">${r.nota}</div></div>` : ''}
        </div>
      </div>
    `;
    // Keyboard support for ritual cards
    card.querySelector('.ritual-head').addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.classList.toggle('open'); }
    });
    list.appendChild(card);
  });
}

/* ── Init Sequence ── */
document.addEventListener('DOMContentLoaded', () => {
  applyTheme(isDayMode);
  renderRituali();
  applyLang();
  const cnt = document.getElementById('counter');
  if (cnt) cnt.textContent = rituali.length + LANG[currentLang].counterLabel;
});
</script>
</body>
</html>
