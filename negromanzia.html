/* ── Variabili — Tema Notte (default) ── */
:root {
  --bg: #080510;
  --bg2: #0f0b1a;
  --bg3: #160d28;
  --card: #140c24;
  --gold: #d4af37;
  --gold-dim: rgba(212,175,55,0.3);
  --gold-glow: rgba(212,175,55,0.4);
  --purple: #7a3ea0;
  --purple-dim: rgba(122,62,160,0.25);
  --text: #e6e0f0;
  --muted: #8a7aaa;
  --bone: #b8a89a;
  --shadow-glow: rgba(122,62,160,0.4);
  --radius: 18px;
  --border: rgba(212,175,55,0.2);
}

/* ── Tema Giorno ── */
html.theme-day {
  --bg: #f5f2ed;
  --bg2: #ede8df;
  --bg3: #e5dfd2;
  --card: #ede8df;
  --text: #2a1748;
  --muted: #6b5b7f;
  --purple: #6b5b7f;
  --purple-dim: rgba(107,91,127,0.15);
  --gold: #a6772f;
  --gold-dim: rgba(166,119,47,0.25);
  --gold-glow: rgba(166,119,47,0.2);
  --border: #c89742;
  --bone: #6b5b7f;
}
html.theme-day .prose-block,
html.theme-day .storia-block,
html.theme-day .personaggio-card,
html.theme-day .leggenda-card,
html.theme-day .tool-container,
html.theme-day .r-block,
html.theme-day .info-card {
  background: var(--card);
  color: var(--text);
  border-color: var(--border);
}
html.theme-day .prose-block p,
html.theme-day .storia-block p,
html.theme-day .personaggio-card .p-desc,
html.theme-day .leggenda-card p,
html.theme-day .r-block { color: var(--text); }
html.theme-day .hero h1 { -webkit-text-fill-color: initial; background: none; color: var(--text); }
html.theme-day .warning-box { background: rgba(180,60,60,0.08); color: #8a2a2a; }
html.theme-day .warning-box strong { color: #b03030; }
html.theme-day .btn { color: #fff; }
html.theme-day .tab-btn { color: var(--muted); }

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
}
a { color: inherit; }
:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
.skip-link {
  position: absolute; left: -999px; top: 0;
  background: var(--gold); color: #140c24; padding: 8px 14px;
  z-index: 10000; border-radius: 0 0 8px 0; font-family: 'Cinzel', serif; font-size: 12px;
}
.skip-link:focus { left: 0; }

/* ── Sfondo Cosmico (standard) ── */
.cosmos {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, #2a174830 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 80%, #1a073820 0%, transparent 60%),
    radial-gradient(2px 2px at 15% 25%, #fff9 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 75% 15%, #fff7 0%, transparent 100%),
    radial-gradient(2px 2px at 45% 70%, #d4af3780 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 45%, #fff6 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 85%, #fff5 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 35%, #d4af3760 0%, transparent 100%);
  animation: twinkle 14s infinite alternate;
}
@keyframes twinkle { 0%{opacity:.35} 50%{opacity:.55} 100%{opacity:.45} }

/* ── Particelle tematiche (decorative, sopra il cosmos) ── */
#particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
.particle { position: absolute; border-radius: 50%; animation: floatUp linear infinite; opacity: 0; }
@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.2; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* ── Layout ── */
.page { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 0 16px 80px; content-visibility: auto; }
main { display: block; }

/* ── Header standard ── */
.page-header { padding-top: max(20px, calc(20px + env(safe-area-inset-top, 0px))); }
.header-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 6px; }
.btn-back {
  display: flex; align-items: center; gap: 8px;
  background: rgba(122,62,160,0.12); border: 1px solid rgba(122,62,160,0.3);
  color: #c8a0e8; border-radius: 20px; padding: 8px 16px;
  font-family: 'Cinzel', serif; font-size: 12px; cursor: pointer;
  text-decoration: none; transition: all 0.25s ease;
}
.btn-back:hover { background: rgba(122,62,160,0.25); }
.header-controls { display: flex; gap: 8px; }
.btn-icon {
  background: rgba(122,62,160,0.12); border: 1px solid rgba(122,62,160,0.3);
  color: var(--gold); border-radius: 50%; width: 38px; height: 38px;
  font-size: 15px; cursor: pointer; transition: all 0.25s ease;
}
.btn-icon:hover { background: rgba(122,62,160,0.25); }

/* ── Hero ── */
.hero { text-align: center; padding: 30px 20px 24px; position: relative; }
.hero-icon { font-size: 72px; display: block; margin-bottom: 12px; filter: drop-shadow(0 0 30px rgba(122,62,160,0.8)); animation: pulseGlow 3s ease-in-out infinite; }
@keyframes pulseGlow { 0%,100%{filter:drop-shadow(0 0 20px rgba(122,62,160,0.6))} 50%{filter:drop-shadow(0 0 40px rgba(212,175,55,0.5))} }
.hero h1 {
  font-family: 'Cinzel', serif; font-size: 28px; font-weight: 700;
  background: linear-gradient(135deg, #9a6fc8, var(--gold), #c8a0e8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: 3px; margin-bottom: 8px;
}
.hero-sub { color: var(--muted); font-size: 13px; letter-spacing: 2px; font-style: italic; }
.hero-divider { width: 120px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 18px auto; }
.lang-switch { display: flex; justify-content: center; gap: 8px; margin-top: 6px; }
.btn-lang {
  background: rgba(122,62,160,0.1); border: 1px solid rgba(122,62,160,0.25); color: var(--muted);
  border-radius: 8px; padding: 4px 12px; font-family: 'Cinzel', serif; font-size: 11px;
  cursor: pointer; letter-spacing: 1px; transition: all 0.25s ease;
}
.btn-lang.active { background: rgba(212,175,55,0.2); border-color: var(--gold); color: var(--gold); }

/* ── Immagine hero articolo ── */
.img-hero {
  width: 100%; max-width: 480px; margin: 0 auto 28px; display: block;
  border-radius: 16px; border: 1px solid var(--gold-dim);
  aspect-ratio: 16/9; object-fit: cover;
}
.img-placeholder {
  width: 100%; max-width: 480px; margin: 0 auto 24px; display: flex;
  border-radius: 16px; border: 1px solid var(--gold-dim);
  background: linear-gradient(135deg, #1a0d2e, #0d0520);
  aspect-ratio: 16/9; align-items: center; justify-content: center; flex-direction: column;
  gap: 8px; color: var(--muted); font-size: 13px; letter-spacing: 1px; position: relative; overflow: hidden;
}
.img-placeholder::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse at center, rgba(122,62,160,0.1) 0%, transparent 70%); }
.img-placeholder .img-icon { font-size: 36px; filter: grayscale(0.3); }
.img-placeholder .img-label { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px; color: rgba(212,175,55,0.5); }

/* ── Sezioni ── */
.section { margin-bottom: 28px; content-visibility: auto; }
.section-title {
  font-family: 'Cinzel', serif; font-size: 16px; color: var(--gold); letter-spacing: 2px;
  margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
}
.section-title::after { content:''; flex:1; height:1px; background: linear-gradient(90deg, var(--gold-dim), transparent); }

.prose-block {
  background: linear-gradient(135deg, rgba(30,15,50,0.8), rgba(20,10,35,0.9));
  border: 1px solid rgba(122,62,160,0.25); border-radius: 14px; padding: 20px;
  line-height: 1.8; font-size: 15px; color: #d1c9e8; margin-bottom: 14px;
}
.prose-block p { margin-bottom: 12px; }
.prose-block p:last-child { margin-bottom: 0; }

.storia-block {
  background: linear-gradient(135deg, rgba(15,10,30,0.95), rgba(25,12,40,0.95));
  border: 1px solid var(--gold-dim); border-left: 3px solid var(--gold);
  border-radius: 0 14px 14px 0; padding: 18px 20px; margin-bottom: 14px;
  font-size: 14.5px; line-height: 1.8; color: #ccc0e8;
}
.storia-block h4 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 13px; letter-spacing: 1.5px; margin-bottom: 8px; }

.personaggi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
@media (max-width: 480px) { .personaggi-grid { grid-template-columns: 1fr; } }
.personaggio-card { background: rgba(20,10,35,0.9); border: 1px solid rgba(122,62,160,0.3); border-radius: 12px; padding: 14px; }
.personaggio-card .p-icon { font-size: 28px; margin-bottom: 6px; }
.personaggio-card .p-nome { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold); margin-bottom: 4px; }
.personaggio-card .p-era { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-bottom: 6px; }
.personaggio-card .p-desc { font-size: 12.5px; line-height: 1.6; color: #b0a0c8; }

.leggenda-card {
  background: rgba(10,5,22,0.9); border: 1px solid rgba(122,62,160,0.2);
  border-top: 2px solid rgba(212,175,55,0.4); border-radius: 12px; padding: 16px; margin-bottom: 12px;
}
.leggenda-card .l-titolo { font-family: 'Cinzel', serif; font-size: 13px; color: #c8a0e8; margin-bottom: 8px; letter-spacing: 1px; }
.leggenda-card p { font-size: 13.5px; line-height: 1.7; color: #b0a0c8; }

.warning-box {
  background: rgba(248,65,65,0.07); border: 1px solid rgba(248,65,65,0.25); border-radius: 12px;
  padding: 14px 16px; font-size: 13px; color: #f0a0a0; line-height: 1.6; margin-bottom: 14px;
}
.warning-box strong { color: #f87171; }

/* ── Tool ── */
.tool-container {
  background: linear-gradient(135deg, rgba(15,8,28,0.98), rgba(20,10,38,0.98));
  border: 1px solid rgba(122,62,160,0.4); border-radius: 18px; padding: 24px;
  margin-bottom: 20px; box-shadow: 0 8px 40px rgba(122,62,160,0.2);
}
.tool-title { font-family: 'Cinzel', serif; font-size: 17px; color: var(--gold); text-align: center; margin-bottom: 6px; letter-spacing: 2px; }
.tool-sub { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 20px; letter-spacing: 1px; }

.tab-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 16px; }
.tab-btn {
  background: rgba(122,62,160,0.1); border: 1px solid rgba(122,62,160,0.25); color: var(--muted);
  border-radius: 10px; padding: 8px 4px; font-size: 11px; cursor: pointer; text-align: center;
  font-family: 'Cinzel', serif; letter-spacing: 0.5px; transition: all 0.25s ease; line-height: 1.4;
}
.tab-btn:hover { border-color: rgba(122,62,160,0.5); color: var(--text); }
.tab-btn.active { background: rgba(122,62,160,0.3); border-color: var(--purple); color: var(--gold); }
.tab-btn .tab-ico { font-size: 18px; display: block; margin-bottom: 4px; }

.tool-input {
  width: 100%; background: rgba(10,5,20,0.8); border: 1px solid rgba(122,62,160,0.3);
  border-radius: 10px; color: var(--text); font-family: 'Crimson Pro', serif; font-size: 14px;
  padding: 12px 14px; resize: none; outline: none; margin-bottom: 14px; transition: border-color 0.25s ease;
}
.tool-input:focus { border-color: var(--purple); }
.tool-input::placeholder { color: var(--muted); }

.btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
  flex: 1; min-width: 120px; background: linear-gradient(135deg, #7a3ea0, #9a5ec0); border: none;
  color: #fff; border-radius: 12px; padding: 12px 16px; font-family: 'Cinzel', serif; font-size: 13px;
  cursor: pointer; transition: all 0.25s ease; letter-spacing: 0.5px;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(122,62,160,0.4); }
.btn-sec { background: rgba(122,62,160,0.15); border: 1px solid rgba(122,62,160,0.35); color: var(--muted); }
.btn-sec:hover { color: var(--text); border-color: var(--purple); }

.result-box { display: none; animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.result-header { text-align: center; padding: 16px 0 10px; }
.result-reame-icon { font-size: 56px; display: block; margin-bottom: 8px; filter: drop-shadow(0 0 20px rgba(122,62,160,0.6)); }
.result-reame-nome { font-family: 'Cinzel', serif; font-size: 19px; color: var(--gold); letter-spacing: 1.5px; margin-bottom: 4px; }
.result-sottotitolo { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; font-style: italic; }

.info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 14px 0; }
@media (max-width: 400px) { .info-grid { grid-template-columns: repeat(2, 1fr); } }
.info-card { background: rgba(10,5,20,0.8); border: 1px solid rgba(122,62,160,0.2); border-radius: 10px; padding: 10px 6px; text-align: center; }
.info-card .ico { font-size: 18px; margin-bottom: 3px; }
.info-card .lbl { font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-bottom: 3px; }
.info-card .val { font-size: 11px; color: var(--text); font-weight: 600; }

.r-block {
  background: rgba(15,8,28,0.8); border: 1px solid rgba(122,62,160,0.2); border-left: 3px solid rgba(122,62,160,0.6);
  border-radius: 0 12px 12px 0; padding: 14px 16px; margin-bottom: 10px; font-size: 13.5px; line-height: 1.75; color: #c8b8e8;
}
.r-block h4 { font-family: 'Cinzel', serif; font-size: 12px; color: var(--muted); letter-spacing: 1px; margin-bottom: 8px; }
.r-block.ritual { border-left-color: #c8b4ff; } .r-block.ritual h4 { color: #c8b4ff; }
.r-block.protezione { border-left-color: #4ade80; } .r-block.protezione h4 { color: #4ade80; }
.r-block.avviso { border-left-color: #f87171; } .r-block.avviso h4 { color: #f87171; }

.domanda-shown {
  background: rgba(212,175,55,0.07); border: 1px solid rgba(212,175,55,0.2); border-radius: 10px;
  padding: 10px 14px; font-style: italic; color: rgba(212,175,55,0.8); font-size: 13px; margin-bottom: 10px; text-align: center;
}

/* ── Share ── */
.share-section { margin-bottom: 20px; }
.btn-share {
  width: 100%; background: rgba(122,62,160,0.15); border: 1px solid rgba(122,62,160,0.35); color: var(--gold);
  border-radius: 12px; padding: 12px 16px; font-family: 'Cinzel', serif; font-size: 13px; cursor: pointer;
  transition: all 0.25s ease; letter-spacing: 0.5px;
}
.btn-share:hover { background: rgba(122,62,160,0.28); }
.share-popup { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.share-btn {
  flex: 1; min-width: 100px; text-align: center; padding: 10px; border-radius: 10px; font-size: 12px;
  text-decoration: none; border: 1px solid rgba(122,62,160,0.3); color: var(--text); background: rgba(122,62,160,0.1);
  cursor: pointer; font-family: 'Crimson Pro', serif;
}

/* ── Articolo editoriale ── */
.article-section { margin-bottom: 8px; }
.article-links { display: flex; flex-direction: column; gap: 8px; margin: 16px 0; }
.article-links a { color: #c8a0e8; font-size: 13.5px; text-decoration: underline; text-decoration-color: rgba(122,62,160,0.4); }
.cta-explore {
  display: block; text-align: center; background: linear-gradient(135deg, #7a3ea0, #9a5ec0); color: #fff;
  border-radius: 12px; padding: 14px; font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 1px;
  text-decoration: none; margin-top: 16px; transition: all 0.25s ease;
}
.cta-explore:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(122,62,160,0.4); }

/* ── FAQ ── */
.faq-section { margin-bottom: 20px; }
.faq-title { font-family: 'Cinzel', serif; font-size: 16px; color: var(--gold); letter-spacing: 2px; margin-bottom: 14px; }
.faq-item { border: 1px solid rgba(122,62,160,0.25); border-radius: 12px; margin-bottom: 8px; overflow: hidden; background: rgba(20,10,35,0.6); }
.faq-question {

  font-family: 'Crimson Pro', serif; font-size: 14.5px; cursor: pointer; display: flex; justify-content: space-between; gap: 10px;
}
.faq-icon { color: var(--gold); font-weight: 700; }
.faq-answer { padding: 0 16px 14px; font-size: 13.5px; line-height: 1.7; color: #c0b4d8; }
.faq-answer a { color: #c8a0e8; text-decoration: underline; }

/* ── Footer ── */
.page-footer { text-align: center; padding: 20px 0; border-top: 1px solid rgba(122,62,160,0.2); }
.footer-links { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; font-size: 12px; }
.footer-links a { color: var(--muted); text-decoration: none; }
.footer-links a:hover { color: var(--gold); }
.page-footer p#footer-copy { font-family: 'Cinzel', serif; font-size: 11px; color: var(--muted); letter-spacing: 3px; }
.footer-disclaimer { font-size: 11px; color: rgba(138,122,170,0.6); margin-top: 6px; }

/* ── Premium Modal ── */
.premium-modal { position: fixed; inset: 0; z-index: 9997; display: none; align-items: center; justify-content: center; }
.premium-modal.show { display: flex; }
.modal-overlay { position: absolute; inset: 0; background: rgba(5,2,10,0.85); }
.modal-content {
  position: relative; z-index: 1; background: linear-gradient(135deg, #1a0d2e, #140c24); border: 1px solid var(--gold-dim);
  border-radius: 18px; padding: 28px 24px; max-width: 340px; width: 90%; text-align: center;
}
.modal-content h2 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 18px; margin-bottom: 12px; letter-spacing: 1px; }
.modal-content p { font-size: 13.5px; line-height: 1.7; color: var(--text); margin-bottom: 14px; }
.premium-price { color: var(--gold) !important; font-weight: 600; }
.btn-premium-buy {
  width: 100%; background: linear-gradient(135deg, #d4af37, #b8860b); border: none; color: #140c24;
  border-radius: 12px; padding: 13px; font-family: 'Cinzel', serif; font-size: 13px; cursor: pointer; margin-bottom: 10px;
}

    artTitle: 'Necromancy: The Art of Dialogue with the Unseen',

    artImgAlt: 'Ancient necromancer performing a rite of communication with the dead',
    artP1: 'Necromancy — from the Greek nekros (dead) and manteia (divination) — is the art of seeking knowledge through contact with the subtler planes of existence, traditionally tied to the cycle of death and rebirth. Born in the world\'s oldest civilizations, it is not, as centuries of misunderstanding suggest, a dark and malevolent practice, but one of the oldest forms of ritual wisdom: a respectful dialogue with what lies beyond sight.',
    artP2: 'Its roots reach back to Ancient Egypt, where the cult of the dead was the very foundation of religious civilization. Priests of Anubis and Osiris guarded rites of passage with millennia-old rigor, convinced that communication between the living and the dead was not only possible but necessary to cosmic order. The Book of the Dead was not a book of spells: it was a detailed map for crossing the boundary with dignity.',
    artP3: 'In Mesopotamia, the ashipu (exorcist-diviners) and baru (seers) practiced rituals contacting the souls of the dead to obtain prophecies and healing. Babylonian culture believed the souls of the dead, the etemmu, continued to exist in an underground realm and could influence the living — for good or ill — depending on how they were treated in life and honored after death, a principle running through nearly every later tradition.',
    artP4: 'During the Middle Ages and Renaissance, necromancy split into two currents: popular demonology, fed by fear and superstition, and a refined hermetic science cultivated by scholars like Cornelius Agrippa and John Dee, who systematized it as a philosophical discipline alongside astrology and alchemy. Only in the nineteenth century, with Allan Kardec and Spiritism, did dialogue with the dead find a modern ethical framework, grounded in the soul\'s evolution and mutual responsibility between the two planes.',
    artP5: 'Modern Ethical Necromancy rests on one core principle: you do not command, you ask. You do not summon — you listen. The goal is never to hold souls in the world of the living, but to honor natural cycles, receive wisdom, and bring closure to what remains suspended. It is a practice of memory, not power, drawing a clear line between respect for those who came before us and the pursuit of control over forces that are not ours to command.',

    romaTitle: '🔥 Rome and the Magic of the Threshold',
    romaText: 'In Rome, the Lemures were the restless souls of the unburied dead. On May 9th, 11th and 13th, the Lemuria were celebrated: the pater familias walked barefoot through the house at dawn, throwing black beans behind him — a symbolic offering to appease the spirits. Greek magic imported to Rome produced the so-called defixiones: lead tablets inscribed with invocations to the dead and the gods below, found by the hundreds in sacred wells and tombs. Rome feared the dead, yet honored them deeply.',
    eticaP2: 'Every realm of practice has its own protection, timing and boundary. Awareness of these boundaries is not timidity — it is the true skill of one who works with thresholds. Like a physician who knows when not to operate, the ethical practitioner knows when to stop, and that restraint is what separates wisdom from recklessness.',

    artImgAlt: 'Nigromante en la Antigüedad durante un rito de comunicación con los difuntos',
    artP1: 'La Necromancia —del griego nekros (muerto) y manteia (divinación)— es el arte de buscar conocimiento a través del contacto con los planos sutiles de la existencia, tradicionalmente vinculados al ciclo de muerte y renacimiento. Nacida en las civilizaciones más antiguas del mundo, no es, como siglos de malentendidos sugieren, una práctica oscura y maligna, sino una de las formas más antiguas de sabiduría ritual: un diálogo respetuoso con lo que trasciende lo visible.',
    artP2: 'Sus raíces se hunden en el Antiguo Egipto, donde el culto a los muertos constituía el fundamento mismo de la civilización religiosa. Los sacerdotes de Anubis y Osiris custodiaban los ritos de paso con un rigor milenario, convencidos de que la comunicación entre vivos y difuntos no solo era posible, sino necesaria para el orden cósmico. El Libro de los Muertos no era un recetario de sortilegios: era un mapa detallado para cruzar la frontera con dignidad.',

    artP4: 'En la Edad Media y el Renacimiento, la necromancia se dividió en dos corrientes: por un lado la demonología popular, alimentada por el miedo y la superstición; por otro, una ciencia hermética refinada, cultivada por eruditos como Cornelio Agrippa y John Dee, que la sistematizaron como disciplina filosófica junto a la astrología y la alquimia. Solo en el siglo XIX, con Allan Kardec y el Espiritismo, el diálogo con los muertos encontró un marco ético moderno.',
    artP5: 'La Necromancia Ética moderna se basa en un principio fundamental: no se ordena, se pide. No se invoca —se escucha—. Nunca se busca retener a las almas en el mundo de los vivos, sino honrar los ciclos naturales, recibir sabiduría y dar cierre a lo que quedó suspendido. Es una práctica de memoria, no de poder, que traza una línea clara entre el respeto hacia quienes nos precedieron y la búsqueda de control sobre fuerzas que no nos pertenecen.',

    romaTitle: '🔥 Roma y la Magia del Umbral',

/* ══════════════════════════════════════════════════
   AudioManager
   ══════════════════════════════════════════════════ */
const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';

class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.preload = 'none';
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play() {
    this.audio?.play().catch(() => {});
    this.isPlaying = true;
    sessionStorage.setItem(AUDIO_KEY, 'true');
    this.updateUI();
  }
  pause() {
    this.audio?.pause();
    this.isPlaying = false;
    sessionStorage.setItem(AUDIO_KEY, 'false');
    this.updateUI();
  }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}
window.audioManager = new AudioManager();
document.getElementById('musicToggle')?.addEventListener('click', () => window.audioManager.toggle());

function isPremium() { return localStorage.getItem('myst_premium') === '1'; }
function requirePremium(actionType) {
  if (isPremium()) return true;
  document.getElementById('premiumModal')?.classList.add('show');
  document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'false');

}

}

   ══════════════════════════════════════════════════ */
function shareContent(customText) {
  const L = LANG[currentLang];
  const text = customText || L.shareText;
  if (navigator.share) {
    navigator.share({ title: L.shareTitle, text, url: PAGE_URL }).catch(() => {});
    return;
  }
  const enc = encodeURIComponent(text + ' ' + PAGE_URL);
  const ue = encodeURIComponent(PAGE_URL);
  const wa = document.getElementById('share-wa'); if (wa) wa.href = `https://wa.me/?text=${enc}`;
  const tg = document.getElementById('share-tg'); if (tg) tg.href = `https://t.me/share/url?url=${ue}&text=${encodeURIComponent(text)}`;
  const fb = document.getElementById('share-fb'); if (fb) fb.href = `https://www.facebook.com/sharer/sharer.php?u=${ue}`;
  const xb = document.getElementById('share-x'); if (xb) xb.href = `https://twitter.com/intent/tweet?text=${enc}`;
  const sp = document.getElementById('sharePopup'); if (sp) sp.hidden = false;
}
function copyLink() {
  const L = LANG[currentLang];
  navigator.clipboard.writeText(PAGE_URL).then(() => {
    const b = document.getElementById('share-copy');
    if (b) { b.textContent = L.shareCopied; setTimeout(() => { b.textContent = L.shareCopy; }, 2000); }
  });
}

/* ══════════════════════════════════════════════════
   FAQ Accordion
   ══════════════════════════════════════════════════ */
function renderFAQ(faqs) {
  const container = document.getElementById('faqList');
  if (!container) return;
  container.innerHTML = faqs.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false">
        <span>${f.q}</span>
        <span class="faq-icon">+</span>
      </button>
      <div class="faq-answer" id="faq-ans-${i}" hidden>
        <p>${f.a}</p>
      </div>
    </div>
  `).join('');
}
function toggleFAQ(i) {
  const ans = document.getElementById(`faq-ans-${i}`);
  const btn = document.querySelector(`#faq-${i} .faq-question`);
  const icon = btn?.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  if (icon) icon.textContent = isOpen ? '+' : '−';
  btn?.setAttribute('aria-expanded', String(!isOpen));
}

let _necroReame = 0;

function necroSelReame(i){
  _necroReame = i;
  for(let k=0;k<4;k++){
    const t = document.getElementById('necroTab'+k);
    if(t) t.classList.toggle('active', k===i);
  }
}

function necroRandom(){
  _necroReame = Math.floor(Math.random()*4);
  necroSelReame(_necroReame);
  calcNegromanzia();
}

function calcNegromanzia(){
  const L = LANG[currentLang];
  const domanda = (document.getElementById('necroDomanda')?.value||'').trim();
  const d = DB_NEGROMANZIA[currentLang][_necroReame];
  const domHtml = domanda ? `<div class="domanda-shown">❓ "${domanda}"</div>` : '';
  const parts = d.reame.split(' ');
  const ico = parts[0];
  const nome = parts.slice(1).join(' ');

  document.getElementById('necroResult').innerHTML = `
    <div class="result-header">
      <span class="result-reame-icon" aria-hidden="true">${ico}</span>
      <div class="result-reame-nome">${nome}</div>
      <div class="result-sottotitolo">${d.sottotitolo}</div>
    </div>
    <div class="info-grid">
      <div class="info-card"><div class="ico" aria-hidden="true">🌿</div><div class="lbl">${L.labelElemento}</div><div class="val">${d.elemento}</div></div>
      <div class="info-card"><div class="ico" aria-hidden="true">🌑</div><div class="lbl">${L.labelPianeta}</div><div class="val">${d.pianeta}</div></div>
      <div class="info-card"><div class="ico" aria-hidden="true">🎨</div><div class="lbl">${L.labelColore}</div><div class="val">${d.colore}</div></div>
      <div class="info-card"><div class="ico" aria-hidden="true">⏰</div><div class="lbl">${L.labelOra}</div><div class="val">${d.ora}</div></div>
    </div>
    ${domHtml}
    <div class="r-block"><h4>${L.labelReame}</h4><p>${d.desc}</p></div>
    <div class="r-block ritual"><h4>${L.labelRituale}</h4><p>${d.ritualeEtico}</p></div>
    <div class="r-block protezione"><h4>${L.labelProtezione}</h4><p>${d.protezione}</p></div>
    <div class="r-block avviso"><h4>${L.labelAvvertenze}</h4><p>${d.avvertenze}</p></div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn btn-sec" onclick="resetNegromanzia()">${L.btnAltroReame}</button>
    </div>
  `;

  document.getElementById('necroResult').style.display = 'block';
  document.getElementById('necroForm').style.display = 'none';
  burst();
  showToast(L.toastMsg);
}

function resetNegromanzia(){
  document.getElementById('necroForm').style.display = 'block';
  document.getElementById('necroResult').style.display = 'none';
  const d = document.getElementById('necroDomanda');
  if(d) d.value = '';
}

function showToast(msg){
  const t = document.getElementById('toastEl');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

function burst(){
  const emojis = ['💀','🕯️','🌑','✦','🦋','⚰️'];
  const cx = window.innerWidth/2, cy = window.innerHeight/2;
  for(let i=0;i<10;i++){
    const el = document.createElement('div');
    el.className = 'burst-particle';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const angle = Math.random()*Math.PI*2;
    const dist = 80+Math.random()*120;
    el.style.cssText = `left:${cx}px;top:${cy}px;--bx:${Math.cos(angle)*dist}px;--by:${Math.sin(angle)*dist}px;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 1000);
  }
}

/* ── Aggiorna testi statici del tool e ricalcola se un risultato è già visibile ── */
function refreshNegromanziaUI(){
  const L = LANG[currentLang];
  const tt = document.getElementById('tool-title'); if (tt) tt.textContent = L.toolTitle;
  const ts = document.getElementById('tool-sub'); if (ts) ts.textContent = L.toolSub;
  const dq = document.getElementById('necroDomanda'); if (dq) dq.placeholder = L.domandaPlaceholder;
  const br = document.getElementById('btnRandomReame'); if (br) br.textContent = L.btnRandom;
  const ba = document.getElementById('btnAttraversa'); if (ba) ba.textContent = L.btnAttraversa;
  L.tabLabels.forEach((label, i) => { const el = document.getElementById('tabLabel'+i); if (el) el.textContent = label; });

  const resultBox = document.getElementById('necroResult');
  if (resultBox && resultBox.style.display === 'block') {
    calcNegromanzia();
  }
}

});
