/* ── Reset / Variabili ── */
:root{

}
*{box-sizing:border-box;margin:0;padding:0}

body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;min-height:100vh;overflow-x:hidden;transition:background .3s ease,color .3s ease}

/* ── Focus visibile (Accessibilità) ── */

    introText1: "In every shamanic tradition around the world — from Indigenous America to the Siberian steppes, from sub-Saharan Africa to the Pacific Islands — animals are never just creatures: they are messengers between the physical and spiritual worlds, keepers of primordial wisdom.",
    introText2a: "The Spirit Animal is a guide that accompanies you throughout life, embodying archetypal qualities that mirror your deepest essence. It isn't a fixed identity — it can shift with the seasons of the soul — yet there's always a primary animal reflecting your fundamental way of being in the world.",
    introText2b: "Shamanism teaches that you don't choose your totem — it finds you. The test below isn't arbitrary: it's a psychological-archetypal map built on five questions that explore your deep reactions to fundamental life situations.",
    introBoxTitle: "✦ What Is a Spirit Animal?",
    introBoxText: "In Native American traditions, every human being is born with at least seven animal spirits accompanying them through life. The primary totem — the Main Power Animal — represents your dominant energy and natural gifts. The other six guard the cardinal directions and offer support in different areas of life.",
    totemsEyebrow: "Gallery of Spirits",
    totemsTitle: "The Eight Archetypes",
    totemsIntro: "Eight animal spirits hold the fundamental qualities of the human soul. Each carries gifts, challenges, and a unique message for whoever receives it.",
    mythEyebrow: "Myth & Symbolism",
    mythTitle: "Spirit Animals in Mythology",
    mythIntro: "From Siberian shamans to Apache desert dwellers, from Amazonian healers to Celtic druids — the bond between humans and animal guides spans every culture and era.",
    myths: [
      { title: "The Thunderbird Eagle", sub: "NATIVE AMERICAN TRADITIONS", text: "In the cultures of the Great Plains, the Eagle is the Thunderbird — a supernatural being that brings storms and speaks with the Great Spirit. Eagle feathers are among the most sacred ceremonial objects: they symbolize the direct link between earth and sky, between human and divine. Only the most worthy warriors and shamans receive the Eagle as their spirit guide." },
      { title: "Lupus — Master of the Paths", sub: "NORSE & CELTIC TRADITIONS", text: "In Norse mythology, Odin is always accompanied by two wolves — Geri and Freki — who roam the world gathering knowledge for the god of wisdom. In Cherokee tradition, the Wolf teaches the importance of family and cooperation: a pack that hunts together always outlives the lone wolf. Wolf warriors — the berserkers — wore wolf pelts to summon the animal's ferocity and instinct." },
      { title: "Artio — The Bear Goddess", sub: "CELTIC & SIBERIAN TRADITIONS", text: "Among the Celts, Artio was the bear goddess of fertility and healing. The Gaelic word for bear is said to be the origin of legendary King Arthur's name, whose reign was protected by the bear's spirit. In Siberia, the bear is seen as humanity's ancestor: some peoples call it \"Grandfather\" with reverence, and eating its meat is a ritual act said to transfer its strength." },
      { title: "Delphinus — Messenger of Poseidon", sub: "GREEK & ROMAN MYTHOLOGY", text: "In Greek mythology, dolphins were seen as saviors of shipwrecked sailors and messengers of the gods. Apollo transformed into a dolphin to guide Cretan sailors toward Delphi — hence the name of the famous oracle. Poseidon sent a dolphin as ambassador to convince the nymph Amphitrite to marry him; grateful for its success, he placed the dolphin's image among the stars as the constellation Delphinus." }
    ],
    tradEyebrow: "Shamanic Paths",
    tradTitle: "The Totem Across World Traditions",
    tradTabs: ["🪶 Native American", "🌿 Celtic", "🌏 Siberian Shamanism", "🐉 Taoism & Zen"],
    tradPanels: [
      { title: "🪶 Medicine Animals — Native American", text: "Indigenous North American cultures developed the most elaborate totemic system in the world. The totem poles of the Pacific Northwest peoples (Haida, Tlingit, Tsimshian) are carved genealogical stories: each animal figure represents an ancestor, a founding event, or a power received in a vision. The Vision Quest — a solitary fast in nature to receive one's spirit guide — remains a rite of passage practiced today. The animal appearing in a dream or vision during the quest becomes a lifelong spiritual companion." },
      { title: "🌿 Animal Clans — Celtic Tradition", text: "The Celts organized their tribes into totemic clans: families descended from a mythical animal ancestor. The Deer clan carried the antler as its symbol; the Raven clan guarded secrets. Druids — the Celtic priest-shamans — trained for years to communicate with animal spirits through dreams, divination and ritual trance. Shapeshifting into an animal was considered an advanced druidic skill: mastering your totem meant being able to temporarily \"become\" it in spirit." },
      { title: "🌏 Helper Spirits — Siberian Shamanism", text: "Siberian shamanism is perhaps the oldest tradition we know of, dating back some 40,000 years according to certain archaeological studies. The shaman — the kam — receives helper spirits (animal guides) through an \"initiatory illness\": a profound crisis that brings them to the edge of death. It's on this journey to the underworld that the animal appears and chooses to accompany them. The Bear is the most powerful Siberian shamanic spirit; the Deer carries the shaman skyward; the Raven is the messenger between worlds." },
      { title: "🐉 Auspicious Animals — Taoism & Chinese Tradition", text: "In Chinese cosmology, four great mythological animals guard the cardinal directions: the Azure Dragon (East, spring, rebirth), the Vermilion Bird (South, summer, transformation), the White Tiger (West, autumn, strength), and the Black Tortoise (North, winter, wisdom). In Taoism, every person is associated with one of these archetypes based on their birth date. Feng Shui uses these cosmic animals to harmonize spaces: placing symbols of your guiding animal in the right corner is said to amplify your natural energy." }
    ],

      { title: "🌿 The Power Dream", text: "The traditional way to meet your spirit animal is the guided dream. Before sleeping, set the intention to meet your animal guide. Keep a journal by your bed. Write down every dream involving animals — messages often arrive in symbolic, not literal, form." },
      { title: "🥁 The Shamanic Journey", text: "The shamanic drum (4–7 beats per second) induces an altered state of consciousness that facilitates contact with guiding spirits. Sit comfortably, close your eyes, and let the drumbeat carry you into the Lowerworld — the realm of animal spirits. Ask the first animal you meet: \"Are you my spirit guide?\" A genuine totem will present itself repeatedly, on its own." },
      { title: "🪶 Honoring Your Totem", text: "Once you've identified your spirit animal, honor it: study its behavior in nature, carry a symbol of it (a feather, a stone, an image), meditate on the quality it embodies. The totem isn't just a symbol — it's a living relationship. The more you cultivate it, the clearer its guidance becomes in daily life." }

    totemData: {
      aquila: { name: "Eagle", tribe: "Guardian of the Heights", keywords: ["Vision","Freedom","Spiritual Authority","Clairvoyance"],
        messaggio: "The Eagle calls you to lift your gaze beyond the worries of the moment. You're gifted with rare vision — the ability to see the whole picture when everyone else sees only fragments. Your task is to use this vision to guide, not to dominate. Fly high, but don't forget the ground beneath you.",
        sfida: "Your challenge is not to isolate yourself in your higher vision. The eagle must learn that true strength lies in sharing what it sees with the flock, not in flying alone into the infinite.",
        pregio: "Your presence brings clarity where there's confusion. When you speak, people stop to listen — even when they don't quite realize why.",
        bonus: "Each morning, right upon waking, write down a single big-picture intuition before the rational mind filters it. Within 21 days a pattern will emerge that no other test can show you." },
      lupo: { name: "Wolf", tribe: "Guardian of the Pack", keywords: ["Loyalty","Intuition","Teaching","Spiritual Family"],
        messaggio: "The Wolf guides you through the dark forests of life. You're a deeply social being who finds meaning in bonds with others, yet you also carry a wild soul that needs space. The moon calls you: trust your intuition more than social conventions.",
        sfida: "The Wolf sometimes carries too much of the pack's weight on its shoulders. Learn to receive help as much as you give it. You don't have to protect everyone alone.",
        pregio: "You're a natural teacher. People learn from you not through words but through what you embody. Your presence transforms.",
        bonus: "Identify who in your circle depends too heavily on your protection, and practice — just once this week — letting them find their own way without stepping in." },
      orso: { name: "Bear", tribe: "The Great Healer", keywords: ["Inner Strength","Healing","Sacred Introversion","Cycles"],
        messaggio: "The Bear enters the cave of your being to remind you that true strength is born in silence. You need periods of retreat to find yourself again — and these \"hibernations\" aren't weaknesses, they're how you recharge immense power.",
        sfida: "Watch the tendency to shut the world out during stressful times. Your inner retreat is sacred, but there's a limit beyond which it becomes isolation.",
        pregio: "You're a natural healer. Your energy is deeply reassuring — people feel safe around you in ways they can't quite explain.",
        bonus: "Schedule one full \"hibernation day\" this month — no calls, no obligations — and notice how much clearer your decisions become afterward." },
      delfino: { name: "Dolphin", tribe: "Messenger of the Waters", keywords: ["Joy","Communication","Emotional Intelligence","Connection"],
        messaggio: "The Dolphin carries the message of joy as a spiritual practice, not a mood. You were born to connect different worlds — a bridge between people, ideas, dimensions of existence. Your intelligence is more emotional than rational, and that's your superpower.",
        sfida: "Your sensitivity to others' energy can become a burden if you don't learn to filter it. You absorb too much from others — build clear energetic boundaries.",
        pregio: "You bring lightness where there's heaviness. Your sense of humor is a spiritual gift, not a frivolity. You make souls laugh.",
        bonus: "Before entering a crowded or emotionally charged space, visualize a thin sphere of light around you — it filters what belongs to others without shutting connection down." },
      serpente: { name: "Snake", tribe: "Keeper of Transformation", keywords: ["Transformation","Shadow Wisdom","Healing","Kundalini"],
        messaggio: "The Snake doesn't crawl — it dances. It's the animal of radical transformation, of renewal through shedding what no longer serves. You're in a molting period: something fundamental in your life is changing skin. Don't resist it.",
        sfida: "Your intensity can intimidate others. Not everyone can hold the depth you bring into conversations and relationships. Calibrate your energy.",
        pregio: "You're an alchemist of crisis. Where others see disaster, you see opportunity for transformation. That's a rare form of wisdom.",
        bonus: "Name, in writing, the one thing you're currently \"shedding\" — a habit, a belief, a relationship pattern — and what wants to take its place." },
      cervo: { name: "Deer", tribe: "The Gentle Path", keywords: ["Grace","Gentleness as Strength","Heart Intuition","Harmony"],
        messaggio: "The Deer teaches you that gentleness isn't weakness — it's one of the most evolved forms of strength. Your heart is your most reliable compass. Follow the path of grace even when the world around you seems to demand harshness.",
        sfida: "Your sensitivity to conflict can lead you to avoid necessary confrontations. Not every tension should be avoided — some need to be walked through with gentle courage.",
        pregio: "Your presence calms tense situations without you doing anything deliberate. You're a natural bearer of peace.",
        bonus: "This week, identify one avoided conversation and set a gentle, specific time to have it — grace doesn't mean silence." },
      gufo: { name: "Owl", tribe: "Seer of the Night", keywords: ["Wisdom","Night Vision","Hidden Truth","Magic"],
        messaggio: "The Owl sees in darkness what daylight hides. You're drawn to mysteries, deep questions, uncomfortable truths others prefer to ignore. Your wisdom is intuitive — it arrives in flashes, dreams, moments of silence.",
        sfida: "Be careful not to become a detached observer of life. The Owl's wisdom matters when it's shared, not withheld.",
        pregio: "You can see the real motives behind human actions. This gift, used with compassion, makes you an extraordinary counselor.",
        bonus: "Choose one insight you've been keeping to yourself and share it, this week, with the person it concerns most." },
      leone: { name: "Lion", tribe: "King of the Heart", keywords: ["Courage","Creativity","Leadership","Solar Generosity"],
        messaggio: "The Lion rules with an open heart, not brute force. Your task is to learn leadership from a place of generosity — giving your warmth without expecting recognition. The sun doesn't ask for gratitude to shine.",
        sfida: "The Lion's ego can overshadow its heart. When you chase recognition at all costs, you lose your true greatness. Your light shines brightest when you're not thinking about it.",
        pregio: "Your vital energy is contagious. When you're fully present, you ignite something in people they didn't know they had.",
        bonus: "This week, do one generous act with zero credit attached — no post, no mention — and notice how different it feels." }
    }

    artTitle: "Animal Totem: Historia, Simbología y Significado del Espíritu Guía",
    artH2: "Orígenes y Difusión del Totemismo en el Mundo",
    artH3: "Cómo Reconocer y Honrar Tu Totem",
    artP1: "La palabra \"totem\" proviene de ototeman, un término ojibwe que significa \"él es mi pariente\". El antropólogo James Frazer introdujo el concepto en el lenguaje académico occidental a finales del siglo XIX, estudiando los sistemas de parentesco clánico de los pueblos de los Grandes Lagos norteamericanos. Claude Lévi-Strauss profundizó después en su función simbólica: el totem no es un simple emblema, sino un sistema de clasificación con el que las culturas organizan la relación entre el ser humano, la naturaleza y la comunidad.",
    artP2: "Los ocho arquetipos usados en este test — Águila, Lobo, Oso, Delfín, Serpiente, Ciervo, Búho, León — responden a una lógica junguiana: cada animal representa un patrón de comportamiento recurrente en toda cultura, sin importar el contexto geográfico. El Águila encarna la visión de conjunto, el Lobo la pertenencia social, el Oso la introspección regenerativa, la Serpiente la capacidad de transformarse. No son etiquetas rígidas, sino lentes para observar tendencias que probablemente ya posees, aunque nunca las hayas nombrado con claridad.",
    artP3: "El test de esta página se basa en cinco escenarios arquetípicos: la reacción ante lo imprevisto, cómo acompañas a un amigo en dificultad, tu relación con la soledad, tu actitud ante el cambio y el entorno que más te regenera. Cada respuesta puntúa a los ocho animales según una matriz calibrada sobre sus rasgos arquetípicos; el totem con mayor puntuación refleja tu forma dominante de sentir y actuar en este momento — una fotografía del presente, no un veredicto definitivo.",
    artP4: "El error más común es creer que el totem se elige — \"quiero el lobo porque me gusta\" — cuando la tradición enseña justo lo contrario: es el espíritu animal quien se manifiesta, a menudo de forma incómoda o inesperada. Otra confusión frecuente es mezclar el animal totem con el signo zodiacal chino, un sistema calendárico fijo ligado al año de nacimiento, mientras que el totem chamánico es dinámico y no depende de ninguna fecha. Ningún totem es \"menos noble\" que otro: cada animal aporta dones equivalentes.",
    artP5: "A diferencia de herramientas divinatorias como el Tarot o el horóscopo, el totemismo animal no predice eventos futuros: describe una estructura interior estable, un arquetipo con el que dialogar en el tiempo. Para profundizar, siguen siendo referencias clave \"Animal-Speak\" de Ted Andrews, los estudios etnográficos de Mircea Eliade sobre el chamanismo siberiano y \"El pensamiento salvaje\" de Lévi-Strauss. Si tu Animal Totem despertó tu curiosidad, explora también tus sueños recurrentes, tu perfil astrológico o el viaje astral.",

    faqSectionTitle: "Preguntas Frecuentes",
    faq: [
      { q: "¿Qué es exactamente un animal totem y cómo se \"recibe\"?", a: "En las tradiciones chamánicas, el animal totem es un espíritu guía que acompaña a la persona a lo largo de la vida, encarnando cualidades arquetípicas específicas. No se elige racionalmente: tradicionalmente se manifiesta a través de sueños recurrentes, encuentros simbólicos en la naturaleza o estados de trance ritual como el Vision Quest de los nativos americanos. El test de esta página ofrece una vía psicológico-simbólica moderna para acercarte a este descubrimiento." },
      { q: "¿El test del animal totem tiene base científica?", a: "El test se inspira en la psicología arquetípica junguiana más que en el método científico estricto: no predice el futuro ni mide rasgos clínicos de personalidad. Es una herramienta simbólico-reflexiva que te invita a reconocer patrones de comportamiento recurrentes a través del lenguaje universal de los animales. Su valor está en el autoconocimiento que estimula, no en una validación empírica formal." },
      { q: "¿Puedo tener más de un animal totem en la vida?", a: "Sí. Muchas tradiciones, especialmente la nativa americana, enseñan que cada persona está acompañada por varios espíritus animales: un totem primario, ligado a tu naturaleza profunda, y espíritus secundarios que aparecen en fases específicas o custodian los cuatro puntos cardinales de la vida. El totem primario tiende a permanecer estable, mientras que los secundarios pueden cambiar con las estaciones de la existencia." },
      { q: "¿Cuál es la diferencia entre el animal totem y el signo zodiacal chino?", a: "El signo zodiacal chino es un sistema calendárico fijo que depende exclusivamente del año de nacimiento, siguiendo un ciclo predeterminado de doce animales. El animal totem chamánico, en cambio, no tiene ninguna relación con la fecha de nacimiento: surge de un recorrido interior, de una experiencia de visión o, como en este test, del análisis de tus reacciones instintivas actuales." },
      { q: "¿Cómo \"activo\" la conexión con mi animal totem?", a: "La práctica más extendida es el sueño de poder: antes de dormir, formula la intención de encontrarte con tu espíritu guía y mantén un diario de sueños junto a la cama. También puedes llevar contigo un símbolo de tu totem, observar su comportamiento real en la naturaleza y meditar regularmente sobre las cualidades que representa. La conexión se fortalece con la atención constante, no con un único ritual." },
      { q: "¿Mi animal totem puede cambiar con el tiempo?", a: "Sí, y es completamente normal. Mientras el totem primario tiende a permanecer constante en tu identidad profunda, muchas tradiciones chamánicas enseñan que espíritus guía diferentes pueden surgir en momentos de transición — un duelo, un nacimiento, un cambio radical de vida. Si repites el test en otra etapa de tu vida y obtienes un resultado distinto, no es un error: es la señal de que atraviesas una fase nueva." }

    introPhLabel: "ESPÍRITUS ANIMALES",
    introText1: "En cada tradición chamánica del mundo — desde las Américas indígenas hasta las estepas siberianas, desde el África subsahariana hasta las Islas del Pacífico — los animales no son simples criaturas: son mensajeros entre el mundo físico y el espiritual, custodios de sabidurías primordiales.",
    introText2a: "El Animal Totem es un espíritu guía que te acompaña a lo largo de la vida, encarnando cualidades arquetípicas que reflejan tu esencia más profunda. No es una identidad fija — puede cambiar con las estaciones del alma — pero siempre existe un animal primario que refleja tu forma fundamental de estar en el mundo.",
    introText2b: "El chamanismo enseña que no eres tú quien elige tu totem: es él quien te encuentra a ti. El test que sigue no es arbitrario — es un mapa psicológico-arquetípico basado en cinco preguntas que exploran tus reacciones profundas ante situaciones fundamentales de la existencia.",

let _totemAnswers = [];

function resetTotem(){
  _totemAnswers = [];
  renderQuiz();
  $('totemResult').style.display='none';
  $('totemResult').innerHTML='';
  $('totemQuiz').style.display='block';
}

function totemAnswer(step, answerIdx){
  _totemAnswers[step] = answerIdx;
  const opts=$('totemStep'+step).querySelectorAll('.totem-opt');
  opts.forEach((b,i)=>{
    b.style.opacity = i===answerIdx?'1':'0.4';
    b.disabled=true;
  });
  setTimeout(()=>{
    if(step<4){
      $('totemStep'+step).classList.remove('active');
      $('totemStep'+(step+1)).classList.add('active');
    } else {
      _calcTotem();
    }
  }, 500);
}

function _calcTotem(){
  const TOTEM_IDS=['aquila','lupo','orso','delfino','serpente','cervo','gufo','leone'];
  const scores=new Array(8).fill(0);
  _totemAnswers.forEach((ans,q)=>{
    TOTEM_MATRIX[q][ans].forEach((v,t)=>scores[t]+=v);
  });
  const maxIdx=scores.indexOf(Math.max(...scores));
  const meta=TOTEM_META.find(m=>m.id===TOTEM_IDS[maxIdx])||TOTEM_META[0];
  _showTotemResult(meta);
}

function _showTotemResult(meta){
  const L = LANG[currentLang];
  const t = L.totemData[meta.id];
  const R = L.resultLabels;
  $('totemQuiz').style.display='none';
  const el=$('totemResult');
  el.style.display='block';
  const imgHtml = meta.img
    ? `<img src="${meta.img}" class="totem-img-hd" alt="${t.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div class="totem-animal" style="display:none">${meta.emoji}</div>`
    : `<div class="totem-animal">${meta.emoji}</div>`;
  el.innerHTML=`
  <div class="totem-res">
    <div class="totem-img-container">${imgHtml}</div>
    <div class="totem-name">${t.name}</div>
    <div class="totem-tribe">${t.tribe}</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:20px">
      ${t.keywords.map(k=>`<span class="tag">✦ ${k}</span>`).join('')}
    </div>
    <div class="totem-msg">
      <h4>${R.messageTitle}</h4>
      <p>${t.messaggio}</p>
    </div>
    <div class="totem-msg">
      <h4>${R.challengeTitle}</h4>
      <p>${t.sfida}</p>
    </div>
    <div class="totem-msg">
      <h4>${R.giftTitle}</h4>
      <p>${t.pregio}</p>
    </div>
    <div class="totem-msg">
      <h4>${R.bonusTitle}</h4>
      <p id="totemBonusText">${t.bonus}</p>
      <button class="btn btn-sec" id="totemBonusBtn" onclick="unlockTotemBonus()">${R.unlockBonusBtn}</button>
    </div>
    <div class="btn-grp">
      <button class="btn btn-sec" onclick="resetTotem()">${R.retakeBtn}</button>
      <a href="./index.html" class="btn btn-sec">${R.backBtn}</a>
    </div>
  </div>`;
  el.scrollIntoView({behavior:'smooth',block:'start'});
  _burst();
  _applyBonusGate();
}

/* ── Premium Gate (Sezione 8.5 / 10) ── */
function isPremium(){
  return localStorage.getItem('myst_premium') === '1';
}

function requirePremium(actionType){
  if (isPremium()) return true;
  $('premiumModal')?.classList.add('show');
  $('premiumModal')?.setAttribute('aria-hidden','false');
  return false;
}

function closePremiumModal(){
  $('premiumModal')?.classList.remove('show');
  $('premiumModal')?.setAttribute('aria-hidden','true');
}

function _applyBonusGate(){
  const box = $('totemBonusText');
  const btn = $('totemBonusBtn');
  if(!box) return;
  if(isPremium()){
    box.classList.remove('bonus-locked');
    if(btn) btn.style.display='none';
  } else {
    box.classList.add('bonus-locked');
    if(btn) btn.style.display='inline-flex';
  }
}

function unlockTotemBonus(){
  if(!requirePremium('totem_bonus')) return;
  _applyBonusGate();
}

function switchTrad(i){
  document.querySelectorAll('.trad-tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
  document.querySelectorAll('.trad-panel').forEach((p,idx)=>p.classList.toggle('active',idx===i));
}

/* ── Burst (logica esistente invariata) ── */
function _burst(){
  const colors=['#d4af37','#c8b4ff','#fff'];
  for(let i=0;i<30;i++){
    const p=document.createElement('div');
    Object.assign(p.style,{
      position:'fixed',left:'50%',top:'50%',width:'6px',height:'6px',borderRadius:'50%',
      background:colors[i%3],pointerEvents:'none',zIndex:'9999',
      transform:`translate(-50%,-50%) translate(${(Math.random()-0.5)*200}px,${(Math.random()-0.5)*200}px)`,
      opacity:'0',transition:`opacity .2s, transform ${(Math.random()*.5+.5).toFixed(2)}s ease-out`
    });
    document.body.appendChild(p);
    setTimeout(()=>p.style.opacity='1',10);
    setTimeout(()=>{ p.style.opacity='0'; setTimeout(()=>p.remove(),400); },600);
  }
}

/* ── SEO Multilingua (Sezione 8.1) ── */
function updateSEO(){
  const S = LANG[currentLang].seo;
  document.documentElement.lang = S.htmlLang;
  document.title = S.title;
  document.querySelector('meta[name="description"]').content = S.description;
  document.querySelector('meta[name="keywords"]').content = S.keywords;
  document.querySelector('meta[property="og:title"]').content = S.ogTitle;
  document.querySelector('meta[property="og:description"]').content = S.ogDesc;
  document.querySelector('meta[property="og:locale"]').content = S.ogLocale;
  document.querySelector('meta[name="twitter:title"]').content = S.ogTitle;
  document.querySelector('meta[name="twitter:description"]').content = S.ogDesc;
  const ld = $('ldFaq');
  if (ld && S.faqLD){
    ld.textContent = JSON.stringify({
      '@context':'https://schema.org',
      '@type':'FAQPage',
      mainEntity: S.faqLD.map(f=>({'@type':'Question',name:f.q,acceptedAnswer:{'@type':'Answer',text:f.a}}))
    });
  }
}

/* ── Render dinamici pagina-specifici ── */
function renderTotemGrid(){
  const L = LANG[currentLang];
  const grid = $('totemGrid');
  if(!grid) return;
  grid.innerHTML = TOTEM_META.map(m=>{
    const t = L.totemData[m.id];
    return `<div class="totem-card">
      <span class="totem-card-emoji" aria-hidden="true">${m.emoji}</span>
      <div class="totem-card-name">${t.name}</div>
      <div class="totem-card-tribe">${t.tribe}</div>
      <div class="totem-card-keys">${t.keywords.slice(0,3).map(k=>`<span class="tag">${k}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

function renderMythGrid(){
  const L = LANG[currentLang];
  const grid = $('mythGrid');
  if(!grid) return;
  grid.innerHTML = MYTH_META.map((m,i)=>{
    const my = L.myths[i];
    return `<div class="myth-card">
      <div class="myth-card-header">
        <div class="myth-img"><img src="${m.img}" alt="${my.title}" loading="lazy" decoding="async" onerror="this.style.display='none'; this.parentElement.textContent='${m.fallbackEmoji}'"></div>
        <div><h3>${my.title}</h3><div class="myth-sub">${my.sub}</div></div>
      </div>

    </div>`;

}

function renderTradTabs(){
  const L = LANG[currentLang];
  const tabsEl = $('tradTabs');
  if(tabsEl){
    tabsEl.innerHTML = L.tradTabs.map((label,i)=>`<button class="trad-tab${i===0?' active':''}" role="tab" onclick="switchTrad(${i})">${label}</button>`).join('');

    panelsWrap.innerHTML = L.tradPanels.map((p,i)=>`<div id="tradPanel${i}" class="trad-panel${i===0?' active':''}"><div class="highlight"><h4>${p.title}</h4><p>${p.text}</p></div></div>`).join('');
  }

function renderQuiz(){
  const L = LANG[currentLang];
  const wrap = $('totemQuiz');
  if(!wrap) return;
  wrap.innerHTML = L.quiz.questions.map((q,i)=>`
    <div class="quiz-step${i===0?' active':''}" id="totemStep${i}">
      <div class="quiz-progress">${q.progress}</div>
      <div class="quiz-q">${q.question}</div>
      <div class="totem-opts">
        ${q.options.map((o,j)=>`<button class="totem-opt" onclick="totemAnswer(${i},${j})"><span class="opt-emoji" aria-hidden="true">${o.emoji}</span>${o.text}</button>`).join('')}
      </div>

function renderPractice(){
  const L = LANG[currentLang];
  const grid = $('practiceGrid');
  if(!grid) return;
  grid.innerHTML = L.practice.map(p=>`<div class="highlight"><h4>${p.title}</h4><p>${p.text}</p></div>`).join('');

function renderArticleLinks(){
  const L = LANG[currentLang];
  const nav = $('articleLinks');
  if(!nav) return;
  nav.innerHTML = L.articleLinks.map(l=>`<a href="${l.href}">${l.text}</a>`).join('');
}

/* ── FAQ Accordion (Sezione 8.7) ── */
function renderFAQ(faqs){
  const container = $('faqList');
  if (!container) return;
  container.innerHTML = faqs.map((f,i)=>`
    <div class="faq-item" id="faq-${i}">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false">
        <span>${f.q}</span>
        <span class="faq-icon">+</span>
      </button>
      <div class="faq-answer" id="faq-ans-${i}" hidden>
        <p>${f.a}</p>
      </div>
    </div>
  `).join('');
}

function toggleFAQ(i){
  const ans = $(`faq-ans-${i}`);
  const btn = document.querySelector(`#faq-${i} .faq-question`);
  const icon = btn?.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  if (icon) icon.textContent = isOpen ? '+' : '−';
  btn?.setAttribute('aria-expanded', String(!isOpen));
}

/* ── Audio Manager (Sezione 8.3) ── */
const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';

class AudioManager {
  constructor(){
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio(){
    this.audio = new Audio(AUDIO_URL);
    this.audio.preload = 'none';
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play(){
    this.audio?.play().catch(()=>{});
    this.isPlaying = true;
    sessionStorage.setItem(AUDIO_KEY,'true');
    this.updateUI();
  }
  pause(){
    this.audio?.pause();
    this.isPlaying = false;
    sessionStorage.setItem(AUDIO_KEY,'false');
    this.updateUI();
  }
  toggle(){ this.isPlaying ? this.pause() : this.play(); }
  updateUI(){
    const btn = $('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}
window.audioManager = new AudioManager();
$('musicToggle')?.addEventListener('click', () => window.audioManager.toggle());

/* ── Tema Giorno/Notte (Sezione 8.4) ── */
let isDayMode = localStorage.getItem('myst_theme') === 'day';

function applyTheme(isDay){
  document.documentElement.classList.toggle('theme-day', isDay);
  const btn = $('themeToggle');
  const L = LANG[currentLang];
  if (btn) btn.textContent = isDay ? L.theme.night : L.theme.day;
  localStorage.setItem('myst_theme', isDay ? 'day' : 'night');
}

$('themeToggle')?.addEventListener('click', () => { isDayMode = !isDayMode; applyTheme(isDayMode); });

/* ── Share (Sezione 8.6) ── */
const PAGE_URL = 'https://mysticaoracoli.it/totem.html';

function shareContent(customText){
  const L = LANG[currentLang];
  const text = customText || L.shareText;
  if (navigator.share){
    navigator.share({ title:L.shareTitle, text, url:PAGE_URL }).catch(()=>{});
    return;
  }
  const enc = encodeURIComponent(text + ' ' + PAGE_URL);
  const ue = encodeURIComponent(PAGE_URL);
  const wa = $('share-wa'); if (wa) wa.href = `https://wa.me/?text=${enc}`;
  const tg = $('share-tg'); if (tg) tg.href = `https://t.me/share/url?url=${ue}&text=${encodeURIComponent(text)}`;
  const fb = $('share-fb'); if (fb) fb.href = `https://www.facebook.com/sharer/sharer.php?u=${ue}`;
  const xb = $('share-x'); if (xb) xb.href = `https://twitter.com/intent/tweet?text=${enc}`;
  const sp = $('sharePopup'); if (sp) sp.hidden = false;
}

function copyLink(){
  const L = LANG[currentLang];
  navigator.clipboard.writeText(PAGE_URL).then(()=>{
    const b = $('share-copy');
    if (b){
      b.textContent = L.shareCopied;
      setTimeout(()=>{ b.textContent = L.shareCopy; }, 2000);
    }
  });
}

/* ── Init (Sezione 8.8) ── */
document.addEventListener('DOMContentLoaded', () => {
  applyTheme(isDayMode);           // 1. Tema
  // window.audioManager già init dal costruttore  // 2. Audio
  applyLang();                     // 3. Lingua (chiama updateSEO() come prima cosa, poi tutti i render pagina-specifici)
  document.querySelectorAll('[data-lang]').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === currentLang));
});
