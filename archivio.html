<style>
/* ── Reset & Variabili ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0514;
  --card:#140c24;
  --purple:#2a1748;
  --gold:#d4af37;
  --gold-dim:#b8860b;
  --gold-glow:rgba(212,175,55,0.4);
  --text:#f4f1fa;
  --muted:#b8b2d1;
  --radius:18px;
  --border:rgba(212,175,55,0.2);
}
html.theme-day{
  --bg:#f5f2ed;
  --card:#ede8df;
  --text:#2a1748;
  --muted:#6b5b7f;
  --purple:#6b5b7f;
  --gold:#c89742;
  --gold-dim:#a67c52;
  --gold-glow:rgba(200,151,66,0.2);
  --border:#c89742;
}
html.theme-day .arch-item,
html.theme-day .stat-card,
html.theme-day .hero,
html.theme-day .export-box,
html.theme-day .related,
html.theme-day .article-section,
html.theme-day .faq-item,
html.theme-day .modal-content,
html.theme-day .myst-confirm-box{
  background:var(--card);
  border-color:var(--border);
  color:var(--text);
}
html.theme-day h1,html.theme-day h2,html.theme-day h3{
  color:var(--text);
  text-shadow:none;
}
html.theme-day .quick-card,
html.theme-day .related-link,
html.theme-day .esplora-card{
  background:rgba(200,151,66,0.08);
  border-color:var(--border);
}

body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:16px;line-height:1.8;min-height:100vh;transition:background 0.3s,color 0.3s}
a{color:var(--gold);text-decoration:none}
a:hover{text-decoration:underline}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* ── Skip Link ── */
.skip-link{position:absolute;left:-9999px;top:0;background:var(--gold);color:#0a0514;padding:10px 18px;z-index:10000;border-radius:0 0 8px 0;font-family:'Cinzel',serif;font-size:12px}
.skip-link:focus{left:0}

/* ── Sfondo Cosmico ── */
.cosmos{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, #2a174830 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 80%, #1a073820 0%, transparent 60%),
    radial-gradient(2px 2px at 15% 25%, #fff9 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 75% 15%, #fff7 0%, transparent 100%),
    radial-gradient(2px 2px at 45% 70%, #d4af3780 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 45%, #fff6 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 85%, #fff5 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 35%, #d4af3760 0%, transparent 100%);
  animation:twinkle 14s infinite alternate;
}
@keyframes twinkle{0%{opacity:.35}50%{opacity:.55}100%{opacity:.45}}
html.theme-day .cosmos{opacity:0.25}

/* ── Header standard ── */
.page-header{background:linear-gradient(135deg,#1a0c32,#0a0520);border-bottom:1px solid var(--border);padding:max(16px,calc(16px + env(safe-area-inset-top,0px))) 20px 16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
html.theme-day .page-header{background:linear-gradient(135deg,#ede8df,#f5f2ed)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.btn-back{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:1px;text-decoration:none}
.header-controls{display:flex;gap:8px}
.btn-icon{background:rgba(212,175,55,0.08);border:1px solid var(--border);color:var(--gold);font-family:'Cinzel',serif;font-size:11px;padding:6px 12px;border-radius:20px;cursor:pointer;transition:all 0.2s}
.btn-icon:hover{background:rgba(212,175,55,0.18);border-color:var(--gold)}
.page-title{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);letter-spacing:2px;text-align:center;text-shadow:0 0 20px rgba(212,175,55,0.35);margin-bottom:10px}
.lang-switch{display:flex;gap:6px;justify-content:center}
.btn-lang{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;padding:4px 12px;border-radius:14px;cursor:pointer;transition:all 0.2s}
.btn-lang.active,.btn-lang:hover{border-color:var(--gold);color:var(--gold);background:rgba(212,175,55,0.1)}

main{max-width:760px;margin:0 auto;padding:32px 20px 60px;position:relative;z-index:1}
.hero{text-align:center;margin-bottom:40px;padding:36px 24px;background:linear-gradient(145deg,#1a0c32,#0d0620);border:1px solid var(--border);border-radius:20px;position:relative;overflow:hidden}
html.theme-day .hero{background:linear-gradient(145deg,#ede8df,#f5f2ed)}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(212,175,55,0.07),transparent 70%);pointer-events:none}
.hero-icon{font-size:52px;margin-bottom:14px;display:block}
.hero-title{font-family:'Cinzel',serif;font-size:26px;color:var(--gold);letter-spacing:1.5px;margin-bottom:12px;line-height:1.3}
.hero-sub{font-size:15px;color:var(--muted);line-height:1.7;max-width:560px;margin:0 auto}
nav.breadcrumb{font-size:12px;color:var(--muted);margin-bottom:32px}
nav.breadcrumb a{color:var(--gold);text-decoration:none}
nav.breadcrumb span{margin:0 6px;opacity:0.5}

/* Toolbar */
.arch-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.arch-count{font-family:'Cinzel',serif;font-size:12px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.arch-count span{color:var(--gold)}
.btn-clear{background:transparent;border:1px solid rgba(212,175,55,0.3);color:var(--muted);font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;padding:8px 18px;border-radius:50px;cursor:pointer;transition:all 0.2s}
.btn-clear:hover{border-color:rgba(212,175,55,0.7);color:var(--gold)}

/* Filter tabs */
.filter-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-tab{background:rgba(212,175,55,0.05);border:1px solid rgba(212,175,55,0.15);color:var(--muted);font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;padding:6px 14px;border-radius:20px;cursor:pointer;transition:all 0.2s;user-select:none}
.filter-tab:hover{border-color:rgba(212,175,55,0.4);color:var(--gold)}
.filter-tab.active{background:rgba(212,175,55,0.12);border-color:rgba(212,175,55,0.5);color:var(--gold)}

/* Archive list */
#archList{display:flex;flex-direction:column;gap:12px}
.arch-item{background:linear-gradient(145deg,#130b26,#0d0620);border:1px solid rgba(212,175,55,0.18);border-radius:14px;padding:18px 20px;transition:border-color 0.2s;animation:fadeIn 0.3s ease}
html.theme-day .arch-item{background:linear-gradient(145deg,#f5f2ed,#ede8df)}
.arch-item:hover{border-color:rgba(212,175,55,0.4)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.arch-type{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);letter-spacing:1px;margin-bottom:6px}
.arch-detail{font-size:15px;color:var(--text);opacity:0.9;line-height:1.5;margin-bottom:6px}
.arch-meta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.arch-meta-dot{opacity:0.4}
.arch-badge{display:inline-block;font-size:9px;font-family:'Cinzel',serif;letter-spacing:.8px;color:var(--muted);background:rgba(212,175,55,0.07);border:1px solid rgba(212,175,55,0.15);border-radius:10px;padding:1px 8px}
.arch-empty-msg{text-align:center;padding:30px;color:var(--muted);font-size:14px}

/* Empty state */
.arch-empty{text-align:center;padding:50px 20px}
.arch-empty-icon{font-size:56px;opacity:0.35;margin-bottom:16px;display:block}
.arch-empty-title{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);letter-spacing:1px;margin-bottom:10px}
.arch-empty-sub{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:28px;max-width:360px;margin-left:auto;margin-right:auto}
.btn-start{display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#d4af37,#b8860b);color:#0a0514;border-radius:50px;font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-decoration:none;margin:4px;transition:all 0.2s;border:none;cursor:pointer}
.btn-start:hover{box-shadow:0 4px 20px rgba(212,175,55,0.4);transform:translateY(-1px);text-decoration:none}

/* Stats */
.arch-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
@media(max-width:480px){.arch-stats{grid-template-columns:1fr 1fr}}
.stat-card{background:linear-gradient(145deg,#130b26,#0d0620);border:1px solid rgba(212,175,55,0.15);border-radius:12px;padding:16px;text-align:center}
html.theme-day .stat-card{background:linear-gradient(145deg,#f5f2ed,#ede8df)}
.stat-num{font-family:'Cinzel',serif;font-size:24px;color:var(--gold);display:block;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--muted);letter-spacing:.5px}

/* Toast */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(20,10,40,0.96);border:1px solid rgba(212,175,55,0.4);color:var(--gold);font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;padding:12px 24px;border-radius:50px;opacity:0;transition:all 0.35s;z-index:9999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Confirm overlay */
.myst-confirm-overlay{position:fixed;inset:0;background:rgba(10,5,20,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.myst-confirm-box{background:linear-gradient(145deg,#1a0c32,#0d0620);border:1px solid rgba(212,175,55,0.35);border-radius:20px;padding:32px 28px;max-width:340px;width:90%;text-align:center}
.myst-confirm-box p{font-size:15px;color:var(--text);margin-bottom:24px;line-height:1.6}
.myst-confirm-actions{display:flex;gap:12px;justify-content:center}
.myst-confirm-cancel{background:transparent;border:1px solid rgba(212,175,55,0.3);color:var(--muted);font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;padding:10px 22px;border-radius:50px;cursor:pointer;transition:all 0.2s}
.myst-confirm-cancel:hover{border-color:rgba(212,175,55,0.6);color:var(--gold)}
.myst-confirm-ok{background:linear-gradient(135deg,#8b0000,#600000);border:none;color:#f0d0d0;font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;padding:10px 22px;border-radius:50px;cursor:pointer;transition:all 0.2s}
.myst-confirm-ok:hover{background:linear-gradient(135deg,#a00000,#700000)}

/* Quick links grid */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:32px}
@media(max-width:540px){.quick-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:380px){.quick-grid{grid-template-columns:repeat(2,1fr)}}
.quick-card{background:rgba(212,175,55,0.04);border:1px solid rgba(212,175,55,0.15);border-radius:12px;padding:14px 8px;text-align:center;text-decoration:none;transition:all 0.2s;display:block}
.quick-card:hover{background:rgba(212,175,55,0.1);border-color:rgba(212,175,55,0.4);text-decoration:none;transform:translateY(-2px)}
.quick-card-icon{font-size:24px;margin-bottom:6px;display:block}
.quick-card-label{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);letter-spacing:.5px;line-height:1.3}

/* Section header */
.section-title{font-family:'Cinzel',serif;font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* Export section */
.export-box{background:linear-gradient(145deg,#130b26,#0d0620);border:1px solid rgba(212,175,55,0.15);border-radius:14px;padding:22px;margin-top:32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
html.theme-day .export-box{background:linear-gradient(145deg,#f5f2ed,#ede8df)}
.export-icon{font-size:30px;flex-shrink:0}
.export-text{flex:1;min-width:180px}
.export-title{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);letter-spacing:.5px;margin-bottom:4px}
.export-sub{font-size:13px;color:var(--muted);line-height:1.5}
.btn-export{background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.3);color:var(--gold);font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;padding:9px 20px;border-radius:50px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.btn-export:hover{background:rgba(212,175,55,0.16);border-color:rgba(212,175,55,0.6)}

/* Related */
.related{background:linear-gradient(145deg,#130b26,#0d0620);border:1px solid var(--border);border-radius:16px;padding:20px;margin-top:40px}
html.theme-day .related{background:linear-gradient(145deg,#f5f2ed,#ede8df)}
.related-title{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:2px;margin-bottom:14px;text-transform:uppercase}
.related-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:500px){.related-grid{grid-template-columns:1fr 1fr}}
.related-link{display:block;background:rgba(212,175,55,0.04);border:1px solid rgba(212,175,55,0.15);border-radius:10px;padding:12px;text-align:center;text-decoration:none;transition:border-color 0.2s}
.related-link:hover{border-color:rgba(212,175,55,0.4);text-decoration:none}
.related-link-icon{font-size:22px;margin-bottom:4px;display:block}
.related-link-text{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);letter-spacing:.5px}

/* Article */
.article-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:26px 22px;margin-top:40px}
.article-section h2{font-family:'Cinzel',serif;font-size:20px;color:var(--gold);letter-spacing:.5px;margin-bottom:16px;line-height:1.4}
.article-section h3{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);letter-spacing:.5px;margin:20px 0 12px;line-height:1.4}
.article-section p{color:var(--text);opacity:0.92;margin-bottom:14px;font-size:15px;line-height:1.8}
.article-section img{width:100%;border-radius:14px;margin:16px 0;display:block}
.article-links{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0}
.article-links a{font-size:13px;background:rgba(212,175,55,0.08);border:1px solid var(--border);border-radius:20px;padding:6px 14px}
.cta-explore{display:inline-block;margin-top:10px;padding:12px 26px;background:linear-gradient(135deg,#d4af37,#b8860b);color:#0a0514;border-radius:50px;font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-decoration:none}
.cta-explore:hover{box-shadow:0 4px 20px rgba(212,175,55,0.4);text-decoration:none}

/* Share */
.share-section{margin-top:32px;position:relative}
.btn-share{width:100%;background:rgba(212,175,55,0.08);border:1px solid var(--border);color:var(--gold);font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;padding:14px;border-radius:50px;cursor:pointer;transition:all 0.2s}
.btn-share:hover{background:rgba(212,175,55,0.16);border-color:var(--gold)}
.share-popup{margin-top:12px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.share-btn{flex:1;min-width:100px;text-align:center;padding:10px;border-radius:12px;font-size:12px;font-family:'Cinzel',serif;letter-spacing:.5px;border:1px solid var(--border);cursor:pointer;text-decoration:none;color:var(--text);background:rgba(212,175,55,0.05)}
.share-btn:hover{background:rgba(212,175,55,0.12);text-decoration:none}

/* FAQ */
.faq-section{margin-top:40px}
.faq-title{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);letter-spacing:1px;margin-bottom:16px;text-align:center}
.faq-item{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.faq-question{width:100%;background:none;border:none;color:var(--text);font-family:'Cinzel',serif;font-size:13.5px;text-align:left;padding:16px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;letter-spacing:.3px}
.faq-icon{color:var(--gold);font-size:16px;flex-shrink:0}
.faq-answer{padding:0 18px 16px;color:var(--muted);font-size:14px;line-height:1.7}

/* Esplora */
.esplora-section{background:linear-gradient(135deg,#130b26,#1a0c32);border-top:1px solid rgba(212,175,55,0.25);padding:40px 20px;text-align:center;position:relative;z-index:1}
html.theme-day .esplora-section{background:linear-gradient(135deg,#ede8df,#f5f2ed)}
.esplora-section h2{font-family:'Cinzel',serif;color:var(--gold);font-size:1.2rem;letter-spacing:2px;margin-bottom:24px}
.esplora-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:800px;margin:0 auto}
.esplora-card{display:inline-block;background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.25);border-radius:8px;padding:10px 18px;color:var(--gold);text-decoration:none;font-family:'Cinzel',serif;font-size:0.82rem;letter-spacing:1px;transition:background 0.3s,border-color 0.3s}
.esplora-card:hover{background:rgba(212,175,55,0.18);border-color:rgba(212,175,55,0.6);text-decoration:none}

/* Footer */
.page-footer{text-align:center;padding:24px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:20px;position:relative;z-index:1}
.page-footer a{color:var(--gold);text-decoration:none;margin:0 8px}
.page-footer a:hover{text-decoration:underline}
.footer-links{margin-bottom:10px;line-height:2}

/* Premium Modal */
.premium-modal{position:fixed;inset:0;z-index:9998;display:none;align-items:center;justify-content:center}
.premium-modal.show{display:flex}
.modal-overlay{position:absolute;inset:0;background:rgba(10,5,20,0.85);backdrop-filter:blur(6px)}
.modal-content{position:relative;background:linear-gradient(145deg,#1a0c32,#0d0620);border:1px solid rgba(212,175,55,0.35);border-radius:20px;padding:32px 26px;max-width:340px;width:90%;text-align:center}
html.theme-day .modal-content{background:linear-gradient(145deg,#f5f2ed,#ede8df)}
.modal-content h2{font-family:'Cinzel',serif;color:var(--gold);font-size:18px;margin-bottom:14px;letter-spacing:.5px}

/* ── SEO Multilingua ── */
function updateSEO() {
  const S = LANG[currentLang].seo;
  document.documentElement.lang = S.htmlLang;
  document.title = S.title;
  document.querySelector('meta[name="description"]').content = S.description;
  document.querySelector('meta[name="keywords"]').content = S.keywords;
  document.querySelector('meta[property="og:title"]').content = S.ogTitle;
  document.querySelector('meta[property="og:description"]').content = S.ogDesc;
  document.querySelector('meta[property="og:locale"]').content = S.ogLocale;
  document.querySelector('meta[name="twitter:title"]').content = S.ogTitle;
  document.querySelector('meta[name="twitter:description"]').content = S.ogDesc;
  const ld = document.querySelector('script[type="application/ld+json"]');
  if (ld && S.faqLD) {
    ld.textContent = JSON.stringify({
      '@context': 'https://schema.org',
      '@graph': [
        {
          '@type': 'FAQPage',
          mainEntity: S.faqLD.map(f => ({
            '@type': 'Question',
            name: f.q,
            acceptedAnswer: { '@type': 'Answer', text: f.a }

        {

          itemListElement: [
            { '@type': 'ListItem', position: 1, name: LANG[currentLang].breadcrumbHome, item: 'https://mysticaoracoli.it/index.html' },

/* ── Audio Manager ── */
const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';

class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.preload = 'none';
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play() {
    this.audio?.play().catch(() => {});
    this.isPlaying = true;
    sessionStorage.setItem(AUDIO_KEY, 'true');
    this.updateUI();
  }
  pause() {
    this.audio?.pause();
    this.isPlaying = false;
    sessionStorage.setItem(AUDIO_KEY, 'false');
    this.updateUI();
  }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}
window.audioManager = new AudioManager();
document.getElementById('musicToggle')?.addEventListener('click', () => window.audioManager.toggle());

/* ── Tema Giorno/Notte ── */
let isDayMode = localStorage.getItem('myst_theme') === 'day';

  document.documentElement.classList.toggle('theme-day', isDay);

/* ── Share ── */
const PAGE_URL = 'https://mysticaoracoli.it/archivio.html';
function shareContent(customText) {
  const L = LANG[currentLang];
  const text = customText || L.shareText;
  if (navigator.share) {
    navigator.share({ title: L.shareTitle, text, url: PAGE_URL }).catch(() => {});
    return;
  }
  const enc = encodeURIComponent(text + ' ' + PAGE_URL);
  const ue = encodeURIComponent(PAGE_URL);
  const wa = document.getElementById('share-wa'); if (wa) wa.href = `https://wa.me/?text=${enc}`;
  const tg = document.getElementById('share-tg'); if (tg) tg.href = `https://t.me/share/url?url=${ue}&text=${encodeURIComponent(text)}`;
  const fb = document.getElementById('share-fb'); if (fb) fb.href = `https://www.facebook.com/sharer/sharer.php?u=${ue}`;
  const xb = document.getElementById('share-x'); if (xb) xb.href = `https://twitter.com/intent/tweet?text=${enc}`;
  const sp = document.getElementById('sharePopup'); if (sp) sp.hidden = false;
}
function copyLink() {
  const L = LANG[currentLang];
  navigator.clipboard.writeText(PAGE_URL).then(() => {
    const b = document.getElementById('share-copy');
    if (b) {
      b.textContent = L.shareCopied;
      setTimeout(() => { b.textContent = L.shareCopy; }, 2000);
    }
  });
}

/* ── FAQ Accordion ── */
function renderFAQ(faqs) {
  const container = document.getElementById('faqList');
  if (!container) return;
  container.innerHTML = faqs.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false">
        <span>${f.q}</span>
        <span class="faq-icon">+</span>
      </button>
      <div class="faq-answer" id="faq-ans-${i}" hidden>
        <p>${f.a}</p>
      </div>
    </div>
  `).join('');
}
function toggleFAQ(i) {
  const ans = document.getElementById(`faq-ans-${i}`);
  const btn = document.querySelector(`#faq-${i} .faq-question`);
  const icon = btn?.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  if (icon) icon.textContent = isOpen ? '+' : '−';
  btn?.setAttribute('aria-expanded', String(!isOpen));
}

/* ─── Storage helpers ─────────────────────────────────────────── */
const K_STORICO = 'myst_v3_history';
let _useLS = true;
const _mem = {};

function _lsGet(k){
  if(_useLS){try{return localStorage.getItem(k);}catch(e){_useLS=false;}}
  try{const v=sessionStorage.getItem(k);if(v!==null)return v;}catch(e){}
  return(_mem[k]!==undefined)?_mem[k]:null;
}
function _lsSet(k,v){
  if(_useLS){try{localStorage.setItem(k,v);return;}catch(e){_useLS=false;}}
  _mem[k]=v;
}
function _lsRemove(k){
  if(_useLS){try{localStorage.removeItem(k);return;}catch(e){_useLS=false;}}
  delete _mem[k];
}

/* ─── Toast ────────────────────────────────────────────────────── */
let _toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast');
  if(_toastTimer){clearTimeout(_toastTimer);t.classList.remove('show');}
  setTimeout(()=>{
    t.textContent=msg;
    t.classList.add('show');
    _toastTimer=setTimeout(()=>{t.classList.remove('show');_toastTimer=null;},3200);
  },_toastTimer?80:0);
}

/* ─── Confirm dialog ──────────────────────────────────────────── */
function mysticaConfirm(msg,onOk){
  const L = LANG[currentLang];
  const overlay=document.createElement('div');
  overlay.className='myst-confirm-overlay';
  overlay.innerHTML=`<div class="myst-confirm-box"><p>${msg}</p><div class="myst-confirm-actions"><button class="myst-confirm-cancel" id="_mcCancel">${L.confirmCancel}</button><button class="myst-confirm-ok" id="_mcOk">${L.confirmOk}</button></div></div>`;
  document.body.appendChild(overlay);
  const close=()=>overlay.remove();
  overlay.querySelector('#_mcOk').onclick=()=>{close();onOk();};
  overlay.querySelector('#_mcCancel').onclick=close;
  overlay.addEventListener('click',e=>{if(e.target===overlay)close();});
}

/* ─── Icons map ───────────────────────────────────────────────── */
const ICONS = {
  'Oroscopo':'🌙',
  'Lettura Semplice':'🃏',
  'Lettura Approfondita':'🔮',
  'Compatibilità':'💕',
  'Runologia':'ᚱ',
  'Runologia 3 Rune':'ᚱ',
  'I Ching':'☯️',
  'Numerologia':'🔢',
  'Geomanzia':'🌍',
  'Angelologia':'👼',
  'Fasi Lunari':'🌕',
  'Transiti Planetari':'🪐',
  'Ore Specchio':'🕐',
  'Totem':'🦅',
  'Japamala':'📿',
  'Pendolo':'⚖️'
};

/* ─── State ───────────────────────────────────────────────────── */
let _history = [];
let _activeFilter = 'all';

/* ─── Load & render ───────────────────────────────────────────── */
function loadHistory(){
  try{ _history = JSON.parse(_lsGet(K_STORICO)||'[]'); }catch(e){ _history=[]; }
  renderAll();
}

function renderAll(){
  const statsEl   = document.getElementById('statsSection');
  const toolbarEl = document.getElementById('toolbarSection');
  const exportEl  = document.getElementById('exportBox');
  const listEl    = document.getElementById('archList');
  const L = LANG[currentLang];
  if (!statsEl || !toolbarEl || !exportEl || !listEl) return;

  if(_history.length === 0){
    statsEl.style.display   = 'none';
    toolbarEl.style.display = 'none';
    exportEl.style.display  = 'none';
    listEl.innerHTML = `
      <div class="arch-empty">
        <span class="arch-empty-icon" aria-hidden="true">📿</span>
        <div class="arch-empty-title">${L.emptyTitle}</div>
        <p class="arch-empty-sub">${L.emptySub}</p>
        <a href="./index.html" class="btn-start">${L.emptyBtnStart}</a>
      </div>`;
    return;
  }

  statsEl.style.display   = '';
  toolbarEl.style.display = '';
  exportEl.style.display  = '';

  const tipi = [...new Set(_history.map(x=>x.tipo))];
  const giorni = [...new Set(_history.map(x=>{
    try{ return new Date(x.ts).toDateString(); }catch(e){ return x.data; }
  }))];
  document.getElementById('statTotale').textContent = _history.length;
  document.getElementById('statTipi').textContent   = tipi.length;
  document.getElementById('statGiorni').textContent = giorni.length;
  document.getElementById('archCountLabel').textContent = _history.length;

  buildFilterTabs(tipi);

  const filtered = _activeFilter === 'all'
    ? _history
    : _history.filter(x => x.tipo === _activeFilter);

  if(filtered.length === 0){
    listEl.innerHTML = `<div class="arch-empty-msg">${L.noFilterResults}</div>`;
    return;
  }

  listEl.innerHTML = filtered.map((x,i) => {
    const icon = ICONS[x.tipo] || '✨';
    const segnoTxt = x.segno ? `<span class="arch-meta-dot">·</span><span class="arch-badge">${escHtml(x.segno)}</span>` : '';
    return `
      <div class="arch-item" style="animation-delay:${Math.min(i,15)*30}ms">
        <div class="arch-type">${icon} ${escHtml(typeLabel(x.tipo))}</div>
        <div class="arch-detail">${escHtml(x.dettaglio||'')}</div>
        <div class="arch-meta">
          <span>${escHtml(x.data||'')}</span>
          ${segnoTxt}
        </div>
      </div>`;
  }).join('');
}

function buildFilterTabs(tipi){
  const container = document.getElementById('filterTabs');
  const L = LANG[currentLang];
  container.innerHTML = `<div class="filter-tab${_activeFilter==='all'?' active':''}" data-filter="all" id="filterAllTab" onclick="setFilter('all',this)">${L.filterAllLabel}</div>`;
  tipi.forEach(t=>{
    const tab = document.createElement('div');
    tab.className = 'filter-tab' + (_activeFilter===t?' active':'');
    tab.dataset.filter = t;
    tab.textContent = (ICONS[t]||'✨') + ' ' + typeLabel(t);
    tab.onclick = function(){ setFilter(t, this); };
    container.appendChild(tab);
  });
}

function setFilter(f, el){
  _activeFilter = f;
  renderAll();
}

/* ─── Clear ───────────────────────────────────────────────────── */
function clearArch(){
  const L = LANG[currentLang];
  mysticaConfirm(L.confirmClearMsg, ()=>{
    _lsRemove(K_STORICO);
    _history = [];
    _activeFilter = 'all';
    renderAll();
    toast(L.toastCleared);
  });
}

/* ─── Export ──────────────────────────────────────────────────── */
function exportArchivio(){
  const L = LANG[currentLang];
  if(_history.length === 0){ toast(L.toastExportEmpty); return; }
  const localeMap = { it:'it-IT', en:'en-US', es:'es-ES' };
  const lines = [L.exportFileHeader, '═'.repeat(40), ''];
  _history.forEach((x,i)=>{
    lines.push(`[${i+1}] ${typeLabel(x.tipo)}`);
    lines.push(`    ${x.dettaglio||''}`);
    lines.push(`    ${x.data||''}${x.segno?' · '+x.segno:''}`);
    lines.push('');
  });
  lines.push('─'.repeat(40));
  lines.push(`${L.exportFileFooterLabel} ${new Date().toLocaleString(localeMap[currentLang]||'it-IT')}`);
  lines.push('mysticaoracoli.it');

  const blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `mystica-archivio-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  toast(L.toastExported);
}

/* ─── Utility ─────────────────────────────────────────────────── */
function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

});
