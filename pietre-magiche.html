  <style>
    /* ── VARIABILI CSS — TEMA NOTTE ── */
    :root {
      --bg: #0a0514;
      --card: #140c24;
      --purple: #2a1748;
      --gold: #d4af37;
      --gold-dim: #b8860b;
      --gold-glow: rgba(212, 175, 55, 0.4);
      --text: #f4f1fa;
      --muted: #b8b2d1;
      --radius: 18px;
      --border: rgba(212, 175, 55, 0.2);
    }

    /* ── TEMA GIORNO ── */
    html.theme-day {
      --bg: #f5f2ed;
      --card: #ede8df;
      --text: #2a1748;
      --muted: #6b5b7f;
      --purple: #6b5b7f;
      --gold: #c89742;
      --gold-dim: #a67c52;
      --gold-glow: rgba(200, 151, 66, 0.2);
      --border: #c89742;
    }

    html.theme-day .card,
    html.theme-day .dash-card {
      background-color: var(--card);
      border: 2px solid var(--border);
      color: var(--text);
    }

    html.theme-day h1,
    html.theme-day h2,
    html.theme-day h3 {
      color: var(--text);
      text-shadow: none;
    }

    html.theme-day button {
      background-color: var(--gold);
      color: var(--text);
      border: 2px solid var(--border);
    }

    html.theme-day input,
    html.theme-day select {
      background-color: #ffffff;
      color: var(--text);
      border: 2px solid var(--border);
    }

    /* ── RESET & BASE ── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* ── COSMOS BACKGROUND ── */
    .cosmos {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      background-color: #0a0514;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, #2a174830 0%, transparent 70%);
      animation: twinkle 14s infinite alternate;
      aria-hidden: true;
    }

    @keyframes twinkle {
      0% { opacity: 0.35; }
      100% { opacity: 0.55; }
    }

    /* ── LAYOUT CONTAINER ── */
    .container {
      position: relative;
      z-index: 2;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ── HEADER FISSO ── */
    .page-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(10, 5, 20, 0.95);
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .header-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-left {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .header-back {
      background: rgba(212, 175, 55, 0.12);
      border: 1px solid rgba(212, 175, 55, 0.35);
      color: var(--gold);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 18px;
      transition: all 0.3s;
      aria-label: 'Indietro';
    }

    .header-back:hover {
      background: rgba(212, 175, 55, 0.25);
    }

    .header-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .header-btn {
      background: rgba(212, 175, 55, 0.12);
      border: 1px solid rgba(212, 175, 55, 0.35);
      color: var(--gold);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s;
    }

    .header-btn:hover {
      background: rgba(212, 175, 55, 0.25);
    }

    .lang-selector {
      display: flex;
      gap: 4px;
    }

    .lang-btn {
      background: transparent;
      border: 1px solid rgba(212, 175, 55, 0.35);
      color: var(--muted);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }

    .lang-btn.active {
      background: rgba(212, 175, 55, 0.3);
      color: var(--gold);
      border-color: var(--gold);
    }

    /* ── CONTENT AREA ── */
    .content {
      margin-top: 70px;
      padding-bottom: 40px;
    }

    /* ── HERO SECTION ── */
    .hero-section {
      background: linear-gradient(135deg, rgba(42, 23, 72, 0.6), rgba(18, 8, 48, 0.8));
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 20px;
      padding: 40px 24px;
      text-align: center;
      margin-bottom: 30px;
    }

    .hero-title {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      color: var(--gold);
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .hero-subtitle {
      font-size: 1rem;
      color: var(--muted);
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── CARDS ── */
    .card {
      background: linear-gradient(145deg, #140c24, #0a0514);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* ── SHARE SECTION ── */
    .share-section {
      background: rgba(212, 175, 55, 0.05);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 30px;
      text-align: center;
    }

    .share-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      color: var(--gold);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .share-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .share-btn {
      background: rgba(212, 175, 55, 0.15);
      border: 1px solid rgba(212, 175, 55, 0.3);
      color: var(--gold);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .share-btn:hover {
      background: rgba(212, 175, 55, 0.25);
      border-color: var(--gold);
    }

    /* ── PIETRE (STONES) ── */
    .stone-item {
      background: rgba(42, 23, 72, 0.2);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    @media (min-width: 850px) {
      .stone-item {
        flex-direction: row;
        align-items: flex-start;
      }
    }

    .stone-visual {
      flex-shrink: 0;
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
    }

    .stone-img-wrap {
      width: 100%;
      aspect-ratio: 4/5;
      min-height: 280px;
      background: rgba(212, 175, 55, 0.05);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .stone-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s;
      loading: lazy;
    }

    .stone-img-wrap:hover img {
      transform: scale(1.05);
    }

    .stone-info {
      flex: 1;
    }

    .stone-title {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      color: var(--gold);
      margin-bottom: 5px;
      letter-spacing: 1px;
    }

    .stone-tagline {
      color: #4ade80;
      font-weight: bold;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      display: block;
    }

    .stone-subtitle {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      color: var(--gold);
      margin: 20px 0 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stone-text {
      font-size: 1.05rem;
      color: var(--text);
      margin-bottom: 15px;
      line-height: 1.8;
    }

    .stone-list {
      list-style: none;
      margin-bottom: 20px;
    }

    .stone-list li {
      position: relative;
      padding-left: 25px;
      margin-bottom: 10px;
      font-size: 0.95rem;
      color: var(--text);
    }

    .stone-list li::before {
      content: '✦';
      position: absolute;
      left: 0;
      color: var(--gold);
      font-size: 0.8rem;
    }

    .stone-list strong {
      color: var(--gold);
    }

    .ritual-box {
      background: rgba(212, 175, 55, 0.05);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 15px;
      padding: 20px;
      margin-top: 25px;
    }

    .ritual-header {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      color: var(--gold);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .ritual-content {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ── ARTICLE SECTION ── */
    .article-section {
      background: linear-gradient(135deg, rgba(42, 23, 72, 0.3), rgba(18, 8, 48, 0.2));
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 20px;
      padding: 32px 24px;
      margin-bottom: 40px;
    }

    .article-section h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      color: var(--gold);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .article-section h3 {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      color: var(--gold);
      margin-top: 24px;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .article-section p {
      color: var(--text);
      margin-bottom: 16px;
      line-height: 1.8;
      font-size: 1rem;
    }

    .article-section a {
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px solid rgba(212, 175, 55, 0.5);
      transition: all 0.3s;
    }

    .article-section a:hover {
      border-bottom-color: var(--gold);
      text-decoration: underline;
    }

    /* ── FAQ SECTION ── */
    .faq-section {
      background: linear-gradient(135deg, rgba(42, 23, 72, 0.2), rgba(18, 8, 48, 0.1));
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 20px;
      padding: 32px 24px;
      margin-bottom: 40px;
    }

    .faq-section h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      color: var(--gold);
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }

    .faq-item {
      margin-bottom: 16px;
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 12px;
      overflow: hidden;
    }

    .faq-question {
      background: rgba(212, 175, 55, 0.05);
      padding: 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      user-select: none;
      transition: all 0.3s;
    }

    .faq-question:hover {
      background: rgba(212, 175, 55, 0.1);
    }

    .faq-question-text {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 1rem;
      letter-spacing: 0.5px;
      flex: 1;
    }

    .faq-toggle {
      color: var(--gold);
      font-size: 1.2rem;
      transition: transform 0.3s;
    }

    .faq-item.open .faq-toggle {
      transform: rotate(180deg);
    }

    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: rgba(212, 175, 55, 0.02);
    }

    .faq-item.open .faq-answer {
      max-height: 500px;
      padding: 16px;
      border-top: 1px solid rgba(212, 175, 55, 0.15);
    }

    .faq-answer p {
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .faq-answer p:last-child {
      margin-bottom: 0;
    }

    /* ── PREMIUM MODAL ── */
    .premium-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
      visibility: hidden;
      opacity: 0;
      transition: all 0.3s;
    }

    .premium-modal.open {
      visibility: visible;
      opacity: 1;
    }

    .premium-content {
      background: linear-gradient(135deg, #2a1748, #0a0514);
      border: 2px solid rgba(212, 175, 55, 0.3);
      border-radius: 25px;
      padding: 32px 24px;
      max-width: 500px;
      text-align: center;
      position: relative;
    }

    .premium-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(212, 175, 55, 0.15);
      border: 1px solid rgba(212, 175, 55, 0.3);
      color: var(--gold);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.3s;
    }

    .premium-close:hover {
      background: rgba(212, 175, 55, 0.25);
    }

    .premium-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .premium-title {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      color: var(--gold);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .premium-text {
      color: var(--text);
      margin-bottom: 24px;
      font-size: 1rem;
      line-height: 1.7;
    }

    .premium-price {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      color: var(--gold);
      margin-bottom: 20px;
      font-weight: 700;
    }

    .premium-btn {
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      border: none;
      color: var(--bg);
      padding: 14px 28px;
      border-radius: 12px;
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .premium-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4);
    }

    /* ── FOOTER ── */
    .page-footer {
      text-align: center;
      padding: 40px 20px;
      border-top: 1px solid rgba(212, 175, 55, 0.2);
      margin-top: 60px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .page-footer strong {
      color: var(--gold);
    }

    .page-footer a {
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px solid rgba(212, 175, 55, 0.3);
      transition: all 0.3s;
    }

    .page-footer a:hover {
      border-bottom-color: var(--gold);
    }

    /* ── BACK TO TOP ── */
    .back-to-top {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--gold);
      color: var(--bg);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      z-index: 99;
      transition: all 0.3s;
      opacity: 0;
      visibility: hidden;
    }

    .back-to-top.show {
      opacity: 1;
      visibility: visible;
    }

    .back-to-top:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.5);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {

      init() {

      get() {
        return localStorage.getItem('myst_theme') || 'night';

      set(theme) {

          document.documentElement.classList.add('theme-day');

          document.documentElement.classList.remove('theme-day');
        }
        localStorage.setItem('myst_theme', theme);
        this.updateUI();
      },

      toggle() {
        const current = this.get();
        this.set(current === 'day' ? 'night' : 'day');
      },

      updateUI() {
        const btn = document.getElementById('theme-toggle');
        if (btn) {
          btn.textContent = this.get() === 'day' ? '🌙' : '☀️';

    /* ── LANGUAGE MANAGER ── */
    const LangManager = {
      current: localStorage.getItem('myst_lang') || 'it',

      get() {
        return this.current;
      },

      set(lang) {
        if (LANG[lang]) {
          this.current = lang;
          localStorage.setItem('myst_lang', lang);
          applyLang();
        }
      },

      getText(key) {
        return LANG[this.current]?.[key] || LANG.it[key] || '';
      }
    };

    /* ── SEO UPDATE FUNCTION ── */
    function updateSEO() {
      const lang = LangManager.get();
      const seo = LANG[lang]?.seo || LANG.it.seo;

      document.documentElement.lang = lang;
      document.title = seo.title;
      document.querySelector('meta[name="description"]').content = seo.description;
      document.querySelector('meta[name="keywords"]').content = seo.keywords;
      document.querySelector('meta[property="og:title"]').content = seo.title;
      document.querySelector('meta[property="og:description"]').content = seo.description;
      document.querySelector('meta[property="og:image"]').content = seo.ogImage;
      document.querySelector('meta[property="og:locale"]').content = lang === 'es' ? 'es_ES' : lang === 'en' ? 'en_US' : 'it_IT';
      document.querySelector('meta[name="twitter:title"]').content = seo.title;
      document.querySelector('meta[name="twitter:description"]').content = seo.description;
      document.querySelector('meta[name="twitter:image"]').content = seo.ogImage;

      // JSON-LD FAQPage
      const faqLD = {
        '@context': 'https://schema.org',
        '@type': 'FAQPage',
        mainEntity: seo.faqLD.map(item => ({
          '@type': 'Question',
          name: item.q,
          acceptedAnswer: {
            '@type': 'Answer',
            text: item.a
          }
        }))
      };
      document.getElementById('faq-schema').textContent = JSON.stringify(faqLD);
    }

    /* ── APPLY LANGUAGE FUNCTION ── */
    function applyLang() {
      updateSEO(); // PRIMA CHIAMATA — sezione 21.8

      const lang = LangManager.get();
      const texts = LANG[lang];

      // Page Header
      document.getElementById('page-title').textContent = texts.pageTitle;

      // Hero
      document.getElementById('hero-title').textContent = texts.heroTitle;
      document.getElementById('hero-subtitle').textContent = texts.heroSubtitle;

      // Share
      document.getElementById('share-title').textContent = texts.shareTxt;

      // Article
      document.getElementById('art-title').textContent = texts.artTitle;
      document.getElementById('artP1').textContent = texts.artP1;
      document.getElementById('art-h2').textContent = texts.artH2;
      document.getElementById('artP2').textContent = texts.artP2;
      document.getElementById('art-h3').textContent = texts.artH3;
      document.getElementById('artP3').textContent = texts.artP3;
      document.getElementById('art-h4').textContent = texts.artH4;
      document.getElementById('artP4').textContent = texts.artP4;
      document.getElementById('art-h5').textContent = texts.artH5;
      document.getElementById('artP5').textContent = texts.artP5;

      // FAQ
      document.getElementById('faq-title').textContent = texts.faqTitle;
      renderFAQ();

      // Premium
      document.getElementById('premium-title').textContent = texts.premiumTitle;
      document.getElementById('premium-text').textContent = texts.premiumText;
      document.getElementById('premium-price').textContent = texts.premiumPrice;
      document.getElementById('premium-btn-text').textContent = texts.premiumBtn;

      // Footer
      document.getElementById('footer-text').innerHTML = texts.footerText;
      document.getElementById('footer-copyright').textContent = texts.footerCopyright;

      // Update lang buttons
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      const activeLangId = `lang-${lang}`;
      document.getElementById(activeLangId)?.classList.add('active');
    }

    /* ── RENDER FAQ FUNCTION ── */
    function renderFAQ() {
      const lang = LangManager.get();
      const faqItems = LANG[lang]?.faqItems || [];
      const container = document.getElementById('faq-container');

      container.innerHTML = '';
      faqItems.forEach((item, idx) => {
        const faqDiv = document.createElement('div');
        faqDiv.className = 'faq-item';
        faqDiv.innerHTML = `
          <div class="faq-question" onclick="toggleFAQ(this)">
            <span class="faq-question-text">${item.q}</span>
            <span class="faq-toggle">▼</span>
          </div>
          <div class="faq-answer">
            <p>${item.a}</p>
          </div>
        `;
        container.appendChild(faqDiv);
      });
    }

    /* ── TOGGLE FAQ FUNCTION ── */
    function toggleFAQ(element) {
      const parent = element.parentElement;
      parent.classList.toggle('open');
    }

    /* ── PREMIUM GATE FUNCTION ── */
    function requirePremium() {
      const modal = document.getElementById('premium-modal');
      modal?.classList.add('open');
    }

    function isPremium() {
      return localStorage.getItem('myst_premium') === '1';
    }

    /* ── SHARE FUNCTIONS ── */
    function share(platform) {
      const url = 'https://mysticaoracoli.it/pietre-magiche.html';
      const title = LANG[LangManager.get()]?.shareTitle || 'Pietre Magiche';
      const text = LANG[LangManager.get()]?.shareDesc || 'Scopri la guida completa alle pietre magiche';

      const shareLinks = {
        whatsapp: `https://wa.me/?text=${encodeURIComponent(title + ' ' + url)}`,
        telegram: `https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(title)}`,
        facebook: `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`,
        twitter: `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(title)}`,
        copy: null
      };

      if (platform === 'copy') {
        navigator.clipboard.writeText(url).then(() => {
          alert('Link copiato!');
        });
      } else if (shareLinks[platform]) {
        window.open(shareLinks[platform], '_blank');
      }
    }

    /* ── BACK TO TOP ── */
    function updateBackToTop() {
      const btn = document.getElementById('back-to-top');
      if (window.scrollY > 300) {
        btn?.classList.add('show');
      } else {
        btn?.classList.remove('show');
      }
    }

    /* ── INIT SEQUENCE ── */
    function init() {
      // 1. Theme
      ThemeManager.init();

      // 2. Audio
      AudioManager.init();

      // 3. Apply Language & SEO
      applyLang();

      // 4. Event Listeners
      document.getElementById('theme-toggle')?.addEventListener('click', () => ThemeManager.toggle());
      document.getElementById('audio-toggle')?.addEventListener('click', () => AudioManager.toggle());

      // Language buttons
      document.getElementById('lang-it')?.addEventListener('click', () => LangManager.set('it'));
      document.getElementById('lang-en')?.addEventListener('click', () => LangManager.set('en'));
      document.getElementById('lang-es')?.addEventListener('click', () => LangManager.set('es'));

      // Share buttons
      document.getElementById('share-whatsapp')?.addEventListener('click', () => share('whatsapp'));
      document.getElementById('share-telegram')?.addEventListener('click', () => share('telegram'));
      document.getElementById('share-facebook')?.addEventListener('click', () => share('facebook'));
      document.getElementById('share-twitter')?.addEventListener('click', () => share('twitter'));
      document.getElementById('share-copy')?.addEventListener('click', () => share('copy'));

      // Premium modal
      document.getElementById('premium-close')?.addEventListener('click', () => {
        document.getElementById('premium-modal')?.classList.remove('open');
      });

      // Back to top
      window.addEventListener('scroll', updateBackToTop);
      document.getElementById('back-to-top')?.addEventListener('click', (e) => {
        e.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      // Header back button
      document.querySelector('.header-back')?.addEventListener('click', () => {
        window.history.back();
      });
    }

    // Init on DOMContentLoaded
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
