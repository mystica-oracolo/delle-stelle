let _mode = 0; // 0=singola, 1=tre

function selectMode(m){
  _mode = m;
  document.getElementById('tab0').classList.toggle('active', m===0);
  document.getElementById('tab1').classList.toggle('active', m===1);
  document.getElementById('drawBtn').textContent = m===0 ? 'ᚠ Estrai la Runa' : 'ᚱᚢᚾ Estrai le Tre Rune';
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function runaRandom(){
  const r=DB_RUNE[Math.floor(Math.random()*DB_RUNE.length)];
  const rovesciata=r.invertibile && Math.random()<0.35;
  return {...r, rovesciata};
}

function draw(){
  if(_mode===0) drawSingola();
  else drawTre();
}

function drawSingola(){
  const r=runaRandom();
  const domanda=(document.getElementById('runeDomanda').value||'').trim();
  const msg=r.rovesciata && r.rovesciata ? r.rovesciata : r.diritta;

  const versoBadge=r.invertibile
    ? `<span class="verso-badge ${r.rovesciata?'rovesciata':'diritta'}">${r.rovesciata?'▽ Rovesciata':'△ Diritta'}</span>`
    : '';

  const qHtml=domanda ? `<div class="question-shown">❓ "${domanda}"</div>` : '';

  document.getElementById('resultWrap').innerHTML=`
    <div class="rune-single">
      ${qHtml}
      <div class="rune-symbol-big" style="transform:${r.rovesciata?'rotate(180deg)':'none'}">${r.sim}</div>
      <div class="rune-name">${r.nome}</div>
      <div class="rune-trasl">Traslitterazione: ${r.trasl} · ${r.elemento}</div>
      ${versoBadge}
      <div class="rune-parola">✦ ${r.parola}</div>
      <div class="divider"></div>
      <div class="rune-block">
        <h4>📜 Il Messaggio della Runa</h4>
        <p>${msg}</p>
      </div>
      <div class="rune-block">
        <h4>💕 In Amore</h4>
        <p>${r.amore}</p>
      </div>
      <button class="btn-reset" onclick="reset()">🔄 Nuova Estrazione</button>
    </div>
  `;

  show();
  saveHistory('Runologia', r.nome+(r.rovesciata?' (rovesciata)':'')+' — '+r.parola);
}

function drawTre(){
  const pool=[...DB_RUNE];
  const drawn=[];
  for(let i=0;i<3;i++){
    const idx=Math.floor(Math.random()*pool.length);
    const r=pool.splice(idx,1)[0];
    drawn.push({...r, rovesciata:r.invertibile&&Math.random()<0.35});
  }
  const pos=['PASSATO','PRESENTE','FUTURO'];
  const pcol=['#a0a0ff','#ffd700','#ffb347'];
  const domanda=(document.getElementById('runeDomanda').value||'').trim();
  const qHtml=domanda?`<div class="question-shown">❓ "${domanda}"</div>`:'';

  const cards=drawn.map((r,i)=>`
    <div class="spread-card">
      <div class="spread-pos" style="color:${pcol[i]}">${pos[i]}</div>
      <div class="spread-sym" style="transform:${r.rovesciata?'rotate(180deg)':'none'}">${r.sim}</div>
      <div class="spread-rname">${r.nome}</div>
      <div class="spread-verso">${r.rovesciata?'<span style="color:#f87171">▽ Rovesciata</span>':'<span style="color:#4ade80">△ Diritta</span>'}</div>
    </div>`).join('');

  const details=drawn.map((r,i)=>{
    const msg=r.rovesciata&&r.rovesciata?r.rovesciata:r.diritta;
    return `
    <div class="spread-detail">
      <h4>
        <span style="font-size:22px">${r.sim}</span>
        ${r.nome}
        <span style="color:${pcol[i]};font-size:10px;text-transform:uppercase;letter-spacing:1px">${pos[i]}</span>
        <span style="color:#a89bc2;font-size:10px">${r.rovesciata?'· Rovesciata':''}</span>
      </h4>
      <p>${msg}</p>
    </div>`;
  }).join('');

  document.getElementById('resultWrap').innerHTML=`
    ${qHtml}
    <div class="spread-cards">${cards}</div>
    ${details}
    <button class="btn-reset" onclick="reset()" style="margin-top:6px">🔄 Nuova Lettura</button>
  `;

  show();
  saveHistory('Runologia 3 Rune', drawn.map(r=>r.nome+(r.rovesciata?'℞':'')).join(' · '));
}

function show(){
  document.getElementById('runeForm').style.display='none';
  const rw=document.getElementById('resultWrap');
  rw.style.display='block';
  rw.scrollIntoView({behavior:'smooth',block:'start'});
}

function reset(){
  document.getElementById('runeForm').style.display='block';
  document.getElementById('resultWrap').style.display='none';
  document.getElementById('resultWrap').innerHTML='';
  document.getElementById('runeDomanda').value='';
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleCatalog(){
  const w=document.getElementById('catalogWrap');
  w.classList.toggle('open');
  if(w.classList.contains('open') && !document.getElementById('catalogGrid').children.length){
    buildCatalog();
  }
}

function buildCatalog(){
  document.getElementById('catalogGrid').innerHTML=DB_RUNE.map((r,i)=>`
    <div class="catalog-item" onclick="openModal(${i})">
      <span class="sym">${r.sim}</span>
      <div class="nom">${r.nome}</div>
      <div class="par">${r.parola}</div>
    </div>`).join('');
}

function openModal(idx){
  const r=DB_RUNE[idx];
  document.getElementById('modalContent').innerHTML=`
    <span class="modal-rune-sym">${r.sim}</span>
    <div class="modal-rune-title">${r.nome}</div>
    <div class="modal-rune-sub">Traslitt: ${r.trasl} · Elemento: ${r.elemento} · ${r.invertibile?'Invertibile':'Non invertibile'}</div>
    <div style="text-align:center;margin-bottom:14px"><span style="background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.25);padding:3px 14px;border-radius:20px;font-size:12px;color:#ffd700">✦ ${r.parola}</span></div>
    <div class="modal-block">
      <h4>📜 Significato (Diritta)</h4>
      <p>${r.diritta}</p>
    </div>
    ${r.rovesciata?`<div class="modal-block"><h4>🔃 Significato (Rovesciata)</h4><p>${r.rovesciata}</p></div>`:'<div class="modal-block" style="opacity:0.5"><h4>— Non invertibile</h4></div>'}
    <div class="modal-block">
      <h4>💕 In Amore</h4>
      <p>${r.amore}</p>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e){
  if(e.target===document.getElementById('modalOverlay')) closeModalBtn();
}
function closeModalBtn(){
  document.getElementById('modalOverlay').classList.remove('open');
}

function saveHistory(tipo, dettaglio){
  try{
    let h=JSON.parse(localStorage.getItem('myst_v3_history')||'[]');
    h.unshift({tipo,dettaglio,data:new Date().toLocaleString('it-IT'),ts:Date.now()});
    if(h.length>60) h.pop();
    localStorage.setItem('myst_v3_history',JSON.stringify(h));
  }catch(e){}
}
</script>
