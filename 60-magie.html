<style>
/* ── Reset / Variables ── */
:root{
  --bg:#0a0514;--card:#140c24;--purple:#9d4edd;--purple-deep:#2a1748;
  --gold:#d4af37;--gold-dim:#b8860b;--gold-glow:rgba(212,175,55,.4);
  --text:#f4f1fa;--muted:#a89bc2;--radius:18px;--border:rgba(212,175,55,.2);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh}

/* ── Tema Giorno ── */
html.theme-day{
  --bg:#f5f2ed;--card:#ede8df;--text:#2a1748;--muted:#6b5b7f;
  --purple:#7d5ba6;--purple-deep:#6b5b7f;--gold:#c89742;--gold-dim:#a67c52;
  --gold-glow:rgba(200,151,66,.25);--border:#c89742;
}
html.theme-day .top-bar,html.theme-day .page-footer{background:rgba(245,242,237,.94)}
html.theme-day .rituale-card,html.theme-day .seo-section,
html.theme-day .article-section,html.theme-day .faq-item{background:var(--card);border-color:var(--border)}
html.theme-day .rituale-card-title,html.theme-day h1,html.theme-day h2,html.theme-day h3{color:var(--text);text-shadow:none}
html.theme-day .filter-btn{color:var(--muted);border-color:var(--border)}
html.theme-day .filter-btn.active,html.theme-day .filter-btn:hover{background:var(--gold-glow);color:var(--text)}
html.theme-day .btn-icon{background:rgba(200,151,66,.12);border-color:var(--border);color:var(--gold-dim)}

/* ── Skip Link ── */
.skip-link{position:absolute;left:-999px;top:0;background:var(--gold);color:#0a0514;padding:10px 16px;z-index:9999;border-radius:0 0 8px 0;font-family:'Cinzel',serif;font-size:12px}
.skip-link:focus{left:0}

/* ── Sfondo Cosmico ── */
.cosmos{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 50% 0%,#2a174830 0%,transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 80%,#1a073820 0%,transparent 60%),
    radial-gradient(2px 2px at 15% 25%,#fff9 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 75% 15%,#fff7 0%,transparent 100%),
    radial-gradient(2px 2px at 45% 70%,#d4af3780 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 45%,#fff6 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 85%,#fff5 0%,transparent 100%),
    radial-gradient(2px 2px at 60% 35%,#d4af3760 0%,transparent 100%);
  animation:twinkle 14s infinite alternate}
@keyframes twinkle{0%{opacity:.35}50%{opacity:.55}100%{opacity:.45}}

.page-wrap{max-width:480px;margin:0 auto;position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column}

/* ── Header ── */
.page-header{background:rgba(10,5,20,.92);backdrop-filter:blur(14px);padding:14px 16px;padding-top:max(14px,calc(14px + env(safe-area-inset-top,0px)));border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.btn-back{width:34px;height:34px;border-radius:50%;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);color:var(--gold);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none;transition:all .25s ease}
.btn-back::before{content:"‹"}
.btn-back:hover{background:rgba(212,175,55,.2)}
.header-controls{display:flex;gap:8px}
.btn-icon{width:34px;height:34px;border-radius:50%;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);color:var(--gold);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s ease}
.btn-icon:hover{background:rgba(212,175,55,.2)}
.btn-icon:focus-visible,.btn-back:focus-visible,button:focus-visible,a:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.page-title{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);letter-spacing:1.5px;text-align:center;margin-top:10px}
.lang-switch{display:flex;justify-content:center;gap:6px;margin-top:8px}
.btn-lang{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.5px;padding:4px 10px;border-radius:14px;border:1px solid rgba(212,175,55,.3);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.btn-lang.active,.btn-lang:hover{border-color:var(--gold);background:rgba(212,175,55,.15);color:var(--gold)}

/* ── Intro ── */
.intro{text-align:center;padding:22px 16px 10px}
.intro-icon{font-size:52px;margin-bottom:8px;filter:drop-shadow(0 0 18px rgba(157,78,221,.5));animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.intro h1{font-family:'Cinzel',serif;font-size:19px;color:var(--gold);letter-spacing:1.5px;margin-bottom:6px}
.intro p{font-size:13.5px;color:var(--muted);line-height:1.6}

/* ── Filtri ── */
.filter-bar{display:flex;gap:6px;padding:10px 16px;flex-wrap:wrap}
.filter-btn{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5px;padding:5px 11px;border-radius:16px;border:1px solid rgba(157,78,221,.35);background:transparent;color:var(--muted);cursor:pointer;transition:all .25s ease;touch-action:manipulation}
.filter-btn:hover,.filter-btn.active{border-color:var(--purple);background:rgba(157,78,221,.15);color:#c79eff}

/* ── Counter ── */
.results-count{padding:0 16px 6px;font-family:'Cinzel',serif;font-size:10px;color:var(--muted);letter-spacing:1px}

/* ── Cards ── */
.cards-list{padding:0 16px;flex:1;content-visibility:auto}
.rituale-card{background:rgba(26,23,38,.9);border:1px solid rgba(157,78,221,.2);border-radius:14px;padding:16px;cursor:pointer;transition:box-shadow .3s ease,border-color .3s ease;position:relative;margin-bottom:12px}
.rituale-card:hover{box-shadow:0 6px 18px rgba(157,78,221,.15);border-color:rgba(157,78,221,.45)}
.rituale-card-header{display:flex;justify-content:space-between;align-items:center;gap:8px}
.rituale-num{font-family:'Cinzel',serif;font-size:10px;color:var(--purple);letter-spacing:1px;min-width:24px}
.rituale-card-title{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:#f0e6ff;flex:1;line-height:1.35}
.rituale-toggle{font-size:12px;color:var(--purple);flex-shrink:0;transition:transform .25s ease}
.rituale-card.open .rituale-toggle{transform:rotate(180deg)}
.rituale-content{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1);color:#d1c9e8;line-height:1.75;font-size:13.5px}
html.theme-day .rituale-content{color:var(--text)}
.rituale-card.open .rituale-content{max-height:2000px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08);margin-top:10px}
.rituale-content h4{color:var(--purple);margin:12px 0 5px;font-size:13px;font-family:'Cinzel',serif;letter-spacing:.5px;border-left:2px solid var(--gold);padding-left:8px}
.rituale-content p{margin:4px 0}
.rituale-content ul{padding-left:18px;margin:5px 0}
.rituale-content li{margin-bottom:4px}

/* ── Share ── */
.share-section{padding:14px 16px 4px;text-align:center;position:relative}
.btn-share{font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;padding:10px 22px;border-radius:22px;border:1px solid var(--border);background:rgba(212,175,55,.08);color:var(--gold);cursor:pointer;transition:all .25s ease}
.btn-share:hover{background:rgba(212,175,55,.18)}
.share-popup{margin-top:10px;display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
.share-btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.4px;padding:8px 12px;border-radius:16px;border:1px solid var(--border);background:rgba(20,12,36,.6);color:var(--text);text-decoration:none;cursor:pointer;transition:all .25s ease}
.share-btn:hover{border-color:var(--gold)}

/* ── Article ── */
.article-section{margin:22px 16px 0;padding:18px;background:rgba(10,5,20,.5);border-radius:var(--radius);border:1px solid rgba(42,23,72,.5)}
.article-section h2{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);letter-spacing:.8px;margin-bottom:12px;line-height:1.4}
.article-section h3{font-family:'Cinzel',serif;font-size:13px;color:#c79eff;letter-spacing:.5px;margin:16px 0 8px}
.article-section p{font-size:13.5px;color:var(--muted);line-height:1.8;margin-bottom:10px}
.article-section img{width:100%;border-radius:14px;margin:14px 0;display:block}
.article-links{display:flex;flex-wrap:wrap;gap:6px;margin:16px 0}
.article-links a{font-family:'Cinzel',serif;font-size:9px;color:var(--muted);letter-spacing:.6px;text-decoration:none;border:1px solid rgba(42,23,72,.6);border-radius:20px;padding:5px 11px;transition:all .25s ease}
.article-links a:hover{border-color:rgba(212,175,55,.4);color:var(--gold)}
.cta-explore{display:block;text-align:center;margin-top:14px;padding:12px;border-radius:22px;background:linear-gradient(135deg,#9d4edd,#d4af37);color:#0d0b14;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;font-weight:700;text-decoration:none;transition:opacity .25s ease}
.cta-explore:hover{opacity:.9}

/* ── FAQ ── */
.faq-section{margin:20px 16px 0}
.faq-title{font-family:'Cinzel',serif;font-size:15px;color:var(--gold);letter-spacing:1px;margin-bottom:10px;text-align:center}
.faq-item{background:rgba(20,12,36,.5);border:1px solid rgba(42,23,72,.5);border-radius:12px;margin-bottom:8px;overflow:hidden}
.faq-question{width:100%;background:none;border:none;color:var(--text);font-family:'Crimson Pro',serif;font-size:13.5px;font-weight:600;padding:13px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;text-align:left}
.faq-icon{color:var(--gold);font-size:15px;flex-shrink:0}
.faq-answer{padding:0 14px 14px}
.faq-answer p{font-size:13px;color:var(--muted);line-height:1.7}

/* ── Footer ── */
.page-footer{text-align:center;padding:18px 12px;font-size:10px;color:var(--muted);border-top:1px solid rgba(42,23,72,.4);margin-top:18px}
.footer-links{display:flex;justify-content:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.footer-links a{color:var(--muted);text-decoration:none;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5px}
.footer-links a:hover{color:var(--gold)}
.footer-disclaimer{margin-top:6px;opacity:.7;line-height:1.5;padding:0 10px}

/* ── SEO Section legacy links ── */
.seo-section{margin:20px 16px 0;padding:16px;background:rgba(10,5,20,.5);border-radius:14px;border:1px solid rgba(42,23,72,.5)}
.seo-section h2{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:1px;margin-bottom:8px}
.seo-section p{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:6px}

@media(min-width:481px){.page-wrap{border-left:1px solid rgba(212,175,55,.08);border-right:1px solid rgba(212,175,55,.08)}}
</style>

const DATA_IT = [
  {id:1,title:"Il Cerchio di Sale",badge:"Protezione",cat:"protection",free:true,html:`<h4>📜 Origine Storica</h4><ul><li>Magia popolare europea, alchimia medievale, grimori rinascimentali</li><li>Il sale era considerato "incorruttibile", capace di respingere impurità, malattie e influssi ostili</li></ul><h4>🕯️ Occorrente & Momento</h4><ul><li>Sale grosso naturale, candela bianca, ciotola, abiti chiari</li><li>Luna calante, tramonto, sabato. Evitare temporali o vento forte</li></ul><h4>📐 Procedura</h4><p>Disporre il sale in senso orario partendo da est, senza interruzioni. Accendere la candela e restare immobili 7 minuti. Formula tradizionale: <em>"Nessuna ombra attraversi questo confine."</em></p><h4>🧠 Significato</h4><p>Funziona come tecnica meditativa e delimitazione mentale. Crea un confine psicologico di sicurezza e concentrazione.</p>`},
  {id:2,title:"Purificazione con la Salvia",badge:"Purificazione",cat:"purification",free:true,html:`<h4>📜 Origine</h4><p>Tradizioni indigene nordamericane e diffusione esoterica occidentale. Il fumo aveva funzione purificatrice, antisettica e spirituale.</p><h4>🌿 Occorrente & Momento</h4><ul><li>Fascio di salvia bianca, ciotola (terracotta/abalone), piuma o mano</li><li>Alba, dopo litigi, malattie o cambio casa</li></ul><h4>🌬️ Procedura</h4><p>Aprire una finestra. Accendere la salvia, spegnere la fiamma lasciando brace e fumo. Camminare lentamente in senso orario, indirizzando il fumo negli angoli, dietro porte e sotto finestre.</p><h4>🗣️ Formula</h4><p><em>"Che il pesante si dissolva e rimanga solo la pace."</em></p>`},
  {id:3,title:"Formula contro il Malocchio",badge:"Folklore Italiano",cat:"protection",free:true,html:`<h4>📜 Origine</h4><p>Folklore del Sud Italia (Campania, Sicilia, Calabria, Puglia). Tramandata oralmente, spesso solo la notte di Natale, da donne anziane.</p><h4>🥣 Occorrente & Giorni</h4><ul><li>Piatto bianco, acqua, olio d'oliva</li><li>Martedì o Venerdì. Mai domenica</li></ul><h4>💧 Procedura</h4><p>Riempire il piatto d'acqua, fare il segno della croce, lasciare cadere tre gocce d'olio. Osservare: se l'olio resta compatto non c'è malocchio, se si disperde indica presenza simbolica di invidia.</p><h4>👥 Aspetto Antropologico</h4><p>Serviva a rassicurare, calmare l'ansia e dare un senso logico a sfortune improvvise.</p>`},
  {id:4,title:"Il Nodo di Iside (Tyet)",badge:"Antico Egitto",cat:"protection",free:false,html:`<h4>📜 Origine</h4><p>Antico Egitto. Associato alla dea Iside. Il Tyet era chiamato "Nodo del Sangue" o "Nodo della Vita".</p><h4>🔮 Occorrente & Momento</h4><ul><li>Pietra rossa, diaspro, corniola, lino rosso</li><li>Viaggi, gravidanza, malattia, riti funerari</li></ul><h4>📐 Procedura</h4><p>L'amuleto veniva lavato con acqua profumata, esposto al sole nascente e legato vicino al petto.</p><h4>🗣️ Formula & Simbolismo</h4><p>Il rosso simboleggiava vita, sangue ed energia difensiva. Protezione divina invocata.</p>`},
  {id:5,title:"Il Ferro di Cavallo",badge:"Europa Medievale",cat:"protection",free:false,html:`<h4>📜 Origine</h4><p>Europa medievale. Il ferro era considerato repellente per streghe, spiriti e fate ostili.</p><h4>🛡️ Occorrente & Posizione</h4><ul><li>Ferro di cavallo usato, chiodi in ferro</li><li>Punte verso l'alto, sopra la porta principale</li><li>Sabato mattina</li></ul><h4>📐 Procedura</h4><p>Alcuni aggiungevano 7 chiodi o un ramo d'ulivo vicino. Tradizionalmente fissato con intenzione di protezione.</p><h4>👥 Significato</h4><p>Protezione domestica e prosperità. Il gesto materializzava il confine tra interno sicuro ed esterno incerto.</p>`},
  {id:6,title:"Esorcismo dell'Acqua e del Sale",badge:"Tardo Medioevo",cat:"purification",free:false,html:`<h4>📜 Origine</h4><p>Tardo medioevo cristiano, diffuso in monasteri e rituali popolari.</p><h4>💧 Occorrente & Momento</h4><ul><li>Sale, acqua sorgiva, ciotola d'argento/ceramica, candela</li><li>Dopo lutti, malattie, litigi, incubi frequenti</li></ul><h4>📐 Procedura</h4><p>Il sale veniva versato nell'acqua pronunciando formule latine. Si aspergevano muri, porte, finestre e letto.</p><h4>👥 Simbolismo</h4><p>L'acqua purifica, il sale conserva e protegge. Rito di pulizia simbolica post-trauma.</p>`},
  {id:7,title:"Bagno di Purificazione all'Issoppo",badge:"Tradizione Biblica",cat:"purification",free:false,html:`<h4>📜 Origine</h4><p>Tradizioni bibliche e mediterranee. L'issoppo compare nei testi sacri come pianta purificatrice.</p><h4>🌿 Occorrente & Procedura</h4><ul><li>Issoppo essiccato, sale marino, acqua calda, candela bianca</li><li>Lasciare in infusione, versare nell'acqua del bagno, restare immersi 15 min</li></ul><h4>⚠️ Regola Antica</h4><p>Non parlare durante il bagno. "Lavare via" il peso emotivo.</p>`},
  {id:8,title:"Il Quadrato del Sator",badge:"Antica Roma",cat:"protection",free:false,html:`<h4>📜 Origine</h4><p>Antica Roma. Trovato su muri, amuleti, caserme e monasteri. Palindromo famoso.</p><h4>📝 Il Quadrato</h4><p style="text-align:center;font-family:monospace;background:rgba(0,0,0,.3);padding:10px;border-radius:8px;margin:8px 0">SATOR<br>AREPO<br>TENET<br>OPERA<br>ROTAS</p><h4>🛡️ Uso Tradizionale</h4><p>Scritto su carta, pergamena o legno. Portato durante viaggi, battaglie, traversate. Proteggeva da incendi, incidenti, malattie.</p>`},
  {id:9,title:"Sigillo di Salomone",badge:"Magia Cerimoniale",cat:"protection",free:false,html:`<h4>📜 Origine</h4><p>Magia cerimoniale medievale. Associato alla <em>Key of Solomon</em>.</p><h4>🖋️ Materiali & Preparazione</h4><ul><li>Pergamena vergine, inchiostro nero, candela blu, incenso</li><li>Praticante digiunava leggermente, evitava rumori, lavorava in silenzio</li></ul><h4>📐 Procedura</h4><p>Il simbolo tracciato lentamente. Ogni linea: equilibrio, dominio della mente, ordine sul caos. Rivolti verso est.</p><h4>🧠 Scopo</h4><p>Protezione mentale e disciplina spirituale.</p>`},
  {id:10,title:"L'Amuleto dell'Aglio",badge:"Folklore Europeo",cat:"protection",free:false,html:`<h4>📜 Origine</h4><p>Folklore europeo e mediterraneo. Considerato antisettico, protettivo, scaccia-spiriti.</p><h4>🧄 Occorrente & Posizione</h4><ul><li>Tre teste d'aglio, spago naturale rosso</li><li>Cucina, porta d'ingresso, finestra</li></ul><h4>📅 Momento & Curiosità</h4><p>Luna nuova o raccolto estivo. Nel folklore proteggeva da vampiri, peste e "malocchio".</p>`},
  {id:11,title:"Il Barattolo del Denaro",badge:"Prosperità",cat:"prosperity",free:false,html:`<h4>📜 Origine</h4><p>Magia popolare europea, hoodoo americano, tradizioni contadine. Simbolo di ricchezza e sicurezza invernale.</p><h4>🪙 Occorrente & Momento</h4><ul><li>Barattolo vetro, monete, cannella, alloro, zucchero, calamita, candela verde</li><li>Luna crescente, giovedì, prime ore della sera</li></ul><h4>📐 Procedura</h4><p>Inserire lentamente gli oggetti. Formula: <em>"Che ciò che mi serve trovi la strada verso di me."</em></p><h4>📍 Dove Tenerlo</h4><p>Vicino all'ingresso, lavoro o documenti. Mai a terra.</p>`},
  {id:12,title:"Incantesimo del Nodo della Fortuna",badge:"Destino Favorevole",cat:"prosperity",free:false,html:`<h4>📜 Origine</h4><p>Tradizioni celtiche, magia marinaresca, folklore nordico. Il nodo fissa un'intenzione e sigilla una promessa.</p><h4>🪢 Procedura</h4><p>3 nodi lenti su nastro verde/dorato: 1° opportunità, 2° stabilità, 3° successo. Visualizzare la scena positiva a ogni nodo.</p><h4>🗣️ Formula</h4><p><em>"Con il primo nodo apro la via. Con il secondo la fortuna resta. Con il terzo il cammino si compie."</em></p>`},

  {id:30,title:"Invocazione di Erzulie",badge:"Vodou & Archetipo",cat:"love",free:false,html:`<h4>📜 Origine</h4><p>Lwa del Vodou haitiano, sincretizzata con figure mariane.</p><h4>🌸 Procedura</h4><p>Preparare altare domestico, invocazione cantata/recitata, offerta simbolica, momento di contemplazione.</p><h4>📅 Tempistica</h4><p>Cerimonie o crisi emotiva. Mediazione tramite archetipi femminili.</p>`},
  {id:31,title:"Artemisia per i Sogni",badge:"Sogno & Memoria",cat:"dreams",free:false,html:`<h4>📜 Origine</h4><p>Fitoterapia europea antica. Artemisia vulgaris associata a luna e dimensione notturna.</p><h4>🌿 Procedura</h4><p>Tisana leggera o sacchetto cuscino. Momento di quiete pre-sonno. Ripetere intenzione di ricordare.</p><h4>🧠 Funzione</h4><p>Dispositivo di induzione attentiva al sogno tramite autosuggestione e ritualizzazione del sonno.</p>`},

  {id:35,title:"Incenso d'Olibano",badge:"Sacralità Antica",cat:"purification",free:false,html:`<h4>📜 Origine</h4><p>Egitto, Grecia, Roma, liturgie cristiane. Associato a purificazione.</p><h4>🌬️ Procedura</h4><p>Resina su carbone, diffondere fumo, concentrare su respiro e odore.</p><h4>🧠 Funzione</h4><p>Modulatore sensoriale per stati di attenzione ridotta e introspezione.</p>`},
  {id:36,title:"Bagno di Sale Marino",badge:"Decontaminazione Simbolica",cat:"purification",free:false,html:`<h4>📜 Origine</h4><p>Universale: conservazione, purificazione, protezione.</p><h4>🛁 Procedura</h4><p>Sciogliere sale, immersione, quiete senza stimoli, uscita lenta.</p><h4>📅 Tempistica</h4><p>Dopo giornate intense. Decontaminazione simbolica di stress e fatica.</p>`},
  {id:37,title:"Incantesimo del Silenzio",badge:"Disciplina Attentiva",cat:"mind",free:false,html:`<h4>📜 Origine</h4><p>Monachesimo, ascetismo, pratiche sciamaniche.</p><h4>🤫 Procedura</h4><p>Astensione verbale totale, riduzione stimoli, osservazione pensieri non verbalizzati.</p><h4>📅 Tempistica</h4><p>30 min - ore. Deprivazione sensoriale linguistica per consapevolezza introspettiva.</p>`},
  {id:38,title:"Connessione con gli Antenati",badge:"Memoria Generazionale",cat:"mind",free:false,html:`<h4>📜 Origine</h4><p>Culti romani (lares), tradizioni africane, memorie familiari.</p><h4>🕯️ Procedura</h4><p>Accendere luce, momento ricordo/narrazione, offerta simbolica, chiusura ringraziamento.</p><h4>📅 Tempistica</h4><p>Notte o ricorrenze. Sistema di continuità identitaria tra generazioni.</p>`},
  {id:39,title:"Scrittura Automatica Focalizzata",badge:"Flusso Inconscio",cat:"dreams",free:false,html:`<h4>📜 Origine</h4><p>Spiritismo ottocentesco (Kardec), scrittura surrealista.</p><h4>📝 Procedura</h4><p>Scrivere senza pianificazione, ridurre controllo cosciente, flusso continuo, lettura successiva.</p><h4>📅 Tempistica</h4><p>10-20 min. Accesso facilitato a contenuti cognitivi non filtrati.</p>`},
  {id:40,title:"Consacrazione dello Spazio Sacro",badge:"Delimitazione Rituale",cat:"purification",free:false,html:`<h4>📜 Origine</h4><p>Tempulum romano, mandala, cerchi magici medievali.</p><h4>🕯️ Procedura</h4><p>Pulizia area, definizione confini simbolici, oggetti significativi, uso esclusivo.</p><h4>📅 Tempistica</h4><p>Inizio nuove pratiche. Segmentazione spazio funzionale per concentrazione.</p>`},
  {id:41,title:"Occhio di Tigre",badge:"Concentrazione",cat:"mind",free:false,html:`<h4>📜 Origine</h4><p>Sincretismo mineralogico ottocentesco, occultismo, new age.</p><h4>🪨 Procedura</h4><p>Tenere in mano prima attività impegnativa, "riscaldare" nel palmo, usare ripetutamente.</p><h4>🧠 Funzione</h4><p>Ancoraggio attentivo: correlazione stabile tra stimolo tattile e sicurezza psicologica.</p>`},
  {id:42,title:"Candela Gialla",badge:"Chiarezza Cognitiva",cat:"mind",free:false,html:`<h4>📜 Origine</h4><p>Occultismo moderno, ermetismo XIX-XX sec. Colore → stato psicologico.</p><h4>🕯️ Procedura</h4><p>Accendere, focalizzare su fiamma, associare luce a chiarezza, spegnere controllato.</p><h4>🧠 Funzione</h4><p>Priming cognitivo visivo per attività analitiche.</p>`},
  {id:43,title:"Rosmarino sulle Tempie",badge:"Memoria & Lucidità",cat:"mind",free:false,html:`<h4>📜 Origine</h4><p>Medicina mediterranea, Grecia/Roma. Simbolo di memoria.</p><h4>🌿 Procedura</h4><p>Applicazione lieve tempie o inalazione aroma. Respirazione lenta.</p><h4>📅 Tempistica</h4><p>Prima studio/mnemotecniche. Stimolazione olfattiva per potenziamento attentivo.</p>`},
  {id:44,title:"Ancoraggio del Coraggio",badge:"Risposta Somatica",cat:"mind",free:false,html:`<h4>📜 Origine</h4><p>Memoria emotiva sciamanica, formalizzata in psicologia (NLP).</p><h4>💪 Procedura</h4><p>Richiamare ricordo sicurezza, associare a gesto fisico (pugno), ripetere per stabilizzare.</p><h4>🧠 Funzione</h4><p>Condizionamento somatico intenzionale per attivazione in situazioni difficili.</p>`},
  {id:45,title:"Taglio dei Rami Secchi",badge:"Rimozione Ostacoli",cat:"purification",free:false,html:`<h4>📜 Origine</h4><p>Simbolismo agricolo, meditazioni guidate moderne.</p><h4>🌳 Procedura</h4><p>Visualizzare problemi come "rami secchi", simulare potatura, percepire alleggerimento.</p><h4>🧠 Funzione</h4><p>Metafora operativa di ristrutturazione cognitiva.</p>`},
  {id:46,title:"Fumigazione di Menta Piperita",badge:"Attivazione Mentale",cat:"mind",free:false,html:`<h4>📜 Origine</h4><p>Erboristeria mediterranea/araba. Pianta rinfrescante/stimolante.</p><h4>🍃 Procedura</h4><p>Bruciatura leggera o diffusione aroma, inalazione consapevole.</p><h4>📅 Tempistica</h4><p>Mattino/stanchezza. Attivazione fisiologica lieve tramite olfatto.</p>`},
  {id:47,title:"Radice di Zenzero",badge:"Azione & Decisione",cat:"mind",free:false,html:`<h4>📜 Origine</h4><p>Ayurveda, medicina cinese. Tonico riscaldante.</p><h4>🌱 Procedura</h4><p>Portare con sé, masticare/annusare, associare a intenzioni di movimento.</p><h4>🧠 Funzione</h4><p>Simbolo somatico di attivazione metabolica e mentale.</p>`},
  {id:48,title:"Terra sotto i Piedi",badge:"Earthing Rituale",cat:"purification",free:false,html:`<h4>📜 Origine</h4><p>Culture agrarie, rituali sciamanici, reinterpretazione moderna.</p><h4>👣 Procedura</h4><p>Camminata scalza su suolo naturale, attenzione contatto, respirazione lenta.</p><h4>🧠 Funzione</h4><p>Riconnessione sensoriale con ambiente naturale.</p>`},
  {id:49,title:"Scudo Mentale Visivo",badge:"Protezione Ansia",cat:"protection",free:false,html:`<h4>📜 Origine</h4><p>Immaginazione sciamanica, meditazioni moderne.</p><h4>🛡️ Procedura</h4><p>Visualizzare barriera luminosa, definire confini, rafforzare con respiro, richiamare in stress.</p><h4>🧠 Funzione</h4><p>Regolazione ansia tramite imagery protettiva.</p>`},
  {id:50,title:"Consacrazione della Penna",badge:"Successo Strumentale",cat:"prosperity",free:false,html:`<h4>📜 Origine</h4><p>Benedizione strumenti in mestieri/religioni.</p><h4>🖋️ Procedura</h4><p>Passare vicino a fuoco/luce, associare a successo, uso esclusivo per attività importanti.</p><h4>🧠 Funzione</h4><p>Sacralizzazione funzionale che aumenta valore percepito dello strumento.</p>`},
  {id:51,title:"Sale nei Quattro Angoli",badge:"Stabilità Spaziale",cat:"protection",free:false,html:`<h4>📜 Origine</h4><p>Grecia/Roma, tradizione ebraica, folklore medievale.</p><h4>🧂 Procedura</h4><p>Deporre sale nei 4 punti estremi stanza/casa in silenzio con intenzione di stabilizzazione.</p><h4>📅 Tempistica</h4><p>Inizio ciclo/cambiamento. Marcatura simbolica per ristabilire ordine percepito.</p>`},
  {id:52,title:"Campanello d'Ottone",badge:"Rottura Stagnazione",cat:"purification",free:false,html:`<h4>📜 Origine</h4><p>Campane tibetane, Europa medievale, sciamanesimo. Dispositivo di interruzione percettiva.</p><h4>🔔 Procedura</h4><p>Suonare in ogni stanza lentamente, lasciare decadere suono, respirazione lenta.</p><h4>📅 Tempistica</h4><p>Dopo conflitti/stagnazione. Discontinuità acustica per riorganizzazione cognitiva.</p>`},
  {id:53,title:"Lavanda sugli Stipiti",badge:"Soglia di Pace",cat:"protection",free:false,html:`<h4>📜 Origine</h4><p>Erboristeria romana/mediterranea (lavare → purificare).</p><h4>🌸 Procedura</h4><p>Applicare olio/rametti su stipiti, movimento interno/esterno, associazione "entrata di pace".</p><h4>📅 Tempistica</h4><p>Primavera/cambiamenti. Pratica di soglia tra interno sicuro ed esterno incerto.</p>`},
  {id:54,title:"Piantumazione Rituale",badge:"Crescita Intenzionale",cat:"prosperity",free:false,html:`<h4>📜 Origine</h4><p>Mesopotamia, Mediterraneo, Americhe precolombiane. Trasposizione intenzionale agricola.</p><h4>🌱 Procedura</h4><p>Tenere seme con intenzione, piantare lento, irrigare, osservare crescita come metafora.</p><h4>📅 Tempistica</h4><p>Primavera/inizio progetti. Metafora operativa di cambiamento graduale.</p>`},
  {id:55,title:"Benedizione del Focolare",badge:"Coesione Domestica",cat:"protection",free:false,html:`<h4>📜 Origine</h4><p>Celtiche, romane, contadine europee. Centro simbolico sopravvivenza.</p><h4>🔥 Procedura</h4><p>Accendere/osservare fuoco, silenzio/ringraziamento, gesto protezione, chiusura.</p><h4>📅 Tempistica</h4><p>Inverno/riunioni. Rito di coesione sociale e stabilità domestica.</p>`},
  {id:56,title:"Acqua di Sole",badge:"Carica Naturale",cat:"purification",free:false,html:`<h4>📜 Origine</h4><p>Pratica rurale diffusa. Esposizione simbolica alla luce.</p><h4>💧 Procedura</h4><p>Esposizione contenitore trasparente per ore, uso per irrigazione/lavaggi, intenzione mentale.</p><h4>📅 Tempistica</h4><p>Giorni soleggiati. Trasformazione simbolica tramite ciclo luce/tempo.</p>`},
  {id:57,title:"Pietra Forata",badge:"Visione & Soglia",cat:"protection",free:false,html:`<h4>📜 Origine</h4><p>Europa settentrionale/mediterranea. Hag Stone / Odin Stone.</p><h4>🕳️ Procedura</h4><p>Raccogliere in natura, pulire, appendere a porte/finestre, guardare attraverso foro.</p><h4>📅 Tempistica</h4><p>Installazione permanente. Oggetto liminale tra visibile e invisibile.</p>`},
  {id:58,title:"Fumigazione di Pino e Abete",badge:"Sanificazione Simbolica",cat:"purification",free:false,html:`<h4>📜 Origine</h4><p>Nordiche, alpine. Purificazione ambientale e medica.</p><h4>🌲 Procedura</h4><p>Bruciare aghi lentamente, diffondere fumo in angoli stanza.</p><h4>📅 Tempistica</h4><p>Dopo malattie/isolamento. Sanificazione simbolica dell'ambiente.</p>`},
  {id:59,title:"Benvenuto agli Uccelli",badge:"Reciprocità Ecologica",cat:"purification",free:false,html:`<h4>📜 Origine</h4><p>Asia, Europa rurale, culture animiste. Gesto di reciprocità naturale.</p><h4>🕊️ Procedura</h4><p>Deposizione cibo su davanzale, osservazione senza interferenza, ripetizione.</p><h4>📅 Tempistica</h4><p>Mattino/stagioni fredde. Atto di reciprocità simbolica uomo-ambiente.</p>`},
  {id:60,title:"Congedo delle Energie",badge:"Chiusura Rituale",cat:"purification",free:false,html:`<h4>📜 Origine</h4><p>Formula chiusura sistemi medievali/neopagani. "De-attivazione" rito.</p><h4>🚪 Procedura</h4><p>Silenzio, dichiarazione verbale: <em>"Chiuso ciò che è stato aperto, senza danno e senza legame"</em>, riorientamento quotidiano.</p><h4>📅 Tempistica</h4><p>Fine pratica. Reintegrazione cognitiva nella normalità.</p>`}

  {id:1,title:"The Salt Circle",badge:"Protection",cat:"protection",free:true,html:`<h4>📜 Historical Origin</h4><ul><li>European folk magic, medieval alchemy, Renaissance grimoires</li><li>Salt was considered "incorruptible," able to repel impurities, illness and hostile influences</li></ul><h4>🕯️ Materials & Timing</h4><ul><li>Coarse natural salt, white candle, bowl, light-colored clothing</li><li>Waning moon, sunset, Saturday. Avoid storms or strong wind</li></ul><h4>📐 Procedure</h4><p>Lay the salt clockwise starting from the east, without interruption. Light the candle and stay still for 7 minutes. Traditional formula: <em>"Let no shadow cross this boundary."</em></p><h4>🧠 Meaning</h4><p>Works as a meditative technique and mental delimitation. Creates a psychological boundary of safety and focus.</p>`},
  {id:2,title:"Sage Purification",badge:"Purification",cat:"purification",free:true,html:`<h4>📜 Origin</h4><p>Native North American traditions and Western esoteric adoption. The smoke had a purifying, antiseptic and spiritual function.</p><h4>🌿 Materials & Timing</h4><ul><li>Bundle of white sage, bowl (clay/abalone shell), feather or hand</li><li>Dawn, after arguments, illness or moving house</li></ul><h4>🌬️ Procedure</h4><p>Open a window. Light the sage, blow out the flame leaving embers and smoke. Walk slowly clockwise, directing the smoke into corners, behind doors and under windows.</p><h4>🗣️ Formula</h4><p><em>"May the heaviness dissolve, and only peace remain."</em></p>`},
  {id:3,title:"Formula Against the Evil Eye",badge:"Italian Folklore",cat:"protection",free:true,html:`<h4>📜 Origin</h4><p>Folklore of Southern Italy (Campania, Sicily, Calabria, Puglia). Passed down orally, often only on Christmas night, by elderly women.</p><h4>🥣 Materials & Days</h4><ul><li>White plate, water, olive oil</li><li>Tuesday or Friday. Never Sunday</li></ul><h4>💧 Procedure</h4><p>Fill the plate with water, make the sign of the cross, let three drops of oil fall in. Observe: if the oil stays compact there is no evil eye, if it disperses it symbolically signals the presence of envy.</p><h4>👥 Anthropological Note</h4><p>It served to reassure, calm anxiety and give a logical sense to sudden misfortune.</p>`},
  {id:4,title:"The Knot of Isis (Tyet)",badge:"Ancient Egypt",cat:"protection",free:false,html:`<h4>📜 Origin</h4><p>Ancient Egypt. Associated with the goddess Isis. The Tyet was called the "Knot of Blood" or "Knot of Life."</p><h4>🔮 Materials & Timing</h4><ul><li>Red stone, jasper, carnelian, red linen</li><li>Travel, pregnancy, illness, funerary rites</li></ul><h4>📐 Procedure</h4><p>The amulet was washed with scented water, exposed to the rising sun and tied near the chest.</p><h4>🗣️ Formula & Symbolism</h4><p>Red symbolized life, blood and defensive energy. Divine protection was invoked.</p>`},
  {id:5,title:"The Horseshoe",badge:"Medieval Europe",cat:"protection",free:false,html:`<h4>📜 Origin</h4><p>Medieval Europe. Iron was believed to repel witches, spirits and hostile fae.</p><h4>🛡️ Materials & Placement</h4><ul><li>A used horseshoe, iron nails</li><li>Points facing upward, above the main door</li><li>Saturday morning</li></ul><h4>📐 Procedure</h4><p>Some added 7 nails or an olive branch nearby. Traditionally fixed with protective intent.</p><h4>👥 Meaning</h4><p>Household protection and prosperity. The gesture materialized the boundary between the safe interior and the uncertain outside.</p>`},
  {id:6,title:"Exorcism of Water and Salt",badge:"Late Middle Ages",cat:"purification",free:false,html:`<h4>📜 Origin</h4><p>Late medieval Christian tradition, widespread in monasteries and popular ritual.</p><h4>💧 Materials & Timing</h4><ul><li>Salt, spring water, silver/ceramic bowl, candle</li><li>After bereavement, illness, quarrels, frequent nightmares</li></ul><h4>📐 Procedure</h4><p>The salt was poured into the water while reciting Latin formulas. Walls, doors, windows and the bed were sprinkled.</p><h4>👥 Symbolism</h4><p>Water purifies, salt preserves and protects. A rite of symbolic cleansing after trauma.</p>`},
  {id:7,title:"Hyssop Purification Bath",badge:"Biblical Tradition",cat:"purification",free:false,html:`<h4>📜 Origin</h4><p>Biblical and Mediterranean traditions. Hyssop appears in sacred texts as a purifying plant.</p><h4>🌿 Materials & Procedure</h4><ul><li>Dried hyssop, sea salt, hot water, white candle</li><li>Leave to infuse, pour into bathwater, stay immersed for 15 minutes</li></ul><h4>⚠️ Ancient Rule</h4><p>Do not speak during the bath. "Wash away" the emotional weight.</p>`},
  {id:8,title:"The Sator Square",badge:"Ancient Rome",cat:"protection",free:false,html:`<h4>📜 Origin</h4><p>Ancient Rome. Found on walls, amulets, barracks and monasteries. A famous palindrome.</p><h4>📝 The Square</h4><p style="text-align:center;font-family:monospace;background:rgba(0,0,0,.3);padding:10px;border-radius:8px;margin:8px 0">SATOR<br>AREPO<br>TENET<br>OPERA<br>ROTAS</p><h4>🛡️ Traditional Use</h4><p>Written on paper, parchment or wood. Carried during journeys, battles, sea crossings. It was believed to protect from fires, accidents, illness.</p>`},
  {id:9,title:"Solomon's Seal",badge:"Ceremonial Magic",cat:"protection",free:false,html:`<h4>📜 Origin</h4><p>Medieval ceremonial magic. Associated with the <em>Key of Solomon</em>.</p><h4>🖋️ Materials & Preparation</h4><ul><li>Virgin parchment, black ink, blue candle, incense</li><li>The practitioner fasted lightly, avoided noise, worked in silence</li></ul><h4>📐 Procedure</h4><p>The symbol was traced slowly. Each line: balance, mastery of the mind, order over chaos. Facing east.</p><h4>🧠 Purpose</h4><p>Mental protection and spiritual discipline.</p>`},
  {id:10,title:"The Garlic Amulet",badge:"European Folklore",cat:"protection",free:false,html:`<h4>📜 Origin</h4><p>European and Mediterranean folklore. Considered antiseptic, protective, spirit-repelling.</p><h4>🧄 Materials & Placement</h4><ul><li>Three garlic bulbs, natural red string</li><li>Kitchen, front door, window</li></ul><h4>📅 Timing & Curiosities</h4><p>New moon or summer harvest. In folklore it protected against vampires, plague and the "evil eye."</p>`},
  {id:11,title:"The Money Jar",badge:"Prosperity",cat:"prosperity",free:false,html:`<h4>📜 Origin</h4><p>European folk magic, American hoodoo, farming traditions. A symbol of wealth and winter security.</p><h4>🪙 Materials & Timing</h4><ul><li>Glass jar, coins, cinnamon, bay leaves, sugar, magnet, green candle</li><li>Waxing moon, Thursday, early evening</li></ul><h4>📐 Procedure</h4><p>Add the items slowly. Formula: <em>"May what I need find its way to me."</em></p><h4>📍 Where to Keep It</h4><p>Near the entrance, workplace or documents. Never on the floor.</p>`},
  {id:12,title:"Spell of the Fortune Knot",badge:"Favorable Destiny",cat:"prosperity",free:false,html:`<h4>📜 Origin</h4><p>Celtic traditions, sailors' magic, Nordic folklore. The knot fixes an intention and seals a promise.</p><h4>🪢 Procedure</h4><p>Tie 3 slow knots on a green/gold ribbon: 1st opportunity, 2nd stability, 3rd success. Visualize the positive scene at each knot.</p><h4>🗣️ Formula</h4><p><em>"With the first knot I open the way. With the second, fortune remains. With the third, the path is fulfilled."</em></p>`},
  {id:13,title:"Bay Leaf Under the Pillow Formula",badge:"Dreams & Intuition",cat:"dreams",free:false,html:`<h4>📜 Origin</h4><p>Roman and Greek tradition. Bay laurel sacred to Apollo: prophecy, clarity, victory.</p><h4>🌿 Materials & Timing</h4><ul><li>3 dried leaves, white pouch, blue/white candle</li><li>Before midnight, full moon, Sun/Mon night</li></ul><h4>📐 Procedure</h4><p>Write your question, place the paper and leaves under the pillow. Blow out the candle without exhaling directly on it. Interpret dreams on waking.</p>`},
  {id:14,title:"Consecration of the Coin",badge:"Personal Prosperity",cat:"prosperity",free:false,html:`<h4>📜 Origin</h4><p>Medieval Europe, Roman traditions, merchant folklore. Used by merchants, soldiers, travelers.</p><h4>🪙 Materials & Procedure</h4><ul><li>Polished coin, running water, salt, white cloth, green candle</li><li>Wash, pass through salt, dry, hold between the hands</li></ul><h4>🗣️ Formula</h4><p><em>"As this coin stays with me, so may good fortune stay."</em></p>`},
  {id:15,title:"Grain and Rice Ritual",badge:"Harvest Blessing",cat:"prosperity",free:false,html:`<h4>📜 Origin</h4><p>Ancient European agricultural ritual. Grain = life, rice = fertility and abundance.</p><h4>🌾 Materials & Procedure</h4><ul><li>Wheat grains, white rice, gold candle</li><li>Scatter over the threshold, kitchen, entrance</li></ul><h4>🗣️ Formula</h4><p><em>"May this house never know hunger nor want."</em></p>`},
  {id:16,title:"Green Candle Spell",badge:"Growth & Money",cat:"prosperity",free:false,html:`<h4>📜 Origin</h4><p>Medieval esotericism, folk magic, hermetic tradition. Green = growth, money, development.</p><h4>🕯️ Materials & Preparation</h4><ul><li>Green candle, cinnamon, paper with your goal, olive/basil oil</li><li>Rub the candle from bottom to top with oil</li></ul><h4>📐 Procedure</h4><p>Light it slowly. Formula: <em>"As this light grows, so may my path grow."</em></p>`},
  {id:17,title:"Invocation of Abundantia",badge:"Goddess of Wealth",cat:"prosperity",free:false,html:`<h4>📜 Origin</h4><p>Roman figure associated with prosperity, harvest, household fortune. Cornucopia, coins, grain.</p><h4>🍷 Materials & Timing</h4><ul><li>Bread, wine, gold candle, bowl</li><li>Sunset, weekend, start of a business venture</li></ul><h4>🗣️ Formula</h4><p><em>"May this house never lack what is needed."</em></p>`},
  {id:18,title:"The Lodestone",badge:"Attraction",cat:"prosperity",free:false,html:`<h4>📜 Origin</h4><p>American hoodoo, alchemy, 19th-century commercial magic. Natural magnetite.</p><h4>🪨 Materials & Procedure</h4><ul><li>Lodestone, iron filings, green cloth, coin</li><li>Clean it, wrap it, "feed" it with filings</li></ul><h4>🗣️ Formula</h4><p><em>"As iron follows the stone, so may what I seek come toward me."</em></p>`},
  {id:19,title:"Salt of the Earth Ritual",badge:"Family Legacy",cat:"protection",free:false,html:`<h4>📜 Origin</h4><p>European rural tradition. Earth = stability, inheritance, continuity.</p><h4>🌍 Materials & Procedure</h4><ul><li>4 coins, coarse salt, small shovel, white candle</li><li>Bury the coins at the property's 4 corners with a pinch of salt</li></ul><h4>🗣️ Formula</h4><p><em>"May this land remain firm, fertile and protected."</em></p>`},
  {id:20,title:"Benzoin Fumigation",badge:"Opening the Way",cat:"purification",free:false,html:`<h4>📜 Origin</h4><p>Eastern temples, monasteries, folk magic. A purifying, calming resin.</p><h4>💨 Materials & Procedure</h4><ul><li>Benzoin resin, charcoal disc, censer, gold candle</li><li>Light the charcoal, place the resin, walk clockwise</li></ul><h4>🗣️ Formula</h4><p><em>"May closed paths open, and what is still move again."</em></p>`},
  {id:21,title:"Venus Sachet",badge:"Love & Attraction",cat:"love",free:false,html:`<h4>📜 Origin</h4><p>A convergence of medieval love philtres and African-American mojo bags. The archetype of the charged object.</p><h4>🌹 Materials & Procedure</h4><ul><li>Linen/cotton, rose petals, lavender, rose quartz</li><li>Add the elements with tactile attention, breathe into the pouch, close it</li></ul><h4>📅 Timing</h4><p>Friday, waxing moon. Cognitive and emotional focus to stabilize an affective intention.</p>`},
  {id:22,title:"Self-Esteem Mirror",badge:"Mirror Work",cat:"mind",free:false,html:`<h4>📜 Origin</h4><p>Ascetic practices, confessional techniques, 20th-century self-psychology.</p><h4>🪞 Procedure</h4><ul><li>Stand facing the mirror, hold prolonged eye contact</li><li>Speak affirmations in the present tense ("I am," "I accept"), keep your gaze steady</li></ul><h4>📅 Timing</h4><p>Morning. A technique for realigning self-narrative through direct visual feedback.</p>`},
  {id:23,title:"Red Ribbon Bond",badge:"Union & Destiny",cat:"love",free:false,html:`<h4>📜 Origin</h4><p>Chinese tradition (the red thread of fate), European folklore, neo-pagan reinterpretations.</p><h4>🎗️ Procedure</h4><p>Wrap the ribbon around 2 symbolic objects with circular motions. Each loop = a quality (fidelity, continuity). Close with a knot.</p><h4>📅 Timing</h4><p>Waxing moon/full moon. Materialization of the social bond.</p>`},
  {id:24,title:"Marigold Petal Bath",badge:"Emotional Transition",cat:"purification",free:false,html:`<h4>📜 Origin</h4><p>Medieval European herbalism (Benedictine monasteries, the Salerno school).</p><h4>🌼 Procedure</h4><p>Infuse the petals in hot water. Immerse or wash hands/face. Accompany with introspection.</p><h4>📅 Timing</h4><p>Evening or moments of transition. A liminal rite to mark passage between emotional states.</p>`},
  {id:25,title:"Pink Candle for Harmony",badge:"Peaceful Relations",cat:"love",free:false,html:`<h4>📜 Origin</h4><p>Modern ceremonial magic, hermetic color-planet-emotion system.</p><h4>🕯️ Procedure</h4><p>Light in a stable place. Watch the flame, visualize peaceful relationships. Extinguish without blowing.</p><h4>🧠 Function</h4><p>An emotional regulation technique through focused attention and color symbolism.</p>`},
  {id:26,title:"Lemon Balm and Honey",badge:"Calm & Relief",cat:"mind",free:false,html:`<h4>📜 Origin</h4><p>Dioscorides, medieval monastic medicine. Lemon balm (Melissa officinalis) is a calming herb.</p><h4>☕ Procedure</h4><p>Hot infusion with honey. Drink slowly in stillness.</p><h4>📅 Timing</h4><p>Evening or stress. Real mild sedation, enhanced by the ritual gesture itself.</p>`},
  {id:27,title:"The Love Knot",badge:"Celtic/Maritime Union",cat:"love",free:false,html:`<h4>📜 Origin</h4><p>Celtic traditions, sailors' folklore, medieval manuscripts.</p><h4>🪢 Procedure</h4><p>Braid the thread slowly. Each knot = a relational value. The final knot seals the intention.</p><h4>🧠 Function</h4><p>A physical metaphor for social and affective cohesion.</p>`},
  {id:28,title:"Release of the Past",badge:"Symbolic Burning",cat:"purification",free:false,html:`<h4>📜 Origin</h4><p>Greco-Roman curse tablets, medieval rites, modern spiritualism.</p><h4>🔥 Procedure</h4><p>Write down the emotional content, read it, burn it in a safe container, scatter the ashes.</p><h4>📅 Timing</h4><p>Night or emotional closure. An act of cognitive externalization of trauma.</p>`},
  {id:29,title:"Jade Amulet",badge:"Harmony & Balance",cat:"protection",free:false,html:`<h4>📜 Origin</h4><p>Pre-imperial China, Confucian/Taoist tradition.</p><h4>🪨 Procedure</h4><p>Keep it in contact with the body, "purify" it with water/smoke, stabilize it as a personal object.</p><h4>🧠 Function</h4><p>An object of identity and social stabilization.</p>`},
  {id:30,title:"Invocation of Erzulie",badge:"Vodou & Archetype",cat:"love",free:false,html:`<h4>📜 Origin</h4><p>A Lwa of Haitian Vodou, syncretized with Marian figures.</p><h4>🌸 Procedure</h4><p>Prepare a home altar, chant or recite an invocation, offer a symbolic gift, take a moment of contemplation.</p><h4>📅 Timing</h4><p>Ceremonies or emotional crisis. Mediation through feminine archetypes.</p>`},
  {id:31,title:"Mugwort for Dreams",badge:"Dream & Memory",cat:"dreams",free:false,html:`<h4>📜 Origin</h4><p>Ancient European phytotherapy. Artemisia vulgaris associated with the moon and the nocturnal dimension.</p><h4>🌿 Procedure</h4><p>A light tea or a pillow sachet. A quiet moment before sleep. Repeat the intention to remember.</p><h4>🧠 Function</h4><p>A device for dream-recall attention through self-suggestion and sleep ritualization.</p>`},
  {id:32,title:"Consecration of the Tarot",badge:"Symbolic Activation",cat:"mind",free:false,html:`<h4>📜 Origin</h4><p>An 18th-19th century esoteric reinterpretation (Lévi, hermetic societies).</p><h4>🃏 Procedure</h4><p>Hold the deck, expose it to incense smoke, pass each card individually (optional). Reserve it for exclusive use.</p><h4>📅 Timing</h4><p>First use, waxing moon. Ritualization of the bond between the subject and the symbolic system.</p>`},
  {id:33,title:"White Candle Meditation",badge:"Attention & Purity",cat:"mind",free:false,html:`<h4>📜 Origin</h4><p>Western and Eastern contemplative practice (yogic dharana, Christian light symbolism).</p><h4>🕯️ Procedure</h4><p>Light it, gaze at the flame without straining, reduce inner dialogue, return to it after every distraction.</p><h4>📅 Timing</h4><p>10-20 min in the evening. Attentional regulation and reduction of cognitive noise.</p>`},
  {id:34,title:"Full Moon Ritual",badge:"Cyclical Synchronization",cat:"dreams",free:false,html:`<h4>📜 Origin</h4><p>Pre-modern farming cultures. A natural reference point for harvest and fertility.</p><h4>🌕 Procedure</h4><p>Lay personal objects under the moonlight, observe in silence, set intentions.</p><h4>📅 Timing</h4><p>Full moon night. Symbolic synchronization with ordering natural cycles.</p>`},
  {id:35,title:"Frankincense Incense",badge:"Ancient Sacredness",cat:"purification",free:false,html:`<h4>📜 Origin</h4><p>Egypt, Greece, Rome, Christian liturgy. Associated with purification.</p><h4>🌬️ Procedure</h4><p>Resin on charcoal, let the smoke spread, focus on breath and scent.</p><h4>🧠 Function</h4><p>A sensory modulator for states of reduced attention and introspection.</p>`},
  {id:36,title:"Sea Salt Bath",badge:"Symbolic Decontamination",cat:"purification",free:false,html:`<h4>📜 Origin</h4><p>Universal: preservation, purification, protection.</p><h4>🛁 Procedure</h4><p>Dissolve the salt, immerse, remain still without stimuli, exit slowly.</p><h4>📅 Timing</h4><p>After intense days. Symbolic decontamination from stress and fatigue.</p>`},
  {id:37,title:"Spell of Silence",badge:"Attentional Discipline",cat:"mind",free:false,html:`<h4>📜 Origin</h4><p>Monasticism, asceticism, shamanic practices.</p><h4>🤫 Procedure</h4><p>Total verbal abstention, reduced stimuli, observation of unverbalized thoughts.</p><h4>📅 Timing</h4><p>30 minutes to hours. A linguistic sensory deprivation for introspective awareness.</p>`},
  {id:38,title:"Connection with the Ancestors",badge:"Generational Memory",cat:"mind",free:false,html:`<h4>📜 Origin</h4><p>Roman household cults (lares), African traditions, family memory practices.</p><h4>🕯️ Procedure</h4><p>Light a flame, a moment of remembrance/storytelling, a symbolic offering, closing gratitude.</p><h4>📅 Timing</h4><p>Night or anniversaries. A system for identity continuity across generations.</p>`},
  {id:39,title:"Focused Automatic Writing",badge:"Unconscious Flow",cat:"dreams",free:false,html:`<h4>📜 Origin</h4><p>19th-century spiritualism (Kardec), surrealist writing.</p><h4>📝 Procedure</h4><p>Write without planning, reduce conscious control, keep a continuous flow, read it back afterward.</p><h4>📅 Timing</h4><p>10-20 min. Easier access to unfiltered cognitive content.</p>`},
  {id:40,title:"Consecration of Sacred Space",badge:"Ritual Delimitation",cat:"purification",free:false,html:`<h4>📜 Origin</h4><p>The Roman templum, mandalas, medieval magic circles.</p><h4>🕯️ Procedure</h4><p>Clean the area, define symbolic boundaries, add meaningful objects, keep it for exclusive use.</p><h4>📅 Timing</h4><p>Start of new practices. Functional space segmentation for concentration.</p>`},
  {id:41,title:"Tiger's Eye",badge:"Concentration",cat:"mind",free:false,html:`<h4>📜 Origin</h4><p>19th-century mineralogical syncretism, occultism, New Age.</p><h4>🪨 Procedure</h4><p>Hold it before demanding activities, "warm" it in the palm, use it repeatedly.</p><h4>🧠 Function</h4><p>Attentional anchoring: a stable correlation between tactile stimulus and psychological security.</p>`},
  {id:42,title:"Yellow Candle",badge:"Cognitive Clarity",cat:"mind",free:false,html:`<h4>📜 Origin</h4><p>Modern occultism, 19th-20th century hermeticism. Color → psychological state.</p><h4>🕯️ Procedure</h4><p>Light it, focus on the flame, associate light with clarity, extinguish it deliberately.</p><h4>🧠 Function</h4><p>Visual cognitive priming for analytical tasks.</p>`},
  {id:43,title:"Rosemary on the Temples",badge:"Memory & Lucidity",cat:"mind",free:false,html:`<h4>📜 Origin</h4><p>Mediterranean medicine, Greece/Rome. A symbol of memory.</p><h4>🌿 Procedure</h4><p>Light application on the temples or inhaling the aroma. Slow breathing.</p><h4>📅 Timing</h4><p>Before study or mnemonic work. Olfactory stimulation for attentional enhancement.</p>`},
  {id:44,title:"Anchoring Courage",badge:"Somatic Response",cat:"mind",free:false,html:`<h4>📜 Origin</h4><p>Shamanic emotional memory work, formalized in psychology (NLP).</p><h4>💪 Procedure</h4><p>Recall a memory of safety, pair it with a physical gesture (a fist), repeat to stabilize it.</p><h4>🧠 Function</h4><p>Intentional somatic conditioning for activation in difficult situations.</p>`},
  {id:45,title:"Cutting the Dry Branches",badge:"Removing Obstacles",cat:"purification",free:false,html:`<h4>📜 Origin</h4><p>Agricultural symbolism, modern guided meditations.</p><h4>🌳 Procedure</h4><p>Visualize problems as "dry branches," mime the pruning, sense the relief.</p><h4>🧠 Function</h4><p>An operative metaphor for cognitive restructuring.</p>`},
  {id:46,title:"Peppermint Fumigation",badge:"Mental Activation",cat:"mind",free:false,html:`<h4>📜 Origin</h4><p>Mediterranean and Arab herbalism. A refreshing, stimulating plant.</p><h4>🍃 Procedure</h4><p>Light burning or diffusion of the aroma, mindful inhalation.</p><h4>📅 Timing</h4><p>Morning or fatigue. Mild physiological activation through smell.</p>`},
  {id:47,title:"Ginger Root",badge:"Action & Decision",cat:"mind",free:false,html:`<h4>📜 Origin</h4><p>Ayurveda, Chinese medicine. A warming tonic.</p><h4>🌱 Procedure</h4><p>Carry it with you, chew or smell it, associate it with intentions to act.</p><h4>🧠 Function</h4><p>A somatic symbol of metabolic and mental activation.</p>`},
  {id:48,title:"Earth Beneath the Feet",badge:"Ritual Earthing",cat:"purification",free:false,html:`<h4>📜 Origin</h4><p>Agrarian cultures, shamanic rites, modern reinterpretation.</p><h4>👣 Procedure</h4><p>Walk barefoot on natural ground, pay attention to contact, breathe slowly.</p><h4>🧠 Function</h4><p>Sensory reconnection with the natural environment.</p>`},
  {id:49,title:"Visual Mental Shield",badge:"Anxiety Protection",cat:"protection",free:false,html:`<h4>📜 Origin</h4><p>Shamanic imagination, modern meditations.</p><h4>🛡️ Procedure</h4><p>Visualize a luminous barrier, define its boundaries, reinforce it with breath, recall it under stress.</p><h4>🧠 Function</h4><p>Anxiety regulation through protective imagery.</p>`},
  {id:50,title:"Consecration of the Pen",badge:"Instrumental Success",cat:"prosperity",free:false,html:`<h4>📜 Origin</h4><p>Tool blessings found across trades and religions.</p><h4>🖋️ Procedure</h4><p>Pass it near a flame/light, associate it with success, reserve it for important tasks.</p><h4>🧠 Function</h4><p>A functional sacralization that raises the perceived value of the tool.</p>`},
  {id:51,title:"Salt in the Four Corners",badge:"Spatial Stability",cat:"protection",free:false,html:`<h4>📜 Origin</h4><p>Greece/Rome, Jewish tradition, medieval folklore.</p><h4>🧂 Procedure</h4><p>Place salt in the 4 extreme corners of the room/house in silence with the intention of stabilization.</p><h4>📅 Timing</h4><p>Start of a cycle/change. Symbolic marking to restore a sense of order.</p>`},
  {id:52,title:"Brass Bell",badge:"Breaking Stagnation",cat:"purification",free:false,html:`<h4>📜 Origin</h4><p>Tibetan bells, medieval Europe, shamanism. A device for perceptual interruption.</p><h4>🔔 Procedure</h4><p>Ring it slowly in every room, let the sound fade, breathe slowly.</p><h4>📅 Timing</h4><p>After conflict or stagnation. Acoustic discontinuity for cognitive reorganization.</p>`},
  {id:53,title:"Lavender on the Doorframes",badge:"Threshold of Peace",cat:"protection",free:false,html:`<h4>📜 Origin</h4><p>Roman/Mediterranean herbalism (lavare → to cleanse).</p><h4>🌸 Procedure</h4><p>Apply oil/sprigs to the doorframes, moving inward/outward, associating it with an "entrance of peace."</p><h4>📅 Timing</h4><p>Spring/times of change. A threshold practice between the safe interior and the uncertain outside.</p>`},
  {id:54,title:"Ritual Planting",badge:"Intentional Growth",cat:"prosperity",free:false,html:`<h4>📜 Origin</h4><p>Mesopotamia, the Mediterranean, pre-Columbian Americas. An intentional agricultural transposition.</p><h4>🌱 Procedure</h4><p>Hold the seed with intention, plant it slowly, water it, watch its growth as a metaphor.</p><h4>📅 Timing</h4><p>Spring/new projects. An operative metaphor for gradual change.</p>`},
  {id:55,title:"Hearth Blessing",badge:"Domestic Cohesion",cat:"protection",free:false,html:`<h4>📜 Origin</h4><p>Celtic, Roman, European farming traditions. A symbolic center of survival.</p><h4>🔥 Procedure</h4><p>Light/watch the fire, keep silence/give thanks, make a gesture of protection, close it.</p><h4>📅 Timing</h4><p>Winter/gatherings. A rite of social cohesion and household stability.</p>`},
  {id:56,title:"Sun Water",badge:"Natural Charging",cat:"purification",free:false,html:`<h4>📜 Origin</h4><p>A widespread rural practice. Symbolic exposure to light.</p><h4>💧 Procedure</h4><p>Expose a clear container for hours, use it for watering/washing, hold a mental intention.</p><h4>📅 Timing</h4><p>Sunny days. Symbolic transformation through the light/time cycle.</p>`},
  {id:57,title:"Holed Stone",badge:"Vision & Threshold",cat:"protection",free:false,html:`<h4>📜 Origin</h4><p>Northern/Mediterranean Europe. The Hag Stone / Odin Stone.</p><h4>🕳️ Procedure</h4><p>Gather it in nature, clean it, hang it by doors/windows, look through the hole.</p><h4>📅 Timing</h4><p>Permanent installation. A liminal object between the visible and the invisible.</p>`},
  {id:58,title:"Pine and Fir Fumigation",badge:"Symbolic Sanitization",cat:"purification",free:false,html:`<h4>📜 Origin</h4><p>Nordic, alpine traditions. Environmental and medicinal purification.</p><h4>🌲 Procedure</h4><p>Burn the needles slowly, let the smoke spread into the room's corners.</p><h4>📅 Timing</h4><p>After illness/isolation. Symbolic sanitization of the environment.</p>`},
  {id:59,title:"Welcoming the Birds",badge:"Ecological Reciprocity",cat:"purification",free:false,html:`<h4>📜 Origin</h4><p>Asia, rural Europe, animist cultures. A gesture of natural reciprocity.</p><h4>🕊️ Procedure</h4><p>Place food on a windowsill, observe without interfering, repeat it.</p><h4>📅 Timing</h4><p>Morning/cold seasons. An act of symbolic reciprocity between humans and environment.</p>`},
  {id:60,title:"Farewell to the Energies",badge:"Ritual Closure",cat:"purification",free:false,html:`<h4>📜 Origin</h4><p>A closing formula from medieval/neo-pagan systems. A "deactivation" rite.</p><h4>🚪 Procedure</h4><p>Silence, a verbal declaration: <em>"Closed is what was opened, without harm and without bond,"</em> reorientation to daily life.</p><h4>📅 Timing</h4><p>End of practice. Cognitive reintegration into normality.</p>`}
];
