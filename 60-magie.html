  {id:1,title:"El Círculo de Sal",badge:"Protección",cat:"protection",free:true,html:`<h4>📜 Origen Histórico</h4><ul><li>Magia popular europea, alquimia medieval, grimorios renacentistas</li><li>La sal se consideraba "incorruptible", capaz de repeler impurezas, enfermedades e influencias hostiles</li></ul><h4>🕯️ Materiales y Momento</h4><ul><li>Sal gruesa natural, vela blanca, cuenco, ropa clara</li><li>Luna menguante, atardecer, sábado. Evitar tormentas o viento fuerte</li></ul><h4>📐 Procedimiento</h4><p>Trazar la sal en sentido horario partiendo del este, sin interrupciones. Encender la vela y permanecer inmóvil 7 minutos. Fórmula tradicional: <em>"Que ninguna sombra cruce este límite."</em></p><h4>🧠 Significado</h4><p>Funciona como técnica meditativa y delimitación mental. Crea un límite psicológico de seguridad y concentración.</p>`},
  {id:2,title:"Purificación con Salvia",badge:"Purificación",cat:"purification",free:true,html:`<h4>📜 Origen</h4><p>Tradiciones indígenas norteamericanas y adopción esotérica occidental. El humo tenía función purificadora, antiséptica y espiritual.</p><h4>🌿 Materiales y Momento</h4><ul><li>Manojo de salvia blanca, cuenco (barro/concha de abulón), pluma o mano</li><li>Amanecer, tras discusiones, enfermedades o mudanza</li></ul><h4>🌬️ Procedimiento</h4><p>Abrir una ventana. Encender la salvia, apagar la llama dejando brasa y humo. Caminar despacio en sentido horario, dirigiendo el humo hacia rincones, detrás de puertas y bajo ventanas.</p><h4>🗣️ Fórmula</h4><p><em>"Que lo pesado se disuelva y solo quede la paz."</em></p>`},
  {id:3,title:"Fórmula contra el Mal de Ojo",badge:"Folclore Italiano",cat:"protection",free:true,html:`<h4>📜 Origen</h4><p>Folclore del sur de Italia (Campania, Sicilia, Calabria, Apulia). Transmitida oralmente, a menudo solo en Nochebuena, por mujeres mayores.</p><h4>🥣 Materiales y Días</h4><ul><li>Plato blanco, agua, aceite de oliva</li><li>Martes o viernes. Nunca domingo</li></ul><h4>💧 Procedimiento</h4><p>Llenar el plato con agua, hacer la señal de la cruz, dejar caer tres gotas de aceite. Observar: si el aceite permanece compacto no hay mal de ojo, si se dispersa indica simbólicamente la presencia de envidia.</p><h4>👥 Nota Antropológica</h4><p>Servía para tranquilizar, calmar la ansiedad y dar un sentido lógico a la mala suerte repentina.</p>`},
  {id:4,title:"El Nudo de Isis (Tyet)",badge:"Antiguo Egipto",cat:"protection",free:false,html:`<h4>📜 Origen</h4><p>Antiguo Egipto. Asociado con la diosa Isis. El Tyet era llamado "Nudo de Sangre" o "Nudo de la Vida."</p><h4>🔮 Materiales y Momento</h4><ul><li>Piedra roja, jaspe, cornalina, lino rojo</li><li>Viajes, embarazo, enfermedad, ritos funerarios</li></ul><h4>📐 Procedimiento</h4><p>El amuleto se lavaba con agua perfumada, se exponía al sol naciente y se ataba cerca del pecho.</p><h4>🗣️ Fórmula y Simbolismo</h4><p>El rojo simbolizaba vida, sangre y energía defensiva. Se invocaba protección divina.</p>`},
  {id:5,title:"La Herradura",badge:"Europa Medieval",cat:"protection",free:false,html:`<h4>📜 Origen</h4><p>Europa medieval. Se creía que el hierro repelía brujas, espíritus y hadas hostiles.</p><h4>🛡️ Materiales y Colocación</h4><ul><li>Herradura usada, clavos de hierro</li><li>Puntas hacia arriba, sobre la puerta principal</li><li>Sábado por la mañana</li></ul><h4>📐 Procedimiento</h4><p>Algunos añadían 7 clavos o una rama de olivo cerca. Fijada tradicionalmente con intención protectora.</p><h4>👥 Significado</h4><p>Protección doméstica y prosperidad. El gesto materializaba el límite entre el interior seguro y el exterior incierto.</p>`},
  {id:6,title:"Exorcismo del Agua y la Sal",badge:"Baja Edad Media",cat:"purification",free:false,html:`<h4>📜 Origen</h4><p>Tradición cristiana de la baja Edad Media, difundida en monasterios y rituales populares.</p><h4>💧 Materiales y Momento</h4><ul><li>Sal, agua de manantial, cuenco de plata/cerámica, vela</li><li>Tras duelos, enfermedades, discusiones, pesadillas frecuentes</li></ul><h4>📐 Procedimiento</h4><p>La sal se vertía en el agua recitando fórmulas en latín. Se rociaban paredes, puertas, ventanas y cama.</p><h4>👥 Simbolismo</h4><p>El agua purifica, la sal conserva y protege. Rito de limpieza simbólica tras un trauma.</p>`},
  {id:7,title:"Baño de Purificación con Hisopo",badge:"Tradición Bíblica",cat:"purification",free:false,html:`<h4>📜 Origen</h4><p>Tradiciones bíblicas y mediterráneas. El hisopo aparece en los textos sagrados como planta purificadora.</p><h4>🌿 Materiales y Procedimiento</h4><ul><li>Hisopo seco, sal marina, agua caliente, vela blanca</li><li>Dejar en infusión, verter en el agua del baño, permanecer sumergido 15 min</li></ul><h4>⚠️ Regla Antigua</h4><p>No hablar durante el baño. "Lavar" el peso emocional.</p>`},
  {id:8,title:"El Cuadrado del Sator",badge:"Antigua Roma",cat:"protection",free:false,html:`<h4>📜 Origen</h4><p>Antigua Roma. Encontrado en muros, amuletos, cuarteles y monasterios. Un célebre palíndromo.</p><h4>📝 El Cuadrado</h4><p style="text-align:center;font-family:monospace;background:rgba(0,0,0,.3);padding:10px;border-radius:8px;margin:8px 0">SATOR<br>AREPO<br>TENET<br>OPERA<br>ROTAS</p><h4>🛡️ Uso Tradicional</h4><p>Escrito en papel, pergamino o madera. Se llevaba en viajes, batallas, travesías. Se creía que protegía de incendios, accidentes, enfermedades.</p>`},
  {id:9,title:"Sello de Salomón",badge:"Magia Ceremonial",cat:"protection",free:false,html:`<h4>📜 Origen</h4><p>Magia ceremonial medieval. Asociado con la <em>Clave de Salomón</em>.</p><h4>🖋️ Materiales y Preparación</h4><ul><li>Pergamino virgen, tinta negra, vela azul, incienso</li><li>El practicante ayunaba ligeramente, evitaba ruidos, trabajaba en silencio</li></ul><h4>📐 Procedimiento</h4><p>El símbolo se trazaba lentamente. Cada línea: equilibrio, dominio de la mente, orden sobre el caos. Orientado hacia el este.</p><h4>🧠 Propósito</h4><p>Protección mental y disciplina espiritual.</p>`},
  {id:10,title:"El Amuleto de Ajo",badge:"Folclore Europeo",cat:"protection",free:false,html:`<h4>📜 Origen</h4><p>Folclore europeo y mediterráneo. Considerado antiséptico, protector, ahuyentador de espíritus.</p><h4>🧄 Materiales y Colocación</h4><ul><li>Tres cabezas de ajo, cordel natural rojo</li><li>Cocina, puerta de entrada, ventana</li></ul><h4>📅 Momento y Curiosidades</h4><p>Luna nueva o cosecha veraniega. En el folclore protegía de vampiros, peste y "mal de ojo."</p>`},
  {id:11,title:"El Tarro del Dinero",badge:"Prosperidad",cat:"prosperity",free:false,html:`<h4>📜 Origen</h4><p>Magia popular europea, hoodoo americano, tradiciones campesinas. Símbolo de riqueza y seguridad invernal.</p><h4>🪙 Materiales y Momento</h4><ul><li>Tarro de vidrio, monedas, canela, laurel, azúcar, imán, vela verde</li><li>Luna creciente, jueves, primeras horas de la tarde</li></ul><h4>📐 Procedimiento</h4><p>Introducir los elementos despacio. Fórmula: <em>"Que lo que necesito encuentre el camino hacia mí."</em></p><h4>📍 Dónde Guardarlo</h4><p>Cerca de la entrada, del trabajo o de los documentos. Nunca en el suelo.</p>`},
  {id:12,title:"Hechizo del Nudo de la Fortuna",badge:"Destino Favorable",cat:"prosperity",free:false,html:`<h4>📜 Origen</h4><p>Tradiciones celtas, magia marinera, folclore nórdico. El nudo fija una intención y sella una promesa.</p><h4>🪢 Procedimiento</h4><p>Hacer 3 nudos lentos en una cinta verde/dorada: 1º oportunidad, 2º estabilidad, 3º éxito. Visualizar la escena positiva en cada nudo.</p><h4>🗣️ Fórmula</h4><p><em>"Con el primer nudo abro el camino. Con el segundo, la fortuna permanece. Con el tercero, el camino se cumple."</em></p>`},
  {id:13,title:"Fórmula del Laurel bajo la Almohada",badge:"Sueños e Intuición",cat:"dreams",free:false,html:`<h4>📜 Origen</h4><p>Tradición romana y griega. Laurel sagrado para Apolo: profecía, lucidez, victoria.</p><h4>🌿 Materiales y Momento</h4><ul><li>3 hojas secas, saquito blanco, vela azul/blanca</li><li>Antes de medianoche, luna llena, noche de domingo/lunes</li></ul><h4>📐 Procedimiento</h4><p>Escribir la pregunta, colocar el papel y las hojas bajo la almohada. Apagar la vela sin soplar directamente. Interpretar los sueños al despertar.</p>`},
  {id:14,title:"Consagración de la Moneda",badge:"Prosperidad Personal",cat:"prosperity",free:false,html:`<h4>📜 Origen</h4><p>Europa medieval, tradiciones romanas, folclore mercantil. Usada por comerciantes, soldados, viajeros.</p><h4>🪙 Materiales y Procedimiento</h4><ul><li>Moneda pulida, agua corriente, sal, paño blanco, vela verde</li><li>Lavar, pasar por la sal, secar, sostener entre las manos</li></ul><h4>🗣️ Fórmula</h4><p><em>"Como esta moneda permanece conmigo, que permanezca la buena suerte."</em></p>`},
  {id:15,title:"Ritual del Trigo y el Arroz",badge:"Bendición de la Cosecha",cat:"prosperity",free:false,html:`<h4>📜 Origen</h4><p>Antiguo ritual agrícola europeo. Trigo = vida, arroz = fertilidad y abundancia.</p><h4>🌾 Materiales y Procedimiento</h4><ul><li>Granos de trigo, arroz blanco, vela dorada</li><li>Esparcir sobre el umbral, cocina, entrada</li></ul><h4>🗣️ Fórmula</h4><p><em>"Que esta casa no conozca hambre ni carencia."</em></p>`},
  {id:16,title:"Hechizo de la Vela Verde",badge:"Crecimiento y Dinero",cat:"prosperity",free:false,html:`<h4>📜 Origen</h4><p>Esoterismo medieval, magia popular, tradición hermética. Verde = crecimiento, dinero, desarrollo.</p><h4>🕯️ Materiales y Preparación</h4><ul><li>Vela verde, canela, papel con el objetivo, aceite de oliva/albahaca</li><li>Frotar de abajo hacia arriba con aceite</li></ul><h4>📐 Procedimiento</h4><p>Encenderla despacio. Fórmula: <em>"Como crece esta luz, así crezca mi camino."</em></p>`},
  {id:17,title:"Invocación a Abundantia",badge:"Diosa de la Riqueza",cat:"prosperity",free:false,html:`<h4>📜 Origen</h4><p>Figura romana asociada con la prosperidad, la cosecha, la fortuna doméstica. Cornucopia, monedas, trigo.</p><h4>🍷 Materiales y Momento</h4><ul><li>Pan, vino, vela dorada, cuenco</li><li>Atardecer, fin de semana, inicio de una actividad económica</li></ul><h4>🗣️ Fórmula</h4><p><em>"Que a esta casa nunca le falte lo necesario."</em></p>`},
  {id:18,title:"La Piedra Imán (Lodestone)",badge:"Atracción",cat:"prosperity",free:false,html:`<h4>📜 Origen</h4><p>Hoodoo americano, alquimia, magia comercial del siglo XIX. Magnetita natural.</p><h4>🪨 Materiales y Procedimiento</h4><ul><li>Piedra imán, limaduras de hierro, paño verde, moneda</li><li>Limpiarla, envolverla, "alimentarla" con las limaduras</li></ul><h4>🗣️ Fórmula</h4><p><em>"Como el hierro sigue a la piedra, que venga hacia mí lo que busco."</em></p>`},
  {id:19,title:"Ritual de la Sal de la Tierra",badge:"Patrimonio Familiar",cat:"protection",free:false,html:`<h4>📜 Origen</h4><p>Tradición rural europea. Tierra = estabilidad, herencia, continuidad.</p><h4>🌍 Materiales y Procedimiento</h4><ul><li>4 monedas, sal gruesa, pequeña pala, vela blanca</li><li>Enterrar las monedas en las 4 esquinas de la propiedad con una pizca de sal</li></ul><h4>🗣️ Fórmula</h4><p><em>"Que esta tierra permanezca firme, fértil y protegida."</em></p>`},
  {id:20,title:"Sahumado de Benjuí",badge:"Apertura de Caminos",cat:"purification",free:false,html:`<h4>📜 Origen</h4><p>Templos orientales, monasterios, magia popular. Resina purificadora y calmante.</p><h4>💨 Materiales y Procedimiento</h4><ul><li>Resina de benjuí, carboncillo, incensario, vela dorada</li><li>Encender el carbón, colocar la resina, caminar en sentido horario</li></ul><h4>🗣️ Fórmula</h4><p><em>"Que los caminos cerrados se abran y lo detenido vuelva a moverse."</em></p>`},
  {id:21,title:"Saquito de Venus",badge:"Amor y Atracción",cat:"love",free:false,html:`<h4>📜 Origen</h4><p>Convergencia entre filtros medievales y bolsas mojo afroamericanas. El arquetipo del objeto cargado.</p><h4>🌹 Materiales y Procedimiento</h4><ul><li>Lino/algodón, pétalos de rosa, lavanda, cuarzo rosa</li><li>Introducir los elementos con atención táctil, soplar dentro, cerrar</li></ul><h4>📅 Momento</h4><p>Viernes, luna creciente. Enfoque cognitivo y afectivo para estabilizar una intención emocional.</p>`},
  {id:22,title:"Espejo de la Autoestima",badge:"Trabajo con el Espejo",cat:"mind",free:false,html:`<h4>📜 Origen</h4><p>Prácticas ascéticas, técnicas de confesión, psicología del yo (siglo XX).</p><h4>🪞 Procedimiento</h4><ul><li>Colocarse de frente, mantener contacto visual prolongado</li><li>Pronunciar frases en presente ("soy", "acepto"), sostener la mirada</li></ul><h4>📅 Momento</h4><p>Por la mañana. Técnica de realineación de la identidad narrativa mediante retroalimentación visual directa.</p>`},
  {id:23,title:"Lazo de la Cinta Roja",badge:"Unión y Destino",cat:"love",free:false,html:`<h4>📜 Origen</h4><p>Tradición china (el hilo del destino), folclore europeo, reinterpretaciones neopaganas.</p><h4>🎗️ Procedimiento</h4><p>Envolver la cinta alrededor de 2 objetos simbólicos con movimientos circulares. Cada vuelta = una cualidad (fidelidad, continuidad). Cerrar con un nudo.</p><h4>📅 Momento</h4><p>Luna creciente/llena. Materialización del vínculo social.</p>`},
  {id:24,title:"Baño de Pétalos de Caléndula",badge:"Transición Emocional",cat:"purification",free:false,html:`<h4>📜 Origen</h4><p>Herbolaria medieval europea (monasterios benedictinos, escuela de Salerno).</p><h4>🌼 Procedimiento</h4><p>Infusionar los pétalos en agua caliente. Sumergirse o lavarse manos/rostro. Acompañar con introspección.</p><h4>📅 Momento</h4><p>Noche o momentos de transición. Rito liminal para marcar el paso entre estados emocionales.</p>`},
  {id:25,title:"Vela Rosa para la Armonía",badge:"Relaciones en Paz",cat:"love",free:false,html:`<h4>📜 Origen</h4><p>Magia ceremonial moderna, sistema hermético color-planeta-emoción.</p><h4>🕯️ Procedimiento</h4><p>Encenderla en un lugar estable. Observar la llama, visualizar relaciones en paz. Apagarla sin soplar.</p><h4>🧠 Función</h4><p>Técnica de regulación emocional mediante atención focalizada y simbolismo cromático.</p>`},
  {id:26,title:"Melisa y Miel",badge:"Calma y Alivio",cat:"mind",free:false,html:`<h4>📜 Origen</h4><p>Dioscórides, medicina monástica medieval. La melisa (Melissa officinalis) es una hierba calmante.</p><h4>☕ Procedimiento</h4><p>Infusión caliente con miel. Beber despacio en quietud.</p><h4>📅 Momento</h4><p>Noche o estrés. Sedación leve real, potenciada por el propio gesto ritual.</p>`},
  {id:27,title:"El Nudo de Amor",badge:"Unión Celta/Marinera",cat:"love",free:false,html:`<h4>📜 Origen</h4><p>Tradiciones celtas, folclore marinero, manuscritos medievales.</p><h4>🪢 Procedimiento</h4><p>Trenzar el hilo despacio. Cada nudo = un valor relacional. El nudo final sella la intención.</p><h4>🧠 Función</h4><p>Metáfora física de la cohesión social y afectiva.</p>`},
  {id:28,title:"Liberación del Pasado",badge:"Combustión Simbólica",cat:"purification",free:false,html:`<h4>📜 Origen</h4><p>Tabellae grecorromanas, ritos medievales, espiritismo moderno.</p><h4>🔥 Procedimiento</h4><p>Escribir el contenido emocional, leerlo, quemarlo en un recipiente seguro, dispersar las cenizas.</p><h4>📅 Momento</h4><p>Noche o cierre emocional. Acto de externalización cognitiva del trauma.</p>`},
  {id:29,title:"Amuleto de Jade",badge:"Armonía y Equilibrio",cat:"protection",free:false,html:`<h4>📜 Origen</h4><p>China preimperial, tradición confuciana/taoísta.</p><h4>🪨 Procedimiento</h4><p>Llevarlo en contacto con el cuerpo, "purificarlo" con agua/humo, estabilizarlo como objeto personal.</p><h4>🧠 Función</h4><p>Objeto de estabilización identitaria y social.</p>`},
  {id:30,title:"Invocación a Erzulie",badge:"Vudú y Arquetipo",cat:"love",free:false,html:`<h4>📜 Origen</h4><p>Lwa del vudú haitiano, sincretizada con figuras marianas.</p><h4>🌸 Procedimiento</h4><p>Preparar un altar doméstico, invocación cantada/recitada, ofrenda simbólica, momento de contemplación.</p><h4>📅 Momento</h4><p>Ceremonias o crisis emocional. Mediación a través de arquetipos femeninos.</p>`},
  {id:31,title:"Artemisa para los Sueños",badge:"Sueño y Memoria",cat:"dreams",free:false,html:`<h4>📜 Origen</h4><p>Fitoterapia europea antigua. Artemisia vulgaris asociada a la luna y a la dimensión nocturna.</p><h4>🌿 Procedimiento</h4><p>Infusión ligera o saquito en la almohada. Momento de quietud antes de dormir. Repetir la intención de recordar.</p><h4>🧠 Función</h4><p>Dispositivo de inducción atencional al sueño mediante autosugestión y ritualización del descanso.</p>`},
  {id:32,title:"Consagración del Tarot",badge:"Activación Simbólica",cat:"mind",free:false,html:`<h4>📜 Origen</h4><p>Reinterpretación esotérica de los siglos XVIII-XIX (Lévi, sociedades herméticas).</p><h4>🃏 Procedimiento</h4><p>Sostener la baraja, exponerla al humo de incienso, pasar las cartas una a una (opcional). Uso exclusivo.</p><h4>📅 Momento</h4><p>Primer uso, luna creciente. Ritualización de la relación entre el sujeto y el sistema simbólico.</p>`},
  {id:33,title:"Meditación de la Vela Blanca",badge:"Atención y Pureza",cat:"mind",free:false,html:`<h4>📜 Origen</h4><p>Contemplación occidental/oriental (dharana yóguica, luz cristiana).</p><h4>🕯️ Procedimiento</h4><p>Encenderla, fijar la mirada en la llama sin esfuerzo, reducir el diálogo interno, volver a ella tras cada distracción.</p><h4>📅 Momento</h4><p>10-20 min por la noche. Regulación atencional y reducción del ruido cognitivo.</p>`},
  {id:34,title:"Ritual de la Luna Llena",badge:"Sincronización Cíclica",cat:"dreams",free:false,html:`<h4>📜 Origen</h4><p>Culturas agrícolas premodernas. Referencia natural para cosecha/fertilidad.</p><h4>🌕 Procedimiento</h4><p>Colocar objetos personales bajo la luz lunar, observar en silencio, formular intenciones.</p><h4>📅 Momento</h4><p>Noche de luna llena. Sincronización simbólica con los ciclos naturales ordenadores.</p>`},
  {id:35,title:"Incienso de Olíbano",badge:"Sacralidad Antigua",cat:"purification",free:false,html:`<h4>📜 Origen</h4><p>Egipto, Grecia, Roma, liturgias cristianas. Asociado a la purificación.</p><h4>🌬️ Procedimiento</h4><p>Resina sobre carbón, dejar que el humo se difunda, concentrarse en la respiración y el aroma.</p><h4>🧠 Función</h4><p>Modulador sensorial para estados de atención reducida e introspección.</p>`},
  {id:36,title:"Baño de Sal Marina",badge:"Descontaminación Simbólica",cat:"purification",free:false,html:`<h4>📜 Origen</h4><p>Universal: conservación, purificación, protección.</p><h4>🛁 Procedimiento</h4><p>Disolver la sal, sumergirse, permanecer en quietud sin estímulos, salir despacio.</p><h4>📅 Momento</h4><p>Tras días intensos. Descontaminación simbólica del estrés y el cansancio.</p>`},
  {id:37,title:"Hechizo del Silencio",badge:"Disciplina Atencional",cat:"mind",free:false,html:`<h4>📜 Origen</h4><p>Monacato, ascetismo, prácticas chamánicas.</p><h4>🤫 Procedimiento</h4><p>Abstención verbal total, reducción de estímulos, observación de pensamientos no verbalizados.</p><h4>📅 Momento</h4><p>30 min a varias horas. Privación sensorial lingüística para la conciencia introspectiva.</p>`},
  {id:38,title:"Conexión con los Antepasados",badge:"Memoria Generacional",cat:"mind",free:false,html:`<h4>📜 Origen</h4><p>Cultos romanos (lares), tradiciones africanas, memorias familiares.</p><h4>🕯️ Procedimiento</h4><p>Encender una luz, momento de recuerdo/narración, ofrenda simbólica, cierre de agradecimiento.</p><h4>📅 Momento</h4><p>Noche o aniversarios. Sistema de continuidad identitaria entre generaciones.</p>`},
  {id:39,title:"Escritura Automática Focalizada",badge:"Flujo Inconsciente",cat:"dreams",free:false,html:`<h4>📜 Origen</h4><p>Espiritismo decimonónico (Kardec), escritura surrealista.</p><h4>📝 Procedimiento</h4><p>Escribir sin planificar, reducir el control consciente, mantener un flujo continuo, leer después.</p><h4>📅 Momento</h4><p>10-20 min. Acceso facilitado a contenidos cognitivos no filtrados.</p>`},
  {id:40,title:"Consagración del Espacio Sagrado",badge:"Delimitación Ritual",cat:"purification",free:false,html:`<h4>📜 Origen</h4><p>El templum romano, mandalas, círculos mágicos medievales.</p><h4>🕯️ Procedimiento</h4><p>Limpiar el área, definir límites simbólicos, añadir objetos significativos, uso exclusivo.</p><h4>📅 Momento</h4><p>Inicio de nuevas prácticas. Segmentación funcional del espacio para la concentración.</p>`},
  {id:41,title:"Ojo de Tigre",badge:"Concentración",cat:"mind",free:false,html:`<h4>📜 Origen</h4><p>Sincretismo mineralógico decimonónico, ocultismo, New Age.</p><h4>🪨 Procedimiento</h4><p>Sostenerlo antes de actividades exigentes, "calentarlo" en la palma, usarlo repetidamente.</p><h4>🧠 Función</h4><p>Anclaje atencional: correlación estable entre estímulo táctil y seguridad psicológica.</p>`},
  {id:42,title:"Vela Amarilla",badge:"Claridad Cognitiva",cat:"mind",free:false,html:`<h4>📜 Origen</h4><p>Ocultismo moderno, hermetismo de los siglos XIX-XX. Color → estado psicológico.</p><h4>🕯️ Procedimiento</h4><p>Encenderla, enfocarse en la llama, asociar la luz con la claridad, apagarla con control.</p><h4>🧠 Función</h4><p>Priming cognitivo visual para actividades analíticas.</p>`},
  {id:43,title:"Romero en las Sienes",badge:"Memoria y Lucidez",cat:"mind",free:false,html:`<h4>📜 Origen</h4><p>Medicina mediterránea, Grecia/Roma. Símbolo de memoria.</p><h4>🌿 Procedimiento</h4><p>Aplicación ligera en las sienes o inhalación del aroma. Respiración lenta.</p><h4>📅 Momento</h4><p>Antes de estudiar o de técnicas mnemotécnicas. Estimulación olfativa para potenciar la atención.</p>`},
  {id:44,title:"Anclaje del Coraje",badge:"Respuesta Somática",cat:"mind",free:false,html:`<h4>📜 Origen</h4><p>Memoria emocional chamánica, formalizada en psicología (PNL).</p><h4>💪 Procedimiento</h4><p>Recordar un momento de seguridad, asociarlo a un gesto físico (un puño), repetir para estabilizarlo.</p><h4>🧠 Función</h4><p>Condicionamiento somático intencional para la activación en situaciones difíciles.</p>`},
  {id:45,title:"Corte de las Ramas Secas",badge:"Eliminación de Obstáculos",cat:"purification",free:false,html:`<h4>📜 Origen</h4><p>Simbolismo agrícola, meditaciones guiadas modernas.</p><h4>🌳 Procedimiento</h4><p>Visualizar los problemas como "ramas secas", simular la poda, percibir el alivio.</p><h4>🧠 Función</h4><p>Metáfora operativa de reestructuración cognitiva.</p>`},
  {id:46,title:"Sahumado de Menta Piperita",badge:"Activación Mental",cat:"mind",free:false,html:`<h4>📜 Origen</h4><p>Herbolaria mediterránea/árabe. Planta refrescante y estimulante.</p><h4>🍃 Procedimiento</h4><p>Combustión ligera o difusión del aroma, inhalación consciente.</p><h4>📅 Momento</h4><p>Mañana/cansancio. Activación fisiológica leve mediante el olfato.</p>`},
  {id:47,title:"Raíz de Jengibre",badge:"Acción y Decisión",cat:"mind",free:false,html:`<h4>📜 Origen</h4><p>Ayurveda, medicina china. Tónico que da calor.</p><h4>🌱 Procedimiento</h4><p>Llevarla consigo, masticarla/olerla, asociarla a intenciones de movimiento.</p><h4>🧠 Función</h4><p>Símbolo somático de activación metabólica y mental.</p>`},
  {id:48,title:"Tierra bajo los Pies",badge:"Earthing Ritual",cat:"purification",free:false,html:`<h4>📜 Origen</h4><p>Culturas agrarias, ritos chamánicos, reinterpretación moderna.</p><h4>👣 Procedimiento</h4><p>Caminar descalzo sobre suelo natural, prestar atención al contacto, respirar despacio.</p><h4>🧠 Función</h4><p>Reconexión sensorial con el entorno natural.</p>`},
  {id:49,title:"Escudo Mental Visual",badge:"Protección contra la Ansiedad",cat:"protection",free:false,html:`<h4>📜 Origen</h4><p>Imaginación chamánica, meditaciones modernas.</p><h4>🛡️ Procedimiento</h4><p>Visualizar una barrera luminosa, definir sus límites, reforzarla con la respiración, evocarla en momentos de estrés.</p><h4>🧠 Función</h4><p>Regulación de la ansiedad mediante imaginería protectora.</p>`},
  {id:50,title:"Consagración de la Pluma",badge:"Éxito Instrumental",cat:"prosperity",free:false,html:`<h4>📜 Origen</h4><p>Bendición de herramientas presente en oficios y religiones.</p><h4>🖋️ Procedimiento</h4><p>Pasarla cerca del fuego/luz, asociarla al éxito, uso exclusivo para actividades importantes.</p><h4>🧠 Función</h4><p>Sacralización funcional que aumenta el valor percibido de la herramienta.</p>`},
  {id:51,title:"Sal en las Cuatro Esquinas",badge:"Estabilidad Espacial",cat:"protection",free:false,html:`<h4>📜 Origen</h4><p>Grecia/Roma, tradición judía, folclore medieval.</p><h4>🧂 Procedimiento</h4><p>Colocar sal en las 4 esquinas extremas de la habitación/casa en silencio con intención estabilizadora.</p><h4>📅 Momento</h4><p>Inicio de ciclo/cambio. Marcado simbólico para restablecer el orden percibido.</p>`},
  {id:52,title:"Campana de Latón",badge:"Ruptura del Estancamiento",cat:"purification",free:false,html:`<h4>📜 Origen</h4><p>Campanas tibetanas, Europa medieval, chamanismo. Dispositivo de interrupción perceptiva.</p><h4>🔔 Procedimiento</h4><p>Tocarla despacio en cada habitación, dejar que el sonido se apague, respirar despacio.</p><h4>📅 Momento</h4><p>Tras conflictos/estancamiento. Discontinuidad acústica para la reorganización cognitiva.</p>`},
  {id:53,title:"Lavanda en los Marcos de las Puertas",badge:"Umbral de Paz",cat:"protection",free:false,html:`<h4>📜 Origen</h4><p>Herbolaria romana/mediterránea (lavare → purificar).</p><h4>🌸 Procedimiento</h4><p>Aplicar aceite/ramitas en los marcos, con movimiento hacia dentro/fuera, asociándolo a una "entrada de paz."</p><h4>📅 Momento</h4><p>Primavera/cambios. Práctica de umbral entre el interior seguro y el exterior incierto.</p>`},

  {id:60,title:"Despedida de las Energías",badge:"Cierre Ritual",cat:"purification",free:false,html:`<h4>📜 Origen</h4><p>Fórmula de cierre de sistemas medievales/neopaganos. Un rito de "desactivación."</p><h4>🚪 Procedimiento</h4><p>Silencio, declaración verbal: <em>"Cerrado lo que fue abierto, sin daño y sin vínculo,"</em> reorientación a la cotidianidad.</p><h4>📅 Momento</h4><p>Fin de la práctica. Reintegración cognitiva a la normalidad.</p>`}

let currentFilter = 'tutti';
let openCardId = null;

function getData(){ return currentLang==='it'?DATA_IT:currentLang==='en'?DATA_EN:DATA_ES; }

/* ── updateSEO ── */
function updateSEO(){
  const L = LANG[currentLang];
  const S = L.seo;
  document.documentElement.lang = S.htmlLang;
  document.title = S.title;
  document.querySelector('meta[name="description"]').setAttribute('content', S.description);
  document.querySelector('meta[name="keywords"]').setAttribute('content', S.keywords);
  document.querySelector('meta[property="og:title"]').setAttribute('content', S.ogTitle);
  document.querySelector('meta[property="og:description"]').setAttribute('content', S.ogDesc);
  document.querySelector('meta[property="og:locale"]').setAttribute('content', S.ogLocale);
  document.querySelector('meta[name="twitter:title"]').setAttribute('content', S.ogTitle);
  document.querySelector('meta[name="twitter:description"]').setAttribute('content', S.ogDesc);

  const ld = {
    "@context":"https://schema.org",
    "@graph":[
      {
        "@type":"FAQPage",
        "mainEntity": S.faqLD.map(f=>({
          "@type":"Question","name":f.q,
          "acceptedAnswer":{"@type":"Answer","text":f.a}
        }))
      },
      {
        "@type":"BreadcrumbList",
        "itemListElement":[
          {"@type":"ListItem","position":1,"name":"MYSTICA","item":"https://mysticaoracoli.it/index.html"},
          {"@type":"ListItem","position":2,"name":S.title,"item":"https://mysticaoracoli.it/60-magie.html"}
        ]
      },
      {
        "@type":"Article",
        "headline": L.artTitle,
        "description": S.description,
        "image":"https://mysticaoracoli.it/images/60magie.webp",
        "inLanguage": S.htmlLang,
        "author":{"@type":"Person","name":"Dott. Petrolese Giovanni"},
        "publisher":{"@type":"Organization","name":"MYSTICA Oracoli","logo":{"@type":"ImageObject","url":"https://mysticaoracoli.it/apple-touch-icon-v2.png"}}
      },
      {
        "@type":"WebPage",
        "name": S.title,
        "url":"https://mysticaoracoli.it/60-magie.html",
        "inLanguage": S.htmlLang,
        "isPartOf":{"@type":"WebSite","name":"MYSTICA Oracoli","url":"https://mysticaoracoli.it/index.html"}
      }
    ]
  };
  document.querySelector('script[type="application/ld+json"]').textContent = JSON.stringify(ld);
}

/* ── applyLang ── */
function applyLang(lang){
  currentLang = lang;
  localStorage.setItem('myst_lang', lang);
  updateSEO();

  const L = LANG[lang];
  document.querySelectorAll('.btn-lang').forEach(b=>b.classList.toggle('active', b.dataset.lang===lang));

  document.getElementById('btn-back').setAttribute('aria-label', L.back);
  document.getElementById('musicToggle').setAttribute('aria-label', L.music.off);
  document.getElementById('themeToggle').setAttribute('aria-label', L.theme.night);
  document.getElementById('page-title').textContent = L.pageTitleHeader;

  document.getElementById('intro-title').textContent = L.introTitle;
  document.getElementById('intro-text').textContent = L.introText;

  document.getElementById('filter-tutti').textContent = L.filterAll;
  document.getElementById('filter-protection').textContent = L.catLabels.protection;
  document.getElementById('filter-prosperity').textContent = L.catLabels.prosperity;
  document.getElementById('filter-love').textContent = L.catLabels.love;
  document.getElementById('filter-purification').textContent = L.catLabels.purification;
  document.getElementById('filter-dreams').textContent = L.catLabels.dreams;
  document.getElementById('filter-mind').textContent = L.catLabels.mind;

  document.getElementById('share-label').textContent = L.shareLabel;
  document.getElementById('share-copy').textContent = L.shareCopy;

  document.getElementById('art-title').textContent = L.artTitle;
  document.getElementById('art-hero').alt = L.artImgAlt;
  document.getElementById('art-h2').textContent = L.artH2;
  document.getElementById('art-p1').textContent = L.artP1;
  document.getElementById('art-p2').textContent = L.artP2;
  document.getElementById('art-p3').textContent = L.artP3;
  document.getElementById('art-h3').textContent = L.artH3;
  document.getElementById('art-p4').textContent = L.artP4;
  document.getElementById('art-p5').textContent = L.artP5;
  document.getElementById('link-bianca').textContent = L.linkBianca;
  document.getElementById('link-rossa').textContent = L.linkRossa;
  document.getElementById('link-nera').textContent = L.linkNera;
  document.getElementById('link-sigilli').textContent = L.linkSigilli;
  document.getElementById('link-index').textContent = L.linkIndex;
  document.getElementById('cta-explore').textContent = L.ctaExplore;

  document.getElementById('footer-copy').textContent = L.footerCopy;
  document.getElementById('footer-disclaimer').textContent = L.footerDisclaimer;

  renderFAQ();
  render();
}

/* ── AudioManager ── */
class AudioManager{
  constructor(){
    this.audio = new Audio('./audio/ambient-mystica.mp3');
    this.audio.loop = true;
    this.audio.volume = 0.35;
    this.playing = sessionStorage.getItem('myst_audio') === '1';
    if(this.playing){ this.audio.play().catch(()=>{ this.playing=false; }); }
  }
  toggle(){
    if(this.playing){
      this.audio.pause();
      this.playing = false;
    } else {
      this.audio.play().catch(()=>{});
      this.playing = true;
    }
    sessionStorage.setItem('myst_audio', this.playing ? '1':'0');
    this.updateBtn();
  }
  updateBtn(){
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    btn.textContent = this.playing ? '🎵' : '🔇';
    btn.setAttribute('aria-label', this.playing ? L.music.on : L.music.off);
  }
}
let audioManager;

/* ── Tema Giorno/Notte ── */
function applyTheme(){
  const theme = localStorage.getItem('myst_theme') || 'night';
  document.documentElement.classList.toggle('theme-day', theme==='day');
  const btn = document.getElementById('themeToggle');
  const L = LANG[currentLang];
  btn.textContent = theme==='day' ? '🌙' : '☀️';
  btn.setAttribute('aria-label', theme==='day' ? L.theme.night : L.theme.day);
}
function toggleTheme(){
  const cur = localStorage.getItem('myst_theme') || 'night';
  localStorage.setItem('myst_theme', cur==='day' ? 'night' : 'day');
  applyTheme();
}

/* ── Share ── */
const PAGE_URL = 'https://mysticaoracoli.it/60-magie.html';
function shareContent(){
  const popup = document.getElementById('sharePopup');
  const L = LANG[currentLang];
  const text = encodeURIComponent(L.shareText);
  const url = encodeURIComponent(PAGE_URL);
  document.getElementById('share-wa').href = `https://wa.me/?text=${text}%20${url}`;
  document.getElementById('share-tg').href = `https://t.me/share/url?url=${url}&text=${text}`;
  document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
  document.getElementById('share-x').href = `https://twitter.com/intent/tweet?text=${text}&url=${url}`;
  popup.hidden = !popup.hidden;
}
function copyLink(){
  navigator.clipboard.writeText(PAGE_URL).then(()=>{
    const btn = document.getElementById('share-copy');
    const L = LANG[currentLang];
    const old = btn.textContent;
    btn.textContent = L.shareCopied;
    setTimeout(()=> btn.textContent = old, 1800);
  });
}

/* ── FAQ Accordion ── */
function renderFAQ(){
  const L = LANG[currentLang];
  const list = document.getElementById('faqList');
  list.innerHTML = L.faq.map((f,i)=>`
    <div class="faq-item">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false" id="faqq-${i}">
        <span>${f.q}</span><span class="faq-icon" id="faqicon-${i}">+</span>
      </button>
      <div class="faq-answer" id="faqa-${i}" hidden><p>${f.a}</p></div>
    </div>`).join('');
}
function toggleFAQ(i){
  const ans = document.getElementById(`faqa-${i}`);
  const icon = document.getElementById(`faqicon-${i}`);
  const btn = document.getElementById(`faqq-${i}`);
  const open = !ans.hidden;
  ans.hidden = open;
  icon.textContent = open ? '+' : '−';
  btn.setAttribute('aria-expanded', String(!open));
}

/* ── Render rituali + filtri ── */
function render(){
  const L = LANG[currentLang];
  const data = getData();
  const filtered = currentFilter==='tutti' ? data : data.filter(r=>r.cat===currentFilter);

  document.getElementById('resultsCount').textContent = filtered.length + L.resultsUnit;

  const list = document.getElementById('cardsList');
  list.innerHTML = filtered.map(r=>{
    const open = openCardId === r.id;
    return `
      <div class="rituale-card ${open?'open':''}" data-id="${r.id}" onclick="toggleCard(${r.id})" tabindex="0" role="button" aria-expanded="${open}">
        <div class="rituale-card-header">
          <span class="rituale-num">${String(r.id).padStart(2,'0')}</span>
          <span class="rituale-card-title">${r.title}</span>
          <span class="rituale-toggle">▾</span>
        </div>
        <div class="rituale-content">${r.html}</div>
      </div>`;
  }).join('');
}

function toggleCard(id){
  openCardId = openCardId===id ? null : id;
  render();
}

function setFilter(cat){
  currentFilter = cat;
  openCardId = null;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active', b.dataset.cat===cat));
  render();
}

/* ── Init ── */
document.addEventListener('DOMContentLoaded', ()=>{
  audioManager = new AudioManager();
  document.getElementById('musicToggle').addEventListener('click', ()=> audioManager.toggle());
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  document.querySelectorAll('.btn-lang').forEach(b=> b.addEventListener('click', ()=> applyLang(b.dataset.lang)));
  document.querySelectorAll('.filter-btn').forEach(b=> b.addEventListener('click', ()=> setFilter(b.dataset.cat)));

  applyTheme();
  applyLang(currentLang);
  audioManager.updateBtn();
});
</script>
