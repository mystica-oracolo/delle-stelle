<style>
/* ── Reset / Variables ── */
:root{
  --bg:#0a0514;--card:#140c24;--purple:#2a1748;
  --gold:#d4af37;--gold-dim:#b8860b;--gold-glow:rgba(212,175,55,0.4);
  --text:#f4f1fa;--muted:#b8b2d1;--radius:18px;--border:rgba(212,175,55,0.2);
  --success:#4ade80;--warning:#fbbf24;--error:#f87171;
}
html.theme-day{
  --bg:#f5f2ed;--card:#ede8df;--text:#2a1748;--muted:#6b5b7f;
  --purple:#6b5b7f;--gold:#c89742;--gold-dim:#a67c52;
  --gold-glow:rgba(200,151,66,0.2);--border:#c89742;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Crimson Pro',Georgia,serif;
  min-height:100vh;overflow-x:hidden;line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
button{touch-action:manipulation;-webkit-appearance:none;cursor:pointer;font-family:inherit}
input,textarea{-webkit-appearance:none}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* ── Skip link ── */
.skip-link{
  position:absolute;top:-40px;left:8px;background:var(--gold);color:#0a0514;
  padding:8px 14px;border-radius:8px;z-index:999;font-family:'Cinzel',serif;
  font-size:12px;transition:top .2s;
}
.skip-link:focus{top:8px}

/* ── Layout ── */
#app,main{max-width:480px;margin:0 auto;position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column}

/* ── Sfondo cosmico ── */
.cosmos{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%,#2a174830 0%,transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 80%,#1a073820 0%,transparent 60%),
    radial-gradient(2px 2px at 15% 25%,#fff9 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 75% 15%,#fff7 0%,transparent 100%),
    radial-gradient(2px 2px at 45% 70%,#d4af3780 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 45%,#fff6 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 85%,#fff5 0%,transparent 100%),
    radial-gradient(2px 2px at 60% 35%,#d4af3760 0%,transparent 100%);
  animation:twinkle 14s infinite alternate;
}
@keyframes twinkle{
  0%{opacity:.35;transform:scale(1)}
  50%{opacity:.55}
  100%{opacity:.45;transform:scale(1.015)}
}

/* ── Header ── */
.page-header{
  background:rgba(10,5,20,0.85);backdrop-filter:blur(12px);
  padding:18px 20px 13px;
  padding-top:max(18px,calc(18px + env(safe-area-inset-top,0px)));
  text-align:center;border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;
}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
.btn-back{
  display:inline-flex;align-items:center;gap:6px;
  background:transparent;border:1px solid rgba(212,175,55,0.3);
  color:var(--gold-dim);border-radius:20px;padding:6px 14px;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;
  transition:all .2s;text-decoration:none;
}
.btn-back:hover{border-color:var(--gold);color:var(--gold)}
.header-controls{display:flex;gap:8px}
.btn-icon{
  background:transparent;border:1px solid rgba(212,175,55,0.3);
  color:var(--gold-dim);border-radius:20px;padding:6px 10px;
  font-size:11px;transition:all .2s;
}
.btn-icon:hover{border-color:var(--gold);color:var(--gold)}
.page-title{
  font-family:'Cinzel',serif;font-size:22px;color:var(--gold);letter-spacing:3px;
  text-shadow:0 0 30px var(--gold-glow);animation:logoGlow 4s infinite;margin:6px 0 8px;
}
@keyframes logoGlow{
  0%,100%{text-shadow:0 0 20px var(--gold-glow),0 0 40px transparent}
  50%{text-shadow:0 0 40px #d4af3750,0 0 80px #d4af3725}
}
.lang-switch{display:flex;justify-content:center;gap:6px}
.btn-lang{
  background:transparent;border:1px solid rgba(212,175,55,0.25);color:var(--muted);
  border-radius:14px;padding:4px 11px;font-size:10px;letter-spacing:1px;
  font-family:'Cinzel',serif;transition:all .2s;
}
.btn-lang.active,.btn-lang:hover{border-color:var(--gold);color:var(--gold)}

/* ── Content ── */
.content{flex:1;padding:14px;padding-bottom:calc(30px + env(safe-area-inset-bottom,0px))}

/* ── Card ── */
.card{
  background:var(--card);border:1.5px solid rgba(42,23,72,0.9);
  border-radius:var(--radius);padding:18px;margin-bottom:16px;
  position:relative;overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  transition:box-shadow .3s ease,border-color .3s ease;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}
.card.gold-border{border-color:var(--gold-dim);box-shadow:0 0 20px var(--gold-glow)}
html.theme-day .card{background-color:var(--card);border:2px solid var(--border);color:var(--text)}

/* ── Typography ── */
h2{font-family:'Cinzel',serif;color:var(--gold);font-size:18px;margin-bottom:14px;text-align:center;letter-spacing:1px}
h3{color:var(--text);font-size:16px;margin-bottom:8px;font-weight:600;letter-spacing:0.5px}
p{color:var(--text);font-size:16px;line-height:1.75;margin-bottom:10px}
.t-muted{color:var(--muted);font-size:12px;text-align:center}
html.theme-day h1,html.theme-day h2,html.theme-day h3{color:var(--text);text-shadow:none}

/* ── Section title ── */
.eng-section-title{
  font-family:'Cinzel',serif;color:var(--gold);font-size:12px;
  letter-spacing:2px;text-transform:uppercase;
  margin:22px 0 10px;padding-left:2px;
  display:flex;align-items:center;gap:7px;
}
.eng-section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold-dim),transparent)}

/* ── Inputs ── */
textarea,input[type="text"]{
  width:100%;padding:12px;
  background:#09050f;border:1px solid #2a174880;
  color:var(--text);border-radius:10px;font-size:14px;
  font-family:'Crimson Pro',serif;resize:none;
  transition:border-color .2s;margin:5px 0;display:block;
}
textarea:focus,input[type="text"]:focus{outline:none;border-color:var(--gold-dim);box-shadow:0 0 0 3px var(--gold-glow)}
textarea::placeholder,input[type="text"]::placeholder{color:var(--muted)}
html.theme-day input,html.theme-day textarea{background-color:#ffffff;color:var(--text);border:2px solid var(--border)}

/* ── Buttons ── */
.btn{
  width:100%;padding:15px;margin-top:12px;
  background:linear-gradient(135deg,#2a1748,#160d30);
  border:1.5px solid var(--gold);color:var(--gold);border-radius:12px;
  font-size:15px;font-weight:700;text-align:center;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:'Cinzel',serif;letter-spacing:1px;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
}
.btn:hover{background:linear-gradient(135deg,#381f5a,#1e1040);box-shadow:0 0 24px var(--gold-glow),0 4px 16px #00000060}
.btn:active{transform:scale(.97)}
.btn-sec{background:transparent;border:1px solid #2a174880;color:var(--muted);font-family:'Crimson Pro',serif}
.btn-sec:hover{border-color:var(--gold-dim);color:var(--text)}
.btn-grp{display:flex;gap:9px;margin-top:11px}
.btn-grp .btn{flex:1;margin-top:0}
html.theme-day .btn{background-color:var(--gold);color:#fff;border:2px solid var(--border)}

/* ── Eng result ── */
.eng-result{
  margin-top:12px;padding:14px;background:#0b0518;
  border-radius:12px;border-left:3px solid var(--gold);
  display:none;font-size:13.5px;line-height:1.7;color:var(--text);
}
.eng-result.visible{display:block;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.eng-r-block{background:#0b0520;border-left:3px solid var(--gold);border-radius:0 10px 10px 0;padding:13px;margin-bottom:10px}
.eng-r-block h4{font-family:'Cinzel',serif;color:var(--gold);font-size:10px;letter-spacing:1.5px;margin-bottom:7px;text-transform:uppercase}
.eng-r-block p{font-size:13.5px;line-height:1.7;margin:0}

/* ── Grimorio list ── */
.diary-item{
  background:rgba(20,12,36,0.6);border:1px solid rgba(212,175,55,0.2);
  border-radius:12px;padding:15px;margin-bottom:12px;
  transition:all 0.3s ease;position:relative;
}
.diary-item:hover{border-color:var(--gold);background:rgba(20,12,36,0.8)}
.diary-date{font-size:10px;color:var(--gold-dim);margin-bottom:5px;display:block}
.diary-content{font-size:13px;color:var(--text);line-height:1.4}
.grimorio-header{
  font-family:'Cinzel',serif;font-size:10px;color:var(--gold);
  letter-spacing:2px;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.grimorio-count-badge{
  background:var(--purple);border:1px solid var(--gold-dim);
  padding:1px 8px;border-radius:10px;font-size:9px;color:var(--text);
}
.grimorio-spacer{flex:1;height:1px;background:linear-gradient(90deg,var(--gold-dim),transparent)}
.grimorio-del-all{background:transparent;border:none;color:#f87171;font-size:10px;cursor:pointer;font-family:'Cinzel',serif}
.diary-del{position:absolute;top:10px;right:10px;background:transparent;border:none;color:#f87171;font-size:14px;cursor:pointer}

/* ── Mala ── */
.eng-mala-count{
  font-family:'Cinzel',serif;font-size:44px;color:var(--gold);
  font-weight:700;text-align:center;text-shadow:0 0 24px var(--gold-glow);
  display:block;letter-spacing:2px;margin:10px 0 4px;
}
.eng-mala-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:12px 0 8px}
.eng-mala-of{font-size:13px;color:var(--muted);font-family:'Cinzel',serif}
.eng-prog{height:6px;border-radius:3px;background:#2a174840;margin:8px 0 4px;overflow:hidden}
.eng-prog-bar{height:100%;border-radius:3px;transition:width .3s ease;background:linear-gradient(90deg,var(--gold-dim),var(--gold));width:0%}

/* ── Mala perle ── */
.mala-perle{
  display:flex;flex-wrap:wrap;justify-content:center;
  gap:4px;margin:10px 0;padding:12px;
  background:rgba(9,5,15,.5);border-radius:14px;
  border:1px solid rgba(42,23,72,.5);
}
.perla{
  width:12px;height:12px;border-radius:50%;
  background:rgba(42,23,72,.6);border:1px solid rgba(212,175,55,.2);
  transition:all .2s ease;
}
.perla.attiva{
  background:radial-gradient(circle at 35% 35%,#c8a0f0,#7a3db8);
  border-color:var(--gold);
  box-shadow:0 0 6px rgba(212,175,55,.5);
}

/* ── Pendolo ── */
.pendolo-stage{
  display:flex;justify-content:center;align-items:center;
  margin:14px 0 10px;
  background:radial-gradient(ellipse 70% 90% at 50% 20%,rgba(42,23,72,.35) 0%,transparent 70%);
  border-radius:12px;padding:6px 0;
}
#pendoloCanvas{display:block;border-radius:8px}

.pendolo-dict-title{
  font-family:'Cinzel',serif;font-size:10px;color:var(--gold);letter-spacing:2px;
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.pendolo-dict-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold-dim),transparent)}
.pendolo-dict-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid rgba(42,23,72,.5)}
.pendolo-dict-item:last-child{border-bottom:none}
.pendolo-dict-sym{font-size:20px;width:26px;flex-shrink:0;text-align:center;margin-top:1px}
.pendolo-dict-label{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);letter-spacing:1px;margin-bottom:3px}
.pendolo-dict-desc{font-size:12px;color:var(--muted);line-height:1.55}

/* ── Guide strumenti ── */
.strumento-card{
  background:linear-gradient(135deg,rgba(20,12,36,.8),rgba(9,5,20,.9));
  border:1px solid rgba(42,23,72,.6);border-radius:14px;
  padding:14px;margin-bottom:10px;
  display:flex;align-items:flex-start;gap:12px;
  transition:border-color .2s;
}
.strumento-card:hover{border-color:rgba(212,175,55,.35)}
.strumento-ico{font-size:28px;flex-shrink:0;line-height:1;filter:drop-shadow(0 0 6px rgba(212,175,55,.4))}
.strumento-body h4{font-family:'Cinzel',serif;color:var(--gold);font-size:13px;letter-spacing:.5px;margin-bottom:4px}
.strumento-body p{font-size:13px;color:var(--muted);line-height:1.55;margin:0}
.guide-title{font-size:14px;color:var(--gold);font-family:'Cinzel',serif;letter-spacing:.5px;margin-bottom:12px}

/* ── Nav grid ── */
.nav-card{text-decoration:none;display:block}
.nav-tile{flex-direction:column;align-items:center;text-align:center;gap:6px;padding:14px 8px}
.nav-tile-ico{font-size:24px}
.nav-tile-label{font-family:'Cinzel',serif;font-size:10px;color:var(--gold)}

/* ── Toast ── */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:rgba(20,12,36,.95);border:1px solid var(--gold-dim);
  color:var(--text);padding:12px 22px;border-radius:24px;
  font-size:14px;z-index:999;opacity:0;pointer-events:none;
  transition:opacity .3s;white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,.6);
}
.toast.show{opacity:1}

/* ── AdSense slot ── */
.ad-slot{
  background:rgba(20,12,36,.4);border:1px solid rgba(42,23,72,.4);
  border-radius:12px;padding:12px;margin:16px 0;
  min-height:100px;display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:11px;text-align:center;
}

/* ── Article section ── */
.article-section{margin-top:8px;content-visibility:auto}
.article-section h2{text-align:left;font-size:19px}
.article-section h3{color:var(--gold);font-family:'Cinzel',serif;font-size:14px;letter-spacing:.5px;margin:18px 0 10px}
.article-section p{font-size:14.5px;color:var(--muted)}
.article-links{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
.article-links a{
  font-size:12px;color:var(--gold-dim);border:1px solid rgba(212,175,55,.3);
  border-radius:14px;padding:6px 12px;text-decoration:none;transition:all .2s;
}
.article-links a:hover{border-color:var(--gold);color:var(--gold)}
.cta-explore{
  display:block;text-align:center;margin-top:16px;padding:14px;
  background:linear-gradient(135deg,#2a1748,#160d30);border:1.5px solid var(--gold);
  color:var(--gold);border-radius:12px;font-family:'Cinzel',serif;font-size:14px;
  letter-spacing:1px;text-decoration:none;transition:all .25s;
}
.cta-explore:hover{box-shadow:0 0 24px var(--gold-glow)}

/* ── Share ── */
.share-section{margin:8px 0 4px;position:relative}
.btn-share{
  width:100%;padding:13px;background:transparent;border:1.5px solid rgba(212,175,55,.4);
  color:var(--gold);border-radius:12px;font-family:'Cinzel',serif;font-size:13px;
  letter-spacing:1px;transition:all .2s;
}
.btn-share:hover{border-color:var(--gold);box-shadow:0 0 16px var(--gold-glow)}
.share-popup{
  display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding:12px;
  background:var(--card);border:1px solid rgba(212,175,55,.25);border-radius:12px;
}
.share-btn{
  flex:1 1 40%;text-align:center;padding:10px 6px;border-radius:10px;
  font-size:12px;text-decoration:none;color:var(--text);border:1px solid rgba(212,175,55,.2);
  background:rgba(9,5,15,.5);transition:all .2s;
}
.share-btn:hover{border-color:var(--gold)}

/* ── FAQ ── */
.faq-section{margin-top:8px}
.faq-title{font-family:'Cinzel',serif;color:var(--gold);font-size:16px;text-align:center;letter-spacing:1px;margin-bottom:14px}
.faq-item{border-bottom:1px solid rgba(212,175,55,.15);padding:4px 0}
.faq-question{
  width:100%;background:transparent;border:none;color:var(--text);
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 4px;text-align:left;font-size:14px;font-family:'Crimson Pro',serif;
}
.faq-icon{color:var(--gold);font-size:16px;flex-shrink:0;margin-left:10px}
.faq-answer{padding:0 4px 14px}
.faq-answer p{font-size:13.5px;color:var(--muted);margin:0}

/* ── Footer ── */
.page-footer{text-align:center;padding:20px 14px 10px}
.footer-links{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.footer-links a{font-size:11px;color:var(--muted);text-decoration:none}
.footer-links a:hover{color:var(--gold)}
.footer-disclaimer{font-size:10px;color:#4a4262;margin-top:4px}
html.theme-day .footer-disclaimer{color:var(--muted)}

/* ── Premium Modal ── */
.premium-modal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.premium-modal.show{display:flex}
.modal-overlay{position:absolute;inset:0;background:rgba(5,2,10,.85);backdrop-filter:blur(4px)}
.modal-content{
  position:relative;background:var(--card);border:1.5px solid var(--gold);border-radius:18px;
  padding:26px 22px;max-width:380px;width:100%;text-align:center;
  box-shadow:0 0 40px var(--gold-glow);
}
.modal-content h2{font-size:18px;margin-bottom:10px}
.modal-content p{font-size:14px;color:var(--muted)}
.premium-price{color:var(--gold);font-family:'Cinzel',serif;font-size:15px;margin:10px 0 16px}
.btn-premium-buy{
  width:100%;padding:14px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));
  border:none;color:#160d30;border-radius:12px;font-family:'Cinzel',serif;font-size:14px;
  font-weight:700;letter-spacing:.5px;margin-bottom:10px;
}
.btn-premium-skip{width:100%;padding:10px;background:transparent;border:none;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="cosmos" aria-hidden="true"></div>
<a href="#main-content" class="skip-link" id="skip-link-text">Vai al contenuto principale</a>

    artP1: "The word grimoire comes from Old French grammaire, originally referring to any text written in a learned language most people couldn't read. In medieval Europe, grimoires gathered formulas, planetary seals and magical correspondences passed down by village healers and alchemists. Texts such as the Key of Solomon circulated quietly among a handful of initiates, hand-copied and treasured. Today a personal grimoire isn't a manual of borrowed spells but a living journal — a place to record intentions, recurring dreams, observed moon phases and your own spiritual growth, carrying forward centuries of quiet practice.",
    artP2: "Japa mala, or simply mala, originated in Vedic India as a way to count mantra repetitions during meditation. The oldest references appear in Hindu texts over two thousand years old, while Tibetan Buddhism later developed its own 108-bead variants made from bodhi wood, rudraksha seeds or gemstones. The number 108 is far from arbitrary: it's the product of 1, 4 and 27, echoes astronomical ratios between Earth, Sun and Moon, and appears throughout Vedic astrology's lunar mansions. Yoga, Buddhism and Hinduism all treat it as the symbolic threshold for completing one full cycle of prayer, breath or repeated intention.",

    artP5: "A common myth claims a grimoire needs secret formulas or cipher scripts to work — in truth its power lies in the writer's honesty, not the complexity of the code. Around the pendulum runs the belief that it always answers with absolute truth, when it's better treated as a tool for inner dialogue rather than an infallible oracle. Compared with tarot, which offers rich symbolic narratives, the pendulum gives quick binary answers, better suited to specific questions than layered readings. The mala, unlike either, predicts nothing — it's a counter of presence, an ally for daily meditative discipline. Curiously, all three practices share the same deep function: turning a repeated gesture into a sacred act.",

    faq: [
      { q: 'What is a grimoire and how do I start one?', a: "A grimoire is a personal esoteric journal for rituals, intentions, dreams and reflections on your magical practice. Just start with a notebook, or a secure digital space like MYSTICA: write regularly, even a few lines, noting date and moon phase. Over time it becomes a valuable record of your spiritual growth, worth reading alongside your Dream Journal." },

      { q: 'Does the pendulum always tell the truth?', a: "The pendulum shouldn't be treated as an infallible oracle, but as a tool that amplifies micro-movements linked to intuition and the subconscious. Read its answers with discernment, especially for emotionally loaded questions. For richer, more layered consultations, Tarot Reading offers a different level of detail." },
      { q: 'How do you cleanse a pendulum or mala before use?', a: 'Both tools absorb energy over time and should be cleansed periodically. The most common method is passing them through white sage or palo santo smoke, or resting them overnight on a selenite slab. For the pendulum you can also briefly rinse it in salt water, avoiding porous stones or delicate metals. Pair the cleansing with a quiet moment, perhaps noted in your grimoire.' },

let currentLang = localStorage.getItem('myst_lang') || 'it';

/* ─────────────────────────────────────────
   SEO — updateSEO()
───────────────────────────────────────── */
function updateSEO() {
  const S = LANG[currentLang].seo;
  document.documentElement.lang = S.htmlLang;
  document.title = S.title;
  document.querySelector('meta[name="description"]').content = S.description;
  document.querySelector('meta[name="keywords"]').content = S.keywords;
  document.querySelector('meta[property="og:title"]').content = S.ogTitle;
  document.querySelector('meta[property="og:description"]').content = S.ogDesc;
  document.querySelector('meta[property="og:locale"]').content = S.ogLocale;
  document.querySelector('meta[name="twitter:title"]').content = S.ogTitle;
  document.querySelector('meta[name="twitter:description"]').content = S.ogDesc;
  const ld = document.querySelector('script[type="application/ld+json"]');
  if (ld && S.faqLD) {
    ld.textContent = JSON.stringify({
      '@context': 'https://schema.org',
      '@graph': [
        {
          '@type': 'FAQPage',
          mainEntity: S.faqLD.map(f => ({
            '@type': 'Question',
            name: f.q,
            acceptedAnswer: { '@type': 'Answer', text: f.a }
          }))
        },
        {
          '@type': 'Article',
          headline: LANG[currentLang].artTitle,
          image: 'https://mysticaoracoli.it/images/icone/home/strumenti.webp',
          author: { '@type': 'Person', name: 'Dott. Petrolese Giovanni' },
          publisher: { '@type': 'Organization', name: 'MYSTICA Oracoli' },
          inLanguage: S.htmlLang
        },
        {
          '@type': 'BreadcrumbList',
          itemListElement: [
            { '@type': 'ListItem', position: 1, name: 'MYSTICA', item: 'https://mysticaoracoli.it/index.html' },
            { '@type': 'ListItem', position: 2, name: S.title, item: 'https://mysticaoracoli.it/strumenti.html' }
          ]
        },
        {
          '@type': 'WebPage',
          name: S.title,
          url: 'https://mysticaoracoli.it/strumenti.html',
          inLanguage: S.htmlLang
        },
        {
          '@type': 'SoftwareApplication',
          name: 'MYSTICA Oracoli',
          applicationCategory: 'LifestyleApplication',
          operatingSystem: 'Web'
        }
      ]
    });
  }
}

/* ─────────────────────────────────────────
   RENDER LISTE MULTILINGUA (guide, dizionari)
───────────────────────────────────────── */
function renderGuideList(elId, items) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.innerHTML = items.map(it => `
    <div class="strumento-card">
      <div class="strumento-ico">${it.ico}</div>
      <div class="strumento-body">
        <h4>${it.title}</h4>
        <p>${it.text}</p>
      </div>
    </div>
  `).join('');
}

function renderDictList(elId, items) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.innerHTML = items.map(it => `
    <div class="pendolo-dict-item">
      <div class="pendolo-dict-sym">${it.sym}</div>
      <div>
        <div class="pendolo-dict-label">${it.label}</div>
        <div class="pendolo-dict-desc">${it.desc}</div>
      </div>
    </div>
  `).join('');
}

// Switch lingua
document.querySelectorAll('[data-lang]').forEach(btn => {
  btn.addEventListener('click', e => {
    currentLang = e.target.dataset.lang;
    localStorage.setItem('myst_lang', currentLang);
    applyLang();
    document.querySelectorAll('[data-lang]').forEach(b =>
      b.classList.toggle('active', b.dataset.lang === currentLang));
  });
});

class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.preload = 'none';
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play() {
    this.audio?.play().catch(() => {});
    this.isPlaying = true;
    sessionStorage.setItem(AUDIO_KEY, 'true');
    this.updateUI();
  }
  pause() {
    this.audio?.pause();
    this.isPlaying = false;
    sessionStorage.setItem(AUDIO_KEY, 'false');
    this.updateUI();
  }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}
window.audioManager = new AudioManager();
document.getElementById('musicToggle')
  ?.addEventListener('click', () => window.audioManager.toggle());

/* ─────────────────────────────────────────
   Tema Giorno/Notte
───────────────────────────────────────── */
let isDayMode = localStorage.getItem('myst_theme') === 'day';

function applyTheme(isDay) {
  document.documentElement.classList.toggle('theme-day', isDay);
  const btn = document.getElementById('themeToggle');
  const L = LANG[currentLang];
  if (btn) btn.textContent = isDay ? L.theme.night : L.theme.day;
  localStorage.setItem('myst_theme', isDay ? 'day' : 'night');
}

document.getElementById('themeToggle')
  ?.addEventListener('click', () => { isDayMode = !isDayMode; applyTheme(isDayMode); });

/* ─────────────────────────────────────────
   Premium Gate
───────────────────────────────────────── */
function isPremium() {
  return localStorage.getItem('myst_premium') === '1';
}

function requirePremium(actionType) {
  if (isPremium()) return true;
  document.getElementById('premiumModal')?.classList.add('show');
  document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'false');
  return false;
}

function closePremiumModal() {
  document.getElementById('premiumModal')?.classList.remove('show');
  document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'true');
}

/* ─────────────────────────────────────────
   Share
───────────────────────────────────────── */
const PAGE_URL = 'https://mysticaoracoli.it/strumenti.html';

function shareContent(customText) {
  const L = LANG[currentLang];
  const text = customText || L.shareText;
  if (navigator.share) {
    navigator.share({ title: L.shareTitle, text, url: PAGE_URL }).catch(() => {});
    return;
  }
  const enc = encodeURIComponent(text + ' ' + PAGE_URL);
  const ue = encodeURIComponent(PAGE_URL);
  const wa = document.getElementById('share-wa'); if (wa) wa.href = `https://wa.me/?text=${enc}`;
  const tg = document.getElementById('share-tg'); if (tg) tg.href = `https://t.me/share/url?url=${ue}&text=${encodeURIComponent(text)}`;
  const fb = document.getElementById('share-fb'); if (fb) fb.href = `https://www.facebook.com/sharer/sharer.php?u=${ue}`;
  const xb = document.getElementById('share-x'); if (xb) xb.href = `https://twitter.com/intent/tweet?text=${enc}`;
  const sp = document.getElementById('sharePopup'); if (sp) sp.hidden = false;
}

function copyLink() {
  const L = LANG[currentLang];
  navigator.clipboard.writeText(PAGE_URL).then(() => {
    const b = document.getElementById('share-copy');
    if (b) {
      b.textContent = L.shareCopied;
      setTimeout(() => { b.textContent = L.shareCopy; }, 2000);
    }
  });
}

/* ─────────────────────────────────────────
   FAQ Accordion
───────────────────────────────────────── */
function renderFAQ(faqs) {
  const container = document.getElementById('faqList');
  if (!container) return;
  container.innerHTML = faqs.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false">
        <span>${f.q}</span>
        <span class="faq-icon">+</span>
      </button>
      <div class="faq-answer" id="faq-ans-${i}" hidden>
        <p>${f.a}</p>
      </div>
    </div>
  `).join('');
}

function toggleFAQ(i) {
  const ans = document.getElementById(`faq-ans-${i}`);
  const btn = document.querySelector(`#faq-${i} .faq-question`);
  const icon = btn?.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  if (icon) icon.textContent = isOpen ? '+' : '−';
  btn?.setAttribute('aria-expanded', String(!isOpen));
}

const GRIMORIO_KEY = 'myst_grimorio_v1';
const GRIMORIO_FREE_LIMIT = 5;

function _lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function _lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

function toast(msg){
  const el = document.getElementById('toast');
  if(!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

/* ─────────────────────────────────────────
   GRIMORIO (logica invariata + gate premium oltre 5 pagine)
───────────────────────────────────────── */
function grimorioRenderList(){
  const list = document.getElementById('grimorioList');
  const wrap = document.getElementById('grimorioListWrap');
  const cnt  = document.getElementById('grimorioCount');
  if(!list) return;
  let entries = [];
  try{ entries = JSON.parse(_lsGet(GRIMORIO_KEY)||'[]'); }catch(e){}
  if(cnt) cnt.textContent = entries.length;
  if(!entries.length){ if(wrap) wrap.style.display='none'; return; }
  if(wrap) wrap.style.display='block';
  const localeMap = { it:'it-IT', en:'en-US', es:'es-ES' };
  list.innerHTML = entries.map((e,i)=>`
    <div class="diary-item" style="position:relative">
      <span class="diary-date">${new Date(e.ts||Date.now()).toLocaleDateString(localeMap[currentLang]||'it-IT', {day:'2-digit',month:'long',year:'numeric'})}</span>
      <span class="diary-content" style="display:block;margin-top:5px">${(e.nota||'').replace(/\n/g,'<br>')}</span>
      <button class="diary-del" onclick="grimorioDeleteEntry(${i})" aria-label="Elimina">✕</button>
    </div>
  `).join('');
}

function engSalvaGrimorio(){
  const L = LANG[currentLang].grim;
  const nota = ((document.getElementById('eng-grimorio-nota')||{}).value||'').trim();
  const res  = document.getElementById('eng-r-grimorio');
  if(!nota){ toast(L.toastEmpty); return; }
  let entries = [];
  try{ entries = JSON.parse(_lsGet(GRIMORIO_KEY)||'[]'); }catch(e){}
  if(entries.length >= GRIMORIO_FREE_LIMIT && !isPremium()){
    toast(L.limitMsg);
    requirePremium('grimorio_illimitato');
    return;
  }
  entries.unshift({ nota, ts: Date.now() });
  try{ _lsSet(GRIMORIO_KEY, JSON.stringify(entries)); }catch(e){}
  if(res){ res.innerHTML=`<div class="eng-r-block" style="margin-top:10px"><p>${L.savedMsg}</p></div>`; res.classList.add('visible'); }
  const el = document.getElementById('eng-grimorio-nota');
  if(el) el.value='';
  grimorioRenderList();
}

function grimorioDeleteEntry(i){
  let entries=[];
  try{ entries=JSON.parse(_lsGet(GRIMORIO_KEY)||'[]'); }catch(e){}
  entries.splice(i,1);
  try{ _lsSet(GRIMORIO_KEY,JSON.stringify(entries)); }catch(e){}
  grimorioRenderList();
}

function grimorioClearAll(){
  const L = LANG[currentLang].grim;
  if(!confirm(L.confirmDeleteAll)) return;
  try{ _lsSet(GRIMORIO_KEY,'[]'); }catch(e){}
  grimorioRenderList();
}

/* ─────────────────────────────────────────
   JAPAMALA (logica invariata)
───────────────────────────────────────── */
let _malaCount = 0;
const MALA_TOTAL = 108;

function renderMalaPerle(){
  const container = document.getElementById('malaPerle');
  if(!container) return;
  let html = '';
  for(let i=0;i<MALA_TOTAL;i++){
    html += `<div class="perla${i<_malaCount?' attiva':''}" title="${i+1}"></div>`;
  }
  container.innerHTML = html;
}

function engMalaInc(){
  const L = LANG[currentLang].mala;
  if(_malaCount >= MALA_TOTAL){ toast(L.completeMsg); return; }
  _malaCount++;
  const pct = (_malaCount / MALA_TOTAL * 100).toFixed(1);
  document.getElementById('eng-mala-n').textContent = _malaCount;
  document.getElementById('eng-mala-of').textContent = _malaCount + L.of;
  const bar = document.getElementById('eng-mala-bar');
  if(bar) bar.style.width = pct + '%';
  renderMalaPerle();
  if(_malaCount === MALA_TOTAL){
    const mantra = (document.getElementById('eng-mala-mantra')||{}).value || L.defaultMantra;
    toast(L.cycleDoneMsg.replace('{mantra}', mantra.slice(0,30)));
  }
}

function engMalaReset(){
  const L = LANG[currentLang].mala;
  _malaCount = 0;
  document.getElementById('eng-mala-n').textContent = '0';
  document.getElementById('eng-mala-of').textContent = '0' + L.of;
  const bar = document.getElementById('eng-mala-bar');
  if(bar) bar.style.width = '0%';
  renderMalaPerle();
}

/* ─────────────────────────────────────────
   PENDOLO (logica invariata)
───────────────────────────────────────── */
const _pendolo = {
  animId: null,
  angle: 0,
  mode: 'static',
  t: 0,
  answer: null
};

function pendoloDrawStatic(){
  const canvas = document.getElementById('pendoloCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, pivotY = 18;
  const L = 140, angle = _pendolo.angle || 0;
  const bx = cx + Math.sin(angle) * L;
  const by = pivotY + Math.cos(angle) * L;

  ctx.clearRect(0, 0, W, H);

  const bg = ctx.createRadialGradient(cx, H*0.4, 10, cx, H*0.4, 110);
  bg.addColorStop(0, 'rgba(42,23,72,0.25)');
  bg.addColorStop(1, 'rgba(10,5,20,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  ctx.beginPath();
  ctx.arc(cx, pivotY, 5, 0, Math.PI*2);
  ctx.fillStyle = '#d4af37';
  ctx.shadowColor = 'rgba(212,175,55,0.8)';
  ctx.shadowBlur = 10;
  ctx.fill();
  ctx.shadowBlur = 0;

  const grad = ctx.createLinearGradient(cx, pivotY, bx, by);
  grad.addColorStop(0, 'rgba(212,175,55,0.9)');
  grad.addColorStop(1, 'rgba(180,130,30,0.6)');
  ctx.beginPath();
  ctx.moveTo(cx, pivotY);
  ctx.lineTo(bx, by);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  const r = 13;
  const glowColor = _pendolo.mode === 'si' ? 'rgba(80,220,120,0.7)'
    : _pendolo.mode === 'no' ? 'rgba(248,113,113,0.7)'
    : _pendolo.mode === 'forse' ? 'rgba(140,100,220,0.7)'
    : _pendolo.mode === 'irregolare' ? 'rgba(255,180,50,0.7)'
    : 'rgba(212,175,55,0.5)';

  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 18;

  ctx.beginPath();
  ctx.moveTo(bx, by - r*1.4);
  ctx.lineTo(bx + r*0.7, by);
  ctx.lineTo(bx, by + r*0.6);
  ctx.lineTo(bx - r*0.7, by);
  ctx.closePath();

  const cGrad = ctx.createRadialGradient(bx - r*0.2, by - r*0.3, 1, bx, by, r*1.2);
  cGrad.addColorStop(0, '#f0e0ff');
  cGrad.addColorStop(0.4, '#c8a0f0');
  cGrad.addColorStop(1, '#7a3db8');
  ctx.fillStyle = cGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(212,175,55,0.8)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.beginPath();
  ctx.moveTo(bx - r*0.3, by - r*0.8);
  ctx.lineTo(bx + r*0.1, by - r*0.2);
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  ctx.stroke();

  if(_pendolo.mode !== 'static' && Math.abs(_pendolo.angle) > 0.02){
    ctx.beginPath();
    ctx.arc(cx, pivotY, L, Math.PI/2 - 0.35, Math.PI/2 + 0.35);
    ctx.strokeStyle = 'rgba(212,175,55,0.1)';
    ctx.lineWidth = 28;
    ctx.stroke();
  }
}

function _pendoloAnimate(){
  _pendolo.t += 0.04;
  const amp = 0.38;

  if(_pendolo.mode === 'si'){
    _pendolo.angle = amp * Math.sin(_pendolo.t * 2.2) * Math.exp(-_pendolo.t * 0.012);
  } else if(_pendolo.mode === 'no'){
    _pendolo.angle = amp * 0.6 * Math.sin(_pendolo.t * 1.8 + Math.PI/4) * Math.exp(-_pendolo.t * 0.01);
  } else if(_pendolo.mode === 'forse'){
    _pendolo.angle = amp * 0.5 * Math.sin(_pendolo.t * 1.4) + amp * 0.3 * Math.cos(_pendolo.t * 2.1);
    _pendolo.angle *= Math.exp(-_pendolo.t * 0.008);
  } else if(_pendolo.mode === 'irregolare'){
    _pendolo.angle = amp * 0.4 * (Math.sin(_pendolo.t * 3.1) + Math.sin(_pendolo.t * 1.7 + 1.2) * 0.5);
    _pendolo.angle *= Math.exp(-_pendolo.t * 0.015);
  }

  const decay = Math.exp(-_pendolo.t * 0.012);
  if(decay < 0.05 && _pendolo.animId){
    _pendolo.angle = 0;
    pendoloDrawStatic();
    if(_pendolo.answer) _pendoloShowAnswer(_pendolo.answer);
    _pendolo.animId = null;
    const btnFerma = document.getElementById('pendolo-btn-ferma');
    if(btnFerma) btnFerma.style.display = 'none';
    return;
  }

  pendoloDrawStatic();
  _pendolo.animId = requestAnimationFrame(_pendoloAnimate);
}

function _pendoloShowAnswer(ans){
  const res = document.getElementById('pendolo-result');
  if(!res) return;
  const map = LANG[currentLang].pend.answers;
  const d = map[ans] || map.forse;
  res.innerHTML = `<div style="text-align:center;padding:10px 0">
    <div style="font-size:36px;margin-bottom:8px">${d.ico}</div>
    <div style="font-family:'Cinzel',serif;font-size:14px;color:${d.col};letter-spacing:1px;margin-bottom:10px">${d.tit}</div>
    <p style="font-size:13.5px;line-height:1.7;color:var(--text);margin:0">${d.txt}</p>
  </div>`;
  res.classList.add('visible');
  res.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function pendoloConsulta(){
  const L = LANG[currentLang].pend;
  const domanda = ((document.getElementById('pendolo-domanda')||{}).value||'').trim();
  if(!domanda){ toast(L.toastEmpty); return; }

  if(_pendolo.animId){ cancelAnimationFrame(_pendolo.animId); _pendolo.animId = null; }
  const res = document.getElementById('pendolo-result');
  if(res){ res.classList.remove('visible'); res.innerHTML = ''; }

  const outcomes = ['si','si','si','no','no','forse','forse','irregolare'];
  const ans = outcomes[Math.floor(Math.random() * outcomes.length)];
  _pendolo.answer = ans;
  _pendolo.mode = ans;
  _pendolo.t = 0;
  _pendolo.angle = 0;

  const btnFerma = document.getElementById('pendolo-btn-ferma');
  if(btnFerma) btnFerma.style.display = 'flex';

  _pendolo.animId = requestAnimationFrame(_pendoloAnimate);
}

function pendoloFerma(){
  if(_pendolo.animId){ cancelAnimationFrame(_pendolo.animId); _pendolo.animId = null; }
  _pendolo.angle = 0;
  pendoloDrawStatic();
  const btnFerma = document.getElementById('pendolo-btn-ferma');
  if(btnFerma) btnFerma.style.display = 'none';
  if(_pendolo.answer) _pendoloShowAnswer(_pendolo.answer);
}
