<style>
/* ── Reset / Variabili ── */
:root{
  --bg:#0d0520;--bg2:#150830;--bg3:#1a0a3e;
  --card:#150830;--purple:#2a1748;
  --gold:#d4af37;--gold-dim:#9a7f28;--gold-glow:rgba(212,175,55,.18);
  --text:#e8dcc8;--muted:#9080a0;--border:rgba(212,175,55,.18);
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:16px;line-height:1.6}
body{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#2a1050 0%,#0d0520 65%);position:relative}
img{max-width:100%}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* ── Skip Link (a11y) ── */
.skip-link{
  position:absolute;top:-40px;left:8px;z-index:9999;
  background:var(--gold);color:#1a0a3e;padding:8px 14px;border-radius:8px;
  font-family:'Cinzel',serif;font-size:12px;text-decoration:none;transition:top .2s;
}
.skip-link:focus{top:8px}

/* ── Sfondo Cosmico ── */
.cosmos{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, #2a174830 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 80%, #1a073820 0%, transparent 60%),
    radial-gradient(2px 2px at 15% 25%, #fff9 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 75% 15%, #fff7 0%, transparent 100%),
    radial-gradient(2px 2px at 45% 70%, #d4af3780 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 45%, #fff6 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 85%, #fff5 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 35%, #d4af3760 0%, transparent 100%);
  animation:twinkle 14s infinite alternate;
}
@keyframes twinkle{0%{opacity:.35}50%{opacity:.55}100%{opacity:.45}}

/* ── Layout base ── */
.page-header,main,.page-footer{position:relative;z-index:1}
main{max-width:520px;margin:0 auto;padding:0 0 8px}

/* ── HEADER STANDARD ── */
.page-header{
  background:linear-gradient(180deg,rgba(30,10,60,.95) 0%,rgba(13,5,32,.0) 100%);
  padding:calc(14px + env(safe-area-inset-top,0px)) 20px 14px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);
}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.btn-back{
  display:flex;align-items:center;gap:6px;
  background:rgba(212,175,55,.08);border:1px solid var(--border);
  color:var(--gold);font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;
  padding:7px 14px;border-radius:20px;cursor:pointer;text-decoration:none;
  transition:all .25s;white-space:nowrap;
}
.btn-back:hover{background:rgba(212,175,55,.16)}
.header-controls{display:flex;gap:8px}
.btn-icon{
  background:rgba(212,175,55,.08);border:1px solid var(--border);
  color:var(--gold);border-radius:50%;width:36px;height:36px;
  font-size:15px;cursor:pointer;transition:all .25s;
  display:flex;align-items:center;justify-content:center;
}
.btn-icon:hover{background:rgba(212,175,55,.16)}
.page-title{
  font-family:'Cinzel',serif;font-size:17px;color:var(--gold);
  letter-spacing:2px;text-align:center;margin-bottom:10px;
}
.lang-switch{display:flex;justify-content:center;gap:6px}
.btn-lang{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;
  padding:4px 12px;border-radius:14px;cursor:pointer;transition:all .25s;
}
.btn-lang.active,.btn-lang:hover{border-color:var(--gold-dim);color:var(--gold);background:var(--gold-glow)}

/* ── HERO ── */
.hero{text-align:center;padding:32px 20px 24px;position:relative;overflow:hidden}
.hero-icon{font-size:64px;filter:drop-shadow(0 0 30px rgba(212,175,55,.5));animation:float 4s ease-in-out infinite;display:block;margin-bottom:12px}
.hero-title{font-family:'Cinzel',serif;font-size:26px;color:var(--gold);letter-spacing:3px;margin-bottom:6px}
.hero-sub{color:var(--muted);font-size:14px;font-style:italic;letter-spacing:1px;max-width:380px;margin:0 auto}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ── CONTAINER ── */
.container{max-width:520px;margin:0 auto;padding:0 16px 40px}

/* ── FORM ── */
.form-card{background:rgba(21,8,48,.7);border:1px solid var(--border);border-radius:var(--radius);padding:22px 20px;margin-bottom:18px}
.form-label{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:2px;margin-bottom:8px;display:block}
.form-input{width:100%;background:rgba(10,4,24,.7);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Crimson Pro',serif;font-size:15px;padding:12px 14px;outline:none;transition:border-color .2s;margin-bottom:14px}
.form-input:focus{border-color:var(--gold-dim)}
.form-input::placeholder{color:var(--muted)}
textarea.form-input{resize:vertical;min-height:70px}
label[for], .form-label{cursor:default}

/* ── PLANET GRID ── */
.planet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.planet-btn{background:rgba(10,4,24,.6);border:1px solid var(--border);border-radius:10px;padding:10px 6px;cursor:pointer;text-align:center;transition:all .2s}
.planet-btn:hover,.planet-btn.active{border-color:var(--gold-dim);background:var(--gold-glow)}
.planet-btn .pb-sym{font-size:20px;display:block;margin-bottom:3px}
.planet-btn .pb-name{font-family:'Cinzel',serif;font-size:9px;color:var(--muted);letter-spacing:.5px}
.planet-btn.active .pb-name{color:var(--gold)}

/* ── CTA BUTTON ── */
.btn{display:block;width:100%;background:linear-gradient(135deg,#2a1a4e,#1a0a3e);border:1px solid var(--gold-dim);border-radius:25px;color:var(--gold);font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;padding:14px;cursor:pointer;transition:all .25s;text-align:center}
.btn:hover{background:linear-gradient(135deg,#3a2a60,#2a1a50);border-color:var(--gold);box-shadow:0 0 20px rgba(212,175,55,.2)}
.btn-sec{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;padding:11px}
.btn-sec:hover{border-color:var(--gold-dim);color:var(--gold);background:rgba(212,175,55,.05)}
.btn-grp{display:flex;gap:10px;margin-top:16px}
.btn-grp .btn{flex:1}

/* ── RESULT ── */
#sigilloResult{display:none}
.result-header{text-align:center;padding:16px 0 12px}
.result-planet-badge{display:inline-block;background:rgba(212,175,55,.12);border:1px solid var(--gold-dim);color:var(--gold);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;padding:4px 16px;border-radius:10px;margin-bottom:12px}
.result-title{font-family:'Cinzel',serif;font-size:22px;color:var(--gold);letter-spacing:2px;margin-bottom:6px}
.sigillo-svg-wrap{width:180px;height:180px;margin:16px auto;background:radial-gradient(circle,rgba(212,175,55,.06) 0%,transparent 70%);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:svgPulse 3s ease-in-out infinite}
@keyframes svgPulse{0%,100%{filter:drop-shadow(0 0 8px rgba(212,175,55,.3))}50%{filter:drop-shadow(0 0 20px rgba(212,175,55,.6))}}
.sigillo-svg-wrap svg{width:160px;height:160px}

.info-block{background:rgba(10,4,24,.5);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;border-left:3px solid var(--gold-dim)}
.info-block h4{font-family:'Cinzel',serif;font-size:11px;color:var(--gold-dim);letter-spacing:1.5px;margin-bottom:7px}
.info-block p{color:var(--text);font-size:14.5px;line-height:1.65}

.mantra-box{text-align:center;padding:14px;background:rgba(212,175,55,.04);border:1px solid rgba(212,175,55,.1);border-radius:10px;margin-bottom:10px;font-style:italic;color:var(--gold-dim);font-size:14px;letter-spacing:1px}

/* ── DIVIDER ── */
.divider{display:flex;align-items:center;gap:10px;margin:24px 0;color:var(--muted);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;justify-content:center;text-align:center}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── PLANETS INFO SECTION ── */
.planets-section{margin-top:8px}
.planet-card{background:rgba(21,8,48,.5);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.planet-card:hover{border-color:var(--gold-dim);background:rgba(21,8,48,.8)}
.planet-card-head{display:flex;align-items:center;gap:12px}
.planet-card-sym{font-size:26px;filter:drop-shadow(0 0 8px rgba(212,175,55,.4))}
.planet-card-info{flex:1}
.planet-card-name{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);letter-spacing:1px}
.planet-card-sub{font-size:12px;color:var(--muted);margin-top:2px}
.planet-card-toggle{color:var(--gold-dim);font-size:12px;transition:transform .2s}
.planet-card.open .planet-card-toggle{transform:rotate(180deg)}
.planet-card-body{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);content-visibility:auto}
.planet-card.open .planet-card-body{display:block}
.pc-kw{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.pc-kw-tag{background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.15);color:var(--gold-dim);font-size:11px;padding:3px 9px;border-radius:10px;font-family:'Cinzel',serif;letter-spacing:.5px}
.pc-mantra{text-align:center;font-style:italic;color:var(--gold-dim);font-size:13px;margin-top:8px;letter-spacing:.5px}

/* ── PENTACOLI GALLERY ── */
.pentacoli-label{font-family:'Cinzel',serif;font-size:10px;color:var(--gold-dim);letter-spacing:2px;margin:16px 0 10px;text-align:center}
.pentacoli-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.pentacolo-item{background:rgba(10,4,24,.6);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;text-align:center}
.pentacolo-item:hover{border-color:var(--gold-dim);transform:scale(1.04)}
.pentacolo-item img{width:100%;aspect-ratio:1;object-fit:cover;display:block;opacity:.88;transition:opacity .2s}
.pentacolo-item:hover img{opacity:1}
.pentacolo-item .pnum{font-family:'Cinzel',serif;font-size:9px;color:var(--muted);padding:4px 2px;letter-spacing:.5px}

/* ── LIGHTBOX ── */
.lightbox{position:fixed;inset:0;z-index:9000;background:rgba(5,2,15,.93);display:none;align-items:center;justify-content:center;padding:20px}
.lightbox.open{display:flex}
.lightbox-inner{max-width:340px;width:100%;text-align:center}
.lightbox-img{width:100%;max-width:280px;border-radius:12px;border:1px solid var(--border);box-shadow:0 0 40px rgba(212,175,55,.2);margin-bottom:14px}
.lightbox-title{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);letter-spacing:1.5px;margin-bottom:6px}
.lightbox-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.lightbox-close{background:rgba(212,175,55,.08);border:1px solid var(--border);color:var(--gold);font-family:'Cinzel',serif;font-size:11px;padding:9px 24px;border-radius:20px;cursor:pointer;letter-spacing:1px}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,#2a1a4e,#1a0a3e);border:1px solid var(--gold-dim);color:var(--gold);font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;padding:10px 20px;border-radius:20px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SHARE ── */
.share-section{padding:0 16px;margin:6px 0 22px;position:relative}
.btn-share{width:100%;background:rgba(21,8,48,.7);border:1px solid var(--border);color:var(--gold);font-family:'Cinzel',serif;font-size:12px;letter-spacing:1.5px;padding:12px;border-radius:20px;cursor:pointer;transition:all .25s}
.btn-share:hover{border-color:var(--gold-dim);background:rgba(212,175,55,.08)}
.share-popup{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.share-btn{flex:1;min-width:90px;text-align:center;padding:9px;border-radius:14px;font-size:12px;font-family:'Cinzel',serif;letter-spacing:.5px;border:1px solid var(--border);color:var(--text);text-decoration:none;background:rgba(10,4,24,.5);cursor:pointer;transition:all .2s}
.share-btn:hover{border-color:var(--gold-dim);color:var(--gold)}

/* ── ARTICLE SECTION ── */
.article-section{padding:8px 16px 20px;content-visibility:auto}
.article-section h2{font-family:'Cinzel',serif;font-size:20px;color:var(--gold);letter-spacing:1px;margin-bottom:14px;line-height:1.35}
.article-section h3{font-family:'Cinzel',serif;font-size:15px;color:var(--gold-dim);letter-spacing:1px;margin:20px 0 10px}
.article-section p{font-size:15px;line-height:1.75;color:var(--text);margin-bottom:12px}
.article-section img{width:100%;border-radius:14px;margin:16px 0;border:1px solid var(--border)}
.article-links{display:flex;flex-direction:column;gap:8px;margin:18px 0}
.article-links a{color:var(--gold-dim);font-size:13.5px;text-decoration:none;border-bottom:1px dashed var(--border);padding-bottom:2px;width:fit-content;transition:color .2s}
.article-links a:hover{color:var(--gold)}
.cta-explore{display:block;text-align:center;margin-top:18px;background:linear-gradient(135deg,#2a1a4e,#1a0a3e);border:1px solid var(--gold-dim);border-radius:25px;color:var(--gold);font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;padding:14px;text-decoration:none;transition:all .25s}
.cta-explore:hover{border-color:var(--gold);box-shadow:0 0 20px rgba(212,175,55,.2)}

/* ── FAQ SECTION ── */
.faq-section{padding:8px 16px 30px;content-visibility:auto}
.faq-title{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);letter-spacing:2px;margin-bottom:14px;text-align:center}
.faq-item{border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;background:rgba(21,8,48,.4)}
.faq-question{width:100%;display:flex;justify-content:space-between;align-items:center;gap:10px;background:transparent;border:none;color:var(--text);font-family:'Cinzel',serif;font-size:13px;letter-spacing:.5px;padding:14px 16px;text-align:left;cursor:pointer}
.faq-icon{color:var(--gold-dim);font-size:16px;flex-shrink:0}
.faq-answer{padding:0 16px 14px}
.faq-answer p{font-size:14px;line-height:1.65;color:var(--muted)}

/* ── FOOTER ── */
.page-footer{padding:24px 16px 40px;text-align:center;border-top:1px solid var(--border);margin-top:10px}
.footer-links{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin-bottom:14px}
.footer-links a{color:var(--gold-dim);font-size:12.5px;text-decoration:none;letter-spacing:.5px}
.footer-links a:hover{color:var(--gold)}
.page-footer p{font-size:11.5px;color:var(--muted);line-height:1.6}
.footer-disclaimer{margin-top:8px;font-style:italic;max-width:420px;margin-left:auto;margin-right:auto}

/* ── PREMIUM MODAL ── */
.premium-modal{position:fixed;inset:0;z-index:9500;display:none;align-items:center;justify-content:center;padding:20px}
.premium-modal.show{display:flex}
.modal-overlay{position:absolute;inset:0;background:rgba(5,2,15,.88)}
.modal-content{position:relative;max-width:340px;width:100%;background:linear-gradient(160deg,#1a0a3e,#0d0520);border:1px solid var(--gold-dim);border-radius:18px;padding:26px 22px;text-align:center;box-shadow:0 0 50px rgba(212,175,55,.15)}
.modal-content h2{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);letter-spacing:1.5px;margin-bottom:12px}
.modal-content p{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:14px}
.premium-price{font-family:'Cinzel',serif;color:var(--gold-dim)!important;font-size:13px!important;letter-spacing:1px}
.btn-premium-buy{width:100%;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border:none;border-radius:22px;color:#1a0a3e;font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;padding:13px;cursor:pointer;margin-bottom:10px;transition:all .25s}
.btn-premium-buy:hover{box-shadow:0 0 22px rgba(212,175,55,.4)}
.btn-premium-skip{width:100%;background:transparent;border:1px solid var(--border);border-radius:22px;color:var(--muted);font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;padding:11px;cursor:pointer}
.btn-premium-skip:hover{color:var(--gold)}

/* ── TEMA GIORNO ── */
html.theme-day{--bg:#f5f2ed;--card:#ede8df;--text:#2a1748;--muted:#6b5b7f;--purple:#6b5b7f;--gold:#c89742;--gold-dim:#a67c52;--gold-glow:rgba(200,151,66,0.2);--border:#c89742}
html.theme-day body{background:radial-gradient(ellipse at 50% 0%,#efe6d8 0%,#f5f2ed 65%)}
html.theme-day .form-card,html.theme-day .planet-card,html.theme-day .info-block,html.theme-day .mantra-box,
html.theme-day .faq-item,html.theme-day .modal-content,html.theme-day .pentacolo-item,html.theme-day .planet-btn{
  background-color:var(--card);border-color:var(--border);color:var(--text)
}
html.theme-day h1,html.theme-day h2,html.theme-day h3,html.theme-day .hero-title,html.theme-day .result-title,
html.theme-day .article-section h2,html.theme-day .article-section h3{color:var(--text);text-shadow:none}
html.theme-day button,html.theme-day .btn{background-color:var(--gold);color:#fff;border:1px solid var(--border)}

const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';

class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play() { this.audio?.play().catch(() => {}); this.isPlaying = true; sessionStorage.setItem(AUDIO_KEY, 'true'); this.updateUI(); }
  pause() { this.audio?.pause(); this.isPlaying = false; sessionStorage.setItem(AUDIO_KEY, 'false'); this.updateUI(); }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}

const PAGE_URL = 'https://mysticaoracoli.it/sigilli-salomone.html';

function shareContent(customText) {
  const L = LANG[currentLang];

  if (navigator.share) { navigator.share({ title: L.shareTitle, text, url: PAGE_URL }).catch(() => {}); return; }
  const enc = encodeURIComponent(text + ' ' + PAGE_URL);
  const ue = encodeURIComponent(PAGE_URL);
  const wa = document.getElementById('share-wa'); if (wa) wa.href = `https://wa.me/?text=${enc}`;

function copyLink() {
  const L = LANG[currentLang];
  navigator.clipboard.writeText(PAGE_URL).then(() => {
    const b = document.getElementById('share-copy');
    if (b) { b.textContent = L.shareCopied; setTimeout(() => { b.textContent = L.shareCopy; }, 2000); }

function renderFAQ(faqs) {
  const container = document.getElementById('faqList');
  if (!container) return;
  container.innerHTML = faqs.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false">
        <span>${f.q}</span>
        <span class="faq-icon">+</span>
      </button>
      <div class="faq-answer" id="faq-ans-${i}" hidden>
        <p>${f.a}</p>
      </div>
    </div>
  `).join('');
}
function toggleFAQ(i) {
  const ans = document.getElementById(`faq-ans-${i}`);
  const btn = document.querySelector(`#faq-${i} .faq-question`);
  const icon = btn?.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  if (icon) icon.textContent = isOpen ? '+' : '−';
  btn?.setAttribute('aria-expanded', String(!isOpen));
}

      break;
  }
  return `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="${sym}">
    <circle cx="100" cy="95" r="88" fill="none" stroke="${c}" stroke-width="1" opacity=".4"/>
    ${inner}
    <text x="100" y="108" text-anchor="middle" font-family="serif" font-size="36" fill="${c}" opacity=".95">${sym}</text>
  </svg>`;
}

function scoreSigillo(testo, key) {
  if (!testo) return 0;
  const t = testo.toLowerCase();
  const kws = PLANET_I18N[currentLang][key].keywords;
  let score = 0;
  kws.forEach(k => {
    if (t.includes(k.toLowerCase())) score += 10;
    else if (k.length > 4 && t.includes(k.slice(0, 4).toLowerCase())) score += 3;
  });
  return score;
}

function trovaSigillo() {
  const L = LANG[currentLang];
  const intento = (document.getElementById('sigilloIntento').value || '').trim();
  const nome = (document.getElementById('sigilloNome').value || '').trim();
  if (!intento || !nome) { toast(L.toastMissing); return; }

  let key;
  if (_selPianeta >= 0) {
    key = DB_PLANETS[_selPianeta].key;
  } else {
    const ranking = DB_PLANETS.map(p => ({ key: p.key, score: scoreSigillo(intento, p.key) }));
    const best = ranking.sort((a, b) => b.score - a.score)[0];
    if (best && best.score > 0) {
      key = best.key;
    } else {
      const idx = nome.split('').reduce((a, c) => a + c.charCodeAt(0), 0) % DB_PLANETS.length;
      key = DB_PLANETS[idx].key;
    }
  }
  renderSigillo(key);
}

function renderSigillo(key) {
  _ultimoSigilloKey = key;
  const p = DB_PLANETS.find(x => x.key === key);
  const t = PLANET_I18N[currentLang][key];

  document.getElementById('res-planet-badge').textContent = t.pianeta;
  document.getElementById('res-planet-badge').style.color = p.colore;
  document.getElementById('res-planet-badge').style.borderColor = p.colore + '50';
  document.getElementById('res-title').textContent = t.nome;
  document.getElementById('res-title').style.color = p.colore;
  document.getElementById('sigillo-svg-wrap').innerHTML = generaSVG(p);
  document.getElementById('sigillo-svg-wrap').style.boxShadow = `0 0 40px ${p.colore}25`;
  document.getElementById('res-descrizione').textContent = t.descrizione;
  document.getElementById('res-mantra').textContent = '« ' + p.mantra + ' »';

  document.getElementById('sigilloForm').style.display = 'none';
  document.getElementById('sigilloResult').style.display = 'block';

  burst();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetSigillo() {
  document.getElementById('sigilloForm').style.display = 'block';
  document.getElementById('sigilloResult').style.display = 'none';
  document.getElementById('sigilloIntento').value = '';
  document.getElementById('sigilloNome').value = '';
  _selPianeta = -1;
  _ultimoSigilloKey = null;
  selPianeta(-1);
}

function salvaGrimorio() {
  const L = LANG[currentLang];
  const t = document.getElementById('res-title').textContent;
  try {
    const storia = JSON.parse(localStorage.getItem('MYSTICA_STORIA') || '[]');
    const giaSalvati = storia.filter(s => s.sezione === 'Sigillo di Salomone').length;
    if (!isPremium() && giaSalvati >= 5) {
      toast(L.toastLimit);
      requirePremium('storico_sigilli');
      return;
    }
    storia.unshift({ sezione: 'Sigillo di Salomone', testo: t, data: new Date().toLocaleDateString(currentLang) });
    localStorage.setItem('MYSTICA_STORIA', JSON.stringify(storia.slice(0, 50)));
  } catch (e) {}
  toast(L.toastSaved);
}

// Burst effect
function burst() {
  const n = 10;
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.style.cssText = `position:fixed;pointer-events:none;z-index:9999;
      width:5px;height:5px;border-radius:50%;
      background:${['#d4af37', '#fff8e7', '#c8a030', '#e8d080'][i % 4]};
      left:${40 + Math.random() * 20}%;top:${30 + Math.random() * 20}%;
      animation:burstP .8s ease-out forwards;
      --tx:${(Math.random() - 0.5) * 120}px;--ty:${(Math.random() - 0.5) * 120}px;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
  if (!document.getElementById('burstStyle')) {
    const s = document.createElement('style');
    s.id = 'burstStyle';
    s.textContent = '@keyframes burstP{to{transform:translate(var(--tx),var(--ty));opacity:0}}';
    document.head.appendChild(s);
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

const IMG_BASE = 'https://raw.githubusercontent.com/mystica-oracolo/delle-stelle/main/images/pentacoliresalomone/pentacoli/';
const ORDINI = ['primo', 'secondo', 'terzo', 'quarto', 'quinto', 'sesto', 'settimo']; // solo per path immagine — NON tradotti (percorso file invariato)

function buildPentacoliGrid(p, planetIdx) {
  const descs = PENT_DESC_I18N[currentLang][p.key] || [];
  const t = PLANET_I18N[currentLang][p.key];
  return ORDINI.map((ord, j) => {
    const imgUrl = `${IMG_BASE}${ord}-${p.key}.webp`;
    const desc = (descs[j] || '').replace(/'/g, "\\'");
    return `<div class="pentacolo-item" onclick="event.stopPropagation();openLightbox('${imgUrl}','${t.nome} — ${j + 1}°','${desc}')">
      <img src="${imgUrl}" alt="${t.pianeta} — Pentacolo ${j + 1}" loading="lazy" decoding="async" onerror="this.parentElement.style.display='none'">
      <div class="pnum">${j + 1}°</div>
    </div>`;
  }).join('');
}

function renderPlanets() {
  const sec = document.getElementById('planetsSection');
  if (!sec) return;
  sec.innerHTML = DB_PLANETS.map((p, i) => {
    const t = PLANET_I18N[currentLang][p.key];
    return `
    <div class="planet-card" onclick="toggleCard(this)">
      <div class="planet-card-head">
        <span class="planet-card-sym" style="color:${p.colore};text-shadow:0 0 12px ${p.colore}70" aria-hidden="true">${p.simbolo}</span>
        <div class="planet-card-info">
          <div class="planet-card-name" style="color:${p.colore}">${t.nome}</div>
          <div class="planet-card-sub">${t.keywords.slice(0, 3).join(' · ')}</div>
        </div>
        <span class="planet-card-toggle" aria-hidden="true">▾</span>
      </div>
      <div class="planet-card-body">
        <p style="font-size:14px;color:var(--text);line-height:1.65;margin-bottom:10px">${t.descrizione}</p>
        <div class="pc-mantra">« ${p.mantra} »</div>
        <div class="pc-kw">${t.keywords.map(k => `<span class="pc-kw-tag">${k}</span>`).join('')}</div>
        <div class="pentacoli-label">✦ ${currentLang === 'it' ? 'I 7 PENTACOLI' : (currentLang === 'en' ? 'THE 7 PENTACLES' : 'LOS 7 PENTÁCULOS')} ✦</div>
        <div class="pentacoli-grid">${buildPentacoliGrid(p, i)}</div>
        <button class="btn" style="margin-top:14px;font-size:11px;padding:10px" onclick="event.stopPropagation();usaPianeta(${i})">✦ ${currentLang === 'it' ? 'Usa questo Sigillo' : (currentLang === 'en' ? 'Use this Seal' : 'Usar este Sello')}</button>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(el) { el.classList.toggle('open'); }

function usaPianeta(idx) {
  selPianeta(idx);
  document.getElementById('sigilloForm').scrollIntoView({ behavior: 'smooth' });
  const t = PLANET_I18N[currentLang][DB_PLANETS[idx].key];
  const L = LANG[currentLang];
  toast(`${L.toastPlanet}: ${t.pianeta}`);
}

// LIGHTBOX
function openLightbox(imgUrl, titolo, desc) {
  document.getElementById('lb-img').src = imgUrl;
  document.getElementById('lb-title').textContent = titolo;
  document.getElementById('lb-desc').textContent = desc;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
