<style>
/* ── Reset / Variables ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0514;
  --card:#140c24;
  --purple:#2a1748;
  --gold:#d4af37;
  --gold-dim:#b8860b;
  --gold-glow:rgba(212,175,55,0.4);
  --text:#f4f1fa;
  --muted:#b8b2d1;
  --radius:18px;
  --border:rgba(212,175,55,0.2);
  --wood:#4a9e6b;
  --fire:#c0392b;
  --earth:#c8922a;
  --metal:#a8b8c8;
  --water:#2980b9;
}
html.theme-day{
  --bg:#f5f2ed;
  --card:#ede8df;
  --text:#2a1748;
  --muted:#6b5b7f;
  --purple:#6b5b7f;
  --gold:#c89742;
  --gold-dim:#a67c52;
  --gold-glow:rgba(200,151,66,0.2);
  --border:#c89742;
}
html.theme-day .card,
html.theme-day .animal-card,
html.theme-day .highlight,
html.theme-day .toc,
html.theme-day .dash-card{
  background-color:var(--card);
  border:2px solid var(--border);
  color:var(--text);
}
html.theme-day h1, html.theme-day h2, html.theme-day h3{
  color:var(--text); text-shadow:none;
}
html.theme-day button{
  background-color:var(--gold); color:var(--text); border:2px solid var(--border);
}
html.theme-day input, html.theme-day select{
  background-color:#ffffff; color:var(--text); border:2px solid var(--border);
}

/* ── Layout ── */
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:16px;line-height:1.8;min-height:100vh;transition:background .3s,color .3s}
main{max-width:480px;margin:0 auto;padding:0 18px 60px;position:relative;z-index:1}
a{color:var(--gold);text-decoration:none}
a:hover{text-decoration:underline}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.skip-link{position:absolute;left:-999px;top:0;background:var(--gold);color:#0a0514;padding:8px 16px;z-index:999;border-radius:0 0 8px 0}
.skip-link:focus{left:0}

/* ── Sfondo Cosmico ── */
.cosmos{
  position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, #2a174830 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 80%, #1a073820 0%, transparent 60%),
    radial-gradient(2px 2px at 15% 25%, #fff9 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 75% 15%, #fff7 0%, transparent 100%),
    radial-gradient(2px 2px at 45% 70%, #d4af3780 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 45%, #fff6 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 85%, #fff5 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 35%, #d4af3760 0%, transparent 100%);
  animation:twinkle 14s infinite alternate;
}
@keyframes twinkle{0%{opacity:.35}50%{opacity:.55}100%{opacity:.45}}

/* ── Header ── */
.page-header{padding:max(20px,calc(20px + env(safe-area-inset-top,0px))) 18px 16px;text-align:center;position:relative;z-index:2}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.btn-back{font-family:'Crimson Pro',serif;font-size:14px;color:var(--gold);text-decoration:none}
.header-controls{display:flex;gap:10px}
.btn-icon{background:var(--card);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;font-size:16px;color:var(--gold);cursor:pointer;transition:all .25s ease}
.btn-icon:hover{border-color:var(--gold)}
.page-title{font-family:'Cinzel',serif;font-size:22px;color:var(--gold);letter-spacing:1.5px;text-shadow:0 0 20px var(--gold-glow);margin-bottom:12px}
.lang-switch{display:flex;justify-content:center;gap:8px}
.btn-lang{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 12px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .25s ease}
.btn-lang.active{color:var(--gold);border-color:var(--gold)}

/* ── Hero ── */
.hero{text-align:center;margin:8px 0 28px;padding:32px 20px 28px;background:linear-gradient(145deg,var(--purple),var(--card));border:1px solid var(--border);border-radius:var(--radius);position:relative;overflow:hidden}
.hero-hanzi{font-size:60px;line-height:1;margin-bottom:8px;display:block;filter:drop-shadow(0 0 24px var(--gold-glow));letter-spacing:6px;color:var(--gold)}
.hero-badge{display:inline-block;margin-top:16px;padding:6px 16px;border:1px solid var(--gold-dim);border-radius:50px;font-family:'Cinzel',serif;font-size:10px;color:var(--gold);letter-spacing:2px}
.hero-sub{font-size:14px;color:var(--muted);line-height:1.7}

/* ── Breadcrumb ── */
nav.breadcrumb{font-size:12px;color:var(--muted);margin-bottom:20px}
nav.breadcrumb a{color:var(--gold)}
nav.breadcrumb span{margin:0 6px;opacity:.5}

/* ── Calcolatore (sezione interattiva — sempre in cima) ── */
.calc-section{background:linear-gradient(145deg,var(--card),var(--purple));border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;margin-bottom:24px}
.calc-section h2{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);letter-spacing:1px;margin-bottom:6px;border:none;padding:0}
.calc-note{font-size:13px;color:var(--muted);margin-bottom:16px}
.calc-field{margin-bottom:14px}
.calc-field label{display:block;font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:1px;margin-bottom:6px}
.calc-field input{width:100%;padding:12px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Crimson Pro',serif;font-size:15px}
button.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#0a0514;border:none;border-radius:50px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:all .25s ease;margin-top:6px}
button.btn-primary:hover{box-shadow:0 4px 24px var(--gold-glow);transform:translateY(-1px)}
.calc-result{margin-top:18px;padding:18px;background:rgba(212,175,55,0.06);border:1px solid var(--border);border-radius:14px;display:none}
.calc-result.show{display:block}
.calc-result-animal{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);letter-spacing:1px;margin-bottom:6px;text-align:center}
.calc-result-hanzi{font-size:44px;text-align:center;display:block;margin-bottom:8px;filter:drop-shadow(0 0 10px var(--gold-glow))}
.calc-result-elem{text-align:center;font-size:13px;color:var(--muted);margin-bottom:10px}
.calc-result-trait{font-size:14px;color:var(--text);opacity:.9;text-align:center}
.calc-locked{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.calc-locked h3{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:1px;margin-bottom:10px}
.btn-secondary{width:100%;padding:12px;background:transparent;border:1px solid var(--gold-dim);color:var(--gold);border-radius:50px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;cursor:pointer}

/* ── Sections generiche ── */
.article-section{margin-top:6px}
section, .toc{margin-bottom:32px}
.toc{background:var(--gold-glow);border:1px solid var(--border);border-radius:14px;padding:18px 20px}
.toc-title{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:2px;margin-bottom:10px;text-transform:uppercase}
.toc ol{padding-left:18px}
.toc li{margin-bottom:6px}
.toc a{color:var(--muted);font-size:13px}
.toc a:hover{color:var(--gold)}

h2{font-family:'Cinzel',serif;font-size:17px;color:var(--gold);letter-spacing:1.2px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
h3{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);letter-spacing:1px;margin:18px 0 10px;opacity:.9}
p{margin-bottom:14px;color:var(--text);opacity:.9;font-size:15px}
ul,ol{padding-left:20px;margin-bottom:16px}
li{margin-bottom:8px;font-size:14px;color:var(--text);opacity:.9;line-height:1.7}
strong{color:var(--text);opacity:1}

.card{background:linear-gradient(145deg,var(--card),var(--purple));border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:18px}
.highlight{background:rgba(212,175,55,0.06);border:1px solid rgba(212,175,55,0.2);border-radius:12px;padding:14px 16px;margin:14px 0}
.highlight p{margin:0;font-size:13px}

img{max-width:100%}
figure{margin:16px 0}
figcaption{font-size:12px;color:var(--muted);text-align:center;margin-top:6px}

/* ── Animal gallery ── */
.animal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0}
.animal-card{background:linear-gradient(145deg,var(--card),var(--purple));border:1px solid var(--border);border-radius:14px;overflow:hidden;text-align:center}
.animal-card img{width:100%;display:block;aspect-ratio:1/1;object-fit:cover}
.animal-card-name{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);letter-spacing:1px;padding:8px 4px 2px}
.animal-card-elem{font-size:10px;color:var(--muted);padding-bottom:8px}

/* ── Elements grid ── */
.elements-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:18px 0}
.element-card{border-radius:12px;padding:12px 4px;text-align:center;border:1px solid}
.element-card.wood{background:rgba(74,158,107,0.08);border-color:rgba(74,158,107,0.35);color:var(--wood)}
.element-card.fire{background:rgba(192,57,43,0.08);border-color:rgba(192,57,43,0.35);color:var(--fire)}
.element-card.earth{background:rgba(200,146,42,0.08);border-color:rgba(200,146,42,0.35);color:var(--earth)}
.element-card.metal{background:rgba(168,184,200,0.08);border-color:rgba(168,184,200,0.35);color:var(--metal)}
.element-card.water{background:rgba(41,128,185,0.08);border-color:rgba(41,128,185,0.35);color:var(--water)}
.element-hanzi{font-size:26px;display:block;margin-bottom:4px;filter:drop-shadow(0 0 6px currentColor)}
.element-name{font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;display:block;margin-bottom:2px}
.element-cn{font-size:9px;opacity:.7;display:block}

/* ── Compatibility table ── */
.compat-table{width:100%;border-collapse:collapse;margin:14px 0;font-size:12px}
.compat-table th{font-family:'Cinzel',serif;font-size:9px;color:var(--gold);letter-spacing:1px;padding:8px;border-bottom:1px solid var(--border);text-align:left;background:rgba(212,175,55,0.05)}
.compat-table td{padding:8px;border-bottom:1px solid rgba(212,175,55,0.07);color:var(--text);opacity:.85}
.compat-table tr:last-child td{border-bottom:none}

/* ── Share ── */
.share-section{margin-bottom:24px}
.btn-share{width:100%;padding:13px;background:var(--card);border:1px solid var(--border);color:var(--gold);border-radius:50px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;cursor:pointer}
.share-popup{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px}
.share-btn{flex:1;min-width:100px;text-align:center;padding:10px;border-radius:10px;font-size:12px;border:1px solid var(--border);color:var(--text);background:var(--card)}
.share-btn.copy{cursor:pointer;font-family:inherit}

/* ── CTA ── */
.cta-explore{display:block;text-align:center;padding:14px;margin-top:20px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#0a0514;border-radius:50px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:1.5px}

/* ── Article internal links ── */
.article-links{display:flex;flex-direction:column;gap:8px;margin:18px 0;padding:14px;background:rgba(212,175,55,0.04);border:1px solid rgba(212,175,55,0.15);border-radius:12px}
.article-links a{font-size:13px}

/* ── FAQ ── */
.faq-section{content-visibility:auto}
.faq-title{font-family:'Cinzel',serif;font-size:17px;color:var(--gold);letter-spacing:1.2px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.faq-item{border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.faq-question{width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center;font-family:'Cinzel',serif;font-size:13px;color:var(--gold);padding:14px 16px;background:rgba(212,175,55,0.04);border:none;cursor:pointer;letter-spacing:.3px}
.faq-icon{font-size:16px}
.faq-answer{font-size:13px;color:var(--text);opacity:.85;padding:0 16px;line-height:1.7;border-top:1px solid rgba(212,175,55,0.12)}
.faq-answer p{padding:12px 0;margin:0}

/* ── Footer ── */
.page-footer{text-align:center;padding:26px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);letter-spacing:.5px;position:relative;z-index:1}
.footer-links{margin-bottom:12px;display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
.footer-links a{color:var(--gold)}
.footer-disclaimer{opacity:.7;font-size:10px;margin-top:8px;line-height:1.6}

/* ── Premium Modal ── */
.premium-modal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center}
.premium-modal.show{display:flex}
.modal-overlay{position:absolute;inset:0;background:rgba(10,5,20,0.85)}
.modal-content{position:relative;background:linear-gradient(145deg,var(--card),var(--purple));border:1px solid var(--gold-dim);border-radius:20px;padding:28px 24px;max-width:340px;width:90%;text-align:center;z-index:1}
.modal-content h2{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);border:none;padding:0;margin-bottom:12px}
.modal-content p{font-size:14px;color:var(--muted)}
.premium-price{color:var(--gold)!important;font-family:'Cinzel',serif;font-size:14px;margin:14px 0!important}
.btn-premium-buy{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#0a0514;border:none;border-radius:50px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-bottom:10px}
.btn-premium-skip{width:100%;padding:10px;background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer}

@media(max-width:360px){.animal-grid{grid-template-columns:repeat(2,1fr)}}
</style>

    <a href="./index.html" class="btn-back" id="btn-back"></a>
    <div class="header-controls">
      <button id="musicToggle" class="btn-icon" aria-label="Toggle musica">🎵</button>
      <button id="themeToggle" class="btn-icon" aria-label="Toggle tema">🌙</button>

  <h1 class="page-title" id="page-title"></h1>

    <button data-lang="en" class="btn-lang">EN</button>
    <button data-lang="es" class="btn-lang">ES</button>
  </div>
</header>

<main id="main-content">

  <!-- HERO -->
  <div class="hero">
    <span class="hero-hanzi">生肖</span>
    <p class="hero-sub" id="hero-sub"></p>
    <span class="hero-badge" id="hero-badge"></span>
  </div>

  <!-- BREADCRUMB -->
  <nav class="breadcrumb" aria-label="breadcrumb">
    <a href="./index.html" id="bc-home"></a>
    <span>›</span>
    <a href="./enciclopedia.html" id="bc-enc"></a>
    <span>›</span>
    <span id="bc-current"></span>
  </nav>

  <!-- 3a. SEZIONE INTERATTIVA — CALCOLATORE (SEMPRE IN CIMA) -->
  <section class="calc-section" id="calcolatore" aria-labelledby="calc-title">
    <h2 id="calc-title"></h2>
    <p class="calc-note" id="calc-note"></p>

    <div class="calc-field">
      <label for="birthdate" id="calc-label"></label>
      <input type="date" id="birthdate" min="1924-01-01" max="2033-12-31">
    </div>
    <button type="button" class="btn-primary" id="calc-btn"></button>

    <div class="calc-result" id="calcResult" aria-live="polite">

      <div class="calc-result-animal" id="result-animal"></div>

    artTitle: 'Orígenes y Leyenda de los 12 Animales',

    artH3: 'Un sistema de cualidades, no solo de años',
    artP1: 'El Horóscopo Chino (生肖, Shēngxiào, literalmente "signo del nacimiento") es uno de los sistemas astrológicos más antiguos y difundidos del mundo, con raíces que se remontan a más de 2000 años de historia china. A diferencia de la astrología occidental, basada en el mes de nacimiento, el zodiaco chino asigna un animal a cada año, siguiendo un ciclo de 12 años que se repite infinitamente. La leyenda más conocida cuenta que el Emperador de Jade, soberano celestial, organizó una gran carrera para establecer el orden de los animales: quien lograra cruzar primero el río obtendría un lugar de honor en el calendario.',
    artHighlight1: '🐱 Una variante de la leyenda también explica por qué el Gato no forma parte del zodiaco: la Rata, temiendo la competencia, no habría avisado al Gato del día de la carrera, haciendo que llegara demasiado tarde.',

/* ── Rendering blocchi specifici della pagina ── */
function renderAnimalGrid(L) {
  const grid = document.getElementById('animalGrid');
  if (!grid) return;
  const order = ['rat','ox','tiger','rabbit','dragon','snake','horse','goat','monkey','rooster','dog','pig'];
  const fileNames = { rat:'topo', ox:'bue', tiger:'tigre', rabbit:'coniglio', dragon:'drago', snake:'serpente', horse:'cavallo', goat:'capra', monkey:'scimmia', rooster:'gallo', dog:'cane', pig:'maiale' };
  grid.innerHTML = order.map(k => {
    const a = L.animals[k];
    const imgName = fileNames[k];
    return `<div class="animal-card">
      <img src="./images/icone/cinese/${imgName}.webp" srcset="./images/icone/cinese/${imgName}.webp 1x, ./images/icone/cinese/${imgName}@2x.webp 2x" alt="${a.name} - Oroscopo Cinese" loading="lazy" decoding="async" width="150" height="150">

    traits.innerHTML = order.map(k => `<li><strong>${L.animals[k].name}</strong> — ${L.animals[k].trait}</li>`).join('');

function renderElementsGrid(L) {
  const grid = document.getElementById('elementsGrid');

  const order = ['wood','fire','earth','metal','water'];

/* ── Audio Manager ── */
const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';

class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.preload = 'none';
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play() {
    this.audio?.play().catch(() => {});
    this.isPlaying = true;
    sessionStorage.setItem(AUDIO_KEY, 'true');
    this.updateUI();
  }
  pause() {
    this.audio?.pause();
    this.isPlaying = false;
    sessionStorage.setItem(AUDIO_KEY, 'false');
    this.updateUI();
  }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}
window.audioManager = new AudioManager();
document.getElementById('musicToggle')?.addEventListener('click', () => window.audioManager.toggle());

  const ans = document.getElementById(`faq-ans-${i}`);

  const icon = btn?.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  if (icon) icon.textContent = isOpen ? '+' : '−';
  btn?.setAttribute('aria-expanded', String(!isOpen));
}

  2029:[2,13],2030:[2,3],2031:[1,23],2032:[2,11],2033:[1,31]
};
const ANIMAL_ORDER = ['rat','ox','tiger','rabbit','dragon','snake','horse','goat','monkey','rooster','dog','pig'];
const ELEMENT_ORDER = ['metal','water','wood','fire','earth'];

function getLunarYear(y, m, d) {
  const cny = CNY_DATES[y];
  if (!cny) return y; // fuori tabella: approssimazione sull'anno solare
  const [cm, cd] = cny;
  if (m < cm || (m === cm && d < cd)) return y - 1;
  return y;
}
function getAnimalKey(lunarYear) {
  const idx = (((lunarYear - 4) % 12) + 12) % 12;
  return ANIMAL_ORDER[idx];
}
function getElementKey(lunarYear) {
  const lastDigit = ((lunarYear % 10) + 10) % 10;
  return ELEMENT_ORDER[Math.floor(lastDigit / 2)];
}
function computeZodiac(dateStr) {
  if (!dateStr) return null;
  const [y, m, d] = dateStr.split('-').map(Number);
  const lunarYear = getLunarYear(y, m, d);
  return { animal: getAnimalKey(lunarYear), element: getElementKey(lunarYear), lunarYear };
}

let lastResultKey = null;
let lastResultLang = null;

function renderCalcResult(animalKey) {
  const L = LANG[currentLang];
  const a = L.animals[animalKey];
  document.getElementById('result-hanzi').textContent = a.hanzi;
  document.getElementById('result-animal').textContent = a.name;
  document.getElementById('result-elem').textContent = L.resultElemPrefix + a.elem;
  document.getElementById('result-trait').textContent = a.trait;
  document.getElementById('calcResult').classList.add('show');
}

document.getElementById('calc-btn')?.addEventListener('click', () => {
  const val = document.getElementById('birthdate').value;
  const res = computeZodiac(val);
  if (!res) return;
  lastResultKey = res.animal;
  renderCalcResult(res.animal);
  document.getElementById('calc-locked').hidden = false;
  gtag('event', 'zodiac_calculated', { animal: res.animal });
});

document.getElementById('calc-btn-2')?.addEventListener('click', () => {
  if (!requirePremium('compatibilita_avanzata')) return;
  const val1 = document.getElementById('birthdate').value;
  const val2 = document.getElementById('partnerdate').value;
  const res1 = computeZodiac(val1);
  const res2 = computeZodiac(val2);
  if (!res1 || !res2) return;
  const L = LANG[currentLang];
  const nameA = L.animals[res1.animal].name;
  const nameB = L.animals[res2.animal].name;
  let text;
  if (res1.animal === res2.animal) {
    text = L.compatSame.replace('{a}', nameA);
  } else {
    const trigonoGroups = [['rat','dragon','monkey'],['ox','snake','rooster'],['tiger','horse','dog'],['rabbit','goat','pig']];
    const oppositions = { rat:'horse', horse:'rat', ox:'goat', goat:'ox', tiger:'monkey', monkey:'tiger', rabbit:'rooster', rooster:'rabbit', dragon:'dog', dog:'dragon', snake:'pig', pig:'snake' };
    const sameTrigono = trigonoGroups.find(g => g.includes(res1.animal) && g.includes(res2.animal));
    if (sameTrigono) {
      const idx = trigonoGroups.indexOf(sameTrigono);
      text = L.compatTrigono.replace('{a}', nameA).replace('{b}', nameB).replace('{energy}', L.trigoni[idx].energy);
    } else if (oppositions[res1.animal] === res2.animal) {
      text = L.compatOpposition.replace('{a}', nameA).replace('{b}', nameB);
    } else {
      text = L.compatNeutral.replace('{a}', nameA).replace('{b}', nameB);
    }
  }
  document.getElementById('result-compat').textContent = text;
});

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  applyTheme(isDayMode);
  applyLang();
  document.querySelectorAll('[data-lang]').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
});
</script>
