<style>

@font-face { font-family: 'Cinzel'; font-display: swap; }
@font-face { font-family: 'Cinzel Decorative'; font-display: swap; }
@font-face { font-family: 'Crimson Pro'; font-display: swap; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #07031a;
  --card: #0b0520;
  --text: #e8dcc8;
  --muted: #8a7a60;
  --gold: #d4af37;
  --gold-dim: rgba(212,175,55,0.4);
  --gold-glow: rgba(212,175,55,0.15);
  --purple: #1a0a2e;
  --radius: 18px;
  /* colori HD centri */
  --hd-red: #e05050;
  --hd-orange: #e07830;
  --hd-yellow: #d4b830;
  --hd-green: #50b050;
  --hd-teal: #40a0a0;
  --hd-blue: #4070d4;
  --hd-indigo: #6050c0;
  --hd-violet: #9050b0;
  --hd-pink: #c04080;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 15px;
  line-height: 1.7;
  min-height: 100vh;
  background-image: radial-gradient(ellipse 80% 50% at 50% 0%, #1a0a3e 0%, #07031a 60%);
}

/* ── HEADER ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(7,3,26,0.97);
  border-bottom: 1px solid var(--gold-dim);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-back {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--gold);
  text-decoration: none;
  font-family: 'Cinzel', serif;
  font-size: 13px;
  opacity: 0.85;
  transition: opacity .2s;
  white-space: nowrap;
}
.header-back:hover { opacity: 1; }
.header-back svg { width: 18px; height: 18px; flex-shrink: 0; }
.header-title {
  flex: 1;
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: 14px;
  color: var(--gold);
  letter-spacing: .06em;
}

/* ── LAYOUT ── */
.page-wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 16px 12px 60px;
}

/* ── HERO ── */
.hero {
  text-align: center;
  padding: 28px 16px 22px;
  margin-bottom: 4px;
}
.hero-icon { font-size: 44px; margin-bottom: 12px; display: block; }
.hero h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: 22px;
  color: var(--gold);
  line-height: 1.3;
  margin-bottom: 12px;
}
.hero p {
  font-size: 14px;
  color: var(--muted);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.75;
}

/* ── BREADCRUMB ── */
.breadcrumb {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.breadcrumb a { color: var(--gold); text-decoration: none; opacity: .8; }
.breadcrumb a:hover { opacity: 1; }
.breadcrumb span { opacity: .5; }

/* ── TOPIC NAV ── */
.topic-nav {
  background: var(--card);
  border: 1px solid var(--gold-dim);
  border-radius: var(--radius);
  padding: 14px 14px 10px;
  margin-bottom: 16px;
}
.topic-nav p {
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  margin-bottom: 10px;
  letter-spacing: .05em;
  text-transform: uppercase;
}
.topic-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  justify-content: center;
}
.topic-pills a {
  background: rgba(212,175,55,0.08);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  padding: 5px 11px;
  border-radius: 20px;
  font-size: 12px;
  text-decoration: none;
  transition: background .2s;
  font-family: 'Cinzel', serif;
}
.topic-pills a:hover { background: rgba(212,175,55,0.18); }

/* ── CARD BASE ── */
.card {
  background: var(--card);
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
}
.card.gold-border { border-color: rgba(212,175,55,0.4); }

.card h2 {
  font-family: 'Cinzel Decorative', serif;
  color: var(--gold);
  font-size: 17px;
  line-height: 1.35;
  margin-bottom: 12px;
}
.card h3 {
  font-family: 'Cinzel', serif;
  color: var(--gold);
  font-size: 14px;
  letter-spacing: .04em;
  margin: 16px 0 8px;
}
.card p {
  font-size: 14px;
  line-height: 1.85;
  color: var(--text);
  margin-bottom: 10px;
}
.card p:last-child { margin-bottom: 0; }
.card p em { color: #c8a860; font-style: italic; }
.card ul {
  padding-left: 18px;
  margin-bottom: 10px;
}
.card ul li {
  font-size: 14px;
  color: var(--text);
  line-height: 1.75;
  margin-bottom: 4px;
}
.card ul li strong { color: var(--gold); }

/* ── SECTION LABEL ── */
.section-label {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(212,175,55,0.12);
}

/* ── BODYGRAPH SVG CONTAINER ── */
.bodygraph-wrap {
  background: linear-gradient(145deg, #0d0625, #07031a);
  border: 1px solid rgba(212,175,55,0.25);
  border-radius: var(--radius);
  padding: 20px 12px;
  margin-bottom: 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.bodygraph-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,0.5), transparent);
}
.bodygraph-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--gold);
  letter-spacing: .08em;
  margin-bottom: 16px;
  text-transform: uppercase;
}
.bodygraph-svg {
  width: 100%;
  max-width: 300px;
  height: auto;
  margin: 0 auto;
  display: block;
}

/* ── CENTRI GRID ── */
.centri-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 14px;
}
.centro-item {
  background: rgba(212,175,55,0.04);
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: 12px;
  padding: 12px 11px;
  position: relative;
  overflow: hidden;
}
.centro-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  border-radius: 12px 12px 0 0;
}
.centro-item.c-head::before { background: var(--hd-violet); }
.centro-item.c-ajna::before { background: var(--hd-indigo); }
.centro-item.c-throat::before { background: var(--hd-teal); }
.centro-item.c-g::before { background: var(--hd-yellow); }
.centro-item.c-heart::before { background: var(--hd-red); }
.centro-item.c-sacral::before { background: var(--hd-orange); }
.centro-item.c-spleen::before { background: var(--hd-green); }
.centro-item.c-solar::before { background: var(--hd-pink); }
.centro-item.c-root::before { background: #a05030; }
.centro-name {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  color: var(--gold);
  letter-spacing: .04em;
  margin-bottom: 4px;
}
.centro-emoji { font-size: 18px; float: right; margin-top: -2px; }
.centro-theme {
  font-size: 11px;
  color: var(--muted);
  font-style: italic;
  margin-bottom: 5px;
}
.centro-desc {
  font-size: 12px;
  color: var(--text);
  line-height: 1.6;
}

/* ── TIPI CARDS ── */
.tipi-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 14px;
}
.tipo-card {
  background: rgba(212,175,55,0.04);
  border: 1px solid rgba(212,175,55,0.18);
  border-radius: 14px;
  padding: 14px 14px 12px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: border-color .25s, background .25s;
}
.tipo-card:hover { border-color: rgba(212,175,55,0.45); background: rgba(212,175,55,0.07); }
.tipo-card.active { border-color: var(--gold); background: rgba(212,175,55,0.09); }
.tipo-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 0;
}
.tipo-icon { font-size: 26px; flex-shrink: 0; }
.tipo-name {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  color: var(--gold);
  letter-spacing: .04em;
}
.tipo-pop {
  font-size: 11px;
  color: var(--muted);
  margin-left: auto;
  white-space: nowrap;
  background: rgba(212,175,55,0.08);
  border: 1px solid rgba(212,175,55,0.18);
  border-radius: 20px;
  padding: 2px 8px;
  font-family: 'Cinzel', serif;
}
.tipo-body {
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid rgba(212,175,55,0.12);
}
.tipo-card.active .tipo-body { display: block; }
.tipo-body p {
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.8;
  margin-bottom: 8px;
}
.tipo-body p:last-child { margin-bottom: 0; }
.tipo-badge {
  display: inline-block;
  background: rgba(212,175,55,0.1);
  border: 1px solid var(--gold-dim);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--gold);
  font-family: 'Cinzel', serif;
  letter-spacing: .04em;
  margin-right: 5px;
  margin-bottom: 5px;
}
.tipo-badges { margin: 8px 0 6px; }

/* ── AUTORITÀ TABLE ── */
.autorita-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 14px;
}
.aut-item {
  background: rgba(212,175,55,0.04);
  border: 1px solid rgba(212,175,55,0.14);
  border-radius: 12px;
  padding: 12px 13px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.aut-icon {
  font-size: 22px;
  flex-shrink: 0;
  margin-top: 1px;
}
.aut-name {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--gold);
  letter-spacing: .03em;
  margin-bottom: 4px;
}
.aut-desc {
  font-size: 13px;
  color: var(--text);
  line-height: 1.7;
}

/* ── PROFILI GRID ── */
.profili-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 14px;
}
.profilo-item {
  background: rgba(212,175,55,0.04);
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: 12px;
  padding: 11px 10px;
  text-align: center;
}
.profilo-num {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  color: var(--gold);
  margin-bottom: 3px;
  display: block;
}
.profilo-name {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--text);
  letter-spacing: .03em;
  display: block;
  margin-bottom: 5px;
}
.profilo-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.55;
}

/* ── GATE TABS ── */
.gate-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  overflow-x: auto;
  scrollbar-width: none;
}
.gate-tabs::-webkit-scrollbar { display: none; }
.gate-tab {
  flex-shrink: 0;
  padding: 7px 13px;
  background: rgba(212,175,55,0.06);
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: 20px;
  color: var(--muted);
  font-family: 'Cinzel', serif;
  font-size: 12px;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.gate-tab.active, .gate-tab:hover {
  background: rgba(212,175,55,0.16);
  border-color: var(--gold);
  color: var(--gold);
}
.gate-panel { display: none; }
.gate-panel.active { display: block; }
.gate-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 7px;
}
.gate-chip {
  background: rgba(212,175,55,0.06);
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: 8px;
  padding: 7px 5px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  position: relative;
}
.gate-chip:hover {
  background: rgba(212,175,55,0.15);
  border-color: var(--gold-dim);
}
.gate-chip .gate-num {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--gold);
  font-weight: 700;
}
.gate-chip .gate-kw {
  font-size: 10px;
  color: var(--muted);
  display: block;
  margin-top: 2px;
  line-height: 1.3;
}
/* gate detail popup */
.gate-detail {
  background: linear-gradient(145deg, #100828, #0b0520);
  border: 1px solid var(--gold-dim);
  border-radius: 14px;
  padding: 14px 13px;
  margin-top: 10px;
  display: none;
  animation: fadeIn .25s ease;
}
.gate-detail.show { display: block; }
.gate-detail-title {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  color: var(--gold);
  margin-bottom: 7px;
}
.gate-detail-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.75;
}

/* ── QUIZ TIPO ── */
.quiz-wrap {
  background: linear-gradient(145deg, #0d0625, #07031a);
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: var(--radius);
  padding: 20px 16px;
  margin-bottom: 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.quiz-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,0.6), transparent);
}
.quiz-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 16px;
  color: var(--gold);
  margin-bottom: 8px;
}
.quiz-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 18px;
  line-height: 1.65;
}
.quiz-step { display: none; }
.quiz-step.active { display: block; }
.quiz-question {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  color: var(--text);
  margin-bottom: 14px;
  letter-spacing: .03em;
}
.quiz-counter {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 14px;
  font-family: 'Cinzel', serif;
  letter-spacing: .08em;
}
.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 9px;
}
.quiz-opt {
  background: rgba(212,175,55,0.05);
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: 12px;
  padding: 11px 14px;
  text-align: left;
  color: var(--text);
  font-size: 13.5px;
  line-height: 1.5;
  cursor: pointer;
  transition: all .2s;
  font-family: 'Crimson Pro', serif;
}
.quiz-opt:hover { background: rgba(212,175,55,0.12); border-color: var(--gold); }
.quiz-result {
  display: none;
  text-align: center;
}
.quiz-result.show { display: block; }
.quiz-result-icon { font-size: 46px; margin-bottom: 10px; display: block; }
.quiz-result-tipo {
  font-family: 'Cinzel Decorative', serif;
  font-size: 20px;
  color: var(--gold);
  margin-bottom: 10px;
}
.quiz-result-desc {
  font-size: 14px;
  color: var(--text);
  line-height: 1.8;
  margin-bottom: 16px;
}
.quiz-restart {
  background: transparent;
  border: 1px solid var(--gold-dim);
  border-radius: 12px;
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 13px;
  padding: 10px 20px;
  cursor: pointer;
  transition: all .2s;
}
.quiz-restart:hover { background: rgba(212,175,55,0.1); }

/* ── CANALI ── */
.canali-list {
  display: flex;
  flex-direction: column;
  gap: 9px;
  margin-top: 12px;
}
.canale-row {
  background: rgba(212,175,55,0.04);
  border: 1px solid rgba(212,175,55,0.13);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.canale-num {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--gold);
  white-space: nowrap;
  min-width: 50px;
}
.canale-info {}
.canale-name {
  font-family: 'Cinzel', serif;
  font-size: 12.5px;
  color: var(--text);
  margin-bottom: 3px;
}
.canale-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}

/* ── STORICO BOX ── */
.storico-box {
  background: linear-gradient(145deg, rgba(26,10,46,0.6), rgba(11,5,32,0.7));
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: var(--radius);
  padding: 16px;
  margin: 12px 0 0;
  position: relative;
}
.storico-box::before {
  content: '"';
  position: absolute;
  top: 8px; left: 14px;
  font-size: 50px;
  color: rgba(212,175,55,0.15);
  font-family: Georgia, serif;

    artTitle:"Human Design: la Mappa Energetica che Cambia il Modo di Vivere",

    artH3:"Perché il Design Funziona Davvero: la Chiave è la Decodifica",
    artP1:"L'Human Design non è nato in un'università né da decenni di ricerca accademica: è emerso da otto giorni di esperienza mistica vissuta da Ra Uru Hu (Alan Robert Krakower) nell'isola di Ibiza nel gennaio 1987. In quei giorni, quello che lui descrisse come una \"Voce\" gli dettò un sistema capace di integrare quattro grandi tradizioni sapienziali dell'umanità — Astrologia occidentale, I Ching cinese, Cabala ebraica e i chakra vedici — con la fisica quantistica e la biochimica moderna. Il risultato fu il Bodygraph, una mappa grafica composta da nove Centri energetici collegati tra loro da 36 Canali e 64 Gate.",
    artP2:"Ciò che rende l'Human Design diverso da altri sistemi di autoconoscenza è la sua capacità di rispondere a una domanda precisa: come funzioni tu, non come funziona l'essere umano in generale. Il sistema distingue cinque Tipi energetici — Generatore, Manifesting Generator, Manifestatore, Proiettore e Riflettore — ciascuno con una Strategia di vita differente, un'emozione-segnale che avvisa quando si è fuori allineamento (il Non-Sé), e una firma di benessere che indica quando invece si sta vivendo in modo autentico.",
    artP3:"Il grande esperimento che Ra Uru Hu propose era semplice: non credere, ma vivere. Novanta giorni di tentativi concreti — i Generatori che aspettano di rispondere invece di iniziare, i Proiettori che aspettano l'invito, i Manifestatori che informano prima di agire. Chi ha provato questo esperimento riporta spesso trasformazioni sorprendenti: meno attrito nelle relazioni, più chiarezza nelle decisioni, meno esaurimento energetico. Non perché l'Human Design sia magia, ma perché smettere di andare contro la propria natura ha effetti reali e misurabili sul corpo e sulla mente.",
    artP4:"I 64 Gate dell'Human Design derivano direttamente dai 64 esagrammi dell'I Ching, il Libro dei Mutamenti. Ogni Gate è posizionato all'interno di un Centro energetico e, se attivo nel tuo Bodygraph (determinato dalla posizione dei pianeti al momento della nascita e 88 giorni prima), esprime una qualità stabile e affidabile della tua personalità. Quando due Gate complementari — posizionati alle due estremità di un Canale — sono entrambi attivi, si forma un Canale completo: un talento pienamente espresso e sempre disponibile.",
    artP5:"L'errore più comune di chi si avvicina all'Human Design per la prima volta è pensare che il proprio Tipo sia un destino fisso e limitante. Il Design descrive la tua natura profonda, non le tue capacità o il tuo valore. Un Riflettore non è \"meno\" di un Generatore — ha semplicemente un modo diverso di stare nel mondo, più lunare, più riflessivo, più sensibile agli ambienti. Un Proiettore non è \"passivo\" perché aspetta l'invito — sta semplicemente rispettando il proprio circuito energetico per massimizzare il suo impatto. L'Human Design non classifica le persone: le rivela.",

    faq:[
      {q:"L'Human Design è compatibile con altre tradizioni spirituali?",a:"Sì, e non per caso: il sistema è stato costruito integrando quattro tradizioni diverse. L'I Ching fornisce i 64 Gate, l'Astrologia determina quali Gate sono attivi al momento della nascita, la Cabala ispira la struttura dei Centri, e i chakra vedici sono il modello originario dei 9 Centri del Bodygraph. Chi pratica l'Astrologia o studia l'I Ching spesso trova nell'Human Design un livello ulteriore di comprensione. Puoi esplorare queste connessioni nelle pagine dedicate di MYSTICA: iching.html, cabala.html e numerologia.html."},
      {q:"Quanto ci vuole per 'sentire' il proprio Design?",a:"Ra Uru Hu parlava di 7 anni di decodifica: il tempo necessario affinché ogni cellula del corpo si rinnovi e integri il nuovo modo di essere. Nella pratica, molti notano cambiamenti significativi già nei primi 90 giorni di sperimentazione consapevole. Il segreto non è studiare il Design — è viverlo. Aspettare e rispondere se sei Generatore. Aspettare l'invito se sei Proiettore. Informare se sei Manifestatore. Il corpo capisce prima della mente."},
      {q:"Qual è la differenza tra Human Design e Gene Keys?",a:"I Gene Keys sono un sistema evolutivo fondato da Richard Rudd nel 2009, derivato dall'Human Design ma con un focus diverso: invece di definire il Tipo e la Strategia, i Gene Keys lavorano sulla trasformazione delle Ombre (stati inconsci limitanti) in Doni e infine in Siddhi (stati di grazia). Entrambi usano i 64 Gate dell'I Ching, ma l'HD è più descrittivo e meccanico, i Gene Keys più poetici e trasformativi. Esplora i Gene Keys nella pagina dedicata di MYSTICA."},
      {q:"Posso calcolare il Design di qualcun altro?",a:"Tecnicamente sì: ti basta la data, l'orario e il luogo di nascita di qualsiasi persona. Eticamente, però, la comunità HD è generalmente contraria a fare analisi di terzi senza consenso, soprattutto se si usano le informazioni per influenzare o giudicare quella persona. L'Human Design è uno strumento di autoconoscenza, non di classificazione degli altri. Puoi calcolare il Design di un bambino piccolo per capire come supportarne la natura naturale."},
      {q:"L'Human Design è una pseudoscienza?",a:"Dal punto di vista scientifico convenzionale, non esistono studi peer-reviewed che validino le affermazioni dell'Human Design. Ra Uru Hu stesso non lo presentò come scienza, ma come 'sistema' o 'esperimento'. Ciò che molti praticanti riportano è che le descrizioni corrispondono con sorprendente precisione alla loro esperienza vissuta — un tipo di validità esperienziale non misurabile con metodi empirici classici. Come ogni sistema sapienziale, va usato come mappa, non come territorio."}

    coseImgAlt:'Human Design Bodygraph - energy map of the 9 centers',
    coseBody:`<p>Human Design is a synthetic self-knowledge system born in 1987 through the visions of <em>Ra Uru Hu</em> (Alan Robert Krakower). Over eight days he received what he called a "knowledge transfer" that integrated four ancient wisdom traditions with modern physics.</p>
<p>The system rests on four pillars:</p>
<ul>
<li><strong>I Ching</strong> — the 64 hexagrams correspond to the 64 Gates of the Bodygraph</li>
<li><strong>Astrology</strong> — planetary positions at birth (and 88 days prior) define the active Gates</li>
<li><strong>Kabbalah</strong> — the Tree of Life inspires the Centers and Channels structure</li>
<li><strong>Vedic Chakras</strong> — the 9 Bodygraph Centers are an evolution of the chakra system</li>
</ul>
<p>The result is the <em>Bodygraph</em>: a unique body map that reveals your Energy Type, Inner Authority, defined and open Centers, Channels and active Gates.</p>
<h3>History and Origins</h3>
<p>Ra Uru Hu (1948–2011) was a former Canadian advertising executive and musician when, in January 1987 in Ibiza, he experienced what he described as an eight-day mystical encounter with a "Voice". The system that emerged was initially called the <em>Human Design System</em> and presented through seminars and books in the 1990s.</p>
<p>The year 1987 was not coincidental: in August came the Harmonic Convergence, a rare planetary alignment. Around the same time, supernova SN 1987A was visible to the naked eye — Ra Uru Hu cited it as a synchronic event connected to his experience.</p>
<div class="storico-box"><p class="storico-text">"I'm not asking you to believe anything I say. I'm asking you to experiment with it. Live your Design for ninety days and see what happens."</p><p class="storico-source">— Ra Uru Hu</p></div>`,

    artH2:"A System Born from a 1987 Revelation",
    artH3:"Why Human Design Actually Works: The Key Is Deconditioning",
    artP1:"Human Design did not emerge from a university or decades of academic research. It arose from eight days of mystical experience lived by Ra Uru Hu (Alan Robert Krakower) on the island of Ibiza in January 1987. During those days, what he described as a 'Voice' dictated to him a system capable of integrating four great wisdom traditions — Western Astrology, Chinese I Ching, Jewish Kabbalah and Vedic chakras — with quantum physics and modern biochemistry. The result was the Bodygraph, a graphic map composed of nine energy Centers connected by 36 Channels and 64 Gates.",
    artP2:"What makes Human Design different from other self-knowledge systems is its ability to answer a precise question: how do YOU function, not how humans in general function. The system distinguishes five Energy Types — Generator, Manifesting Generator, Manifestor, Projector and Reflector — each with a different life Strategy, an emotional signal that alerts when out of alignment (the Not-Self), and a wellbeing signature indicating authentic living.",
    artP3:"The great experiment Ra Uru Hu proposed was simple: do not believe, but live. Ninety days of concrete attempts — Generators waiting to respond instead of initiating, Projectors waiting for the invitation, Manifestors informing before acting. Those who have tried this experiment often report surprising transformations: less friction in relationships, greater clarity in decisions, less energetic exhaustion.",
    artP4:"The 64 Gates of Human Design derive directly from the 64 hexagrams of the I Ching, the Book of Changes. Each Gate is positioned within an energy Center and, if active in your Bodygraph, expresses a stable and reliable quality of your personality. When two complementary Gates at opposite ends of a Channel are both active, a complete Channel forms — a fully expressed and always available talent.",
    artP5:"The most common mistake for newcomers to Human Design is thinking that their Type is a fixed and limiting destiny. Design describes your deep nature, not your capabilities or worth. A Reflector is not 'less' than a Generator — they simply have a different way of being in the world, more lunar, more reflective, more sensitive to environments. Human Design does not classify people: it reveals them.",

    faq:[
      {q:"Is Human Design compatible with other spiritual traditions?",a:"Yes, and not by chance: the system was built by integrating four different traditions. The I Ching provides the 64 Gates, Astrology determines which Gates are active at birth, Kabbalah inspires the Centers structure, and Vedic chakras are the original model for the 9 Bodygraph Centers. Those who practice Astrology or study the I Ching often find in Human Design an additional layer of understanding, not a contradiction."},
      {q:"How long does it take to 'feel' your Design?",a:"Ra Uru Hu spoke of 7 years of deconditioning: the time needed for every cell in the body to renew and integrate the new way of being. In practice, many notice significant changes within the first 90 days of conscious experimentation. The secret is not studying the Design — it is living it. The body understands before the mind does."},
      {q:"What is the difference between Human Design and Gene Keys?",a:"Gene Keys is an evolutionary system founded by Richard Rudd in 2009, derived from Human Design but with a different focus: instead of defining Type and Strategy, Gene Keys work on transforming Shadows (limiting unconscious states) into Gifts and ultimately Siddhis (states of grace). Both use the 64 I Ching Gates, but HD is more descriptive and mechanical, while Gene Keys are more poetic and transformative."},
      {q:"Can I calculate someone else's Design?",a:"Technically yes: you just need their birth date, time and place. Ethically, however, the HD community generally discourages analyzing others without consent, especially if using the information to influence or judge that person. Human Design is a tool for self-knowledge, not for classifying others."},
      {q:"Is Human Design a pseudoscience?",a:"From a conventional scientific standpoint, no peer-reviewed studies validate Human Design's claims. Ra Uru Hu himself did not present it as science, but as a 'system' or 'experiment'. What many practitioners report is that the descriptions correspond with surprising precision to their lived experience — a type of experiential validity not measurable by classical empirical methods."}

    coseBody:`<p>El Human Design es un sistema de autoconocimiento sintético nacido en 1987 a través de las visiones de <em>Ra Uru Hu</em> (Alan Robert Krakower). Durante ocho días recibió lo que llamó una "transferencia de conocimiento" que integraba cuatro antiguas tradiciones sapienciales con la física moderna.</p>
<p>El sistema se basa en cuatro pilares:</p>
<ul>
<li><strong>I Ching</strong> — los 64 hexagramas corresponden a los 64 Gates del Bodygraph</li>
<li><strong>Astrología</strong> — la posición de los planetas al nacer (y 88 días antes) define los Gates activos</li>
<li><strong>Cábala</strong> — el Árbol de la Vida inspira la estructura de los Centros y Canales</li>
<li><strong>Chakras védicos</strong> — los 9 Centros del Bodygraph son una evolución del sistema de chakras</li>
</ul>
<p>El resultado es el <em>Bodygraph</em>: un mapa corporal único que revela tu Tipo energético, la Autoridad Interior, los Centros definidos y abiertos, los Canales y los Gates activos.</p>
<h3>Historia y Orígenes</h3>
<p>Ra Uru Hu (1948–2011) era un ex publicista y músico canadiense cuando, en enero de 1987 en Ibiza, vivió lo que describió como una experiencia mística de ocho días con una "Voz". El sistema que emergió fue llamado inicialmente <em>Human Design System</em> y presentado en los años 90 a través de seminarios y libros.</p>
<p>El año 1987 no fue casual: en agosto se produjo la Convergencia Armónica, una rara alineación planetaria. En ese mismo período, la supernova SN 1987A era visible a simple vista — Ra Uru Hu la citó como evento sincrónico relacionado con su experiencia.</p>
<div class="storico-box"><p class="storico-text">"No te pido que creas nada de lo que te digo. Te pido que lo experimentes. Vive tu Design durante noventa días y mira qué sucede."</p><p class="storico-source">— Ra Uru Hu</p></div>`,

let currentLang = localStorage.getItem('myst_lang') || 'it';

/* ── updateSEO ── */
function updateSEO() {
  const S = LANG[currentLang].seo;
  document.documentElement.lang = S.htmlLang;
  document.title = S.title;
  document.querySelector('meta[name="description"]').content = S.description;
  document.querySelector('meta[name="keywords"]').content = S.keywords;
  document.querySelector('meta[property="og:title"]').content = S.ogTitle;
  document.querySelector('meta[property="og:description"]').content = S.ogDesc;
  document.querySelector('meta[property="og:locale"]').content = S.ogLocale;
  document.querySelector('meta[name="twitter:title"]').content = S.ogTitle;
  document.querySelector('meta[name="twitter:description"]').content = S.ogDesc;
  const ld = document.querySelector('script[type="application/ld+json"]');
  if (ld && S.faqLD) {
    ld.textContent = JSON.stringify({
      '@context':'https://schema.org',
      '@type':'FAQPage',
      mainEntity: S.faqLD.map(f => ({'@type':'Question',name:f.q,acceptedAnswer:{'@type':'Answer',text:f.a}}))
    });
  }
}

/* ── AudioManager ── */
var AUDIO_KEY = 'myst_audio_state';
var AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';
class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play()  { this.audio && this.audio.play().catch(function(){}); this.isPlaying=true;  sessionStorage.setItem(AUDIO_KEY,'true');  this.updateUI(); }
  pause() { this.audio && this.audio.pause();                     this.isPlaying=false; sessionStorage.setItem(AUDIO_KEY,'false'); this.updateUI(); }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    var btn=document.getElementById('musicToggle');
    var L=LANG[currentLang];
    if(btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}
window.audioManager = new AudioManager();
document.getElementById('musicToggle') && document.getElementById('musicToggle').addEventListener('click', function(){ window.audioManager.toggle(); });

/* ── Quiz Logic ── */
var quizScores={generatore:0,mg:0,manifestatore:0,proiettore:0,riflettore:0};
var quizStep=1;

function quizPickOpt(btn,stepIdx,type){
  if(stepIdx===0){ if(type==='sacral')quizScores.generatore+=2; else if(type==='motor')quizScores.manifestatore+=2; else if(type==='projection')quizScores.proiettore+=2; else if(type==='mirror')quizScores.riflettore+=2; }
  else if(stepIdx===1){ if(type==='gut'){quizScores.generatore+=2;quizScores.mg+=1;} else if(type==='emotion'){quizScores.generatore+=1;quizScores.manifestatore+=1;quizScores.proiettore+=1;} else if(type==='recognition')quizScores.proiettore+=2; else if(type==='cycle')quizScores.riflettore+=3; }
  else if(stepIdx===2){ if(type==='frustration'){quizScores.generatore+=2;quizScores.mg+=1;} else if(type==='anger'){quizScores.manifestatore+=2;quizScores.mg+=1;} else if(type==='bitterness')quizScores.proiettore+=2; else if(type==='disappointment')quizScores.riflettore+=2; }
  else if(stepIdx===3){ if(type==='multi')quizScores.mg+=3; else if(type==='guide')quizScores.proiettore+=2; else if(type==='initiate')quizScores.manifestatore+=2; else if(type==='respond')quizScores.generatore+=2; }
  else if(stepIdx===4){ if(type==='burnout')quizScores.manifestatore+=1; else if(type==='regular')quizScores.proiettore+=2; else if(type==='nap')quizScores.generatore+=1; else if(type==='sensitive')quizScores.riflettore+=2; showQuizResult(); return; }
  quizStep++;
  document.querySelectorAll('.quiz-step').forEach(function(s){s.classList.remove('active');});
  var next=document.getElementById('qs'+(quizStep));
  if(next) next.classList.add('active');
}

function showQuizResult(){
  var max=-1,winner='generatore';
  Object.keys(quizScores).forEach(function(k){if(quizScores[k]>max){max=quizScores[k];winner=k;}});
  var r=LANG[currentLang].quizResults[winner];
  document.getElementById('qResultIcon').textContent=r.icon;
  document.getElementById('qResultTipo').textContent=r.tipo;
  document.getElementById('qResultDesc').textContent=r.desc;
  document.querySelectorAll('.quiz-step').forEach(function(s){s.classList.remove('active');});
  document.getElementById('quizResult').classList.add('show');
}

function restartQuiz(){
  quizScores={generatore:0,mg:0,manifestatore:0,proiettore:0,riflettore:0};
  quizStep=1;
  document.getElementById('quizResult').classList.remove('show');
  document.querySelectorAll('.quiz-step').forEach(function(s){s.classList.remove('active');});
  var first=document.getElementById('qs1'); if(first) first.classList.add('active');
}

/* ── Scroll Top ── */
var scrollBtn=document.getElementById('scrollTop');
if(scrollBtn){
  window.addEventListener('scroll',function(){scrollBtn.classList.toggle('show',window.scrollY>400);});
  scrollBtn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
}

/* ── Init Sequence ── */
document.addEventListener('DOMContentLoaded',function(){
  applyTheme(isDayMode);
  applyLang();
  buildGateGrids();
});

</script>
</body>
</html>
