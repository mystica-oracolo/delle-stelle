  /* ── ROOT VARIABLES ── */
  :root {
    --bg: #0a0514;
    --card: #140c24;
    --purple: #2a1748;
    --gold: #d4af37;
    --gold-dim: #b8860b;
    --gold-glow: rgba(212,175,55,0.4);
    --text: #f4f1fa;
    --muted: #b8b2d1;
    --radius: 18px;
    --border: rgba(212,175,55,0.2);
  }

  html.theme-day {
    --bg: #f5f2ed;
    --card: #ede8df;
    --text: #2a1748;
    --muted: #6b5b7f;
    --purple: #6b5b7f;
    --gold: #c89742;
    --gold-dim: #a67c52;
    --gold-glow: rgba(200,151,66,0.2);
    --border: #c89742;
  }

  html.theme-day .card,
  html.theme-day .dash-card {
    background-color: var(--card);
    border: 2px solid var(--border);
    color: var(--text);
  }

  html.theme-day h1,
  html.theme-day h2,
  html.theme-day h3 {
    color: var(--text);
    text-shadow: none;
  }

  html.theme-day button {
    background-color: var(--gold);
    color: var(--text);
    border: 2px solid var(--border);
  }

  html.theme-day input,
  html.theme-day select {
    background-color: #ffffff;
    color: var(--text);
    border: 2px solid var(--border);
  }

  /* ── RESET ── */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Crimson Pro', serif;
    background: linear-gradient(160deg, var(--bg) 0%, var(--bg) 50%, var(--purple) 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
    position: relative;
    z-index: 0;
  }

  /* ── COSMOS BACKGROUND ── */
  .cosmos {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    opacity: 0.3;
    background-image:
      radial-gradient(2px 2px at 20px 30px, #fff, transparent),
      radial-gradient(2px 2px at 90px 80px, #fff, transparent),
      radial-gradient(1px 1px at 150px 40px, #fff, transparent),
      radial-gradient(1px 1px at 220px 120px, #fff, transparent),
      radial-gradient(1px 1px at 280px 90px, #fff, transparent),
      radial-gradient(2px 2px at 45px 140px, #fff, transparent);
    background-size: 250px 150px;
  }

  /* ── HEADER ── */
  .page-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10, 5, 20, 0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-back {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 20px;
    cursor: pointer;
    padding: 6px 8px;
    display: flex;
    align-items: center;
  }

  .btn-back:active {
    opacity: 0.7;
  }

  .btn-audio {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 16px;
    cursor: pointer;
    padding: 6px 8px;
    display: flex;
    align-items: center;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .lang-switch {
    display: flex;
    gap: 4px;
    background: rgba(212, 175, 55, 0.1);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2px;

  .lang-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 6px;
    transition: all 0.2s;
  }

  .lang-btn.active {
    color: var(--text);
    background: rgba(212, 175, 55, 0.2);
    border-radius: 4px;

  .btn-theme {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 16px;
    cursor: pointer;
    padding: 6px 8px;
    display: flex;
    align-items: center;

    font-size: 16px;
    line-height: 1.6;

  }

    border: 2px solid var(--gold);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    box-shadow: 0 0 50px var(--gold-glow), inset 0 0 30px rgba(212, 175, 55, 0.05);

    content: '📖';
    font-size: 44px;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 10px var(--gold-glow));
  }

  .book h2 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 22px;
    margin-bottom: 16px;
  }

  #question-input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(0, 0, 0, 0.3);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

    border-color: var(--gold);
    box-shadow: 0 0 12px var(--gold-glow);
  }

    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color: var(--bg);
    border: none;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.5px;
    padding: 12px 30px;
    border-radius: 30px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .btn-ask:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px var(--gold-glow);
  }

  .btn-ask:active {
    transform: translateY(0);
  }

  .answer-box {
    margin-top: 24px;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    border-radius: 12px;
    background: rgba(212, 175, 55, 0.08);
    border: 1px solid var(--border);
  }

  .answer-text {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--gold);
    font-style: italic;
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
    text-align: center;
    line-height: 1.6;
  }

  .answer-text.show {
    opacity: 1;
  }

  .hint {
    font-size: 13px;
    color: var(--muted);
    margin-top: 12px;
    opacity: 0.8;
  }

  /* ── SHARE SECTION ── */
  .share-section {
    margin: 30px 0;
    padding: 20px;
    background: rgba(212, 175, 55, 0.08);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: center;
  }

  .share-section h3 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 16px;
    margin-bottom: 12px;
  }

  .share-buttons {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .share-btn {
    background: rgba(212, 175, 55, 0.15);

    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;

  .share-btn:hover {
    background: rgba(212, 175, 55, 0.25);
    border-color: var(--gold);

  /* ── ARTICLE SECTION ── */
  .article-section {

    color: var(--gold);
    font-size: 24px;
    margin: 24px 0 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;

  .article-section h3 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 18px;
    margin: 20px 0 12px;
  }

  .article-section p {
    margin-bottom: 14px;
    color: var(--muted);
    font-size: 16px;
    line-height: 1.8;
  }

  .article-section ul {
    margin: 0 0 14px 24px;
    color: var(--muted);
  }

  .article-section li {
    margin-bottom: 8px;
    font-size: 16px;
  }

  .article-section a {
    color: var(--gold);
    text-decoration: none;
    border-bottom: 1px solid var(--gold);
    transition: opacity 0.2s;
  }

  .article-section a:hover {
    opacity: 0.8;

  .tip-box {
    background: rgba(212, 175, 55, 0.08);
    border-left: 3px solid var(--gold);
    padding: 16px 18px;
    border-radius: 8px;
    margin: 20px 0;
    font-size: 15px;
    line-height: 1.7;
  }

  /* ── FAQ SECTION ── */
  .faq-section {
    margin: 40px 0;
  }

  .faq-section h2 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 24px;
    margin: 0 0 16px;
  }

  .faq-item {
    background: rgba(212, 175, 55, 0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .faq-question {
    background: rgba(212, 175, 55, 0.08);
    border: none;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 15px;
    padding: 14px 16px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: background 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .faq-question:hover {
    background: rgba(212, 175, 55, 0.12);
  }

  .faq-toggle {
    font-size: 12px;
    opacity: 0.6;
  }

  .faq-answer {
    padding: 0 16px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
  }

  .faq-item.open .faq-answer {
    max-height: 300px;
    padding: 12px 16px 14px;
  }

  /* ── PREMIUM MODAL ── */
  .premium-modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
    backdrop-filter: blur(5px);
  }

  .premium-modal.show {
    display: flex;
  }

  .modal-content {
    background: linear-gradient(145deg, var(--card), var(--purple));
    border: 2px solid var(--gold);
    border-radius: var(--radius);
    padding: 28px 20px;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 0 60px var(--gold-glow);
  }

  .modal-content h2 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 22px;
    margin-bottom: 12px;
  }

  .modal-content p {
    color: var(--muted);
    margin-bottom: 12px;
    font-size: 15px;
    line-height: 1.6;
  }

  .modal-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .modal-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-btn-premium {
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color: var(--bg);
  }

  .modal-btn-close {
    background: rgba(212, 175, 55, 0.1);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* ── FOOTER ── */
  .page-footer {
    text-align: center;
    padding: 30px 16px;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
    margin-top: 40px;
    position: relative;
    z-index: 1;
  }

  .page-footer a {
    color: var(--gold);
    text-decoration: none;
  }

  .page-footer a:hover {
    text-decoration: underline;
  }

  /* ── MEDIA QUERIES ── */
  @media (max-width: 480px) {
    main {
      padding: 16px;
    }

    .article-section h2,
    .faq-section h2 {
      font-size: 20px;
    }
  }
  </style>
</head>

  <div class="premium-modal" id="premium-modal" aria-hidden="true">

        <div id="_pm_toggle_wrap" style="margin:8px 0 4px;">

        style="width:100%;background:rgba(42,23,72,.6);border:1px solid rgba(212,175,55,.4);border-radius:8px;padding:9px 11px;color:#e8e0f0;font-family:Cinzel,serif;font-size:.8rem;letter-spacing:.12em;outline:none;box-sizing:border-box;margin-bottom:7px;">
      <button onclick="_mystUnlockCode()" style="width:100%;padding:11px;border-radius:8px;border:none;background:linear-gradient(135deg,#d4af37,#9a7820);color:#0a0514;font-family:Cinzel,serif;font-size:.82rem;font-weight:700;cursor:pointer;letter-spacing:.04em;">✦ Sblocca con il Codice</button>

    <script>
    if(!window._mystUnlockCode){
      window._mystUnlockCode = async function(){
        var inp = document.getElementById('_pm_code_inp');
        var err = document.getElementById('_pm_code_err');
        var ok  = document.getElementById('_pm_code_ok');
        var val = inp ? inp.value.trim().toUpperCase() : '';
        err.style.display='none'; ok.style.display='none';
        var re = /^MYST-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/;
        if(!re.test(val)){
          err.textContent='Formato non valido. Esempio: MYST-A3F9-C12B-7D4E';
          err.style.display='block';
          return;

  /* ── STATE & UTILITIES ── */
  let currentLang = localStorage.getItem('myst_lang') || 'it';
  let currentTheme = localStorage.getItem('myst_theme') || 'night';

  function isPremium() {
    return localStorage.getItem('myst_premium') === '1';
  }

  function requirePremium(featureName) {
    if (!isPremium()) {
      document.getElementById('premium-modal').classList.add('show');
      document.getElementById('premium-modal').setAttribute('aria-hidden', 'false');
      return true;
    }
    return false;
  }

  /* ── SEO UPDATES ── */
  function updateSEO() {
    const data = LANG[currentLang];
    const seoData = data.seo;

    document.documentElement.lang = data.htmlLang;
    document.title = seoData.title;
    document.querySelector('meta[name="description"]').content = seoData.description;
    document.querySelector('meta[name="keywords"]').content = seoData.keywords;
    document.querySelector('meta[property="og:title"]').content = seoData.ogTitle;
    document.querySelector('meta[property="og:description"]').content = seoData.ogDesc;
    document.querySelector('meta[name="twitter:title"]').content = seoData.twitterTitle;
    document.querySelector('meta[name="twitter:description"]').content = seoData.twitterDesc;

    // FAQPage schema
    const faqLD = {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": data.faq.map(item => ({
        "@type": "Question",
        "name": item.q,
        "acceptedAnswer": {
          "@type": "Answer",
          "text": item.a
        }
      }))
    };

    document.getElementById('seo-schema').textContent = JSON.stringify(faqLD);
  }

  /* ── APPLY LANGUAGE ── */
  function applyLang() {
    updateSEO();
    const data = LANG[currentLang];

    document.getElementById('hero-title').textContent = data.hero_title;
    document.getElementById('hero-lead').textContent = data.hero_lead;
    document.getElementById('book-title').textContent = data.book_title;
    document.getElementById('question-input').placeholder = data.input_placeholder;
    document.getElementById('question-input').setAttribute('aria-label', data.input_aria);
    document.getElementById('ask-btn').textContent = data.btn_ask;
    document.getElementById('ask-btn').setAttribute('aria-label', data.btn_ask);
    document.getElementById('hint-text').textContent = data.hint;

    document.getElementById('share-title').textContent = data.share_title;
    const shareButtonsHTML = `
      <button class="share-btn" id="share-wa">💬 WhatsApp</button>
      <button class="share-btn" id="share-tg">✈️ Telegram</button>
      <button class="share-btn" id="share-fb">📘 Facebook</button>
      <button class="share-btn" id="share-x">𝕏 Twitter</button>
      <button class="share-btn" id="share-copy">📋 Copia</button>
    `;
    document.getElementById('share-buttons').innerHTML = shareButtonsHTML;
    attachShareListeners();

    document.getElementById('art-title').textContent = data.art_title;
    document.getElementById('art-sub1').textContent = data.art_sub1;
    document.getElementById('art-p1').textContent = data.art_p1;
    document.getElementById('art-sub2').textContent = data.art_sub2;
    document.getElementById('art-p2').textContent = data.art_p2;
    document.getElementById('art-sub3').textContent = data.art_sub3;
    document.getElementById('art-p3').textContent = data.art_p3;
    document.getElementById('art-tip').textContent = data.art_tip;
    document.getElementById('art-sub4').textContent = data.art_sub4;
    document.getElementById('art-p4').textContent = data.art_p4;
    document.getElementById('art-sub5').textContent = data.art_sub5;
    document.getElementById('art-p5').textContent = data.art_p5;

    document.getElementById('faq-title').textContent = data.faq_title;
    renderFAQ(data.faq);

    document.getElementById('footer-text').innerHTML = data.footer_text;

    document.getElementById('modal-title').textContent = 'Premium Unlock';
    document.getElementById('modal-desc').textContent = 'Sblocca funzioni esclusive e approfondimenti';
    document.getElementById('modal-stripe-btn').textContent = 'Attiva Premium';
    document.getElementById('modal-close-btn').textContent = 'Chiudi';
  }

  /* ── FAQ RENDERING ── */
  function renderFAQ(faqData) {
    const container = document.getElementById('faq-container');
    container.innerHTML = '';
    faqData.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'faq-item';
      div.innerHTML = `
        <button class="faq-question" aria-expanded="false" onclick="toggleFAQ(${idx})">
          <span>${item.q}</span>
          <span class="faq-toggle">▼</span>
        </button>
        <div class="faq-answer">${item.a}</div>
      `;
      container.appendChild(div);
    });
  }

  function toggleFAQ(idx) {
    document.querySelectorAll('.faq-item')[idx].classList.toggle('open');
    const btn = document.querySelectorAll('.faq-question')[idx];
    btn.setAttribute('aria-expanded', btn.getAttribute('aria-expanded') === 'true' ? 'false' : 'true');
  }

  /* ── THEME TOGGLE ── */
  function toggleTheme() {
    currentTheme = currentTheme === 'night' ? 'day' : 'night';
    localStorage.setItem('myst_theme', currentTheme);
    if (currentTheme === 'day') {
      document.documentElement.classList.add('theme-day');
      document.getElementById('btn-theme').textContent = '☀️';
    } else {
      document.documentElement.classList.remove('theme-day');
      document.getElementById('btn-theme').textContent = '🌙';
    }
  }

  /* ── AUDIO MANAGER ── */
  const AudioManager = {
    audioEl: null,
    isPlaying: false,

    init() {
      const audioEl = document.createElement('audio');
      audioEl.src = './images/icone/audio/mystica_ambient_432_528.mp3';
      audioEl.loop = true;
      audioEl.volume = 0.3;
      document.body.appendChild(audioEl);
      this.audioEl = audioEl;

      const state = sessionStorage.getItem('myst_audio_state');
      if (state === 'true') {
        this.play();
      }
    },

    toggle() {
      this.isPlaying ? this.pause() : this.play();
    },

    play() {
      this.audioEl.play().catch(() => {});
      this.isPlaying = true;
      sessionStorage.setItem('myst_audio_state', 'true');
      document.getElementById('btn-audio').textContent = '🔊';
    },

    pause() {
      this.audioEl.pause();
      this.isPlaying = false;
      sessionStorage.setItem('myst_audio_state', 'false');
      document.getElementById('btn-audio').textContent = '🔇';
    }
  };

  /* ── SHARE FUNCTIONALITY ── */
  function attachShareListeners() {
    const pageTitle = LANG[currentLang].hero_title;
    const pageUrl = window.location.href;

    document.getElementById('share-wa').onclick = () => {
      const text = encodeURIComponent(`${pageTitle} - ${pageUrl}`);
      window.open(`https://wa.me/?text=${text}`, '_blank');
    };

    document.getElementById('share-tg').onclick = () => {
      const text = encodeURIComponent(`${pageTitle} - ${pageUrl}`);
      window.open(`https://t.me/share/url?url=${pageUrl}&text=${text}`, '_blank');
    };

    document.getElementById('share-fb').onclick = () => {
      window.open(`https://www.facebook.com/sharer/sharer.php?u=${pageUrl}`, '_blank');
    };

    document.getElementById('share-x').onclick = () => {
      const text = encodeURIComponent(pageTitle);
      window.open(`https://x.com/intent/tweet?url=${pageUrl}&text=${text}`, '_blank');
    };

    document.getElementById('share-copy').onclick = () => {
      navigator.clipboard.writeText(pageUrl).then(() => {
        alert('Link copiato!');
      });
    };
  }

  /* ── LANGUAGE SWITCHER ── */
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLang = btn.dataset.lang;
      localStorage.setItem('myst_lang', currentLang);
      applyLang();
    };
  });

  /* ── BACK BUTTON ── */
  document.getElementById('btn-back').onclick = () => {
    if (document.referrer) {
      window.history.back();
    } else {
      window.location.href = './index.html';
    }
  };

  /* ── AUDIO BUTTON ── */
  document.getElementById('btn-audio').onclick = () => {
    AudioManager.toggle();
  };

  /* ── THEME BUTTON ── */
  document.getElementById('btn-theme').onclick = toggleTheme;

  /* ── PREMIUM MODAL CLOSE ── */
  document.getElementById('modal-close-btn').onclick = () => {
    document.getElementById('premium-modal').classList.remove('show');
    document.getElementById('premium-modal').setAttribute('aria-hidden', 'true');
  };

  /* ── ORACLE INTERACTION ── */
  document.getElementById('ask-btn').onclick = () => {
    const answerEl = document.getElementById('answer-text');
    answerEl.classList.remove('show');
    setTimeout(() => {
      const risposta = RISPOSTE[Math.floor(Math.random() * RISPOSTE.length)];
      answerEl.textContent = risposta;
      answerEl.classList.add('show');
      if (typeof gtag === 'function') {
        gtag('event', 'libro_risposte_consultazione', {
          language: currentLang
        });
      }
    }, 250);
  };

  document.getElementById('question-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      document.getElementById('ask-btn').click();
    }
  });

  /* ── INIT SEQUENCE ── */
  function init() {
    // 1. Tema
    if (currentTheme === 'day') {
      document.documentElement.classList.add('theme-day');
      document.getElementById('btn-theme').textContent = '☀️';
    } else {
      document.getElementById('btn-theme').textContent = '🌙';
    }

    // 2. Audio
    AudioManager.init();

    // 3. Lingua
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.remove('active');
      if (btn.dataset.lang === currentLang) {
        btn.classList.add('active');
      }
    });

    // 4. Content
    applyLang();
  }

  document.addEventListener('DOMContentLoaded', init);
  </script>
