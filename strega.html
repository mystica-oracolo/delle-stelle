/* ── Reset / Variables ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #07031a;
  --card: #0b0520;
  --purple: #2a1748;
  --text: #e8dcc8;
  --muted: #8a7a60;
  --gold: #d4af37;
  --gold-dim: rgba(212,175,55,0.4);
  --gold-glow: rgba(212,175,55,0.15);

html.theme-day {
  --bg: #f5f2ed;
  --card: #ede8df;
  --text: #2a1748;

body {

}

/* ── Skip link ── */
.skip-link {
  position: absolute; left: -999px; top: 0; z-index: 999;

}

/* ── Sfondo Cosmico ── */
.cosmos {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
  background:

    radial-gradient(ellipse 40% 60% at 80% 80%, #1a073820 0%, transparent 60%),
    radial-gradient(2px 2px at 15% 25%, #fff9 0%, transparent 100%),

    radial-gradient(2px 2px at 45% 70%, #d4af3780 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 45%, #fff6 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 85%, #fff5 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 35%, #d4af3760 0%, transparent 100%);

}
@keyframes twinkle { 0% { opacity: .35; } 50% { opacity: .55; } 100% { opacity: .45; } }

/* ── Header ── */
.header {

}

  border: 1px solid var(--gold-dim);
  border-radius: 12px; padding: 16px 20px;
  font-family: 'Crimson Pro', serif; font-style: italic; font-size: 15px; line-height: 1.9;
  color: #c8a860; text-align: center; margin-top: 10px;
}

.fase-number {

  color: #1a0a00; font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700;

}

.list-block { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }

.rito-steps { list-style: none; counter-reset: rito; margin: 8px 0 0; }

}

.btn-premium-inline {

}

.cta-app {

}
.cta-app p { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
.cta-app a {

  color: #1a0a00; font-family: 'Cinzel', serif; font-size: 14px;
  font-weight: 700; padding: 12px 28px; border-radius: 14px;
  text-decoration: none; letter-spacing: .04em; transition: opacity .2s;
}

.share-section { text-align: center; margin-bottom: 16px; position: relative; }

  cursor: pointer; transition: background .2s;
}

}

}

.topic-pills { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }

}

.article-section {

.faq-section { margin-bottom: 20px; content-visibility: auto; }

    artP1: 'La figura della strega affonda le radici nel folklore popolare europeo, dove le "cunning folk" — guaritrici, levatrici ed erboriste di villaggio — offrivano rimedi, protezioni e consigli basati su conoscenze tramandate oralmente. Tra il XV e il XVII secolo l\'Europa fu attraversata dai processi per stregoneria, un capitolo drammatico che portò alla persecuzione di decine di migliaia di persone, per lo più donne, spesso accusate ingiustamente per motivi sociali, religiosi o economici più che per reali pratiche magiche. La stregoneria contemporanea come la conosciamo oggi, la Wicca, nasce invece nel 1954 in Inghilterra grazie a Gerald Gardner, che pubblicò "Witchcraft Today" e fondò una vera e propria religione strutturata, ispirata anche alle controverse teorie antropologiche di Margaret Murray sulla presunta sopravvivenza di un culto pagano pre-cristiano.',
    artP2: 'La simbologia della stregoneria moderna è ricca e stratificata. Il pentacolo — la stella a cinque punte entro un cerchio — rappresenta i quattro elementi (terra, aria, fuoco, acqua) uniti dallo spirito che li governa. Il cerchio magico tracciato prima di ogni rito delimita uno spazio sacro protetto, "tra i mondi", dove energia e intenzione possono fluire senza interferenze esterne. Strumenti come l\'athame (il pugnale rituale, mai usato per tagliare fisicamente), il calderone, la bacchetta e il libro delle ombre completano un vocabolario simbolico che ogni praticante personalizza nel tempo, adattandolo alla propria sensibilità e tradizione di riferimento.',
    artP3: 'Molti luoghi comuni continuano a circolare attorno alla stregoneria. Il primo mito da sfatare è l\'equivalenza tra stregoneria e satanismo: la quasi totalità delle tradizioni wicca e neopagane non riconosce affatto la figura del diavolo, che appartiene alla teologia cristiana e non a quella wiccana. Un secondo mito riguarda il volo sulla scopa, immagine nata probabilmente da rituali agricoli con unguenti psicoattivi applicati con bastoni, poi trasformata in caricatura durante la caccia alle streghe. Infine, contrariamente allo stereotipo, la stregoneria moderna non è riservata alle sole donne: uomini, persone non binarie e praticanti di ogni identità si riconoscono oggi in questo cammino spirituale.',
    artP4: 'Esistono numerose scuole e correnti, spesso con differenze sostanziali tra loro. La Wicca gardneriana, la più antica linea iniziatica, richiede una trasmissione diretta tra maestro e allievo attraverso gradi successivi. La Wicca alessandrina, fondata da Alex Sanders negli anni \'60, ne condivide la struttura con alcune varianti cerimoniali. La Wicca eclettica e la figura della strega solitaria, invece, permettono un percorso completamente autonomo, senza coven né iniziazione formale — proprio l\'approccio proposto in questa guida. Distinta da tutte queste è la stregoneria tradizionale (Traditional Witchcraft), che rifiuta l\'impianto religioso duotestico della Wicca per concentrarsi su pratiche folk, erboristeria popolare e un rapporto diretto con gli spiriti del luogo.',
    artP5: 'Un aneddoto curioso: i famosi processi di Salem del 1692, spesso associati erroneamente alla stregoneria europea, si svolsero in realtà nel Massachusetts puritano e portarono alla condanna di venti persone, in un contesto sociale segnato da tensioni comunitarie più che da reale pratica magica. Oggi il paganesimo moderno e la Wicca sono riconosciuti come movimenti religiosi in diversi paesi, con comunità attive anche in Italia. Per chi desidera approfondire, testi accademici di storia delle religioni e studi antropologici sul paganesimo contemporaneo offrono una prospettiva equilibrata tra fascino simbolico e rigore storico, ben più solida delle rappresentazioni cinematografiche.'
  },

    artImgAlt: 'History and symbolism of modern witchcraft and Wicca',
    artP1: 'The figure of the witch has roots in European folk tradition, where "cunning folk" — village healers, midwives and herbalists — offered remedies, protection and advice based on orally transmitted knowledge. Between the 15th and 17th centuries, Europe was swept by witch trials, a dramatic chapter that led to the persecution of tens of thousands of people, mostly women, often unjustly accused for social, religious or economic reasons rather than actual magical practice. Contemporary witchcraft as we know it today, Wicca, was instead founded in 1954 in England by Gerald Gardner, who published "Witchcraft Today" and established a genuinely structured religion, partly inspired by the controversial anthropological theories of Margaret Murray about the supposed survival of a pre-Christian pagan cult.',
    artP2: 'The symbolism of modern witchcraft is rich and layered. The pentacle — a five-pointed star within a circle — represents the four elements (earth, air, fire, water) united by the spirit that governs them. The magic circle drawn before every ritual marks out a protected sacred space, "between the worlds," where energy and intention can flow without outside interference. Tools such as the athame (the ritual blade, never used for physical cutting), the cauldron, the wand and the book of shadows complete a symbolic vocabulary that each practitioner personalizes over time, adapting it to their own sensibility and tradition.',
    artP3: 'Many misconceptions still surround witchcraft. The first myth to debunk is the equation of witchcraft with Satanism: nearly all Wiccan and neopagan traditions do not recognize the devil at all, a figure belonging to Christian theology rather than Wiccan belief. A second myth concerns flying on a broomstick, an image likely born from agricultural rituals involving psychoactive ointments applied with sticks, later turned into caricature during the witch hunts. Finally, contrary to the stereotype, modern witchcraft is not reserved for women alone: men, non-binary people and practitioners of every identity today recognize themselves in this spiritual path.',
    artP4: 'Numerous schools and currents exist, often with substantial differences between them. Gardnerian Wicca, the oldest initiatory lineage, requires direct transmission from teacher to student through successive degrees. Alexandrian Wicca, founded by Alex Sanders in the 1960s, shares much of its structure with some ceremonial variations. Eclectic Wicca and the solitary witch, by contrast, allow for a completely self-directed path, without a coven or formal initiation — precisely the approach proposed in this guide. Distinct from all of these is Traditional Witchcraft, which rejects Wicca\'s duotheistic religious framework to focus on folk practices, popular herbalism and a direct relationship with the spirits of the land.',
    artP5: 'A curious footnote: the famous 1692 Salem trials, often mistakenly linked to European witchcraft, actually took place in Puritan Massachusetts and led to the conviction of twenty people, in a social context marked more by community tensions than by actual magical practice. Today modern paganism and Wicca are recognized as religious movements in several countries, with active communities in Italy as well. For those wishing to go deeper, academic texts on the history of religion and anthropological studies of contemporary paganism offer a balanced perspective between symbolic fascination and historical rigor, far more solid than cinematic portrayals.'

/* ── Audio Manager ── */
const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';

class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.preload = 'none';
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play() { this.audio?.play().catch(() => {}); this.isPlaying = true; sessionStorage.setItem(AUDIO_KEY, 'true'); this.updateUI(); }
  pause() { this.audio?.pause(); this.isPlaying = false; sessionStorage.setItem(AUDIO_KEY, 'false'); this.updateUI(); }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}
window.audioManager = new AudioManager();
document.getElementById('musicToggle')?.addEventListener('click', () => window.audioManager.toggle());

function renderFAQ(faqs) {
  const container = document.getElementById('faqList');
  if (!container) return;
  container.innerHTML = faqs.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false">
        <span>${f.q}</span>
        <span class="faq-icon">+</span>
      </button>
      <div class="faq-answer" id="faq-ans-${i}" hidden>
        <p>${f.a}</p>
      </div>
    </div>
  `).join('');
}
function toggleFAQ(i) {
  const ans = document.getElementById(`faq-ans-${i}`);
  const btn = document.querySelector(`#faq-${i} .faq-question`);
  const icon = btn?.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  if (icon) icon.textContent = isOpen ? '+' : '−';
  btn?.setAttribute('aria-expanded', String(!isOpen));
}

window.addEventListener('scroll', () => { scrollBtn.classList.toggle('show', window.scrollY > 400); }, { passive: true });
scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

/* ── AdSense empty-slot detection ── */
setTimeout(function () {
  document.querySelectorAll('.ad-slot').forEach(function (slot) {
    var ins = slot.querySelector('ins.adsbygoogle');
    if (!ins || ins.getAttribute('data-ad-status') === 'unfilled' || ins.innerHTML.trim() === '') {
      slot.classList.add('ad-empty');
    }
  });
}, 2000);

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  applyTheme(isDayMode);
  applyLang();
  document.querySelectorAll('[data-lang]').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
});
</script>
</body>
</html>
