<style>
/* ── Variabili / Reset ── */
:root{
  --bg:#0a0514;
  --card:#140c24;
  --purple:#2a1748;
  --gold:#d4af37;
  --gold-dim:#b8860b;
  --gold-light:#f0d060;
  --gold-glow:rgba(212,175,55,.4);
  --text:#f4f1fa;
  --muted:#b8b2d1;
  --radius:14px;
  --border:rgba(212,175,55,.2);
  --indigo:#4a3a8a;
  --cyan:#40c0d0;
  --purple-accent:#7b5ea7;
}
html.theme-day{
  --bg:#f5f2ed;
  --card:#ede8df;
  --text:#2a1748;
  --muted:#6b5b7f;
  --purple:#6b5b7f;
  --gold:#c89742;
  --gold-dim:#a67c52;
  --gold-light:#8a5a10;
  --gold-glow:rgba(200,151,66,.2);
  --border:#c89742;
  --indigo:#8a76b0;
  --cyan:#3a8f9c;
  --purple-accent:#8a76b0;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:18px;line-height:1.7;min-height:100vh;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(74,58,138,.18) 0%,transparent 70%),radial-gradient(ellipse at 100% 100%,rgba(64,192,208,.08) 0%,transparent 60%);pointer-events:none;z-index:0}
html.theme-day body::before{opacity:.4}

/* ── Skip link ── */
.skip-link{position:absolute;top:-40px;left:8px;background:var(--gold);color:#0a0514;padding:8px 14px;border-radius:8px;z-index:999;text-decoration:none;font-family:'Cinzel',serif;font-size:13px;transition:top .2s}
.skip-link:focus{top:8px}

/* ── Sfondo Cosmico ── */
.cosmos{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%,#2a174830 0%,transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 80%,#1a073820 0%,transparent 60%),
    radial-gradient(2px 2px at 15% 25%,#fff9 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 75% 15%,#fff7 0%,transparent 100%),
    radial-gradient(2px 2px at 45% 70%,#d4af3780 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 45%,#fff6 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 85%,#fff5 0%,transparent 100%),
    radial-gradient(2px 2px at 60% 35%,#d4af3760 0%,transparent 100%);
  animation:twinkle 14s infinite alternate}
@keyframes twinkle{0%{opacity:.35}50%{opacity:.55}100%{opacity:.45}}
html.theme-day .cosmos{opacity:.25}

/* ── Progress bar (logica specifica pagina — invariata) ── */
.astral-progress{position:fixed;top:0;left:0;right:0;height:3px;background:rgba(212,175,55,.1);z-index:200}
.astral-progress-fill{height:100%;background:linear-gradient(90deg,var(--purple-accent),var(--gold),var(--cyan));width:0%;transition:width .3s}

/* ── Header standard ── */
.page-header{background:rgba(10,5,20,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:14px 16px 10px;position:sticky;top:3px;z-index:100}
html.theme-day .page-header{background:rgba(245,242,237,.94)}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.btn-back{display:inline-flex;align-items:center;color:var(--gold);text-decoration:none;font-family:'Cinzel',serif;font-size:13px;letter-spacing:.5px}
.btn-back::before{content:'← '}
.header-controls{display:flex;gap:8px}
.btn-icon{background:rgba(212,175,55,.08);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--gold);font-size:12px;cursor:pointer;font-family:'Cinzel',serif;transition:all .2s}
.btn-icon:hover{background:rgba(212,175,55,.16)}
.page-title{font-family:'Cinzel',serif;font-size:19px;color:var(--gold);text-align:center;margin:10px 0 6px;letter-spacing:1px}
.lang-switch{display:flex;justify-content:center;gap:6px}
.btn-lang{background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 10px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Cinzel',serif;transition:all .2s}
.btn-lang.active,.btn-lang:hover{background:var(--gold);color:#140c24;border-color:var(--gold)}

/* ── HERO ── */
.hero{text-align:center;padding:36px 20px 24px;position:relative;z-index:1}
.hero-icon{font-size:64px;display:block;margin-bottom:14px;filter:drop-shadow(0 0 24px rgba(212,175,55,.5));animation:floatIcon 4s ease-in-out infinite}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hero h1{font-family:'Cinzel',serif;font-size:clamp(24px,6vw,38px);color:var(--gold);letter-spacing:2px;margin-bottom:10px}
.hero-sub{color:var(--muted);font-size:16px;max-width:520px;margin:0 auto;font-style:italic}

/* ── THETA PLAYER (funzione interattiva — logica invariata) ── */
.theta-player{background:linear-gradient(135deg,rgba(74,58,138,.35),rgba(64,192,208,.1));border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:560px;margin:24px auto;position:relative;z-index:1}
.theta-player h3{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);margin-bottom:14px;text-align:center;letter-spacing:1px}
.theta-info{font-size:14px;color:var(--muted);text-align:center;margin-bottom:16px;line-height:1.5}
.theta-controls{display:flex;flex-direction:column;gap:12px}
.theta-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.theta-label{font-size:13px;color:var(--muted);min-width:90px}
select.theta-sel,input[type=range]{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 10px;font-size:13px}
input[type=range]{cursor:pointer;accent-color:var(--gold)}
.btn-theta{width:100%;padding:12px;background:linear-gradient(135deg,var(--purple-accent),var(--indigo));border:1px solid var(--border);border-radius:10px;color:var(--gold-light);font-family:'Cinzel',serif;font-size:14px;letter-spacing:1px;cursor:pointer;transition:all .3s;margin-top:8px}
.btn-theta:hover{transform:translateY(-1px)}
.btn-theta.playing{background:linear-gradient(135deg,#2a4a2a,#1a3a1a);color:#80d080;border-color:#80d08050}
.theta-viz{display:flex;align-items:flex-end;justify-content:center;gap:3px;height:32px;margin-top:12px;opacity:.3;transition:opacity .5s}
.theta-viz.active{opacity:1}
.theta-bar{width:4px;background:linear-gradient(to top,var(--purple-accent),var(--cyan));border-radius:2px;animation:none}
.theta-viz.active .theta-bar{animation:thetaWave 1.4s ease-in-out infinite}
.theta-bar:nth-child(1){animation-delay:0s;height:8px}
.theta-bar:nth-child(2){animation-delay:.1s;height:14px}
.theta-bar:nth-child(3){animation-delay:.2s;height:22px}
.theta-bar:nth-child(4){animation-delay:.3s;height:28px}
.theta-bar:nth-child(5){animation-delay:.4s;height:32px}
.theta-bar:nth-child(6){animation-delay:.3s;height:28px}
.theta-bar:nth-child(7){animation-delay:.2s;height:22px}
.theta-bar:nth-child(8){animation-delay:.1s;height:14px}
.theta-bar:nth-child(9){animation-delay:0s;height:8px}
@keyframes thetaWave{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1.2)}}
.theta-warning{font-size:12px;color:var(--muted);text-align:center;margin-top:10px;font-style:italic;opacity:.7}

/* ── TOC ── */
.toc-wrap{max-width:680px;margin:0 auto 28px;padding:0 20px;position:relative;z-index:1}
.toc-label{font-family:'Cinzel',serif;font-size:12px;color:var(--muted);letter-spacing:2px;text-align:center;margin-bottom:12px;text-transform:uppercase}
.toc-pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.toc-pill{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;transition:all .2s;color:var(--muted)}
.toc-pill:hover,.toc-pill.active{background:rgba(212,175,55,.15);border-color:var(--gold);color:var(--gold)}

/* ── CONTENUTO / ARTICOLO ── */
main{position:relative;z-index:1}
.content{max-width:720px;margin:0 auto;padding:0 20px 20px}
.article-section{max-width:720px;margin:0 auto;padding:0 20px}

.astral-chapter{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;margin-bottom:28px;scroll-margin-top:150px;content-visibility:auto;contain-intrinsic-size:800px}
.chapter-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:18px}
.chapter-icon{font-size:36px;flex-shrink:0;filter:drop-shadow(0 0 12px rgba(212,175,55,.3))}
.chapter-num{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.chapter-title{font-family:'Cinzel',serif;font-size:20px;color:var(--gold);line-height:1.3}
.chapter-sub{font-size:14px;color:var(--muted);margin-top:4px;font-style:italic}
.chapter-body p{margin-bottom:14px;color:var(--text)}
.chapter-body p:last-child{margin-bottom:0}
.chapter-body strong{color:var(--gold-light)}

/* ── CALLOUT ── */
.callout{border-radius:10px;padding:16px 18px;margin:18px 0;border-left:3px solid}
.callout-warning{background:rgba(200,80,40,.08);border-color:#c05028}
.callout-tip{background:rgba(212,175,55,.06);border-color:var(--gold-dim)}
.callout-tech{background:rgba(64,192,208,.06);border-color:var(--cyan)}
.callout-spirit{background:rgba(123,94,167,.1);border-color:var(--purple-accent)}
.callout-title{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;margin-bottom:8px}
.callout-warning .callout-title{color:#d06040}
.callout-tip .callout-title{color:var(--gold)}
.callout-tech .callout-title{color:var(--cyan)}
.callout-spirit .callout-title{color:#b090d0}
.callout-body{font-size:15px;color:var(--muted);line-height:1.6}

/* ── STEP LIST ── */
.step-list{list-style:none;margin:16px 0}
.step-list li{display:flex;gap:14px;margin-bottom:16px;align-items:flex-start}
.step-num{background:linear-gradient(135deg,var(--purple-accent),var(--indigo));color:var(--gold-light);font-family:'Cinzel',serif;font-size:12px;font-weight:700;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-text{font-size:16px;color:var(--text);line-height:1.6}
.step-text strong{color:var(--gold-light)}

/* ── KEYWORD TAGS ── */
.kw-row{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
.kw{background:rgba(123,94,167,.15);border:1px solid rgba(123,94,167,.3);border-radius:20px;padding:4px 12px;font-size:13px;color:#b090d0}

/* ── DIVIDER ── */
.divider{text-align:center;color:var(--gold-dim);letter-spacing:8px;margin:10px 0;font-size:14px;opacity:.5}

/* ── ADSENSE ── */
.ad-wrap{text-align:center;margin:28px auto;max-width:720px;padding:0 20px}

/* ── CTA esplora ── */
.cta-explore{display:inline-block;background:linear-gradient(135deg,var(--purple-accent),var(--indigo));border:1px solid var(--border);border-radius:12px;padding:14px 28px;color:var(--gold-light);font-family:'Cinzel',serif;font-size:14px;letter-spacing:1px;text-decoration:none;transition:all .3s;margin:20px auto 0;text-align:center}
.cta-explore:hover{transform:translateY(-2px)}
.cta-wrap{text-align:center}

/* ── Link interni articolo ── */
.article-links{display:flex;flex-wrap:wrap;gap:10px;margin:24px 0;justify-content:center}
.article-links a{background:rgba(212,175,55,.07);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:13px;color:var(--gold);text-decoration:none;transition:all .2s}
.article-links a:hover{background:rgba(212,175,55,.16)}

/* ── Banner Premium soft ── */
.premium-banner{max-width:680px;margin:8px auto 24px;padding:16px 20px;background:linear-gradient(135deg,rgba(212,175,55,.1),rgba(123,94,167,.08));border:1px solid var(--border);border-radius:var(--radius);text-align:center}
.premium-banner p{color:var(--muted);font-size:14px;margin-bottom:10px}
.premium-banner button{background:var(--gold);color:#140c24;border:none;border-radius:8px;padding:9px 18px;font-family:'Cinzel',serif;font-size:13px;cursor:pointer;letter-spacing:.5px}

/* ── SHARE ── */
.share-section{max-width:680px;margin:0 auto 24px;padding:0 20px;text-align:center;position:relative}
.btn-share{background:rgba(212,175,55,.08);border:1px solid var(--border);border-radius:10px;padding:10px 20px;color:var(--gold);font-family:'Cinzel',serif;font-size:13px;cursor:pointer}
.share-popup{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
.share-btn{border-radius:8px;padding:8px 14px;font-size:13px;text-decoration:none;color:#fff;border:none;cursor:pointer;font-family:'Crimson Pro',serif}
.share-btn.whatsapp{background:#25D366}
.share-btn.telegram{background:#0088cc}
.share-btn.facebook{background:#1877F2}
.share-btn.twitter{background:#000}
.share-btn.copy{background:rgba(212,175,55,.15);color:var(--gold);border:1px solid var(--border)}

/* ── FAQ ── */
.faq-section{max-width:720px;margin:0 auto;padding:0 20px 20px}
.faq-title{font-family:'Cinzel',serif;font-size:20px;color:var(--gold);text-align:center;margin-bottom:18px;letter-spacing:1px}
.faq-item{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.faq-question{width:100%;background:none;border:none;color:var(--text);font-family:'Cinzel',serif;font-size:14px;padding:14px 16px;text-align:left;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.faq-icon{color:var(--gold);font-size:18px}
.faq-answer{padding:0 16px 16px;color:var(--muted);font-size:15px;line-height:1.6}

/* ── PREMIUM MODAL ── */
.premium-modal{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center}
.premium-modal.show{display:flex}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.7)}
.modal-content{position:relative;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;max-width:360px;width:90%;text-align:center;z-index:1}
.modal-content h2{font-family:'Cinzel',serif;color:var(--gold);font-size:19px;margin-bottom:12px}
.modal-content p{color:var(--muted);font-size:15px;margin-bottom:10px}
.premium-price{color:var(--gold-light)!important;font-family:'Cinzel',serif;font-size:16px}
.btn-premium-buy{width:100%;background:var(--gold);color:#140c24;border:none;border-radius:10px;padding:13px;font-family:'Cinzel',serif;font-size:14px;margin-top:14px;cursor:pointer}
.btn-premium-skip{width:100%;background:none;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:11px;font-family:'Crimson Pro',serif;font-size:14px;margin-top:10px;cursor:pointer}

/* ── BACK BUTTON legacy (mantenuto per continuità visiva) ── */
.back-btn{display:none}

/* ── FOOTER ── */
.page-footer{text-align:center;padding:30px 20px;color:var(--muted);font-size:13px;border-top:1px solid var(--border)}
.footer-links{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-bottom:14px}
.footer-links a{color:var(--gold-dim);text-decoration:none;font-size:13px}
.footer-links a:hover{color:var(--gold)}
.footer-disclaimer{margin-top:8px;opacity:.7;font-size:12px}

:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

@media(max-width:600px){
  .hero h1{font-size:22px}
  .astral-chapter{padding:20px 16px}
  .chapter-title{font-size:17px}
  .theta-row{flex-direction:column;align-items:stretch}
  .theta-label{min-width:unset}
}
</style>
</head>
<body>

<a href="#main-content" class="skip-link">Vai al contenuto principale</a>

<div class="astral-progress"><div class="astral-progress-fill" id="progressFill"></div></div>

<div class="cosmos" aria-hidden="true"></div>

<header class="page-header">
  <div class="header-top">
    <a href="./index.html" class="btn-back" id="btn-back"></a>
    <div class="header-controls">
      <button id="musicToggle" class="btn-icon" aria-label="Toggle musica"></button>
      <button id="themeToggle" class="btn-icon" aria-label="Toggle tema"></button>
    </div>
  </div>
  <h1 class="page-title" id="page-title">🌌 Viaggio Astrale</h1>
  <div class="lang-switch">
    <button data-lang="it" class="btn-lang active">IT</button>
    <button data-lang="en" class="btn-lang">EN</button>
    <button data-lang="es" class="btn-lang">ES</button>
  </div>
</header>

<main id="main-content">

  <!-- ═══ SEZIONE INTERATTIVA (sempre in cima) ═══ -->
  <section class="hero">
    <span class="hero-icon" aria-hidden="true">🌌</span>
    <h2 id="hero-title"></h2>
    <p class="hero-sub" id="hero-sub"></p>
  </section>

  <div class="theta-player">
    <h3 id="theta-title"></h3>
    <p class="theta-info" id="theta-info"></p>
    <div class="theta-controls">
      <div class="theta-row">
        <span class="theta-label" id="theta-freq-label"></span>
        <select class="theta-sel" id="thetaFreq" onchange="changeThetaFreq()">
          <option value="4" id="theta-opt-4"></option>
          <option value="6" selected id="theta-opt-6"></option>
          <option value="7.5" id="theta-opt-75"></option>
          <option value="8" id="theta-opt-8"></option>
        </select>
      </div>
      <div class="theta-row">
        <span class="theta-label" id="theta-vol-label"></span>
        <input type="range" id="thetaVol" min="0" max="0.5" step="0.01" value="0.25" oninput="updateThetaVol()" aria-label="Volume onde theta">
      </div>
      <button class="btn-theta" id="thetaPlayBtn" onclick="toggleTheta()"></button>
    </div>
    <div class="theta-viz" id="thetaViz" aria-hidden="true">
      <div class="theta-bar"></div><div class="theta-bar"></div><div class="theta-bar"></div>
      <div class="theta-bar"></div><div class="theta-bar"></div><div class="theta-bar"></div>
      <div class="theta-bar"></div><div class="theta-bar"></div><div class="theta-bar"></div>
    </div>
    <p class="theta-warning" id="theta-warning"></p>
  </div>

  <div class="toc-wrap">
    <div class="toc-label" id="toc-label"></div>
    <div class="toc-pills" id="tocPills"></div>
  </div>

  <div class="premium-banner">
    <p id="premium-banner-text"></p>
    <button id="premium-banner-btn" onclick="requirePremium('viaggio_astrale_extra')"></button>
  </div>

  <!-- ═══ SHARE ═══ -->

      { id:"a1", icon:"🌟", num:"Chapter I", title:"What Is Astral Travel", sub:"The experience of leaving the physical body", blocks:[

        {t:"p", v:"In esoteric traditions, the human being is made of several overlapping bodies: the physical body, the etheric body (closely tied to the physical), the astral body (seat of emotions and desires), the mental body, and the higher spiritual bodies. During astral travel, consciousness shifts into the astral body, kept linked to the physical one through the <em>Silver Cord</em> — an indestructible energetic thread."},
        {t:"callout", variant:"spirit", title:"✦ The Astral Plane", v:"The astral plane is a level of reality parallel to the physical one, made of subtle matter. It includes zones that mirror physical locations (lower astral plane), transitional zones, and higher planes of light and wisdom. The quality of your astral experience depends on your emotional and spiritual state at the moment of projection."},
        {t:"p", v:"Historical accounts span millennia and cultures: the ancient Egyptians described the <em>Ka</em> as the astral double; Tibetan traditions speak of the <em>dream body</em>; shamans worldwide practice traveling into non-ordinary realities. In modern parapsychology, OBEs were studied by researchers such as Robert Monroe, who founded the Monroe Institute for the systematic research of these states."}
      ]},
      { id:"a2", icon:"🧠", num:"Chapter II", title:"The Science of Theta Waves", sub:"Neuroscience and altered states of consciousness", blocks:[
        {t:"p", v:"The brain produces electrical waves at different frequencies depending on the state of consciousness. <strong>Theta waves (4–8 Hz)</strong> occur naturally during the sleep-wake transition (hypnagogia), in deep meditation, and during REM sleep. This is the state in which the mind is most receptive, creative and open to non-ordinary experiences."},
        {t:"callout", variant:"tech", title:"🎧 How Binaural Beats Work", v:"When the left ear receives a 150 Hz tone and the right ear a 156 Hz tone, the brain 'perceives' a third frequency — the difference: 6 Hz (theta). This phenomenon, called a binaural beat, gradually entrains the brainwaves toward the target frequency. Stereo headphones are essential: speakers mix the sounds before they reach the brain."},
        {t:"p", v:"The ideal theta window for astral projection is between <strong>6 and 7 Hz</strong>. In this range consciousness stays awake while the body is deeply relaxed — the perfect condition for separation. Tibetan traditions and techniques such as WILD (Wake-Induced Lucid Dream) exploit precisely this window."},

/* ── Render capitoli (data-driven, multilingua) ── */
function renderChapters(chapters) {
  const container = document.getElementById('chaptersContainer');
  if (!container) return;
  container.innerHTML = chapters.map((ch, idx) => {
    const blocksHtml = ch.blocks.map(b => {
      if (b.t === 'p') return `<p>${b.v}</p>`;
      if (b.t === 'callout') return `<div class="callout callout-${b.variant}"><div class="callout-title">${b.title}</div><div class="callout-body">${b.v}</div></div>`;
      if (b.t === 'kw') return `<div class="kw-row">${b.items.map(k => `<span class="kw">${k}</span>`).join('')}</div>`;
      if (b.t === 'steps') return `<ul class="step-list">${b.items.map((it, i) => `<li><div class="step-num">${it.marker || (i+1)}</div><div class="step-text"><strong>${it.s}</strong> ${it.v}</div></li>`).join('')}</ul>`;
      return '';
    }).join('');
    const divider = idx > 0 ? `<div class="divider">✦ ✦ ✦</div>` : '';
    return `${divider}<div class="astral-chapter" id="${ch.id}">
      <div class="chapter-header">
        <div class="chapter-icon" aria-hidden="true">${ch.icon}</div>
        <div class="chapter-meta">
          <div class="chapter-num">${ch.num}</div>
          <div class="chapter-title">${ch.title}</div>
          <div class="chapter-sub">${ch.sub}</div>
        </div>
      </div>
      <div class="chapter-body">${blocksHtml}</div>
    </div>`;
  }).join('');

  // Re-attach IntersectionObserver on the freshly rendered chapters
  initChapterObserver();
}

/* ── Render TOC pills ── */
function renderTOC(labels) {
  const wrap = document.getElementById('tocPills');

  wrap.innerHTML = labels.map((label, i) => `<div class="toc-pill${i === 0 ? ' active' : ''}" onclick="scrollChapter(${i+1})">${label}</div>`).join('');
}

    document.querySelectorAll('[data-lang]').forEach(b =>
      b.classList.toggle('active', b.dataset.lang === currentLang));
  });
});

/* ── Audio Manager (musica ambientale continua cross-page) ── */
const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';

class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.preload = 'none';
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play() {
    this.audio?.play().catch(() => {});
    this.isPlaying = true;
    sessionStorage.setItem(AUDIO_KEY, 'true');
    this.updateUI();
  }
  pause() {
    this.audio?.pause();
    this.isPlaying = false;
    sessionStorage.setItem(AUDIO_KEY, 'false');
    this.updateUI();
  }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}
window.audioManager = new AudioManager();
document.getElementById('musicToggle')?.addEventListener('click', () => window.audioManager.toggle());

/* ── Tema Giorno/Notte ── */
let isDayMode = localStorage.getItem('myst_theme') === 'day';

function applyTheme(isDay) {
  document.documentElement.classList.toggle('theme-day', isDay);
  const btn = document.getElementById('themeToggle');
  const L = LANG[currentLang];
  if (btn) btn.textContent = isDay ? L.theme.night : L.theme.day;
  localStorage.setItem('myst_theme', isDay ? 'day' : 'night');
}
document.getElementById('themeToggle')?.addEventListener('click', () => { isDayMode = !isDayMode; applyTheme(isDayMode); });

/* ── Premium Gate ── */
function isPremium() {
  return localStorage.getItem('myst_premium') === '1';
}
function requirePremium(actionType) {
  if (isPremium()) return true;
  document.getElementById('premiumModal')?.classList.add('show');
  document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'false');
  return false;
}
function closePremiumModal() {
  document.getElementById('premiumModal')?.classList.remove('show');
  document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'true');
}

/* ── Share ── */
function shareContent(customText) {
  const L = LANG[currentLang];
  const text = customText || L.shareText;
  if (navigator.share) {
    navigator.share({ title: L.shareTitle, text, url: PAGE_URL }).catch(() => {});
    return;
  }
  const enc = encodeURIComponent(text + ' ' + PAGE_URL);
  const ue = encodeURIComponent(PAGE_URL);
  const wa = document.getElementById('share-wa'); if (wa) wa.href = `https://wa.me/?text=${enc}`;
  const tg = document.getElementById('share-tg'); if (tg) tg.href = `https://t.me/share/url?url=${ue}&text=${encodeURIComponent(text)}`;
  const fb = document.getElementById('share-fb'); if (fb) fb.href = `https://www.facebook.com/sharer/sharer.php?u=${ue}`;
  const xb = document.getElementById('share-x'); if (xb) xb.href = `https://twitter.com/intent/tweet?text=${enc}`;
  const sp = document.getElementById('sharePopup'); if (sp) sp.hidden = false;
}
function copyLink() {
  const L = LANG[currentLang];
  navigator.clipboard.writeText(PAGE_URL).then(() => {
    const b = document.getElementById('share-copy');
    if (b) { b.textContent = L.shareCopied; setTimeout(() => { b.textContent = L.shareCopy; }, 2000); }
  });
}

/* ── FAQ Accordion ── */
function renderFAQ(faqs) {
  const container = document.getElementById('faqList');
  if (!container) return;
  container.innerHTML = faqs.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false">
        <span>${f.q}</span>
        <span class="faq-icon">+</span>
      </button>
      <div class="faq-answer" id="faq-ans-${i}" hidden>
        <p>${f.a}</p>
      </div>
    </div>
  `).join('');
}
function toggleFAQ(i) {
  const ans = document.getElementById(`faq-ans-${i}`);
  const btn = document.querySelector(`#faq-${i} .faq-question`);
  const icon = btn?.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  if (icon) icon.textContent = isOpen ? '+' : '−';
  btn?.setAttribute('aria-expanded', String(!isOpen));
}

/* ══════════════════════════════════════════════════════════
   LOGICA SPECIFICA DI PAGINA — INVARIATA (non riscritta)
   Progress bar, TOC scroll-spy, Player Onde Theta binaurali
   ══════════════════════════════════════════════════════════ */

// PROGRESS BAR
window.addEventListener('scroll', () => {
  const fill = document.getElementById('progressFill');
  if (!fill) return;
  const max = document.documentElement.scrollHeight - window.innerHeight;
  const pct = max > 0 ? Math.max(0, Math.min(100, (window.scrollY / max) * 100)) : 0;
  fill.style.width = pct + '%';
}, { passive: true });

// TOC ACTIVE PILL (osservatore ricreato ad ogni renderChapters, perché il DOM viene rigenerato dal cambio lingua)
let _chapterObserver = null;
function initChapterObserver() {
  if (_chapterObserver) _chapterObserver.disconnect();
  const pills = document.querySelectorAll('.toc-pill');
  const chapters = document.querySelectorAll('.astral-chapter');
  _chapterObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id; // a1, a2...
        const idx = parseInt(id.replace('a', '')) - 1;
        pills.forEach((p, i) => p.classList.toggle('active', i === idx));
      }
    });
  }, { rootMargin: '0px 0px -55% 0px', threshold: 0.1 });
  chapters.forEach(ch => _chapterObserver.observe(ch));
}

function scrollChapter(n) {
  const el = document.getElementById('a' + n);
  if (!el) return;
  const top = el.getBoundingClientRect().top + window.scrollY - 150;
  window.scrollTo({ top, behavior: 'smooth' });
}

// THETA AUDIO (Web Audio API — battimenti binaurali)
let _thetaCtx = null, _thetaOscL = null, _thetaOscR = null, _thetaGain = null, _thetaPlaying = false;

function toggleTheta() {
  const btn = document.getElementById('thetaPlayBtn');
  const viz = document.getElementById('thetaViz');
  const freqEl = document.getElementById('thetaFreq');
  const volEl = document.getElementById('thetaVol');
  const freq = parseFloat(freqEl.options[freqEl.selectedIndex].value);
  const vol = parseFloat(volEl.value);
  const L = LANG[currentLang];

  if (_thetaPlaying) {
    try {
      if (_thetaGain && _thetaCtx) _thetaGain.gain.setTargetAtTime(0, _thetaCtx.currentTime, 0.12);
      setTimeout(() => {
        try { _thetaOscL.stop(); _thetaOscR.stop(); } catch(e) {}
        try { _thetaCtx.close(); } catch(e) {}
      }, 200);
    } catch(e) {}
    _thetaCtx = null; _thetaOscL = null; _thetaOscR = null; _thetaGain = null;
    _thetaPlaying = false;
    if (btn) { btn.textContent = L.thetaPlay; btn.classList.remove('playing'); }
    if (viz) viz.classList.remove('active');
  } else {
    try {
      _thetaCtx = new (window.AudioContext || window.webkitAudioContext)();
      _thetaGain = _thetaCtx.createGain();
      _thetaGain.gain.value = 0;
      _thetaGain.connect(_thetaCtx.destination);
      const merger = _thetaCtx.createChannelMerger(2);
      merger.connect(_thetaGain);
      _thetaOscL = _thetaCtx.createOscillator();
      _thetaOscR = _thetaCtx.createOscillator();
      _thetaOscL.type = 'sine'; _thetaOscR.type = 'sine';
      _thetaOscL.frequency.value = 150;
      _thetaOscR.frequency.value = 150 + freq;
      _thetaOscL.connect(merger, 0, 0);
      _thetaOscR.connect(merger, 0, 1);
      _thetaOscL.start(); _thetaOscR.start();
      _thetaGain.gain.setTargetAtTime(vol, _thetaCtx.currentTime, 0.2);
      _thetaPlaying = true;
      if (btn) { btn.textContent = L.thetaPause; btn.classList.add('playing'); }
      if (viz) viz.classList.add('active');
    } catch(err) {
      const warn = document.getElementById('theta-warning');
      if (warn) warn.textContent = L.thetaUnsupported;
    }
  }
}

function updateThetaVol() {
  const vol = parseFloat(document.getElementById('thetaVol').value);
  if (_thetaGain && _thetaCtx && _thetaCtx.state === 'running') {
    _thetaGain.gain.setTargetAtTime(vol, _thetaCtx.currentTime, 0.05);
  }
}

function changeThetaFreq() {
  if (_thetaPlaying) { toggleTheta(); setTimeout(toggleTheta, 200); }
}

window.addEventListener('beforeunload', () => {
  if (_thetaCtx && _thetaCtx.state !== 'closed') try { _thetaCtx.close(); } catch(e) {}
});

/* ── Init Sequence ── */
document.addEventListener('DOMContentLoaded', () => {
  applyTheme(isDayMode);     // 1. Tema
  // window.audioManager già init dal costruttore sopra
  applyLang();               // 2. Lingua (chiama updateSEO() come prima cosa, renderizza capitoli/TOC/FAQ)
  document.querySelectorAll('[data-lang]').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === currentLang));
});
</script>
