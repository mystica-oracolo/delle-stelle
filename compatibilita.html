<script>
const SEGNI = {
  ariete:    {n:"Ariete",    e:"♈",s:"🐏",p:"Marte",    el:"Fuoco", d:"21 Mar – 20 Apr",k:["Coraggio","Leadership","Passione","Iniziativa"]},
  toro:      {n:"Toro",      e:"♉",s:"🐂",p:"Venere",   el:"Terra",  d:"21 Apr – 20 Mag",k:["Stabilità","Sensualità","Tenacia","Costanza"]},
  gemelli:   {n:"Gemelli",   e:"♊",s:"👯",p:"Mercurio", el:"Aria",   d:"21 Mag – 21 Giu",k:["Comunicazione","Curiosità","Intelligenza","Adattabilità"]},
  cancro:    {n:"Cancro",    e:"♋",s:"🦀",p:"Luna",     el:"Acqua",  d:"22 Giu – 22 Lug",k:["Intuizione","Empatia","Protezione","Memoria"]},
  leone:     {n:"Leone",     e:"♌",s:"🦁",p:"Sole",     el:"Fuoco",  d:"23 Lug – 22 Ago",k:["Carisma","Creatività","Generosità","Vitalità"]},
  vergine:   {n:"Vergine",   e:"♍",s:"🌾",p:"Mercurio", el:"Terra",  d:"23 Ago – 22 Set",k:["Precisione","Servizio","Analisi","Salute"]},
  bilancia:  {n:"Bilancia",  e:"♎",s:"⚖️",p:"Venere",   el:"Aria",   d:"23 Set – 22 Ott",k:["Armonia","Giustizia","Diplomazia","Bellezza"]},
  scorpione: {n:"Scorpione", e:"♏",s:"🦂",p:"Plutone",  el:"Acqua",  d:"23 Ott – 22 Nov",k:["Intensità","Trasformazione","Potere","Mistero"]},
  sagittario:{n:"Sagittario",e:"♐",s:"🏹",p:"Giove",    el:"Fuoco",  d:"23 Nov – 21 Dic",k:["Libertà","Filosofia","Avventura","Ottimismo"]},
  capricorno:{n:"Capricorno",e:"♑",s:"🐐",p:"Saturno",  el:"Terra",  d:"22 Dic – 20 Gen",k:["Ambizione","Disciplina","Resilienza","Struttura"]},
  acquario:  {n:"Acquario",  e:"♒",s:"🏺",p:"Urano",    el:"Aria",   d:"21 Gen – 19 Feb",k:["Innovazione","Originalità","Umanità","Libertà"]},
  pesci:     {n:"Pesci",     e:"♓",s:"🐟",p:"Nettuno",  el:"Acqua",  d:"20 Feb – 20 Mar",k:["Intuizione","Compassione","Arte","Spiritualità"]}
};

const COMPAT = {
  ariete:    {toro:50,gemelli:80,cancro:45,leone:95,vergine:55,bilancia:70,scorpione:65,sagittario:95,capricorno:55,acquario:75,pesci:55},
  toro:      {ariete:50,gemelli:45,cancro:80,leone:50,vergine:95,bilancia:60,scorpione:70,sagittario:45,capricorno:90,acquario:50,pesci:75},
  gemelli:   {ariete:80,toro:45,cancro:50,leone:75,vergine:50,bilancia:95,scorpione:45,sagittario:70,capricorno:45,acquario:90,pesci:60},
  cancro:    {ariete:45,toro:80,gemelli:50,leone:50,vergine:80,bilancia:55,scorpione:95,sagittario:40,capricorno:70,acquario:45,pesci:90},
  leone:     {ariete:95,toro:50,gemelli:75,cancro:50,vergine:45,bilancia:80,scorpione:55,sagittario:90,capricorno:50,acquario:65,pesci:60},
  vergine:   {ariete:55,toro:95,gemelli:50,cancro:80,leone:45,bilancia:60,scorpione:75,sagittario:40,capricorno:90,acquario:50,pesci:70},
  bilancia:  {ariete:70,toro:60,gemelli:95,cancro:55,leone:80,vergine:60,scorpione:50,sagittario:75,capricorno:55,acquario:90,pesci:65},
  scorpione: {ariete:65,toro:70,gemelli:45,cancro:95,leone:55,vergine:75,bilancia:50,sagittario:50,capricorno:75,acquario:45,pesci:90},
  sagittario:{ariete:95,toro:45,gemelli:70,cancro:40,leone:90,vergine:40,bilancia:75,scorpione:50,capricorno:50,acquario:75,pesci:60},
  capricorno:{ariete:55,toro:90,gemelli:45,cancro:70,leone:50,vergine:90,bilancia:55,scorpione:75,sagittario:50,acquario:50,pesci:75},
  acquario:  {ariete:75,toro:50,gemelli:90,cancro:45,leone:65,vergine:50,bilancia:90,scorpione:45,sagittario:75,capricorno:50,pesci:60},
  pesci:     {ariete:55,toro:75,gemelli:60,cancro:90,leone:60,vergine:70,bilancia:65,scorpione:90,sagittario:60,capricorno:75,acquario:60}
};

const KEYS = Object.keys(SEGNI);

function getScore(a,b){
  if(a===b) return 68+Math.floor(Math.random()*15);
  return COMPAT[a]?.[b] ?? COMPAT[b]?.[a] ?? 50;
}

function rnd(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// Popola select
function initSelects(){
  const u=document.getElementById('selUser'), pa=document.getElementById('selPartner');
  const opts=KEYS.map(k=>`<option value="${k}">${SEGNI[k].e} ${SEGNI[k].n}</option>`).join('');
  const def='<option value="">— Seleziona —</option>';
  u.innerHTML=def+opts; pa.innerHTML=def+opts;

  // Prova a leggere profilo salvato
  try{
    const p=JSON.parse(localStorage.getItem('myst_v3_profile')||'{}')||{};
    if(p.segno && SEGNI[p.segno]) u.value=p.segno;
  }catch(e){}
}

function updateSigns(){
  const u=document.getElementById('selUser').value;
  const pa=document.getElementById('selPartner').value;
  if(u && pa) buildSignsInfo(u,pa);
}

function calcCompat(){
  const u=document.getElementById('selUser').value;
  const pa=document.getElementById('selPartner').value;
  if(!u||!pa){ toast('⚠️ Seleziona entrambi i segni'); return; }

  const su=SEGNI[u], sp=SEGNI[pa];
  const sc=getScore(u,pa);

  // Animazione score ring
  const arc=document.getElementById('scoreArc');
  const circ=282.7;
  const offset=circ-(circ*(sc/100));
  let col='#f87171';
  if(sc>=85) col='#4ade80';
  else if(sc>=70) col='#ffd700';
  else if(sc>=55) col='#fb923c';
  arc.style.stroke=col;
  setTimeout(()=>{ arc.style.strokeDashoffset=offset; },50);

  let livello,nota,heartEmoji;
  if(sc>=85){
    livello='✨ Affinità Cosmica Profonda';
    heartEmoji='💗';
    nota=rnd([
      `${su.n} e ${sp.n} risuonano sulle stesse frequenze cosmiche. Questa connessione va oltre il razionale: è riconoscimento d'anima. Costruite qualcosa di grande insieme — le stelle sono dalla vostra parte.`,
      `Un'alchimia rara. ${su.n} porta ${su.el} e ${sp.n} porta ${sp.el}: insieme creano qualcosa di completo che nessuno dei due potrebbe creare da solo.`,
      `Le carte del cosmo li hanno segnati come compatibili in profondità. Non è fortuna — è affinità di valori, di ritmi, di visione del mondo. Curatela.`
    ]);
  } else if(sc>=70){
    livello='🌟 Buona Affinità';
    heartEmoji='💕';
    nota=rnd([
      `${su.n} e ${sp.n} hanno terreno fertile su cui costruire. Le differenze esistono ma si complementano — l'uno porta ciò che l'altro non ha.`,
      `Connessione solida con potenziale di crescita. Le sfide che incontrate non sono ostacoli — sono opportunità di maturazione reciproca.`,
      `Buona base con potenziale reale. ${su.el} e ${sp.el} dialogano bene tra loro quando entrambi portano consapevolezza.`
    ]);
  } else if(sc>=55){
    livello='⚡ Affinità con Sfide';
    heartEmoji='💛';
    nota=rnd([
      `Connessione che richiede lavoro consapevole. Le differenze tra ${su.n} e ${sp.n} sono reali — ma le differenze gestite con maturità arricchiscono più delle somiglianze.`,
      `Sfida stimolante. Non è la compatibilità più naturale, ma le coppie che superano le differenze costruiscono legami più profondi.`,
      `Terreno impervio ma fertile. Serve comunicazione continua e volontà autentica di incontrarsi a metà strada.`
    ]);
  } else {
    livello='🌊 Connessione Complessa';
    heartEmoji='💜';
    nota=rnd([
      `Correnti contrarie: si attrae e si contraddice. Non è impossibile — ma richiede una maturità eccezionale da entrambi.`,
      `Le energie di ${su.n} e ${sp.n} guardano in direzioni diverse. L'amore diventa una scelta quotidiana invece di un dono naturale.`,
      `Sfida autentica. Il cosmo li mette alla prova: chi sceglie di restare cresce come non avrebbe potuto da solo.`
    ]);
  }

  // Aggiorna UI
  document.getElementById('resEmoji1').textContent=su.e;
  document.getElementById('resName1').textContent=su.n;
  document.getElementById('resEmoji2').textContent=sp.e;
  document.getElementById('resName2').textContent=sp.n;
  document.getElementById('resHeart').textContent=heartEmoji;
  document.getElementById('scoreNum').textContent=sc+'%';
  document.getElementById('compatLevel').textContent=livello;
  document.getElementById('compatLevel').style.color=col;
  document.getElementById('compatText').textContent=nota;

  // Dettagli
  const el1=su.el, el2=sp.el;
  const elCompat=checkElements(el1,el2);
  document.getElementById('detailGrid').innerHTML=`
    <div class="detail-box">
      <div class="label">Elemento ${su.n}</div>
      <div class="value">${elIcon(el1)} ${el1}</div>
    </div>
    <div class="detail-box">
      <div class="label">Elemento ${sp.n}</div>
      <div class="value">${elIcon(el2)} ${el2}</div>
    </div>
    <div class="detail-box">
      <div class="label">Pianeta ${su.n}</div>
      <div class="value">${su.p}</div>
    </div>
    <div class="detail-box">
      <div class="label">Pianeta ${sp.n}</div>
      <div class="value">${sp.p}</div>
    </div>
    <div class="detail-box" style="grid-column:span 2">
      <div class="label">Affinità Elementi</div>
      <div class="value">${elCompat}</div>
    </div>
  `;

  const card=document.getElementById('resultCard');
  card.style.display='block';
  card.scrollIntoView({behavior:'smooth',block:'start'});

  buildSignsInfo(u,pa);

  // Salva storico
  try{
    let h=JSON.parse(localStorage.getItem('myst_v3_history')||'[]');
    h.unshift({tipo:'Compatibilità',dettaglio:`${su.n} + ${sp.n}: ${sc}%`,data:new Date().toLocaleString('it-IT'),ts:Date.now()});
    if(h.length>60) h.pop();
    localStorage.setItem('myst_v3_history',JSON.stringify(h));
  }catch(e){}
}

function elIcon(el){
  return {'Fuoco':'🔥','Terra':'🌍','Aria':'💨','Acqua':'💧'}[el]||'✨';
}

function checkElements(a,b){
  if(a===b) return 'Stesso elemento — grande sintonia naturale';
  const pairs={'Fuoco+Aria':'Si nutrono a vicenda — sinergia forte','Aria+Fuoco':'Si nutrono a vicenda — sinergia forte',
    'Terra+Acqua':'Si completano — stabilità e fluidità','Acqua+Terra':'Si completano — stabilità e fluidità',
    'Fuoco+Terra':'Sfida costruttiva — fuoco e solidità a confronto','Terra+Fuoco':'Sfida costruttiva — fuoco e solidità a confronto',
    'Fuoco+Acqua':'Polarità intensa — attenzione al bilanciamento','Acqua+Fuoco':'Polarità intensa — attenzione al bilanciamento',
    'Aria+Acqua':'Connessione fluida — intelletto ed emozioni','Acqua+Aria':'Connessione fluida — intelletto ed emozioni',
    'Aria+Terra':'Diversità stimolante — mente pratica','Terra+Aria':'Diversità stimolante — mente pratica'
  };
  return pairs[a+'+'+b]||'Energia complementare';
}

function buildSignsInfo(u,pa){
  const su=SEGNI[u], sp=SEGNI[pa];
  const div=document.getElementById('signsInfo');

  function topCompat(key){
    const row=COMPAT[key]||{};
    return Object.entries(row).sort(([,a],[,b])=>b-a).slice(0,3).map(([k,sc])=>
      `<span class="top-tag" onclick="quickSet('${key}','${k}')">${SEGNI[k].e} ${SEGNI[k].n} ${sc}%</span>`
    ).join('');
  }

  div.innerHTML=`
    <div class="section-title">🔮 Profili Astrologici</div>
    ${signCard(su,u,topCompat(u))}
    ${signCard(sp,pa,topCompat(pa))}
  `;
}

function signCard(s,key,top){
  return `<div class="sign-card">
    <div class="sign-card-header">
      <div class="sign-card-emoji">${s.e}</div>
      <div class="sign-card-title">
        <h3>${s.s} ${s.n}</h3>
        <div class="sign-data">${s.d} · ${s.p} · ${s.el}</div>
      </div>
    </div>
    <div class="sign-card-body">
      <div class="keywords">${s.k.map(k=>`<span class="kw">${k}</span>`).join('')}</div>
      <div class="top-compat">
        <h4>💚 Più compatibili:</h4>
        <div class="top-list">${top}</div>
      </div>
    </div>
  </div>`;
}

function quickSet(user, partner){
  document.getElementById('selUser').value=user;
  document.getElementById('selPartner').value=partner;
  calcCompat();
  window.scrollTo({top:0,behavior:'smooth'});
}

// Costruisce tavola sinoptica
function buildTable(){
  const short={ariete:'♈',toro:'♉',gemelli:'♊',cancro:'♋',leone:'♌',vergine:'♍',bilancia:'♎',scorpione:'♏',sagittario:'♐',capricorno:'♑',acquario:'♒',pesci:'♓'};
  let th='<tr><th></th>'+KEYS.map(k=>`<th title="${SEGNI[k].n}">${short[k]}</th>`).join('')+'</tr>';
  let rows=KEYS.map(u=>{
    let cells=KEYS.map(pa=>{
      const sc=u===pa?'♥':getScoreStatic(u,pa);
      if(u===pa) return `<td><span class="cell" style="background:rgba(255,215,0,0.15);color:#ffd700">♥</span></td>`;
      let cls='cell-low'; if(sc>=85)cls='cell-high'; else if(sc>=70)cls='cell-good'; else if(sc>=55)cls='cell-med';
      return `<td><span class="cell ${cls}" style="cursor:pointer" onclick="quickSet('${u}','${pa}')" title="${SEGNI[u].n} + ${SEGNI[pa].n}">${sc}</span></td>`;
    }).join('');
    return `<tr><td>${short[u]}</td>${cells}</tr>`;
  }).join('');
  document.getElementById('compatTable').innerHTML=th+rows;
}

function getScoreStatic(a,b){
  return COMPAT[a]?.[b] ?? COMPAT[b]?.[a] ?? 50;
}

// INIT
initSelects();
buildTable();
</script>
