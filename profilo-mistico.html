<style>
/* ── Reset & Variables ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b14; --card:#1a1726; --purple:#2a1748; --gold:#ffd700; --gold-dim:#b8860b;
  --gold-glow:rgba(255,215,0,0.4); --text:#e6e0f0; --muted:#a89bc2; --radius:18px; --border:rgba(255,215,0,0.2);
}
html.theme-day{
  --bg:#f5f2ed; --card:#ede8df; --text:#2a1748; --muted:#6b5b7f; --purple:#6b5b7f;
  --gold:#c89742; --gold-dim:#a67c52; --gold-glow:rgba(200,151,66,0.2); --border:#c89742;
}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
h1,h2,h3{font-family:'Cinzel',serif}

/* ── Accessibility ── */
.skip-link{position:absolute;left:-999px;top:auto;background:var(--gold);color:#1a1330;padding:10px 16px;border-radius:8px;z-index:9999;font-weight:700;text-decoration:none}
.skip-link:focus{left:16px;top:16px}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* ── Cosmos Background ── */
.cosmos{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, #2a174830 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 80%, #1a073820 0%, transparent 60%),
    radial-gradient(2px 2px at 15% 25%, #fff9 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 75% 15%, #fff7 0%, transparent 100%),
    radial-gradient(2px 2px at 45% 70%, #d4af3780 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 45%, #fff6 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 85%, #fff5 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 35%, #d4af3760 0%, transparent 100%);
  animation:twinkle 14s infinite alternate}
@keyframes twinkle{0%{opacity:.35}50%{opacity:.55}100%{opacity:.45}}
html.theme-day .cosmos{opacity:.15}

/* ── Header ── */
.page-header{position:sticky;top:0;background:rgba(13,11,20,0.97);padding:calc(12px + env(safe-area-inset-top,0px)) 16px 14px;border-bottom:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:10;text-align:center;transition:background .3s}
html.theme-day .page-header{background:rgba(245,242,237,0.97);border-bottom:1px solid var(--border)}
.header-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
.btn-back{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);color:var(--muted);padding:8px 14px;border-radius:20px;cursor:pointer;font-size:13px;text-decoration:none;display:inline-block;transition:all 0.2s}
.btn-back:hover{background:rgba(255,255,255,0.15)}
.header-controls{display:flex;gap:8px}
.btn-icon{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);color:var(--muted);padding:8px 10px;border-radius:12px;cursor:pointer;font-size:13px;transition:all .2s}
.btn-icon:hover{background:rgba(255,255,255,0.15)}
.page-title{font-size:22px;margin:4px 0 2px;background:linear-gradient(90deg,#ffffff,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
html.theme-day .page-title{-webkit-text-fill-color:var(--text);background:none}
.page-subtitle{color:var(--muted);font-size:12px}
.lang-switch{display:flex;justify-content:center;gap:6px;margin-top:10px}
.btn-lang{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:var(--muted);padding:5px 13px;border-radius:14px;font-size:11px;cursor:pointer;letter-spacing:.5px;font-weight:600}
.btn-lang.active{background:var(--gold);color:#1a1330;border-color:var(--gold)}

.content{padding:16px 16px 40px;max-width:650px;margin:0 auto;position:relative;z-index:1}

/* FORM INPUT */
.form-card{background:rgba(26,23,38,0.9);border:1px solid rgba(255,215,0,0.25);border-radius:18px;padding:22px 18px;margin-bottom:20px}
html.theme-day .form-card{background:var(--card);border-color:var(--border)}
.form-card h2{font-size:16px;color:var(--gold);margin-bottom:4px}
.form-card p{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5}

.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.field input,.field select{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.2);color:var(--text);padding:12px 14px;border-radius:12px;font-size:15px;-webkit-appearance:none;appearance:none}
html.theme-day .field input,html.theme-day .field select{background:#ffffff;border-color:var(--border)}
.field input:focus,.field select:focus{outline:none;border-color:rgba(255,215,0,0.5)}
.field input::placeholder{color:#6b6080}

.date-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

.btn-gen{background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;border:none;padding:14px;border-radius:25px;font-size:16px;cursor:pointer;width:100%;font-weight:600;transition:opacity 0.2s;margin-top:4px}
.btn-gen:active{transform:scale(0.98)}

/* PROFILO GENERATO */
.profile-output{display:none;animation:fadeIn 0.5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* HERO CARD */
.hero-card{background:linear-gradient(145deg,rgba(26,23,38,0.95),rgba(40,30,60,0.9));border:1px solid rgba(255,215,0,0.3);border-radius:20px;padding:28px 20px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
html.theme-day .hero-card{background:var(--card);border-color:var(--border)}
.hero-card::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:radial-gradient(circle,rgba(255,215,0,0.08),transparent 70%);pointer-events:none}
.hero-sign-emoji{font-size:64px;display:block;margin-bottom:10px;filter:drop-shadow(0 0 20px rgba(212,175,55,0.5))}
.hero-name{font-size:24px;color:var(--gold);font-weight:700;letter-spacing:1px;margin-bottom:4px;font-family:'Cinzel',serif}
.hero-sign{font-size:15px;color:var(--text);margin-bottom:3px}
.hero-dates{font-size:12px;color:var(--muted);margin-bottom:12px}
.hero-meta{font-size:12px;color:var(--text);display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
.hero-meta span{display:flex;align-items:center;gap:4px}
.keywords-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:12px}
.kw{background:rgba(255,255,255,0.08);padding:4px 12px;border-radius:20px;font-size:11px;color:var(--muted)}

/* SEZIONI */
.section-card{background:rgba(26,23,38,0.9);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:18px 16px;margin-bottom:12px}
html.theme-day .section-card{background:var(--card);border-color:var(--border)}
.section-card h3{font-size:15px;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px;font-family:'Cinzel',serif}
.divider{height:1px;background:rgba(255,255,255,0.08);margin:12px 0}

/* NUMERO DESTINO */
.destiny-display{display:flex;align-items:center;gap:16px}
.destiny-num{font-size:52px;font-weight:800;color:var(--gold);line-height:1;min-width:60px;text-align:center;filter:drop-shadow(0 0 12px rgba(255,215,0,0.4))}
.destiny-info h4{font-size:15px;color:var(--text);margin-bottom:4px}
.destiny-info p{font-size:13px;color:var(--text);line-height:1.6}

/* PIETRE E OGGETTI */
.list-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.list-item:last-child{border-bottom:none}
.list-item-icon{font-size:18px;min-width:24px;text-align:center;margin-top:1px}
.list-item-text{font-size:13px;color:var(--text);line-height:1.5}

/* ANIMALE CINESE */
.cinese-display{display:flex;align-items:center;gap:14px}
.cinese-emoji{font-size:48px;filter:drop-shadow(0 0 10px rgba(255,215,0,0.3))}
.cinese-info h4{font-size:16px;color:var(--gold);margin-bottom:3px}
.cinese-info .anni{font-size:11px;color:var(--muted);margin-bottom:6px}
.cinese-info p{font-size:13px;color:var(--text);line-height:1.5}

/* MESSAGGIO COSMICO */
.cosmic-msg{background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(219,39,119,0.1));border:1px solid rgba(124,58,237,0.3);border-radius:14px;padding:16px;margin-bottom:12px;text-align:center}
.cosmic-msg .msg-text{font-size:14px;color:var(--text);line-height:1.7;font-style:italic}
.cosmic-msg .msg-src{font-size:11px;color:var(--muted);margin-top:8px}

/* BTN RESET / PREMIUM CTA */
.btn-reset{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:var(--muted);padding:10px 20px;border-radius:20px;cursor:pointer;font-size:13px;width:100%;margin-top:8px}
.btn-reset:hover{background:rgba(255,255,255,0.1)}
.btn-premium-cta{background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.3);color:var(--gold);padding:10px 20px;border-radius:20px;cursor:pointer;font-size:13px;width:100%;margin-top:10px;font-weight:600}
.btn-premium-cta:hover{background:rgba(255,215,0,0.15)}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(26,23,38,0.95);border:1px solid rgba(255,215,0,0.3);color:var(--gold);padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;pointer-events:none;transition:all 0.3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ERROR BORDER */
.field-error input,.field-error select{border-color:#ff5a5a !important;box-shadow:0 0 0 3px rgba(255,90,90,0.2)}

/* ── Share Section ── */
.share-section{margin-bottom:20px;position:relative}
.btn-share{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:var(--text);padding:12px;border-radius:20px;cursor:pointer;font-size:14px;width:100%;transition:all .2s}
.btn-share:hover{background:rgba(255,255,255,0.12)}
.share-popup{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;justify-content:center}
.share-btn{flex:1;min-width:100px;text-align:center;padding:9px 10px;border-radius:14px;font-size:12px;text-decoration:none;color:#fff;border:none;cursor:pointer;transition:opacity .2s}
.share-btn:hover{opacity:.85}
.share-btn.whatsapp{background:#25D366;color:#06280f}
.share-btn.telegram{background:#229ED9}
.share-btn.facebook{background:#1877F2}
.share-btn.twitter{background:#111}
.share-btn.copy{background:rgba(255,215,0,0.15);color:var(--gold);border:1px solid rgba(255,215,0,0.3)}

/* ── Article Section ── */
.article-section{background:rgba(26,23,38,0.7);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:22px 18px;margin-bottom:20px;content-visibility:auto}
html.theme-day .article-section{background:var(--card);border-color:var(--border)}
.article-section h2{font-size:19px;color:var(--gold);margin-bottom:14px;line-height:1.3}
.article-section h3{font-size:16px;color:var(--gold);margin:18px 0 8px}
.article-section p{font-size:14px;color:var(--text);line-height:1.75;margin-bottom:12px}
.article-links{display:flex;flex-direction:column;gap:8px;margin:18px 0}
.article-links a{color:var(--gold);text-decoration:none;font-size:13px;border-left:2px solid var(--gold-dim);padding-left:10px}
.article-links a:hover{text-decoration:underline}
.cta-explore{display:block;text-align:center;background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;padding:13px;border-radius:22px;text-decoration:none;font-size:14px;font-weight:600;margin-top:14px}

/* ── FAQ ── */
.faq-section{background:rgba(26,23,38,0.7);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:20px 16px;margin-bottom:20px;content-visibility:auto}
html.theme-day .faq-section{background:var(--card);border-color:var(--border)}
.faq-title{font-size:18px;color:var(--gold);margin-bottom:14px}
.faq-item{border-bottom:1px solid rgba(255,255,255,0.08)}
.faq-item:last-child{border-bottom:none}
.faq-question{width:100%;background:none;border:none;color:var(--text);font-size:14px;text-align:left;padding:13px 4px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;font-weight:600}
.faq-icon{color:var(--gold);font-size:18px;min-width:16px;text-align:center}
.faq-answer{padding:0 4px 14px;font-size:13px;color:var(--muted);line-height:1.7}
.faq-answer a{color:var(--gold)}

/* ── Footer ── */
.page-footer{text-align:center;padding:24px 16px 40px;position:relative;z-index:1}
.footer-links{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:12px}
.footer-links a{color:var(--muted);font-size:12px;text-decoration:none}
.footer-links a:hover{color:var(--gold)}
.page-footer p{font-size:11px;color:var(--muted);line-height:1.6}
.footer-disclaimer{margin-top:6px;font-style:italic;opacity:.8}

/* ── Premium Modal ── */
.premium-modal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.premium-modal.show{display:flex}
.modal-overlay{position:absolute;inset:0;background:rgba(5,3,10,0.8);backdrop-filter:blur(4px)}
.modal-content{position:relative;background:var(--card);border:1px solid rgba(255,215,0,0.35);border-radius:20px;padding:26px 22px;max-width:360px;width:100%;text-align:center;z-index:1}
.modal-content h2{color:var(--gold);font-size:19px;margin-bottom:10px}
.modal-content p{color:var(--text);font-size:13px;line-height:1.6;margin-bottom:10px}
.premium-price{color:var(--gold);font-weight:700;font-size:15px;margin-bottom:16px!important}
.btn-premium-buy{background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;border:none;padding:13px;border-radius:22px;font-size:15px;font-weight:700;width:100%;cursor:pointer;margin-bottom:10px}
.btn-premium-skip{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:6px}

@media (max-width:360px){.hero-meta{gap:10px}.share-btn{min-width:80px}}
</style>
</head>
<body>

<a href="#main-content" class="skip-link">Vai al contenuto principale</a>
<div class="cosmos" aria-hidden="true"></div>

<header class="page-header">
  <div class="header-top">
    <a href="./index.html" class="btn-back" id="btn-back"></a>
    <div class="header-controls">
      <button id="musicToggle" class="btn-icon" aria-label="Toggle musica"></button>
      <button id="themeToggle" class="btn-icon" aria-label="Toggle tema"></button>
    </div>
  </div>
  <h1 class="page-title" id="page-title"></h1>
  <div class="page-subtitle" id="page-subtitle"></div>
  <div class="lang-switch">
    <button data-lang="it" class="btn-lang active">IT</button>
    <button data-lang="en" class="btn-lang">EN</button>
    <button data-lang="es" class="btn-lang">ES</button>
  </div>
</header>

<main id="main-content">
<div class="content">

  <!-- FORM (sezione interattiva — SEMPRE IN CIMA) -->
  <div class="form-card" id="formCard">
    <h2 id="formTitle"></h2>
    <p id="formDesc"></p>

    <div class="field" id="fieldName">
      <label id="labelName"></label>
      <input type="text" id="inpName" placeholder="" maxlength="40" autocomplete="given-name">
    </div>

    <div class="field">
      <label id="labelBirth"></label>
      <div class="date-row">
        <select id="wDay" aria-label="Giorno"></select>
        <select id="wMonth" aria-label="Mese"></select>
        <select id="wYear" aria-label="Anno"></select>
      </div>
    </div>

    <div class="field">
      <label id="labelGender"></label>
      <select id="inpGender">
        <option value="" id="genderOptUnspec"></option>
        <option value="f" id="genderOptF"></option>
        <option value="m" id="genderOptM"></option>
        <option value="o" id="genderOptO"></option>
      </select>
    </div>

    <button class="btn-gen" id="btnGenerate" onclick="generaProfilo()"></button>
  </div>

  <!-- OUTPUT -->
  <div class="profile-output" id="profileOutput">

    <!-- HERO -->
    <div class="hero-card" id="heroCard">
      <span class="hero-sign-emoji" id="heroEmoji">♈</span>
      <div class="hero-name" id="heroName">—</div>
      <div class="hero-sign" id="heroSign">—</div>
      <div class="hero-dates" id="heroDates">—</div>
      <div class="hero-meta" id="heroMeta"></div>
      <div class="keywords-row" id="heroKw"></div>
    </div>

    <!-- MESSAGGIO COSMICO -->
    <div class="cosmic-msg">
      <div class="msg-text" id="cosmicMsg"></div>
      <div class="msg-src" id="cosmicMsgSrc"></div>
    </div>

    <!-- NUMERO DESTINO -->
    <div class="section-card">
      <h3 id="destinySectionTitle"></h3>
      <div class="destiny-display">
        <div class="destiny-num" id="destNum">—</div>
        <div class="destiny-info">
          <h4 id="destTitle">—</h4>
          <p id="destDesc">—</p>
        </div>
      </div>
    </div>

    <!-- ANIMALE CINESE -->
    <div class="section-card" id="cineseCard">
      <h3 id="cineseSectionTitle"></h3>
      <div class="cinese-display">
        <div class="cinese-emoji" id="cineseEmoji">🐭</div>
        <div class="cinese-info">
          <h4 id="cineseName">—</h4>
          <div class="anni" id="cineseAnni">—</div>
          <p id="cineseDesc">—</p>
        </div>
      </div>
      <div class="divider"></div>
      <div style="font-size:13px;color:var(--muted)"><span id="cineseFortunaLabel"></span> <span id="cineseFortuna" style="color:var(--gold)"></span></div>
      <div style="font-size:13px;color:var(--muted);margin-top:6px"><span id="cineseOggettoLabel"></span> <span id="cineseOggetto" style="color:var(--text)"></span></div>
    </div>

    <!-- PIETRE -->
    <div class="section-card">
      <h3 id="pietreSectionTitle"></h3>
      <div id="pietreList"></div>
    </div>

    <!-- OGGETTI -->
    <div class="section-card">
      <h3 id="oggettiSectionTitle"></h3>
      <div id="oggettiList"></div>
    </div>

    <!-- COMPATIBILI TOP -->
    <div class="section-card">
      <h3 id="compatSectionTitle"></h3>
      <div id="compatTop"></div>
    </div>

    <!-- RESET / PREMIUM -->
    <button class="btn-reset" id="btnReset" onclick="resetProfilo()"></button>
    <button class="btn-premium-cta" id="btnPremiumCta" onclick="if(!requirePremium('interpretazione_estesa'))return;"></button>

  </div>

  <!-- SHARE -->

    artP1: 'La idea de recoger en un único mapa la fecha de nacimiento de una persona tiene raíces muy antiguas: la astrología babilónica del segundo milenio a.C. ya vinculaba los planetas al destino individual, mientras que la numerología pitagórica, desarrollada en la Magna Grecia hacia el siglo VI a.C., atribuía a los números un significado vibracional preciso. Paralelamente, en China, la astrología del zodiaco de los doce animales se codificó durante la dinastía Han para calcular compatibilidades dinásticas y augurios agrícolas. El perfil místico moderno une estos tres sistemas milenarios — signo solar, número del destino y animal chino — devolviendo una fotografía sintética y multicultural de la identidad cósmica de cada persona.',
    artP2: 'Cada elemento del perfil cuenta una parte diferente de la persona. El signo zodiacal, gobernado por un planeta y un elemento (fuego, tierra, aire o agua), describe el temperamento instintivo y la forma en que reaccionamos a los estímulos. El número del destino, obtenido sumando las cifras de la fecha de nacimiento hasta reducirlas a un número único o a un número maestro como 11, 22 o 33, revela en cambio la misión evolutiva según la tradición pitagórica y su reelaboración del siglo XX. El animal del zodiaco chino, calculado sobre el año solar, añade por último una lente relacional y de carácter que en la cultura oriental acompaña cada decisión importante, del matrimonio a los negocios.',
    artP3: 'Para obtener un perfil fiable basta con introducir nombre, fecha de nacimiento completa y, opcionalmente, el género: el algoritmo calcula al instante signo solar, número del destino y animal chino, devolviendo piedras, objetos simbólicos y las afinidades zodiacales más fuertes. El consejo es releer el propio perfil con calma, anotando qué afirmaciones resuenan de verdad y cuáles parecen genéricas: la verdadera utilidad de estas herramientas no está en la predicción mecánica, sino en el estímulo a la reflexión sobre tendencias, recursos interiores y áreas de crecimiento personal, para usar como brújula simbólica más que como veredicto absoluto.',
    artP4: 'Un error frecuente es creer que el perfil místico sustituye a una carta natal completa: en realidad el signo solar describe solo la posición del Sol en el momento del nacimiento, mientras que un verdadero estudio astrológico requiere hora y lugar exactos para calcular ascendente, casas y aspectos planetarios. Otro mito extendido es que el número del destino "predice" eventos específicos: la tradición numerológica lo interpreta más bien como un potencial de carácter que hay que desarrollar conscientemente. Del mismo modo, el animal chino no es un horóscopo anual sino un arquetipo de personalidad que hay que integrar, no seguir al pie de la letra como un manual de instrucciones.',
    artP5: 'A diferencia del tarot o las runas, que ofrecen respuestas contextuales a una pregunta precisa, el perfil místico es una herramienta de tipo registral: nace una sola vez a partir de la fecha de nacimiento y permanece estable en el tiempo, mientras que los oráculos generan cada vez lecturas distintas. Una curiosidad poco conocida es que los números maestros 11, 22 y 33 nunca se reducen en la numerología pitagórica clásica porque se consideran portadores de un potencial espiritual superior a la media: aparecer con uno de estos números en el propio perfil es estadísticamente raro y tradicionalmente se lee como una señal de responsabilidad kármica particular.',

const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';

class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.preload = 'none';
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play() {
    this.audio?.play().catch(() => {});
    this.isPlaying = true;
    sessionStorage.setItem(AUDIO_KEY, 'true');
    this.updateUI();
  }
  pause() {
    this.audio?.pause();
    this.isPlaying = false;
    sessionStorage.setItem(AUDIO_KEY, 'false');
    this.updateUI();
  }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}

function renderFAQ(faqs) {
  const container = document.getElementById('faqList');
  if (!container) return;
  container.innerHTML = faqs.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false">
        <span>${f.q}</span>
        <span class="faq-icon">+</span>
      </button>
      <div class="faq-answer" id="faq-ans-${i}" hidden>
        <p>${f.a}</p>
      </div>
    </div>
  `).join('');
}
function toggleFAQ(i) {
  const ans = document.getElementById(`faq-ans-${i}`);
  const btn = document.querySelector(`#faq-${i} .faq-question`);
  const icon = btn?.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  if (icon) icon.textContent = isOpen ? '+' : '−';
  btn?.setAttribute('aria-expanded', String(!isOpen));
}

function segnoFromDate(ds){
  const parts=ds.split('-').map(Number);
  const d=new Date(parts[0],parts[1]-1,parts[2],12,0,0);
  if(isNaN(d.getTime())) return 'ariete';
  const day=d.getDate(), m=d.getMonth()+1;
  if((m==3&&day>=21)||(m==4&&day<=20)) return 'ariete';
  if((m==4&&day>=21)||(m==5&&day<=20)) return 'toro';
  if((m==5&&day>=21)||(m==6&&day<=21)) return 'gemelli';
  if((m==6&&day>=22)||(m==7&&day<=22)) return 'cancro';
  if((m==7&&day>=23)||(m==8&&day<=22)) return 'leone';
  if((m==8&&day>=23)||(m==9&&day<=22)) return 'vergine';
  if((m==9&&day>=23)||(m==10&&day<=22)) return 'bilancia';
  if((m==10&&day>=23)||(m==11&&day<=22)) return 'scorpione';
  if((m==11&&day>=23)||(m==12&&day<=21)) return 'sagittario';
  if((m==12&&day>=22)||(m==1&&day<=20)) return 'capricorno';
  if((m==1&&day>=21)||(m==2&&day<=19)) return 'acquario';
  return 'pesci';
}

function zodCineseFromYear(year){
  const animals=['topo','bue','tigre','coniglio','drago','serpente','cavallo','capra','scimmia','gallo','cane','maiale'];
  return animals[((year-1900)%12+12)%12];
}

function calcNumeroDestino(dateStr){
  const digits=dateStr.replace(/-/g,'').split('').map(Number);
  let sum=digits.reduce((a,b)=>a+b,0);
  while(sum>9 && sum!==11 && sum!==22 && sum!==33){
    sum=String(sum).split('').map(Number).reduce((a,b)=>a+b,0);
  }
  return sum;
}

  if(!name){
    document.getElementById('fieldName').classList.add('field-error');
    if(!silent) toast(L.errorName);
    return;
  }
  document.getElementById('fieldName').classList.remove('field-error');

  if(!day||!month||!year){
    if(!silent) toast(L.errorDate);
    return;
  }

  const dateStr=`${year}-${month}-${day}`;
  const parts=[parseInt(year),parseInt(month),parseInt(day)];
  const testDate=new Date(parts[0],parts[1]-1,parts[2]);
  if(isNaN(testDate.getTime())||testDate.getDate()!==parts[2]){
    if(!silent) toast(L.errorInvalidDate);
    return;
  }

  const segnoKey=segnoFromDate(dateStr);
  const cKey=zodCineseFromYear(parts[0]);
  const numDest=calcNumeroDestino(dateStr);

  try{
    const p={name,date:dateStr,segno:segnoKey,gender};
    localStorage.setItem('myst_v3_profile',JSON.stringify(p));
  }catch(e){}

  lastGenerated = {name, dateStr, segnoKey, cKey, numDest, year};
  renderProfileOutput(L);

  document.getElementById('formCard').style.display='none';
  const out=document.getElementById('profileOutput');
  out.style.display='block';

  if(!silent) toast(L.toastGenerated);
}

function renderProfileOutput(L){
  if(!lastGenerated) return;
  const {name, segnoKey, cKey, numDest, year} = lastGenerated;
  const sg=L.segni[segnoKey];
  const cz=L.zodCinese[cKey];
  const ndInfo=L.numeriDestino[numDest]||L.numeriDestino[9];

  document.getElementById('heroEmoji').textContent=sg.s;
  document.getElementById('heroName').textContent=name;
  document.getElementById('heroSign').textContent=`${sg.e} ${sg.n}`;
  document.getElementById('heroDates').textContent=sg.d;
  document.getElementById('heroMeta').innerHTML=`
    <span>🪐 ${sg.p}</span>
    <span>🌿 ${sg.el}</span>
    <span>🐉 ${cz.n}</span>
    <span>🔢 ${numDest}</span>
  `;
  document.getElementById('heroKw').innerHTML=sg.k.map(k=>`<span class="kw">${k}</span>`).join('');

  document.getElementById('cosmicMsg').textContent=rnd(L.messaggiCosmici);

  document.getElementById('destNum').textContent=numDest;
  document.getElementById('destTitle').textContent=ndInfo.titolo;
  document.getElementById('destDesc').textContent=ndInfo.desc;

  document.getElementById('cineseEmoji').textContent=cz.e;
  document.getElementById('cineseName').textContent=cz.n;
  document.getElementById('cineseAnni').textContent=`${year} · ${cz.anni}`;
  document.getElementById('cineseDesc').textContent=cz.desc;
  document.getElementById('cineseFortuna').textContent=cz.fortuna;
  document.getElementById('cineseOggetto').textContent=cz.oggetto;

  document.getElementById('pietreList').innerHTML=sg.pietre.map(p=>`
    <div class="list-item">
      <div class="list-item-icon">💎</div>
      <div class="list-item-text">${p}</div>
    </div>`).join('');

  document.getElementById('oggettiList').innerHTML=sg.oggetti.map(o=>`
    <div class="list-item">
      <div class="list-item-icon">${o.split(' ')[0]}</div>
      <div class="list-item-text">${o.slice(o.indexOf(' ')+1)}</div>
    </div>`).join('');

  const row=COMPAT[segnoKey]||{};
  const top3=Object.entries(row).sort(([,a],[,b])=>b-a).slice(0,3);
  document.getElementById('compatTop').innerHTML=`
    <div style="display:flex;flex-direction:column;gap:10px">
      ${top3.map(([k,sc])=>{
        const s=L.segni[k];
        const col=sc>=85?'#4ade80':sc>=70?'#ffd700':'#fb923c';
        return `<div style="display:flex;align-items:center;gap:12px;padding:10px;background:rgba(255,255,255,0.04);border-radius:12px">
          <span style="font-size:28px">${s.e}</span>
          <div style="flex:1">
            <div style="font-size:14px;color:var(--text);font-weight:600">${s.n}</div>
            <div style="font-size:11px;color:var(--muted)">${s.p} · ${s.el}</div>
          </div>
          <div style="font-size:18px;font-weight:700;color:${col}">${sc}%</div>
        </div>`;
      }).join('')}
    </div>
    <p style="font-size:12px;color:var(--muted);margin-top:10px;text-align:center">
      <a href="./compatibilita.html" style="color:var(--gold);text-decoration:none">${L.compatLink}</a>
    </p>
  `;
}

function resetProfilo(){
  document.getElementById('formCard').style.display='block';
  document.getElementById('profileOutput').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}

document.addEventListener('DOMContentLoaded', () => {
  applyTheme(isDayMode);
  applyLang();
  document.querySelectorAll('[data-lang]').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === currentLang));
  initSelects();
  tryLoadSaved();
});
</script>
