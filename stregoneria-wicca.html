<style>
:root{
  --bg:#0a0a12;--surface:#13131f;--card:#1c1c2e;
  --gold:#d4af37;--gold-dim:#a07c20;--gold-light:#f0d060;--gold-glow:rgba(212,175,55,.4);
  --text:#e8e0f0;--text-dim:#9090b0;--muted:#9090b0;
  --purple:#7b5ea7;--green:#4a9a6a;--teal:#2a8a7a;
  --radius:14px;--border:rgba(212,175,55,.2);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:18px;line-height:1.7;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 0%,rgba(74,58,138,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(74,154,106,.06) 0%,transparent 60%);pointer-events:none;z-index:0}

/* ── Skip Link ── */
.skip-link{position:absolute;left:-9999px;top:0;background:var(--gold);color:#0a0a12;padding:10px 18px;z-index:9999;border-radius:0 0 8px 0;font-family:'Cinzel',serif;font-size:13px}
.skip-link:focus{left:0}

/* ── Sfondo Cosmico ── */
.cosmos{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, #2a174830 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 80%, #1a073820 0%, transparent 60%),
    radial-gradient(2px 2px at 15% 25%, #fff9 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 75% 15%, #fff7 0%, transparent 100%),
    radial-gradient(2px 2px at 45% 70%, #d4af3780 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 45%, #fff6 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 85%, #fff5 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 35%, #d4af3760 0%, transparent 100%);
  animation:twinkle 14s infinite alternate;
}
@keyframes twinkle{0%{opacity:.35}50%{opacity:.55}100%{opacity:.45}}

/* ── Header Standard ── */
.page-header{position:relative;z-index:2;padding:max(16px,calc(16px + env(safe-area-inset-top,0px))) 20px 14px;background:rgba(10,10,18,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(212,175,55,.18)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.btn-back{display:inline-flex;align-items:center;color:var(--gold-dim);text-decoration:none;font-family:'Cinzel',serif;font-size:13px;transition:color .2s}
.btn-back:hover{color:var(--gold)}
.btn-back::before{content:'← '}
.header-controls{display:flex;gap:8px}
.btn-icon{background:rgba(255,255,255,.05);border:1px solid rgba(212,175,55,.2);border-radius:20px;padding:6px 12px;color:var(--text-dim);font-size:13px;cursor:pointer;transition:all .2s;font-family:'Crimson Pro',serif}
.btn-icon:hover{border-color:var(--gold);color:var(--gold)}
.page-title{font-family:'Cinzel',serif;font-size:clamp(20px,5vw,28px);color:var(--gold);letter-spacing:1.5px;text-align:center;margin-bottom:10px}
.lang-switch{display:flex;gap:6px;justify-content:center}
.btn-lang{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.15);border-radius:14px;padding:4px 12px;font-size:12px;color:var(--text-dim);cursor:pointer;transition:all .2s;font-family:'Cinzel',serif}
.btn-lang.active,.btn-lang:hover{background:rgba(212,175,55,.15);border-color:var(--gold);color:var(--gold)}

:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

.hero{text-align:center;padding:36px 20px 20px;position:relative;z-index:1}
.hero-icon{font-size:72px;display:block;margin-bottom:16px;filter:drop-shadow(0 0 24px rgba(123,94,167,.6));animation:floatIcon 4s ease-in-out infinite}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hero-sub{color:var(--text-dim);font-size:16px;max-width:520px;margin:0 auto;font-style:italic}

/* SABBAT BOX */
.sabbat-box{background:linear-gradient(135deg,rgba(74,58,138,.3),rgba(74,154,106,.1));border:1px solid rgba(212,175,55,.25);border-radius:var(--radius);padding:24px;max-width:560px;margin:24px auto;text-align:center;position:relative;z-index:1}
.sabbat-icon{font-size:52px;margin-bottom:10px;display:block;filter:drop-shadow(0 0 16px rgba(212,175,55,.4))}
.sabbat-label{font-size:11px;color:var(--gold-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.sabbat-name{font-family:'Cinzel',serif;font-size:22px;color:var(--gold);margin-bottom:4px}
.sabbat-date{font-size:14px;color:var(--text-dim);margin-bottom:10px;font-style:italic}
.sabbat-desc{font-size:15px;color:var(--text);line-height:1.6;margin-bottom:12px}
.sabbat-colors{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:10px}
.sabbat-color{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.2);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--gold-dim)}
.sabbat-countdown{font-size:13px;color:var(--text-dim);font-style:italic}

/* INTENT TABS */
.wrap{max-width:700px;margin:0 auto;padding:0 20px 60px;position:relative;z-index:1}
.section-title{font-family:'Cinzel',serif;font-size:15px;color:var(--gold-dim);letter-spacing:2px;text-align:center;margin:28px 0 14px;text-transform:uppercase}
.intent-tabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px}
.intent-tab{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.15);border-radius:24px;padding:8px 16px;font-size:14px;cursor:pointer;transition:all .25s;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.intent-tab:hover,.intent-tab.active{background:rgba(212,175,55,.12);border-color:var(--gold);color:var(--gold)}

.domanda-box{background:var(--card);border:1px solid rgba(212,175,55,.15);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.domanda-label{font-size:14px;color:var(--text-dim);margin-bottom:10px}
textarea.domanda-inp{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(212,175,55,.2);border-radius:10px;color:var(--text);font-family:'Crimson Pro',serif;font-size:16px;padding:12px;resize:vertical;min-height:80px;outline:none}
textarea.domanda-inp:focus{border-color:var(--gold)}

.btn-calc{width:100%;padding:14px;background:linear-gradient(135deg,var(--purple),#4a3a8a);border:1px solid rgba(212,175,55,.3);border-radius:12px;color:var(--gold-light);font-family:'Cinzel',serif;font-size:15px;letter-spacing:1px;cursor:pointer;transition:all .3s}
.btn-calc:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(123,94,167,.3)}

/* RESULT */
.result-card{background:var(--card);border:1px solid rgba(212,175,55,.2);border-radius:var(--radius);padding:24px;margin-top:24px;display:none}
.result-header{text-align:center;margin-bottom:20px}
.result-emoji{font-size:52px;margin-bottom:8px;display:block;filter:drop-shadow(0 0 16px rgba(212,175,55,.4))}
.result-name{font-family:'Cinzel',serif;font-size:20px;color:var(--gold);margin-bottom:6px}
.result-badge{display:inline-block;background:rgba(123,94,167,.2);border:1px solid rgba(123,94,167,.3);border-radius:20px;padding:4px 14px;font-size:13px;color:#b090d0}
.question-shown{background:rgba(212,175,55,.06);border-left:3px solid var(--gold-dim);border-radius:4px;padding:10px 14px;font-size:15px;color:var(--text-dim);font-style:italic;margin-bottom:16px}

.corr-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.corr-item{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.1);border-radius:10px;padding:12px}
.corr-icon{font-size:18px;margin-bottom:4px;display:block}
.corr-label{font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.corr-val{font-size:14px;color:var(--text)}

.wicca-block{background:rgba(74,58,138,.08);border:1px solid rgba(123,94,167,.2);border-radius:10px;padding:16px;margin:12px 0}
.wicca-block h4{font-family:'Cinzel',serif;font-size:14px;color:var(--purple);margin-bottom:8px;letter-spacing:.5px}
.wicca-block p{font-size:15px;color:var(--text);line-height:1.6}

.invocazione{background:linear-gradient(135deg,rgba(74,58,138,.2),rgba(74,154,106,.1));border:1px solid rgba(212,175,55,.2);border-radius:12px;padding:18px;margin:14px 0;font-size:15px;color:var(--text-dim);font-style:italic;line-height:1.7;text-align:center}

.btn-row{display:flex;gap:10px;margin-top:16px}
.btn-sec{flex:1;padding:12px;background:rgba(255,255,255,.05);border:1px solid rgba(212,175,55,.2);border-radius:10px;color:var(--gold-dim);font-family:'Cinzel',serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-sec:hover{background:rgba(212,175,55,.1);color:var(--gold)}
.btn-reset{flex:1;padding:12px;background:rgba(123,94,167,.15);border:1px solid rgba(123,94,167,.3);border-radius:10px;color:#b090d0;font-family:'Cinzel',serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-reset:hover{background:rgba(123,94,167,.25)}

/* SABBAT CALENDAR */
.sabbat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px}
.sabbat-card{background:var(--card);border:1px solid rgba(212,175,55,.1);border-radius:12px;padding:14px;cursor:pointer;transition:all .25s}
.sabbat-card:hover{border-color:rgba(212,175,55,.3);transform:translateY(-2px)}
.sabbat-card-icon{font-size:28px;margin-bottom:6px}
.sabbat-card-name{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);margin-bottom:2px}
.sabbat-card-date{font-size:12px;color:var(--text-dim)}
.sabbat-card-el{font-size:12px;color:var(--purple);margin-top:4px}

/* AD */
.ad-wrap{text-align:center;margin:24px auto;max-width:700px;padding:0 20px}

/* ── Share Section ── */
.share-section{max-width:700px;margin:20px auto 0;padding:0 20px;position:relative;z-index:1;text-align:center}
.btn-share{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.25);border-radius:12px;padding:12px 22px;color:var(--gold);font-family:'Cinzel',serif;font-size:14px;cursor:pointer;transition:all .2s}
.btn-share:hover{background:rgba(212,175,55,.18)}
.share-popup{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
.share-btn{background:rgba(255,255,255,.05);border:1px solid rgba(212,175,55,.15);border-radius:10px;padding:8px 14px;font-size:13px;color:var(--text);text-decoration:none;cursor:pointer;transition:all .2s;font-family:'Crimson Pro',serif}
.share-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── Articolo Editoriale ── */
.article-section{max-width:700px;margin:36px auto 0;padding:0 20px;position:relative;z-index:1;content-visibility:auto}
.article-section h2{font-family:'Cinzel',serif;font-size:22px;color:var(--gold);margin-bottom:14px;letter-spacing:.5px}
.article-section h3{font-family:'Cinzel',serif;font-size:17px;color:var(--purple);margin:20px 0 10px}
.article-section p{font-size:16px;color:var(--text);line-height:1.75;margin-bottom:14px}
.article-links{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0}
.article-links a{color:var(--gold-dim);text-decoration:none;font-size:14px;border:1px solid rgba(212,175,55,.2);border-radius:20px;padding:6px 14px;transition:all .2s}
.article-links a:hover{color:var(--gold);border-color:var(--gold)}
.cta-explore{display:inline-block;margin-top:10px;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);border-radius:12px;padding:12px 22px;color:var(--gold);text-decoration:none;font-family:'Cinzel',serif;font-size:14px;transition:all .2s}
.cta-explore:hover{background:rgba(212,175,55,.18)}

/* ── FAQ ── */
.faq-section{max-width:700px;margin:36px auto 0;padding:0 20px 20px;position:relative;z-index:1;content-visibility:auto}
.faq-title{font-family:'Cinzel',serif;font-size:20px;color:var(--gold);text-align:center;margin-bottom:16px}
.faq-item{background:var(--card);border:1px solid rgba(212,175,55,.12);border-radius:12px;margin-bottom:10px;overflow:hidden}
.faq-question{width:100%;background:none;border:none;color:var(--text);font-family:'Crimson Pro',serif;font-size:15px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;text-align:left}
.faq-icon{color:var(--gold);font-size:18px;flex-shrink:0;margin-left:10px}
.faq-answer{padding:0 16px 16px}
.faq-answer p{font-size:14px;color:var(--text-dim);line-height:1.6}

.back-btn{display:inline-flex;align-items:center;gap:8px;background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.2);border-radius:10px;padding:10px 18px;color:var(--gold);font-family:'Cinzel',serif;font-size:13px;text-decoration:none;transition:all .2s;margin:16px 20px}
.back-btn:hover{background:rgba(212,175,55,.15);transform:translateX(-2px)}

.page-footer{text-align:center;padding:30px 20px;color:var(--text-dim);font-size:13px;border-top:1px solid rgba(212,175,55,.1);position:relative;z-index:1}
.page-footer a{color:var(--gold-dim);text-decoration:none}
.footer-links{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-bottom:12px}
.footer-disclaimer{margin-top:10px;font-size:11px;opacity:.7;max-width:480px;margin-left:auto;margin-right:auto}

/* ── Premium Modal ── */
.premium-modal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center}
.premium-modal.show{display:flex}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(3px)}
.modal-content{position:relative;background:var(--card);border:1px solid var(--gold);border-radius:16px;padding:28px;max-width:360px;width:90%;text-align:center;z-index:1}
.modal-content h2{font-family:'Cinzel',serif;color:var(--gold);font-size:20px;margin-bottom:12px}
.modal-content p{color:var(--text);font-size:15px;margin-bottom:10px}
.premium-price{color:var(--gold-light)!important;font-family:'Cinzel',serif;font-size:16px!important}
.btn-premium-buy{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border:none;border-radius:10px;color:#1a1a1a;font-family:'Cinzel',serif;font-size:14px;cursor:pointer;margin-top:12px}
.btn-premium-skip{width:100%;padding:11px;background:none;border:1px solid rgba(255,255,255,.15);border-radius:10px;color:var(--text-dim);font-family:'Crimson Pro',serif;font-size:13px;cursor:pointer;margin-top:8px}

/* ── Tema Giorno ── */
html.theme-day{--bg:#f5f2ed;--card:#ede8df;--surface:#f0ece3;--text:#2a1748;--text-dim:#6b5b7f;--purple:#6b5b7f;--gold:#c89742;--gold-dim:#a67c52;--gold-light:#8a6a2f;--gold-glow:rgba(200,151,66,.2);--border:#c89742}
html.theme-day body::before{opacity:.5}
html.theme-day .page-header{background:rgba(245,242,237,.92)}
html.theme-day .cosmos{opacity:.3}
html.theme-day .btn-calc{color:#fff}
html.theme-day .btn-premium-buy{color:#fff}

@media(max-width:560px){
  .corr-grid{grid-template-columns:1fr}
  .sabbat-grid{grid-template-columns:1fr}
  .btn-row{flex-direction:column}
}
</style>
</head>
<body>

<a href="#main-content" class="skip-link" id="skipLink"></a>

<div class="cosmos" aria-hidden="true"></div>

<header class="page-header">
  <div class="header-top">
    <a href="./index.html" class="btn-back" id="btn-back"></a>
    <div class="header-controls">
      <button id="musicToggle" class="btn-icon" aria-label="Toggle musica"></button>
      <button id="themeToggle" class="btn-icon" aria-label="Toggle tema"></button>
    </div>
  </div>
  <h1 class="page-title" id="page-title"></h1>
  <div class="lang-switch">
    <button data-lang="it" class="btn-lang active">IT</button>
    <button data-lang="en" class="btn-lang">EN</button>
    <button data-lang="es" class="btn-lang">ES</button>
  </div>
</header>

<main id="main-content">

<section class="hero">
  <span class="hero-icon" aria-hidden="true">🧙</span>
  <p class="hero-sub" id="heroSub"></p>
</section>

<!-- SABBAT CORRENTE -->
<div class="sabbat-box" id="sabbatBox">
  <span class="sabbat-icon" id="sabbatIcon" aria-hidden="true">⏳</span>
  <div class="sabbat-label" id="sabbatLabel"></div>
  <div class="sabbat-name" id="sabbatName"></div>
  <div class="sabbat-date" id="sabbatDate"></div>
  <div class="sabbat-desc" id="sabbatDesc"></div>
  <div class="sabbat-colors" id="sabbatColors"></div>
  <div class="sabbat-countdown" id="sabbatCountdown"></div>
</div>

<div class="ad-wrap">
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-0522720046244970" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
</div>

<div class="wrap">

  <div class="section-title" id="sectionTitleIntent"></div>

  <!-- FORM -->
  <div id="wiccaForm">
    <div class="intent-tabs" id="intentTabs">
      <div class="intent-tab active" data-idx="0" onclick="selIntent(0)"></div>
      <div class="intent-tab" data-idx="1" onclick="selIntent(1)"></div>
      <div class="intent-tab" data-idx="2" onclick="selIntent(2)"></div>
      <div class="intent-tab" data-idx="3" onclick="selIntent(3)"></div>
      <div class="intent-tab" data-idx="4" onclick="selIntent(4)"></div>
      <div class="intent-tab" data-idx="5" onclick="selIntent(5)"></div>
    </div>

    <div class="domanda-box">
      <div class="domanda-label" id="domandaLabel"></div>
      <label for="wiccaDomanda" class="sr-only" style="position:absolute;left:-9999px">Domanda</label>
      <textarea class="domanda-inp" id="wiccaDomanda"></textarea>
    </div>

    <button class="btn-calc" id="btnCalc" onclick="calcWicca()"></button>
  </div>

  <!-- RISULTATO -->
  <div class="result-card" id="wiccaResult">
    <div class="result-header">
      <span class="result-emoji" id="resEmoji" aria-hidden="true"></span>
      <div class="result-name" id="resName"></div>
      <div class="result-badge" id="resBadge"></div>
    </div>
    <div class="question-shown" id="resDomanda" style="display:none"></div>
    <div class="corr-grid" id="resGrid"></div>
    <div class="wicca-block" id="resMagia"></div>
    <div class="wicca-block" id="resRituale"></div>
    <div class="invocazione" id="resInvocazione"></div>
    <div class="btn-row">
      <button class="btn-reset" id="btnReset" onclick="resetWicca()"></button>

  artP1: 'La parola "strega" affonda le sue radici nel latino "striga", figura notturna temuta nell\'antichità, ma le pratiche che oggi chiamiamo stregoneria affondano in tradizioni molto più antiche e diversificate: sciamanesimo europeo, culti agrari mediterranei, erboristeria popolare e magia cerimoniale rinascimentale. La Wicca, nello specifico, nasce come religione strutturata nel Regno Unito grazie a Gerald Gardner, che negli anni \'40 e \'50 pubblicò testi come "Witchcraft Today" (1954), sintetizzando frammenti di folklore britannico, massoneria, cerimonialismo occultista di Aleister Crowley e la teoria della "Old Religion" proposta dall\'antropologa Margaret Murray. Da questa sintesi nacque un culto della natura duoteistico, incentrato sulla Dea Triplice (Fanciulla, Madre, Anziana) e sul Dio Cornuto, celebrato attraverso otto festività stagionali chiamate Sabbat.',

    divinazione:{ nome:'Divinazione & Visione', emoji:'🔮', elemento:'💨 Aria & 💧 Acqua', pianeta:'☽ Luna, ☿ Mercurio', giorno:'Lunedì o Mercoledì', colori:'Viola, Argento, Indaco, Bianco', erbe:'Artemisia, Lavanda, Mirra, Incenso, Alloro', cristalli:'Labradorite, Ametista, Fluorite Viola, Quarzo Latteo', luna:'Luna Piena (massima visione) o Luna Nuova (misteri nascosti)', ora:'Mezzanotte o Tre del mattino (ore di confine)', divinita:'Hecate, Circe, Morgan le Fay, Hermes', desc_magia:'La divinazione wicca non predice un futuro fisso — rivela le correnti energetiche del momento presente e le loro probabili direzioni. La vera visione non bypassa il libero arbitrio.', rituale:'Prima di qualsiasi pratica divinatoria, brucia artemisia o lavanda. Siediti in silenzio per 3 minuti. Tocca il tuo strumento con entrambe le mani: "Sono uno specchio pulito. La verità mi parla chiaramente."', invocazione:'Hecate Triformis, dea delle visioni e dei segreti — apri i miei occhi interiori. Che le nebbie del futuro si diradino quanto è necessario per la mia guida. Visione chiara, cuore aperto, mente quieta. ☽ Così sia ☾' },

  artTitle: 'Witchcraft and Wicca: History, Correspondences and Natural Magic Practice',
  artH2: 'From Pagan Roots to Contemporary Wicca',
  artH3: 'Correspondences, Sabbats and Daily Practice',
  artP1: 'The word "witch" traces back to Old English "wicce", but the practices we now call witchcraft draw on much older and more diverse traditions: European shamanism, Mediterranean agrarian cults, folk herbalism and Renaissance ceremonial magic. Wicca specifically emerged as a structured religion in the United Kingdom thanks to Gerald Gardner, who in the 1940s and 1950s published works such as "Witchcraft Today" (1954), blending fragments of British folklore, Freemasonry, Aleister Crowley\'s ceremonial occultism and anthropologist Margaret Murray\'s "Old Religion" theory. From this synthesis emerged a duotheistic nature cult centered on the Triple Goddess (Maiden, Mother, Crone) and the Horned God, celebrated through eight seasonal festivals called Sabbats.', 
  artP2: 'In the following decades Wicca branched into numerous traditions: the original Gardnerian line, the Alexandrian tradition founded by Alex Sanders in the 1960s with a more ceremonial approach, and eventually Eclectic Wicca and Solitary Witchcraft, popularized especially from the 1980s onward by authors like Scott Cunningham and Silver RavenWolf, who made the practice accessible without requiring coven initiation. This evolution allowed millions of solitary practitioners worldwide to build a personal relationship with nature, lunar cycles and their own intentions, while still keeping a strong symbolic link to the movement\'s historical roots.',
  artP3: 'The practical core of modern witchcraft is the system of magical correspondences: a set of associations between planets, weekdays, elements, colors, herbs, crystals and deities that allows a ritual to be aligned with a precise intention. A prosperity working, for instance, is traditionally done on Thursday under Jupiter\'s influence, with herbs like mint and cinnamon and crystals such as citrine and pyrite; a protection working favors Mars or Saturn, Tuesday or Saturday, herbs like rosemary and sage, and dark crystals such as obsidian. This system is not arbitrary — it derives from Renaissance planetary magic, codified in texts such as Cornelius Agrippa\'s "Three Books of Occult Philosophy" (1533), later adapted by contemporary Wicca.',
  artP4: 'The Wheel of the Year, with its eight Sabbats, represents the sacred calendar of Wiccan practice: Yule and Litha mark the two solstices, Ostara and Mabon the two equinoxes, while Imbolc, Beltane, Lammas and Samhain are the ancient Celtic fire festivals marking the intermediate points. Samhain, in particular, is considered the Celtic new year and the moment when the veil between worlds grows thinnest, making divination especially powerful; Beltane, on the opposite side of the wheel, celebrates fertility and vital union. Each Sabbat carries its own colors, rituals and meanings, allowing practitioners to synchronize their practice with nature\'s seasonal rhythms.',
  artP5: 'A common mistake among newcomers is confusing magic with a substitute for action, medicine or personal responsibility: serious Wiccan practice treats ritual as a catalyst for intention, not a magical shortcut free of real commitment. Another widespread myth is that Wicca necessarily requires a coven or initiation: Solitary Witchcraft is a fully legitimate path, provided it is supported by study, respect for tradition and consistent practice. Understanding these nuances — along with the difference between religious Wicca and more secular folk witchcraft — is the first step toward authentic, mindful practice.',
  artImgAlt: 'Wicca altar with candles, herbs, crystals and pentacle for magical correspondences',
  faq: [
    { q: 'What exactly is Wicca and how does it differ from traditional witchcraft?', a: 'Wicca is a neopagan religion codified by Gerald Gardner in the UK between the 1940s and 1950s, blending pre-Christian nature worship, the concept of the Triple Goddess and Horned God, and a precise ritual structure marked by eight Sabbats. Traditional witchcraft is a broader term: it includes folk magical practices often older than Wicca, not necessarily religious, passed down at a family or regional level without a codified coven structure. Many practitioners today blend elements of both.' },
    { q: 'How are magical correspondences calculated for a specific intention?', a: 'Each intention — love, protection, prosperity, healing, divination, transformation — is linked to a specific planet, weekday, elements, herbs, crystals and deities according to the Renaissance planetary magic system later adopted by Wicca. Love is Venus and Friday, protection is Mars/Saturn, prosperity is Jupiter and Thursday. Aligning the ritual to these correspondences — choosing the right day, coherent ingredients and suitable moon phase — makes the magical work more coherent and effective according to tradition.' },
    { q: 'What are the Sabbats and why are there eight of them?', a: 'The Sabbats are the eight sacred holidays of the Wheel of the Year: Yule, Imbolc, Ostara, Beltane, Litha, Lammas, Mabon and Samhain. They include the two solstices, the two equinoxes and four intermediate fire festivals derived from the Celtic calendar. Together they form a complete narrative cycle mirroring birth, growth, harvest and symbolic death, letting practitioners sync their spiritual life to nature\'s seasonal rhythms. You can browse the full Wheel of the Year further down this page.' },
    { q: 'Do you need to be initiated to practice Wicca rituals on your own?', a: 'No. Traditional Wicca (Gardnerian, Alexandrian) requires formal coven initiation, but since the 1980s Solitary Witchcraft and Eclectic Wicca have become firmly established, fully legitimate paths that require no initiation at all. It is still essential to seriously study history, ethics and symbolism before practicing, to avoid superficiality or inappropriate appropriation of other traditions.' },
    { q: 'Is it dangerous or ethically problematic to cast a spell on another person?', a: 'According to Wiccan ethics, the Threefold Law holds that sent energy returns amplified to its sender, while the Wiccan Rede calls for harming none and respecting others\' free will. For this reason, spells aimed at directly influencing another person — especially in matters of love — are generally discouraged by serious tradition: it is preferable to work on your own energy, openness and intention, leaving room for the free choice of anyone else involved.' },
    { q: 'What is the difference between a permanent and a temporary altar?', a: 'A permanent altar remains set up steadily at home, often dedicated to a specific deity or daily practice, and suits those with dedicated space and continuity in their practice. A temporary altar, by contrast, is built only for the duration of a specific ritual — perhaps on a small table, a cloth or even a tray — and dismantled right after: it\'s the more practical choice for those living with others or preferring discretion.' },
    { q: 'What mistakes do beginners most often make in Wiccan practice?', a: 'Common mistakes include expecting immediate results without ritual consistency, skipping the space-purification step before the rite, mixing different traditions without understanding their original meaning, and relying solely on magic while neglecting concrete real-world action. Another frequent mistake is overlooking candle and incense safety, both central elements in nearly every Wiccan ritual.' }
  ],

    divinazione:{ nome:'Divination & Vision', emoji:'🔮', elemento:'💨 Air & 💧 Water', pianeta:'☽ Moon, ☿ Mercury', giorno:'Monday or Wednesday', colori:'Purple, Silver, Indigo, White', erbe:'Mugwort, Lavender, Myrrh, Frankincense, Bay Laurel', cristalli:'Labradorite, Amethyst, Purple Fluorite, Milky Quartz', luna:'Full Moon (peak vision) or New Moon (hidden mysteries)', ora:'Midnight or 3am (liminal hours)', divinita:'Hecate, Circe, Morgan le Fay, Hermes', desc_magia:'Wiccan divination doesn\'t predict a fixed future — it reveals the present moment\'s energetic currents and their likely directions. True vision never bypasses free will.', rituale:'Before any divinatory practice, burn mugwort or lavender. Sit in silence for 3 minutes. Touch your tool with both hands: "I am a clean mirror. Truth speaks to me clearly."', invocazione:'Hecate Triformis, goddess of visions and secrets — open my inner eyes. Let the mists of the future part just enough to guide me. Clear vision, open heart, quiet mind. ☽ So mote it be ☾' },
    trasformazione:{ nome:'Transformation & Rebirth', emoji:'🦋', elemento:'🔥 Fire & 💧 Water', pianeta:'♇ Pluto, ♂ Mars', giorno:'Tuesday or Monday', colori:'Black, Deep Purple, Blood Red, Silver', erbe:'Wormwood, Mugwort, Black Sage, Tarragon', cristalli:'Labradorite, Rainbow Obsidian, Malachite, Sugilite', luna:'Waning Moon (to release) + New Moon (to be reborn)', ora:'Sunset (threshold between two states)', divinita:'Hecate, Kali, Morrigan, Baba Yaga, Phoenix', desc_magia:'Transformation is the deepest and most demanding kind of magic. It requires the symbolic death of something to allow rebirth. The choice of what to release is itself the magical act.', rituale:'Write on paper what you want to transform. Burn the paper. Hold the ashes in your palm for a moment — this is the raw energy of transformation. Then scatter it to the wind.', invocazione:'Great Mother of Transformation — I fear what I must release, but I trust your fire. Burn what no longer serves. From the ashes, new growth. I am ready for rebirth. ☽ So mote it be ☾' }

      { q: '¿Qué es exactamente la Wicca y en qué se diferencia de la brujería tradicional?', a: 'La Wicca es una religión neopagana codificada por Gerald Gardner en el Reino Unido entre los años 40 y 50, inspirada en cultos precristianos de la naturaleza, la Diosa Triple y el Dios Cornudo. La brujería tradicional es un término más amplio que incluye prácticas mágicas populares, a menudo anteriores a la Wicca y no necesariamente religiosas ni organizadas en aquelarres.' },
      { q: '¿Cómo se calculan las correspondencias mágicas para una intención específica?', a: 'Las correspondencias se basan en un sistema simbólico que vincula planetas, días de la semana, elementos, hierbas, cristales y deidades a una intención concreta. El amor corresponde a Venus y al viernes, la protección a Marte y Saturno, la prosperidad a Júpiter y al jueves: alinear el ritual, los materiales y el momento con estas correspondencias refuerza la coherencia energética del trabajo mágico.' },
      { q: '¿Qué son los Sabbats y por qué son ocho?', a: 'Los Sabbats son las ocho festividades de la Rueda del Año wicca, que marcan los puntos solares y estacionales clave: dos solsticios, dos equinoccios y cuatro fiestas del fuego intermedias (Imbolc, Beltane, Lammas, Samhain). Juntos forman un ciclo completo que refleja el nacimiento, crecimiento, madurez y muerte simbólica de la naturaleza y, por extensión, de la experiencia humana.' },
      { q: '¿Es necesario estar iniciado para practicar rituales wicca por cuenta propia?', a: 'No. Aunque la Wicca tradicional gardneriana y alejandrina requiere una iniciación formal en un aquelarre, existen caminos eclécticos y solitarios (Wicca Ecléctica, Brujería Solitaria) plenamente legítimos que permiten practicar rituales, celebrar los Sabbats y trabajar con las correspondencias mágicas sin ninguna iniciación, siempre que exista un estudio serio y respeto por la tradición.' },
      { q: '¿Es peligroso o éticamente problemático lanzar un hechizo sobre otra persona?', a: 'En la ética wicca, la Ley del Retorno Triple enseña que toda energía enviada regresa amplificada a quien la genera, mientras que la Regla Wicca ("Mientras no dañes a nadie, haz lo que quieras") desaconseja firmemente los hechizos que influyen en el libre albedrío de otra persona, como las ligaduras de amor dirigidas a alguien en concreto. Es preferible trabajar en la propia energía y apertura, no en la voluntad ajena.' },
      { q: '¿Cuál es la diferencia entre un altar permanente y uno temporal?', a: 'El altar permanente permanece instalado de forma estable, a menudo dedicado a una deidad específica o a la práctica diaria, mientras que el temporal se construye solo para la duración de un ritual específico y luego se desmonta. Ambos son válidos: la elección depende del espacio disponible, la continuidad de la práctica y la necesidad de discreción.' }

  artTitle: 'Brujería y Wicca: Historia, Correspondencias y Práctica de la Magia Natural',
  artH2: 'De las Raíces Paganas a la Wicca Contemporánea',
  artH3: 'Correspondencias, Sabbats y Práctica Cotidiana',
  artP1: 'La palabra "bruja" tiene raíces antiguas y temidas, pero las prácticas que hoy llamamos brujería se remontan a tradiciones mucho más antiguas y diversas: el chamanismo europeo, los cultos agrarios mediterráneos, la herbolaria popular y la magia ceremonial renacentista. La Wicca, en concreto, nació como religión estructurada en el Reino Unido gracias a Gerald Gardner, quien en los años 40 y 50 publicó obras como "Witchcraft Today" (1954), sintetizando fragmentos de folclore británico, masonería, el ocultismo ceremonial de Aleister Crowley y la teoría de la "Antigua Religión" propuesta por la antropóloga Margaret Murray. De esta síntesis nació un culto duoteísta a la naturaleza, centrado en la Diosa Triple (Doncella, Madre, Anciana) y el Dios Cornudo, celebrado a través de ocho festividades estacionales llamadas Sabbats.',
  artP2: 'En las décadas siguientes, la Wicca se ramificó en numerosas tradiciones: la línea Gardneriana original, la Alejandrina fundada por Alex Sanders en los años 60 con un enfoque más ceremonial, y finalmente la Wicca Ecléctica y la Brujería Solitaria, difundidas sobre todo desde los años 80 gracias a autoras como Scott Cunningham y Silver RavenWolf, que hicieron la práctica accesible sin necesidad de iniciación en un aquelarre. Esta evolución permitió a millones de practicantes solitarios en todo el mundo construir una relación personal con la naturaleza, los ciclos lunares y sus propias intenciones, manteniendo a la vez un fuerte vínculo simbólico con las raíces históricas del movimiento.',
  artP3: 'El núcleo práctico de la brujería moderna son las correspondencias mágicas: un sistema de asociaciones entre planetas, días de la semana, elementos, colores, hierbas, cristales y deidades que permite alinear un ritual con una intención precisa. Un trabajo de prosperidad, por ejemplo, se realiza tradicionalmente en jueves, bajo la influencia de Júpiter, con hierbas como la menta y la canela y cristales como la citrina y la pirita; un trabajo de protección prefiere en cambio Marte o Saturno, el martes o el sábado, hierbas como el romero y la salvia, cristales oscuros como la obsidiana. Este sistema no es arbitrario: proviene de la magia planetaria renacentista, codificada en textos como los "Tres Libros de Filosofía Oculta" de Cornelio Agrippa (1533), luego readaptada por la Wicca contemporánea.',
  artP4: 'La Rueda del Año, con sus ocho Sabbats, representa el calendario sagrado de la práctica wicca: Yule y Litha marcan los dos solsticios, Ostara y Mabon los dos equinoccios, mientras que Imbolc, Beltane, Lammas y Samhain son las antiguas fiestas del fuego celtas que marcan los puntos intermedios. Samhain, en particular, se considera el año nuevo celta y el momento en que el velo entre los mundos se vuelve más delgado, haciendo que la adivinación sea especialmente poderosa; Beltane, en el lado opuesto de la rueda, celebra la fertilidad y la unión vital. Cada Sabbat trae consigo colores, rituales y significados específicos que permiten al practicante sincronizar su práctica con los ritmos naturales de las estaciones.',
  artP5: 'Un error común entre quienes se acercan por primera vez a la brujería es confundir la magia con un sustituto de la acción, la medicina o la responsabilidad personal: la práctica wicca seria considera el ritual un catalizador de intención, no un atajo mágico sin compromiso real. Otro mito extendido es que la Wicca requiere necesariamente un aquelarre o una iniciación: la Brujería Solitaria es un camino plenamente legítimo, siempre que esté sostenido por el estudio, el respeto a la tradición y la práctica constante. Comprender estos matices — junto con la diferencia entre la Wicca religiosa y la brujería popular más laica — es el primer paso hacia una práctica auténtica y consciente.',
  artImgAlt: 'Altar wicca con velas, hierbas, cristales y pentáculo para correspondencias mágicas',
  faq: [
    { q: '¿Qué es exactamente la Wicca y en qué se diferencia de la brujería tradicional?', a: 'La Wicca es una religión neopagana codificada por Gerald Gardner en el Reino Unido entre los años 40 y 50, que une cultos precristianos de la naturaleza, el concepto de Diosa Triple y Dios Cornudo, y una estructura ritual precisa marcada por ocho Sabbats. La brujería tradicional, en cambio, es un término más amplio: incluye prácticas mágicas populares a menudo más antiguas que la Wicca, no necesariamente religiosas, transmitidas a nivel familiar o regional sin una estructura de aquelarre codificada. Muchos practicantes hoy combinan elementos de ambas.' },
    { q: '¿Cómo se calculan las correspondencias mágicas para una intención específica?', a: 'Cada intención — amor, protección, prosperidad, sanación, adivinación, transformación — está vinculada a un planeta, un día de la semana, elementos, hierbas, cristales y deidades específicas según el sistema de magia planetaria renacentista luego retomado por la Wicca. El amor es Venus y el viernes, la protección es Marte/Saturno, la prosperidad es Júpiter y el jueves. Alinear el ritual con estas correspondencias — eligiendo el día correcto, los ingredientes coherentes y la fase lunar adecuada — hace que el trabajo mágico sea más coherente y eficaz según la tradición.' },
    { q: '¿Qué son los Sabbats y por qué son ocho?', a: 'Los Sabbats son las ocho festividades sagradas de la Rueda del Año: Yule, Imbolc, Ostara, Beltane, Litha, Lammas, Mabon y Samhain. Comprenden los dos solsticios, los dos equinoccios y cuatro fiestas del fuego intermedias derivadas del calendario celta. Juntos forman un ciclo narrativo completo que refleja nacimiento, crecimiento, cosecha y muerte simbólica, permitiendo al practicante sincronizar su vida espiritual con los ritmos naturales de las estaciones. Puedes consultar la Rueda del Año completa más abajo en esta página.' },
    { q: '¿Es necesario estar iniciado para practicar rituales wicca por cuenta propia?', a: 'No. La Wicca tradicional (Gardneriana, Alejandrina) requiere una iniciación formal en aquelarre, pero desde los años 80 se ha consolidado con fuerza la Brujería Solitaria y la Wicca Ecléctica, caminos plenamente legítimos que no requieren ninguna iniciación. Aun así, es fundamental estudiar seriamente la historia, la ética y la simbología antes de practicar, para evitar la superficialidad o la apropiación incorrecta de tradiciones ajenas.' },
    { q: '¿Es peligroso o éticamente problemático lanzar un hechizo sobre otra persona?', a: 'Según la ética wicca, la Ley del Retorno Triple sostiene que la energía enviada regresa amplificada a quien la genera, mientras que la Regla Wicca invita a no dañar y a respetar el libre albedrío ajeno. Por esta razón, los hechizos dirigidos a influir directamente en otra persona — especialmente en el ámbito amoroso — suelen ser desaconsejados por la tradición seria: es preferible trabajar en la propia energía, apertura e intención, dejando espacio a la libre elección de cualquier otra persona involucrada.' },
    { q: '¿Cuál es la diferencia entre un altar permanente y uno temporal?', a: 'Un altar permanente permanece instalado de forma estable en casa, a menudo dedicado a una deidad específica o a la práctica diaria, y es ideal para quienes tienen espacio dedicado y continuidad en la práctica. Un altar temporal, en cambio, se construye solo para la duración de un ritual específico — quizás sobre una mesita, un paño o incluso una bandeja — y se desmonta justo después: es la opción más práctica para quienes conviven con otras personas o prefieren la discreción.' },
    { q: '¿Qué errores cometen más a menudo los principiantes en la práctica wicca?', a: 'Los errores más comunes incluyen: esperar resultados inmediatos sin constancia ritual, saltarse la fase de purificación del espacio antes del rito, mezclar tradiciones distintas sin comprender su significado original, y confiar exclusivamente en la magia descuidando la acción concreta en el mundo real. Otro error frecuente es ignorar la seguridad con velas e incienso, elementos centrales en casi todos los rituales wicca.' }
  ],
  sabbat: [
    { nome:'Yule', data:'21 de Diciembre', emoji:'❄️', sotto:'Solsticio de Invierno — El Sol Renace', elemento:'Tierra y Fuego', colori:['Rojo','Verde','Oro','Blanco'], desc:'Yule celebra el Solsticio de Invierno, la noche más larga del año. A partir de este momento el Sol renace: la luz regresa, lenta pero imparable. Es tiempo de recogimiento, introspección profunda y esperanza que germina en la oscuridad.', rituale:'Enciende una vela roja o dorada al atardecer. Siéntate en silencio y visualiza una semilla de luz creciendo en tu pecho. Agradece a la oscuridad lo que te ha enseñado.', month:11, day:21 },
    { nome:'Imbolc', data:'2 de Febrero', emoji:'🌱', sotto:'Fiesta de Brigid — El Despertar de la Primavera', elemento:'Fuego', colori:['Blanco','Amarillo','Rosa Pálido'], desc:'Imbolc marca el primer soplo de la primavera. La tierra aún está fría, pero bajo la superficie las semillas se mueven. Es la fiesta de la diosa Brigid — patrona de la poesía, la sanación y la forja.', rituale:'Prepara una vela blanca y rodéala de pétalos de lavanda. Escribe en un papel lo que quieres que germine en tu vida. Quema el papel en la llama.', month:1, day:2 },
    { nome:'Ostara', data:'21 de Marzo', emoji:'🌸', sotto:'Equinoccio de Primavera — Equilibrio y Renacimiento', elemento:'Aire', colori:['Verde','Amarillo','Lavanda','Blanco'], desc:'Ostara es el equinoccio de primavera: luz y oscuridad se equilibran perfectamente. La diosa de la primavera despierta la tierra con sus pasos. Es el tiempo de los comienzos, de la siembra intencionada.', rituale:'Pinta un huevo con símbolos de tus intenciones. Sostenlo entre tus manos, transfiriéndole tu energía. Entiérralo en la tierra o guárdalo en el altar durante 13 días.', month:2, day:21 },

    { nome:'Litha', data:'21 de Junio', emoji:'☀️', sotto:'Solsticio de Verano — El Sol en su Cúspide', elemento:'Fuego y Aire', colori:['Oro','Amarillo','Naranja','Blanco Cálido'], desc:'Litha es el Solsticio de Verano, el día más largo del año. El Sol está en la cúspide de su poder. Las hierbas mágicas recolectadas a medianoche del solsticio tienen un poder extraordinario.', rituale:'Al amanecer, extiende las manos abiertas hacia la luz durante un minuto. Luego lleva las manos al pecho: "Llevo esta luz dentro de mí."', month:5, day:21 },
    { nome:'Lammas', data:'1 de Agosto', emoji:'🌾', sotto:'Lughnasadh — La Primera Cosecha', elemento:'Tierra', colori:['Oro','Marrón','Naranja','Amarillo Trigo'], desc:'Lammas es la fiesta de la primera cosecha. Se corta el grano y se hornea el pan sagrado. Es un tiempo de gratitud por lo que se ha manifestado.', rituale:'Sostén en la mano un grano de trigo. Agradece por lo recibido este año. Luego identifica algo que debes dejar ir: escríbelo en papel y quémalo.', month:7, day:1 },
    { nome:'Mabon', data:'21 de Septiembre', emoji:'🍂', sotto:'Equinoccio de Otoño — Equilibrio y Balance', elemento:'Tierra', colori:['Burdeos','Oro Oscuro','Naranja Quemado','Marrón'], desc:'Mabon es el equinoccio de otoño — de nuevo el equilibrio entre luz y oscuridad, pero ahora es la oscuridad la que empieza a prevalecer. Tiempo de balances, gratitud y preparación para la oscuridad.', rituale:'Prepara una comida con frutos de temporada. Antes de comer, nombra tres cosas por las que estás agradecido/a y tres cosas que has aprendido.', month:8, day:21 },

/* ── Audio Manager ── */
const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';

class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play() { this.audio?.play().catch(() => {}); this.isPlaying = true; sessionStorage.setItem(AUDIO_KEY, 'true'); this.updateUI(); }
  pause() { this.audio?.pause(); this.isPlaying = false; sessionStorage.setItem(AUDIO_KEY, 'false'); this.updateUI(); }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}
window.audioManager = new AudioManager();
document.getElementById('musicToggle')?.addEventListener('click', () => window.audioManager.toggle());

/* ── Sabbat Corrente ── */
function calcSabbat() {
  const L = LANG[currentLang];
  const DB_SABBAT = L.sabbat;
  const oggi = new Date();
  const anno = oggi.getFullYear();
  const dates = DB_SABBAT.map(s => ({ s, date: new Date(anno, s.month, s.day) }));

  let corrente = null, prossimoObj = null;
  for (let i = dates.length - 1; i >= 0; i--) {
    if (dates[i].date <= oggi) { corrente = dates[i]; prossimoObj = dates[(i + 1) % dates.length]; break; }
  }
  if (!corrente) { corrente = dates[dates.length - 1]; prossimoObj = dates[0]; }

  let prossimoDate = prossimoObj.date;
  if (prossimoDate < oggi) prossimoDate = new Date(anno + 1, prossimoDate.getMonth(), prossimoDate.getDate());
  const giorniMancanti = Math.ceil((prossimoDate - oggi) / 86400000);

  const s = corrente.s;
  document.getElementById('sabbatIcon').textContent = s.emoji;
  document.getElementById('sabbatName').textContent = s.nome;
  document.getElementById('sabbatDate').textContent = s.sotto;
  document.getElementById('sabbatDesc').textContent = s.desc;
  document.getElementById('sabbatColors').innerHTML = s.colori.map(c => `<span class="sabbat-color">${c}</span>`).join('');
  const nextLabel = currentLang === 'it' ? 'Prossimo' : (currentLang === 'en' ? 'Next' : 'Próximo');
  const daysLabel = currentLang === 'it' ? 'giorni' : (currentLang === 'en' ? 'days' : 'días');
  document.getElementById('sabbatCountdown').textContent = `${nextLabel}: ${prossimoObj.s.nome} ${prossimoObj.s.emoji} — ${currentLang === 'en' ? 'in' : 'tra'} ${giorniMancanti} ${daysLabel}`;
}

    <div class="sabbat-card" title="${s.rituale.replace(/"/g,'&quot;')}">
      <div class="sabbat-card-icon" aria-hidden="true">${s.emoji}</div>
      <div class="sabbat-card-name">${s.nome}</div>
      <div class="sabbat-card-date">${s.data}</div>
      <div class="sabbat-card-el">${s.elemento}</div>
    </div>
  `).join('');
}

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  applyTheme(isDayMode);
  applyLang();
  selIntent(0);
  document.querySelectorAll('[data-lang]').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
});
</script>

</body>
</html>
