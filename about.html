<style>
/* ── Reset & Variabili (Tema Notte default) ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0514; --card:#140c24; --purple:#2a1748;
  --gold:#d4af37; --gold-dim:#b8860b; --gold-glow:rgba(212,175,55,0.4);
  --text:#f4f1fa; --muted:#b8b2d1; --radius:18px; --border:rgba(212,175,55,0.2);
}
html.theme-day{
  --bg:#f5f2ed; --card:#ede8df; --text:#2a1748; --muted:#6b5b7f;
  --purple:#6b5b7f; --gold:#c89742; --gold-dim:#a67c52;
  --gold-glow:rgba(200,151,66,0.2); --border:#c89742;
}
html.theme-day .card, html.theme-day .dash-card, html.theme-day .author-card{
  background-color:var(--card); border:2px solid var(--border); color:var(--text);
}
html.theme-day h1, html.theme-day h2, html.theme-day h3{ color:var(--text); text-shadow:none; }
html.theme-day .btn-icon, html.theme-day .btn-lang{ background-color:var(--gold); color:#fff; border:2px solid var(--border); }
html.theme-day .feature-item{ background:rgba(200,151,66,0.08); border-color:rgba(200,151,66,0.25); }

/* ── Layout Base ── */
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:16px;line-height:1.75;min-height:100vh;position:relative;overflow-x:hidden}
a{color:inherit}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.skip-link{position:absolute;top:-40px;left:0;background:var(--gold);color:#0a0514;padding:10px 16px;z-index:1000;border-radius:0 0 8px 0;transition:top .2s}
.skip-link:focus{top:0}

/* ── Sfondo Cosmico ── */
.cosmos{
  position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, #2a174830 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 80%, #1a073820 0%, transparent 60%),
    radial-gradient(2px 2px at 15% 25%, #fff9 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 75% 15%, #fff7 0%, transparent 100%),
    radial-gradient(2px 2px at 45% 70%, #d4af3780 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 45%, #fff6 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 85%, #fff5 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 35%, #d4af3760 0%, transparent 100%);
  animation:twinkle 14s infinite alternate;
}
@keyframes twinkle{0%{opacity:.35}50%{opacity:.55}100%{opacity:.45}}

/* ── Header ── */
.page-header{
  position:relative;z-index:2;background:linear-gradient(135deg,#1a0c32,#0a0520);
  border-bottom:1px solid var(--border);padding:max(18px,calc(18px + env(safe-area-inset-top,0px))) 20px 18px;
  text-align:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);
}
.header-top{display:flex;align-items:center;justify-content:space-between;max-width:480px;margin:0 auto 10px}
.btn-back{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);text-decoration:none;letter-spacing:.5px;transition:all .25s ease}
.btn-back:hover{opacity:.8}
.header-controls{display:flex;gap:8px}
.btn-icon{background:rgba(212,175,55,0.12);border:1px solid var(--border);color:var(--gold);border-radius:50%;width:38px;height:38px;font-size:16px;cursor:pointer;transition:all .25s ease;display:flex;align-items:center;justify-content:center}
.btn-icon:hover{background:rgba(212,175,55,0.25)}
.page-title{font-family:'Cinzel',serif;font-size:20px;color:var(--gold);letter-spacing:2px;text-shadow:0 0 20px var(--gold-glow);margin-bottom:10px}
.lang-switch{display:flex;gap:6px;justify-content:center}
.btn-lang{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .25s ease}
.btn-lang.active,.btn-lang:hover{background:var(--gold);color:#0a0514;border-color:var(--gold)}

/* ── Contenuto ── */
main{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:40px 20px 60px}
nav.breadcrumb{font-size:12px;color:var(--muted);margin-bottom:32px}
nav.breadcrumb a{color:var(--gold);text-decoration:none}
nav.breadcrumb span{margin:0 6px;opacity:.5}
.hero{text-align:center;margin-bottom:48px;padding:40px 24px;background:linear-gradient(145deg,#1a0c32,#0d0620);border:1px solid var(--border);border-radius:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(212,175,55,0.07),transparent 70%);pointer-events:none}
.hero-icon{font-size:56px;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(212,175,55,0.5));display:block}
h1{font-family:'Cinzel',serif;font-size:28px;color:var(--gold);letter-spacing:2px;margin-bottom:12px;line-height:1.3}
.hero p{font-size:16px;color:var(--muted);line-height:1.8;max-width:520px;margin:0 auto}
section{margin-bottom:40px;content-visibility:auto}
h2{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);letter-spacing:1.5px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
h3{font-family:'Cinzel',serif;font-size:15px;color:var(--gold)}
p{margin-bottom:14px;color:var(--text);opacity:.9}
.card{background:linear-gradient(145deg,#130b26,#0d0620);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}

/* ── Feature grid ── */
.feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
@media(max-width:500px){.feature-grid{grid-template-columns:1fr}}
.feature-item{background:rgba(212,175,55,0.05);border:1px solid rgba(212,175,55,0.15);border-radius:12px;padding:16px}
.feature-icon{font-size:28px;margin-bottom:8px;display:block}
.feature-title{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:1px;margin-bottom:4px}
.feature-desc{font-size:13px;color:var(--muted);line-height:1.6}

.mission-list{list-style:none;padding:0}
.mission-list li{padding:10px 0;border-bottom:1px solid rgba(212,175,55,0.1);display:flex;align-items:flex-start;gap:12px;font-size:15px}
.mission-list li:last-child{border-bottom:none}
.mission-list li::before{content:'✦';color:var(--gold);flex-shrink:0;margin-top:2px}

.cta{text-align:center;padding:32px 20px;background:linear-gradient(145deg,#1e0e38,#0a0520);border:1px solid rgba(212,175,55,0.4);border-radius:20px;margin-top:40px}
.cta-icon{font-size:32px;margin-bottom:8px}
.cta-title{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);letter-spacing:1.5px;margin-bottom:8px}
.cta-text{font-size:14px;color:var(--muted);margin-bottom:0}
.cta-btn{display:inline-block;padding:14px 32px;background:linear-gradient(135deg,#d4af37,#b8860b);color:#0a0514;border-radius:50px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-decoration:none;margin-top:14px;transition:all .25s ease;border:none;cursor:pointer}
.cta-btn:hover{box-shadow:0 4px 24px rgba(212,175,55,0.5);transform:translateY(-1px)}
.cta-explore{display:inline-block;padding:14px 32px;background:linear-gradient(135deg,#d4af37,#b8860b);color:#0a0514;border-radius:50px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-decoration:none;margin-top:16px;transition:all .25s ease}
.cta-explore:hover{box-shadow:0 4px 24px rgba(212,175,55,0.5);transform:translateY(-1px)}

/* ── Autore ── */
.author-head{text-align:center;margin-bottom:24px}
.author-photo{width:100%;max-width:280px;aspect-ratio:4/5;border-radius:16px;object-fit:cover;border:2px solid var(--gold);box-shadow:0 8px 32px rgba(212,175,55,0.3);margin-bottom:16px}
.author-name{font-family:'Cinzel',serif;font-size:20px;color:var(--gold);letter-spacing:1px}
.author-role{font-size:13px;color:var(--muted);margin-top:4px}
.author-subhead{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);letter-spacing:1px;margin:24px 0 10px;opacity:.9}
.author-meta{display:flex;flex-wrap:wrap;gap:10px 18px;margin-top:24px;padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.author-meta a{color:var(--gold);text-decoration:none}

/* ── Articolo editoriale ── */
.article-section img{width:100%;border-radius:14px;margin:16px 0}
.article-links{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0}
.article-links a{font-size:13px;color:var(--gold);border:1px solid var(--border);border-radius:20px;padding:6px 14px;text-decoration:none;transition:all .25s ease}
.article-links a:hover{background:rgba(212,175,55,0.12)}

/* ── FAQ Accordion ── */
.faq-section{margin-bottom:40px}
.faq-item{border-bottom:1px solid var(--border)}
.faq-question{width:100%;background:none;border:none;color:var(--text);font-family:'Crimson Pro',serif;font-size:15px;padding:16px 4px;display:flex;justify-content:space-between;align-items:center;text-align:left;cursor:pointer;transition:color .25s ease}
.faq-question:hover{color:var(--gold)}
.faq-icon{color:var(--gold);font-size:18px;flex-shrink:0;margin-left:12px}
.faq-answer{padding:0 4px 16px;color:var(--muted);font-size:14px;line-height:1.7}

/* ── Share ── */
.share-section{text-align:center;margin:32px 0;position:relative}
.btn-share{background:rgba(212,175,55,0.12);border:1px solid var(--border);color:var(--gold);font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;padding:12px 26px;border-radius:30px;cursor:pointer;transition:all .25s ease}
.btn-share:hover{background:rgba(212,175,55,0.22)}
.share-popup{margin-top:14px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.share-popup a,.share-popup button{background:var(--card);border:1px solid var(--border);color:var(--gold);border-radius:20px;padding:8px 16px;font-size:12px;text-decoration:none;cursor:pointer;transition:all .25s ease}
.share-popup a:hover,.share-popup button:hover{background:rgba(212,175,55,0.15)}

/* ── Esplora / Crosslinks ── */
.esplora-section{position:relative;z-index:1;background:linear-gradient(135deg,#130b26,#1a0c32);border-top:1px solid rgba(212,175,55,0.25);padding:40px 20px;text-align:center}
.esplora-section h2{font-family:'Cinzel',serif;color:var(--gold);font-size:1.2rem;letter-spacing:2px;margin-bottom:24px;border:none}
.esplora-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:800px;margin:0 auto}
.esplora-card{display:inline-block;background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.25);border-radius:8px;padding:10px 18px;color:var(--gold);text-decoration:none;font-family:'Cinzel',serif;font-size:.82rem;letter-spacing:1px;transition:background .3s,border-color .3s}
.esplora-card:hover{background:rgba(212,175,55,0.18);border-color:rgba(212,175,55,0.6)}
.seo-crosslinks{max-width:1100px;margin:32px auto;padding:24px 16px;border:1px solid rgba(212,175,55,.18);border-radius:16px}
.seo-crosslinks h2{margin-bottom:12px}
.seo-crosslinks ul{padding-left:20px}
.seo-crosslinks li{margin:8px 0}

/* ── Footer ── */
.page-footer{position:relative;z-index:1;text-align:center;padding:24px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);letter-spacing:1px}
.page-footer .footer-links{margin-bottom:10px;line-height:2}
.page-footer a{color:var(--gold);text-decoration:none;margin:0 10px}
.page-footer a:hover{text-decoration:underline}
.footer-disclaimer{max-width:520px;margin:10px auto 0;opacity:.7;letter-spacing:.3px}

/* ── Premium Modal ── */
.premium-modal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center}
.premium-modal.show{display:flex}
.modal-overlay{position:absolute;inset:0;background:rgba(5,2,12,0.8);backdrop-filter:blur(4px)}
.modal-content{position:relative;z-index:2;background:linear-gradient(145deg,#1a0c32,#0d0620);border:1px solid var(--gold);border-radius:20px;padding:32px 24px;max-width:360px;width:90%;text-align:center}
.modal-content h2{font-size:19px;border:none;margin-bottom:12px}
.premium-price{color:var(--gold);font-family:'Cinzel',serif;font-size:14px;margin:12px 0}
.btn-premium-buy{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#d4af37,#b8860b);color:#0a0514;border:none;border-radius:30px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-bottom:10px}
.btn-premium-skip{display:block;width:100%;padding:10px;background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;text-decoration:underline}
</style>
</head>

</header>

<main id="main-content">

  <nav class="breadcrumb" aria-label="Breadcrumb">

    artP1: 'Divination has accompanied humanity for millennia, long before it took the forms we recognize today in tarot or runes. The earliest documented traces date to Mesopotamia around the third millennium BCE, where Babylonian priests read the flight of birds and animal entrails. In China, Shang-dynasty diviners carved oracle bones to consult the ancestors; from that tradition, around 1000 BCE, the I Ching emerged — the Book of Changes MYSTICA offers in full, with all 64 hexagrams.',
    artP2: 'Tarot cards began as a Renaissance Italian card game in the 15th century: the Visconti-Sforza deck, commissioned by the Milanese court around 1450, is one of the earliest complete decks to survive. Only in the 18th century, through figures like Antoine Court de Gébelin, did the cards acquire an esoteric reading distinct from their original playful use. Norse runes belong to an even older tradition: the 24-symbol Elder Futhark is attested in Scandinavia from the 2nd century CE, used both for writing and for divinatory practices.',
    artP3: 'Every divinatory system carries a coherent, layered symbolism. In tarot, the Major Arcana represent universal archetypes — the Tower, Death, the Star — while the Minor Arcana, split into four suits, reflect everyday dynamics. In the I Ching, each hexagram arises from a combination of yin and yang lines, mirroring the Taoist principle of perpetual change. Runes fuse phonetic value with symbolic meaning: Fehu evokes movable wealth, Ansuz communication and wisdom. MYSTICA presents these systems distinctly, respecting each tradition\'s internal logic rather than blending them superficially.',
    artP4: 'One of the most common mistakes beginners make is treating oracles as tools of absolute prediction, revealing a fixed, unchangeable future. In truth, most divinatory traditions — from tarot to the I Ching — began as tools for symbolic reflection, not deterministic prophecy. Another common myth is that a single correct interpretation exists for every card or hexagram: different schools, such as the French and Anglo-Saxon tarot traditions, offer slightly different readings, each valid within its own framework.',
    artP5: 'Understanding the differences between systems helps you choose the right tool for each question. Tarot\'s narrative richness suits complex, evolving situations. Runes, more direct and essential, offer concise answers ideal for specific decisions. The I Ching, with its Taoist philosophical structure, suits long-term reflection on change. MYSTICA brings all these traditions together — alongside numerology, geomancy and 25+ oracles — in one free digital space, letting you compare different approaches while respecting each one\'s authenticity.',

    philosophyTitle: 'Filosofía y Enfoque',
    philosophyP1: 'MYSTICA no pretende tener respuestas absolutas. Los oráculos —del tarot a las runas, del I Ching a la geomancia— son herramientas de reflexión, espejos del inconsciente y de la sabiduría acumulada durante milenios de tradiciones humanas. No son profecías, sino invitaciones a la conciencia.',

    artTitle: 'Adivinación, Autoconocimiento y Tradición: la Filosofía detrás de MYSTICA',

    artH3: 'Cómo Interpreta MYSTICA las Tradiciones Antiguas',
    artImgAlt: 'Símbolos esotéricos y tradiciones adivinatorias representadas en MYSTICA Oracoli',
    artP1: 'La adivinación acompaña a la humanidad desde hace milenios, mucho antes de adoptar las formas que hoy conocemos en el tarot o las runas. Los primeros rastros documentados se remontan a Mesopotamia, hacia el tercer milenio a.C., cuando los sacerdotes babilonios interpretaban el vuelo de las aves y las vísceras de los animales. En China, ya en la dinastía Shang, se grababan huesos oraculares para consultar a los antepasados; de esa tradición, hacia el año 1000 a.C., surgió el I Ching, el Libro de los Cambios que MYSTICA ofrece completo, con sus 64 hexagramas.',
    artP2: 'El tarot, en cambio, nació como un juego de cartas en la Italia renacentista del siglo XV: la baraja Visconti-Sforza, encargada por la corte de Milán hacia 1450, es una de las primeras barajas completas conservadas. Solo en el siglo XVIII, gracias a figuras como Antoine Court de Gébelin, las cartas adquirieron una lectura esotérica distinta de su uso lúdico original. Las runas nórdicas pertenecen a una tradición aún más antigua: el Elder Futhark, alfabeto rúnico de 24 signos, está documentado en Escandinavia desde el siglo II d.C.',
    artP3: 'Cada sistema adivinatorio conlleva una simbología coherente y estratificada. En el tarot, los Arcanos Mayores representan arquetipos universales —la Torre, la Muerte, la Estrella— mientras que los Arcanos Menores, divididos en cuatro palos, reflejan las dinámicas cotidianas. En el I Ching, cada hexagrama nace de la combinación de líneas yin y yang, reflejo del principio taoísta del cambio perpetuo. Las runas unen valor fonético y significado simbólico: Fehu evoca la riqueza móvil, Ansuz la comunicación y la sabiduría. MYSTICA presenta estos sistemas de forma distinta, respetando la lógica interna de cada tradición.',
    artP4: 'Uno de los errores más comunes al acercarse por primera vez a los oráculos es considerarlos herramientas de predicción absoluta, capaces de revelar un futuro fijo e inmutable. En realidad, la mayoría de las tradiciones adivinatorias —del tarot al I Ching— nacieron como herramientas de reflexión simbólica, no como oráculos deterministas. Otro mito frecuente es que existe una única interpretación correcta para cada carta o hexagrama: escuelas distintas, como la francesa y la anglosajona en el tarot, ofrecen lecturas ligeramente diferentes, igualmente válidas dentro de su propio marco.',
    artP5: 'Comprender las diferencias entre los sistemas ayuda a elegir la herramienta más adecuada para cada pregunta. El tarot, con su riqueza narrativa, se presta bien a situaciones complejas y en evolución. Las runas, más directas y esenciales, ofrecen respuestas concisas, ideales para decisiones puntuales. El I Ching, con su estructura filosófica taoísta, es especialmente adecuado para reflexionar sobre procesos de cambio a largo plazo. MYSTICA reúne todas estas tradiciones —junto con numerología, geomancia y más de 25 oráculos— en un único espacio digital gratuito.',

let currentLang = localStorage.getItem('myst_lang') || 'it';

/* ── SEO Multilingua ── */
function updateSEO() {
  const S = LANG[currentLang].seo;
  document.documentElement.lang = S.htmlLang;
  document.title = S.title;
  document.querySelector('meta[name="description"]').content = S.description;
  document.querySelector('meta[name="keywords"]').content = S.keywords;
  document.querySelector('meta[property="og:title"]').content = S.ogTitle;
  document.querySelector('meta[property="og:description"]').content = S.ogDesc;
  document.querySelector('meta[property="og:locale"]').content = S.ogLocale;
  document.querySelector('meta[name="twitter:title"]').content = S.ogTitle;
  document.querySelector('meta[name="twitter:description"]').content = S.ogDesc;
  const ld = document.getElementById('ld-faq');
  if (ld && S.faqLD) {
    ld.textContent = JSON.stringify({
      '@context': 'https://schema.org',
      '@type': 'FAQPage',
      mainEntity: S.faqLD.map(f => ({
        '@type': 'Question',
        name: f.q,
        acceptedAnswer: { '@type': 'Answer', text: f.a }
      }))
    });
  }
}

/* ── Render helper per liste semplici ── */
function renderList(containerId, items) {
  const c = document.getElementById(containerId);
  if (!c) return;
  c.innerHTML = items.map(t => `<li>${t}</li>`).join('');
}

function renderFeatures(features) {
  const c = document.getElementById('featuresGrid');
  if (!c) return;
  c.innerHTML = features.map(f => `
    <div class="feature-item">
      <span class="feature-icon" aria-hidden="true">${f.icon}</span>
      <div class="feature-title">${f.title}</div>
      <div class="feature-desc">${f.desc}</div>
    </div>
  `).join('');
}

function renderLinkGroup(containerId, links, isList, isPlainAnchor) {
  const c = document.getElementById(containerId);
  if (!c) return;
  if (isList) {
    c.innerHTML = links.map(l => `<li><a href="${l.href}">${l.label}</a></li>`).join('');
  } else if (isPlainAnchor) {
    c.innerHTML = links.map(l => `<a href="${l.href}">${l.label}</a>`).join('');
  } else {
    c.innerHTML = links.map(l => `<a href="${l.href}" class="esplora-card">${l.label}</a>`).join('');
  }
}

function renderFooterLinks(links) {
  const c = document.getElementById('footerLinks');
  if (!c) return;
  c.innerHTML = links.map(l => `<a href="${l.href}">${l.label}</a>`).join(' ');
}

/* ── Audio Manager (musica continua cross-page) ── */
const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';

class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play() {
    this.audio?.play().catch(() => {});
    this.isPlaying = true;
    sessionStorage.setItem(AUDIO_KEY, 'true');
    this.updateUI();
  }
  pause() {
    this.audio?.pause();
    this.isPlaying = false;
    sessionStorage.setItem(AUDIO_KEY, 'false');
    this.updateUI();
  }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}
window.audioManager = new AudioManager();
document.getElementById('musicToggle')?.addEventListener('click', () => window.audioManager.toggle());

/* ── Tema Giorno/Notte ── */
let isDayMode = localStorage.getItem('myst_theme') === 'day';

function applyTheme(isDay) {
  document.documentElement.classList.toggle('theme-day', isDay);
  const btn = document.getElementById('themeToggle');
  const L = LANG[currentLang];
  if (btn) btn.textContent = isDay ? L.theme.night : L.theme.day;
  localStorage.setItem('myst_theme', isDay ? 'day' : 'night');
}

document.getElementById('themeToggle')?.addEventListener('click', () => { isDayMode = !isDayMode; applyTheme(isDayMode); });

/* ── Premium Gate (nessuna funzione della pagina è gated: about.html è sempre libera) ── */
function isPremium() {
  return localStorage.getItem('myst_premium') === '1';
}
function requirePremium(actionType) {
  if (isPremium()) return true;
  document.getElementById('premiumModal')?.classList.add('show');
  document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'false');
  return false;
}
function closePremiumModal() {
  document.getElementById('premiumModal')?.classList.remove('show');
  document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'true');
}

/* ── Share ── */
const PAGE_URL = 'https://mysticaoracoli.it/about.html';

function shareContent(customText) {
  const L = LANG[currentLang];
  const text = customText || L.shareText;
  if (navigator.share) {
    navigator.share({ title: L.shareTitle, text, url: PAGE_URL }).catch(() => {});
    return;
  }
  const enc = encodeURIComponent(text + ' ' + PAGE_URL);
  const ue = encodeURIComponent(PAGE_URL);
  const wa = document.getElementById('share-wa'); if (wa) wa.href = `https://wa.me/?text=${enc}`;
  const tg = document.getElementById('share-tg'); if (tg) tg.href = `https://t.me/share/url?url=${ue}&text=${encodeURIComponent(text)}`;
  const fb = document.getElementById('share-fb'); if (fb) fb.href = `https://www.facebook.com/sharer/sharer.php?u=${ue}`;
  const xb = document.getElementById('share-x'); if (xb) xb.href = `https://twitter.com/intent/tweet?text=${enc}`;
  const sp = document.getElementById('sharePopup'); if (sp) sp.hidden = false;
}

function copyLink() {
  const L = LANG[currentLang];
  navigator.clipboard.writeText(PAGE_URL).then(() => {
    const b = document.getElementById('share-copy');
    if (b) {
      b.textContent = L.shareCopied;
      setTimeout(() => { b.textContent = L.shareCopy; }, 2000);
    }
  });
}

/* ── FAQ Accordion ── */
function renderFAQ(faqs) {
  const container = document.getElementById('faqList');
  if (!container) return;
  container.innerHTML = faqs.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false">
        <span>${f.q}</span>
        <span class="faq-icon" aria-hidden="true">+</span>
      </button>
      <div class="faq-answer" id="faq-ans-${i}" hidden>
        <p>${f.a}</p>
      </div>
    </div>
  `).join('');
}

function toggleFAQ(i) {
  const ans = document.getElementById(`faq-ans-${i}`);
  const btn = document.querySelector(`#faq-${i} .faq-question`);
  const icon = btn?.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  if (icon) icon.textContent = isOpen ? '+' : '−';
  btn?.setAttribute('aria-expanded', String(!isOpen));
}
