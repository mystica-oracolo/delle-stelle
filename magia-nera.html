  <style>
    /* ── Reset & Variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0514;
      --card: #140c24;
      --purple: #2a1748;
      --gold: #d4af37;
      --gold-dim: #b8860b;
      --gold-glow: rgba(212,175,55,0.4);
      --text: #f4f1fa;
      --muted: #b8b2d1;
      --radius: 18px;
      --border: rgba(212,175,55,0.2);
      /* magia nera accent */
      --dark-accent: #6060a0;
      --dark-border: rgba(96,96,128,0.25);
      --dark-card: rgba(18,16,28,0.97);
    }

    /* ── Tema Giorno ── */
    html.theme-day {
      --bg: #f5f2ed;
      --card: #ede8df;
      --text: #2a1748;
      --muted: #6b5b7f;
      --purple: #6b5b7f;
      --gold: #c89742;
      --gold-dim: #a67c52;
      --gold-glow: rgba(200,151,66,0.2);
      --border: #c89742;
      --dark-accent: #5050a0;
      --dark-border: rgba(80,80,128,0.3);
      --dark-card: rgba(245,242,237,0.98);
    }
    html.theme-day .card,
    html.theme-day .dash-card { background-color: var(--card); border: 2px solid var(--border); color: var(--text); }
    html.theme-day h1, html.theme-day h2, html.theme-day h3 { color: var(--text); text-shadow: none; }
    html.theme-day button { background-color: var(--gold); color: var(--text); border: 2px solid var(--border); }
    html.theme-day input, html.theme-day select { background-color: #ffffff; color: var(--text); border: 2px solid var(--border); }
    html.theme-day .ritual-card { background: var(--card); border-color: var(--dark-border); }
    html.theme-day .ritual-title { color: var(--text); }
    html.theme-day .field-text { color: var(--muted); }
    html.theme-day .field-label { color: var(--dark-accent); }

    /* ── Layout ── */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    .skip-link {
      position: absolute; top: -40px; left: 0;
      background: var(--gold); color: #000; padding: 8px 16px;
      border-radius: 0 0 8px 0; z-index: 100; font-size: 14px;
      transition: top 0.2s;
    }
    .skip-link:focus { top: 0; }

    /* ── Sfondo Cosmico ── */
    .cosmos {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, #2a174830 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 80%, #1a073820 0%, transparent 60%),
        radial-gradient(2px 2px at 15% 25%, #fff9 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 75% 15%, #fff7 0%, transparent 100%),
        radial-gradient(2px 2px at 45% 70%, #d4af3780 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 45%, #fff6 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 30% 85%, #fff5 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 35%, #d4af3760 0%, transparent 100%);
      animation: twinkle 14s infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: .35; }
      50%  { opacity: .55; }
      100% { opacity: .45; }
    }

    /* ── Header ── */
    .page-header {
      position: sticky; top: 0;
      background: rgba(10,5,20,0.96);
      padding: max(12px, calc(12px + env(safe-area-inset-top, 0px))) 16px 14px;
      border-bottom: 1px solid var(--dark-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10;
      text-align: center;
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .btn-back {
      background: rgba(96,96,128,0.12);
      border: 1px solid rgba(96,96,128,0.35);
      color: var(--muted);
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      display: inline-block;
      transition: all 0.25s ease;
      font-family: 'Crimson Pro', serif;
    }
    .btn-back:hover { background: rgba(96,96,128,0.25); }
    .btn-back:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
    .header-controls { display: flex; gap: 8px; }
    .btn-icon {
      background: rgba(96,96,128,0.12);
      border: 1px solid rgba(96,96,128,0.3);
      color: var(--muted);
      padding: 7px 12px;
      border-radius: 18px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.25s ease;
      font-family: 'Crimson Pro', serif;
      white-space: nowrap;
    }
    .btn-icon:hover { background: rgba(96,96,128,0.25); }
    .btn-icon:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
    .page-title {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 700;
      margin: 4px 0 2px;
      background: linear-gradient(90deg, #9090b8, #c8c0e0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .lang-switch { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
    .btn-lang {
      background: transparent;
      border: 1px solid var(--dark-border);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Cinzel', serif;
      transition: all 0.25s ease;
    }
    .btn-lang.active, .btn-lang:hover {
      background: var(--dark-accent);
      color: #fff;
      border-color: var(--dark-accent);
    }
    .btn-lang:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    /* ── Main ── */
    main { position: relative; z-index: 1; padding: 16px 16px 80px; max-width: 650px; margin: 0 auto; }

    /* ── Avviso ── */
    .avviso {
      background: rgba(96,96,128,0.1);
      border: 1px solid rgba(96,96,128,0.25);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #9090b0;
      line-height: 1.5;
      text-align: center;
      font-family: 'Crimson Pro', serif;
    }
    .counter {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 6px 0 12px;
      font-family: 'Crimson Pro', serif;
    }

    /* ── Ritual Cards ── */
    .ritual-card {
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: 14px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.3s;
      content-visibility: auto;
    }
    .ritual-card:hover { border-color: rgba(96,96,128,0.45); }
    .ritual-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .ritual-head:focus-visible { outline: 2px solid var(--gold); outline-offset: -2px; }
    .ritual-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--dark-accent);
      min-width: 24px;
      font-family: monospace;
    }
    .ritual-title {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      font-weight: 600;
      color: #d8d0f0;
      flex: 1;
      line-height: 1.35;
    }
    .ritual-arrow {
      color: var(--dark-accent);
      font-size: 14px;
      transition: transform 0.3s;
      flex-shrink: 0;
    }
    .ritual-card.open .ritual-arrow { transform: rotate(180deg); }
    .ritual-body { max-height: 0; overflow: hidden; transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1); }
    .ritual-card.open .ritual-body { max-height: 1000px; }
    .ritual-body-inner { padding: 12px 16px 16px; border-top: 1px solid rgba(96,96,128,0.12); }
    .field { margin-bottom: 12px; }
    .field-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--dark-accent);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 4px;
      font-family: 'Cinzel', serif;
    }
    .field-text {
      font-size: 14px;
      color: #b8b0d0;
      line-height: 1.65;
      font-family: 'Crimson Pro', serif;
    }
    html.theme-day .field-text { color: var(--muted); }
    .field-text em { color: #d0c8e8; font-style: italic; }
    .field-text strong { color: #e0d8f8; }

    /* ── Share ── */
    .share-section { margin: 24px 0 8px; text-align: center; }
    .btn-share {
      background: rgba(96,96,128,0.15);
      border: 1px solid rgba(96,96,128,0.35);
      color: var(--muted);
      padding: 10px 22px;
      border-radius: 22px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Crimson Pro', serif;
      transition: all 0.25s ease;
    }
    .btn-share:hover { background: rgba(96,96,128,0.28); }
    .btn-share:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
    .share-popup { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 12px; }
    .share-btn {
      padding: 8px 16px; border-radius: 18px; font-size: 13px;
      text-decoration: none; font-family: 'Crimson Pro', serif;
      cursor: pointer; border: 1px solid transparent;
      transition: all 0.25s ease;
    }
    .share-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
    .share-btn.whatsapp  { background: #25d366; color: #fff; }
    .share-btn.telegram  { background: #229ed9; color: #fff; }
    .share-btn.facebook  { background: #1877f2; color: #fff; }
    .share-btn.twitter   { background: #000; color: #fff; }
    .share-btn.copy      { background: rgba(96,96,128,0.2); color: var(--muted); border-color: var(--dark-border); }

    /* ── Article ── */
    .article-section {
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: var(--radius);
      padding: 24px 20px;
      margin: 28px 0 0;
    }
    .article-section h2 {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      font-weight: 700;
      color: #c8c0e0;
      margin-bottom: 16px;
      line-height: 1.35;
    }
    .article-section h3 {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      font-weight: 600;
      color: #b0a8d0;
      margin: 20px 0 10px;
    }
    .article-section p {
      font-family: 'Crimson Pro', serif;
      font-size: 16px;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 14px;
    }
    html.theme-day .article-section p { color: var(--muted); }
    .article-links { margin: 20px 0 16px; display: flex; flex-wrap: wrap; gap: 8px; }
    .article-links a {
      background: rgba(96,96,128,0.12);
      border: 1px solid var(--dark-border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 13px;
      text-decoration: none;
      font-family: 'Crimson Pro', serif;
      transition: all 0.25s ease;
    }
    .article-links a:hover { background: rgba(96,96,128,0.25); color: var(--text); }
    .article-links a:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
    .cta-explore {
      display: block; text-align: center;
      background: linear-gradient(135deg, rgba(96,96,128,0.25), rgba(96,96,128,0.1));
      border: 1px solid var(--dark-border);
      color: var(--muted);
      padding: 14px 20px;
      border-radius: var(--radius);
      font-size: 15px;
      text-decoration: none;
      font-family: 'Cinzel', serif;
      transition: all 0.25s ease;
      margin-top: 8px;
    }
    .cta-explore:hover { background: rgba(96,96,128,0.3); color: var(--text); }
    .cta-explore:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    /* ── FAQ ── */
    .faq-section { margin: 28px 0 0; }
    .faq-title {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      color: #c8c0e0;
      margin-bottom: 14px;
    }
    .faq-item { margin-bottom: 8px; }
    .faq-question {
      width: 100%;
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: 12px;
      color: var(--muted);
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      font-size: 15px;
      font-family: 'Crimson Pro', serif;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: all 0.25s ease;
    }
    .faq-question:hover { border-color: rgba(96,96,128,0.45); }
    .faq-question:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
    .faq-icon { font-size: 18px; color: var(--dark-accent); flex-shrink: 0; }
    .faq-answer {
      background: rgba(18,16,28,0.6);
      border: 1px solid var(--dark-border);
      border-top: none;
      border-radius: 0 0 12px 12px;
      padding: 14px 16px;
    }
    html.theme-day .faq-answer { background: rgba(245,242,237,0.7); }
    .faq-answer p {
      font-family: 'Crimson Pro', serif;
      font-size: 15px;
      color: var(--muted);
      line-height: 1.7;
      margin: 0;
    }

    /* ── Footer ── */
    .page-footer {
      position: relative; z-index: 1;
      background: rgba(10,5,20,0.8);
      border-top: 1px solid var(--dark-border);
      padding: 24px 16px;
      text-align: center;
      margin-top: 32px;
    }
    .footer-links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 12px; }
    .footer-links a {
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
      font-family: 'Crimson Pro', serif;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--text); }
    .footer-links a:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
    #footer-copy { font-size: 12px; color: #5a5570; margin-bottom: 6px; font-family: 'Crimson Pro', serif; }
    .footer-disclaimer { font-size: 11px; color: #3a3550; line-height: 1.5; max-width: 400px; margin: 0 auto; font-family: 'Crimson Pro', serif; }

    /* ── Premium Modal ── */
    .premium-modal {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .premium-modal.show { opacity: 1; pointer-events: all; }
    .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.75); }
    .modal-content {
      position: relative; z-index: 1;
      background: #140c24;
      border: 1px solid var(--gold-glow);
      border-radius: 20px;
      padding: 28px 24px;
      max-width: 340px; width: 90%;
      text-align: center;
    }
    html.theme-day .modal-content { background: #ede8df; }
    .modal-content h2 {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      color: var(--gold);
      margin-bottom: 12px;
    }
    .modal-content p { font-family: 'Crimson Pro', serif; font-size: 15px; color: var(--muted); margin-bottom: 10px; line-height: 1.6; }
    .premium-price { font-size: 20px !important; color: var(--gold) !important; font-weight: 700; }
    .btn-premium-buy {
      display: block; width: 100%;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      color: #0a0514;
      border: none; border-radius: 14px;
      padding: 14px 20px;
      font-size: 15px; font-weight: 700;
      font-family: 'Cinzel', serif;
      cursor: pointer; margin: 16px 0 8px;
      transition: all 0.25s ease;
    }
    .btn-premium-buy:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-premium-buy:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
    .btn-premium-skip {
      background: transparent; border: none;
      color: var(--muted); font-size: 13px;
      font-family: 'Crimson Pro', serif;
      cursor: pointer; padding: 6px;
      transition: color 0.2s;
    }
    .btn-premium-skip:hover { color: var(--text); }
    .btn-premium-skip:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    /* ── Media Queries ── */
    @media (min-width: 480px) {
      .ritual-title { font-size: 15px; }
    }
  </style>
</head>

<a href="#main-content" class="skip-link">Vai al contenuto principale</a>

<!-- Sfondo Cosmico -->
<div class="cosmos" aria-hidden="true"></div>

<!-- Header -->
<header class="page-header">
  <div class="header-top">
    <a href="./index.html" class="btn-back" id="btn-back"></a>
    <div class="header-controls">
      <button id="musicToggle" class="btn-icon" aria-label="Toggle musica"></button>
      <button id="themeToggle" class="btn-icon" aria-label="Toggle tema"></button>
    </div>
  </div>
  <h1 class="page-title" id="page-title">🖤 Magia Nera</h1>
  <div class="lang-switch" role="navigation" aria-label="Selezione lingua">
    <button data-lang="it" class="btn-lang active">IT</button>
    <button data-lang="en" class="btn-lang">EN</button>
    <button data-lang="es" class="btn-lang">ES</button>
  </div>
</header>

<!-- Contenuto Principale -->
<main id="main-content">

  <!-- Sezione Interattiva: 40 Rituali -->
  <div class="avviso" id="avviso-text"></div>
  <p class="counter" id="counter"></p>
  <div id="ritual-list" role="list"></div>

  <!-- Share -->
  <div class="share-section">
    <button class="btn-share" onclick="shareContent()" aria-label="Condividi questa pagina">📤 Condividi</button>
    <div class="share-popup" id="sharePopup" hidden role="group" aria-label="Opzioni di condivisione">
      <a class="share-btn whatsapp" id="share-wa" target="_blank" rel="noopener noreferrer">💬 WhatsApp</a>
      <a class="share-btn telegram" id="share-tg" target="_blank" rel="noopener noreferrer">✈️ Telegram</a>
      <a class="share-btn facebook" id="share-fb" target="_blank" rel="noopener noreferrer">👥 Facebook</a>
      <a class="share-btn twitter"  id="share-x"  target="_blank" rel="noopener noreferrer">🐦 X</a>
      <button class="share-btn copy" id="share-copy" onclick="copyLink()"></button>
    </div>
  </div>

  <!-- Articolo Editoriale -->
  <article class="article-section" aria-labelledby="art-title">
    <h2 id="art-title"></h2>
    <figure>
      <img src="./images/icone/home/magia-nera.webp"
           srcset="./images/icone/home/magia-nera.webp 1x"
           id="art-hero"
           alt=""
           width="600" height="340"
           loading="eager"
           decoding="async"
           style="width:100%;border-radius:14px;margin:16px 0">
    </figure>
    <h3 id="art-h2"></h3>
    <p id="art-p1"></p>
    <p id="art-p2"></p>
    <p id="art-p3"></p>

let currentLang = localStorage.getItem('myst_lang') || 'it';

/* ── SEO ── */
function updateSEO() {
  const S = LANG[currentLang].seo;
  document.documentElement.lang = S.htmlLang;
  document.title = S.title;
  document.querySelector('meta[name="description"]').content = S.description;
  document.querySelector('meta[name="keywords"]').content = S.keywords;
  document.querySelector('meta[property="og:title"]').content = S.ogTitle;
  document.querySelector('meta[property="og:description"]').content = S.ogDesc;
  document.querySelector('meta[property="og:locale"]').content = S.ogLocale;
  document.querySelector('meta[name="twitter:title"]').content = S.ogTitle;
  document.querySelector('meta[name="twitter:description"]').content = S.ogDesc;
  const ld = document.querySelector('script[type="application/ld+json"]');
  if (ld && S.faqLD) {
    ld.textContent = JSON.stringify({
      '@context': 'https://schema.org',
      '@type': 'FAQPage',
      mainEntity: S.faqLD.map(f => ({
        '@type': 'Question',
        name: f.q,
        acceptedAnswer: { '@type': 'Answer', text: f.a }
      }))
    });
  }
}

document.querySelectorAll('[data-lang]').forEach(btn => {
  btn.addEventListener('click', e => {
    currentLang = e.target.dataset.lang;
    localStorage.setItem('myst_lang', currentLang);
    applyLang();
    document.querySelectorAll('[data-lang]').forEach(b =>
      b.classList.toggle('active', b.dataset.lang === currentLang));
  });
});

/* ── Audio Manager ── */
const AUDIO_KEY = 'myst_audio_state';
const AUDIO_URL = './images/icone/audio/mystica_ambient_432_528.mp3';

class AudioManager {
  constructor() {
    this.audio = null;
    this.isPlaying = sessionStorage.getItem(AUDIO_KEY) === 'true';
    this.initAudio();
  }
  initAudio() {
    this.audio = new Audio(AUDIO_URL);
    this.audio.preload = 'none';
    this.audio.loop = true;
    this.audio.volume = 0.3;
    if (this.isPlaying) this.play();
    this.updateUI();
  }
  play() {
    this.audio?.play().catch(() => {});
    this.isPlaying = true;
    sessionStorage.setItem(AUDIO_KEY, 'true');
    this.updateUI();
  }
  pause() {
    this.audio?.pause();
    this.isPlaying = false;
    sessionStorage.setItem(AUDIO_KEY, 'false');
    this.updateUI();
  }
  toggle() { this.isPlaying ? this.pause() : this.play(); }
  updateUI() {
    const btn = document.getElementById('musicToggle');
    const L = LANG[currentLang];
    if (btn) btn.textContent = this.isPlaying ? L.music.on : L.music.off;
  }
}
window.audioManager = new AudioManager();
document.getElementById('musicToggle')?.addEventListener('click', () => window.audioManager.toggle());

/* ── Tema Giorno/Notte ── */
function applyTheme(isDay) {
  document.documentElement.classList.toggle('theme-day', isDay);
  const btn = document.getElementById('themeToggle');
  const L = LANG[currentLang];
  if (btn) btn.textContent = isDay ? L.theme.night : L.theme.day;
  localStorage.setItem('myst_theme', isDay ? 'day' : 'night');
}
document.getElementById('themeToggle')?.addEventListener('click', () => {
  isDayMode = !isDayMode;
  applyTheme(isDayMode);
});

/* ── Premium Gate ── */
function isPremium() { return localStorage.getItem('myst_premium') === '1'; }
function requirePremium(actionType) {
  if (isPremium()) return true;
  document.getElementById('premiumModal')?.classList.add('show');
  document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'false');
  return false;
}
function closePremiumModal() {
  document.getElementById('premiumModal')?.classList.remove('show');
  document.getElementById('premiumModal')?.setAttribute('aria-hidden', 'true');
}

/* ── Share ── */
const PAGE_URL = 'https://mysticaoracoli.it/magia-nera.html';
function shareContent(customText) {
  const L = LANG[currentLang];
  const text = customText || L.shareText;
  if (navigator.share) {
    navigator.share({ title: L.shareTitle, text, url: PAGE_URL }).catch(() => {});
    return;
  }
  const enc = encodeURIComponent(text + ' ' + PAGE_URL);
  const ue = encodeURIComponent(PAGE_URL);
  const wa = document.getElementById('share-wa'); if (wa) wa.href = `https://wa.me/?text=${enc}`;
  const tg = document.getElementById('share-tg'); if (tg) tg.href = `https://t.me/share/url?url=${ue}&text=${encodeURIComponent(text)}`;
  const fb = document.getElementById('share-fb'); if (fb) fb.href = `https://www.facebook.com/sharer/sharer.php?u=${ue}`;
  const xb = document.getElementById('share-x'); if (xb) xb.href = `https://twitter.com/intent/tweet?text=${enc}`;
  const sp = document.getElementById('sharePopup'); if (sp) sp.hidden = false;
}
function copyLink() {
  const L = LANG[currentLang];
  navigator.clipboard.writeText(PAGE_URL).then(() => {
    const b = document.getElementById('share-copy');
    if (b) {
      b.textContent = L.shareCopied;
      setTimeout(() => { b.textContent = L.shareCopy; }, 2000);
    }
  });
}

/* ── FAQ Accordion ── */
function renderFAQ(faqs) {
  const container = document.getElementById('faqList');
  if (!container) return;
  container.innerHTML = faqs.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <button class="faq-question" onclick="toggleFAQ(${i})" aria-expanded="false">
        <span>${f.q}</span>
        <span class="faq-icon" aria-hidden="true">+</span>
      </button>
      <div class="faq-answer" id="faq-ans-${i}" hidden>
        <p>${f.a}</p>
      </div>
    </div>
  `).join('');
}
function toggleFAQ(i) {
  const ans = document.getElementById(`faq-ans-${i}`);
  const btn = document.querySelector(`#faq-${i} .faq-question`);
  const icon = btn?.querySelector('.faq-icon');
  const isOpen = !ans.hidden;
  ans.hidden = isOpen;
  if (icon) icon.textContent = isOpen ? '+' : '−';
  btn?.setAttribute('aria-expanded', String(!isOpen));
}

/* ── Render Rituali ── */
function renderRituali() {
  const list = document.getElementById('ritual-list');
  if (!list) return;
  list.innerHTML = '';
  rituali.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'ritual-card';
    card.setAttribute('role', 'listitem');
    card.innerHTML = `
      <div class="ritual-head" onclick="this.parentElement.classList.toggle('open')" role="button" tabindex="0" aria-expanded="false" onkeydown="if(event.key==='Enter'||event.key===' '){this.click();event.preventDefault();}">
        <span class="ritual-num">${String(i+1).padStart(2,'0')}</span>
        <span class="ritual-title">${r.t}</span>
        <span class="ritual-arrow" aria-hidden="true">▾</span>
      </div>
      <div class="ritual-body">
        <div class="ritual-body-inner">
          <div class="field">
            <div class="field-label">🎯 Scopo</div>
            <div class="field-text">${r.scopo}</div>
          </div>
          <div class="field">
            <div class="field-label">🧿 Materiali</div>
            <div class="field-text">${r.mat}</div>
          </div>
          <div class="field">
            <div class="field-label">📜 Procedura</div>
            <div class="field-text">${r.proc}</div>
          </div>
          ${r.nota ? `<div class="field"><div class="field-label">✦ Nota</div><div class="field-text">${r.nota}</div></div>` : ''}
        </div>
      </div>
    `;
    list.appendChild(card);
  });
}

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  applyTheme(isDayMode);
  applyLang();
  renderRituali();
});
</script>
